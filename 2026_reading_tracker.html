<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 阅读记录</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-alt: #f6f5f4;
    --text: rgba(0,0,0,0.95);
    --text-secondary: #615d59;
    --text-muted: #a39e98;
    --border: rgba(0,0,0,0.1);
    --accent: #0075de;
    --shadow-hover: 0 2px 6px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03), 0 1px 3px rgba(0,0,0,0.02);
  }

  body {
    font-family: 'Inter', 'Noto Sans SC', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1rem;
    line-height: 1.5;
  }

  @media (min-width: 768px) { body { padding: 2rem; } }

  .page { max-width: 1000px; margin: 0 auto; }

  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.25rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
  }

  .title-block h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.625px;
    color: var(--text);
    line-height: 1.1;
  }

  .title-block p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .year-badge {
    font-size: 3rem;
    font-weight: 700;
    color: var(--bg-alt);
    line-height: 1;
    user-select: none;
    letter-spacing: -1.5px;
  }

  @media (min-width: 768px) {
    .title-block h1 { font-size: 2.25rem; letter-spacing: -1px; }
    .year-badge { font-size: 4rem; }
  }

  /* Stats Grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
  @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 10px; } }
  @media (min-width: 900px) { .stats-grid { gap: 12px; } }

  .stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    transition: box-shadow 0.2s;
  }

  .stat:hover { box-shadow: var(--shadow-hover); }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  /* Country Stats */
  .country-section {
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .section-title {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    margin-bottom: 1rem;
  }

  .country-grid { display: flex; gap: 10px; flex-wrap: wrap; }

  .country-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9999px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    transition: all 0.15s;
    cursor: default;
  }

  .country-badge:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
  .country-flag { font-size: 14px; }
  .country-count { font-size: 11px; color: var(--text-muted); font-weight: 600; }

  /* Chart */
  .chart-wrap {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .chart-container { position: relative; height: 160px; }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    margin-right: 4px;
  }

  .filter-btn {
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 5px 14px;
    border-radius: 9999px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--text); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Cover Wall */
  .wall-section { margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem; }

  .wall-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }

  .wall-header h2 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.25px; }
  .wall-header span { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }

  #cover-wall {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  @media (min-width: 600px) { #cover-wall { grid-template-columns: repeat(5, 1fr); gap: 12px; } }
  @media (min-width: 900px) { #cover-wall { grid-template-columns: repeat(5, 1fr); gap: 14px; } }

  .cover-link {
    display: block;
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg-alt);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .cover-link:hover { transform: scale(1.03); box-shadow: var(--shadow-hover); }
  .cover-img-wrap { position: relative; }
  .cover-img-wrap img { display: block; width: 100%; height: auto; }

  .cover-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 30%, transparent 70%);
    opacity: 0;
    transition: opacity 0.25s ease;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 10px 9px;
  }

  .cover-link:hover .cover-overlay { opacity: 1; }
  .cover-title { font-size: 11px; font-weight: 600; color: #fff; line-height: 1.3; margin-bottom: 2px; }
  .cover-author { font-size: 9px; color: rgba(255,255,255,0.7); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cover-rating { font-size: 11px; color: #f5a623; }

  /* Collapsible Book List */
  .booklist-section {
    margin-top: 1.5rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .booklist-toggle {
    width: 100%;
    background: var(--bg-alt);
    border: none;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: background 0.15s;
  }

  .booklist-toggle:hover { background: #eeebe7; }

  .sort-bar {
    display: flex;
    gap: 6px;
    padding: 10px 18px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .sort-btn {
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 9999px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }

  .sort-btn:hover { border-color: var(--text); color: var(--text); }
  .sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .booklist-toggle .arrow {
    font-size: 10px;
    transition: transform 0.2s;
  }

  .booklist-toggle.open .arrow { transform: rotate(180deg); }

  .booklist-content {
    display: none;
    padding: 0;
  }

  .booklist-content.open { display: block; }

  .book-row {
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 14px 18px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .book-row:first-child { border-top: none; }

  .book-info { flex: 1; min-width: 0; }

  .book-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.4;
  }

  .book-author { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }

  .book-review {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-top: 8px;
    word-break: break-word;
    overflow-wrap: break-word;
  }

  .review-more-btn {
    background: none;
    border: none;
    padding: 4px 0;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
    margin-top: 4px;
    transition: color 0.15s;
  }

  .review-more-btn:hover { color: var(--accent-hover); }

  .book-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .month-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 9999px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .star-rating { font-size: 11px; letter-spacing: 1px; }
  .star-filled {
    background: linear-gradient(to right, #f5a623 100%, #f5a623 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .star-half {
    background: linear-gradient(to right, #f5a623 0%, #f5a623 50%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .star-empty {
    color: rgba(0,0,0,0.15);
  }
  .rating-num { font-size: 10px; color: var(--text-muted); font-weight: 600; }
  .pages-tag { font-size: 10px; color: var(--text-muted); }

  .book-dates {
    text-align: right;
    font-size: 10px;
    color: var(--text-muted);
    line-height: 1.7;
    white-space: nowrap;
    font-weight: 500;
  }

  footer {
    margin-top: 2.5rem;
    border-top: 1px solid var(--border);
    padding-top: 1rem;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }

  @media (max-width: 480px) {
    .book-row { flex-direction: column; gap: 8px; }
    .book-dates { text-align: left; }
    .stat-value { font-size: 1.5rem; }
    .stats-grid { gap: 8px; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="title-block">
      <h1>阅读记录</h1>
      <p id="subtitle">{{MONTH_RANGE}} 2026</p>
    </div>
    <div class="year-badge">2026</div>
  </header>

  <div class="stats-grid">
    <div class="stat"><div class="stat-label">已读书目</div><div class="stat-value" id="total-books">—</div></div>
    <div class="stat"><div class="stat-label">平均评分</div><div class="stat-value" id="avg-rating">—</div></div>
    <div class="stat"><div class="stat-label">总页数</div><div class="stat-value" id="total-pages">—</div></div>
    <div class="stat"><div class="stat-label">阅读天数中位数</div><div class="stat-value" id="avg-reading-time">—</div></div>
  </div>

  <div class="country-section">
    <div class="section-title">国家分布</div>
    <div class="country-grid" id="country-grid"></div>
  </div>

  <div class="chart-wrap">
    <div class="section-title">每月阅读量</div>
    <div class="chart-container">
      <canvas id="monthChart" role="img"></canvas>
    </div>
  </div>

  <div class="filters" id="filters"><span class="filter-label">筛选</span></div>

  <div class="wall-section">
    <div class="wall-header">
      <h2>书影留存</h2>
      <span id="wall-count">— 本</span>
    </div>
    <div id="cover-wall"></div>
  </div>

  <div class="booklist-section">
    <button class="booklist-toggle" id="booklist-toggle" onclick="toggleBooklist()">
      <span>书籍清单</span>
      <span class="arrow">▼</span>
    </button>
    <div class="sort-bar" id="sort-bar">
      <button class="sort-btn active" data-sort="finish">时间 ↓</button>
      <button class="sort-btn" data-sort="rating">评分 ↓</button>
      <button class="sort-btn" data-sort="pages">页数 ↓</button>
    </div>
    <div class="booklist-content" id="booklist-content"></div>
  </div>

  <footer id="footer">数据来源 Airtable · Books · 导出于 2026-04-27</footer>
</div>

<script>
// ========== 数据注入开始 ==========
// 以下变量由生成脚本注入

const YEAR = 2026;
const GENERATED_DATE = "2026-04-27";

// 12个月颜色配置
const MONTH_COLORS = [
  { bg: '#b5d4f4', color: '#0c447c', label: '1月' },
  { bg: '#9fe1cb', color: '#085041', label: '2月' },
  { bg: '#fac775', color: '#633806', label: '3月' },
  { bg: '#f5c4b3', color: '#712b13', label: '4月' },
  { bg: '#d4c4f4', color: '#4c147c', label: '5月' },
  { bg: '#f4d4b5', color: '#7c4414', label: '6月' },
  { bg: '#b5f4d4', color: '#147c54', label: '7月' },
  { bg: '#f4b5d4', color: '#7c1454', label: '8月' },
  { bg: '#d4f4b5', color: '#547c14', label: '9月' },
  { bg: '#b5d4f4', color: '#147c8c', label: '10月' },
  { bg: '#f4b5b5', color: '#7c1414', label: '11月' },
  { bg: '#b5f4f4', color: '#147c7c', label: '12月' },
];

// 国家前缀映射（支持多种括号格式）
const COUNTRY_PREFIX_MAP = {
  // 方括号
  '[日]': '日本', '[美]': '美国', '[德]': '德国', '[英]': '英国',
  '[法]': '法国', '[塞尔维亚]': '塞尔维亚', '[韩]': '韩国', '[俄]': '俄罗斯',
  '[以色列]': '以色列', '[爱尔兰]': '爱尔兰', '[英美]': '英美', '[荷]': '荷兰',
  '[意大利]': '意大利', '[奥]': '奥地利', '[奥地利]': '奥地利', '[阿根廷]': '阿根廷',
  '[波兰]': '波兰', '[葡萄牙]': '葡萄牙', '[古希腊]': '古希腊',
  '[瑞典]': '瑞典', '[加拿大]': '加拿大', '[澳]': '澳大利亚',
  '[英国]': '英国', '[加]': '加拿大', '[意]': '意大利', '[波]': '波兰',
  '[阿]': '阿根廷', '[荷]': '荷兰',  // 常见缩写
  // 圆括号
  '(日)': '日本', '(美)': '美国', '(德)': '德国', '(英)': '英国',
  '(法)': '法国', '(韩)': '韩国', '(俄)': '俄罗斯', '(荷)': '荷兰',
  '(意)': '意大利', '(奥)': '奥地利', '(葡萄牙)': '葡萄牙',
  '(古希腊)': '古希腊', '(俄罗斯)': '俄罗斯',
  '（日）': '日本', '（美）': '美国', '（德）': '德国', '（英）': '英国',
  '（法）': '法国', '（韩）': '韩国', '（俄）': '俄罗斯',
  '（意）': '意大利', '（葡萄牙）': '葡萄牙',
  // 中文方括号 〔 〕
  '〔美〕': '美国', '〔英〕': '英国', '〔日〕': '日本', '〔德〕': '德国',
  '〔法〕': '法国', '〔俄〕': '俄罗斯', '〔意〕': '意大利', '〔波〕': '波兰',
};

// 国家旗帜
const COUNTRY_FLAGS = {
  '中国': '🇨🇳', '日本': '🇯🇵', '美国': '🇺🇸', '德国': '🇩🇪',
  '英国': '🇬🇧', '法国': '🇫🇷', '塞尔维亚': '🇷🇸', '韩国': '🇰🇷',
  '俄罗斯': '🇷🇺', '以色列': '🇮🇱', '爱尔兰': '🇮🇪', '英美': '🇺🇸',
  '荷兰': '🇳🇱', '意大利': '🇮🇹', '奥地利': '🇦🇹', '阿根廷': '🇦🇷',
  '波兰': '🇵🇱', '葡萄牙': '🇵🇹', '古希腊': '🇬🇷', '瑞典': '🇸🇪',
  '加拿大': '🇨🇦', '澳大利亚': '🇦🇺', '西班牙': '🇪🇸', '捷克': '🇨🇿',
};

// 检测字符串是否包含中文字符
function hasChineseChars(str) {
  return /[\u4e00-\u9fa5]/.test(str);
}

// 标准化作者名字符串，去除各种括号及其内容
function stripCountryPrefixes(author) {
  return author
    .replace(/\[([^\]]+)\]/g, '')   // [xxx]
    .replace(/\(([^\)]+)\)/g, '')     // (xxx)
    .replace(/（([^）]+)）/g, '')      // （xxx）
    .replace(/《([^》]+)》/g, '')     // 《xxx》
    .replace(/【([^】]+)】/g, '')     // 【xxx】
    .trim();
}

// 国家推断
function deriveCountry(author) {
  // 1. 先匹配前缀映射表
  for (const [prefix, country] of Object.entries(COUNTRY_PREFIX_MAP)) {
    if (author.includes(prefix)) return country;
  }
  // 2. 无前缀时，根据姓名文字判断
  const nameOnly = stripCountryPrefixes(author);
  if (hasChineseChars(nameOnly)) {
    return '中国';
  }
  // 3. 纯英文名默认为美国
  return '美国';
}

// 书籍数据（由生成脚本注入）

}).sort((a, b) => a - b);
const medianReadingDays = readingDays.length % 2 === 0

// 星星计算
function stars(rating) {
  let full, half;
  if (rating >= 9) { full = 5; half = 0; }
  else if (rating >= 8.5) { full = 4; half = 1; }
  else if (rating >= 8.0) { full = 4; half = 0; }
  else if (rating >= 7.5) { full = 3; half = 1; }
  else if (rating >= 7.0) { full = 3; half = 0; }
  else { full = 2; half = 0; }
  const empty = 5 - full - half;
  return '<span class="star-filled">★</span>'.repeat(full) +
         (half ? '<span class="star-half">★</span>' : '') +
         '<span class="star-empty">☆</span>'.repeat(empty);
}

});

// 渲染书单列表
function renderBooklist(list) {
  const content = document.getElementById('booklist-content');
  content.innerHTML = list.map((b, idx) => {
    const m = monthMeta[b.month];
    let reviewSection = '';
    if (b.review) {
      const needsTruncation = b.review.length > 60;
      const truncatedText = needsTruncation ? b.review.substring(0, 60) + '...' : b.review;
      reviewSection = `
        <div class="book-review" id="review-${idx}" data-full="${encodeURIComponent(b.review)}" data-truncated="${needsTruncation}">
          ${truncatedText.replace(/\n/g, '<br>')}
        </div>
        ${needsTruncation ? `<button class="review-more-btn" onclick="toggleReview(${idx}, this)">展开</button>` : ''}
      `;
    }
    return `<div class="book-row">
      <div class="book-info">
        <div class="book-title"><a href="${b.doubanLink}" target="_blank" style="color:inherit;text-decoration:none;">${b.title}</a></div>
        <div class="book-author">${b.author}</div>
        <div class="book-meta">
          <span class="month-tag" style="background:${m.bg};color:${m.color}">${m.label}</span>
          <span class="star-rating">${stars(b.rating)}</span>
          <span class="rating-num">${b.rating}</span>
          ${b.pages ? `<span class="pages-tag">${b.pages}页</span>` : ''}
        </div>
        ${reviewSection}
      </div>
      <div class="book-dates">${b.start}<br>${b.finish}</div>
    </div>`;
  }).join('');
}

function toggleReview(idx, btn) {
  const review = document.getElementById(`review-${idx}`);
  const isCollapsed = btn.textContent === '展开';
  const fullText = decodeURIComponent(review.dataset.full);

  if (isCollapsed) {
    review.innerHTML = fullText.replace(/\n/g, '<br>');
    btn.textContent = '收起';
  } else {
    review.innerHTML = fullText.substring(0, 60) + '...';
    btn.textContent = '展开';
  }
}

// 展开/收起书单
function toggleBooklist() {
  const toggle = document.getElementById('booklist-toggle');
  const content = document.getElementById('booklist-content');
  booklistOpen = !booklistOpen;
  toggle.classList.toggle('open', booklistOpen);
  content.classList.toggle('open', booklistOpen);
}

// 排序函数
function getSortedList(list) {
  const sorted = [...list];
  const dir = currentSortDir === 'desc' ? -1 : 1;
  switch (currentSortField) {
    case 'finish': return sorted.sort((a, b) => a.finish.localeCompare(b.finish) * dir);
    case 'rating': return sorted.sort((a, b) => (a.rating - b.rating) * dir);
    case 'pages': return sorted.sort((a, b) => ((parseInt(a.pages) || 0) - (parseInt(b.pages) || 0)) * dir);
    default: return sorted;
  }
}

      currentSortDir = currentSortDir === 'desc' ? 'asc' : 'desc';
    } else {
      // 不同字段 → 切换到该字段，默认降序

      b.classList.toggle('active', currentSortField === f);
    });
    const filtered = books.filter(filterMap[currentFilter]);

    if (booklistOpen) {
      document.getElementById('booklist-content').classList.add('open');

    }
  });
});

      data.datasets[0].data.forEach((value, index) => {
        if (value > 0) {
          const x = scales.x.getPixelForValue(index);
          const y = scales.y.getPixelForValue(value) - 6;
          ctx.fillText(value, x, y);
        }
      });
      ctx.restore();
    }
  }]
});
</script>
</body>
