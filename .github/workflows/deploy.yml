name: Deploy Reading Tracker

on:
  # 方式1: push 核心文件时自动触发
  push:
    branches: [main]
    paths:
      - 'template.js'
      - 'reading-tracker-github.js'
      - 'reading-tracker-year-github.js'
      - 'reading archive/index.html'

  # 方式2: Airtable Automation 触发
  repository_dispatch:
    types: [airtable-update]

  # 方式3: 手动触发
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Generate Reading Tracker
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          WEAREAD_API_KEY: ${{ secrets.WEAREAD_API_KEY }}
        run: node reading-tracker-github.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
