合论，并开始对无穷大进行研究。","chapter":"导论","color":0,"_order":6},{"text":"宇宙的本质在于数的和谐性，这种观点被称为毕达哥拉斯主义，并影响了后来的柏拉图。值得一提的是，当今物理学的标准模型，就是一种毕达哥拉斯主义的体现。物理学研究的范式在杨振宁走上学术舞台以后，已经从伽利略和牛顿开创的实验科学，转为先由数学模型预测一种粒子的存在，再设计实验去验证。","chapter":"毕达哥拉斯学派","color":5,"_order":9},{"text":"柏拉图的理念世界立场与亚里士多德的唯物论立场之间的对立，是一种哲学思\n想上的对立。受此影响，后世对哲学和数学的激烈争论不绝于耳，直至今日尚无答案。如果柏拉图的理念是真理，那么数学就是一种发现;反之，数学只不过是人类思维活动的一个过程，是人类的发明物。","chapter":"柏拉图的理想世界","color":5,"_order":10},{"text":"对于“二分法”和“阿喀琉斯与\n乌龟”，亚里士多德认为芝诺犯了一个错误，在《物理学》中，亚里士多德反驳道:“他主张一个事物不可能在有穷时间里通过无穷的事物,或者分别和无穷事物相接触。须知长度和时间被说成是‘无穷的’有两种含义，而且一般来说，一切连续事物被说成是‘无穷的’都有两种含义:分割上的无穷，或者延伸上的无穷。因此，一方面，事物在有穷的时间里不能和无穷的事物相接触，另一方面，却能和分割上无穷的事物相接触，因为时间分割后本身也是无穷的。因此，通过一个无穷的事物是在无穷的时间里而不是在有穷的时间里进行的，和无穷的事物接触是在无穷数的而不是在有穷数的‘现在’上进行的。因此，既不能在有穷的时间里通过无穷的量，也不能在无穷的时间里通过有穷的量:而是:时间无穷，量也无穷，量无穷，时间也无穷。因此，经过一定的时间可以越过一定的距离。”","chapter":"芝诺悖论：无穷之辩","color":5,"_order":12},{"text":"在此我们无意对亚里士多德的三段论再做详细论述，因为经过2000多年的发展，我们有更先进的逻辑方法可以使用。正如罗素指出的，亚里士多德的三段论存在一些形式的缺点，依然会造成逻辑上的混淆。比如，我们说:“所有的金山都是山，所有的金山都是金的，所以有些山是金的。”这个结论就是错误的，尽管前提都是真的。","chapter":"演绎推理：逻辑学和几何学","color":5,"_order":13},{"text":"物理学家们需要的其实是有结构的二元数或矩阵，复数和超复数的一些性质，比如多维、共轭、完备性，恰好满足了这种需求，可以大大简化计算，便于写出优雅的方程。但是在2022年年初，中科大的潘建伟团队和南科大的范靖云团队分别通过独立实验验证了虚数的必要性，即仅用实数不能描述标准量子力学的实验结果。这一结论将给我们对世界的认识和思考带来全新的启示。","chapter":"不可约：复数的发现","color":5,"_order":25},{"text":"这个式子被称为欧拉恒等式。此时令a=π，代入后可得欧拉公式:\n这个公式就是大名鼎鼎的上帝公式，它集中了数学中最重要的元素:自然对数底e、复数符号i、圆周率π、自然数1和伟大的0。其中，e和π是两个最基本的超越数，1和0是代数中两个最基本的单位元素，i则是连接表象和内涵的钥匙。","chapter":"不可约：复数的发现","color":5,"_order":25},{"text":"我认为超越数的存在，已经在一定程度上意味着存在一些数是不可计算的，我们可以定义这些数，但在有穷的情况下永远无法列出求解这些数的算法。代数方法从还原与对消开始，就已经是一种机械式的计算方法，但超越数的存在实际上潜在地意味着机械式的计算方法是不完备的，无法完整描述所有实数。图灵在20世纪初严格地定义了可计算数”，并证明了一些数的不可计算性。但对图灵来说，π是一个可计算数，这是因为图灵采用有限长度的算法描述了永远执行不完的计算过程，他已经暗自引入了无穷。从代数数到超越数，再到可计算数和不可计算数，这是对计算性质的研究进路。","chapter":"数系的扩张","color":5,"_order":26},{"text":"数学家的研究表明，依然存在一些数，无论怎样构造整系数多项式方程，都无法表示出这些数。即这些数不是任何整系数多项式方程的根，它们被称为超越数。","chapter":"数系的扩张","color":5,"_order":26},{"text":"数和代数是重要的。数的重要在于它描绘了万物。描绘万物不是由毕达哥拉斯完成的，而是在20世纪初由数学家哥德尔的奠基性工作完成的，他基于算术基本定理编码了万物(哥德尔数)。”代数的重要性在于它进一步通过计算规则定义了数的结构，并通过计算过程完成了数之间关系的挖掘与显现。因此所谓的计算，无非是在一个数域中找到一条路径，从一些数走向另一些数。但也由此可知:\n计算，可以让万物内在的结构显现。","chapter":"代数基本定理","color":5,"_order":27},{"text":"从计算的角度来看,刘维尔证明了超越数的存在,这意味着有些数可以被定义，但是列不出方程，也列不出算法(有限步骤的求解方法);伽罗瓦的结论则意味着，有些数即便可以被定义，可以列出方程，但也列不出算法，永远计算不出精确值，甚至通过四则运算加开方运算都无法表示出来。对于这两种情况，都只能退而求其次，寻求近似的数值解。这些结论，实际上已经暗示了“不可计算问题”的存在。","chapter":"伽罗瓦的遗珠","color":5,"_order":30},{"text":"数学符号的进化史是一个颇值得研究的课题，因为正是数学的形式化符号从语言文字中独立出来，才澄清了容易与自然语言混淆的概念，同时一个好的简洁符号还能实实在在地大幅简化计算的工作量。这一事实在笛卡儿的坐标几何、莱布尼茨的微分符号、皮亚诺的数理逻辑符号、弗雷格的概念文字、罗素的《数学原理》、狄拉克的量子力学符号等各领风骚的历史中不断被证明。可以说数学符号的发明与进化，本身就是对计算效率的巨大提升。","chapter":"计算工具","color":5,"_order":31},{"text":"莱布尼茨之前的思想家提出的计算或演绎方面的想法，要么没有形成公理系统，要么不够深入。而作为“数理逻辑之父”的莱布尼茨，则是集大成者，系统化地建立了这一理论框架。莱布尼茨的数理逻辑有两个核心思想:一是逻辑演算，二是普遍语言。","chapter":"数理逻辑的创立","color":5,"_order":35},{"text":"1872年，魏尔斯特拉斯提出了一个分析史上著名的反例。他构造了一个处处\n连续，但处处不可微的三角函数级数，震惊了整个数学界。这个函数被称为魏尔斯特拉斯的病态函数。魏尔斯特拉斯通过这个病态函数，非常充分地说明了通过运动建立的曲线，不一定有切线，因此微积分的基础应该消除几何直观，而只建立在数的基础上。如果当初牛顿和莱布尼茨发现了这个病态函数，说不定会沮丧到直接放弃微积分方法。但是魏尔斯特拉斯提出的病态函数，在19世纪却成为推动分析基础严格化的强心针，进一步使数学家们意识到，为分析建立严格基础，必须对实数系进行严格的定义。","chapter":"分析的严格化","color":5,"_order":43},{"text":"一个集合具有两个重要特征:一是集合中的元素是确定的，二是集合的元素之间是可区分的。外延原则是说一个集合由它的元素唯一地确定，概括原则是说每一个性质(或谓词)产生一个集合。用通俗的话来讲，集合可以用两种方式来定义。其中，一种方式是外延的，就是把集合的元素一个个枚举出来，全部列举完也就形成了集合。但外延原则在元素多的时候不够方便，因此还有另一种通过对象的性质来定义集合的方式，把具备共同性质的对象列到一起形成集合，也就是概括原则，或者说在概括原则下集合是通过内涵定义的。","chapter":"对角线方法","color":5,"_order":45},{"text":"1889年，意大利逻辑学家、数学家和语言学家皮亚诺在《用一种新方法陈述\n的算术原理》一书中提出自然数算术的一个公理系统，包含9条公理，此后数年逐渐优化至5条公��。人们称之为“皮亚诺公理”。这是对自然数算术理论的一次重要总结。从数学史上可以看出，人类自古希腊发明数学以来，对自然数的精确定义竟然花了2000多年之久。在绝大多数时间里，人们虽然一直在使用自然数，但从未精确定义过它。而且，与大多数人的认知不同的是，在19世纪数学家们是先定义了无理数，建立了实数理论，然后才给自然数下了一个精确的定义。最后这一步正是由皮亚诺完成的。","chapter":"自然数的定义","color":5,"_order":49},{"text":"自指和递归有着紧密联系，完全否定自指，就否定了递归。恶性的自指就如罗素指出的恶性循环原则一般，暗含了对无穷的滥用，如果用现代计算机以递归的方式运行一下罗素提到的恶性循环式的自指，一定会陷入计算上的死循环。因此，一般递归函数或算法都有着有穷性的要求，这是为了让递归成为一种良定义的自指，规避不可判定命\n题或不可计算函数。","chapter":"自我指涉","color":5,"_order":51},{"text":"逻辑主义者希望将数学建立在逻辑的基础之上。弗雷格是逻辑主义的先驱，已经做了大量工作，尤其是明确了逻辑主义的宗旨。\n从少量的逻辑概念出发，定义全部的数学概念。\n从少量的逻辑法则出发，演绎出全部的数学理论。","chapter":"逻辑主义进路","color":5,"_order":53},{"text":"直觉主义理解的“直觉”不同于对事实的断言或推论,而是一种理智的构造，它并不传达外部世界的真理，而只与心智的构造有关。对直觉主义者来说，数学是一种发明，而非发现。布劳威尔认为，直觉主义要追溯到哲学家康德。康德主张自然数是从时间直觉中推演出来的，几何理论则是从空间直觉中产生的。","chapter":"直觉主义进路","color":5,"_order":54},{"text":"一个数学系统是一致的或者说相容的，指的是系统预设的公理之间是无矛盾的，不会从公理中推导出互相矛盾的结果。这一点对数学系统相当重要。如果没有严格证明新系统的一致性，那么总有人会担忧，未来是否会发现新的矛盾定理，从而导致公理系统崩溃，无法再可靠地使用相关的数学结论。","chapter":"几何的算术基础","color":5,"_order":62},{"text":"数学家们发现，数学不再是一种“量的科学”，而应该是“从一组给定\n公理或前提中按照逻辑抽取出隐含结论”的最完善的学科。而公理是否“自明为真”不再变得那么重要，数学家的任务是验证结论是否为“在初始前提下的必然逻辑结果”。传统观念认为的“一个公理系统只有一个论域(模型)”的观念也被破除了，只要容许对一个公理系统做出不同解释、找出不同模型，那就完全可以把它看成一个不与任何特定对象域绑定的形式公理系统。这种思想为希尔伯特最终建立“形式公理化系统”奠定了基础。","chapter":"几何的算术基础","color":5,"_order":62},{"text":"科学发现的重要原则，在于对传统信念的挑战，尤其是对人们习以为常的常识\n的怀疑和求证。在科学史上，这样的壮举比比皆是，每一次都实现了重大突破。有人问爱因斯坦他是如何发现相对论的，爱因斯坦回答:“是靠挑战一条公理。”爱因斯坦挑战的是“两个不同瞬间中的一个必定先于另一个”这条公理。类似地，罗巴切夫斯基和鲍耶向欧几里得第五公设发起了挑战;哈密顿和凯利向乘法可交换公理发起了挑战;卢凯西维奇和波斯特向亚里士多德的排中律发起了挑战;伽利略向重量大的物体落得快的传统观念发起了挑战。这些人的伟大成就，都说明了公理并非一成不变的，公理不再代表真理，而只能被视为一种设定。","chapter":"几何的算术基础","color":5,"_order":62},{"text":"哥德尔不完备性定理也深刻揭示了在形式系统中“可证”和“真”是两个概念。“可证”只涉及从公理出发的一系列演绎推理步骤是否严格，而“真”则涉及公理本身是否合理。这就开始对形式系统的语法和语义进行区分,语法解释“可证”，语义则需要解释真和假。","chapter":"哥德尔证明","color":5,"_order":73},{"text":"图灵认为人的思维状态是离散的而不是连续的，这是图灵认为机器的计算过程\n可以等价为人脑的思维过程的核心依据。而哥德尔对此持相反意见。1972年，在图灵去世20多年后，哥德尔针对图灵论文里上面这段话写了短评，称其为“图灵分析中的一个哲学错误”。哥德尔认为人脑的思维过程不是静止的，而是连续变化的，而且精神上的思维状态可能会更加趋于无穷。图灵观点和哥德尔观点分别代表两种信仰，在随后的几十年里形成了图灵信念和哥德尔信念的两个流派。两个流派就一个重要问题展开大论战，即“机器能思考吗”。这个问题涉及无穷的本质，也就触碰到世界的本源,时至今日尚无定论,因此只能从哲学上探讨,从直觉上选择。","chapter":"图灵机","color":5,"_order":79},{"text":"在计算的世界里，程序和数据本质相同，都是数字。因此，我们可以向一台图\n灵机输入另一台图灵机的描述数和输入，这样就可以模拟另一台图灵机的计算过程，这台图灵机被称为“通用图灵机”。图灵在论文中描述了通用图灵机。通用图灵机非常灵活，是可编程的。现代计算机全都是通用图灵机。从可编程的角度讲，一种操作数据的规则如能模拟通用图灵机，则可被称为“图灵完备”的，比如指令集、编程语言等。","chapter":"可计算数","color":5,"_order":81},{"text":"现代计算机在物理实现上采用了香农的逻辑电路，通过电路布线模拟布尔逻辑，从而具备了逻辑计算能力。此后的计算机发展都基于逻辑电路，同时也基于冯·诺依曼架构”。在冯·诺依曼架构中，中央处理器有一个算术逻辑单元，用来实现自然数的加法和乘法。初等算术是大部分数学的基础，应用价值巨大，因此现代计算机的实现原理离不开冯·诺依曼架构，也就受到哥德尔不完备性定理的约束。","chapter":"丘奇-图灵论题","color":5,"_order":82},{"text":"需要注意，图灵机本身可以模拟任一数学形式系统，而哥德尔不完备性定理\n描述的是，在包含初等算术的形式系统中，公理化方法是不完备的，系统中存在着不可判定的命题。包含初等算术这个条件即蕴含自然数的皮亚诺公理，简单说就是要满足自然数的加法和乘法。因此，图灵机受哥德尔不完备性定理约束的前提是，图灵机实现了一个包含初等算术的形式系统。若图灵机实现的形式系统没有包含初等算术，则并不受哥德尔不完备性定理的约束。","chapter":"丘奇-图灵论题","color":5,"_order":82},{"text":"图灵很巧妙地构造出一个理论上可实现的机器。这天马行空的想法，可以看作融合了第三次数学危机以来各个数学流派思想的成果。从对后世计算机发展的影响和对人类的整体贡献来看，称图灵机为三大流派集大成者并不为过。最早弗雷格和罗素试图完善莱布尼茨的计算梦想，为数学建立逻辑演算系统，之后希尔伯特明确提出建立形式系统的计划,而图灵机无疑整合了逻辑演算系统中符号与推理的优点，又是希尔伯特形式系统中“公式间机械变换过程”的直接体现。同时，图灵创造性的“构造”想法，又和布劳威尔的直觉主义一脉相承，图灵机是可构造的!图灵机为建立起计算和物理世界的桥梁打下基础，也直接催生了电子计算机。","chapter":"丘奇-图灵论题","color":5,"_order":82},{"text":"判定性问题与哥德尔的不完备性定理不同。不完备性定理的结论是，在一个公理系统中存在既不可证明又不可证伪的命题，这是公理化方法的不完备性。判定性问题则关于是否存在一个通用的算法，可用于判定任意命题是否可证。判定性问题着眼于判定过程本身。","chapter":"判定性问题的证明","color":5,"_order":83},{"text":"图灵和丘奇证明的是，不存在一个通用的机械方法，在有限步骤里可以判定一个命题是否可证。即图灵机如果不实际运行一遍，无法判断另一台图灵机的产出。每台图灵机是一个描述数，另一台图灵机如果不去实际算一下，无法判定这台机器到底会输出什么。","chapter":"停机问题","color":5,"_order":84},{"text":"希尔伯特的判定性问题，以及图灵和丘奇给出的答案，似乎带来这样的启示:\n很多事情，只有实际去做了，才知道会发生什么，会遇到什么。人生总是充满不确定性，至少从图灵机和数学来看，世界就是如此运行的。不存在一台图灵机可以通用地判定另一台图灵机的结果，所以赵括的纸上谈兵是行不通的，实践才是检验真理的唯一标准。","chapter":"不可计算的函数","color":5,"_order":86},{"text":"这就证明了一个残酷的事实:求得一个足够好的近似算法，可能和求解NP完\n全问题一样难，除非P=NP!这些大大出人意料的结论的发现，粉碎了许多人对近似算法抱有的美好幻想，也进一步揭示了计算领域许多深刻的内涵。当前对电子计算机计算能力瓶颈的最前沿结论，就是由“不可近似性”的相关断言所描述的。","chapter":"PCP定理与不可近似性","color":5,"_order":106},{"text":"我个人认为，恰恰是因为云计算的愿景还没有实现，才使得芯片公司热衷于制造超级芯片，以赚取丰厚的利润。云计算的初心是，使用普通、廉价的服务器和芯片并联成一台计算机，代替超级计算机、超级芯片，达到同等以上的计算能力，这完全是有可能的。云计算技术是打破芯片产业“卡脖子”格局的另一个重要突破口。","chapter":"挑战极限","color":5,"_order":109},{"text":"经典计算可以看作量子计算的一个特例，所有经典计算都可以在量子计算机上模拟。因此，量子计算不是一种特殊的计算，而是一种更加通用的计算，更接近计算的本质。现在的经典计算机的核心元件是晶体管，晶体管是一种半导体，利用了量子的特性，能够在不同电压下控制电子的流通，从而表示0或1的状态。\n量子是组成世界的基础，经典计算都可以用量子理论解释。\n最后，量子计算直接操作的是物理对象本身，即量子比特，而并非如数字计算机一般，通过数字化建模来发挥作用。因此，经典计算是一种模拟，而量子计算就是计算本身。在图灵机的经典模型中,图灵对人类计算员的计算过程进行了模型化，然而人类计算员的模型未必能完美刻画自然界中发生的所有计算过程。而且，正是这一事实催生出量子计算的想法。","chapter":"第10章 量子计算","color":5,"_order":110},{"text":"维纳采用了希腊单词“cybernetics”来命名他的控制论，这个单词在希腊语中\n是“掌舵人”的意思，这是为了致敬克拉克·麦克斯韦，麦克斯韦在1868年发表了第一篇关于反馈机制的重要论文。然而中文翻译为“控制论”多少带来了一点歧义，因为很容易和数学里的“控制理论”(Control Theory)搞混。维纳的控制论可以被看作一个学科群，他更注重的是一种哲学思想，这种思想采用行为主义，从系统外部着眼而放弃了深究系统内部结构，它以信息、通信、反馈和控制为主要框架研究系统的复杂行为。","chapter":"反馈与控制","color":5,"_order":121},{"text":"递归过程调用了程序自身，是一种自指。然而算法中的递归却不会像罗素的恶性循环原则那样引发逻辑悖论，这是由于递归算法是“倒过来”执行的，每次过程都指向了一个更小的自我，而且是有穷的，因此是被允许的，这种良定义不会涉及悖论。","chapter":"现代复杂性研究思潮","color":5,"_order":122},{"text":"这种全脑神经工作空间并非完全按照“输入/输出”的模式来运作:大脑一直在不断地传递全脑的神经活动模式，产生“意识流”。大量无意识的信息在黑暗中流动,其中的一些信息会因为与目标吻合而被选出,进入高级决策系统,形成意识。而与语言区的连接，让人们能够将思想告诉他人，形成意识通达。意识仅仅是整个大脑信息的共享。意识状态由分布在多个脑区的神经元为同一个心理活动的不同方面共同编码，稳定激活的神经元表明当前信息与它们有关，而所有被抑制的神经元则表明当前信息与它们无关，整个编码过程持续300毫秒左右，然后产生意识的焦点。","chapter":"机器的意识","color":5,"_order":139}],"thoughts":[],"popularHighlights":[]},"CB_5CrB4DB6Q5O36z96x6B6t8hB":{"rating":755,"ratingCount":10427,"chapters":[{"title":"第23章 切身利害：反脆弱性和牺牲他人的可选择性","chapterUid":32,"chapterIdx":32},{"title":"第7章 天真的干预","chapterUid":11,"chapterIdx":11},{"title":"第2章 随处可见的过度补偿和过度反应","chapterUid":5,"chapterIdx":5},{"title":"第11章 千万别嫁给摇滚明星","chapterUid":16,"chapterIdx":16}],"highlights":[{"text":"一个过度反应的系统一定会采用超额模式，建立额外的能力和力量，预期更坏的结果，对有关危险发生概率的信息做出反应。当然，从机会主义的角度说，这种额外的能力或力量本身也可能是很有用的。我们看到，冗余是机会主义，所以即使在没有危险的情况下，这种额外的力量也能带来一定的益处。","chapter":"第2章 随处可见的过度补偿和过度反应","color":5,"_order":5},{"text":"在听说了我对反脆弱性的看法后，哈尔彭告诉了我一种被称为创伤后成长的现象，这是与创伤后压力综合征相对立的一种现象，指的是人们在受到过去事件的伤害后重新振作并超越自己。我此前从未听说过这种现象，惭愧的是，我也从未努力思考过它的存在：虽有少量相关文献材料存在，但在一个狭小的学科领域外鲜有人宣传。","chapter":"第2章 随处可见的过度补偿和过度反应","color":5,"_order":5},{"text":"一个显著的事实是，医源性损伤似乎随着时间的推移，随着知识的增长而逐步增加，在19世纪后期的某个时候达到高峰。感谢现代化：正是“科学的进步”，让诊所取代了家庭治疗，导致死亡率直线上升，当时的人们认为是染上了“医院热”——难怪莱布尼茨曾称这些医院是“死亡的温床”。死亡率上升的证据显而易见，因为所有的受害者都聚集到了一类地方：人们在这些医院中纷纷死去，而不进医院的人却能活下来。","chapter":"第7章 天真的干预","color":5,"_order":11},{"text":"反脆弱性是积极主动加上保守偏执的组合——消除不利因素，保护自己免受极端伤害，同时让有利因素或正面的“黑天鹅”顺其自然地发挥效用。我们已经看到塞内加的不对称性：要让有利因素大于不利因素，只需要减少极端不利因素的侵害（情绪伤害），而不是改善中间因素。","chapter":"第11章 千万别嫁给摇滚明星","color":5,"_order":16},{"text":"我们都认为，常常自吹自擂的人多令人反感。那么公司呢？我们为什么不反感那些宣传自己有多么伟大的公司？这种冒犯我们感官的行为，往往分为3个层级：\n第一级，轻度冒犯：公司无耻地进行自我宣传，如英国航空飞机上的那个家伙，这只会伤害它们自己。第二级，更严重的冒犯：公司试图给自己戴上最荣耀的光环，隐藏起它们产品的缺陷——仍然没什么害处，因为我们往往能预期到这一点，并仍然依赖于其他用户的意见。第三级，更严重的冒犯：公司试图利用我们的认知偏见和我们的无意识联想为它们卖的产品营造出一种假象，这是非常隐蔽的。比如说，它呈现出一位牛仔在夕阳下悠闲地抽着香烟的充满诗意的画面，迫使你将特定产品与一些浪漫时刻联系起来，其实从逻辑上讲，这两者根本没有可能联系到一起。你寻求的是一个浪漫时刻，而你得到的却是癌症。","chapter":"第23章 切身利害：反脆弱性和牺牲他人的可选择性","color":5,"_order":32}],"thoughts":[],"popularHighlights":[{"text":"当你寻求秩序，你得到的不过是表面的秩序；而当你拥抱随机性，你却能把握秩序、掌控局面。","count":18863,"chapter":"前言"},{"text":"从随机事件（或一定冲击）中获得的有利结果大于不利结果的就是反脆弱的，反之则是脆弱的。","count":9503,"chapter":"前言"},{"text":"风会熄灭蜡烛，却能使火越烧越旺。","count":9440,"chapter":"前言"},{"text":"我宁愿做愚钝但具有反脆弱性的人，也不做极其聪明但脆弱的人。","count":9072,"chapter":"前言"},{"text":"对挫折的过度反应所释放出来的多余能量成就了创新！","count":8381,"chapter":"第2章 随处可见的过度补偿和过度反应"},{"text":"知性的生活关乎如何进行情绪定位，以消除伤害的刺激，正如我们所看到的，方法就是淡化你所拥有的东西在你心中的地位，这样任何损失都不会给你带来伤痛。世界的波动性也不能给你带来负面影响。","count":6930,"chapter":"第10章 塞内加的不利因素和有利因素"},{"text":"这是现代化的悲剧，正如极为焦虑、过度保护子女的父母。那些试图帮助我们的人往往会对我们造成最大的伤害。","count":6643,"chapter":"前言"},{"text":"我们常看到一个令人费解的现象，即给我们带来最大利益的并不是那些曾试图帮助我们（比如提供“建议”）的人，而是那些曾努力伤害我们但最终未能如愿的人。","count":6259,"chapter":"第2章 随处可见的过度补偿和过度反应"},{"text":"鉴于不可能存在这样完美的强韧性，我们需要一个能够不断利用（而非逃避）随机事件、不可预测的冲击、压力和波动实现自我再生的机制。","count":6030,"chapter":"前言"},{"text":"这就是生活中的核心错觉，即认为随机性是有风险的，是一桩坏事，消除随机性，就可以消除风险。","count":5824,"chapter":"第5章 露天市场与办公楼"},{"text":"人只有在以不折不扣的诚意评判世界、评判他人的时候……才能获得切切实实的自由……这不只是一个目的，而是一项义务。","count":5790,"chapter":"前言"},{"text":"有些事情能从冲击中受益，当暴露在波动性、随机性、混乱和压力、风险和不确定性下时，它们反而能茁壮成长和壮大。","count":5775,"chapter":"前言"},{"text":"这种无法跨领域理解的情况是人类固有的缺陷，只有当我们努力克服和突破这一障碍时，我们才能开始获得智慧和理性。","count":5491,"chapter":"第1章 达摩克利斯之剑和九头蛇怪"},{"text":"如果我能预测我未来每一天的轨迹，那么我会感觉自己身体的一部分已经死了。","count":5432,"chapter":"第3章 猫与洗衣机"},{"text":"然而，在现代生活中，简单的做法一直难以实现，因为它有违某些努力寻求复杂化以证明其工作合理性的人所秉持的精神。","count":5219,"chapter":"前言"},{"text":"如果你想做出改变，并且不关心未来结果的多种可能性，认为大多数结果都会对你有利，那么你就具有反脆弱性。","count":4862,"chapter":"第4章 杀死我的东西却让其他人更强壮"},{"text":"对某事的痴迷是最具反脆弱性的。","count":4718,"chapter":"章节概要与阅读导图"},{"text":"现代人那种人为的衰老，正是压抑了生命内在的反脆弱性的结果。"     // ===== 初始化 =====
    const actualMonths = [...new Set(books.map(b => b.month))].sort((a, b) => a - b);
    const monthMeta = {};
    actualMonths.forEach(m => { monthMeta[m] = MONTH_COLORS[m - 1]; });

    const monthLabels = actualMonths.map(m => `${m}月`);
    const MONTH_RANGE = `${Math.min(...actualMonths)}月 – ${Math.max(...actualMonths)}月`;
    document.getElementById('subtitle').textContent = 'Nickilism';

    // ===== 统计计算 =====
    const totalBooks = books.length;
    const totalPages = books.reduce((sum, b) => sum + (parseInt(b.pages) || 0), 0);

    // 国家统计（只统计非空国家）
    const countryCount = {};
    books.forEach(b => {
      if (b.country) {
        countryCount[b.country] = (countryCount[b.country] || 0) + 1;
      }
    });

    // 每月统计
    const monthCounts = {};
    actualMonths.forEach(m => { monthCounts[m] = 0; });
    books.forEach(b => { if (monthCounts[b.month] !== undefined) monthCounts[b.month]++; });

    // ===== 更新 DOM =====
    document.getElementById('total-books').textContent = totalBooks;
    document.getElementById('total-pages').textContent = totalPages;

    // 计算阅读天数中位数
    const readingDays = books.map(b => {
      const start = new Date(b.start);
      const finish = new Date(b.finish);
      return (finish - start) / (1000 * 60 * 60 * 24);
    }).sort((a, b) => a - b);

    const medianReadingDays = readingDays.length % 2 === 0
      ? (readingDays[readingDays.length/2 - 1] + readingDays[readingDays.length/2]) / 2
      : readingDays[Math.floor(readingDays.length/2)];
    document.getElementById('avg-reading-time').textContent = medianReadingDays.toFixed(1);

    // 渲染国家分布
    const countryGrid = document.getElementById('country-grid');
    Object.entries(countryCount).sort((a, b) => b[1] - a[1]).forEach(([country, count]) => {
      const badge = document.createElement('div');
      badge.className = 'country-badge';
      badge.innerHTML = `<span class="country-flag">${COUNTRY_FLAGS[country] || ''}</span>${country}<span class="country-count">×${count}</span>`;
      countryGrid.appendChild(badge);
    });

    // ===== 星星计算 =====
    function stars(rating) {
      let full, half;
      if (rating >= 9) { full = 5; half = 0; }
      else if (rating >= 8.5) { full = 4; half = 1; }
      else if (rating >= 8.0) { full = 4; half = 0; }
      else if (rating >= 7.5) { full = 3; half = 1; }
      else if (rating >= 7.0) { full = 3; half = 0; }
      else { full = 2; half = 0; }
      const empty = 5 - full - half;
      return '<span class="star-filled">★</span>'.repeat(full) +
             (half ? '<span class="star-half">★</span>' : '') +
             '<span class="star-empty">☆</span>'.repeat(empty);
    }

    // ===== 筛选器 =====
    const filterMap = {
      all: () => true,
      high: b => b.rating >= 8.3,
      normal: b => b.rating > 7.9 && b.rating < 8.3,
      low: b => b.rating <= 7.9,
    };

    const highCount = allBooks.filter(b => b.rating >= 8.3).length;
    const normalCount = allBooks.filter(b => b.rating > 7.9 && b.rating < 8.3).length;
    const lowCount = allBooks.filter(b => b.rating <= 7.9).length;

    const filterBtns = [
      { key: 'all', label: `全部 (${totalBooks})` },
      { key: 'high', label: `🟢 高分 (${highCount})` },
      { key: 'normal', label: `🟡 普通 (${normalCount})` },
      { key: 'low', label: `🔴 低分 (${lowCount})` },
    ];

    // 添加国家筛选按钮
    Object.entries(countryCount).sort((a, b) => b[1] - a[1]).forEach(([country, count]) => {
      filterBtns.push({
        key: `country-${country}`,
        label: `${COUNTRY_FLAGS[country] || ''} ${country} (${count})`
      });
      filterMap[`country-${country}`] = b => b.country === country;
    });

    // 添加月份筛选按钮
    actualMonths.forEach(m => {
      const count = allBooks.filter(b => b.month === m).length;
      filterBtns.push({
        key: `month-${m}`,
        label: `${m}月`
      });
      filterMap[`month-${m}`] = b => b.month === m;
    });

    let currentFilter = 'all';
    let currentSortField = 'finish';
    let currentSortDir = 'desc';
    let booklistOpen = true;

    // ===== 搜索 + 筛选组合逻辑 =====
    function getFilteredBooks() {
      let result = allBooks;
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        result = result.filter(b =>
          (b.title && b.title.toLowerCase().includes(q)) ||
          (b.author && b.author.toLowerCase().includes(q))
        );
      }
      if (currentFilter !== 'all') {
        result = result.filter(filterMap[currentFilter]);
      }
      return result;
    }

    function getSearchOnlyBooks() {
      if (!searchQuery) return allBooks;
      const q = searchQuery.toLowerCase();
      return allBooks.filter(b =>
        (b.title && b.title.toLowerCase().includes(q)) ||
        (b.author && b.author.toLowerCase().includes(q))
      );
    }

    function updateFilterCounts(list) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const key = btn.dataset.filterKey;
        if (!key) return;
        if (key === 'all') {
          btn.textContent = `全部 (${list.length})`;
        } else if (filterMap[key]) {
          btn.textContent = btn.dataset.baseLabel + ` (${list.filter(filterMap[key]).length})`;
        }
      });
    }

    function updateStats(list) {
      const n = list.length;
      document.getElementById('total-books').textContent = n;
      document.getElementById('total-pages').textContent =
        list.reduce((s, b) => s + (parseInt(b.pages) || 0), 0).toLocaleString();
      if (n) {
        const days = list.map(b => {
          const s = new Date(b.start), f = new Date(b.finish);
          return (f - s) / (1000 * 60 * 60 * 24);
        }).sort((a, b) => a - b);
        const median = days.length % 2 === 0
          ? (days[days.length/2 - 1] + days[days.length/2]) / 2
          : days[Math.floor(days.length/2)];
        document.getElementById('avg-reading-time').textContent = median.toFixed(1);
      } else {
        document.getElementById('avg-reading-time').textContent = '0';
      }
      // Country badges
      const cc = {};
      list.forEach(b => { if (b.country) cc[b.country] = (cc[b.country] || 0) + 1; });
      const cg = document.getElementById('country-grid');
      cg.innerHTML = '';
      Object.entries(cc).sort((a, b) => b[1] - a[1]).forEach(([country, count]) => {
        const badge = document.createElement('div');
        badge.className = 'country-badge';
        badge.innerHTML = `<span class="country-flag">${COUNTRY_FLAGS[country] || ''}</span>${country}<span class="country-count">×${count}</span>`;
        cg.appendChild(badge);
      });
      updateFilterCounts(getSearchOnlyBooks());
    }

    function updateChart(list) {
      const counts = {};
      actualMonths.forEach(m => { counts[m] = 0; });
      list.forEach(b => { if (counts[b.month] !== undefined) counts[b.month]++; });
      monthChart.data.datasets[0].data = actualMonths.map(m => counts[m]);
      monthChart.options.scales.y.max = Math.max(Math.max(...actualMonths.map(m => counts[m])) + 1, 4);
      monthChart.update();
    }

    function applySearchAndFilter() {
      const filtered = getFilteredBooks();
      updateStats(filtered);
      updateChart(filtered);
      if (filtered.length > 0) {
        renderWall(filtered);
        renderBooklist(getSortedList(filtered));
        if (booklistOpen) {
          document.getElementById('booklist-content').classList.add('open');
          document.getElementById('booklist-toggle').classList.add('open');
        }
      } else {
        document.getElementById('cover-wall').innerHTML = '<div class="no-results">没有找到匹配的书籍</div>';
        document.getElementById('booklist-content').innerHTML = '<div class="no-results">没有找到匹配的书籍</div>';
        document.getElementById('wall-count').textContent = '0 本';
      }
    }

    // ===== 搜索框事件 =====
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');

    // 从 URL 预填
    const urlParams = new URLSearchParams(window.location.search);
    searchQuery = urlParams.get('search') || '';
    searchInput.value = searchQuery;
    if (searchQuery) searchClear.classList.add('visible');

    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        searchQuery = e.target.value.trim();
        const url = new URL(window.location);
        if (searchQuery) {
          url.searchParams.set('search', searchQuery);
        } else {
          url.searchParams.delete('search');
        }
        history.replaceState(null, '', url);
        searchClear.classList.toggle('visible', !!searchQuery);
        applySearchAndFilter();
      }, 150);
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      searchClear.classList.remove('visible');
      const url = new URL(window.location);
      url.searchParams.delete('search');
      history.replaceState(null, '', url);
      applySearchAndFilter();
      searchInput.focus();
    });

    // ===== 筛选按钮 =====
    const filtersEl = document.getElementById('filters');
    filterBtns.forEach(fb => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (fb.key === 'all' ? ' active' : '');
      btn.textContent = fb.label;
      btn.dataset.filterKey = fb.key;
      btn.dataset.baseLabel = fb.label.replace(/\s*\(\d+\)\s*$/, '');
      btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = fb.key;
        applySearchAndFilter();
      };
      filtersEl.appendChild(btn);
    });

    // ===== 渲染封面墙 =====
    function renderWall(list) {
      document.getElementById('wall-count').textContent = `${list.length} 本`;
      const wallEl = document.getElementById('cover-wall');
      wallEl.innerHTML = '';
      // 按 finish 时间升序排列
      const sorted = getSortedList(list);
      sorted.forEach(b => {
        const item = document.createElement('div');
        item.className = 'cover-item';
        item.innerHTML = `
          <div class="cover-link" onclick="openBookPanel(${allBooks.indexOf(b)})" title="${b.title}">
            <div class="cover-img-wrap">
              <img src="${b.cover}" alt="${b.title}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 150%22><rect fill=%22%23f6f5f4%22 width=%22100%22 height=%22150%22/><text x=%2250%22 y=%2280%22 text-anchor=%22middle%22 fill=%22%23a39e98%22 font-size=%2210%22>${b.title}</text></svg>'">
              <div class="cover-overlay">
                <div class="cover-title">${b.title}</div>
                <div class="cover-author">${b.author}</div>
                <div class="cover-rating">${stars(b.rating)} ${b.rating}</div>
              </div>
            </div>
          </div>`;
        wallEl.appendChild(item);
      });
    }

    // ===== 渲染书单列表 =====
    function renderBooklist(list) {
      const content = document.getElementById('booklist-content');
      content.innerHTML = list.map((b, idx) => {
        const m = monthMeta[b.month];
        let reviewSection = '';
        if (b.review) {
          const needsTruncation = b.review.length > 60;
          const truncatedText = needsTruncation ? b.review.substring(0, 60) + '...' : b.review;
          reviewSection = `
            <div class="book-review" id="review-${idx}" data-full="${encodeURIComponent(b.review)}" data-truncated="${needsTruncation}">
              ${truncatedText.replace(/\n/g, '<br>')}
            </div>
            ${needsTruncation ? `<button class="review-more-btn" onclick="toggleReview(${idx}, this)">展开</button>` : ''}
          `;
        }
        return `<div class="book-row">
          <div class="book-info">
            <div class="book-dates">${b.start}<br>${b.finish}</div>
            <div class="book-title"><a href="${b.doubanLink}" target="_blank" style="color:inherit;text-decoration:none;">${b.title}</a></div>
            <div class="book-author">${b.author}</div>
            <div class="book-meta">
              <span class="month-tag" style="background:${m.bg};color:${m.color}">${m.label}</span>
              <span class="star-rating">${stars(b.rating)}</span>
              <span class="rating-num">${b.rating}</span>
              ${b.pages ? `<span class="pages-tag">${b.pages}页</span>` : ''}
            </div>
            ${reviewSection}
          </div>
        </div>`;
      }).join('');
    }

    function toggleReview(idx, btn) {
      const review = document.getElementById(`review-${idx}`);
      const isCollapsed = btn.textContent === '展开';
      const fullText = decodeURIComponent(review.dataset.full);

      if (isCollapsed) {
        review.innerHTML = fullText.replace(/\n/g, '<br>');
        btn.textContent = '收起';
      } else {
        review.innerHTML = fullText.substring(0, 60) + '...';
        btn.textContent = '展开';
      }
    }

    // ===== 展开/收起书单 =====
    function toggleBooklist() {
      const toggle = document.getElementById('booklist-toggle');
      const content = document.getElementById('booklist-content');
      booklistOpen = !booklistOpen;
      toggle.classList.toggle('open', booklistOpen);
      content.classList.toggle('open', booklistOpen);
    }

    // ===== 排序函数 =====
    function getSortedList(list) {
      const sorted = [...list];
      const dir = currentSortDir === 'desc' ? -1 : 1;
      switch (currentSortField) {
        case 'finish': return sorted.sort((a, b) => a.finish.localeCompare(b.finish) * dir);
        case 'rating': return sorted.sort((a, b) => (a.rating - b.rating) * dir);
        case 'pages': return sorted.sort((a, b) => ((parseInt(a.pages) || 0) - (parseInt(b.pages) || 0)) * dir);
        default: return sorted;
      }
    }

    // ===== 排序按钮事件 =====
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const field = btn.dataset.sort;
        if (currentSortField === field) {
          // 同字段点击 → 切换方向
          currentSortDir = currentSortDir === 'desc' ? 'asc' : 'desc';
        } else {
          // 不同字段 → 切换到该字段，默认降序
          currentSortField = field;
          currentSortDir = 'desc';
        }
        // 更新按钮文字
        const fieldLabels = { finish: '时间', rating: '评分', pages: '页数' };
        document.querySelectorAll('.sort-btn').forEach(b => {
          const f = b.dataset.sort;
          const a = (currentSortField === f) ? currentSortDir : 'desc';
          b.textContent = fieldLabels[f] + (a === 'desc' ? ' ↓' : ' ↑');
          b.classList.toggle('active', currentSortField === f);
        });
        applySearchAndFilter();
      });
    });

    // ===== 图表 =====
    const maxMonthlyCount = Math.max(...actualMonths.map(m => monthCounts[m]));
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const chartTextColor = isDark ? '#9e9a96' : '#615d59';
    const chartGridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.05)';
    const monthChart = new Chart(document.getElementById('monthChart'), {
      type: 'bar',
      data: {
        labels: monthLabels,
        datasets: [{
          label: '本数',
          data: actualMonths.map(m => monthCounts[m]),
          backgroundColor: actualMonths.map(m => MONTH_COLORS[m - 1].bg),
          borderColor: actualMonths.map(m => MONTH_COLORS[m - 1].color),
          borderWidth: 1,
          borderRadius: 6,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
        },
        scales: {
          y: {
            beginAtZero: true,
            max: Math.max(maxMonthlyCount + 1, 4),
            ticks: { stepSize: 1, font: { family: 'Inter', size: 11 }, color: chartTextColor },
            grid: { color: chartGridColor },
            border: { display: false }
          },
          x: {
            ticks: { font: { family: 'Inter', size: 12 }, color: chartTextColor },
            grid: { display: false },
            border: { display: false }
          }
        }
      },
      plugins: [{
        id: 'monthDataLabels',
        afterDatasetsDraw(chart) {
          const { ctx, data, scales } = chart;
          ctx.save();
          ctx.font = '600 11px Inter';
          ctx.fillStyle = chartTextColor;
          ctx.textAlign = 'center';
          data.datasets[0].data.forEach((value, index) => {
            if (value > 0) {
              const x = scales.x.getPixelForValue(index);
              const y = scales.y.getPixelForValue(value) - 6;
              ctx.fillText(value, x, y);
            }
          });
          ctx.restore();
        }
      }]
    });

    // ===== Book Notes Panel =====
    const panelOverlay = document.getElementById('panelOverlay');
    const bookPanel = document.getElementById('bookPanel');
    const panelClose = document.getElementById('panelClose');
    const panelBackBtn = document.getElementById('panelBackBtn');
    const panelHeader = document.getElementById('panelHeader');
    const panelBody = document.getElementById('panelBody');

    function isMobile() {
      return window.innerWidth < 600;
    }

    let panelOpen = false;
    let closingFromPopstate = false;

    function openBookPanel(bookIndex) {
      const b = allBooks[bookIndex];
      if (!b) return;
      const weread = b.wereadId ? wereadData[b.wereadId] : null;
      renderPanelContent(b, weread);
      if (isMobile()) {
        // 移动端：用 history 管理导航，支持左边缘滑动返回
        history.pushState({ panel: true }, '');
      } else {
        // 桌面端：锁定背景滚动
        const scrollY = window.scrollY;
        document.body.style.position = 'fixed';
        document.body.style.top = '-' + scrollY + 'px';
        document.body.style.width = '100%';
        const scrollbarW = window.innerWidth - document.documentElement.clientWidth;
        document.body.style.paddingRight = scrollbarW + 'px';
        document.body.dataset.scrollY = scrollY;
        panelOverlay.classList.add('active');
      }
      bookPanel.classList.add('active');
      panelOpen = true;
      panelBody.scrollTop = 0;
    }

    function closeBookPanel() {
      if (isMobile() && !closingFromPopstate) {
        // 移动端：通过 history.back() 关闭，popstate 会处理动画
        closingFromPopstate = true;
        history.back();
        return;
      }
      bookPanel.classList.remove('active');
      if (!isMobile()) {
        panelOverlay.classList.remove('active');
        // 桌面端：恢复背景滚动
        const scrollY = parseInt(document.body.dataset.scrollY || '0', 10);
        document.body.style.position = '';
        document.body.style.top = '';
        document.body.style.width = '';
        document.body.style.paddingRight = '';
        delete document.body.dataset.scrollY;
        window.scrollTo(0, scrollY);
      }
      panelOpen = false;
      closingFromPopstate = false;
    }

    // 浏览器返回按钮 / 左边缘滑动返回
    window.addEventListener('popstate', (e) => {
      if (panelOpen) {
        closingFromPopstate = true;
        closeBookPanel();
      }
    });

    panelOverlay.addEventListener('click', closeBookPanel);
    panelClose.addEventListener('click', closeBookPanel);
    panelBackBtn.addEventListener('click', closeBookPanel);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && panelOpen) {
        closeBookPanel();
      }
    });

    function renderPanelContent(book, weread) {
      const coverHtml = book.doubanLink
        ? '<a href="' + book.doubanLink + '" target="_blank" style="display:block;flex-shrink:0;"><img class="panel-cover" src="' + book.cover + '" alt="' + book.title + '" onerror="this.style.display=\'none\'"></a>'
        : '<img class="panel-cover" src="' + book.cover + '" alt="' + book.title + '" onerror="this.style.display=\'none\'">';
      panelHeader.innerHTML =
        coverHtml +
        '<div class="panel-book-info">' +
          '<div class="panel-title">' + book.title + '</div>' +
          '<div class="panel-author">' + book.author + '</div>' +
          (weread && weread.rating
            ? '<div class="panel-rating">微信读书推荐值 <span class="panel-rating-score">' +
              (weread.rating / 10).toFixed(1) + '%</span> · ' +
              formatRatingCount(weread.ratingCount) + '人评价</div>'
            : '')
        + '</div>';

      let html = '';

      // 书籍简介（可折叠）
      if (book.summary) {
        const needsCollapse = book.summary.length > 150;
        html += '<div class="panel-section">';
        html += '<div class="panel-summary-toggle" onclick="togglePanelSummary(this)">';
        html += '<span class="panel-section-title" style="margin-bottom:0">书籍简介</span>';
        html += '<span class="panel-summary-arrow">▼</span>';
        html += '</div>';
        html += '<div class="panel-summary-text' + (needsCollapse ? ' collapsed' : '') + '" id="panelSummaryText">' +
          book.summary.replace(/\n/g, '<br>') + '</div>';
        html += '</div>';
      }

      // 全书点评
      if (book.review) {
        html += '<div class="panel-section">';
        html += '<div class="panel-section-title">全书点评</div>';
        html += '<div class="panel-review-card">';
        const needsCollapse = book.review.length > 200;
        html += '<div class="panel-review-text' + (needsCollapse ? ' collapsed' : '') + '" id="panelReviewText">' +
          book.review.replace(/\n/g, '<br>') + '</div>';
        if (needsCollapse) {
          html += '<button class="panel-review-toggle" onclick="togglePanelReview(this)">展开全文</button>';
        }
        html += '</div>';
        html += '</div>';
      }

      if (!weread) {
        if (!book.review && !book.summary) {
          html += '<div class="panel-empty">暂无微信读书笔记</div>';
        }
        panelBody.innerHTML = html;
        return;
      }

      // Tabs
      const hlCount = weread.highlights ? weread.highlights.length : 0;
      const thCount = weread.thoughts ? weread.thoughts.length : 0;
      const popCount = weread.popularHighlights ? weread.popularHighlights.length : 0;

      html += '<div class="panel-tabs">';
      html += '<button class="panel-tab active" data-tab="highlights">划线 (' + hlCount + ')</button>';
      html += '<button class="panel-tab" data-tab="thoughts">想法 (' + thCount + ')</button>';
      html += '<button class="panel-tab" data-tab="popular">热门划线 (' + popCount + ')</button>';
      html += '</div>';

      // Highlights tab
      html += '<div class="panel-tab-content active" data-tab-content="highlights">';
      if (hlCount > 0) {
        weread.highlights.forEach(function(h) {
          html += '<div class="panel-note-item">';
          html += '<div class="panel-note-text">' + escapeHtml(h.text) + '</div>';
          if (h.chapter) html += '<div class="panel-note-chapter">——' + escapeHtml(h.chapter) + '</div>';
          html += '</div>';
        });
      } else {
        html += '<div class="panel-empty">暂无划线</div>';
      }
      html += '</div>';

      // Thoughts tab
      html += '<div class="panel-tab-content" data-tab-content="thoughts">';
      if (thCount > 0) {
        weread.thoughts.forEach(function(t) {
          html += '<div class="panel-note-item">';
          if (t.quote) {
            html += '<div class="panel-quote">' + escapeHtml(t.quote) + '</div>';
          }
          html += '<div class="panel-thought-content">' + escapeHtml(t.text) + '</div>';
          if (t.chapter) html += '<div class="panel-note-chapter">——' + escapeHtml(t.chapter) + '</div>';
          html += '</div>';
        });
      } else {
        html += '<div class="panel-empty">暂无想法</div>';
      }
      html += '</div>';

      // Popular highlights tab
      html += '<div class="panel-tab-content" data-tab-content="popular">';
      if (popCount > 0) {
        weread.popularHighlights.forEach(function(p) {
          html += '<div class="panel-note-item">';
          html += '<div class="panel-note-text">' + escapeHtml(p.text) + '</div>';
          html += '<div class="panel-note-count">' + p.count + '人划线</div>';
          if (p.chapter) html += '<div class="panel-note-chapter">——' + escapeHtml(p.chapter) + '</div>';
          html += '</div>';
        });
      } else {
        html += '<div class="panel-empty">暂无热门划线</div>';
      }
      html += '</div>';

      panelBody.innerHTML = html;

      // Tab click handlers
      panelBody.querySelectorAll('.panel-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
          panelBody.querySelectorAll('.panel-tab').forEach(function(t) { t.classList.remove('active'); });
          panelBody.querySelectorAll('.panel-tab-content').forEach(function(c) { c.classList.remove('active'); });
          tab.classList.add('active');
          panelBody.querySelector('[data-tab-content="' + tab.dataset.tab + '"]').classList.add('active');
          // 切换 tab 后重置滚动位置，防止抖动
          panelBody.scrollTop = 0;
        });
      });
    }

    function togglePanelReview(btn) {
      var textEl = document.getElementById('panelReviewText');
      if (textEl.classList.contains('collapsed')) {
        textEl.classList.remove('collapsed');
        btn.textContent = '收起';
      } else {
        textEl.classList.add('collapsed');
        btn.textContent = '展开全文';
      }
    }

    function togglePanelSummary(toggleEl) {
      var textEl = document.getElementById('panelSummaryText');
      var arrow = toggleEl.querySelector('.panel-summary-arrow');
      if (textEl.classList.contains('collapsed')) {
        textEl.classList.remove('collapsed');
        arrow.textContent = '▲';
      } else {
        textEl.classList.add('collapsed');
        arrow.textContent = '▼';
      }
    }

    function formatRatingCount(count) {
      if (count >= 10000) return (count / 10000).toFixed(1) + '万';
      if (count >= 1000) return (count / 1000).toFixed(1) + 'k';
      return String(count);
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ===== 初始渲染 =====
    applySearchAndFilter();
  </script>
</body>
</html>
