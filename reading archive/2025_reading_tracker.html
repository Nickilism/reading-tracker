    const books = [{"title":"量子力学究竟是什么","author":"万维钢","start":"2025-01-01","finish":"2025-01-11","rating":8.3,"pages":"444","doubanLink":"https://book.douban.com/subject/35632094/","cover":"https://neodb.social/m/item/doubanbook/2024/10/29/a8687ec7-d907-4e6f-8c2a-05741bd456ed.jpg","review":"作为科普书，易读性、流畅性都没问题。看到有评论说读完了还不知道量子力学究竟是什么，那是自然的。所有关于量子力学的科普书，都无法回答量子力学究竟是什么，它最多能引导你更好的提出这个问题。正如费曼所言「谁要是懂得量子力学，那他就是真的不懂量子力学」。","summary":"● 你可能听过不同版本的量子力学讲解，有侧重计算的学院版、讲故事的历史版、可爱的卡通版，还有霸道总裁假装学过版。量子力学已经是一种文化，每个人都可以有自己的体验角度。\n但万维钢老师的这本《量子力学究竟是什么》，无疑是非常另类又令人着迷的一个版本。因为它选择了一个与众不同的角度：\n量子力学的诡秘。\n日常世界里的你，此时此刻不能既在北京又在哈尔滨。但是在微观世界里，电子可以同时出现在所有的地方——它不但能既在这里又在那里，而且能同时沿着好几条不同的路线前进。\n日常世界的桌子上不会突然凭空冒出一个苹果和一个橘子。但是在微观世界里，真空之中，就可以突然凭空冒出一个电子和一个正电子。\n正是因为微观世界的这些“不正常”，才有了日常世界的“正常”。 量子力学是这个世界的底层逻辑，哺育了几乎所有的现代先进科技。\n读完这本书，你可以了解量子力学的前世今生，了解它的发展史上那些星辰一样的人物，了解量子力学的基本概念和前沿理论，比如：全同粒子、波函数、量子隧穿、超距作用、反物质、自旋、EPR佯谬、薛定谔的猫、量子纠缠……\n但你更要了解，这些诡秘之后还藏着更大的秘密。\n有人看到时，粒子才决定自己的状态？光子可以同时走过两条路径？现在能改变过去吗？平行宇宙是否存在？薛定谔的猫到底是死还是活？……通过探索微观世界中的这些不确定性，你将抓住现实世界的确定。\n●“通才”系列图书 献给终身学习的你\n《学习究竟是什么》\n《相对论究竟是什么》\n《博弈论究竟是什么》\n《量子力学究竟是什么》\n《科学思考者》\n……\n·为什么普通人要读量子力学\n万维钢：量子力学是这个世界的底层逻辑，哺育了几乎所有的现代先进科技。……再普通的人也有权知道世界是怎么回事儿。对生活的地方懵然无知的人，但凡有心，就应该感到无助和慌乱。今天意识不到自己的无知，会让未来的自己感到遗憾。量子力学提供了一个令人震惊的答案，我们为那些不知道量子力学的人感到悲哀……\n·为什么要读万维钢讲量子力学？\n前物理学家，现科学作家，4年、4季、40万+ 付费用户“精英日课”主理人\n百万畅销书作家，中国好书、文津图书奖得主\n有趣有料的量子力学发展史，与众不同的切入角度，覆盖基本概念和前沿理论，带你真正读懂量子力学","month":1,"country":"中国"},{"title":"美丽新世界","author":"[英] 阿道司·赫胥黎 (Aldous Huxley)","start":"2024-12-15","finish":"2025-01-26","rating":8.5,"pages":"215","doubanLink":"https://book.douban.com/subject/25838937/","cover":"https://neodb.social/m/book/2021/09/1510ce7aaa-5d1b-482f-a8cf-0e3f4cd50292.jpg","review":"比之被奥威尔的噩梦摧毁，我们的现实世界更可能走向赫胥黎的「美梦」。在这个梦里，没有烦恼，没有痛苦，即使可能的麻烦想法也能被一剂嗦麻解决，这是喜欢「蓝色」药丸的人天堂。但这种没有痛苦，并不是痛苦本身被治愈了，而是感受痛苦的能力被剥夺了，个体的消极自由被剥夺，最终导向了极权主义。刚好这几天在看《汉娜阿伦特与以赛亚柏林》，书中关于柏林的两种自由介绍映射上了。\n\n野蛮人要捍卫的是他的消极自由，免于外接干涉的自由。而积极自由则是实现自我主导的自由，但积极自由的鼓吹者可能会将自我分为寻求欲望满足的低级自我和寻求价值实现的高级自我。通过否定低级自我，外部权威（如国家、领袖）声称其代表“真实自我”，强制个体服某种更高目标。即统治者以解放人民或实现真正自由为名，剥夺个人的选择权，从而导致极权主义政权。","summary":"公元26世纪，在一个“新世界”里，近乎所有人都住在城市，并说着同一种语言。这些人在出生之前，就被预设成为贵、低、贱几种种姓，于工业化的育婴房里成批生产。在乌托邦集权主义者的统治下，新社会“安定、本分、稳定”，偶有对现状产生怀疑或叛逆心态者，均被视为不安定因素放逐到边远地 区。\n在那里，人人安居乐业、衣食无忧，但家庭，个性，甚至喜怒哀乐却消失殆尽……\n著名学者作家刘瑜作序推荐\n全新译本，更符合原文、文笔更流畅\n本书封面使用2013年，英国《美丽新世界》插画大赛，优胜奖获得者Nathalie Moore的独家授权","month":1,"country":"英国","wereadId":"841414"},{"title":"汉娜·阿伦特与以赛亚·伯林","author":"[日] 蛭田圭（Kei Hiruta）","start":"2025-01-12","finish":"2025-02-03","rating":8.3,"pages":"480","doubanLink":"https://book.douban.com/subject/36956912/","cover":"https://neodb.social/m/item/doubanbook/2024/09/25/5e0cbbaa-09fd-4d9a-9496-7c9e3e15cf26.jpg","review":"在《忽左忽右》播客听到这本书的消息，借着对柏林和阿伦特的兴趣借来阅读。是一本严谨考究、详细论述的著作，但自己学力有限，不少内容仍然囫囵读完。","summary":"本书首次全面介绍了20世纪两位最重要的思想家之间的冲突，以及他们的深刻分歧如何继续为政治理论和哲学提供重要的经验教训。\n汉娜·阿伦特（1906—1975）和以赛亚·伯林（1909—1997）是20世纪最具代表性的两位思想家，他们在政治、历史和哲学的核心问题上存在根本性的分歧。尽管他们作为犹太移民知识分子的生活和经历有重叠之处，但伯林非常不喜欢阿伦特，说她代表了“我最厌恶的一切”，阿伦特则以冷漠和怀疑的态度回对伯林的敌意。《汉娜·阿伦特与以赛亚·伯林》以生动的风格写成，充满了戏剧性、悲剧性和激情，首次讲述了这两位杰出人物之间充满矛盾的关系，并展示了他们截然不同的观点如何继续为今天的政治思想提供重要教训。利用大量新的档案材料，蛭田圭追溯了阿伦特和伯林的冲突，从他们在战时纽约的第一次见面，到他们在20世纪50年代不断扩大的思想鸿沟，对阿伦特1963年出版的《艾希曼在耶路撒冷》的争议，他们在1967年的会议上最终错过彼此接触的机会，以及伯林在阿伦特死后对她的持续敌意。蛭田圭将政治哲学和思想史融为一体，研究了同时将阿伦特和伯林联系在一起并造成分裂的关键问题，包括极权主义的性质、邪恶和大屠杀、人类主体和道德责任、犹太复国主义、美国民主、英国帝国主义和匈牙利革命。但是，最重要的是，阿伦特与伯林在一个关乎人的条件的核心问题上存在分歧：自由意味着什么？\n【编辑推荐】\n1.\t同样是犹太裔，同样都是客居他乡，为何伯林对阿伦特有着“终生的仇恨”？ 谁憎恨谁，为什么？有很多很好的细节；蛭田圭非常详尽地记录了伯林和阿伦特的冲突。\n2.\t蛭田圭本书的目的是理解这两位思想家的冲突——从专业、人格、政治几个角度理解——并阐述他们各自的政治理论方法存在的一些差异。书的调子是周密而平静的；书写之清晰令人佩服；蛭田无疑提供了一个公正而详细的年表，梳理了阿伦特/伯林的相遇以及伯林的各种敌意表现。\n3.\t蛭田圭本书还考察了伯林和阿伦特各自选择的国家跟他们思考的关系，这个视角很有意思。\n4.     随书附赠汉娜·阿伦特或以赛亚·柏林肖像藏书票一张，即两种随机发一种。\n【名家推荐】\n蛭田圭在这本书中以平衡而又深刻的笔触描绘了两位开创性的思想家，他们都是犹太人，都是极权主义的反对者，他们本应彼此钦佩，却被一种敌意分裂，这种敌意暴露了20世纪德国哲学和英美哲学之间以及进步和自由传统之间的断层。\n——迈克尔·伊格纳季耶夫 加拿大历史学家、《伯林传》作者\n蛭田圭在这本大著中做出了一项非常了不起的成就，他将思想史和政治理论相结合，重新构建了汉娜·阿伦特和以赛亚·伯林的相遇，在讲述两位主人公苦涩的互动经历的同时，提炼了他们关于人性、自由和极权主义的一般理论主张。出色的构思和行文，使这本书成为跨领域研究的天赋之作。\n——萨缪尔·莫恩  耶鲁大学历史系教授\n这是第一本专门致力于阿伦特和伯林相遇细节的著作，它平衡而有见地，澄清了伯林对阿伦特强烈反感的历史之谜；成功穿越了艾希曼之争的险滩，探讨了伯林和阿伦特对帝国主义和他们各自第二祖国的看法。\n——塞拉·本哈比  耶鲁大学尤金·麦耶政治学与哲学教授\n这本重要且文笔优美的书以阿伦特与伯林的个人和理论冲突为中心，将历史背景与现代政治理论中的问题融为一体。它优美的风格和语言，适合任何对阿伦特、伯林或冷战思想背景感兴趣的人阅读。\n——克里斯蒂安·J. 埃姆登  莱斯大学人文学院政治思想史教授\n一部杰作，它阐明了现代政治思想的两位代表人物之间的棘手关系。蛭田圭以一流外科医生的精准和优秀小说家的雄辩，剖析两位犹太流亡者和自由捍卫者如何以相互冲突的方式对他们所处的灾难性时代做出了回应。他还细致入微地探究了两位主人公彼此的怨恨（伯林）和冷淡（阿伦特）。这部引人入胜的作品调动了思想史和政治理论的研究方法��取得了出色的效果。\n——琼·考克 曼荷莲学院政治学名誉教授","month":2,"country":"日本","wereadId":"3004237695"},{"title":"恶女的告白","author":"[日] 叶真中显","start":"2025-02-03","finish":"2025-02-14","rating":8.4,"pages":"296","doubanLink":"https://book.douban.com/subject/36743030/","cover":"https://neodb.social/m/item/doubanbook/2024/08/19/ee2d7325-6db1-45e5-acde-06368f932143.jpg","review":"非常棒的故事","summary":"1 日本社会派推理大师叶真中显新作\n日本推理作家协会奖、《这本推理小说了不起》大奖、《周刊文春》年度推理小说榜、日本推理文学大奖新人奖、渡边淳一文学奖、吉川英治文学新人奖、书店大奖、大薮春彦奖获得者新作。\n2 时隔十年，《绝叫》后，再写“恶女”的复仇与重生\n这部作品以“性别歧视”“性暴力”为主题。不客气地说，现在的日本社会是为男性而创造的， 即所谓的“男权社会”。我本身就是男权既得利益者，无法置身事外。我想通过这部作品，重新审视这样的社会。——叶真中显\n3 本作、作中作、作中作中作层层反转\n不杀了他们，我就会被他们杀死\n知晓一切的你，愿意成为我的共犯吗？\n“太郎涨大的生殖器上有无数烫痕。之前的饲主用的是火烧，那我就试着把它切了吧。”\n七年前文学编辑梨帆收到了一篇叫做《养狗》的投稿，小说充斥着残暴的施虐倾向和对男性的嫌恶。作品被评为“重口味、贬低男性”而没有出版，作者也从此销声匿迹。\n七年后，梨帆收到了当年那位神秘作家的第二篇投稿，故事从两位学生时代的老友重逢开始，立场不同的两人在对话产生了分歧，杀意越来越强烈。\n“干脆杀了这个女人吧。”\n随着剧情的推移梨帆惊奇地在小说主人公身上看到了自己的影子，更可怕的是，这部小说好像还和七年前那篇暴戾的《养狗》有着千丝万缕的联系……\n读者评论精选：\n一种始终迷糊重重的感觉，一部虚构的小说，作为作中作，形成了故事的开端。它同时也孕育着一种悍强的力量，读者关心今后故事如何，忍不住往下读。小说包含了性别歧视、性别差异、厌恶男性等内容，完全不是看了开头能想象得到的故事展开。\n感觉心神完全被吸引的一次读书体验。\n在阅读了书店纷发的文章开头试读后，因为很在意而买了下来。作品中作中作的分量比我想象的要大，和主人公的人生奇妙地同步着，到了最后仿佛被覆盖了一样的存在感，一种梦幻般的、有点混乱的感觉。这种不可思议的感觉，希望其他读者也一定要体验一下。我想没有人的人生是没有后悔和迷茫的，也有过去的选择，让人想责怪是到底谁的错。希望有更多人意识到，即使现在不能完全挽回，自己也能把握住自己人生的缰绳。\n过去我读过叶真中显先生写的3部小说，感觉和以前有些不一样，我很惊讶，但我由衷地觉得读了真好。根据读者的年龄和经验，也许会有难以理解的地方，但至少对于“正在度过下午的女性”来说，会有让人欲哭无泪的迫切感。我也是其中之一。对多惠和梨帆的某种共犯般的感情，连带着吞噬了我，将我救了出来。","month":2,"country":"日本","wereadId":"CB_6CY48Y48Y1ZY6ts6sx9xA14Z"},{"title":"与古为徒和娟娟发屋","author":"白谦慎","start":"2025-02-05","finish":"2025-02-19","rating":8.5,"pages":"307","doubanLink":"https://book.douban.com/subject/26808220/","cover":"https://neodb.social/m/book/2021/09/1784269faa-3b22-48f8-8a05-e5ff844f0d48.jpg","review":"机缘巧合遇到这个书名，因书名产生兴趣去图书馆借来阅读，果然是一本有意思的书。认识了\"平民书法\"\"不规整、有意趣\"，也读到当代书法与古为徒却瞧不起\"娟娟发屋\"的逻辑矛盾，尤其喜欢第十二章的小故事。","summary":"本书关心的中心问题是：什么是书法的经典？一种本不属于经典的文字书写在何种情况下才有可能成为书法的经典？《与古为徒》是吴昌硕为波士顿艺术博物馆题写的一块匾，《娟娟发屋》是重庆一个理发店的招牌。白谦慎教授借这两幅作品，思考书法的本质问题。自从清代碑学兴起以来，书法的经典体 系受到了极大的冲击，一些相当稚拙、不成熟的石刻和书写遗迹被作为临习的典范。但为什么有些书法家把古代 “穷乡儿女” 的字迹奉为圭臬，对当下类似的书写却不闻不问？我们究竟以什么来界定“书法”？又如何看待书法中的“经典”？这些问题并不复杂，但却涉及许多社会文化的层面。比如，古与今的关系，名家书法与无名氏书刻的关系，财富与收藏的关系，学术与艺术的关系，艺术与社会体制的关系，平民与精英的关系，经典化和修辞策略的关系等等。本书通过描述和分析古今书法中的一些现象，对上述问题进行了探讨。","month":2,"country":"中国","wereadId":"29348719"},{"title":"娱乐至死","author":"[美] 尼尔·波兹曼","start":"2025-02-20","finish":"2025-03-04","rating":8.4,"pages":"224","doubanLink":"https://book.douban.com/subject/26319730/","cover":"https://neodb.social/m/book/2021/09/15d3bdd344-1f6d-4b3b-bf17-0a223443f50a.jpg","review":"作为一本40年前首版的书，它的问题意识无疑是有前瞻性的，全书重点以铅字向电视转变为例探讨关于媒介变化带来的认知范式转变。电视作为早起的娱乐媒介，就能被作者鞭辟入里的认识其潜在的影响，不得不佩服。有意思的是，1984年的作者，在书中多次提及他更认同赫胥黎式的极权主义未来观，而非奥威尔的《1984》。刚好前段时间我也读了《美丽新世界》，深以为然。在如今这个泛娱乐化的时代，比之书中，我们更是多了社交媒体、算法推荐加持的小视频、公众号，再辅以最新的AI生成式文本，「娱乐至死」诚不我欺。\n\nAI优化表达:\n\n在智性解构与时代互文的双重视域下，这部四十年前首版的思想著作（1985）依然迸发着令人震颤的预见性锋芒。作者以印刷文明向电子媒介的范式迁移为解剖样本，在铅字与电视的光影断层中，敏锐捕捉到媒介形态对集体认知结构的重构机制——这种将媒介技术置于人类精神史坐标系的研究进路，在今日数字原住民世代愈发显现出预言书般的启示意义。\n\n尤其值得关注的是，作者在剖析电视这一\"早期娱乐媒介\"时，已然穿透其表象的声光娱乐性，直指其作为认知殖民工具的深层异化逻辑：当信息传播从线性逻辑的铅字跃迁至碎片拼贴的视听符号，人类理性思辨的神经突触正在经历不可逆的退化。这种对娱乐媒介的哲学诊断，在算法推荐与生成式AI构筑的\"超拟真景观社会\"中愈发显现出惊人的解释力。\n\n更具思想史价值的是，作者在冷战意识形态对峙的1984年，选择与赫胥黎《美丽新世界》的柔性极权预言形成精神共振，而非沉溺于奥威尔式赤裸压迫的想象。这种对文化麻醉剂替代政治镣铐的忧思，恰与当下短视频矩阵、社交媒介茧房构成的\"数字多巴胺帝国\"形成残酷的镜像对照——我们正集体陷入比赫胥黎预言的感官乌托邦更精妙的认知囚笼：在GPT生成的文本迷宫里，在垂直领域的信息竖井中，在无限滚动的信息流瀑布下，娱乐至死的谶语已演变为具象化的生存境遇。\n\n这部智性遗产的当代价值，恰在于其构建的媒介批判范式具有自我生长的理论弹性。当我们用其方法论审视TikTok的算法黑箱、Meta的虚拟现实帝国乃至Stable Diffusion创造的拟像狂欢，那些关于注意力经济、认知降维与集体无意识的警告，依然在数字文明的肌理上灼烧出思想的烙印。在媒介即隐喻的永恒命题下，这部著作不仅是诊断过去的病理切片，更是照亮未来认知战争的启示录。","summary":"内容简介：\n有两种方法可以让文化精神枯萎，一种是奥威尔式的——文化成为一个监狱，另一种是赫胥黎式的——文化成为一场滑稽戏。\n——尼尔·波兹曼\n《娱乐至死》初版于1985年，是尼尔·波兹曼的代表作之一。\n电视时代蒸蒸日上，电视改变了公众话语的内容和意义，政治、宗教、教育、体育、商业和任何其他公共领域的内容，都日渐以娱乐的方式出现，并成为一种文化精神，而人类无声无息地成为娱乐的附庸，毫无怨言，甚至心甘 情愿，其结果是我们成了一个娱乐至死的物种。\n乔治·奥威尔曾在《一九八四》中预言人类将会遭受外来压迫，失去自由；赫胥黎则在《美丽新世界》中表达了另一种忧虑：人们会渐渐爱上工业技术带来的娱乐和文化，不再思考。\n《娱乐至死》想告大家可能成为现实的，是赫胥黎的预言，不是奥威尔的预言；毁掉我们的，不是我们憎恨的东西，恰恰是我们热爱的东西！\n----------------------------------------------------\n编辑推荐：\n媒介文化研究大师尼尔·波兹曼20年经典畅销作品\n通过电视和网络媒介\n一切都以娱乐的方式呈现\n人类心甘情愿成为娱乐的附庸\n最终成为娱乐至死的物种\n我们将毁于我们所热爱的东西！\n——尼尔·波兹曼\n----------------------------------------------------\n媒体及专家评论：\n赫胥黎的《美丽新世界》和奥威尔的《一九八四》在书中的交互作用俯拾即是。《娱乐至死》是一本优秀的、令人不安的、引发思考的书，而且我敢说，它是一本必读书。它配得上经典的地位，尽管过了20年，但它比任何书都贴近时下。\n——蒂姆•查理斯（Tim Challies，Discerningreader.com）\n《娱乐至死》在帮助我们看清（电视）屏幕里到底在发生些什么，在这一点上，它是最优秀的。那种画面，即便没有“文化灭亡”的末日预言，也足够阴郁了。\n——沃尔特·古德曼（Walter Goodman，《纽约时报》）\n娱乐时代的当头一棒，尼尔·波兹曼的深刻预见。\n我们今天已经处在波兹曼描述的世界里，处在一个信息和行动比严重失调的时代，在空前便利的电子传媒时代，我们比任何时候都聪明，也比任何时候都轻飘。《娱乐至死》的预言指向了我们今天的现实。\n——陈丹青\n波兹曼在媒体研究领域是一位巨人，地位仅次于马歇尔·麦克卢汉。\n——安吉拉·佩妮，《抨击杂志》\n波兹曼极具说服力地调动了心理学、历史学、语义学、麦克卢汉理论以及常识，阐述了一个触目惊心且颇具独创性的论题。\n——维克托·纳瓦斯基，哥伦比亚大学教授\n波兹曼在麦克卢汉结束的地方开始，他用学者的渊博与说书人的机智构筑他的见解。\n——《基督教科学箴言报》\n尼尔·波兹曼的逝世给公共话语带来了某些寂静。一位博学的批评者，一位严谨的反对者，一位跟奔涌的发展唱反调的人，沉默了。回顾他令人惊叹的事业，你会发现他所做的每一件事的核心都是一连串问题……他希望你去思考，字母表是如何改变了口语文化的，印刷媒体给宗教造成了什么样的影响，教育是如何创造了童年的，为何对标准的测试意味着对学校系统的激进反思。\n——彼得·卡瓦纳，《环球邮报》\n作家、媒体批评家尼尔 ·波兹曼的去世并未得到应有的（新闻媒体的）重视。但这一点也没有让波兹曼吃惊。我们时代媒体批评领域最伟大的书之一《娱乐至死》是他写的……波兹曼比任何人都了解，电视无可挽回地改变了辩论的本质，娱乐如今在政界占至高地位。\n——吉姆·本宁，alternet.org\n尼尔·波兹曼是一位传承伟大纽约传统的不可思议的讲述者……正如他说的故事一样，尼尔·波兹曼投入了一生来让我们停下来……他是一个和蔼谦恭的人，他绝对不会说，“我早就告诉过你了”。但是他的确告诉过我们，一次又一次地，直至肺癌让他永远消声。\n——约翰·齐默尔曼，《纽约邮报》\n我时常想起萧伯纳著名的诗句，理智的人适应环境，而世上所有的进步都依靠不理智的人。马歇尔·麦克卢汉是不理智的，兰斯是不理智的，尼尔也是不理智的。因为这样，所有美好的事才发生了。\n——保罗·莱文森，美国作家、福特汉姆大学教授\n波兹曼是一个多产的作家，他在约二十本书和众多的采访和文章中展现了他的思想和他的优雅。这些作品都值得阅读和深入思考，有意或无意间你会将你读到的说给他人听。波兹曼是看穿了皇帝新衣的孩子，后来他长成了擅长表达的义愤填膺的教育者和社会消费者。\n——迈克尔·寇姆夫，《学院季刊》\n波兹曼的每本书都是一本小册子，一本装了封皮的随笔：《童年的消逝》讽刺美国文化的幼稚化；《娱乐至死》讽刺娱乐业，以及娱乐业对观众造成的影响……他的知识分子姿态，他在公众环境中的表现，以及他伟大的天赋——极好的幽默，实质是一个开化人类在一个野蛮世纪进行的尝试，之后成了一个开化人在电视文化中的尝试。\n——杰伊·罗森，纽约大学教授\n在波兹曼的书中，隐喻的作用一次又一次地得到体现。我们设立“尼尔 ·波兹曼隐喻奖”有两个目的：奖励一位纯熟使用隐喻的有天分的作者；纪念并推广波兹曼的作品，以及印刷思想。\n——锐透基金会\n一本有才华、有力量、有分量的书。这是波兹曼抛出的严厉的控诉书，就我看来，他让人无法反驳。\n——乔纳森·亚德利， 《华盛顿邮报》\n有些书是每个人都应该读而事实上很少有人去读的。尼尔·波兹曼的《娱乐至死》就是其中之一。他对于娱乐时代对公共话语质量的毁灭性作用的分析提供了非同寻常的锐利洞见，这种洞见深入了到技术塑形思想与文化的方式，以及随之而来的社会各方各面的琐碎化。\n——“潮起潮落”\n出版于 1985年的《娱乐至死》是一本令人振奋的充满争议的书，它审视了电视对我们生活——更具体地说，是政治、文化和精神生活的——害处……本书有太多值得推荐的地方。它引发了许多思考，更让我们看到，电视是如何以某些方式侵蚀我们的公共话语甚至我们关于美好生活的整体概念的。\n——谢默斯·斯威尼，social affairs unit.org\n它是声讨电视文化的檄文：难道我们要把自己娱乐死？这一声喝问绝非危言耸听，我深信它是我们必须认真听取的警告。\n——周国平\n也许，文化拯救的希望就在于人类不断的自我反省之中，在于认真聆听波兹曼式的警世危言之中。\n——刘擎\n《娱乐至死》提出了一个很重要的观点，就是一个国家是在什么样的媒体占据主导地位的时代进入现代化的，这对整个社会的影响是很大的。\n——展江","month":3,"country":"美国","wereadId":"855833"},{"title":"人类简史","author":"[以色列] 尤瓦尔·赫拉利","start":"2025-02-17","finish":"2025-03-19","rating":8.5,"pages":"440","doubanLink":"https://book.douban.com/subject/25985021/","cover":"https://neodb.social/m/book/2021/09/1529d11838-57d9-47f3-9b63-989295154902.jpg","review":"有意思的阅读，门槛不高，涉及面广，认知革命部分的收获比较大，打算给孩子也读读。","summary":"十万年前，地球上至少有六种不同的人\n但今日，世界舞台为什么只剩下了我们自己？\n从只能啃食虎狼吃剩的残骨的猿人，到跃居食物链顶端的智人，\n从雪维洞穴壁上的原始人手印，到阿姆斯壮踩上月球的脚印，\n从认知革命、农业革命，到科学革命、生物科技革命，\n我们如何登上世界舞台成为万物之灵的？\n从公元前1776年的《汉摩拉比法典》，到1776年的美国独立宣言，\n从帝国主义、资本主义，到自由主义、消费主义，\n从兽欲，到物欲，从兽性、人性，到神性，\n我们了解自己吗？我们过得更快乐吗？\n我们究竟希望自己得到什么、变成什么？\n------------------------------------------------------------------------------------------------\n【编辑推荐】\n1、由书改变而成的人类简史课程风靡全球，成为希伯来大学最受欢迎课程 Coursera最受欢迎课程 ，mooc最受欢迎课程。学界和大众都一致认可，戴蒙德推荐。\n2、一大开创性：打通文字发明前后历史的界限。\n文字发明之前的年代，是生物学家、考古学家的专长；文字发明之后的年代，是历史学家、政治学家和经济学家的专长；\n许多著名史家的作品，欠缺遗传学或生态学的视野，如何让这两大段历史之间没有断层，能够有一以贯之的宏观解读？\n本书不同于《枪炮、病菌与钢铁》从生物与环境的角度看人类社会的发展，也不同于麦克尼尔的《世界史》以文明为单位绘制的人类文明交织的世界。 他笔下的历史，在科学中有深沉的人文关怀。\n3、填补传统人类史的三大鸿沟：\n历史观与哲学观之间的鸿沟（提供有史实根据的深刻哲学思考）；人类和生态系统之间的鸿沟（作者多从生态来思考，而不是只讲人类的利益）；集体和个人之间的鸿沟（检视历史事件如何影响到当时一般人的生活）。\n4、四大部分描述人类大历史：\n7万年前的大脑认知革命（有能力谈八卦，想象不存在的事物，让陌生人开始合作、建立组织）\n1.2万年前的农业革命（让我们渴求更多、生产更多，分工分职愈趋细腻）、\n500年前的科学革命（带来快速进步，让我们拥有上帝的力量，也带来毁灭）\n全球大一统、人类大融合的关键因素——金钱、帝国、宗教\n5、一部个人幸福探索之书。\n用通俗的语言和新鲜的视角，将个体的幸福放在人类发展的过程中审视，不再错过历史中最关键、最有意思的部分。涵盖了生物学，人类学，哲学，心理学，艺术，文学，伦理学等众多领域。涉及幸福，生命的意义等众多话题，有人说这是一部个人幸福探索之书。\n6、一部“瘦身版”人类简史。\n如果说给我一本书，不到五百页，没有一堆令人晕头转向的年份、人名、地名、称号，就能涵盖了人类如何崛起、影响现代生活甚巨的资本主义、一神教、自由人文主义、基因工程如何兴盛的人类历史重大脉络……这是仅有的一部！\n7、一部引发多国版权大战的神秘大书。\n获得波兰斯基人文学科创造力与独创性奖。 100周蝉联以色列畅销书排行榜第一，在英国，9家出版商疯狂竞价。 23个国家竞相购买版权。台湾上市一周，金石堂、诚品历史类畅销书榜第一 ，诚品总榜第八，西班牙上市两周总榜第一。\n------------------------------------------------------------------------------------------------\n【内容简介】\n《人类简史：从动物到上帝》是以色列新锐历史学家的一部重磅作品。从十万年前有生命迹象开始到21世纪资本、科技交织的人类发展史。十万年前，地球上至少有六个人种，为何今天却只剩下了我们自己？我们曾经只是非洲角落一个毫不起眼的族群，对地球上生态的影响力和萤火虫、猩猩或者水母相差无几。为何我们能登上生物链的顶端，最终成为地球的主宰？\n从认知革命、农业革命到科学革命，我们真的了解自己吗？我们过得更加快乐吗？我们知道金钱和宗教从何而来，为何产生吗？人类创建的帝国为何一个个衰亡又兴起？为什么地球上几乎每一个社会都有男尊女卑的观念？为何一神教成为最为广泛接受的宗教？科学和资本主义如何成为现代社会最重要的信条？理清影响人类发展的重大脉络，挖掘人类文化、宗教、法律、国家、信贷等产生的根源。这是一部宏大的人类简史，更见微知著、以小写大，让人类重新审视自己。\n------------------------------------------------------------------------------------------------\n【各界评论】\n《人类简史：从动物到上帝》为什么能够在国际畅销书榜上爆冲？原因很简单，它处理的是历史的大问题、现代世界的大问题，而且，它的写作风格是刻骨铭心的生动。你会爱上它！\n——普利策奖得主  《枪炮、病菌与钢铁》作者戴蒙德\n这是此类大历史中最好的一本：规模宏大但绝非泛泛而谈；具有时代性又不花哨，观念惊世骇俗但绝不是个简单的反对者。每个人都能在书里找到一部分和另外的人开始讨论，但是弄清楚是哪部分、为什么，对我们都有好处。\n——牛津大学历史学院院长 斯蒂文·刚尼\n我拿起这本《人类简史》立刻“着道”了——拿起了就放不下，几乎一口气读完。吸引力主要来自作者才思的旷达敏捷，还有译者文笔的生动晓畅，而书中屡屡提及中国的相关史实，也能让人感到一种说不出的亲切，好像自己也被融入其中，读来欲罢不能。\n——北京大学历史系教授 高毅\n《人类简史》的目的不是传授人类考古学的所有研究成果，而是提供一种看历史的视角，一种全局的观点。当你不再执着于科学、政治或宗教等某一个领域的发展过程，而是关注人类社会的整体演变，观察这些领域之间的相互作用，你会感到你脑海中零碎的历史知识忽然像拼图一样各就各位，构成一幅宏大的图景，这样的视角非常新鲜。\n——果壳网 姬十三\n读完这本书，有一种跟着人类一同走过十万年的感觉！\n——读者\n这本书如果要用“宏伟史诗”来形容一点也不过分，其中包含了很多学科的内容，例如考古学、生物学、物理学、经济学、宗教、社会学甚至计算机科学等等。书里里面的大部分观点都是从不同的角度进行介绍，其中很多都是经无数人严格验证过的，讲师很多时候仅仅是通过自己的表达希望尽量客观地介绍一些内容，至于每个人怎么理解并没有统一的标准了。\n——读者\n超级好的课程，付费都坚持下来了，观点独特，从来没想到能从这个角度理解我们人类自己。\n——读者","month":3,"country":"以色列","wereadId":"635800"},{"title":"语言与沉默","author":"[美] 乔治·斯坦纳","start":"2025-03-05","finish":"2025-03-24","rating":7.5,"pages":"446","doubanLink":"https://book.douban.com/subject/25751763/","cover":"https://neodb.social/m/book/2021/09/1518c1323d-27b3-4a6b-b4ef-b509f32df4a9.jpg","review":"对我而言有太多书名号和作家出现在书中，读得昏昏沉沉，只好「沉默」","summary":"◆当今文学世界最伟大的心灵，当代人文主义批评大师  乔治•斯坦纳经典代表作\n◆最彻骨的现代启示录，最宏阔的人文主义襟怀\n本书的主题——对政治暴行的深入反思——极具当代性\n对文学的梳理兼具历史感与现实关怀\n可谓能指引我们重识自身与时代的经典作品\n◆著名学者李欧梵倾情作序推荐\n本书是乔治•斯坦纳的代表作，也是20世纪西方人文批评的经典著作。其核心议题是语言、文学批评与人道主义（及反人道主义）。其辑录的文章写于不同时期，但都共有一个根本的主题——语言的生命。在斯坦纳看来，语言是文化的代表。而现代西方的几股非人道主义逆流（尤其是纳粹）导致了语言文化的滥用与污染，使西方文学的创作陷入“沉默”。因此，在经历了种种浩劫之后，语言及其相关的现实世界究竟该何去何从？批评家与知识分子在这一过程中又该担当何种责任？","month":3,"country":"美国","wereadId":"CB_9z07eU7cU8Vc6uW6sxAmW53I"},{"title":"幸福假面","author":"[英] 阿加莎·克里斯蒂","start":"2025-03-19","finish":"2025-03-31","rating":8.5,"pages":"226","doubanLink":"https://neodb.social/book/7NwL1hiqsMqBfnAQmCd6x7","cover":"https://neodb.social/m/book/2021/09/18822e714e-fd83-4c07-9285-70a8913143b9.jpg","review":"这个世界上发生的诸多问题其实在3000年古希腊的德尔斐神庙的铭文上就能找到答案——认识你自己。本书就是主人——家庭女主人琼在一次意外旅途被困时重新认识自己，揭穿幸福假面的经历。然而，琼的觉醒如同电流涌动时的短暂闪现，她没有勇气去改变一切。","summary":"琼是个彻底务实的人，从小只想过安稳的日子；她挑有前途的律师结婚、阻止丈夫追求田园生活，也要求三个孩子都依她的价值观去做人生规划。一次探望小女儿的返程途中，火车因雨季路断而停开，她受困沙漠中的一个小站，每天只能在附近沙丘散步，走着走着，她开始面对自己，一件件以往刻意忽略的“小事”这时都不请自来……\n本书初版于1944年，是阿加莎·克里斯蒂一生最满意的作品之一。她藉本书满足了一个对自我的提问：我是谁？我“真正”是个什么样的人？我所爱的人对我有何想法？他们对我的想法是否如我所想？过程峰回路转，真实而残酷。","month":3,"country":"英国","wereadId":"935491"},{"title":"新参者","author":"[日] 东野圭吾","start":"2025-04-01","finish":"2025-04-11","rating":8.3,"pages":"264","doubanLink":"https://book.douban.com/subject/26639966/","cover":"https://neodb.social/m/book/2021/09/153fa1998e-d926-48cb-abfa-3767e8b99a99.jpg","review":"非常有烟火气的一本推理小说。","summary":"【新参者】新加入、刚到来的人。\n东京，日本桥。一个单身女人在公寓内被勒死。警方发现她最近刚搬到这里居住。\n负责调查的是也刚调到日本桥地区的刑警加贺。仙贝店、高级料亭、陶瓷器店、钟表店、民间艺术品店，加贺走访案发地附近一家家店铺。他的调查看上去琐碎又与案情无关：通勤轨迹不 同于往常的保险员、替老板给情人买人形烧的料亭小伙计、关系不睦的陶瓷器店婆媳、因女儿私奔而断绝父女关系的钟表店老板……\n案件真相就在充满人间烟火的家长里短中逐渐显露。\n================================================================\n这是一个靠逻辑破不了的案子，情才可以！\n一部让人读后热泪盈眶的推理小说\n在这本推理小说里，推理不是重点，而是要找出人们各种行为的原因；找到凶手也不是最终目的，而是要彻查案件的原因，否则就不能真正救赎。\n《周刊文春》推理榜年度第1名     “这本推理小说了不起！”年度第1名\n这是一部随着事件的解决，心灵不断得到温暖的作品。——新垣结衣","month":4,"country":"日本","wereadId":"840704"},{"title":"天朝的崩溃","author":"茅海建","start":"2025-04-13","finish":"2025-04-20","rating":8.5,"pages":"592","doubanLink":"https://book.douban.com/subject/25935941/","cover":"https://neodb.social/m/book/2021/09/16e81b667b-234b-47d5-b257-270748035c71.jpg","review":"扎实、翔实、真诚的一部作品","summary":"本书大量使用中国第一历史档案馆所藏清朝奏折，和英国所藏中英交涉文件、日本学者汇编资料集等等，详尽考订并重建了与战争相关的大量基本史实。作者抓住几个主要人物为线索展开叙述。从武器装备、防御工事、兵员训练到作战战术的运用；从后勤、兵力动员、兵员调动到军费的来源、筹集与分配，更涉及交战国可用于战争的经济实力、负责运筹帷幄人员的心态、他们的战争观(从文化层面言)、战术观(从军事角度言)等等。这些面相在过去的鸦片战争研究中或被忽视，或语焉不详，但在本书中却得到充分的展现。\n鸦片战争在中国近代史上的影响重大，也是中国百年国耻的开端，给中华民族带来巨大的精神创伤，本书对当时的人和事的评价，均从事实认定来加以判断，尤其严肃检讨清朝奏折中呈现的天朝心态，直指中国战败的深层原因。该书展现的严谨论证破除过去误谬之学术性，以及避免再蹈历史错误覆辙之强烈爱国情怀，令人读之震撼动容。\n《天朝的崩溃》出版十余年，流传较广，影响颇大，学术价值历经时间考验，已广为读者肯定推崇，即在海外，都成为治近代史之学者、学生，以及一般人士广泛阅读的著作，视之为中国近代史研究中最具代表性的著作。\n修订版全面核订了注释、引文中的错讹，重排精装，列入“三联哈佛学术丛书二十年纪念版”再刊。","month":4,"country":"中国","wereadId":"CB_9qmDe8Ddg5ic6uw6sxAud4HA"},{"title":"佛教史六讲","author":"王邦维","start":"2025-04-13","finish":"2025-04-22","rating":8.2,"pages":"77","doubanLink":"https://book.douban.com/subject/36094320/","cover":"https://neodb.social/m/book/2022/10/318249bbe4-da0d-45d3-9def-a1d3c831f551.jpg","review":"非常薄的一本小书，适合想对佛教了解个大概的读者","summary":"【编辑推荐】\n佛教传入中国已近2000年，早已成为中国人精神世界的重要组成部分，以至于我们在日常中很难察觉佛教原本来自印度。佛教的原初形态是什么样的？它的内容有着怎样的独特性和吸引力让它在印度文明脱颖而出？它又是如何扩散成为世界性宗教？一般人很难简明清楚地说明这些问题。王邦维先生凭借其深厚的学术积累，深入浅出地讲述了早期佛教的发展历史，佛教义理基本内容，佛教组织的发展分化，以及佛教从印度向亚洲各地传播的过程。本书短小精悍，言简意赅，囊括了佛教早期历史的主要内容，是了解佛教的入门佳作。\n【内容简介】\n佛教是当今一个世界性的宗教。本书力图用尽量明白易懂的语言，以讲故事的形式，对佛教从产生到现在，前后二千多年的历史做一简要但较为全面的叙述。本书的关注重点是佛教产生以来至传播到亚洲各国的早期时段，从佛教的创立开始讲起，特别注重部派佛教时期的分化。同时本书兼顾中国历史，着重讨论了以及对中国影响至深的大乘佛教的产生，以及以中国为中转站，佛教在东亚其他地区的流传。在讲述历史的同时，本书也深入浅出地介绍了早期佛教的义理。","month":4,"country":"中国","wereadId":"3300075767"},{"title":"相对论究竟是什么","author":"万维钢","start":"2025-04-14","finish":"2025-04-23","rating":8.1,"pages":"226","doubanLink":"https://book.douban.com/subject/35082357/","cover":"https://neodb.social/m/book/2022/02/14e2a589b4-a384-498e-a9c9-4307a1a779e8.jpg","review":"相比看的另外相对论科普，这本中规中矩，其中的问答环节不错。","summary":"物理教科书常给我们一种理性诞生时就已具备完整体系的错觉，抽离了中间汲汲求索的过程。本书恰恰还原了其中的趣味--不仅将难懂的知识化作普通人可以感知、易于理解的信息，让我们轻松进入相对论这个奇妙的世界，更让我们看到天才爱因斯坦从直觉开路，凭借数学推演和想象观察，提出“相对性 原理”，“光速不变”，“质量就是能量”等物理大发现的经过，琢磨一边他琢磨过的事情，打磨自己的世界观。\n爱因斯坦本人曾说：“世界上可能有12个人能够看懂相对论。”\n他说的是100多年前。\n跟随万维钢，你将成为懂点儿相对论的人之一。\n相对论是个能打磨世界观的漂亮理论，连相对论都琢磨过的你，再难的事情都可以挑战。","month":4,"country":"中国","wereadId":"3003653968"},{"title":"六个说谎的大学生","author":"[日] 浅仓秋成","start":"2025-04-22","finish":"2025-04-26","rating":8.2,"pages":"256","doubanLink":"https://book.douban.com/subject/36283547/","cover":"https://neodb.social/m/item/doubanbook/2026/01/18/c377e6e2-c052-4f6b-a649-c5a802917d09.jpg","review":"看的时候还是津津有味的，但关于人性善恶的翻转有点过于为了服务剧情而显得突然。","summary":"★豆瓣2023年度推理·悬疑图书TOP1。主持人/演员杨迪五星推荐。\n★大学生求职前必看小说。\n★《金色梦乡》作者伊坂幸太郎公开表示：“2021年看过的最好的悬疑推理小说，就是浅仓秋成的《六个说谎的大学生》。”\n★日本著名游戏制作人小岛秀夫多次在社交平台推荐，并将《六个说谎的大学生》列为个人读过 的年度最佳推理小说之一。\n★职场悬疑游戏——6人密室心理战×沉浸式职场 狼人杀×华丽的叙述性诡计。最后还有温情与纯爱。\n----------------\n八年前，日本著名IT企业首次开启校招，六名大学生从五千人中脱颖而出。原以为六人团队可以全部拿到内定，但最终却是六人争夺唯一一个入职名额。伴随紧张气氛而来的，还有六封神秘“告发信”，揭发六人面具之下的“谎言”与“罪恶”。完美光鲜的名校生人设一夕崩塌，谁又能成为最终赢家……\n八年后，当年告发信“策划者”生病离世，给入职者留下新的线索，重新走访其他当事人之后，又是否能够找出隐藏多年的另一重真相……","month":4,"country":"日本","wereadId":"3300061183"},{"title":"简单冥想术：激活你的潜在创造力","author":"[英] 安迪•普迪科姆（Andy Puddicombe）","start":"2025-04-27","finish":"2025-05-13","rating":7.8,"pages":"208","doubanLink":"https://neodb.social/book/7SBAvWO2Iletk5QFWfzMLt","cover":"https://neodb.social/m/book/2021/09/17efac34e9-e950-418a-a686-73a0928ad3cc.jpg","review":"书的结构有点混乱，营销味有点重，冥想没学会，学会了打瞌睡。\n","summary":"每天只要拿出10分钟时间，你就能通过冥想放松身心。\n本书分享的冥想技巧简单易学，却十分有效、便于理解，能随时随地实现。这些强大的冥想技巧的确会产生神奇的功效，让你精神放松，减轻你的压力感和疲倦感，让你进入平和充实的新境界。通过练习，你甚至将体验生命的变化。\n正念和冥想所带来的好处如今已得到医学界的证实，医生有时也建议患者尝试冥想。安迪将这种古老的方法带入现代社会，对于我们这些大多数时间里都渴望获得健康的人来说，这些技巧可谓量身定做。无论是初学者还是老练的冥想者，本书都会为你提供一个学习和磨练技巧的机会，即如何克服这个快节奏社会盛行的负面情绪。一旦学会，终生受益。","month":5,"country":"英国","wereadId":"3000003632"},{"title":"黑猫","author":"[美]埃德加·爱伦·坡 著, [爱尔兰]哈利·克拉克 绘","start":"2025-04-12","finish":"2025-05-18","rating":7.5,"pages":"376","doubanLink":"https://book.douban.com/subject/30324583/","cover":"https://neodb.social/m/book/2021/12/09bf8b8e6b-6fb2-4d6d-a7dd-7d400cd4dd86.jpg","review":"抱着太多期待，跳着读了几篇，除了金甲虫勉强还行，其他着实感觉一般，毕竟是快两百年前的作品了。","summary":"《黑猫：爱伦·坡短篇小说集》由爱伦·坡研究学者曹明伦倾情献译，收录了恐怖小说《厄舍府之倒塌》《丽姬娅》《红死病的假面具》《泄密的心》《黑猫》，推理小说《莫格街凶杀案》《玛丽·罗热疑案》《金甲虫》和幽默讽刺小说《生意人》《与一具木乃伊的谈话》等24篇爱伦·坡不同时期的传世佳作。同时精选了14幅由爱尔兰插画大师哈利·克拉克创作的经典插图，完美呈现爱伦·坡式恐怖美学。","month":5,"country":"美国"},{"title":"我看见的世界","author":"[美] 李飞飞","start":"2025-05-05","finish":"2025-05-19","rating":8.3,"pages":"432","doubanLink":"https://book.douban.com/subject/36672955/","cover":"https://neodb.social/m/item/doubanbook/2024/04/16/da913b2a-342d-4877-9436-0fc0ca0348aa.jpg","review":"非常励志的一部作品，虽然没有作者类似的留学经历，但小时候也有一个留学美国梦，当读到作者在美国遇到的语言困难、文化隔阂还是心有戚戚焉。随着书中作者在学术、工程方面的路越走越顺，不由得越发羡慕她能为自己热爱的事业去奋斗并取得成果。反观现在的自己，终日沉浸在毫无意义却又不见未来的工作之中，如项飙所说的「生命力」被捕获。书里书外的落差感，让半夜合上书本的我躺在床上辗转。\n\nBTW，意料之外情理之中的是，这部作品也是用英文书写的。搜索书名时，发现爱因斯坦有一部作品叫 the world as I see it，我想作者起这个书名可能是为了像她的偶像致敬吧。读本书的同时也在读另外一本《深度学习革命》，两本书穿插起来相得益彰。","summary":"《我看见的世界》既是李飞飞的个人史，也是一部波澜壮阔、跌宕起伏的人工智能发展史。\n在这本书里，李飞飞回忆了自己从底层移民成长到顶尖科学家的经历。她度过了困顿艰辛的青少年时代，但对科学的热爱不断激励着她持续追寻人生的“北极星”，并最终走进科学的殿堂。\n当李飞飞和家人努力适应在美国的生活时，恰逢现代人工智能开始不断取得突破。她不断开启新的科学征程，并确立了自己在计算机视觉领域的科学使命，取得了非凡的成就。在这本书里，她详细记录了这些重大时刻的关键细节。同时，李飞飞也对未来人工智能的发展方向提出了自己的判断和警醒，核心就是“以人为本”，让人工智能真正推动人类的发展，而不是成为威胁。\n这本书既是对重大科学突破幕后的精彩窥探，也是一位女性用好奇心和勇气突破人生困境的故事。它不仅证明了即使是最技术性的学术研究也需要激情，更加表明永不停歇的好奇心可以激发无尽的科技创新。","month":5,"country":"美国","wereadId":"3300142877"},{"title":"深度学习革命","author":"[美] 凯德·梅茨","start":"2025-05-22","finish":"2025-05-22","rating":8.2,"pages":"408","doubanLink":"https://book.douban.com/subject/36171345/","cover":"https://neodb.social/m/item/doubanbook/2023/11/30/554d0cd5-6ac0-49ec-a1f6-969e356de5f8.jpg","review":"科普了机器学习、深度学习的发展历程，值得一读。","summary":"世界范围内主要的人工智能玩家有哪些？哪家公司在这场脑力与毅力的角逐中脱颖而出？深度学习革命如何颠覆了整个人工智能领域？人工智能还会经历第三次寒冬吗？\n长期以来，人工智能一直被视为一种遥远的未来技术，它是一个被委托给科学界边缘的项目，甚至在历史上两次走入绝境，陷入寒冬，直到一些孤注一掷的研究人员用一场新的变革打破了宁静——深度学习革命。\n近年来，让人工智能受到全世界瞩目的高调事件，基本上都是基于深度学习的。比如，AlphaGo击败了世界围棋冠军，自然语言处理催生了智能语音助手，自动驾驶、人脸识别在世界范围内得到广泛应用，AI绘画更是以假乱真、火遍全球……可以说，深度学习已经浸入了我们的日常生活，从边缘走到了舞台的中心，正蓄势待发，即将掀起一场惊人的变革。\n本书是一本讲述人工智能，尤其是深度学习的历史与未来的书。书中，作者讲述了一群将深度学习带给全世界的企业家和科学家的故事，从谷歌、Facebook、百度等大公司的决策者讲到学术界的领军人物——“深度学习三巨头”，再讲到DeepMind、OpenAI等知名实验室的开创者。\n你可以通过这些人的故事，跟随现代人工智能的发展脚步，从人工智能研究的萌芽阶段开始，穿过两次人工智能的寒冬，一直了解到当下全新的前沿进展。","month":5,"country":"美国","wereadId":"3300042833"},{"title":"什么是科学","author":"吴国盛","start":"2025-05-21","finish":"2025-06-03","rating":8.4,"pages":"309","doubanLink":"https://book.douban.com/subject/36179194/","cover":"https://neodb.social/m/item/doubanbook/2023/02/13/da3bce67-4868-4806-a06b-67ece0b818f0.jpg","review":"受益匪浅。\n\n现代科学的出现以两个基因和两个土壤作为先决条件。两个基因是指希腊的理性科学基因和基督教基因，两个土壤是指技术革命的土壤和社会革命（资本主义革命）的土壤。\n\n西方现代科学是两希文明相结合的产物。首先，它是希腊科学复兴的产物；其次，它经受了基督教的洗礼，与原本的希腊科学有很大的不同。现代科学与希腊科学的共同点是理性思维和演绎数学，不同点是现代科学以人为本、希腊科学以自然为本，现代科学以征服自然求得力量为目标，希腊科学以顺从自然求得理解为目标。作者也把现代科学称为求力的科学，希腊科学为求真的科学。要解释清楚如何从求真的科学发展为求力的科学，就必须考虑基督教的洗礼以及中世纪后期复杂的思想革命。严格说来，“没有基督教就没有近代科学”。\n\n科学是一个来自西方的舶来品，要理解科学就必须回到西方的语境中。希腊科学是无功利的、内在的、确定性的知识，源自希腊人对于自由人性的追求。这一科学形态的典型代表是演绎数学、形式逻辑和体系哲学。中国文化以仁爱精神作为人性的最高追求，因此从一开始就与科学精神错失。","summary":"♦北大清华备受欢迎的科学史课推荐书目\n♦ 清华大学科学史系主任吴国盛教授经典作品\n♦ 荣获“大众喜欢的50种图书”\n♦全新修订版\n🏆2023百道好书榜年榜·杰出原创影响力图书\n【内容简介】\n在本书中，吴国盛教授先是梳理当代中国人的科学观念，然后阐述现代科学起源于古希腊的理性科学，并对比中西文化的差异。接着又从两个方面讨论现代科学的产生：第一、宗教直接助力现代科学产生；第二、数理实验科学塑造了现代科学的标准。此外，吴国盛教授还讨论另一科学传统— —博物学（自然志），并由此回到中国的传统文化，坦言虽然在数理实验科学的意义上中国没有科学，但是在博物学的意义上，中国有科学，并由思考中国文化的当代命运。\n【名人推荐】\n本书既从西方语境，又从中国人对科学认识的实际出发，思考与解释科学的 本性与本源，具有自己独到的见解，并且深入浅出，易于理解和接受，是我见到过的zui好zui适合当前国人阅读的科学哲学著作。\n——韩启德（中国科学院院士、中国科协名誉主席）\n吴国盛先生还原并呈现出科学zui为本源的面貌，以此引发中国人反思并纠正自己对科学的长期误解。\n——饶毅（首都医科大学校长、北京大学讲席教授）\n【编辑推荐】\n中文里有诸多关于科学的话语，比如“科学社会主义”“科学发展观” “科学防疫”“科教兴国”“科学家”“自然科学”“人文科学”“社会科学”……其中的“科学”都指同一个东西吗？\n在中西医之争中，或者说在关于中医是否是科学的讨论中，撇开里面的那些政治的内容，那些意识形态的内容，在这一讨论的背后，或者在进行这一讨论之前，是否需要先澄清一下“科学”的含义。\n科学，对中国人来说，到底是什么？——是真理，指向知识？是意识形态，指向政治？是技术，指向某种功效？又或是无所不能，指向某种神话？\n在这本书中，吴国盛教授从其专业和研究出发，分析中国人的科学观念，阐明科学和哲学、宗教以及伦理传统的关系，揭秘科学的文化基因，帮助我们理清我们的各种科学观念，引导我们反思我们的文化传统。","month":6,"country":"中国","wereadId":"CB_6zuDOIDRNAGb6w96x66Y9Coc"},{"title":"华丽人生","author":"[日] 伊坂幸太郎","start":"2025-06-03","finish":"2025-06-10","rating":8.2,"pages":"300","doubanLink":"https://neodb.social/book/5fr1PEunNCBnLBlcUwvbJz","cover":"https://neodb.social/m/book/2021/12/06ca0de4e5-71e1-42a4-8d09-602fc21c28cd.jpg","review":"イッツオーライと","summary":"一本值得读很多次的书，一本有些费神的书\n一次仿佛行走于莫比乌斯环的阅读体验\n改编电影由堺雅人扮演黑泽\n-\n是一团乱麻，但请抓住藏于乱序叙事中的线索啊！\n内含25个新鲜出炉的中国读者与伊坂老师的互动问答，非常可爱！\n-\n作品五度入围直木奖\n在日本人气比肩村上春树、东野圭吾\n作品改编电影有瑛太、松田龙平、堺雅人倾情出演\n------------------------------------------------\n★内容介绍\n世界有什么规则吗？\n小偷黑泽打开房门，遇到了从未见过面的邻居，他热心地帮助邻居抬走醉酒的友人后，捡起了一张写着外国文字的纸片；热爱绘画的河原崎在咖啡厅里等人，他在顺手拿到的传单背面涂鸦，传单正面是寻人启事，上面详细描述了失踪青年的特征；心理咨询师京子一大早接到了丈夫的电话，丈夫提出离婚，而她本打算今晚和情夫联手除掉各自的现任伴侣；无业中年丰田第四十次应聘被拒，他在车站附近闲逛，听见路人聊着“流浪狗”的话题。\n如果世界以此为开端，后续会有怎样的发展？年轻画家志奈子和中年画商户田想就此打个赌，你认为谁能赢呢？","month":6,"country":"日本","wereadId":"41439117"},{"title":"A Brief History of Intelligence","author":"[美] Max Bennett","start":"2025-05-26","finish":"2025-06-18","rating":8.5,"pages":"432","doubanLink":"https://neodb.social/book/09HdAE9VvzeEPkIlZLfnzA","cover":"https://neodb.social/m/item/goodreads/2024/04/13/e5afbc15-032a-4e70-b44c-2e2729b36544.jpg","review":"读这本书的时候让我想起来小时候在电视上看《动物世界》的感觉，配合上丰富的实验事例和精美插图，作者用朴实易懂的语言丝滑的揭开隐蔽在我们大脑背后的故事。\nBTW，站在2025年这个时间节点上，利用现有的LLM，我已经可以方便的用微信读书对原书原文进行翻译后阅读，同时对书中重点内容划线，再丢给 AI 生成 Anki 卡片用来重温回忆。","summary":"Equal parts Sapiens, Behave, and Superintelligence, but wholly original in scope, A Brief History of Intelligence offers a paradigm shift for how we understand neuroscience and AI. Artificial intelligence entrepreneur Max Bennett chronicles the five “breakthroughs” in the evolution of human intelligence and reveals what brains of the past can tell us about the AI of tomorrow.\nIn the last decade, capabilities of artificial intelligence that had long been the realm of science fiction have, for the first time, become our reality. AI is now able to produce original art, identify tumors in pictures, and even steer our cars. And yet, large gaps remain in what modern AI systems can achieve—indeed, human brains still easily perform intellectual feats that we can’t replicate in AI systems. How is it possible that AI can beat a grandmaster at chess but can’t effectively load a dishwasher? As AI entrepreneur Max Bennett compellingly argues, finding the answer requires diving into the billion-year history of how the human brain evolved; a history filled with countless half-starts, calamities, and clever innovations. Not only do our brains have a story to tell—the future of AI may depend on it.\nNow, in A Brief History of Intelligence, Bennett bridges the gap between neuroscience and AI to tell the brain’s evolutionary story, revealing how understanding that story can help shape the next generation of AI breakthroughs. Deploying a fresh perspective and working with the support of many top minds in neuroscience, Bennett consolidates this immense history into an approachable new framework, identifying the “Five Breakthroughs” that mark the brain’s most important evolutionary leaps forward. Each breakthrough brings new insight into the biggest mysteries of human intelligence. Containing fascinating corollaries to developments in AI, A Brief History of Intelligence shows where current AI systems have matched or surpassed our brains, as well as where AI systems still fall short. Simply put, until AI systems successfully replicate each part of our brain’s long journey, AI systems will fail to exhibit human-like intelligence.\nEndorsed and lauded by many of the top neuroscientists in the field today, Bennett’s work synthesizes the most relevant scientific knowledge and cutting-edge research into an easy-to-understand and riveting evolutionary story. With sweeping scope and stunning insights, A Brief History of Intelligence proves that understanding the arc of our brain’s history can unlock the tools for successfully navigating our technological future.","month":6,"country":"美国","wereadId":"CB_EA79dL9cq6Fm6v46sxBoM3qx"},{"title":"横道世之介","author":"[日] 吉田修一","start":"2025-06-11","finish":"2025-06-22","rating":8.5,"pages":"416","doubanLink":"https://neodb.social/book/1aqfj0PEWvHy6PeaaFVGDI","cover":"https://neodb.social/m/book/2021/09/16de902ea2-c0a9-4692-ac42-f2f998928878.jpg","review":"悠哉悠哉的世之介，真叫人怀念。","summary":"☆《怒》《同栖生活》作者吉田修一令人爆哭爆笑的青春缅怀大作。\n☆获柴田炼三郎奖、《现代周刊》年度最有趣小说第四名、书店大奖第三名。\n☆横道的青春里没有大事件；横道的青春本身，就是大事件。全新译本还你真实的横道君。\n☆同名电影高良健吾、吉高由里子主演。\n一个对人对事只说“YES”的小城青年，第一次离家来到东京求学。他太普通，但有个令人发笑的姓名；他太平凡，因不懂拒绝而总会干些叫人啼笑皆非的事。这一年里，他第一次跳了桑巴舞；第一次有了前女友；第一次体验了归省；第一次向在乎的人郑重告别；第一次，目睹生命孕育与降生的失措与喜悦。这一年里，他邂逅了吊儿郎当的同学仓持，特立独行的加藤，一派天真热列追求他的富家女祥子，暗恋着沉醉于交际生活的美女千春……世之介成长着，也用他的单纯、善良和发自内心的对生活的爱，感染了所有在青春岁月与他相遇的人们。\n“年轻时没遇到过世之介的人多得不可胜数，想到这一点，我突然觉得自己比别人多了一份幸运。”","month":6,"country":"日本","wereadId":"22728281"},{"title":"宿命","author":"[日] 东野圭吾","start":"2025-06-20","finish":"2025-06-25","rating":7.5,"pages":"272","doubanLink":"https://book.douban.com/subject/36866224/","cover":"https://neodb.social/m/item/doubanbook/2024/12/23/9bfb4051-e419-4a58-b770-0c4cdfde70c0.jpg","review":"推理、情感都没啥出彩的，最后的翻转更是莫名其妙。","summary":"★命运越是偶然，越可能是精心策划的必然！\n★东野圭吾宿命感拉满的双男主对决：“永远的对手！正是这一经典主题，让本书长盛不衰。”\n★日文版销量突破160万册，与《恶意》《假面山庄》一同获得日本读者票选东野圭吾十大被低估杰作\n★与天共谋写就的故事，知天命也无法破解的谜题：我们的一生，是否早已注定？\n★读《宿命》，绝对不要先看最后的部分。我最喜欢的，就是暗藏在最后一行的意外。——东野圭吾\n------------------------------------------------------------------------------------------\n有的人分明和自己毫无瓜葛，却怎么也不能无视��存在。\n我们不同班，也不曾说过话，我却总是忍不住去关注那个少年的一举一动。这并非因为想和他成为朋友，而是我莫名地觉得对方极为讨厌。他总是毫不费力，就得到了我拼命付出才能有的东西。我越是努力想赶上，我们的差距却越是明显。\n宿命安 排我们重逢：我调查的命案，重大嫌疑人竟是他；我曾经的恋人已经结婚，对象也是他。\n这是老天赐给我的最后一次机会，一生中唯一能胜过他的机会。我感觉全身逐渐热起来，仿佛有什么东西在脑中膨胀，不禁将比作枪管的食指对准他的名字，扣下想象中的扳机。","month":6,"country":"日本","wereadId":"840688"},{"title":"自私的皮球","author":"辉格","start":"2025-06-25","finish":"2025-07-18","rating":7.8,"pages":"288","doubanLink":"https://book.douban.com/subject/10544307/","cover":"https://neodb.social/m/book/2021/09/16bc19dd48-cb1a-4a55-bace-ea6502031162.jpg","review":"收获不多，知识面挺发散，但涉及都不深，个人倾向比较重。","summary":"《自私的皮球:我们的日子为什么是这样过的》内容简介：以经济学核心理念贯穿全书，按主题分为价格与市场、产业与创新、行为与心理、制度与政策、宏观经济等几个部分，讨论了近年来在产业、经济与社会领域发生的关注度高、争议大的热点问题。这是一位独立学者对人与社会的观察与思考所得，力求以平实的文字、清晰的逻辑和独特的视角，与你分享思考和体悟的快乐，并共同体验经济学与其他社会学科的交叉融会所能带来的知识乐趣。","month":7,"country":"中国","wereadId":"23911461"},{"title":"1Q84 BOOK1","author":"[日]村上春树","start":"2025-07-10","finish":"2025-07-27","rating":8.3,"pages":"400","doubanLink":"https://book.douban.com/subject/30203786/","cover":"https://neodb.social/m/book/2021/11/2893e526ba-ab94-4bee-a107-7dfc84326bc9.jpg","review":"很黄","summary":"《1Q84 BOOK 1（4月-6月）》是村上春树长篇小说代表作《1Q84》系列的开篇之作。\n在东京，年轻女子青豆乔装打扮，杀死一个个滥施家庭暴力的男人；而天吾一面当数学教师，一面写小说。两个本来绝无可能相会的人，因为一部神秘小说《空气蛹》，开始进入1Q84年，被卷入各种神秘莫测的事件。\n《1Q84》以一对年轻男女互相寻觅对方的故事为引，构筑出一部情节复杂、波澜壮阔的长篇。村上春树想将这个时代的世态立体地写出，成为独有的“综合小说”，超越纯文学的类型，在当今时代的空气中嵌入人类的生命。\n《1Q84》系列不仅是村上春树创作40年高峰之作，也是一部绝爱之书、命运之书、时代之书，已成为与《挪威的森林》并重的村上文学经典，被誉为新千年日本文学的里程碑。曾创下上市12天销售100万册纪录，荣登日本、韩国、中国台湾畅销榜年度榜单首位。本次出版的《1Q84 BOOK 1》由知名设计师设计绝美精装收藏版，系列第2册、第3册同时登场。","month":7,"country":"日本","wereadId":"22485616"},{"title":"自私的基因","author":"[英]理查德·道金斯","start":"2025-06-26","finish":"2025-07-29","rating":8.4,"pages":"371","doubanLink":"https://book.douban.com/subject/11445548/","cover":"https://neodb.social/m/book/2021/09/154a39f611-e831-4521-81ff-9c3ae37879b3.jpg","review":"让我以全新的视角认识进化论，尤其喜欢关于 meme 和囚徒困境部分的章节内容。","summary":"《自私的基因》是20世纪最经典的著作，这版三十周年纪念版，在前版本基础上有两章增补和修订。我们从哪里来，又将到哪里去。生命有何意义，我们该如何认知自己？《自私的基因》充满想象力。任何生物，包括我们自己，都只是求生的机器。这本书是实实在在的认知科学，复制、变异和淘汰简单的三种机制可以演变出所有大千世界生命现象里的林林总总。\n道金斯在《自私的基因》中的突破性贡献在于，把根据自然选择的社会学说的这一重要部分，用简明通俗的形式，妙趣横生的语言介绍给大家，这是第一次。他惊世骇俗地在《自私的基因》中提出：我们生来是自私的。人类窥见了社会关系中基本的对称性和逻辑性，在我们有了更充分的理解之后，我们的政治见解当会重新获得活力，并对心理学的科学研究提供理论上的支柱。在这一过程中，我们也必将对我们受苦受难的许多根源有一个更深刻的理解。","month":7,"country":"英国","wereadId":"CB_DIe7NA7M2Fbh6wv6x6CFC5BI"},{"title":"摄影师手册","author":"[英]大卫·赫恩, [英]比尔·杰伊","start":"2025-07-28","finish":"2025-08-03","rating":8.3,"pages":"200","doubanLink":"https://neodb.social/book/6tjRGfi7X5Aq9dbHKOyK52","cover":"https://neodb.social/m/book/2021/09/1646ed440a-2d09-4051-8104-af261bda28ae.jpg","review":"一本薄薄的册子，比之前几年看的桑塔格的《论摄影》，无疑更接地气且有实操性，如作者所言，在摄影开始之前，批判理论介入得越多，照片的结果往往越差。\n要找到自己的摄影主题，先拍起来，工具，装备都是服务于摄影目的，而非越贵越好。\n并且，需要不断的练习，才能让摄影的本能变得如此自然，以至于你能忘掉设备、忘掉技术，本能地站在正确的位置、处在正确的时刻，拥有正确的曝光和焦点。","summary":"【如何如摄影师一般思考与行动？】\n【摄影是关于人生的。】\n【通过镜头，摄影师将人生态度投射至作品。】\n这是一本关于摄影的书——但摄影是关于人生的。\n从给摄影术语下定义入手，大卫·赫恩着手指导年轻摄影师如何高效、实际地选择属于自己的拍摄主题，如何拍到满意的单幅作品乃至完成整个专题，甚至如何挑选完美的鞋子和摄影包。你会发现，真正的摄影绝非仅仅是拿着相机在街上转悠，而是涉及列表、做计划、阅读、研究、分析、建立编档系统等大量艰苦的工作。可以说，摄影师的绝大部分工作，是在拍摄开始前和拍摄结束后完成的。\n除了指导读者“如何成为摄影师”，大卫·赫恩与比尔·杰伊还探讨了摄影的未来。面对来势汹汹的数字化影像，传统纪实摄影将如何定义自身？赫恩在九十年代提出的观点依然直指要害。此外，两人共同厘清了摄影师基本都会遇到的九个误区，切实为读者提供了可借鉴的帮助。\n本书不涉及摄影的具体技术及操作，而是告诉读者“如何如摄影师一般思考与行动”。换言之，《摄影师手册》不教方法，而是传授方法论。\n大卫·赫恩与比尔·杰伊试图找出所有摄影师都通用的基本原则，无论其摄影风格如何，属于哪一摄影流派。\n赫恩认为，人生的目标是成为潜在的那个自己，而摄影提供了通向这一目标的完美工具。对他来说，摄影与人生无法分离，摄影师并非无形地躲在相机背后，而是通过镜头，将自己的人生态度投射至作品，并留下个人印记。","month":8,"country":"英国"},{"title":"醉步男","author":"[日]小林泰三","start":"2025-07-30","finish":"2025-08-05","rating":8.1,"pages":"208","doubanLink":"https://book.douban.com/subject/30359030/","cover":"https://neodb.social/m/book/2021/09/158db22b2b-76db-4455-a112-c7987738d774.jpg","review":"并不存在客观的时间，也就并不存在因果关系，因果得以出现源于人类的感知，而非现实，如同时间。\n我们感知的是大脑“认为”存在的东西，是大脑根据感官器官输入后“推测”出的现实，而非现实本身。事物本身（物自体）不依赖于主体的认识，a map is not the territory.","summary":"本书收录时间旅行小说《醉步男》+日式恐怖小说《玩具修理者》。\n——————————————\n血沼，我以后大概都不会和你相遇了。\n话没说完，小竹田在我眼前消失了。不仅仅是人消失不见，连他放在桌子上的威士忌也消失了。仿佛从头到尾都只有我一个人孤孤单单地坐在酒馆里。\n一阵寒意袭上身来。\n大概别人的一生中从 来都不会碰上遇到自己不认识的好友的事，但是我却碰上了。这可真是一件至死都忘不了的事情。不过，这件事情真的发生过吗？那个名叫小竹田的男子——今天第一次见的老朋友，真的存在过吗？\n看起来，我到底是醉得不轻了。\n——————————————\n今后若是论及小林泰三的唯一性，《醉步男》与《玩具修理者》的这本合集会是一个象征性的事件。至今我还能回想起读完《醉步男》时那种真切的眩晕感，在所有的意义上，《醉步男》都是打破定型的作品。——井上雅彦（日本小说家）\n《醉步男》在当时出版的时候是一部非常独特的作品，它让我们在一部可怕而令人心碎的科幻小说中阅读逻辑幻想。——大野万纪（日本科幻评论家、书评人、翻译家）\n这是作者小林泰三充满“逻辑恐怖”的作品。登场人物越是讨论关于现代物理学所采取的时间论和意识的问题，越会朝着噩梦般的、绝望的结论而坠落。当被问到“让梦想坠落的恐怖”时，这是我最先推荐的作品。——ミニキャッパー周平（JUMP j BOOKS编辑）\n作为恐怖杰作而闻名的《玩具修理者》是日本恐怖小说大奖获奖作品，但更可怕、令人兴奋的杰作是同时收录的《醉步男》。读完之后，你会想回到开头再读一遍。——纪伊国屋书店","month":8,"country":"日本","wereadId":"CB_ByO3eG3be3Up6Ud6U5"},{"title":"哲学家的最后一课","author":"朱锐","start":"2025-08-03","finish":"2025-08-09","rating":8.3,"pages":"200","doubanLink":"https://book.douban.com/subject/37269363/","cover":"https://neodb.social/m/item/doubanbook/2025/04/10/8cf4fb9e-8436-4d7b-9e54-13e044b2fe68.jpg","review":"羡慕朱老师，读过很多书，去过很多地方。","summary":"当你看到这本书的时候，你就收到了哲学家朱锐留给世界的爱与告别。\n被医学宣布仅剩数十天的生命，每天都在体验身体的疼痛与功能丧失，朱锐留下的文字直面每一步都更接近死亡的进程。但他无所畏惧，并将对生命和死亡的思考带至人生最后时刻。他始终认为死亡是生命的一部分，我们谈论死亡，是为了更好地活。\n这本书正是源自作者朱锐在生命最后的十日对谈，以及他在中国人民大学开设的最后一门哲学课，汇集了他在哲学研究领域 30 余年的思考。\n从大学教室到安宁病房，他将最后的时间转为生命的渡口，用哲学的理念和生命的实践阐明个体生命的意义和价值、对死亡的积极性的理解，从古希腊“练习死亡”的哲辩到庄子“大化流行”的生死观，从存在主义困境到爱的终极释义，希望给予读者一个多元的生命视角，重新理解生命、理解生活、理解自己，用哲学和艺术的态度来直面生活中的终极挑战。\n·叶檀推荐：大家要相信自己的渺小，不是卑微，因为恰恰是渺小的个人能凭借心中的道德律媲美浩瀚的星空。我们可以不追求外物的目的性，以一种纯粹的方式生活，即使未来是不可知的，即使生命的个体处于痛苦的死亡过程当中，被剥夺了外在的尊严，但从另一个角度看，依然可以成为生命的组成部分，可以永生，有可能生命只是变换了一种形式，成为石头的原子，变成了护花的春泥。能跟如此高广的思想对话是一种幸运，这是生命中极致的美。\n·新华社、《人民日报》深度报道，百万网友含泪追更。\n·不妨像老友重逢一样，听这位哲学家谈谈。人生最后十场对话，直击生命深处的豁达。不过未经审视的人生，在风刮雨淋的世界，做渺小但大写的人。","month":8,"country":"中国","wereadId":"3004250880"},{"title":"台北人","author":"白先勇","start":"2025-08-11","finish":"2025-08-13","rating":8.4,"pages":"291","doubanLink":"https://book.douban.com/subject/26253699/","cover":"https://neodb.social/m/book/2021/09/153fe3fa0e-b6f6-4934-ae8f-9cf23a7ec3a0.jpg","review":"每一篇都读得心情沉重，尤其是孤恋花中的铁链。","summary":"白先勇的《台北人》，是一本深具复杂性的作品。此书由十四个短篇小说构成，写作技巧各篇不同，长短也相异，每篇都能独立存在，而称得上是一流的短篇小说。但这十四篇聚合在一起，串联成一体，则效果遽然增加：不但小说之幅面变广，使我们看到社会之“众生相”，更重要的，由于主题命意之一再重复，与互相陪衬辅佐，使我们能更进一步深入了解作品之含义，并使我们得以一窥隐藏在作品内的作者之人生观与宇宙观。——欧阳子《白先勇的小说世界》\n“一个作家，一辈子写了许多书，其实也只在重复自己的两三句话，如果能以各种角度，不同的技巧，把这两三句话说好，那就没白写了。\n《台北人》对我比较重要一点。我觉得再不快写，那些人物，那些故事，那些已经慢慢消逝的中国人的生活方式，马上就要成为过去，一去不复返了。” ——白先勇","month":8,"country":"中国","wereadId":"838779"},{"title":"创意行为","author":"[美] 里克·鲁宾","start":"2025-08-06","finish":"2025-08-18","rating":8.1,"pages":"416","doubanLink":"https://book.douban.com/subject/36897065/","cover":"https://neodb.social/m/item/doubanbook/2025/04/11/10fcb5cc-fa82-458e-9928-6eaad4766d2c.jpg","review":"第一次因为译者的关系读一本书。看着挺厚的一本书，其实内容并不多。它是关于创作者的一些零碎观点的合集，借由 ​​78 篇短小却锋利的思考笔记​​，讨论灵感、过程、心态与社会责任等核心议题，帮助创作者在“存在”中找到源源不断的答案，创作者们也许在碰到瓶颈时翻一翻，能有所收获。","summary":"【编辑推荐】\n荣登《纽约时报》畅销书榜首！亚马逊创意类销量TOP1图书！\n九座格莱美奖杯得主，Adele、Jay-Z背后的传奇音乐制作人\n【里克·鲁宾】首度公开78则创意智慧\n-------\n★ 全球现象级破圈之作，传奇音乐教父里克·鲁宾40余年创意哲学首度公开 ★\n--\n★ 人气音乐播客「不在场」主理人 重轻 倾情翻译，知名播客品牌「日谈公园」真诚推荐，众多创意行业博主“自来水”式���播，全网期待中文版！★\n-\nLady Gaga称他“让我的尖叫化为圣诗”\n侃爷说他是“照见灵魂裂缝的镜子”\nAdele赞他“比冥想更懂如何唤醒神性”\n这位音乐界的传奇，便是本书作者，美国大名鼎鼎的音乐制作人里克·鲁宾。\n这不是一本教你怎么做音乐的书——这是一本关于“创造力究竟从何而来”的答案之书，也是把整个宇宙变成你创作现场的颠覆宣言！\n--\n★ 当所有创作指南都在教你“如何做”，这本书将唤醒你“成为谁”★\n-\n从怀旧民谣到嘻哈狂潮，从重金属嘶吼到电子迷音，作为当代最具影响力的音乐制作人之一，在与从Johnny Cash到Adele等无数音乐人合作的四十年间，里克·鲁宾首次袒露他的创意核心法则：\n甩开技巧焦虑，与宇宙万物共振。\n书中没有枯燥方法论，而是以诗意哲思指引你——\n“我们不是在创作中表达自己，而是通过创作发现自己未曾察觉的生命维度。”\n--\n★ 创意有自己独特的“量子力学”，给所有深夜改稿/写歌/设计/策划的人 ★\n-\n翻开这本凝练创作哲思的“答案之书”，你将重新定义：\n√ 灵感采集：地铁闸机开合的节奏可成为副歌的呼吸频率\n√ 素材转化：上司的皱眉或许藏着某段布鲁斯桥段的起承转合\n√ 自我觉察：洗碗时水流触感能激活被理性封印的神经\n-\n这本书并非创意技巧手册，而是一次对创作本质的深层探索——艺术不是少数人的天赋，而是人类与生俱来的感知本能。\n------\n【内容简介】\n-\n他不会任何乐器，也不懂得使用调音台，\n却能赢得九座葛莱美奖，被欧美音乐界的巨星视为“传奇”！\n他就是 里克·鲁宾(Rick Rubin)\n-\n多年来，里克·鲁宾一直在深入思考：创造力究竟缘何而来，又如何消散？他发现，成为艺术家，关键并非是一个人的具体产出，而在于个体与世界的连接。每个人的生活中，创造力都有一席之地，每个人都可以将之发扬。他坚信，没有什么比充分发挥创造力更重要的人生责任了。\n在写作本书过程中，鲁宾表示本意是想写一部帮助人们创作出伟大艺术品的指南，写完之后则发现，这其实是一部讲述“为人之道”的哲学之书——最伟大的艺术品永远只能诞生于“我们与世界的联系”之中。因此在本书中，鲁宾通过78篇哲学思考，分享了在他眼中“人人都是艺术家”的智慧，也为帮助人们突破创造力瓶颈提供了有用的思考框架。\n可以说，无论是文案写作、艺术设计还是广告策划或音乐创作，这些“瞬间迸发的灵感”，对于当前从事任何创意行业的读者来说，都是相当有价值的信息。","month":8,"country":"美国","wereadId":"CB_0xdAkbAlp2V86xm6x6EIK2Yp"},{"title":"关于说话的一切","author":"汤质","start":"2025-08-19","finish":"2025-09-08","rating":8.3,"pages":"376","doubanLink":"https://book.douban.com/subject/36197587/","cover":"https://neodb.social/m/item/doubanbook/2023/10/05/a8507207-11d9-455b-8ff2-f5c0fdcbc679.jpg","review":"在我看来，这本书并不是关于说话的一切，倒更像是以说话为引子，实际上是将语言相关的科普内容杂糅。它涉及符号、语言、逻辑、形式、辩证、因果、隐喻等概念领域。有幸的是作者推荐引用的书目里不少是我读过的，但惭愧的是作者能将它们的知识内容很好的概括和串联，而我读过就忘了。此外，这本书的特点是添加了很多形象的图表，能让原本枯燥难懂的概念一定程度得到缓解。","summary":"说话，既是人最基本的社会活动，又是世间最难精通的信息游戏。说话的能力与人际关系和职业前景密切相关，是人生发展的关键一课。但现在，越来越多的人认为仅掌握一些话术，就可以成为一个“会说话的人”。可正是这些话术合力扭曲了我们的沟通观，让人反而不知道该如何说话。\nB站知识型Up 主“汤质看本质”另辟蹊径，从哲学、符号学、语言学、认知心理学等硬核知识中探寻说话的本质，直面生活中的实际场景，给出了一套内涵丰富且句句落在实处的说话指南。\n为什么别人总觉得我说话不够清楚、难以理解?\n在与地位高的人对话时，我该如何掌握交流的主导权?\n我总是在公开场合发言时紧张，怎么办?\n在与他人交流时，我应该重在倾听还是发表见解?\n为什么别人谈论问题能一针见血、口若悬河，我却只会说“啊这……”?\n在与别人辩论时，我的话怎么就是不够有说服力?\n闲聊时，我怎么总找不到合适的话题，老是冷场?\n怎样才能既把话说到点子上，又说进他人的心坎里?\n这本书将带你掌握语言逻辑背后的权力博弈和硬核知识，轻松解决上述问题，帮助你成为有策略的倾听者、提问巧妙的交流者，最终成为轻松自如的沟通者。","month":9,"country":"中国","wereadId":"CB_D2C2Rg2PY1Ez6y56x63ul82U"},{"title":"1Q84 BOOK2","author":"[日]村上春树","start":"2025-09-03","finish":"2025-09-17","rating":8.1,"pages":"360","doubanLink":"https://book.douban.com/subject/30203785/","cover":"https://neodb.social/m/book/2021/10/24cadb2ec3-f2a0-416a-8976-6fb208867b0e.jpg","review":"叙事推进有点慢，部分情节文字精彩，不明意义的性描写，打算看完第三本。","summary":"《1Q84 BOOK 2（7月-9月）》是村上春树长篇小说代表作《1Q84》系列的第二部。\n在1Q84年，青豆在雷雨之夜动手处决了神秘团体的关键人物。而天吾被卷入《空气蛹》作者深绘里失踪事件，并由此发现了小小人的秘密。青豆开始领悟到，进入1Q84年的门是单向开放的，返回现实世界的路还不存在。同时，她和天吾的生命轨迹也在日渐靠近，然而，他们是否能相遇，又能否回到现实？\n《1Q84》以一对年轻男女互相寻觅对方的故事为引，构筑出一部情节复杂、波澜壮阔的长篇。村上春树想将这个时代的世态立体地写出，成为独有的“综合小说”，超越纯文学的类型，在当今时代的空气中嵌入人类的生命。\n《1Q84》系列不仅是村上春树创作40年高峰之作，也是一部绝爱之书、命运之书、时代之书，已成为与《挪威的森林》并重的村上文学经典，被誉为新千年日本文学的里程碑。曾创下上市12天销售100万册纪录，荣登日本、韩国、中国台湾畅销榜年度榜单首位。本次出版的《1Q84 BOOK 2》由知名设计师设计绝美精装收藏版，系列第1册、第3册同时登场。","month":9,"country":"日本","wereadId":"22485614"},{"title":"时空旅行者的沙漏","author":"[日] 方丈贵惠","start":"2025-09-09","finish":"2025-09-22","rating":7.7,"pages":"268","doubanLink":"https://book.douban.com/subject/35430467/","cover":"https://neodb.social/m/item/book/2026/02/12/898861ab-8764-4a18-b356-af0ff5b2902c.jpeg","review":"没有太多惊喜的一部本格推理。\n喜欢封面设计。","summary":"第29届鲇川哲也奖获奖作！\n发生在孤岛别墅中的连续杀人案 为拯救爱人而穿越时空搜查真凶\n时间旅行 x 本格推理  一口气读到底！\n◎拥有魔术盒的魅力，不知会从中蹦出什么东西来。——加纳朋子\n◎像这样让读者动脑，正是本格推理小说的魅力所在。——北村薰\n◎兼顾解开逻辑谜题和剧情设定的科幻推理。——辻真先\n------------------------------------------------\n★内容介绍\n为了拯救爱人、打破诅咒，记者加茂冬马踏上了神秘的时空之旅。\n加茂的妻子龙泉伶奈生于一个大家族，一九六〇年的庆生聚会上，一连串的凶杀案和紧随而来的泥石流将这个家族卷入无情的诅咒。想要破解诅咒，就必须找到命案的真凶。\n穿越时空而来的加茂发现命案现场仿如“孤岛”，嫌疑人中还有几位“推理小说迷”，时间紧迫，他被迫扮演起了名侦探的角色……","month":9,"country":"日本","wereadId":"39283506"},{"title":"计算","author":"吴翰清","start":"2025-08-09","finish":"2025-09-28","rating":8.5,"pages":"440","doubanLink":"https://book.douban.com/subject/36615448/","cover":"https://neodb.social/m/item/doubanbook/2023/11/20/4f6c3f7e-0389-45e4-b907-8709da576c07.jpg","review":"我觉得可以称作计算数学史，从毕达哥拉斯到哥德尔到NP到ChatGPT，看到人类计算能力演绎的路进，看到一个个伟人，看到数学的伟大。就内容编辑而言，个人感觉还能再精简一些，晚上在床上捧着这么一本大书，阅读实在不太方便，另外，作为普通读者，很多内容深度跨越太大，容易让人没有勇气读下去。但总体上瑕不掩瑜，值得推荐。","summary":"第十九届文津图书奖科普类图书。终于有人写透计算的博与精、古与今、奥与美、艰与趣。天才少年阿里传奇之子、全球TOP35创新科学家吴翰清，计算三部曲首卷发布\n计算已经成为人们生活中不可或缺的组成部分，人类社会享受了计算技术的红利得以飞速发展。可以说当今的计算机科学和产业应用的成就是人类文明有史以来所有智慧的结晶。解释、澄清和发展“计算”这一重要概念，即本书之写作目的。本书从探索数学的起源开始，细数了数学史上三次危机的来龙去脉 ，逐渐引出计算理论的诞生和发展，以及这些过往是如何影响当今计算机科学最前沿方向的。最后本书从哲学层面探讨了计算的边界，将其视为人类需要继续探索的未解之谜。本书横跨了人类近3000年的文明史，综合了数学、哲学、物理学、计算机科学、人工智能、复杂系统科学等多门学科，呈现出一种独特的计算主义的世界观。","month":9,"country":"中国","wereadId":"CB_Ecu56S5563AW6xs6x6BUgBmU"},{"title":"什么是麦克斯韦方程组","author":"长尾君","start":"2025-09-23","finish":"2025-10-11","rating":8.5,"pages":"170","doubanLink":"https://book.douban.com/subject/36487324/","cover":"https://neodb.social/m/item/doubanbook/2023/10/10/9f1e5d36-543c-425c-8dc8-c44e7475f0b5.jpg","review":"对麦克斯韦方程的理解一直停留在中学的模糊记忆中，这本书帮助我重新梳理了一遍。几年前通过作者的公众号一篇相对论入门的文章开始关注，作为一个门外汉爱好者，作者一如既往的低门槛科普方式让我重拾了了解这些深奥数学与物理逻辑的信念。","summary":"麦克斯韦方程组以一种近乎完美的方式统一了电和磁，并预言光就是一种电磁波，这是物理学家在统一之路上的巨大进步。很多人都知道麦克斯韦方程组，知道它极尽优美，但是能看懂这组方程的人却不多，因为它需要用到微积分，并不像许多方程那样简单直观。\n因此，这本书会依然延续“长尾科普系列”的风格，继续用通俗的语言和缜密的逻辑将麦克斯韦方程组的前前后后都讲清楚，让不懂微积分的中小学生也能轻松读懂这组伟大的方程。","month":10,"country":"中国","wereadId":"3004117324"},{"title":"恋文","author":"(日)连城三纪彦","start":"2025-10-12","finish":"2025-10-20","rating":8.5,"pages":"221","doubanLink":"https://book.douban.com/subject/6731202/","cover":"https://neodb.social/m/book/2021/09/17ac4758d8-631a-45a9-bcb0-287fb5b2c208.jpg","review":"5个清晰脱俗的爱情故事，连城老师一贯的反转，最喜欢其中的《红唇》。”","summary":"情书，不单恋人给你的才是\n父母，亲人，朋友，他们的情书，就在身边\n日本文坛知名推理与爱情小说两栖作家\n第91届直木奖获奖作品\n五则故事，五种不同的情感真相\n她给了他一封最棒的情书——离婚申请书。\n她借小她三十多岁的他之名圆了四十年前的单恋。\n他一直当做弟弟疼爱的人竟然有另一身份——儿子。\n他应该很爱她所以为了出轨的她而让自己也出轨。\n她在去世之前便已经和他借由结婚的方式离别了。\n本书为日本第91 届直木奖获奖作品，收录《情书》《红唇》《十三年后的摇篮曲》《小丑》《我的舅舅》等五个短篇。\n五则故事，五种不同的情感真相，作者将推理小说的元素巧妙融入情感小说，故事结局常出人意表，却又在情理之中。作者文笔洗练，感情细腻，故事情节寓奇于常，浓浓的人情味让人回味良久。","month":10,"country":"日本","wereadId":"3000005162"},{"title":"萨特","author":"[英] 菲利普·索蒂, [英] 霍华德·里德","start":"2025-10-13","finish":"2025-10-21","rating":8.4,"pages":"182","doubanLink":"https://book.douban.com/subject/35701496/","cover":"https://neodb.social/m/item/doubanbook/2023/11/11/8fd8b8d3-4055-4186-824f-7a7879ae64a9.jpg","review":"想要了解萨特的思想，又怕直接读他的作品会太难，这本小册子起到了很好的引路人的作用，插图虽不精美，但思想分析我觉得还是挺到位的。","summary":"萨特是文学家、哲学家和社会活动家，是20世纪最有影响力的思想家之一\n萨特影响了一代又一代的中国人，本书是对他的思想高度浓缩的描述\n本书还简要描画了萨特与波伏瓦、与其他存在主义者（如加缪）的关系\n--\n当萨特谈论“他人即地狱”时，他在谈论什么。存在先于本质，萨特的这句名 言人人耳熟能详，但他究竟是什么意思？萨特和波伏瓦的爱情为什么被无数现代人推崇？《图画通识丛书•萨特》简约地回答了以上所有的问题。\n从1945年“二战”结束到1980年萨特逝世，他一直是法国最著名的作家，也是当时在世的最著名的哲学家之一。这个小册子阐述了组成萨特世界观的基本脉络，特别是他关于自由、文学、马克思主义和不平等等方面的思想。","month":10,"country":"英国"},{"title":"反脆弱","author":"[美]纳西姆•尼古拉斯•塔勒布","start":"2025-09-29","finish":"2025-10-23","rating":8,"pages":"408","doubanLink":"https://book.douban.com/subject/25782902/","cover":"https://neodb.social/m/book/2021/09/15ee79306d-7740-4e35-aecb-69af959fc506.jpg","review":"大致上能明白作者要传达的观点，但理论太少，例子太多且散乱，对作者关于宗教、自然的迷信内容并不全部认同，加之文化隔阂，吸收有限。","summary":"为什么这个世界上最稳定的国家其实没有政府？\n为什么负债对你不好，以及为什么我们通常所说的“效率”根本缺乏就是效率？\n为什么政府和社会政策保护强者，却伤害弱者？\n为什么你应该在还没入职之前，就应该写好辞职信？\n泰坦尼克号的沉没为什么拯救了更多的生命？\n尼采有句名言：“杀不死我的，使我更强大。”就像人的骨头承受压力和紧张会变得更加强壮，谣言或暴乱在有人试图压制它们时会变本加厉一样，生命中的许多事物也会受益于压力、混乱、波动和不确定。\n畅销书《黑天鹅》告诉我们，发生概率极低的事件和无法预测的“黑天鹅”事件，在世界上几乎每一种事物的身上都会发生。在《反脆弱》一书中，塔勒布告诉我们在不确定的世界中的生存法则，他找到并定义了“反脆弱”类事物：每一个事物都会从波动中得到利益或蒙受损失，脆弱性是指因为波动和不确定而承受损失，反脆弱性则是指让自己避免这些损失，甚至从混乱和不确定中获利。\n反脆弱类事物不只受益于混沌，也需要适时出现的压力与危机，如此才能维持生存与实现繁荣。作者还认为，不确定性是件好事，甚至有其存在的必要，并且建议我们培养反脆弱性的特质。反脆弱性超越强韧性或坚固性：强韧性只能够抵抗震动和维持原状；反脆弱性则会让事物变得越来越好。此外，反脆弱性还可以避免预测误差，并且保护事物不受负面“黑天鹅”事件的影响。\n这本书大谈试错法、人生的大小决定、政治、自治市、战争、个人理财、经济体系和医疗系统……风格独树一帜。《反脆弱》性是我们生活在不确定世界中的“导航仪”，也是面对随时可能出现的“黑天鹅”事件的终极自保指南。","month":10,"country":"美国","wereadId":"CB_5CrB4DB6Q5O36z96x6B6t8hB"},{"title":"一只特立独行的猪","author":"王小波","start":"2025-10-18","finish":"2025-11-08","rating":7.8,"pages":"220","doubanLink":"https://book.douban.com/subject/27013708/","cover":"https://neodb.social/m/book/2021/09/16f31af8e3-b9a3-4d3f-9045-ad66d5e9241d.jpg","review":"真诚的一部短文集，观点不算新颖深刻，能看到王小波作为罗素迷弟的好恶。","summary":"王小波杂文精选集，逝世二十周年精装纪念版！\n幽默中充满智性，扛起一面自由、独立、理性的精神旗帜！——“我觉得黑色幽默是我的气质，是天生的。”\n“我已经四十岁了，除了这只猪，还没见过谁敢于如此无视对生活的设置。相反，我倒见过很多想要设置别人生活的人，还有对被设置的生活安之若素的人。因为这个缘故，我一直怀念这只特立独行的猪。”\n王小波说过，你在家里，在单位，在认识的人面前，你被当作一个人看，你被尊重，但在一个没人认识你的地方，你可能会被当成东西对待。我想在任何地方都被当成人，不是东西，这就是尊严。——柴静\n【内容简介】\n本书为王小波的杂文代表作，王小波终其一生思考着并快乐着，他以独有的调侃的笔调完成了对自由与理性的反思与书写。书中对女权主义、科学与迷信、同性恋、小说创作、知识分子等话题进行剖解，展现了一座智性的迷宫，让读者从他那里学会如何独立而自由地思考，真切地体会到作为一个独立个体，应有的尊严与自由。这种观点在上世界九十年代点爆了一代人的青春，放在当下，依然具有鲜活的感染力。\n【编辑推荐】\n★王小波自由、理性的代表作——一杆“敢于无视生活设置”的精神旗帜。\n★自由理性、特立独行、黑色幽默，二十年来王小波的文字像一面猎猎旌旗感召着一代代年轻人，王小波是书店里永不消失的风景！\n★王小波全部作品的独家授权！\n★李银河老师，亲自校勘全稿，并作序追忆对王小波的思念之情。\n★王蒙、王朔、李敬泽、章诒和、徐则臣、徐浩峰、麦家、冯唐、柴静，诸多文坛名家倾情推荐，致敬王小波。","month":11,"country":"中国","wereadId":"912831"},{"title":"惊呆了！原来这就是社会学","author":"[日]田中正人, [日]香月孝史","start":"2025-10-23","finish":"2025-11-12","rating":8,"pages":"292","doubanLink":"https://book.douban.com/subject/35434553/","cover":"https://neodb.social/m/book/2021/09/15c314277c-54da-4484-8574-5ec34c6b610e.jpg","review":"因为买哲学那本搭售了这本社会学，风格和哲学那本类似，第二次看就没那么惊艳了。内容上，也是一如既往，面面俱到，但也只能浅尝则止。读完便忘，我想是在所难免的。","summary":"★ 懂点社会学，走出混沌的日常，理解社会与人生\n★ 76位社会学巨擘×135个社会学核心概念×400幅超可爱漫画\n上至学科奠基人奥古斯特·孔德、埃米尔·涂尔干、格奥尔格·齐美尔、马克斯·韦伯，下至当代中流砥柱安东尼·吉登斯、乔治·瑞泽尔、齐格蒙特·鲍曼——重要的社会思想 家超萌登场；\n从炫耀性消费到文化资本，从社会失范到风险社会，从公共人的衰落到诸众的崛起——重要的社会学概念轻松get！\n想要洞悉习以为常的社会现象背后，隐藏着怎样的本质与规律？这本书画给你看！\n★ 清华大学副教授严飞、华中师范大学教授李钧鹏力荐！\n很多初次接触社会学的探索者，都很好奇社会学是什么、社会学有用吗、社会学会很难懂吗。其实社会学也可以很可爱。通过本书一幅幅通俗易懂的绘画图解，我们看到社会学从古典到现代的发展脉络，看到各个思想名家的经典社会学概念，以及这些概念的应用场景，让我们在莞尔一笑中，理解我们纷繁复杂的社会。我们只有理解社会，才可以更好地通过反身性的思考理解我们自己。       ——严飞，清华大学社会学系副教授，《穿透：像社会学家一样思考》作者\n研读社会学经典，关键在于将高度抽象的理论表述与自己的日常生活体验结合起来。本书通过有趣的漫画将晦涩的理论形象化，大大降低了社会学的入门难度，即使是研习社会学多年的人，也能有所收获。我在拿到书之前并没有太高的期望，但从翻开第一页起就爱不释手，花了两个晚上心情愉悦地读完，一些此前半懂不懂的概念和理论也变得亲切起来。                                                             ——李钧鹏，华中师范大学社会学院教授","month":11,"country":"日本","wereadId":"3300084674"},{"title":"1Q84 BOOK3","author":"[日]村上春树","start":"2025-10-26","finish":"2025-11-18","rating":7.8,"pages":"424","doubanLink":"https://book.douban.com/subject/30203784/","cover":"https://neodb.social/m/book/2021/11/016a94cc16-93b8-4682-9f8f-336e9584cebc.jpg","review":"有人物，有情节，却读不出故事的意义。","summary":"《1Q84 BOOK 3（10月-12月）》是村上春树长篇小说代表作《1Q84》系列的第三部。\n黄昏在迫近。1Q84年在落幕，青豆在蛰伏之处，似乎听到有人在温柔地呼唤她的名字。有怎样的命运在等待青豆？她能否揭开1Q84年的来龙去脉？天吾又能否穿透《空气蛹》的所有疑云？青豆否和天吾最终能否相见？村上春树如何完成一次突破性结局？现在，再度走进1Q84年完结篇，一切都有了答案！\n《1Q84》以一对年轻男女互相寻觅对方的故事为引，构筑出一部情节复杂、波澜壮阔的长篇。村上春树想将这个时代的世态立体地写出，成为独有的“综合小说”，超越纯文学的类型，在当今时代的空气中嵌入人类的生命。\n《1Q84》系列不仅是村上春树创作40年高峰之作，也是一部绝爱之书、命运之书、时代之书，已成为与《挪威的森林》并重的村上文学经典，被誉为新千年日本文学的里程碑。曾创下上市12天销售100万册纪录，荣登日本、韩国、中国台湾畅销榜年度榜单首位。本次出版的《1Q84 BOOK 3》由知名设计师设计绝美精装收藏版，系列第1册、第2册同时登场。","month":11,"country":"日本","wereadId":"22485612"},{"title":"倦怠社会","author":"[德] 韩炳哲","start":"2025-11-17","finish":"2025-11-23","rating":7.8,"pages":"120","doubanLink":"https://book.douban.com/subject/33442259/","cover":"https://neodb.social/m/book/2021/09/159c52ef24-0453-42f6-8b46-1183d26638ad.jpg","review":"看的电子书，看了进度才发现是非常薄的一本书，但批判这个批判那个，光我识得的名人就有7、8个。记住的观点主要是这个，有一些观察，但并不深刻：功绩社会和积极社会导致了一种过度疲劳和倦怠。过量的肯定性占据了统治地位。无节制地追求效能提升，将导致心灵的梗阻。","summary":"否定性的社会已经消失，取而代之的是充溢着积极性的社会。\n从这一范式转移出发，韩炳哲展示了当今社会的病理形态，其中包括忧郁症、注意力缺乏症、过劳症等精神疾病。它们不是传染病，而是梗阻症，不是由否定性的、免疫学上的他者导致，而是源于过量的肯定性。\n因此，一切免疫学式预防和抵抗措施都失效了。韩的论述最终以一个社会远景结束，他有意赋予其一个含有歧义的名称“倦怠社会”。其中，生命变成了生存，生存导向对健康的狂热崇拜，健康带来了疾病和僵死。\n失去了死亡的否定性，生命自身僵化成为死亡。\n一部为当下全球化时代做出诊断的重要作品。\n********************\n1．这本书讲什么？\n我们的竞争性的、效绩主导的社会正在影响着我们每个人。较之于提高生命质量，多任务处理、用户界面友好的技术正在制造混乱，从抑郁症，到注意力分散，到人格分裂，社会中蔓延着一种普遍的不安情绪。韩炳哲诉诸文学、哲学、社会科学和自然科学以发掘一种可能，在令人疲惫不堪的信息时代里开辟自我的一隅风景。\n2．作者的观点是什么？\n（1）各种精神疾病，如抑郁症、注意力缺陷多动症、边缘性人格障碍或疲劳综合征主导了21世纪初的疾病形态。这都指向一种过度的肯定性，即自我在过度狂热中燃尽了自身。\n（2）功绩社会中的人，虽然摆脱了福柯意义上的规训社会，却又陷入了新的精神规训社会，比起他人的剥削，自我剥削更加严重地导致了自我崩溃。\n（3）“积极生活”的态度导致焦虑和歇斯底里，人们不仅没能实现自由，反而丧失了沉思的幸福。\n（4）作者主张从面对世界的倦怠回归面向自我的倦怠，在孤独和精神寻求中，为自我重建一个闲适空间。在其中人们相互关注，组成亲密的友邻社会。\n（5）作者呼吁重建节日和假日的神圣意义，在其中人们能够感受自我的超越性存在和闲暇，而不只是物质性存在和消费的层面。只有逃离百货商店式的世界，重建节日庆典般的场所，生命才能获得应有的意义。\n3．对我们有什么启发？\n（1）在人人备感生存艰难和生活压力的世界里，努力做得更好是不是唯一的目标和出路？面对越来越多的心理压力和疾病，经济条件和社会地位能否与幸福划上等号？韩炳哲提示我们，短视的和功利的思维方式，必须让位于全局性的和通向未来的智慧。\n（2）思想面对当代社会现状，将会说些什么？思想者应该怎样思想，写作？韩炳哲作品的主题和风格，也为我们提供了可资借鉴的参考样本。\n4．作者是一个怎样的人？\n（1）韩炳哲被誉为“德国哲学界的一颗新星”（西班牙《国家报》）。他回归哲学的人文传统和批判传统，在学院化的哲学研究之外，独辟哲学写作新境界，在数字媒体时代照察社会情况和人类心灵，被誉为“互联网时代的精神分析师”（杨小刚）“大数据时代的哲学批判指南”（思郁）。\n（2）兼具韩国人的浪漫气质和德国哲学传统的理性批判精神。韩炳哲对当代社会的洞察深刻，剖判犀利，而其内在的精神诉求却是宁静沉思的、美学意义的生命存在，具有“东方哲人的细腻与韵味”（夏可君）。\n（3）哲学小品式的文字风格，长于思辨，而又胜在言传。韩炳哲的作品简洁、明快，“充满灵性，锋芒毕现”（贾克防）。诸位中译者的认真细致和精敏才思也为中文版增色颇多。\n（4）法国哲学家阿兰•巴迪欧为其《爱欲之死》作序。韩炳哲在欧美已产生较大影响，作品被译成近20种文字，包括巴迪欧在内的诸多学者对韩炳哲做出了回应和评赞。\n阅读韩炳哲的作品，无论如何都是富有才思智慧的享受。\n——阿兰•巴迪欧（Alain Badiou），法国哲学家\n韩炳哲属于这一类哲学家，在他们之前，没有人寻求改变世界之道，甚至没有人充分意识到这种改变的必要性。\n——《高等教育内部参考》（Inside Higher Ed）\n韩炳哲揭示出，在大数据时代，批判理论将且必将重整旗鼓。\n——威尔•戴维斯（Will Davies）\n5．中文版作品及其评价。\n（1）韩炳哲作品系列图书共9种，包括了作者主要和有代表性的作品，计划于2019年7月份出齐。\n韩炳哲作品系列（见识城邦出品）\n《精神政治学》（已出）\nPsychopolitik\n《爱欲之死》（已出）\nAgonie des Eros\n《在群中》（已出）\nIm Schwarm\n《他者的消失》（6月即出）\nDie Austreibung des Anderen\n《疲怠社会》（6月即出）\nMüdigkeitsgesellschaft\n《娱乐何为》（6月即出）\nGute Unterhaltung\n《暴力拓扑学》（8月即出）\nTopologie der Gewalt\n《透明社会》（8月即出）\nTransparenzgesellschaft\n《美的救赎》（8月即出）\nDie Errettung des Schönen\n（2）在国内学界迅速觅得知音。来自哲学界、艺术界、文学界、传播学界、IT界的诸位大咖分别对韩炳哲及其作品做出了积极回应和高度评价。\n大数据时代形成的纷繁现象，需要新的哲学思维和框架，韩炳哲的几本书堪称最敏锐、最犀利的时代探测器，是大数据时代的哲学批判指南。\n——思郁，自由写作者\n德国哲学家韩炳哲的几本小书，大题小做、举重若轻，触及现代人生活的多个层面，是东西方人文精神碰撞的结晶，走进了读者的心灵。\n——何道宽，资深翻译家，深圳大学\n韩炳哲进一步揭示了数字时代人所面临的困境：我们痴迷于数字媒体从而被重新编程，然而对于后果如何却陷入了盲目和麻木。在群里，每个人都是个人，但每个人又都不是他自己。\n——张志伟，哲学史家，中国人民大学哲学院\n韩炳哲以其哲学的睿智与分析的犀利，迫使我们去反思数字网络媒体时代的生存情调与伦理处境。……在他的思考中透露出东方哲人的细腻与韵味。\n——夏可君，哲学家与策展人，中国人民大学文学院\n韩炳哲，这位德国哲学训练、韩国文化浸润的思想性学者，激活了我们早已麻木的爱欲能力。\n——林光华，中国人民大学国学院\n大数据的应用，让一切都变得越来越精准……在这样的时代，个体的空间与自由需要重新被思考，重新被定义。\n——郑悦，《IT经理世界》杂志\n对新自由主义与数字化阶级社会的分析，不仅仅是一项哲学知识考古学的工作，它在根本上是政治性的，其答案就在于尼采、海德格尔与德里达等哲学家对主体的超越性之中。\n——毛竹，《世界哲学》杂志\n韩炳哲的哲思充满灵性，锋芒毕现。……以其一贯的犀利，带给我凝视深渊的勇气。\n——贾克防，西北师大哲学系\n韩炳哲是互联网时代的精神分析师，在他精确、冷静的诊断之下，智能手机、社交媒体、大数据、物联网种种技术进步都显示出新自由主义秩序对于人类生活的全面宰制。……用短小精悍的文字，与福柯、阿多诺、列维纳斯、阿甘本进行思想碰撞，揭示出这个时代的严峻危机。\n——杨小刚，中山大学哲学系","month":11,"country":"德国","wereadId":"25731054"},{"title":"学日语文法不要想太多","author":"[日]高木直子","start":"2025-10-04","finish":"2025-12-01","rating":7.5,"pages":"170","doubanLink":"https://book.douban.com/subject/5399441/","cover":"https://neodb.social/m/book/2021/10/22c12ecf00-ce55-4fd1-a844-a9e0be4968e5.jpg","review":"有点类似常用短语的单词本，一个短语配上几个例句。漫画画得实在不咋的，目测此作者高木直子不是另外一位漫画畅销的高木直子。","summary":"《学日语文法不要想太多》您会看到都是日本人整理好的文法，只要照着用就行啦！《学日语文法不要想太多》突破过去一成不变的解说模式，每项文法更创新地大量采用活泼动感的漫画插图，上面趣味逗人的小故事，看了肯定让您终身难忘。当然，每项文法为了配合生活、旅游、工作、时事等内容，都附上5个例句，为的是帮助您在例句中发现文法、在例句中活用文法哦！","month":12,"country":"日本","wereadId":"3000140519"},{"title":"怒","author":"[日] 吉田修一","start":"2025-11-19","finish":"2025-12-08","rating":8.1,"pages":"396","doubanLink":"https://book.douban.com/subject/26760976/","cover":"https://neodb.social/m/book/2021/09/159f1625b5-cbeb-4b4f-a7c3-bedc66c9850f.jpg","review":"如果分类是放在推理书架上，的确会惹人「怒」。\n故事还是值得一读，喜欢冲绳。","summary":"★因为自信，你才会信任他人；因为缺乏自信，你才会对他人心生愤怒。\n★《周刊文春》推理TOP10！书店大奖入围作！\n★日本跨界纯文学与通俗文学的天才、实力派作家吉田修一，狂销200万册的《恶人》之后最新代表作。\n★推理小说的阅读快感；社会小说的思考深度；纯情小说的情感容量   ，爆炸性结尾，让人忍不住一口气读到底！\n★同名电影阵容华丽，渡边谦、妻夫木聪主演；《恶人》导演李相日执导。\n2011的夏天，东京郊外一对普通夫妇惨遭杀害。\n凶手山神一也作案后逗留屋内长达六个小时，并用被害人的血在墙上留了一个“怒”字，方才离去。\n案件的凶残性让人发指，其动机则让警方困惑。\n一年后，经过微整容的山神依旧在逃。而此时，三地分别有三个来路不明的男子，日渐融入当地的生活。\n房总渔港的田代、东京市区的直人、冲绳附近离岛的田中，三个人各与通缉犯山神有着某种程度的暗合。\n那些接纳陌生人并付出情感的人们迟迟注意到第二次公布的通缉信息，信任与爱被放到了天平上。\n谁是凶手？\n你又如何能相信身边的他不是凶手？","month":12,"country":"日本","wereadId":"29790383"},{"title":"罗宾计划","author":"[日] 横山秀夫","start":"2025-11-25","finish":"2025-12-13","rating":7,"pages":"352","doubanLink":"https://book.douban.com/subject/37115819/","cover":"https://neodb.social/m/item/book/2026/01/05/67aec3f0-7ee7-4b6a-9a93-a4ae237e84b9.jpg","review":"人物设定过于脸谱化，逻辑设定相当多站不住脚，既不本格、也不社会。","summary":"☆ 几近完美的出道之作！横山秀夫“一笔入魂”梦幻首作！\n☆ 获第九届三得利推理小说大奖佳作奖，改编电视剧由上川隆也领衔主演\n☆ 人性的残酷与温柔，都被剖开在眼前，直扎你心。\n————————\n在警局的年终酒宴上，一张紧急纸条带来惊人消息：\n十五年前的女教师自杀案实为他杀 ，嫌疑人为当晚潜入校园的三名问题学生。\n案件追诉时效即将过期，仅剩二十四小时！\n警方紧急重启调查，发现案件背后不仅隐藏着女教师的死亡真相，还交织着不为人知的秘密与不堪。\n更令人震惊的是，这起案件似乎与“昭和三大悬案”之一的“三亿日元抢劫案”有着千丝万缕的联系。\n极限追凶过程中，警方揭开一个个谜团，却不知自己正步入一个更加错综复杂的阴谋之中……\n————————\n[日]横山秀夫 | 著\nHideo Yokoyama\n日本推理小说作家，日本警察小说创作领域的翘楚、坚持“一笔入魂”的社会派作家，号称日本文坛“平成的松本清张”，曾获松本清张奖、日本推理作家协会奖，并获得国际匕首奖提名。\n他的作品刻画了警视厅群像、内部的权力斗争，以及事 件背后的人性与社会性，被评论界视为“新警察小说”。\n本书是其首部作品，获第九届三得利推理小说大奖佳作奖。\n————————\n王蕴洁 | 译\n日语译者。译有上百部日语文艺作品，包括松本清张、太宰治、奥田英朗、宫部美雪、小野不由美、绫辻行人等多位日本名家的作品。","month":12,"country":"日本","wereadId":"CB_Ecu56S5569fK70A71F3482lb"},{"title":"克拉拉与太阳","author":"[英] 石黑一雄","start":"2025-12-09","finish":"2025-12-23","rating":8.4,"pages":"392","doubanLink":"https://book.douban.com/subject/35315153/","cover":"https://neodb.social/m/book/2021/09/156cf6bc6e-4c54-43f8-92ed-6e7f9cce2161.jpg","review":"观察一个事物必须保持适当的距离，作者以自身人类的角度站在AF克拉拉的第一人称视角来观察人类，就是一个非常好的距离。全书探讨了科技污染、基因编辑、身份认同、家长焦虑、自我欺骗等诸多社会与科幻议题，在大语言模型日新月异的2025年，看着特别感触。\n人是最矛盾的存在，最像人的恰恰是非人，而人类却在科技理性的影响下变得越来越机械化。\n","summary":"“太阳总有办法照到我们，不管我们在哪里。”\n~\n克拉拉是一个专为陪伴儿童而设计的太阳能人工智能机器人（AF），具有极高的观察、推理与共情能力。她坐在商店展示橱窗里，注视着街头路人以及前来浏览橱窗的孩子们的一举一动。她始终期待着很快就会有人挑中她，不过，当这种永久改变境遇的可能性出现时，克拉拉却被提醒不要过分相信人类的诺言。\n在《克拉拉与太阳》这部作品中，石黑一雄通过一位令人难忘的叙述者的视角，观察千变万化的现代社会，探索了一个根本性的问题：究竟什么是爱？\n~\n“你相信有‘人心’这回事吗？\n我不仅仅是指那个器官，当然喽。\n我说的是这个词的文学意义。\n人心。你相信有这样东西吗？\n某种让我们每个人成为独特个体的东西？”","month":12,"country":"英国","wereadId":"37072270"},{"title":"A Brief History of the Philosophy of Time","author":"Bardon, Adrian","start":"2025-12-16","finish":"2025-12-26","rating":8.1,"pages":"208","doubanLink":"https://neodb.social/book/6jwd5Dvymlku1Z31X5QJRo","cover":"https://neodb.social/m/book/2021/11/024b3b36d8-7c62-4d61-a4e1-dc288b09795a.jpg","review":"从哲学、物理、逻辑各种方面将人类对时间定义、意义的探索，篇幅不长，但并不算易读。喜欢其中反证动态性时间的时候用的循环论证。如作者所说，时间不是问题，而是答案，我们永远也无法跳出自身的背景去把我宇宙或其法则。也许我们只能在具体的感受中作出一种心理投射，可能是实在论、关系论或理念论（这倒有点像光的波粒二象性）。","summary":"Adrian Bardon's A Brief History of the Philosophy of Time is a short yet thorough introduction to the history, philosophy, and science of the study of time-from the pre-Socratic philosophers through Einstein and beyond. Its treatment is roughly chronological, starting with the ancient Greek philosophers Heraclitus and Parmenides and proceeding through the history of Western philosophy and science up to the present. Using illustrations and keeping technical language to a minimum, A Brief History of the Philosophy of Time covers subjects such as time and change, the experience of time, physical and metaphysical approaches to the nature of time, the direction of time, time-travel, time and freedom of the will, and scientific and philosophical approaches to eternity and the beginning of time. Bardon brings the resources of over 2500 years of philosophy and science to bear on some of humanity's most fundamental and enduring questions.","month":12,"country":"美国","wereadId":"CB_FYUEtCEtv6z16Rz6Pw"}];
    const wereadData = {"635800":{"rating":890,"ratingCount":29686,"chapters":[{"title":"第十六章 资本主义教条","chapterUid":53,"chapterIdx":23},{"title":"第十五章 科学与帝国的联姻","chapterUid":52,"chapterIdx":22},{"title":"第十二章 宗教的法则","chapterUid":48,"chapterIdx":18},{"title":"第二章 知善恶树","chapterUid":36,"chapterIdx":6},{"title":"第五章 史上最大骗局","chapterUid":40,"chapterIdx":10},{"title":"第十三章 成功的秘密","chapterUid":49,"chapterIdx":19},{"title":"第六章 盖起金字塔","chapterUid":41,"chapterIdx":11},{"title":"第十一章 帝国的愿景","chapterUid":47,"chapterIdx":17},{"title":"第十章 金钱的味道","chapterUid":46,"chapterIdx":16}],"highlights":[{"text":"自从认知革命之后，智人就能依据不断变化的需求迅速调整行为。这等于开启了一条采用“文化演化”的快速道路，而不再停留在“基因演化”这条总是堵车的道路上。","chapter":"第二章 知善恶树","color":5,"_order":6},{"text":"有限公司”的英文称为“corporation”​，这点颇为讽刺，因为这个字的语源是“corpus”​（拉丁文的“身体”​）​，而这正是有限公司所没有的。虽然公司并没有真正的实体，但在法律上我们却将它称为“法人”​，好像它真的是有血有肉的人一般。","chapter":"第二章 知善恶树","color":5,"_order":6},{"text":"如果要衡量某种物种演化成功与否，评断标准就在于世界上其DNA螺旋的拷贝数的多寡。这很类似于货币的概念，就像今天如果要说某家公司行不行，我们看的是它的市值有多少钱，而不是它的员工开不开心；物种的演化成功，看的就是这个物种DNA拷贝数在世界上的多寡。如果世界上不再有某物种的DNA拷贝，就代表该物种已经绝种，也等于公司没有钱而宣告倒闭。而如果某个物种还有许多个体带着它的DNA拷贝存在这个世上，就代表着这个物种演化成功、欣欣向荣。从这种角度看来，1000份DNA拷贝永远都强过100份。这正是农业革命真正的本质：让更多的人却以更糟的状况活下去。","chapter":"第五章 史上最大骗局","color":5,"_order":10},{"text":"创立犬儒学派的希腊哲学家第欧根尼(Diogenes)，就住在一个桶里。据说有一天他正在做日光浴，当时权倾天下的征服者亚历山大大帝来找他，想知道他是否需要些什么，而且保证自己会尽力协助。第欧根尼回答：​“确实，有件事可以请你帮个忙。麻烦你移动一下，别再挡住我的阳光。​”","chapter":"第六章 盖起金字塔","color":5,"_order":11},{"text":"一开始，英文讲到人人生而平等用的词是“create”​（创造）​，但生物学并没有“创造”​，而是演化。演化铁定没有“平等”这回事，所谓平等的概念，是与“创造”的概念紧密相关。美国人的“平等”观念来自基督教，基督教认为每个人的灵魂都是由上帝创造，而所有灵魂在上帝面前一律平等。但是，如果我们不相信基督教那一套关于上帝、创造和灵魂的神话故事，那所谓人人“平等”究竟是什么意思？演化的基础是差异，而不是平等。","chapter":"第六章 盖起金字塔","color":5,"_order":11},{"text":"虽然人类的基因演化仍然一如既往慢如蜗牛，但人类的想象力却是极速奔驰，建立起了地球上前所未有的大型合作网络。","chapter":"第六章 盖起金字塔","color":0,"_order":11},{"text":"农业带来的压力影响深远，这正是后代大规模政治和社会制度的基础。但可悲的是，虽然农民勤劳不懈、希望能够保障自己未来的经济安全，但这几乎从来未曾实现。不管在任何地方，都出现了统治者和精英阶级，不仅靠着农民辛苦种出的食粮维生，还几乎全征收抢光，只留给农民勉强可过活的数量。","chapter":"第六章 盖起金字塔","color":0,"_order":11},{"text":"所有人类创造的信念系统之中，只有金钱能够跨越几乎所有文化鸿沟，不会因为宗教、性别、种族、年龄或性取向而有所歧视。","chapter":"第十章 金钱的味道","color":0,"_order":16},{"text":"或许我们可以说，在历史曙光乍现的时候，有部分文化确实曾经纯净，没有受到帝国主义原罪和其他社会的玷污。但就在那道曙光之后，已经没有任何文化能够再提出这种主张；地球上现存的已经没有任何所谓纯净的文化。现存的所有人类文化，至少都有一部分是帝国和帝国文明的遗绪，任何以学术或政治为名的手术，如果想把所有帝国的部位一次切除，病人也就必然魂归九霄。","chapter":"第十一章 帝国的愿景","color":5,"_order":17},{"text":"从历史上来看，一神论就像是个万花筒，承继了一神论、二元论、多神论和泛神论，收纳在同一个神圣论述之下。结果就是，基督徒大致上是信奉一神论的上帝，相信二元论的魔鬼，崇拜多神论的圣人，还相信泛神论的鬼魂。像这样同时有着不同甚至矛盾的思想，而又结合各种不同来源的仪式和做法，宗教学上有一个特别的名称：综摄(syncretism)。很有可能，综摄才是全球最大的单一宗教。","chapter":"第十二章 宗教的法则","color":5,"_order":18},{"text":"就算把这些迫害的所有受害者全部加起来，在这3个世纪间，多神教古罗马处决基督徒的人数不超过几千人。[插图]但相对的是，在接下来的1500年间，虽然基督教号称主张爱与怜悯，但仅仅对信仰的诠释有些许差异，就引发基督徒自相残杀，死亡人数达到数百万。","chapter":"第十二章 宗教的法则","color":5,"_order":18},{"text":"有了宗教之后，就能说法律并不只是人类自己的设计和想象，而是来自一种绝对的神圣最高权柄。这样一来，至少某些基本的法则便不容动摇，从而确保社会稳定。因此，我们可以说宗教是“一种人类规范及价值观的系统，建立在超人类的秩序之上”​。","chapter":"第十二章 宗教的法则","color":5,"_order":18},{"text":"这种说法有时称为“迷因学”(memetics)。迷因学假设，就像是生物演化是基于“基因”这种有机信息单位的复制，文化演化则是基于“迷因”(meme)这种文化信息单位的复制。[插图]而所谓成功的文化，就是特别善于复制其迷因，而丝毫不论这对于其人类宿主的成本或利益。","chapter":"第十三章 成功的秘密","color":5,"_order":19},{"text":"对今日许多精英分子而言，要比较判断不同人群的优劣，几乎讲的总是历史上的文化差异，而不再是种族上的生物差异。我们不再说“这就存在于他们的血液里”​，而是说“这就存在于他们的文化里”​。","chapter":"第十五章 科学与帝国的联姻","color":0,"_order":22},{"text":"接下来，英、法、德各国学者开始把对雅利安人的语言学理论与达尔文的自然选择理论结合，认为所谓的“雅利安人”不只是语言族群，而是某种生物族群，也就是一个种族。而且，这可不是什么随随便便的种族，而是一个上等种族，他们身材高大、金发碧眼、工作勤奋而且极度理性，他们就这样从北方的迷雾中走出来，奠定了全世界文化的基础。但遗憾的是，入侵印度和波斯的雅利安人开始与当地原住民通婚，于是不再有白晳的肤色与金发，也失去了理性和勤奋。于是，印度和波斯的文明每况愈下。但在欧洲可就不同了，雅利安人还是维持着纯洁无污染的种族特性。正因如此，欧洲人必须要征服世界，而且他们最适合做世界的统治者；不过可得小心，别遭到其他劣等种族混血污染。","chapter":"第十五章 科学与帝国的联姻","color":5,"_order":22},{"text":"自从威廉·琼斯提出所有印欧语言同源同宗、来自某一个特定的远古语言，学者前仆后继，都渴望找出究竟是谁曾经说着这种语言。他们注意到，最早的梵语母语民族是在大约3000年前、从中亚入侵印度，他们自称为“雅利亚”(Arya)。而最早的波斯语母语者则自称为“艾利亚”(Airiia)。于是欧洲学者推测，这些讲着梵语和波斯语（以及希腊语、拉丁语、哥特语、凯尔特语）原始语言的人，一定是某种“雅利安人”(Aryan)。","chapter":"第十五章 科学与帝国的联姻","color":5,"_order":22},{"text":"中国和波斯其实并不缺乏制作蒸汽机的科技（当时要照抄或是购买都完全不成问题）​，他们缺少的是西方的价值观、故事、司法系统和社会政治结构，这些在西方花了数个世纪才形成及成熟，就算想要照抄，也无法在一夕之间内化。之所以法国和美国能够很快跟上英国的脚步，是因为他们本来就和英国共享一套最重要的故事和社会结构。而中国和波斯总是追赶不及，则是因为整个关于社会的想法和组织就是不同。","chapter":"第十五章 科学与帝国的联姻","color":5,"_order":22},{"text":"在新的资本主义教条里，最神圣的开宗明义第一条就是：​“生产的利润，必须再投资于提高产量。​”资本主义之名正是由此而来。","chapter":"第十六章 资本主义教条","color":0,"_order":23},{"text":"亚当·斯密明确提出：人类全体财富的基础，就在于希望增加个人利润的自私心理。这一点可以说是人类历史上最革命性的概念，而且还不只是从经济的角度，也包括道德和政治的角度。他其实告诉我们：贪婪是好的，而且我们让自己过得好的时候，不只是自己得利，还能让他人受益。​“利己”就是“利他”​。","chapter":"第十六章 资本主义教条","color":5,"_order":23}],"thoughts":[{"text":"所以「师夷长技以制夷」的出发点虽然对，但如果「师」的「技」的落脚点仅仅是技能和技术，而不是「道」、「学」、「体」，那便顶多只能望其项背，最终陷入「器物革新而制度依旧」的困境。\n真正的「师夷」，必须触及文明的核心——为何西方能孕育出科学革命？为何专利法能激励创新？为何议会制能平衡权力？这些问题的答案不在蒸汽机的齿轮中，而在启蒙思想、契约精神与公民社会的土壤里。","quote":"中国和波斯其实并不缺乏制作蒸汽机的科技（当时要照抄或是购买都完全不成问题），他们缺少的是西方的价值观、故事、司法系统和社会政治结构，这些在西方花了数个世纪才形成及成熟，就算想要照抄，也无法在一夕之间内化。之所以法国和美国能够很快跟上英国的脚步，是因为他们本来就和英国共享一套最重要的故事和社会结构。而中国和波斯总是追赶不及，则是因为整个关于社会的想法和组织就是不同。","chapter":"","_order":9999},{"text":"我倒是想起了《来自新世界》","quote":"也已经创造出某种天才老鼠，在记忆和学习能力上大有长进。","chapter":"","_order":9999},{"text":"一、多样性才是演化的基础；\n二、即使按照纳粹的理论，那么最终筛选出来的也仅是适合其当下生存的强人。在一个变化的世界中，将所有鸡蛋放在一个篮子里才是危险的。","quote":"课本里接着又从希特勒的《我的奋斗》(Mein Kampf)引了一段：​“想要违抗自然铁律的人，也就是违抗了那些他应该感谢、让他得以为人的原则。与自然对抗，只会带来人类自己的毁灭。​”","chapter":"","_order":9999},{"text":"民族是《想象的共同体》","quote":"不会发现组织自己生活的种种秩序其实是想象：","chapter":"","_order":9999}],"popularHighlights":[{"text":"不过就在6万年前，有一头母猿产下两个女儿，一头成了所有黑猩猩的祖先，另一头则成了所有人类的祖奶奶。","count":8411,"chapter":"第一章 人类：一种也没什么特别的动物","_order":5},{"text":"智人之所以能征服世界，是因为有独特的语言。","count":7788,"chapter":"第一章 人类：一种也没什么特别的动物","_order":5},{"text":"人类历史上众多的灾难，不论是生灵涂炭的战乱还是生态遭逢的浩劫，其实都是源自这场过于仓促的地位跳跃。","count":7744,"chapter":"第一章 人类：一种也没什么特别的动物","_order":5},{"text":"那么，究竟是为什么，才驱使人类的大脑在这200万年间不断这样演化？坦白说，我们也不知道。","count":5152,"chapter":"第一章 人类：一种也没什么特别的动物","_order":5},{"text":"除了存在于人类共同的想象之外，这个宇宙中根本没有神、没有国家、没有钱、没有人权、没有法律，也没有正义。","count":17120,"chapter":"第二章 知善恶树","_order":6},{"text":"这里的秘密很可能就在于虚构的故事。就算是大批互不相识的人，只要同样相信某个故事，就能共同合作。","count":11880,"chapter":"第二章 知善恶树","_order":6},{"text":"人类和黑猩猩之间真正不同的地方就在于那些虚构的故事，它像胶水一样把千千万万的个人、家庭和群体结合在一起。这种胶水，让我们成了万物的主宰。","count":10795,"chapter":"第二章 ","color":0,"_order":3},{"text":"“这就是幸福和美德的秘密——喜欢上你们要做的事情。所有设置的目的都在于：让人们喜欢上他们无法逃避的社会命运。”","chapter":"第2章","color":0,"_order":4},{"text":"玫瑰花和电击，德尔塔穿土黄色衣服，再加上阿魏树脂的香味——在孩子们能够说话之前这些东西已经不可分割地融合成一体。然而，这种无语的条件设置很粗糙，而且是集体进行，无法实现精细的差别，无法灌输更加复杂的行为课程。因为这样的课程需要语言，而且只需要非理性的语言。简而言之，这就是睡眠教育。","chapter":"第3章","color":5,"_order":5},{"text":"我那个时代，我是个优秀的物理学家。太优秀了，足以意识到我们所有的科学不过是一本烹饪书，里面都是正统的炒菜理论，不允许提出疑问，只有得到掌勺师傅的特殊允许才能增添菜谱。我曾经也是个好奇的年轻洗碗工。","chapter":"第17章","color":5,"_order":19},{"text":"“不用说还有衰老、丑陋和性无能的权利，要求生梅毒、得癌症的权利，食物匮乏的权利，令人讨厌的权利，为明天担惊受怕的权利，感染伤寒的权利，遭受种种无法言说的痛苦折磨的权利。​”他们陷入了久久的沉默之中。","chapter":"第18章","color":0,"_order":20},{"text":"文明绝对不需要高尚或英雄主义，这些东西是政治无能的表征。像我们这样组织合理的社会，没有人有机会做高尚或英雄主义的事情。","chapter":"第18章","color":0,"_order":20},{"text":"“且把它称为文明之错吧。上帝与机械、科学医药、普世幸福是不可同时存在的。你必须做出选择。我们的文明选择了机械、医学和幸福，这就是我把这些书锁在保险柜里的原因。它们是污秽的东西，人们会被它们吓坏的。​”","chapter":"第18章","color":0,"_order":20}],"thoughts":[{"text":"野蛮人要捍卫的是他的消极自由，免于外接干涉的自由。而积极自由则是实现自我主导的自由，但积极自由的鼓吹者可能会将自我分为寻求欲望满足的低级自我和寻求价值实现的高级自我。通过否定低级自我，外部权威（如国家、领袖）声称其代表“真实自我”，强制个体服某种更高目标。即统治者以解放人民或实现真正自由为名，剥夺个人的选择权，从而导致极权主义政权。\n\n--以上来自以赛亚柏林的思想。\n\n伯林的自由理论揭示了自由概念的双重性：  \n- 消极自由是防御性的，保护个人免受外界干涉；  \n- 积极自由是进取性的，追求自我实现，但需警惕其被权威滥用的风险。  \n极权社会的形成，往往源于积极自由逻辑的扭曲——以“真正的自由”为名，剥夺个体的选择权。","quote":"“不用说还有衰老、丑陋和性无能的权利，要求生梅毒、得癌症的权利，食物匮乏的权利，令人讨厌的权利，为明天担惊受怕的权利，感染伤寒的权利，遭受种种无法言说的痛苦折磨的权利。​”他们陷入了久久的沉默之中。","chapter":"","_order":9999},{"text":"Take the blue pill.","quote":"当时我有两个选择：要么被送到岛上去，在那我可以继续进行纯粹的科学研究，要么加入总管委员会，有望在合适的时候接替总管职位。我选择了这个，放弃了科学。​”","chapter":"","_order":9999},{"text":"有意思的比喻","quote":"我那个时代，我是个优秀的物理学家。太优秀了，足以意识到我们所有的科学不过是一本烹饪书，里面都是正统的炒菜理论，不允许提出疑问，只有得到掌勺师傅的特殊允许才能增添菜谱。我曾经也是个好奇的年轻洗碗工。","chapter":"","_order":9999},{"text":"多样性才是演化的基础。","quote":"智力过高给赫姆霍尔兹·华生带来的影响与伯纳德·马克思因为身体缺陷受到的影响类似。","chapter":"","_order":9999},{"text":"That which is not tracked in language will be lost. 这是奥威尔的理论，他认为人们需要概念化的工具才能保有辨别的能力。","quote":"语言就像X光线一样，如果你使用恰当的话——它们可以揭示任何东西。你阅读的时候，就会被穿透。","chapter":"","_order":9999},{"text":"🔴💊 or 🔵💊","quote":"由于运气和能力，也许耕耘未必能带来收获，但是恩赐来的幸福和捕猎来的痛苦之间，你选什么呢？","chapter":"","_order":9999}],"popularHighlights":[{"text":"当你每天都幸福得晕眩时，为什么还会需要毕加索或者莎士比亚？文学艺术往往是为了表达冲突，超越痛苦，那么，在一个冲突和痛苦根本不存在的世界里，文学艺术也就变成了社会的“阑尾”。","count":8932,"chapter":"第1章 代序：你还要些什么","_order":3},{"text":"这个新世界如此美好，它只有一个小小的缺陷——在那里，幸福的人们全都是“被幸福”的。","count":7701,"chapter":"第1章 代序：你还要些什么","_order":3},{"text":"所有那些信奉“精英治国”、信奉“稳定高于一切”、信奉“老百姓无非就是关心吃饱穿暖”的人，都会是“美好新世界”的热情粉丝。","count":2970,"chapter":"第1章 代序：你还要些什么","_order":3},{"text":"如果说奥威尔的《一九八四》里，人们为失去自由而痛苦，那么赫胥黎的《美丽新世界》里，人们则为摆脱了自由的重负而狂喜。","count":2145,"chapter":"第1章 代序：你还要些什么","_order":3},{"text":"这就是幸福和美德的秘密——喜欢上你们要做的事情。所有设置的目的都在于：让人们喜欢上他们无法逃避的社会命运。","count":12848,"chapter":"第2章","_order":4},{"text":"不过，如果想成为社会良民，过上幸福的生活，还是尽可能地少知道为好。大家都知道，细节成就美德和幸福，而概况从掌握知识的角度来说是必需的，但可不是什么好东西。社会的支柱是木匠和集邮者，不是哲学家。","count":4301,"chapter":"第2章","_order":4},{"text":"报春花和风景都有一个严重缺陷：都是免费的。热爱大自然使得工厂忙不起来，于是决定消除人对大自然的热爱，至少是下层阶级对大自然的热爱。","count":4352,"chapter":"第3章","_order":5},{"text":"最终，孩子的思想就是这些暗示，这些暗示就成为孩子的思想。不仅仅是孩子的思想，也是他们成年后的思想，一生如此——判断、渴望和决策的思想就由这些暗示组成。可是，这一切暗示都是我们的暗示啊！","count":4279,"chapter":"第3章","_order":5},{"text":"在婴儿的脑海中，书本、花朵与噪声、电击已经一一对应起来。两百次相同或类似的经历之后，这些对应已经不可分割。这种人为的联系，大自然是无力分开的。","count":2502,"chapter":"第3章","_order":5},{"text":"一个人如果觉得自己被人瞧不起，往往也会摆出一副瞧不起别人的样子。","count":2470,"chapter":"第4章","_order":6},{"text":"真是奇怪，让人们玩一些对促进消费毫无用处的精巧游戏，想象一下，真是愚蠢的行为。真是愚蠢。","count":2250,"chapter":"第4章","_order":6},{"text":"语言就像X光线一样，如果你使用恰当的话——它们可以揭示任何东西。你阅读的时候，就会被穿透。","count":2533,"chapter":"第5章","_order":7},{"text":"大家的讥讽嘲笑让他觉得自己是个局外人。有了局外人的感觉，他的举止也变得像个局外人，这又加深了大家对他的偏见，更加因为他的身体缺陷而轻视他，对他充满了敌意。反过来，这又加剧了他的局外感和孤独感。","count":2304,"chapter":"第5章","_order":7},{"text":"“真高兴我不是个埃普西隆。”列宁娜信服地说道。 “如果你是个埃普西隆，”亨利说，“你的设置会让你为自己不是个贝塔或阿尔法同样感到欣慰。”","count":2652,"chapter":"第6章","_order":8},{"text":"如果一个人与众不同，他注定要孤独。他们对与众不同的人非常残忍。","count":3012,"chapter":"第9章","_order":11},{"text":"日子一天天过去，成功在伯纳德脑子里滋滋地冒着泡，在这个过程中他与这个世界完全和解（像一切美妙的麻醉剂都能够做到的一样），虽然他曾经对它是如此不满。既然世界承认了他的重要性，那么一切秩序都是好的。","count":8022,"chapter":"第12章","_order":14},{"text":"朋友的一个主要功能就是（轻微地象征性地）经受一下我们希望施加，但却无法向敌人实行的惩罚。","count":4246,"chapter":"第13章","_order":15},{"text":"与受苦受难付出的高昂代价相比，实际的幸福往往显得卑劣。稳定当然不如动荡来得热闹。知足常乐绝不如与不幸做努力抗争那么有魅力，也没有抗拒诱惑，或抗拒被激情和怀疑毁灭那么引人入胜。幸福绝不是宏伟壮观的。","count":3564,"chapter":"第17章","_order":19},{"text":"但是我不喜欢舒服。我要上帝，我要诗歌，我要真正的危险，我要自由，我要善良，我要罪恶。","count":4806,"chapter":"第18章","_order":20},{"text":"慢慢地，非常缓慢地，像圆规的两只脚，那双腿不紧不慢地向右边转过来，向北、东北、东、东南、南、西南偏南晃去，然后停一下，几秒钟后又接着不紧不慢往左边转回来，晃向西南偏南、南、东南、东……","count":3495,"chapter":"第19章","_order":21}]},"855833":{"rating":767,"ratingCount":23136,"chapters":[{"title":"第7章 “好……现在”","chapterUid":29,"chapterIdx":12},{"title":"第5章 躲躲猫的世界","chapterUid":26,"chapterIdx":9},{"title":"第2章 媒介即认识论","chapterUid":23,"chapterIdx":6},{"title":"第1章 媒介即隐喻","chapterUid":22,"chapterIdx":5}],"highlights":[{"text":"我们可以冒险做一个猜测：那些如今已经习惯于用图画、雕塑或其他具体形象表达思想的人，会发现他们无法像原来一样去膜拜一个抽象的神。犹太人的上帝存在于文字中，或者通过文字而存在，这需要人们进行最精妙的抽象思考。运用图像是亵渎神祇的表现，这样就防止了新的上帝进入某种文化。我们的文化正处于从以文字为中心向以形象为中心转换的过程中，思考一下摩西的训诫对我们也许是有益的。","chapter":"第1章 媒介即隐喻","color":0,"_order":5},{"text":"真理，和时间一样，是人通过他自己发明的交流技术同自己进行对话的产物。","chapter":"第2章 媒介即认识论","color":0,"_order":6},{"text":"对于真理的认识是同表达方式密切相连的。真理不能，也从来没有毫无修饰地存在。它必须穿着某种合适的外衣出现，否则就可能得不到承认，这也正说明了“真理”是一种文化偏见。","chapter":"第2章 媒介即认识论","color":0,"_order":6},{"text":"摄影本身无法再现无形的、遥远的、内在的和抽象的一切。它无法表现“人”，只能表现“一个人”；不能表现“树”，只能表现“一棵树”。","chapter":"第5章 躲躲猫的世界","color":0,"_order":9},{"text":"电报对于印刷术统治下的话语定义进行了三路进攻，遭到攻击后的话语内容无聊、表现无力、形式散乱。之所以会这样，是因为电报使脱离语境的信息合法化，也就是说，信息的价值不再取决于其在社会和政治对策和行动中所起的作用，而是取决于它是否新奇有趣。电报把信息变成了一种商品，一种可以置用处或意义于不顾而进行买卖的东西。","chapter":"第5章 躲躲猫的世界","color":0,"_order":9},{"text":"我们的分歧在于，我认为“这里”和“那里”，“此时”和“彼时”，一个段落和另一个段落，都应该是彼此相连、前后贯通的，都属于同一思想世界的一部分。这是印刷术话语的方式，印刷术是我“来自”的世界，他们都这么说。而他们来自一个完全不同的话语世界：电视中“好……现在”的世界。在他们的世界里，一切都是没有连贯性的。在这样一个被割裂的世界里，我们无法通过识别自相矛盾来检验正误，因为自相矛盾根本不存在。","chapter":"第7章 “好……现在”","color":0,"_order":12},{"text":"假信息并不意味着错误的信息，而是意味着使人产生误解的信息——没有依据、毫无关联、支离破碎或流于表面的信息——这些信息让人产生错觉，以为自己知道了很多事实，其实却离事实的真相越来越远。","chapter":"第7章 “好……现在”","color":0,"_order":12}],"thoughts":[{"text":"对一切抽象事物和概念的理解都要借助语言，所有图像本身都只能是具象的实例，观者之所以能找到共鸣、通感，必定要通过语言的思索，将具象抽离成概念。","quote":"摄影本身无法再现无形的、遥远的、内在的和抽象的一切。它无法表现“人”，只能表现“一个人”；不能表现“树”，只能表现“一棵树”。","chapter":"","_order":9999},{"text":"一、一种重要的新媒介会改变话语结构，其创造出来的认识论是有高低之分的。\n二、新媒介的出现会改变符号环境的性质，不存在新旧媒介平等的共存，积累的变化终会达到临界点。\n三、每一种思想的新工具出现都会达到某种有得有失的平衡，印刷术中心地位让位电视后，公众话语的严肃性、明确性和价值都做了让步。","quote":"我不想过于简单地看待这个变化。这里，我想用三点来做个总结，并以此答复细心的读者可能已经提出的相反观点。","chapter":"","_order":9999},{"text":"真理也许是客观的，但认识真理的人必定是主观的","quote":"对于真理的认识是同表达方式密切相连的。真理不能，也从来没有毫无修饰地存在。它必须穿着某种合适的外衣出现，否则就可能得不到承认，这也正说明了“真理”是一种文化偏见。","chapter":"","_order":9999}],"popularHighlights":[{"text":"奥威尔担心我们憎恨的东西会毁掉我们，而赫胥黎担心的是，我们将毁于我们热爱的东西。","count":11375,"chapter":"前言","_order":3},{"text":"奥威尔警告人们将会受到外来压迫的奴役，而赫胥黎则认为，人们失去自由、成功和历史并不是“老大哥”之过。在他看来，人们会渐渐爱上压迫，崇拜那些使他们丧失思考能力的工业技术。","count":8000,"chapter":"前言","_order":3},{"text":"政治家原本可以表现才干和驾驭能力的领域已经从智慧变成了化妆术。","count":17685,"chapter":"第1章 媒介即隐喻","_order":5},{"text":"分分秒秒的存在不是上帝的意图，也不是大自然的产物，而是人类运用自己创造出来的机械和自己对话的结果。","count":15408,"chapter":"第1章 媒介即隐喻","_order":5},{"text":"我们认识到的自然、智力、人类动机或思想，并不是它们的本来面目，而是它们在语言中的表现形式。我们的语言即媒介，我们的媒介即隐喻，我们的隐喻创造了我们的文化的内容。","count":13800,"chapter":"第1章 媒介即隐喻","_order":5},{"text":"与其说经济学是一门科学，还不如说它是一种表演艺术，丰田每年的广告预算已经证明了这一点。","count":12420,"chapter":"第1章 媒介即隐喻","_order":5},{"text":"深入一种文化的最有效途径是了解这种文化中用于会话的工具。","count":10872,"chapter":"第1章 媒介即隐喻","_order":5},{"text":"在电视上，话语是通过视觉形象进行的，也就是说，电视上会话的表现形式是形象而不是语言。","count":9954,"chapter":"第1章 媒介即隐喻","_order":5},{"text":"商品的质量和用途在展示商品的技巧面前似乎是无足轻重的。","count":8970,"chapter":"第1章 媒介即隐喻","_order":5},{"text":"虽然联邦新闻法没有明文规定，那些不上镜的人其实已被剥夺了向大众播报所谓“今日新闻”的权利，但是那些在镜头前魅力四射的人确实可以拥有超过百万美元的年薪。","count":8892,"chapter":"第1章 媒介即隐喻","_order":5},{"text":"在这个过程中，我们学会了漠视日出日落和季节更替，因为在一个由分分秒秒组成的世界里，大自然的权威已经被取代了。","count":8176,"chapter":"第1章 媒介即隐喻","_order":5},{"text":"根据这个观点，我们应该把焦点放在人类会话的形式上，并且假定我们会话的形式对于要表达的思想有重大的影响，容易表达出来的思想自然会成为文化的组成部分。","count":7480,"chapter":"第1章 媒介即隐喻","_order":5},{"text":"对于真理的认识是同表达方式密切相连的。真理不能，也从来没有毫无修饰地存在。它必须穿着某种合适的外衣出现，否则就可能得不到承认，这也正说明了“真理”是一种文化偏见。","count":18064,"chapter":"第2章 媒介即认 4．反垄断大刀会砍出什么","chapterUid":21,"chapterIdx":21},{"title":"05．为何广东的油价比江西贵","chapterUid":10,"chapterIdx":10},{"title":"06．芯片价格波动为何如此剧烈","chapterUid":12,"chapterIdx":12},{"title":"13．水务交易的买家是谁","chapterUid":20,"chapterIdx":20},{"title":"08．资本家养猪是圈地抢钱吗","chapterUid":14,"chapterIdx":14},{"title":"04．宜家是做家居还是做地产的","chapterUid":9,"chapterIdx":9},{"title":"10．小企业为何难抗价格风险","chapterUid":16,"chapterIdx":16},{"title":"93．范式与硬核：什么是科学","chapterUid":121,"chapterIdx":121},{"title":"45．互惠圈如何塑造人性","chapterUid":60,"chapterIdx":60},{"title":"第三章 不想垄断的竞争者不是好竞争者","chapterUid":17,"chapterIdx":17}],"highlights":[{"text":"报纸价格高于零只是为了防止被直接送去废品站，如果报社确信你会认真阅读，他会很乐意免费赠阅，所以，当赠阅成本极低且网页无法被送去废品站时，雅虎和谷歌便可为我们提供大量优质的免费服务了","chapter":"04．宜家是做家居还是做地产的","color":0,"_order":9},{"text":"地区差别定价只是垄断国企榨取消费者剩余的手段之一，另一种同样常见的手段是时序差价，即先定一个很高的价格，等支付意愿最高的那批消费者买完之后，把价格降低一点，卖给支付意愿稍低者，如此阶梯式进行，可以把消费者剩余充分榨干。这种策略多用于那些较少重复购买的大件耐用消费品，如早先的电话，垄断电信公司就采用了逐级降价策略。","chapter":"05．为何广东的油价比江西贵","color":0,"_order":10},{"text":"与第三种方法不同，期货市场没有减少风险，而是把它从那些试图规避风险的市场参与者那里转移到了愿意利用风险来牟利的期货炒家那里。","chapter":"06．芯片价格波动为何如此剧烈","color":0,"_order":12},{"text":"成熟的市场会发展出各种方法来摆脱蛛网波动：养殖者可与批发商事先签订收购合约，但散户往往缺乏谈判能力，也难以负担交易成本，因而规模化养殖会得到鼓励；其次，与钢铁企业投资铁矿一样，通过上下游整合或参股也可以规避价格风险；最后，期货市场可为养殖者、经销商和肉制品商提高价格避险手段","chapter":"08．资本家养猪是圈地抢钱吗","color":0,"_order":14},{"text":"小规模分散养殖的问题在于，受制于高昂的议价、签约和执行成本，单一农户很少能与上下游（饲料供应商和生猪收购者）进行事先议价和签约，而只能依据事后的价格信号来做决策，这就难以避免传统养殖业中常见的蛛网式价格波动：每次短缺造成价格上涨都会刺激养殖户大量增产，导致下一年的过剩和跌价，于是养殖户又减产并导致第三年的短缺和涨价，如此往复循环，养殖户和经销商都不堪其扰。","chapter":"08．资本家养猪是圈地抢钱吗","color":5,"_order":14},{"text":"中小企业历来被视为创造力、经营灵活性和企业家精神的来源，它们在这一轮价格波动中的遭遇是不幸的。对此，政府能做点什么吗？基于上述认识，答案是明显的。首先，应该允许小企业更自由地参与和组织行业协会，小企业无力单独和供应商长期议价，但协会可以提供某种服务于小企业的集体议价机制；其次，要进一步放松对期货市场的管制，允许更多商品种类进入，允许合约创新；最后，还是要继续推动金融市场化，只有充分市场化的银行才能消除对民营中小企业的歧视，让后者获得更多其原本有能力获得的流动资金和信用支持。","chapter":"10．小企业为何难抗价格风险","color":0,"_order":16},{"text":"当原材料价格迅猛上涨时，上述差异便立刻表现出来。由于价格波浪在沿产业链从上游向下游传递时存在时间延迟和弹性阻力，即制造商无法通过制成品的提价将材料成本增量立即和完全地转嫁给下游，这样，长期供货合约就为大企业提供了宝贵的缓冲期，这种合约通常可以保护在它们几个月到一年内免受价格冲击，它们甚至可以利用这个时机压住产成品价格来逼死小企业。而小企业由于缺乏价格避险手段，只能忍受现货市场上已经暴涨了的材料价格，当成本压力超过极限时，便只能停产或者倒闭。","chapter":"10．小企业为何难抗价格风险","color":0,"_order":16},{"text":"罗纳德·科斯有个简单漂亮的总结：我被反垄断法烦透了，假如价格涨了，法官就说是垄断定价，价格跌了，就说是掠夺定价，价格不变，就说是勾结定价[插图]。","chapter":"第三章 不想垄断的竞争者不是好竞争者","color":5,"_order":17},{"text":"公共品（public good）问题是个充满了混乱和误解的领域，它的定义就很不一致，一种定义是基于“可拥挤性”​：有些东西，多一人少一人用，并不影响使用效果，也不影响服务成本，如无线电视和GPS定位服务，但这样一来，就把文字/视听作品之类显然没有“公共”特性的东西也包括了进来。另一种定义基于“可排他性”​：有些东西的使用不可能或不容易建立排他性，如洁净的空气、道路、灯塔等，这样就很难向使用者收费，大家都等着别人掏钱自己搭便车，结果是大家都没车可搭，用福利经济学术语说就是，这些产品有大量的正外部性。","chapter":"13．水务交易的买家是谁","color":5,"_order":20},{"text":"准确地说，无论教育、医疗还是电力交通水务，过去所发生的变化并非真正的市场化，而仅仅是商业化，它把这些市政部门的供给职能从行政机构中剥离出来，赋予其单一的财务目标，以及相应的投资、经营和定价权，从而实现了组织上的企业化和行为上的商业化。但这些领域的开放市场却从未建立，行政垄断没有打破，供方准入没有放开，消费者选择权也没有确立。","chapter":"13．水务交易的买家是谁","color":5,"_order":20},{"text":"无论欧盟的反垄断法，还是美国的反托拉斯法，其所宣称的目的都是保护消费者免受垄断企业剥削。其经济学基础是：拥有垄断地位的生产者，可以通过限制产量和区别定价，来榨取消费者剩余。","chapter":"14．反垄断大刀会砍出什么","color":5,"_order":21},{"text":"尽管经济学将人的行为作为研究对象，但其实经济学关于行为说的却很少，它的核心假定只有一句话：个人总是用他所能获得的有限资源来最大化自己的利益，而在这么做时总是理性的","chapter":"第三部分 行为与心理","color":5,"_order":48},{"text":"在大社会中，仅当你面临具体交易时，才需要进行风险评估和成本收益算计，而在小社会，你需要时刻提起精神，为自身利益而处心积虑、勾心斗角、合纵连横、尔虞我诈，因为边界是不清晰的，交易也不是笔笔结清的，实际权利和所得之多少全在于你的拼争。","chapter":"45．互惠圈如何塑造人性","color":0,"_order":60},{"text":"阻碍变革与建设的，常常是权利，尽管在现代化和国民经济等宏大词汇下面，这些权利常显得细微、琐碎、陈旧、腐朽，以至讨厌，但它们终究是权利，是权利就应得到尊重和保障，即使非要废除也应予以补偿。","chapter":"58．小贩有占道摆摊的权利吗","color":0,"_order":77},{"text":"摊贩的权利来自蕴藏于传统之中的正当性，如伯克所指出[插图]，长久性本身便可赋予行为以正当性","chapter":"58．小贩有占道摆摊的权利吗","color":5,"_order":77},{"text":"这个案例可以告诉我们关于管制的两个教训：第一，管制机器一旦开动，就很难停下来，即便事实已证明它的错误，因为政治和立法体系的性质使得它不具备矫正这种错误的动力机制，只会以另一个错误——更多的管制——去“对付”它：准入管制带来了短缺和高价格，于是用价格管制去对付，价格管制导致质量下降，再制定强制性质量标准，于是把准入门槛和价格推得更高，如此循环。\n第二，对于使用者来说，为使用稀缺资源所需支付的代价无法避免或减少，价格管制只会把它转移到其他地方。没有管制时，代价以租金形式支付给所有者，有了管制，假如严格执行，使用者仍需付出代价，但没有任何人得到它，它耗散在空中了，假如执行不严格，它将转变为排队的入口租金。","chapter":"61．医院号贩子挣的是什么钱","color":0,"_order":81},{"text":"越是那些以信誉和质量取胜、资本和技术密集、规模化的企业，就有越多的抵押品可以被执行，于是容易被从管制规则所限制的那些领域中驱逐出去，剩下的都是打一枪换一个地方，随时准备跑路的短期渔利者。","chapter":"65．医疗广告为何充斥着欺诈和蒙骗","color":0,"_order":85},{"text":"经济周期不是简单的上下震荡，用熊彼特的话说，它是一个创造性毁灭[插图]的过程：繁荣期的高需求、高价格和信贷宽松，会让许多资源配置结构过时、效率平庸的企业也活得很滋润，一旦衰退来临，它们就会被大批淘汰，而在经济复苏时重新获得增长的，要么是拥有更高效配置结构的新兴企业，要么是通过结构调整而渡过难关的老企业，无论如何，每次周期过后，经济整体的资源配置结构都不会回到周期之前。","chapter":"66．收储能不能稳定市场","color":5,"_order":87},{"text":"欧盟的发展更多且越来越多的是一个主权政府之间的政治互动过程，而不是一个法律演进过程，这实际上也是大陆法传统的表现，该传统将法律视为主权意志的表达和理性设计的结果，而不是自发秩序的生长、发现和移植过程。","chapter":"75．欧盟统一红利还能吃多久","color":5,"_order":97},{"text":"马克思认为，经济危机是市场制度的内在缺陷所致，这个缺陷就是资本有机构成不断提高。所谓有机构成，是指收入分配中资本要素相对于劳动和土地要素所取得的报酬，随着资本积累，这个比例不断提高，导致劳动者贫困化，缺乏足够的购买力消费所产出的产品，结果整个经济体总需求不足，不得不通过周期性危机来消灭过剩的产能和资本。\n凯恩斯也将危机归因于总需求不足，但提出的微观原理不同，根本的原因是货币幻觉￼和过度储蓄倾向，前者导致价格刚性，特别是工资刚性，后者导致市场利率无法平衡储蓄率与投资率，这两者最终导致失业和产出过剩，因而他主张，由政府通过积极的财政开支和某种程度的通货膨胀政策来矫正这一倾向。\n奥地利学派的哈耶克和米塞斯，则将商业周期归咎于信用系统的内在扩张倾向，它使得银行创造出过多的信用货币，导致投资过热和资产价格泡沫￼，而由于信息传导上的滞后，这些错误投资未能被价格机制及时纠正，最终由危机来消除；同时他们也强调，政府的错误货币政策常常引发或加剧这一波动。\n弗里德曼同样将波动主要归因于货币系统，但他并不认为货币系统本身具有内在的紧缩或扩张倾向，而是错误的货币制度或政策会随机地导致通货紧缩或膨胀，因而他同时担忧紧缩和膨胀，并且否认任何主动的货币政策可以无害地消除自然波动，政府唯一需要做的只是稳定货币量，同时他也相信，假如政府肯放手，私人银行系统能够自己想出办法做到这一点。\n在诸多学派里，熊彼特是少有的以乐观态度看待波动的学者，他认为周期主要是由创新浪潮推动的，由于对创新前景看法的共识形成和传播存在时滞，而创新模式的扩张、对旧模式下产能的替代和对旧企业盈利基础的打击，都需要时间，因而其对利率和产品与资产价格的影响，在创新扩张的各阶段都十分不同，从而形成周期，他将这一过程称为创造性毁灭，并视其为经济得以发展、产业结构得以进化的方式，就像生态系统那样￼。","chapter":"第十七章 不一样的泡沫","color":0,"_order":105},{"text":"库恩把科学理论的发展分为几个阶段，首先是少数奠基性科学家通过哲学思辨提出一套形而上学概念和由这些概念以特定语法关系构成的命题结构，这个框架决定了观察世界的角度，规定了何种问题是可问的，即一个合法的问题只能以哪几种句式提出，且只能使用哪些词汇。接着，科学家会为这些概念确定度量方法，即在抽象观念和经验事实之间建立连接，由此概念便成了变量，而命题的结论和推断也就有了验证标准，至此，该理论便完成了范式确立，而这套概念、度量方法和命题结构，构成了库恩所称的“范式”​（paradigm）​。","chapter":"93．范式与硬核：什么是科学","color":5,"_order":121},{"text":"科学定律是用来解释现象的，为此一个定律必须禁止一些现象，禁止的越多，解释力越强，如果该定律允许任何事情发生，它就什么也解释不了。经济学是解释人的行为的，所以经济学定律必须禁止一些行为。","chapter":"96．自私的皮球：论经济学的基本假设","color":0,"_order":125}],"thoughts":[{"text":"应该再附上一句，虽然早就被决定了，但大多数情况下你并不知道是如何决定的，因此只有去行动，才能看到那个决定到底是如何安排的。","quote":"不是思想和行为改变不了世界，而是你会有何种思想和行为，以及它们将如何改变世界，是早被决定了的，过去经由你的行动去创造未来。","chapter":"","_order":9999},{"text":"至少这后半句是对2025年当下的准确描述","quote":"第三种反对意见认为，随着避孕手段的普及、女性就业率提高、孩子抚养和教育成本的迅速增长，生育策略已完全改变。这些反对者宣布了马尔萨斯人口理论的破产，他们认为，当传统社会完成城市化和工业化之后，生育率“必然”下降，无须计划生育的干预，相反，届时政府将不得不鼓励生育。","chapter":"","_order":9999},{"text":"1.美国生产效率提高导致成本下降，为了维持物价只能让美元贬值。\n2.新兴经济体为劳动密集型国家，生产效率没有提高，因此成本不变，但因刻意压低本币相对美元汇率变化，相当于部分的本币贬值，导致物价上升，通货膨胀。","quote":"阻止本币升值或升值不到位的效果，相当于部分地放任本币跟着美元贬值，但同时最终消费品的成本又没有像美国那样下降，结果就是国内通货膨胀。","chapter":"","_order":9999},{"text":"按前面的定义，无线电视和GPS是可拥挤的吧？","quote":"无线电视和GPS都是不可拥挤的","chapter":"","_order":9999},{"text":"“国计”在前，“民生”在后。","quote":"国内燃油市场，是基于行政法令所赋予的进口专营权，而由国企所垄断的，而创设该垄断的理由，是保障“国计民生”​，","chapter":"","_order":9999},{"text":"分析是有价值，但得出的结论却值得商榷了","quote":"只要虚构得合理，分析仍然有价值","chapter":"","_order":9999}],"popularHighlights":[{"text":"假如某项可预期收入还未被找出对应的资源，便说明我们对有关生产模式尚未获得透彻的理解，由这一视角所产生的好奇心将引导我们考察各种商业模式。","count":36,"chapter":"前言","_order":3},{"text":"因为有了价格信号的指引和协调，如今这个高度依赖于精细分工和长距离贸易的大社会才成为可能。","count":36,"chapter":"第一部分 价格与市场","_order":4},{"text":"有些商品原本就很独特，如茅台，或者卖家会把它们变得很独特，或看上去很独特，如某某十年陈酿，如iPhone，再或者卖家会用种种伎俩让买家相信它们很独特，所有这些，都可以增强卖家的议价地位。","count":72,"chapter":"第一章 价格中的奥妙与把戏","_order":5},{"text":"贝尔的分析提示我们注意某些消费心理学现象，在价格策略中，焦点之一是如何消除客户做决策时的种种顾虑，有些价格安排将直接降低客户的风险，而另一些则只是用来克服他们心理上的障碍。","count":90,"chapter":"01．PS3为何亏着本卖","_order":6},{"text":"这种用低于成本的价格销售耐用品，然后通过大量销售必须与之搭配使用的消耗品来盈利的定价模式","count":54,"chapter":"01．PS3为何亏着本卖","_order":6},{"text":"不过，完全取消初始投资门槛也有缺点：这会让用户更换供应商的成本变得太低，容易导致客户流失。","count":51,"chapter":"01．PS3为何亏着本卖","_order":6},{"text":"最早案例是吉列刀片。吉列以55美分的价格销售成本2.5美元的刀架，而把成本1美分的刀片卖到5美分，这一商业创新曾创造了一个奇迹，帮助吉列几乎垄断剃须刀市场数十年。","count":39,"chapter":"01．PS3为何亏着本卖","_order":6},{"text":"实际上，对于许多饭店，尽管酒水只占其销售额的20%～30%，但常常要贡献50%～60%的毛利；而从消费者的角度看，这其实是在让喝酒客户补贴不喝酒或少喝酒的客户。","count":72,"chapter":"02．饭店为何要收开瓶费","_order":7},{"text":"某些大排档便是如此，那里的食物价格低到令人瞠目，老板是靠向酒商收取入场费来盈利的，入场费可以是固定的，能卖掉多少酒，全看酒商自己的本事。无疑，这样的商业模式，既对大排档老板有利，也造福了消费者。","count":39,"chapter":"02．饭店为何要收开瓶费","_order":7},{"text":"把皮球踢给供应商，让他们自己竞争决定，而他自己只负责安排一个竞价机制，后者即由续约谈判和进场费、促销费的讨价还价来实现。","count":51,"chapter":"03．大卖场与供应商为何纷争不休","_order":8},{"text":"对于家乐福和他的同行们，程序化和透明化是他们亟待改进的地方，不仅可避免法律风险，简化管理，更是连锁业之可复制性和结构扁平化的基础，是连 text":"梅洛——庞蒂把塞尚对风景的深沉关注形容为一种“去物化”(Entäußerung)或“去内化”(Entinnerlichung)过程：​“首先，他试图清晰地勾勒出地表的形态。然后他纹丝不动地固定在一个位置，观看（风景）一直到眼睛快从脑袋里蹦出来，如同塞尚夫人所言。……他曾说，风景在我体内思考，我是它的意识。​”","chapter":"深度无聊","color":5,"_order":8},{"text":"《人的境况》一书结尾处，阿伦特在无意中谈及沉思生活。然而她没有意识到，正是由于丧失了沉思的能力，积极生活变得绝对化，从而导致现代积极社会的焦虑和歇斯底里症状。","chapter":"2","color":5,"_order":11},{"text":"如果一个人缺少了消极的能力，那种不去感受某物的能力，而只有积极的能力，即感受的能力，那么感官将无助地面对汹涌而至、不由自主的刺激和冲动。","chapter":"观看的教育","color":5,"_order":12},{"text":"立刻做出反应、回应每一个刺激冲动，这已经是一种疾病、一种倒退，也是疲劳、衰竭的征兆。尼采在这里表达的正是重新恢复沉思生活的必要性。这不是一种被动的自我敞开，不是接受任何出现或发生的事物，而是抵抗那些蜂拥而至、不由自主的冲动刺激。目光不再臣服于外在的刺激，沉思生活将自主地控制它。","chapter":"观看的教育","color":5,"_order":12},{"text":"功绩社会和积极社会导致了一种过度疲劳和倦怠。这一精神状态是现代社会的典型特征，由于缺少否定性，因此过量的肯定性占据了统治地位。这种疾病不是免疫反应，由于免疫机制需要以他者的否定性为前提。它更多地是由过量的肯定性所致。无节制地追求效能提升，将导致心灵的梗阻。","chapter":"1","color":5,"_order":15}],"thoughts":[{"text":"容易让人联想到以赛亚•伯林关于积极自由和消极自由的联系，他的观点：作为自我支配的积极自由很容易受到政治滥用，因为它本身包含了分裂的自我的观念，这种观念可以被外部干涉者利用。消极自由优于积极自由，至少就不存在易被政治滥用的危险方面是如此。他后来说：“强调消极自由绝不是否认积极自由。而强调积极自由往往就是否认消极自由。”","quote":"如果一个人只拥有去做某事的能力，缺少不做某事的能力，那么他将陷入致命的过度活跃之中。","chapter":"观看的教育","_order":12},{"text":"这段话很好的总结了本书要传达的概念。","quote":"功绩社会和积极社会导致了一种过度疲劳和倦怠。这一精神状态是现代社会的典型特征，由于缺少否定性，因此过量的肯定性占据了统治地位。这种疾病不是免疫反应，由于免疫机制需要以他者的否定性为前提。它更多地是由过量的肯定性所致。无节制地追求效能提升，将导致心灵的梗阻。","chapter":"1","_order":15}],"popularHighlights":[{"text":"这种倦怠感并非由不受约束的发展、升级导致，而是来自一种有益的自我降解。","count":2416,"chapter":"前言 倦怠的普罗米修斯","_order":3},{"text":"规训社会尚由否定主导，它的否定性制造出疯人和罪犯。与之相反，功绩社会则生产抑郁症患者和厌世者。","count":9990,"chapter":"超越规训社会","_order":7},{"text":"21世纪的社会不再是一个规训社会，而是功绩社会。其中的成员也不再是“驯化的主体”，而是功绩主体。他们成为自身的雇主。","count":3280,"chapter":"超越规训社会","_order":7},{"text":"工作和效绩的过度化日益严重，直到发展成一种自我剥削。这比外在的剥削更有效率，因为它伴随着一种自由的感觉。剥削者同时是被剥削者。施虐者和受害者之间不分彼此。","count":2842,"chapter":"超越规训社会","_order":7},{"text":"抑郁症患者没有最大限度地发展自身，他在必须成就自身的努力中筋疲力尽。","count":2448,"chapter":"超越规训社会","_order":7},{"text":"如果说，睡眠是身体放松的最高形式，那么深度无聊则是精神放松的终极状态。一味的忙碌不会产生新事物。它只会重复或加速业已存在的事物。","count":5082,"chapter":"深度无聊","_order":8},{"text":"过度的积极性还可以呈现为过度的刺激、信息和资讯，它从根本上改变了注意力的结构和运作方
