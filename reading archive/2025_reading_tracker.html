的音乐，皆被希特勒滥用，德国文学的精髓，失去了它应有的文明精神。斯坦纳在本书序言中举出一个震撼人心的例子：在纳粹统治下的德国，一个人可以在晚上读歌德、里尔克，可以弹奏巴赫、舒伯特，而第二天早上他仍然可以照样若无其事地到奥斯维辛集中营去上班，屠杀无辜！如果说这个人对文学不求甚解，这是矫饰之词，因为这不只是看得懂或看不懂的问题。","chapter":"语言与沉默——简论人文批评家乔治·斯坦纳（代译序）李欧梵","color":0,"_order":5},{"text":"可以证明的是，荷马、莎士比亚和陀思妥耶夫斯基的作品对于人类的洞见，超过了全部的神经学或统计学；遗传学中的发现，无法危及或超越普鲁斯特对家族的魔咒或负担的洞察；当奥赛罗提醒我们想起明亮刀锋上的水锈，我们对人生必然经历的感官短暂现实之体验，胜过了物理学梦想传达给我们的感觉；在理解政治动机或策略方面，任何社会计量学都难以与司汤达媲美。","chapter":"人文素养（1963）","color":0,"_order":8}],"thoughts":[],"popularHighlights":[{"text":"前所未有的是，无论学生，还是对文学潮流感兴趣的其他人，都在读书评，而不是阅读书籍本身；或者说，在努力作出个人判断之前，他们在阅读他人的评论。","count":736,"chapter":"人文素养"},{"text":"好的阅读要冒巨大的风险。它会使我们的身份、自我变得脆弱。","count":522,"chapter":"人文素养"},{"text":"相比于邻人的苦难，我们对文学中的悲伤更为敏感。","count":432,"chapter":"人文素养"},{"text":"所有的伟大写作都源于“最后的欲望”，源于精神对抗死亡的刺眼光芒，源于利用创造力战胜时间的希冀。","count":341,"chapter":"人文素养"},{"text":"读了卡夫卡的《变形记》，却依然能够无畏地面对镜中的自己，这样的读者，也许从字面上说，能够识文断字，但在最根本的意义上，不过是白丁而已。","count":286,"chapter":"人文素养"},{"text":"语言，在野蛮之地，在暴行之时，不应该有自然生命，不应该是中立的圣殿。沉默是一种选择。当城市中的语言充满了野蛮和谎言，再没有什么比放弃写成的诗歌更有力。","count":255,"chapter":"沉默与诗人（1966）"},{"text":"当批评家回望，他看见的是太监的身影。如果能当作家，谁会做批评家？","count":252,"chapter":"人文素养"},{"text":"批评家过的是二手生活。他要依靠他人写作。他要别人来提供诗歌、小说、戏剧。没有他人智慧的恩典，批评无法存在。","count":247,"chapter":"人文素养"},{"text":"现实中只有特殊狭小的一部分，语言才能有意义地言说。剩下的，可以想到，大部分现实，属于沉默。","count":238,"chapter":"逃离言词（1961）"},{"text":"我意识到历史学家没有说错，野蛮和政治暴行是人类事务中的流行病，没有时代可以幸免。","count":234,"chapter":"序言"},{"text":"没有读过莎士比亚的人属于没文化；同样，不知道热力学第二定律的人也没有文化。双方都对对方的世界盲然不见。","count":225,"chapter":"逃离言词（1961）"},{"text":"没有批评，创造本身或许也会陷入沉默。","count":210,"chapter":"人文素养"},{"text":"为什么文明进展愈久，野蛮的暴行却愈烈？为什么一般人所公认的文明传播媒介——譬如学院教育、各种艺术和著作出版业——非但不能抵抗政治的暴力，而且还对之欢迎礼赞？这是斯坦纳所要探讨的中心问题。","count":208,"chapter":"语言与沉默——简论人文批评家乔治·斯坦纳（代译序）"},{"text":"梦想具有科学的严谨性和预测性，这个野心勾引了许多历史写作偏离其真正本性——艺术性。现在被当成历史著述的许多东西很少有文学色彩。","count":196,"chapter":"逃离言词（1961）"},{"text":"当对放射性辐射尘的研究被取名为“阳光行动”时，这个共同体的语言已经陷于危机。","count":180,"chapter":"逃离言词（1961）"},{"text":"“沉默而亡”：阿波罗不再注视的文明，将不再长存。","count":180,"chapter":"逃离言词（1961）"},{"text":"现在倾泻出来的“言”中，究竟有多少在载“道”，如果我们想要听到从“言”到“道”的演变，所需要的沉默在哪里？","count":180,"chapter":"沉默与诗人（1966）"},{"text":"人文学科具有人性化的力量吗？如果具有，为什么它们在黑夜到来之前失败了呢？","count":170,"chapter":"教化我们的绅士（1965）"},{"text":"一切真理和真相，除了顶端那奇怪的一小点，都能够安置在语言的四壁之内。","count":168,"chapter":"逃离言词（1961）"},{"text":"斯宾诺莎之后，哲人知道，他们在用语言清晰语言，像切割工用钻石打磨钻石成型。语言不再视为通向可证真理的途径，而是像螺旋或镜廊一样，将思想带回到原点。斯宾诺莎之后，哲学失去了纯真。","count":165,"chapter":"逃离言词（1961）"}]},"CB_9qmDe8Ddg5ic6uw6sxAud4HA":{"rating":0,"ratingCount":0,"chapters":[],"highlights":[],"thoughts":[],"popularHighlights":[]},"CB_6zuDOIDRNAGb6w96x66Y9Coc":{"rating":829,"ratingCount":268,"chapters":[{"title":"第三章 现代科学溯源之一：没有基督教就没有现代科学","chapterUid":7,"chapterIdx":7},{"title":"第二章 西方科学溯源：希腊理性科学","chapterUid":6,"chapterIdx":6},{"title":"第六章 传统中国的科学","chapterUid":10,"chapterIdx":10},{"title":"附录二 地方性知识的哲学和社会学","chapterUid":13,"chapterIdx":13},{"title":"第四章 现代科学溯源之二：数理实验科学的形而上学基础","chapterUid":8,"chapterIdx":8},{"title":"结语","chapterUid":11,"chapterIdx":11}],"highlights":[{"text":"文化传统的核心是人文理念。中国文化是典型的农耕文化，人民与土地高度绑定，因而是熟人文化、血缘文化、亲情文化，以儒家为代表的中国精英文化以“仁爱”为理想人性，以“礼”为人文教化的手段。希腊文化是海洋文化、游牧文化和商贸文化的混合体，迁徙成为常态，因而是生人文化、契约文化，以“自由”为理想人性，以“科学”为人文教化的手段。“科学”就是希腊人的“人文”。","chapter":"第二章 西方科学溯源：希腊理性科学","color":0,"_order":6},{"text":"由于“自然”一词在希腊早期并不是指“自然物的集合”，而是指“本性”、“本质”，因此“自然的发明”的第一阶段、第一方面，就是发明了一种通过追寻“本原”、“本质”、“本性”即“自然”来理解和把握存在者及其存在的方式。这种方式是希腊人独有的，也是希腊科学和哲学得以可能的前提。","chapter":"第二章 西方科学溯源：希腊理性科学","color":0,"_order":6},{"text":"同心球模型的确非常天才。它把行星的“不规则”运动“分解”成“规则”运动的“叠加”，这几乎就是后世一切数学化的标准动作。伽利略的运动分解，牛顿的力分解，以及后来的傅里叶变换，本质上都是如此。“分解”加“叠加”就是“拯救现象”。这种还原论模式，一直统治着西方科学。不懂得以这种方法来“拯救现象”，就不配谈什么科学研究。","chapter":"第二章 西方科学溯源：希腊理性科学","color":0,"_order":6},{"text":"在《理想国》里，柏拉图对知识教育的科目设置作了仔细的讨论。他认为，除了体育和音乐这些初等教育外，雅典的自由民子弟还应该学习算术、几何、天文学、和声学这四门功课。这四门功课后来成为欧洲博雅教育中的四艺（quadrivium），与文法、逻辑、修辞组成的文科三艺（trivium）合称自由七艺（the seven liberal arts），是中世纪基础教育的主要科目。","chapter":"第二章 西方科学溯源：希腊理性科学","color":0,"_order":6},{"text":"我们中国人都知道“实践出真知”，“一切知识归根结底来源于人的生活实践、生产实践”，“实践是检验真理的唯一标准”，而一切生活实践中产出的知识都是为了优化、指导进一步的实践，因而肯定是有用的。无用的知识何以是知识呢？希腊人的回答更加特别：一切真知识都必定是出自自身的内在性知识，来自外部经验的不算真知识（episteme），只能算意见（doxa）。","chapter":"第二章 西方科学溯源：希腊理性科学","color":0,"_order":6},{"text":"苏格拉底反复使用为他所特有的那些方法——辩证法、助产术、下定义等，只为了表明一件事情：知识并不只是接近“事实”，而是接近事实之中含有“永恒”要素的东西。这些个“永恒”的要素即使在事实消失之后仍然存在，比事实更坚硬。这才是知识之所以成为最高追求的根本原因。","chapter":"第二章 西方科学溯源：希腊理性科学","color":0,"_order":6},{"text":"无论《圣经》还是《荷马史诗》，都是讲漂泊的故事。漂泊的人群经常遇到生人，与生人打交道成为他们的日常生活。因此，与中华民族的熟人文化不同，西方文明总的来看，是一种生人文化。","chapter":"第二章 西方科学溯源：希腊理性科学","color":0,"_order":6},{"text":"与主流经院哲学把上帝看成一个理性的上帝不同，唯名论极度强调上帝全能、意志完全自由的思想。每一个事物的存在完全是因为上帝的意志，每一个事物以如此这般的方式存在也完全是因为上帝的意志，没有自然的原因。上帝享有完全的自由，既不受自然法则的约束，甚至也不受他从前约定的约束。","chapter":"第三章 现代科学溯源之一：没有基督教就没有现代科学","color":0,"_order":7},{"text":"唯名论认为个别事物、个体才是实在的，共相则只是一个名词。这看起来只是自希腊以来就有迹可循的纯粹哲学理论分歧，为什么会引起一场思想革命呢？从神学角度看，这背后隐含着关于理性与信仰孰轻孰重的重大理论分歧。如果所有受造物都是特殊的、个别的，那就无法编入理性的“存在之链”之中，人就无法通过对造物的理性研究而通往上帝，甚至上帝本身也无法通过理性被理解，只能通过启示和神秘体验。唯名论以一种新的形态重申了信仰高于理性、信仰超越理性的传统神学观念，挑战主流经院哲学将理性与信仰相结合的伟大努力。","chapter":"第三章 现代科学溯源之一：没有基督教就没有现代科学","color":0,"_order":7},{"text":"教会意识到唯名论的危险，试图予以压制，但收效不大。实际上，14世纪上半叶开始，在牛津和巴黎都出现了声势浩大的唯名论运动。14世纪之后，欧洲陆续出现危机。教会的分裂、黑死病和百年战争使欧洲陷于混乱和不安宁之中，而这一切现实的灾难和危机，又使唯名论的上帝形象显得十分合理。历史就这样把唯名论制造的巨大思想困难摆在了现代欧洲人的面前，以文艺复兴、宗教改革和科学革命为代表的现代性运动，正是为了解决这一思想困难而提出的整体方案。","chapter":"第三章 现代科学溯源之一：没有基督教就没有现代科学","color":0,"_order":7},{"text":"科学史家格兰特在《现代科学在中世纪的基础》以及《科学与宗教》两书中认为，伊斯兰教与基督教相比有两大差别。其一，基督教徒都知道《圣经》不是一部科学著作，所以他们能够接受《圣经》之外的希腊科学，而穆斯林认为《古兰经》具有很高的科学价值，应该严格地按照字面意思来诠释，所以排斥外来科学；其二，伊斯兰教主要依靠军事征服传教，传播很快，无须与异教学术磨合适应，而基督教一直处在文化从属地位，形成了与异教学术文化生态共存的策略。","chapter":"第三章 现代科学溯源之一：没有基督教就没有现代科学","color":0,"_order":7},{"text":"所谓自由之艺，就是从罗马流传下来的自由七艺，指自由民应接受的七门基础课程。自由七艺是西方人文教育的基础，故汉语学界也有人把the seven liberal arts译成人文七科，把liberal education译成人文教育。自由七艺均来自希腊，是对希腊学术的某种稀释。但是，它却是罗马文明遗留给中世纪的两大文化财富之一（另一大财富是罗马法）。","chapter":"第三章 现代科学溯源之一：没有基督教就没有现代科学","color":0,"_order":7},{"text":"在培根看来，认识自然的目的是为了改造自然，这是为现代科学定下的一个基本目标。希腊人认识自然并不是为了改造自然，认识本身就是目的，但培根眼里的科学大不一样，必须把改造自然作为目的，而认识只是手段。正是这种新哲学，使得现代科学并不是希腊意义上的纯粹科学，而是一开始就包含着实际运用的内在可能性。现代科学与现代技术之间有着内在的不可分割的联系，原因即出于此。我们中国人的确比较容易理解科学与技术这种密切的关联，而且一向科、技不分，我们缺乏理解的只是，为什么“现代”科学与“现代”技术那样密不可分。","chapter":"第四章 现代科学溯源之二：数理实验科学的形而上学基础","color":0,"_order":8},{"text":"用博物学来重建中国古代科学传统就比用数理实验科学来重建，具有先天的优势，因为中国古代哲学传统较弱，但有强大的史志传统。中国学人善于记事，对事物分门别类，发掘事物之间的联系，不善对本质、道理进行抽象演绎，因此在研究自然界的事物时，采取的主要是“志/史”方法而不是“思辨推理”的方法。","chapter":"第六章 传统中国的科学","color":0,"_order":10},{"text":"所谓辉格史，借自英国历史上的辉格党（Whig Party）派历史学家的做派，即喜欢把历史写成本党政见节节胜利的历史。英国历史学家巴特菲尔德在他1931年出版的《历史的辉格解释》一书中创造了“辉格史”（Whig History）一词，把忽视了过去与现在的差异性、以今日之观点来编织历史的做法，统称为辉格史。","chapter":"第六章 传统中国的科学","color":0,"_order":10},{"text":"西方现代科学是两希文明相结合的产物。首先，它是希腊科学复兴的产物；其次，它经受了基督教的洗礼，与原本的希腊科学有很大的不同。现代科学与希腊科学的共同点是理性思维和演绎数学，不同点是现代科学以人为本、希腊科学以自然为本，现代科学以征服自然求得力量为目标，希腊科学以顺从自然求得理解为目标。我也把现代科学称为求力的科学，希腊科学为求真的科学。要解释清楚如何从求真的科学发展为求力的科学，就必须考虑基督教的洗礼以及中世纪后期复杂的思想革命。严格说来，“没有基督教就没有近代科学”。","chapter":"第六章 传统中国的科学","color":0,"_order":10},{"text":"我主张现代科学的出现以两个基因和两个土壤作为先决条件。两个基因是指希腊的理性科学基因和基督教基因，两个土壤是指技术革命的土壤和社会革命（资本主义革命）的土壤。","chapter":"第六章 传统中国的科学","color":0,"_order":10},{"text":"正如我们在前面几章反复辨明的，西方理性科学是自希腊以来一直贯穿西方文明发展过程中的主流知识形态。在古代，它的典型学科是数学、哲学；在中世纪，它的典型学科是神学；在现代，它的典型学科是自然科学（数理实验科学）。现代数理实验科学是在西方特殊的历史条件下生成的理性科学新形态。有理性科学，不一定会产生实验科学（比如古代希腊），但没有理性科学，一定不会产生实验科学。一百年来关于中国为何没有产生近代科学的讨论，都没有注意到这一点。","chapter":"第六章 传统中国的科学","color":0,"_order":10},{"text":"“科学驱动社会发展”只是一种现代性特有的现象，不具有普遍的历史意义；我们也表明，科学是产生于古代希腊、经过基督教的洗礼之后成为现代社会的决定性力量，并不是各民族、各文明普遍存在的文化现象","chapter":"第六章 传统中国的科学","color":0,"_order":10},{"text":"科学是一个来自西方的舶来品，要理解科学就必须回到西方的语境中。在西方历史上，科学有两个前后相继的形态，第一是希腊科学，第二是现代科学。希腊科学是无功利的、内在的、确定性的知识，源自希腊人对于自由人性的追求。这一科学形态的典型代表是演绎数学、形式逻辑和体系哲学。中国文化以仁爱精神作为人性的最高追求，因此从一开始就与科学精神错失。","chapter":"结语","color":0,"_order":11},{"text":"四、现代知识论：调和希腊和基督教\n中世纪晚期和现代早期思想都力图对希腊唯理论思想和基督教唯名论思想进行调和。人们还是倾向于相信，严格知识作为知识仍然需要具有普遍性、必然性的品格，否则就谈不上知识。这是现代知识论的希腊基因。另外一方面，知识必须拥有经验基础，否则就是空洞的。这是现代知识论的基督教基因。康德对这两大基因作了创造性的调和。他承认知识必须是普遍的、必然的，他管这个叫作“先天性”；他又说知识必须具有经验内容，他管这个叫“综合性”。任何真正的知识都必须既是先天的，又是综合的，所以他的知识论的基本问题叫作“先天综合判断何以可能”。康德构造了一套精致的主体性哲学，来解决他自己设定的认识论基本问题，但是他的解决方案并没有说服所有人。黑格尔认为康德视为“先天”的东西，其实不是固定不变的，而且有着内在的变化动力。胡塞尔认为，把知识分解成先天和综合的结合就有问题，经验其实从头就是观念性的。逻辑实证主义则彻底否定了康德，认为先天的就不是综合的，综合的就不是先天的，先天综合判断是一个错误的说法。\n现代知识论的最新调和方案是，把希腊意义上知识的“去情境化”的普遍性和必然性，看成是经验上的可通达性（accessibility）。过去那种带有某种神秘色彩的“先天性”被理解成跨主体的经验可分享，客观性（objectivity）等同于主体间性（intersubjectivity）。人们不必预设一个柏拉图−笛卡尔−康德意义上的超验主体，只需要预设一个能够在现实生活中实际参与交流、交往的主体就可以了。在这种情况下，知识论问题就转移到了关于交流交往的完全性问题。只要在实践层面上交流交往是完全的，那么过去归之于纯粹理性的那些东西，就可以继续以知识的名义保全下来。如果经验通达是不完全的，那普遍必然的知识就不能得到辩护。\n库恩在《科学革命的结构》中提出的范式不可通约问题，实际上属于不同科学共同体的科学经验之不完全可通达性问题。由于主张范式不可通约，库恩实际上强化了科学经验的不可通达性，从而使得科学知识的普遍性和必然性得不到最终的辩护。这样，库恩实际上断绝了以哲学方式来探讨科学发展模式的道路，把科学哲学引向了科学社会学。","chapter":"附录二 地方性知识的哲学和社会学","color":0,"_order":13},{"text":"在唯名论的冲击下，亚里士多德为代表的希腊理性知识论受到了较大的约束和限制。人们开始关注经验作为知识的来源。你如果想知道世界究竟是什么样子，那不能单纯通过逻辑推理，而是应该密切关注上帝已经在世界中造成了什么东西。通过仔细的观察，再根据对观察资料的归纳整理，我们可以获得外部世界的有限知识。这种知识受制于我们人类的有限性，因此本质上也是有限的、可错的、暂时的。唯名论到了现代就成了经验论。现代人很多只记得理性论和经验论的对立，却往往不知道经验论的基督教根源。","chapter":"附录二 地方性知识的哲学和社会学","color":0,"_order":13},{"text":"何谓理性？这个词经历两千多年的演绎，已经负载了太多含义。但是，追根溯源、返本归初地考虑一下，“理性”也很简单：它指的是一种能够把“事物”“本身”独立出来的思维能力，它能够获取关于事物“自身”的知识。再说得现代一点，理性的本质特征是“去情境化”，因为获得事物的“自己”就是“去情境化”。","chapter":"附录二 地方性知识的哲学和社会学","color":0,"_order":13}],"thoughts":[],"popularHighlights":[{"text":"科学是一种十分稀罕的人类文化现象，起源于对自由人性的追求和涵养。中国古代没有科学，根本不是偶然的错失，而是存在的命运。","count":286,"chapter":"前言"},{"text":"对中国人而言，德性是一回事，知识是另一回事，德性总是高于知识，而苏格拉底却把知识与美德相等同，“有知即有德”，“无知即缺德”。由于知识是最高的善，因此实际上是任何道德的基础。","count":180,"chapter":"第二章 西方科学溯源：希腊理性科学"},{"text":"纯粹的科学必须是为着求知本身的目的而不是任何其他目的而存在，这种指向“自己”的“知”，才是纯粹的科学。这样的科学，就是“自由”的科学。","count":168,"chapter":"第二章 西方科学溯源：希腊理性科学"},{"text":"由陌生人组织的人群，不可能以血缘关系准则来组织。相反，血缘纽带必然被淡化、边缘化，一种崭新的社会秩序的构成机制在起作用，这就是“契约”。","count":154,"chapter":"第二章 西方科学溯源：希腊理性科学"},{"text":"什么是科学？这是一个问题。任何问题都呼唤一个解答，但恰当的解答却取决于问题的性质：谁在提出问题？为什么提出问题？发问者期望从哪些方面、以什么方式来回答？而这，是问题背后的问题。真正的问题都是有结构的。","count":153,"chapter":"前言"},{"text":"在常规科学时期，科学家根本就不会问“什么是科学”这样的问题，因为一旦经过艰苦的训练进入了科学共同体，科学家已经就许多信念达成了共识，对这些信念通常不再追究。","count":136,"chapter":"前言"},{"text":"再说，生活中也不是处处都需要科学，有时候像占星术这样的伪科学也可以用来娱乐，干吗一定要斩尽杀绝？绘画原作固然宝贵，复制品也可以有它的地位。","count":128,"chapter":"前言"},{"text":"日本这个民族在文化底蕴和思维深度方面有其局限性，现代中国的文化建设以如此大的规模和强度建基于日本文化，实在值得各行各业的有识之士一再反思。","count":126,"chapter":"第一章 现代中国人的“科学”概念及其由来"},{"text":"希腊人的回答更加特别：一切真知识都必定是出自自身的内在性知识，来自外部经验的不算真知识(episteme)，只能算意见(doxa)。","count":126,"chapter":"第二章 西方科学溯源：希腊理性科学"},{"text":"一个新的科学真理并不是通过说服对手并且让他们开悟而取得胜利的，往往是因为它的反对者最终死去，熟悉它的新一代成长起来。","count":120,"chapter":"前言"},{"text":"在西方文明进来之前，中国人对自己的文明缺乏一个反思的角度，无从获得对本民族文化传统的深刻认知。","count":120,"chapter":"第二章 西方科学溯源：希腊理性科学"},{"text":"男女两性之爱并不被中国文化所看重，相反，最终都通过婚姻关系而转化为亲情之爱。夫妻之间“举案齐眉”“相敬如宾”，明显不是现代人所理解的两性之爱，而是被礼仪规制之下的血缘亲情。","count":112,"chapter":"第二章 西方科学溯源：希腊理性科学"},{"text":"我们的“仁爱”精神，使我们走上了不同的人文发展道路。","count":112,"chapter":"第二章 西方科学溯源：希腊理性科学"},{"text":"获得学位的学生可以穿着特别设计的服装参加典礼。今天在中国采用的罩袍式学位服装，就是从中世纪一直传下来的。它的原型是教士服。","count":112,"chapter":"第三章 现代科学溯源之一：没有基督教就没有现代科学"},{"text":"中国传统文化尊道而鄙技，往往把新技术贬称为“奇技淫巧”。","count":105,"chapter":"第一章 现代中国人的“科学”概念及其由来"},{"text":"没有经院哲学这个环节，就没有理性科学在欧洲的复兴，这一点可以从伊斯兰世界的情况中得到反证。","count":98,"chapter":"第三章 现代科学溯源之一：没有基督教就没有现代科学"},{"text":"波普尔别出心裁地提出证伪理论，认为科学之为科学不在于可证实，而在于可证伪，即它总是包含着可以诉诸经验检验的预测。","count":96,"chapter":"前言"},{"text":"人们完全可以根据具体的情况和具体的要求来辨别科学和非科学，并不需要一个绝对正确、普遍适用、可作尚方宝剑的科学标准","count":96,"chapter":"前言"},{"text":"技术、博物学（自然志）、理性科学三者构成了一个科学谱系。","count":90,"chapter":"前言"},{"text":"怀特海说过，一部西方哲学史不过就是柏拉图的注释史，是说整个后来的西方思想都一直活跃在这个思想脉络里。西方理性主义传统本质在于寻求不变性、确定性，而知识、科学的本质在于确定性。","count":90,"chapter":"第二章 西方科学溯源：希腊理性科学"}]},"CB_EA79dL9cq6Fm6v46sxBoM3qx":{"rating":0,"ratingCount":0,"chapters":[{"title":"11: Generative Models and the Neocortical Mystery","chapterUid":22,"chapterIdx":22},{"title":"10: The Neural Dark Ages","chapterUid":21,"chapterIdx":21},{"title":"8: Why Life Got Curious","chapterUid":18,"chapterIdx":18},{"title":"7: The Problems of Pattern Recognition","chapterUid":17,"chapterIdx":17},{"title":"1: The World Before Brains","chapterUid":9,"chapterIdx":9},{"title":"6: The Evolution of Temporal Difference Learning","chapterUid":16,"chapterIdx":16},{"title":"21: The Perfect Storm","chapterUid":34,"chapterIdx":34},{"title":"2: The Birth of Good and Bad","chapterUid":11,"chapterIdx":11},{"title":"22: ChatGPT and the Window into the Mind","chapterUid":35,"chapterIdx":35},{"title":"3: The Origin of Emotion","chapterUid":12,"chapterIdx":12},{"title":"12: Mice in the Imaginarium","chapterUid":23,"chapterIdx":23},{"title":"13: Model-Based Reinforcement Learning","chapterUid":24,"chapterIdx":24},{"title":"16: How to Model Other Minds","chapterUid":28,"chapterIdx":28},{"title":"14: The Secret to Dishwashing Robots","chapterUid":25,"chapterIdx":25},{"title":"19: The Search for Human Uniqueness","chapterUid":32,"chapterIdx":32},{"title":"20: Language in the Brain","chapterUid":33,"chapterIdx":33}],"highlights":[{"text":"This was Adrian’s second discovery, what isnow known as rate coding. The idea is thatneurons encode information in the rate thatthey fire spikes, not in the shape ormagnitude of the spike itself.","chapter":"1: The World Before Brains","color":5,"_order":9},{"text":"This is the most shocking observation when comparing neurons across species—they are all, for the most part, fundamentally identical. The neurons in the human brain operate the same way as the neurons in a jellyfish. What separates you from an earthworm is not the unit of intelligence itself—neurons—but how these units are wired together.","chapter":"1: The World Before Brains","color":0,"_order":9},{"text":"Animals with neurons share a commonancestor, an organism in whom the firstneurons evolved and from whom all neuronsdescend. It seems that in this ancientgrandmother of animals, neurons attainedtheir modern form; from this point on,evolution rewired neurons but made nomeaningful adjustments to the basic unititself. This is a glaring example of how priorinnovations impose constraints on futureinnovations, often leaving early structuresunchanged—the fundamental building blocksof brains have been essentially the same forover six hundred million years.","chapter":"1: The World Before Brains","color":5,"_order":9},{"text":"Steering requires at least four things: a bilateral body plan for turning, valence neurons for detecting and categorizing stimuli into good and bad, a brain for integrating input into a single steering decision, and the ability to modulate valence based on internal states. But still, evolution continued tinkering. There is another trick that emerged in early bilaterian brains, a trick that further bolstered the effectiveness of steering. That trick was the early kernel of what we now call emotion.","chapter":"2: The Birth of Good and Bad","color":0,"_order":11},{"text":"While others remained stuck in the lab working on million-dollar robots with eyes and touch and brains that attempted to compute complicated things like maps and movements, Brooks built the simplest possible robot, one that contained hardly any sensors and that computed barely anything at all. But the market, like evolution, rewards three things above all: things that are cheap, things that work, and things that are simple enough to be discovered in the first place.","chapter":"2: The Birth of Good and Bad","color":0,"_order":11},{"text":"Brooks’s argument was partly based on evolution: it took billions of years before life could simply sense and respond to its environment; it took another five hundred million years of tinkering for brains to get good at motor skills and navigation; and only after all of this hard work did language and logic appear. To Brooks, compared to how long it took for sensing and moving to evolve, logic and language appeared in a blink of an eye. Thus he concluded that “language . . . and reason, are all pretty simple once the essence of being and reacting are available. That essence is the ability to move around in a dynamic environment, sensing the surroundings to a degree sufficient to achieve the necessary maintenance of life and reproduction. This part of intelligence is where evolution has concentrated its time—it is much harder.”","chapter":"2: The Birth of Good and Bad","color":0,"_order":11},{"text":"Dopamine is not a signal for pleasure itself; itis a signal for the anticipation of futurepleasure. Heath’s patients weren’texperiencing pleasure; to the contrary, theyoften became extremely frustrated at theirinability to satisfy the incredible cravings thebutton produced.","chapter":"3: The Origin of Emotion","color":5,"_order":12},{"text":"Dopamine is not a signal for reward but for reinforcement. As Sutton found, reinforcement and reward must be decoupled for reinforcement learning to work. To solve the temporal credit assignment problem, brains must reinforce behaviors based on changes in predicted future rewards, not actual rewards. This is why animals get addicted to dopamine-releasing behaviors despite it not being pleasurable, and this is why dopamine responses quickly shift their activations to the moments when animals predict upcoming reward and away from rewards themselves.","chapter":"6: The Evolution of Temporal Difference Learning","color":0,"_order":16},{"text":"The dopamine responses that Schultz found in monkeys aligned exactly with Sutton’s temporal difference learning signal. Dopamine neurons in Schultz’s monkeys got excited by predictive cues because these cues led to an increase in predicted future rewards (a positive temporal difference); dopamine neurons were unaffected by the delivery of an expected reward because there was no change in predicted future reward (no temporal difference); and dopamine-neuron activity decreased when expected rewards were omitted because there was a decrease in predicted future rewards (a negative temporal difference).","chapter":"6: The Evolution of Temporal Difference Learning","color":0,"_order":16},{"text":"Cohen and McCloskey referred to this property of artificial neural networks as the problem of catastrophic forgetting. This was not an esoteric finding but a ubiquitous and devastating limitation of neural networks: when you train a neural network to recognize a new pattern or perform a new task, you risk interfering with the network’s previously learned patterns.","chapter":"7: The Problems of Pattern Recognition","color":0,"_order":17},{"text":"Auto-association reveals an important way in which vertebrate memory differs from computer memory. Auto-association suggests that vertebrate brains use content-addressable memory—memories are recalled by providing subsets of the original experience, which reactivate the original pattern. If I tell you the beginning of a story you’ve heard before, you can recall the rest; if I show you half a picture of your car, you can draw the rest. However, computers use register-addressable memory—memories that can be recalled only if you have the unique memory address for them. If you lose the address, you lose the memory.","chapter":"7: The Problems of Pattern Recognition","color":0,"_order":17},{"text":"The above type of learning, in which a network is trained by providing examples alongside the correct answer, is called supervised learning (a human has supervised the learning process by providing the network with the correct answers). Many supervised learning methods are more complex than this, but the principle is the same: the correct answers are provided, and networks are tweaked using backpropagation to update weights until the categorization of input patterns is sufficiently accurate. This design has proven to work so generally that it is now applied to image recognition, natural language processing, speech recognition, and self-driving cars.","chapter":"7: The Problems of Pattern Recognition","color":0,"_order":17},{"text":"They called this learning mechanism backpropagation: they propagate the error at the end back throughout the entire network, calculate the exact error contribution of each synapse, and nudge that synapse accordingly.","chapter":"7: The Problems of Pattern Recognition","color":0,"_order":17},{"text":"显然，现代AI系统成功地应对了模式识别的这两个挑战。它们是如何做到的呢？\nThe standard approach is the following: Create a network of neurons like in figure 7.4 where you provide an input pattern on one side that flows through layers of neurons until they are transformed into an output on the other end of the network. By adjusting the weights of the connections between neurons, you can make the network perform a variety of operations on its input. If you can edit the weights to be just right, you can get an algorithm to take an input pattern and recognize it correctly at the end of the network. If you edit the weights one way, it can recognize faces. If you edit the weights a different way, it can recognize smells.","chapter":"7: The Problems of Pattern Recognition","color":0,"_order":17},{"text":"B. F. Skinner was the first to realize that rats will gamble. The best way to get a rat to obsessively push a lever for food is not to have the lever release food pellets every time it is pressed; instead, it is to have the lever randomly release food pellets. Such variable-ratio reinforcement makes rats go crazy; they endlessly push the lever, seemingly obsessed with seeing if just one more push might be the one to produce a pellet. Even when the total number of pellets released are identical overall, such variable-ratio reinforcement leads to far more lever pushes than fixed-ratio reinforcement. Fish exhibit this effect as well.","chapter":"8: Why Life Got Curious","color":0,"_order":18},{"text":"The emergence and mechanisms of curiosity help explain gambling, which is an irrational oddity of vertebrate behavior. Gamblers violate Thorndike’s law of effect—they continue to gamble their money away despite the fact that the expected reward is negative.","chapter":"8: Why Life Got Curious","color":0,"_order":18},{"text":"The importance of curiosity in reinforcement learning algorithms suggests that a brain designed to learn through reinforcement, such as the brain of early vertebrates, should also exhibit curiosity. And indeed, evidence suggests that it was early vertebrates who first became curious. Curiosity is seen across all vertebrates, from fish to mice to monkeys to human infants. In vertebrates, surprise itself triggers the release of dopamine, even if there is no “real” reward. And yet, most invertebrates do not exhibit curiosity; only the most advanced invertebrates, such as insects and cephalopods, show curiosity, a trick that evolved independently and wasn’t present in early bilaterians.","chapter":"8: Why Life Got Curious","color":0,"_order":18},{"text":"In other words, reinforcement learning requires two opponent processes—one for behaviors that were previously reinforced (exploitation) and the other for behaviors that are new (exploration). These choices are, by definition, opposing each other. Exploitation will always drive behavior toward known rewards, and exploration will always drive toward what is unknown.","chapter":"8: Why Life Got Curious","color":0,"_order":18},{"text":"The second speculated requirement is warm-bloodedness. For reasons we will see in the next few chapters, simulating actions is astronomically more computationally expensive and time-consuming than the reinforcement-learning mechanisms in the cortex-basal-ganglia system. The electrical signaling of neurons is highly sensitive to temperature—at lower temperatures, neurons fire much more slowly than at warmer temperatures. This meant that a side effect of warm-bloodedness was that mammal brains could operate much faster than fish or reptile brains. This made it possible to perform substantially more complex computations. This is why reptiles, despite their long-range vision on land, were never endowed with the gift of simulating. The only nonmammals that have shown evidence of the ability to simulate actions and plan are birds. And birds are, conspicuously, the only nonmammal species alive today that independently evolved warm-bloodedness.","chapter":"10: The Neural Dark Ages","color":0,"_order":21},{"text":"Perhaps dreams are a counterbalance to this, a way to stabilize the generative model through a process of forced generation. If we are deprived of sleep, this imbalance of too much recognition and not enough generation eventually becomes so severe that the generative model in the neocortex becomes unstable. Hence, mammals start hallucinating, recognition becomes distorted, and the difference between generation and recognition gets blurred.","chapter":"11: Generative Models and the Neocortical Mystery","color":0,"_order":22},{"text":"Some neuroscientists refer to perception, even when it is functioning properly, as a “constrained hallucination.” Without sensory input, this hallucination becomes unconstrained. ","chapter":"11: Generative Models and the Neocortical Mystery","color":0,"_order":22},{"text":"In the nineteenth century, a German physicist and physician named Hermann von Helmholtz proposed a novel theory to explain these properties of perception. He suggested that a person doesn’t perceive what is experienced; instead, he or she perceives what the brain thinks is there—a process Helmholtz called inference. Put another way: you don’t perceive what you actually see, you perceive a simulated reality that you have inferred from what you see.","chapter":"11: Generative Models and the Neocortical Mystery","color":0,"_order":22},{"text":"These three facts—vertically aligned activity, vertically aligned connectivity, and observed similarity between all areas of neocortex—led Mountcastle to a remarkable conclusion: the neocortex was made up of a repeating and duplicated microcircuit, what he called the neocortical column. The cortical sheet was just a bunch of neocortical columns packed densely together.","chapter":"11: Generative Models and the Neocortical Mystery","color":0,"_order":22},{"text":"why was the hippocampus required for creating new episodic memories, but not for retrieving old ones? This is an example of evolution repurposing old structures for new purposes. In mammal brains, episodic memory emerges from a partnership between the older hippocampus and the newer neocortex. The hippocampus can quickly learn patterns, but cannot render a simulation of the world; the neocortex can simulate detailed aspects of the world, but cannot learn new patterns quickly. Episodic memories must be stored rapidly, and thus the hippocampus, designed for the rapid pattern recognition of places, was repurposed to also aid in the rapid encoding of episodic memories. Distributed neural activations of sensory neocortex (i.e., simulations) can be “retrieved” by reactivating the corresponding pattern in the hippocampus. Just as rats reactivated place cells in the hippocampus to simulate going down different paths, rats can reactivate these “memory codes” in the hippocampus to rerender simulations of recent events.","chapter":"12: Mice in the Imaginarium","color":0,"_order":23},{"text":"Causation itself may live more in psychology than in physics. There is no experiment that can definitively prove the presence of causality; it is entirely immeasurable. Controlled experiments we run may suggest causation, but they always fall short of proof because you can, in fact, never run a perfectly controlled experiment. Causation, even if real, is always empirically out of reach. In fact, modern experiments in the field of quantum mechanics suggest that causation may not even exist, at least not everywhere. The laws of physics may contain rules of how features of reality progress from one time step to the next without any real causal relationships between things at all. Ultimately, whether causality is real or not, the evolution of our intuitive perception of causality does not derive from its reality but from its usefulness. Causation is constructed by our brains to enable us to learn vicariously from alternative past choices.","chapter":"12: Mice in the Imaginarium","color":0,"_order":23},{"text":"To summarize: Planning, attention, and working memory are all controlled by the aPFC because all three are, in principle, the same thing. They are all different manifestations of brains trying to select what simulation to render. How does the aPFC “control” behavior? The idea presented here is that it doesn’t control behavior per se; it tries to convince the basal ganglia of the right choice by vicariously showing it that one choice is better and by filtering what information makes it to the basal ganglia. The aPFC controls behavior not by telling but by showing.","chapter":"13: Model-Based Reinforcement Learning","color":0,"_order":24},{"text":"This was the evolutionary beginning of what psychologists call behavioral inhibition, willpower, and self-control: the persistent tension between our moment-to-moment cravings (as controlled by the amygdala and basal ganglia) and what we know to be a better choice (as controlled by the aPFC). In moments of willpower, you can inhibit your amygdala-driven cravings. In moments of weakness, the amygdala wins. This is why people become more impulsive when tired or stressed—the aPFC is energetically expensive to run, so if you are tired or stressed, the aPFC will be much less effective at inhibiting the amygdala.","chapter":"13: Model-Based Reinforcement Learning","color":0,"_order":24},{"text":"In a typical neuroscience textbook, the four functions ascribed to the frontal neocortex are attention, working memory, executive control, and, as we have already seen, planning.","chapter":"13: Model-Based Reinforcement Learning","color":0,"_order":24},{"text":"Karl Friston of University College London—one of the pioneers of the idea that the neocortex implements a generative model—calls this “active inference.” The sensory cortex engages in passive inference—merely explaining and predicting sensory input. The aPFC engages in active inference—explaining one’s own behavior and then using its predictions to actively change that behavior. By pausing to play out what the aPFC predicts will happen and thereby vicariously training the basal ganglia, the aPFC is repurposing the neocortical generative model for prediction to create volition.","chapter":"13: Model-Based Reinforcement Learning","color":0,"_order":24},{"text":"The duality between model-based and model-free decision-making methods shows up in different forms across different fields. In AI, the terms model-based and model-free are used. In animal psychology, this same duality is described as goal-driven behavior and habitual behavior. And in behavioral economics, as in Daniel Kahneman’s famous book Thinking, Fast and Slow, this same duality is described as “system 2” (thinking slow) versus “system 1” (thinking fast). In all these cases, the duality is the same: Humans and, indeed, all mammals (and some other animals that independently evolved simulation) sometimes pause to simulate their options (model-based, goal-driven, system 2) and sometimes act automatically (model-free, habitual, system 1). Neither is better; each has its benefits and costs. Brains attempt to intelligently select when to do each, but brains do not always make this decision correctly, and this is the origin of many of our irrational behaviors.","chapter":"13: Model-Based Reinforcement Learning","color":0,"_order":24},{"text":"Habits are automated actions triggered by stimuli directly (they are model-free). They are behaviors controlled directly by the basal ganglia. They are the way mammalian brains save time and energy, avoiding unnecessarily engaging in simulation and planning. When such automation occurs at the right times, it enables us to complete complex behaviors easily; when it occurs at the wrong times, we make bad choices.","chapter":"13: Model-Based Reinforcement Learning","color":0,"_order":24},{"text":"What is the evolutionary usefulness of this model of self in the frontal cortex? Why try to “explain” one’s own behavior by constructing “intent”? It turns out, this might be how mammals choose when to simulate things and how to select what to simulate. Explaining one’s own behavior might solve the search problem.","chapter":"13: Model-Based Reinforcement Learning","color":0,"_order":24},{"text":"The primary new brain structure that emerged in early mammals was the neocortex. With the neocortex came the gift of simulation—the third breakthrough in our evolutionary story. To summarize how this occurred and how it was used:\n•  Sensory neocortex evolved, which created a simulation of the external world (a world model).\n•  The agranular prefrontal cortex (aPFC) evolved, which was the first region of the frontal neocortex. The aPFC created a simulation of an animal’s own movements and internal states (a self model) and constructed “intent” to explain one’s own behavior.\n•  The aPFC and sensory neocortex worked together to enable early mammals to pause and simulate aspects of the world that were not currently being experienced—in other words, model-based reinforcement learning.\n•  The aPFC somehow solved the search problem by intelligently selecting paths to simulate and determining when to simulate them.\n•  These simulations enabled early mammals to engage in vicarious trial and error—to simulate future actions and decide which path to take based on the imagined outcomes.\n•  These simulations enabled early mammals to engage in counterfactual learning, thereby offering a more advanced solution to the credit assignment problem—enabling mammals to assign credit based on causal relationships.\n•  These simulations enabled early mammals to engage in episodic memory, which allowed mammals to recall past events and actions, and use these recollections to adjust their behavior.\n•  In later mammals, the motor cortex evolved, enabling mammals to plan and simulate specific body movements.","chapter":"14: The Secret to Dishwashing Robots","color":0,"_order":25},{"text":"If we successfully build robots with motor systems similar to those of mammals, they will come along with many desirable properties. These robots will automatically learn new complex skills on their own. They will adjust their movements in real time to account for perturbations and changes in the world. We will give them high-level goals, and they will be able to figure out all the subgoals necessary to achieve it. When they try to learn some new task, they will be slow and careful as they simulate each body movement before they act, but as they get better, the behavior will become more automatic. Over the course of their lifetimes, the speed with which they learn new skills will increase as they reapply previously learned low-level skills to newly experienced higher-level goals. And if their brains work at all like mammal brains, they will not require massive supercomputers to accomplish these tasks. Indeed, the entire human brain operates on about the same amount of energy as a lightbulb.\nOr maybe not. Perhaps roboticists will get all this to work in a very nonmammalian way—perhaps roboticists will figure it all out without reverse-engineering human brains. But just as bird wings were an existence proof for the possibility of flight—a goal for humans to strive for—the motor skills of mammals are our existence proof for the type of motor skills we hope to build into machines one day, and the motor cortex and the surrounding motor hierarchy are nature’s clues about how to make it all work.","chapter":"14: The Secret to Dishwashing Robots","color":0,"_order":25},{"text":"These systems are all bootstrapped on one another. Reflexes drive valence responses without any learning required, making choices based on evolutionarily hard-coded rules. The vertebrate basal ganglia and amygdala can then learn new behaviors based on what has historically been reinforced by these reflexes, making choices based on maximizing reward. The mammalian aPFC can then learn a generative model of this model-free behavior and construct explanations, making choices based on imagined goals (e.g., drinking water). This could be considered a first-order model. The primate gPFC can then learn a more abstract generative model (a second-order model) of this aPFC-driven behavior and construct explanations of intent itself, making choices based on mind states and knowledge (I’m thirsty; drinking water when thirsty feels good, and when I simulate going down this way, I find water in my simulation, hence I want to go in this direction).","chapter":"16: How to Model Other Minds","color":0,"_order":28},{"text":"In other words, the gPFC constructs explanations of the simulation itself, of what the animal wants and knows and thinks. Psychologists and philosophers call this metacognition: the ability to think about thinking.","chapter":"16: How to Model Other Minds","color":0,"_order":28},{"text":"An analogy to DNA is useful. The true power of DNA is not the products it constructs (hearts, livers, brains) but the process it enables (evolution). In this same way, the power of language is not its products (better teaching, coordinating, and common myths) but the process of ideas being transferred, accumulated, and modified across generations. ","chapter":"19: The Search for Human Uniqueness","color":0,"_order":32},{"text":"Language enables us to peer into and learn from the imagination of other minds—from their episodic memories, their internal simulated future actions, their counterfactuals. ","chapter":"19: The Search for Human Uniqueness","color":0,"_order":32},{"text":"Declarative labeling, on the other hand, is a special feature of human language. A declarative label is one that assigns an object or behavior an arbitrary symbol—“That is a cow,” “That is running,”—without any imperative at all. No other form of naturally occurring animal communication has been found to do this.","chapter":"19: The Search for Human Uniqueness","color":0,"_order":32},{"text":"So, to recap: We know that the breakthrough that makes the human brain different is that of language. It is powerful because it allows us to learn from other people’s imaginations and allows ideas to accumulate across generations. And we know that language emerges in the human brain through a hardwired curriculum to learn it that repurposes older mentalizing neocortical areas into language areas.","chapter":"20: Language in the Brain","color":0,"_order":33},{"text":"And then there are those who sidestep the altruism problem by claiming that language did not evolve through the standard process of natural selection. Not everything in evolution evolved “for a reason.” There are two ways in which traits can emerge without being directly selected for. The first is called “exaptation,” which is when a trait that originally evolved for one purpose is only later repurposed for some other purpose. An example of exaptation is bird feathers, which initially evolved for insulation and were only later repurposed for flight—it would thereby be incorrect to say that bird feathers evolved for the purpose of flight. The second way in which a trait can emerge without being directly selected for is through what is called a “spandrel,” which is a trait that offers no benefit but emerged as a consequence of another trait that did offer a benefit. An example of a spandrel is the male nipple, which serves no purpose but emerged as a secondary effect of female nipples, which do, of course, serve a purpose. So to some, like Chomsky, language evolved first for thinking and then was exapted for communication between unrelated individuals. To others, language was merely an accidental side effect—a spandrel—of musical singing for mating calls.","chapter":"21: The Perfect Storm","color":0,"_order":34},{"text":"This is exactly the kind of feedback loop where evolutionary changes occur rapidly. For every incremental increase in gossip and punishment of violators, the more altruistic it was optimal to be. For every incremental increase in altruism, the more optimal it was to freely share information with others using language, which would select for more advanced language skills. For every incremental increase in language skills, the more effective gossip became, thereby reinforcing the cycle.","chapter":"21: The Perfect Storm","color":0,"_order":34},{"text":"Herein lies both the tragedy and beauty of humanity. We are indeed some of the most altruistic animals, but we may have paid the price for this altruism with our darker side: our instinct to punish those who we deem to be moral violators; our reflexive delineation of people into good and evil; our desperation to conform to our in-group and the ease with which we demonize those in the out-group. And with these new traits, empowered by our newly enlarged brains and cumulative language, the human instinct for politics—derived from our ancestral primates—was no longer a little trick for climbing social hierarchies but a cudgel of coordinated conquest. All this is the inevitable result of a survival niche requiring high levels of altruism between unrelated individuals.","chapter":"21: The Perfect Storm","color":0,"_order":34},{"text":"In addition to kin selection, the other type of altruism found in the animal kingdom is called reciprocal altruism. Reciprocal altruism is the equivalent of “I’ll scratch your back if you scratch mine.”","chapter":"21: The Perfect Storm","color":0,"_order":34},{"text":"There are two types of altruism found in the animal kingdom. The first is called kin selection. Kin selection is when individuals make personal sacrifices for the betterment of their directly related kin. A gene has two ways to persist: improve its host’s chance of survival or help the host’s siblings and children survive.","chapter":"21: The Perfect Storm","color":0,"_order":34},{"text":"We are capable of puppeteering other minds because language is, it seems, built right on top of a direct window to our inner simulation. Hearing sentences directly and automatically triggers specific mental imagery. This is why if someone is saying something that upsets us, we cannot simply “not listen”; we must cover our ears, otherwise the words directly trigger simulations whether we like it or not.","chapter":"22: ChatGPT and the Window into the Mind","color":0,"_order":35},{"text":"The intertwining of mentalizing and language is ubiquitous. Every conversation is built on the foundation of modeling the other minds you are conversing with—guessing what one means by what he said and guessing what should be said to maximize the chance the other knows what you mean.","chapter":"22: ChatGPT and the Window into the Mind","color":0,"_order":35},{"text":"Humans do all of this with our primate trick of mentalizing; the same way we can render an inner three-dimensional world, we can render a simulation of another mind to explore how different actions will make someone feel. When I am told to maximize paper clips, I can explore possible outcomes and simulate how I believe this other mind will feel about it. When I do this, it is incredibly obvious that the person will be unhappy if I convert Earth into paper clips.","chapter":"22: ChatGPT and the Window into the Mind","color":0,"_order":35},{"text":"The human brain contains both a languageprediction system and an inner simulation.The best evidence for the idea that we haveboth these systems are experiments pittingone system against the other. ","chapter":"22: ChatGPT and the Window into the Mind","color":5,"_order":35}],"thoughts":[{"text":"进化出模拟想象能力据推测需要两个条件，第一个要有看清远距离的能力，第二个是有温暖的体温","quote":"The second speculated requirement is warm-bloodedness. For reasons we will see in the next few chapters, simulating actions is astronomically more computationally expensive and time-consuming than the reinforcement-learning mechanisms in the cortex-basal-ganglia system. The electrical signaling of neurons is highly sensitive to temperature—at lower temperatures, neurons fire much more slowly than at warmer temperatures. This meant that a side effect of warm-bloodedness was that mammal brains could operate much faster than fish or reptile brains. This made it possible to perform substantially more complex computations. This is why reptiles, despite their long-range vision on land, were never endowed with the gift of simulating. The only nonmammals that have shown evidence of the ability to simulate actions and plan are birds. And birds are, conspicuously, the only nonmammal species alive today that independently evolved warm-bloodedness.","chapter":"","_order":9999}],"popularHighlights":[]},"CB_DIe7NA7M2Fbh6wv6x6CFC5BI":{"rating":776,"ratingCount":86,"chapters":[{"title":"第十三章 基因的延伸","chapterUid":16,"chapterIdx":16},{"title":"第十二章 好人终有好报","chapterUid":15,"chapterIdx":15},{"title":"第四章 基因机器","chapterUid":7,"chapterIdx":7},{"title":"第三章 不朽的双螺旋","chapterUid":6,"chapterIdx":6},{"title":"第十一章 觅母：新的复制基因","chapterUid":14,"chapterIdx":14},{"title":"第九章 两性战争","chapterUid":12,"chapterIdx":12},{"title":"30周年版简介","chapterUid":1,"chapterIdx":1},{"title":"第六章 基因种族","chapterUid":9,"chapterIdx":9},{"title":"第八章 代际之战","chapterUid":11,"chapterIdx":11}],"highlights":[{"text":"我来重复并扩展一下对题目中“自私”一词的解释。这里的关键问题是：生命中哪一层次是自然选择的单位，有着不可避免的“自私”？自私的种属？自私的群体？自私的生物体？自私的生态系统？我们可以争论这些层次中大多数单位的自私性，它们还都曾被一些作者全盘肯定为自然选择的单位。但这都是错误的。如果一定要把达尔文主义简单概括为“自私的某物”，这本书以令人信服的理由层层推理得出，这个“某物”只能是基因。这是我对标题的解释，无论你是否愿意相信推理本身。","chapter":"30周年版简介","color":0,"_order":1},{"text":"梅达沃本人着重指出的一点是：自然选择有利于这样一些基因生存，它们具有推迟其他致死基因活动的作用；也有利于这样一些基因生存，它们能够促进好的基因发挥其作用。情况可能是，基因活动开始时受遗传控制的种种变化构成了进化内容的许多方面。","chapter":"第三章 不朽的双螺旋","color":0,"_order":6},{"text":"我们需要找到自然选择的一个切合实际的单位。要做到这点，首先要鉴别出一个成功的自然选择单位必须具备哪些特性。用前一章的话来说，这些特性是：长寿、生殖力以及精确复制。那么我们只要直截了当地把“基因”解释为一个至少有可能拥有上述三种特性的最大实体。","chapter":"第三章 不朽的双螺旋","color":0,"_order":6},{"text":"自然选择的最普通形式是指实体的差别性生存。某些实体存在下去，而另一些则死亡。但为了使这种选择性死亡能够对世界产生影响，一个附加条件必须得到满足。每个实体必须以许多拷贝的形式存在，而且至少某些实体必须有潜在的能力以拷贝的形式生存一段相当长的进化时间。小的遗传单位有这种特性，而个体、群体和物种却没有。","chapter":"第三章 不朽的双螺旋","color":0,"_order":6},{"text":"我要采用的定义来源于威廉斯。﻿[*]基因的定义是：染色体物质的任何一部分，它能够作为一个自然选择的单位对连续若干代起作用。用前面一章中的话来说，基因就是进行高度精确复制的复制基因。精确复制的能力是通过拷贝形式取得长寿的另一种说法，我将把它简称为长寿。","chapter":"第三章 不朽的双螺旋","color":0,"_order":6},{"text":"因此，即使一个人的所有精子的23条染色体都是由同一组的46条染色体的片断构成，他所制造的每一个精子细胞却都是独特的。卵子以类似的方式在卵巢内制造，而且它们也各具特色，都不相同。","chapter":"第三章 不朽的双螺旋","color":0,"_order":6},{"text":"有性生殖具有混合基因的作用，就是说任何一个个体只不过是寿命不长的基因组合体的临时运载工具。\n任何一个个体基因组合（combination）的生存时间可能是短暂的，但基因本身却能够生存很久。它们的道路相互交叉再交叉，在延续不断的世代中一个基因可以被视为一个单位，它通过一系列个体的延续生存下去。这就是本章将要展开的中心论题。","chapter":"第三章 不朽的双螺旋","color":0,"_order":6},{"text":"我们的DNA寄居在我们体内。它不是集中在体内的某一特定的部分，而是分布在所有细胞之中。人体平均大约由1 000万亿个细胞组成。除某些特殊情况我们可以不予以考虑外，每个细胞都含有该人体的DNA的一套完整拷贝。这一DNA可以认为是一组有关如何制造一个人体的指令。以核苷酸的A、T、C、G字母表来表示。这种情况就像在一幢巨大的建筑物中，每间房间里都有一只“书橱”，而“书橱”里存放着建筑师建造整幢建筑物的设计图。每个细胞中的这种“书橱”称为细胞核。建筑师的这种设计图人类共有46“卷”，我们称它们为染色体。在不同的物种中，其数量也不同。染色体在显微镜下是可见的，形状像一条一条长线。基因就沿着这些染色体有次序地排列着。但要判断基因之间首尾相接的地方却是困难的，而且事实上甚至可能是无意义的。","chapter":"第三章 不朽的双螺旋","color":0,"_order":6},{"text":"我力图阐明的观点是，动物的行为，不管是利他的还是自私的，都在基因控制之下。这种控制尽管只是间接的，但仍然是十分强有力的。基因通过支配生存机器和它们神经系统的建造方式对行为施加其根本影响。但此后怎么办，则由神经系统随时作出决定。基因是主要的策略制定者，大脑则是执行者。但随着大脑的日趋高度发达，它实际上接管了越来越多的决策机能，而在这样做的过程中运用诸如学习和模拟的技巧。这个趋势在逻辑上的必然结果将会是，基因给予生存机器一个全面的策略性指示：请采取任何你认为是最适当的行动以保证我们的存在。但迄今为止还没有一个物种达到了这样的水平。","chapter":"第四章 基因机器","color":0,"_order":7},{"text":"模拟能力的演化似乎终于导致了主观意识的产生。","chapter":"第四章 基因机器","color":0,"_order":7},{"text":"兄弟之间的亲缘关系指数是1/2，因为他们之间任何一个的基因有一半为其他一个所共有。这是一个平均数：由于减数分裂的机遇，有些兄弟所共有的基因可能大于一半或少于一半。但亲代与子代之间的亲缘关系永远是1/2，不多也不少。","chapter":"第六章 基因种族","color":0,"_order":9},{"text":"亲代投资是以缩短其他幼儿预期寿命的程度为其计量单位的，包括已出生的或尚未出生的幼儿。","chapter":"第八章 代际之战","color":0,"_order":11},{"text":"雌性个体受剥削，而这种剥削行为在进化上的主要基础是，卵子比精子大。","chapter":"第九章 两性战争","color":0,"_order":12},{"text":"我们具备足够的力量去抗拒我们那些与生俱来的自私基因。在必要时，我们也可以抗拒那些灌输到我们头脑里的自私觅母。我们甚至可以讨论如何审慎地培植纯粹的、无私的利他主义——这种利他主义在自然界里是没有立足之地的，在整个世界历史上也是前所未有的。我们是作为基因机器而被建造的，是作为觅母机器而被培养的，但我们具备足够的力量去反对我们的缔造者。在这个世界上，只有我们，我们人类，能够反抗自私的复制基因的暴政","chapter":"第十一章 觅母：新的复制基因","color":5,"_order":14},{"text":"自私的基因（还有，如果你不反对我在本章所作的推测，觅母）没有预见能力。它们都是无意识的、盲目的复制基因。它们进行自身复制，这个事实再加上其他一些条件意味着不管愿意不愿意，它们都将趋向于某些特性的进化过程。这些特性在本书的特殊意义上说，可以称为是自私的。","chapter":"第十一章 觅母：新的复制基因","color":5,"_order":14},{"text":"我们的基因可能是不朽的，但体现在我们每一个人身上的基因集体迟早要消亡。伊丽莎白二世是征服者英王威廉一世的直系后裔。然而在她身上非常可能找不到一个来自老国王的基因。我们不应指望生殖能带来永恒性。但如果你能为世界文明作出贡献，如果你有一个精辟的见解或作了一个曲子、发明了一个火花塞、写了一首诗，所有这些都能完整无损地流传下去。即使你的基因在共有的基因库里全部分解后，这些东西仍能长久存在，永不湮灭。苏格拉底在今天的世界上可能还有一两个活着的基因，也可能早就没有了，但正如威廉斯所说的，谁对此感兴趣呢","chapter":"第十一章 觅母：新的复制基因","color":5,"_order":14},{"text":"让我们把觅母和基因的类比继续进行下去。我在这本书中自始至终强调不能把基因看做是自觉的、有目的的行为者。可是，盲目的自然选择使它们的行为好像带有目的性。因此，用带有目的性的语言来描绘��因的活动，正如使用速记一样有其方便之处。例如当我们说“基因试图增加它们在未来基因库中的数量”，我们的真正意思是“凡是由于基因本身的行为而使自己在未来的基因库中的数量增加的，往往就是我们在这个世界上所看到的那些有效基因”。正如我们为了方便起见把基因看成是积极的、为其自身生存进行有目的的工作的行为者，我们同样可以把觅母视为具有目的性的行为者。基因也好，觅母也好，都没有任何神秘之处。我们说它们具有目的性不过是一种比喻的说法。我们已经看到，在论述基因的时候，这种比喻的说法是有成效的。我们对基因甚至用了“自私”、“无情”这样的词汇。我们清楚地知道，这些说法仅仅是一种修辞方法。","chapter":"第十一章 觅母：新的复制基因","color":0,"_order":14},{"text":"我已具体列举过一些有助于提高觅母生存价值的各种特性。但一般地说，这些特性必然和我们在第二章里提到过的复制基因的特性是一样的：长寿、生殖力和精确的复制能力。","chapter":"第十一章 觅母：新的复制基因","color":5,"_order":14},{"text":"正如我的同事汉弗莱（N. K. Humphrey）对本章一份初稿的内容进行概括时精辟地指出的那样：“觅母应该被看成是一种有生命力的结构，这不仅仅是比喻的说法，而是有其学术含义的。﻿[*]当你把一个有生命力的觅母移植到我的心田上时，事实上你把我的大脑变成了这个觅母的宿主，使之成为传播这个觅母的工具，就象病毒寄生于一个宿主细胞的遗传机制一样。这并非凭空说说而已。可以举个具体的例子，‘死后有灵的信念’这一觅母事实上能够变成物质，它作为世界各地人民的神经系统里的一种结构，千百万次地取得物质力量。”\n","chapter":"第十一章 觅母：新的复制基因","color":0,"_order":14},{"text":"我们需要为这个新的复制基因取一个名字。这个名字要能表达作为一种文化传播单位或模仿单位的概念。​“Mimeme”这个词出自一个恰当的希腊词词根，但我希望有一个单音节的词，听上去有点像“gene”​（基因）​。如果我把“mimeme”这个词缩短成为meme（觅母）​，​[*]切望我的古典派朋友们多加包涵。我们既可以认为meme与“memory”​（记忆）有关，也可以认为与法语Même（同样的）有关，如果这样能使某些人感到一点慰藉的话。这个词念起来应与“cream”合韵。","chapter":"第十一章 觅母：新的复制基因","color":5,"_order":14},{"text":"基因，即DNA分子，正好就是我们这个星球上普遍存在的复制实体，也可能还有其他实体。如果有的话，只要符合某些其他条件，它们几乎不可避免地要成为一种进化过程的基础。","chapter":"第十一章 觅母：新的复制基因","color":5,"_order":14},{"text":"阿克塞尔罗德的程序便是我们在这本书里用以思考动植物、甚至基因的优秀模型。我们现在可以问问，他那些关于宽容善良不嫉妒的成功例子与优化结论是否可以用于自然世界？答案是肯定的，自然界一向如此。唯一条件是自然优势需要设定未来阴影很长的囚徒困境，而且是非零和博弈。这些条件在生物王国中一直成立。","chapter":"第十二章 好人终有好报","color":5,"_order":15},{"text":"博弈理论家将博弈分为“零和”与“非零和”两种。​“零和博弈”指一方的胜出即是对方的损失。棋类游戏便是一种“零和博弈”​，因为博弈双方的目标是胜过对方，使对方获得损失。囚徒困境则是一种“非零和博弈”​。在这里，银行家支付了金钱，博弈双方可以携手合作，一起笑到最后。这让我想起了莎士比亚写过的一句精彩的台词：“我们要做的第一件事，就是把所有律师都先杀了。​”——《亨利六世》","chapter":"第十二章 好人终有好报","color":5,"_order":15},{"text":"这种“无法辨认”情况使得“针锋相对”在严格意义上不是一个真正的进化稳定策略，即使它看起来确实很像。一个策略要成为进化稳定策略，当它是常见策略时，它不可被少数变异策略所同化。虽然“针锋相对”不会被任何恶意策略同化，但另一个善良策略则可能做到。正如我们所看到的，在善意策略的群体里，它们面目模糊，行为相同，始终合作。因此，有一些其他善良策略，比如“永远合作”这种选择优势不如“针锋相对”的策略，也可以溜进种群里而不被发现。所以严格地说，​“针锋相对”并不是进化稳定策略。","chapter":"第十二章 好人终有好报","color":5,"_order":15},{"text":"你也许还记得，进化稳定策略在众多的种群策略中占有许多席位，也一直得到不错的结果。如果说“针锋相对”是一种进化稳定策略，这便是说，​“针锋相对”策略在充满“针锋相对”策略的大环境下能得到不错的结果。这便是一种特殊的“强劲”​。作为进化论者，我们一直很想找到一种唯一的、可以直接决定结果的“强劲”​。为什么这很重要呢？因为在达尔文主义的世界里，成功并不是赢得金钱，而是获得后裔。对于一个达尔文主义者，一个成功的策略将是一个在种群策略中数量众多的策略。如果这个策略要保持成功，它必须在同类众多时——也就是充满了自身复制的大环境中得到特别好的结果。","chapter":"第十二章 好人终有好报","color":5,"_order":15},{"text":"我们算出了赢家策略的两个特点：善良与宽容。这几乎是一个乌托邦式的结论：善良与宽容能得到好报。","chapter":"第十二章 好人终有好报","color":0,"_order":15},{"text":"最后胜出的策略却是一个最简单的、而且看起来最不聪明的一个。这个策略称为“针锋相对”（Tit for Tat），它来自多伦多一位著名心理学家和博弈学家阿纳托尔（Anatol Papoport）教授。这个策略在第一回合时采取合作行动，然后在接下来的所有步骤里，只是简单复制对手上一步的行动。有了“针锋相对”策略的博弈将如何进行呢？一如寻常，下一步的出牌完全取决于对手。假设另一对手也选择了“针锋相对”的策略（每一个策略不止与其他14个对手竞争，也与自己本身博弈），双方都选择以“合作”而开场。第二步中，双方都复制对方上一步的策略，仍然采取“合作”。这样，博弈双方持续合作，直到游戏结束，双方都能获得100%的600分基准分。","chapter":"第十二章 好人终有好报","color":0,"_order":15},{"text":"在“囚徒困境”这个简单博弈里，没有任何方法可以达成信任。除非其中一方是一个虔诚的傻瓜，善良得根本不可能适应这个世界，这个博弈注定将以相互背叛、相互损伤而告终。然而，这个博弈还有另一个版本：​“重复博弈”的“囚徒困境”​。这个“重复博弈”更为复杂，但这个复杂性里孕育着希望。","chapter":"第十二章 好人终有好报","color":5,"_order":15},{"text":"当细胞分裂时，每一个新细胞都有其出现的特定时间与地点。巧合的是有时这个规律如此精确，胚胎学家可以以此给每个细胞命名，而每一个生物体中的细胞都有在另一生物体中相对应的细胞。所以，这个定型的成长循环提供了一个时刻表或是日历，定点激发胚胎发育事件。","chapter":"第十三章 基因的延伸","color":5,"_order":16},{"text":"“个体选择”和“群体选择”之间的争议是两种载体间的争议，而“个体选择”和“基因选择”间则根本不存在争议，因为在这个故事里，基因与生物体分饰着复制因子与载体，两个完全不同却又互相补充的角色。","chapter":"第十三章 基因的延伸","color":0,"_order":16},{"text":"在前边的章节里，我假设这里没什么问题，因为个体繁殖等同于基因存活，你可以说“生物体为了传播其基因而工作”或者“基因迫使个体繁衍从而传播基因自身”​。它们似乎是一件事情的两种说法，无论你选择哪一个说法，只是个人偏好问题。但这里的矛盾依然存在。解决这个问题的一个方法是使用“复制因子”和“载体”​。复制因子是自然选择的基础单位，生死存亡的根本个体，联系了代代本质相同而间或随机变异的复制血脉。DNA分子便是复制因子，它们通常连接一起，形成较大的公共基因存留机器——“载体”​，这里的原理我们等会儿再讲。我们了解最多的“载体”便是我们自身的身体。因此，身体并不是复制因子，而是载体。我必须反复强调一下这一点，因为它经常被误解。载体并不复制其本身，它们只传播复制因子。复制因子并不作为，不观察世界，不捕食也不从捕食者处逃离，它们只让载体来做这些事情。出于许多原因，生物学家只集中所有注意力于载体水平上，因为这更为方便。但出于另一些原因，他们则更应该将注意力集中到复制因子上。基因与个体生物在达尔文主义的戏剧里并不主演着对手戏。它们分别以复制因子与载体的角色饰演着不同角色，互相补充，同等重要。","chapter":"第十三章 基因的延伸","color":5,"_order":16},{"text":"自然界中动植物控制自身或其他物种的例子比比皆是。在这些例子中，自然选择偏爱于控制他人的基因，我们便可以合情合理地说，这些基因对受控制的生物体有“延伸表现型”的作用。这个基因实际存在于哪个身体并不重要，它控制的对象也许是自己的身体，也可以是其他生物。对那些通过控制世界而得以繁衍传播的基因，自然选择并不吝啬其偏爱。这便是我所说的“延伸表现型”的中心法则：动物行为倾向于最大化此行为基因的生存，无论这些基因是否在作出此行为的动物体内。","chapter":"第十三章 基因的延伸","color":5,"_order":16},{"text":"我认为对于任何寄生生物而言，最重要的问题是：它将基因传递给后代的方式是否和宿主的基因相同？如果不同，我便认为它通过各种方式损害了宿主。但如果相同，寄生生物可以做的便是帮助其宿主生存并繁衍。随着演化进行，它将不再是一个寄生生物，而将与宿主合作，甚至最终融入宿主组织，完全无法辨认其原为寄生虫。我在第十章曾提出过，我们的细胞已经走过这种演化过程，我们实际上是所有古代寄生生物合成的遗物。","chapter":"第十三章 基因的延伸","color":5,"_order":16},{"text":"如果我们接受寄主的改变是为满足寄生生物利益的达尔文主义的适者生存，它们便可看做寄生生物基因的延伸表现型。在这里基因离开其自身身体，影响了其他身体的表现型。","chapter":"第十三章 基因的延伸","color":5,"_order":16},{"text":"说基因作用于神经系统、进而影响眼睛颜色、豌豆皱褶等，都是基因的间接作用。基因决定了蛋白质序列，而后影响了X，进而影响了Y，又接着影响了Z，最终导致豌豆表面出现皱褶，或者说神经系统细胞接线。石蚕蛾的房子只是这种次序的进一步延伸。石头的硬度是石蚕蛾基因的延伸表现型影响。如果我们可以说基因影响了豌豆的皱褶或动物的神经系统（所有基因学家都认可这一点），那么我们也可以说，基因影响了石蚕蛾房子的石头硬度。这听起来可能有点惊世骇俗，但其推理无懈可击。\n我们可以进一步推理：一个生物体内的基因可以对另一个生物体有延伸表现型影响。","chapter":"第十三章 基因的延伸","color":0,"_order":16},{"text":"并非所有分离变相因子都如t基因一般具有极强的毁灭性。大部分只会导致一些不良的后果（几乎所有基因的副作用都是不良结果，一些新变异只会在优不敌劣时才会传播。如果良性作用与不良作用同时发生于生物体中，其结果依然有助于整个身体。但如果对身体只有不良作用，而基因则独享好处，其结果对于生物体则是灾难）​。除去这些有害的副作用外，如果变异产生了分离变相因子，它则一定倾向于在种群中传播。自然选择（最终毕竟还是发生于基因层面）偏爱分离变相因子，即使这对于生物体本身可能是灭顶之灾。","chapter":"第十三章 基因的延伸","color":5,"_order":16},{"text":"在本书的一些章节里，我们已经考虑过将个体生物看做一个载体，这个载体的任务是努力扩大传递基因的成功率。我们想象个体动物进行着复杂的考虑，计算着各种行为的基因优势。但在另一些章节里，这些基础的理性思维则是从基因角度出发考虑的。如果失去了基因的角度，生命体便失去“关照”其繁衍成功率与亲属的理由，而会转而考虑其他因素，比如它自身的寿命。","chapter":"第十三章 基因的延伸","color":5,"_order":16},{"text":"这个矛盾存在于基因与生命的载体——生命体之间。一方面，我们已经得到一个漂亮的故事：独立的DNA复制因子如羚羊般灵活，它们自由奔放地随世代相传，在一次性的生物容器中临时组合，而不朽的双螺旋则不停改组演替，在形成终将腐朽的肉体时磨炼，最终走向各自的永恒。另一方面，如果我们只观察生命个体本身，每一个生命都是一台自成一体的仪器，它完美无缺，复杂精密，却又统一结合，组织紧密。","chapter":"第十三章 基因的延伸","color":5,"_order":16}],"thoughts":[],"popularHighlights":[{"text":"人类以为自己驯化了植物，但其实是植物驯化了智人。","count":102,"chapter":"第五章 史上最大骗局"},{"text":"人类语言真正最独特的功能，并不在于能够传达关于人或狮子的信息，而是能够传达关于一些根本不存在的事物的信息。","count":72,"chapter":"第二章 知善恶树"},{"text":"在这里，人们需要的并不是什么精心设计的教条，只是求个心安，希望自己的故事能够在死后延续。","count":72,"chapter":"第20章 意义：人生不是虚构的故事"},{"text":"身为人类，我们不可能脱离想象所建构出的秩序。每一次我们以为自己打破了监狱的高墙、迈向自由的前方，其实只是到了另一间更大的监狱，把活动范围稍稍加以扩大而已。","count":70,"chapter":"第六章 盖起金字塔"},{"text":"这正是农业革命真正的本质：让更多的人以更糟的状况活下去。","count":65,"chapter":"第五章 史上最大骗局"},{"text":"讨论虚构的事物”正是智人语言最独特的功能。","count":64,"chapter":"第二章 知善恶树"},{"text":"我们以为自己省下了时间；然而，我们其实是把生活的步调加速成过去的10倍，于是我们整天忙忙碌碌、焦躁不安。","count":64,"chapter":"第五章 史上最大骗局"},{"text":"不过就在600万年前，有一只母猿产下两个女儿，一个成了所有黑猩猩的祖先，另一个则成了所有人类的祖奶奶。","count":60,"chapter":"第一章 人类：一种也没什么特别的动物"},{"text":"相较之下，人类转眼就登上顶端，不仅让生态系统猝不及防，就连人类自己也不知所措。","count":60,"chapter":"第一章 人类：一种也没什么特别的动物"},{"text":"但事实已经证明，大多数有钱人之所以有钱，只是因为他出生在有钱的家庭，而大多数穷人一辈子没钱，也就只是因为他出生在贫穷的家庭而已。","count":60,"chapter":"第八章 历史从无正义"},{"text":"和老庄思想不谋而合：无为而治，什么都别管。","count":60,"chapter":"第十六章 资本主义教条"},{"text":"历史只告诉了我们极少数的人在做些什么，而其他绝大多数人的生活就是不停挑水耕田。","count":56,"chapter":"第六章 盖起金字塔"},{"text":"佛陀的教诲一言以蔽之：痛苦来自欲望；要从痛苦中解脱，就要放下欲望；而要放下欲望，就必须训练心智，体验事物的本质。","count":56,"chapter":"第十二章 宗教的法则"},{"text":"等到律师正确执行了一切的仪式，宣告所有必要的咒语和誓言，千百万奉公守法的法国好公民也就表现得好像标致公司确实是个存在的实体一般。","count":54,"chapter":"第二章 知善恶树"},{"text":"其实不是我们驯化了小麦，而是小麦驯化了我们。","count":54,"chapter":"第五章 史上最大骗局"},{"text":"我们相信某种秩序，并非因为它是客观的现实，而是因为相信它可以让人提升合作效率、打造更美好的社会。","count":51,"chapter":"第六章 盖起金字塔"},{"text":"这三种全球秩序，首先第一种是经济上的货币秩序，第二种是政治上的帝国秩序，而第三种则是宗教上的全球性宗教，比如佛教、基督教和伊斯兰教。","count":51,"chapter":"第九章 历史的方向"},{"text":"证人上法庭做证，也会把手放在《圣经》上，发誓说出事实、完整的事实，也唯有事实。然而，发这个誓的时候，他们所凭依的书里竟充满虚构、神话和错误，岂不讽刺？","count":51,"chapter":"第4章 虚构的力量"},{"text":"李光耀认为安格拉·默克尔是西方世界最好的领导人，普京是全球最好的领导人之一。","count":51,"chapter":"第一部分 我的历程"},{"text":"除了存在于人类共同的想象之外，这个宇宙中根本没有神、没有国家、没有钱、没有人权、没有法律，也没有正义。","count":48,"chapter":"第二章 知善恶树"}]},"CB_ByO3eG3be3Up6Ud6U5":{"rating":744,"ratingCount":4708,"chapters":[{"title":"醉步男","chapterUid":4,"chapterIdx":4}],"highlights":[{"text":"“哎，丈夫，干吗傻站在那边？”父亲放下报纸，抬起头来看着我说。","chapter":"醉步男","color":0,"_order":4}],"thoughts":[{"text":"大概只有日文作品中文版的读者，才能理解这代词的奇妙。","quote":"“哎，丈夫，干吗傻站在那边？”父亲放下报纸，抬起头来看着我说。","chapter":"","_order":9999},{"text":"本书是按照第一人称记录的（应该也只能用第一人称），按我的理解，就存在两条时间线，一条是主角的离散时间线，一条是其他人的连续时间线。虽然术后的主角会在意识的时间点上跳来跳去，但作为记录者，他必定要有一条主线意识，也就是说，无论他跳到哪一个时间点，都要带着前一时间点的意识，否则这本书就没法写下去了。但是，如果带着这样的主线意识，实际上主角依然是经历了这具身体的每一个时间点，只是并非以连续时间的方式经历而已，比如主角的五月十四日之后是六月二十日，六月二十日之后是五月十五日。但对其他人而言，他们的时间线是连续的，他们的五月十四日之后是五月十五日。也就是说主角的时间线和其他人的时间线是错位的。\n\n上面的逻辑要得以成立的前提是，并不存在客观的时间，也就并不存在因果关系，因果得以出现源于人类的感知，而非现实，如同时间。\n\n我们感知的是大脑“认为”存在的东西，是大脑根据感官器官输入后“推测”出的现实，而非现实本身。事物本身（物自体）不依赖于主体的认识，a map is not the territory.","quote":"血沼壮士明天当然还是存在的，但这并不代表明天的我的意识会和今天的我的意识联系在一起。所以，我们就在这里告别吧","chapter":"","_order":9999},{"text":"为什么能想起睡着前的事情？ 不是不连续了吗？","quote":"当我醒来的时候，发现自己又躺在床上了。一开始我还换了一个舒服的姿势躺着想：奇怪，自己什么时候睡到床上的呢？然后我就想起了睡着以前的事情，立刻从床上跳起来，回头去看墙上挂着的壁钟，钟的指针指向七点，从窗外的样子看起来，应该是上午七点。","chapter":"","_order":9999}],"popularHighlights":[{"text":"“说得对！说得太对了！”你兴奋地差不多要跳起来了，“时间的流动和意识的流动根本就是一回事！是人类的意识构造出了时间的流动性！”","count":1204,"chapter":"醉步男"},{"text":"“你是谁？” 我是手儿奈。","count":1080,"chapter":"醉步男"},{"text":"说到底，我们并不是在观察一直存续着的现象，而是我们的观察导致了现象的实在化。”","count":1054,"chapter":"醉步男"},{"text":"“你叫血沼壮士。”","count":935,"chapter":"醉步男"},{"text":"“这意味着，时间的流变就等于意识的流变！如果我们能够控制意识的流变，那么就可以控制时间的流变了！”","count":912,"chapter":"醉步男"},{"text":"“姐姐你到底是不是人啊？” “道雄你又到底是不是人呢？” 我怎么也无法直视姐姐的左眼了。","count":880,"chapter":"玩具修理者"},{"text":"我还是不得不一次又一次地做讲稿，不然演讲失败的可能性就会很大很大。","count":768,"chapter":"醉步男"},{"text":"很好。很好。手儿奈并没有忘记我，所以她才会说，是我把她抛弃了，而不是她主动离开了我。这也就是说，到今天为止她仍然爱着我。","count":767,"chapter":"醉步男"},{"text":"啊，不是死的意思。我的话确实不太容易理解。这么说吧，从你的角度来看，明天是我不在了；而从我的角度来看，明天是你不在了——但不管从哪个角度看，都不能说对方是死了。”","count":676,"chapter":"醉步男"},{"text":"从那时候开始，我每天晚上都要进入时间旅行之中。在六月二十日之后的日子醒来的时候，基本上会有两种状态，一种是演讲成功的状态，另一种是演讲失败的状态。","count":611,"chapter":"醉步男"},{"text":"我想只能说我当时是被狸猫迷住了，不然也没什么更好的解释了。","count":592,"chapter":"醉步男"},{"text":"原来如此，小竹田，你还留恋着你的人生啊。看起来，你对现在这个没有手儿奈的人生相当满足呢","count":576,"chapter":"醉步男"},{"text":"假如未来人们可以预测杀人案件，于是就在案件发生之前将罪犯处决——实际上是在对没有犯下死罪的人实施死刑，这怎么可以呢？","count":546,"chapter":"醉步男"},{"text":"就是这样。在我主观的意识当中，我就这么数百年、数千年、数万年地生存下去，但是什么都不会残留下来。连无边无际的绝望都在枯萎、凋谢。","count":528,"chapter":"醉步男"},{"text":"准确地说，我只是要破坏大脑中特定的部分罢了。这样的话，我就可以从时间的流变中解放出来了。","count":525,"chapter":"醉步男"},{"text":"大脑内部根本没有感受痛觉的器官","count":522,"chapter":"醉步男"},{"text":"第一，我从五月十四日通过时间旅行来到了六月二十日，然后又从六月二十日再次进行时间旅行回到五月十五日。","count":522,"chapter":"醉步男"},{"text":"而且阳光的热量和我自己身子里发出的热量早就让我的喉咙渴得像要烧起来一样，这些汁液从鼻子一直淌到嘴里，正好勉强可以帮我解渴。","count":486,"chapter":"玩具修理者"},{"text":"但是有些人不具备这样的能力。他们可能会把今天同前天直接联系在一起，也可能会认为今天之后就是后天，于是他们就会无法预测昨天还没有发生的事情，或者经常会想起明天曾经发生过的事情。”","count":468,"chapter":"醉步男"},{"text":"“和我一起去参加医学部的入学考试。”","count":448,"chapter":"醉步男"}]},"CB_0xdAkbAlp2V86xm6x6EIK2Yp":{"rating":857,"ratingCount":369,"chapters":[{"title":"自由","chapterUid":61,"chapterIdx":61},{"title":"初学者心态","chapterUid":26,"chapterIdx":26},{"title":"人人都是创作者","chapterUid":2,"chapterIdx":2}],"highlights":[{"text":"无论我们的艺术创作正式与否，我们都在以艺术家的身份活着。我们感知、过滤并收集数据，然后基于这个信息集合来构建自己和他人的体验。我们只要活着，就是这个创造过程持续而积极的参与者，无论是有意识的还是无意识的。","chapter":"人人都是创作者","color":0,"_order":2},{"text":"要见人类之所未见，知人类之所未知，创造出前所未有的造物，可能需要一双从未见过世界的眼睛，一个从未进行过思考的头脑，和一双从未经过训练的手。","chapter":"初学者心态","color":5,"_order":26},{"text":"在艺术创作里，要完成一个目标，瞄准它只会导致更难命中。\n事先决定表达什么并不能让最好的东西出现。一旦灵感得到贯彻，自然会有意义赋予之。\n最好等到作品完成后，再去发现它在表达什么。用意义来束缚作品是一种限制。","chapter":"自由","color":5,"_order":61}],"thoughts":[{"text":"如同《自私的基因》中所述，我们是基因的运载工具。同时，我们也是meme的运载工具，书中说，meme应该被看成是一种有生命力的结构，这不仅仅是比喻的说法，而是有其学术含义的。﻿","quote":"特定的想法，会在某个特定的时刻到来，\n它会找到一种方式，\n经由我们表达它自己。","chapter":"","_order":9999}],"popularHighlights":[{"text":"你的创作不是非得被见证、被记录、被售卖或被装裱，才能成为艺术作品。在平凡的存在状态之中，我们时刻创造着自己的现实经验，构成我们所感知的世界。这已经让我们以最深刻的方式成为创作者。","count":1275,"chapter":"人人都是创作者"},{"text":"如果你有一个激动人心的想法，又不把它变成现实，那这个想法通过另一个创作者找到表达的出口也不奇怪。这不是另一个艺术家窃取了你的想法，而是这个想法的时机已到。","count":1272,"chapter":"调谐"},{"text":"很多伟大的艺术家最初发展出敏感的天线不是为了创造艺术，而是为了保护自己。他们要保护自己，因为痛苦对他们比对别人来说更强烈。他们对事物感觉更深。","count":1026,"chapter":"调谐"},{"text":"相反，我们创造一个开放的空间，允许它在里面存在。这个空间完全没有我们日常的堆积阻塞的思想状态，就像真空一样，将宇宙已经解锁的想法汲取出来。","count":900,"chapter":"调谐"},{"text":"特定的想法，会在某个特定的时刻到来， 它会找到一种方式， 经由我们表达它自己。","count":847,"chapter":"调谐"},{"text":"如果有一件事让我觉得有趣或美妙，我会首先停留在那个体验里。事后我才会尝试去理解它。","count":793,"chapter":"觉察"},{"text":"目标不是学会模仿伟大，而是校准我们内心对伟大的衡量标尺。这样我们才能做出成千上万个更好的选择，最终通往我们自己的伟大作品。","count":686,"chapter":"浸入（伟大作品）"},{"text":"在创造性的宇宙里，你作为创造性的个体存在着。这本身即是独一无二的艺术。","count":666,"chapter":"人人都是创作者"},{"text":"一个事物会因为我们的相信而具备一种势能，这与它能否被证实无关。","count":624,"chapter":"未见之地"},{"text":"所谓创造，就是把一些之前不存在的事物带入现实。它可以是开展一次对话、解决一个问题、给朋友留一张便条、重新布置房间中的家具、选择另一条路线回家以避开交通拥堵。","count":560,"chapter":"人人都是创作者"},{"text":"也许有些树看起来比其他树结出了更美的果实，有些人看起来比别人创作了更伟大的作品，但味道和美丽只存在于观察者的眼中。","count":540,"chapter":"调谐"},{"text":"如果你愿意坚持一年每天阅读经典文学作品，而不是阅读新闻，一年以后，你对伟大事物的敏锐体察的进步，会明显大于选择后者。","count":525,"chapter":"浸入（伟大作品）"},{"text":"我们只要保持开放状态，就能不断收到这种消息。一本书读着读着，会出来一句引人注目的引语；一部电影看着看着，会浮现一句让我们停下来反思甚至倒回去反复播放的台词。有时候，这就是我们一直在寻找的那个答案。","count":522,"chapter":"寻找线索"},{"text":"我们的目的不是制造艺术， 而是要进入那美妙的境界， 让艺术无可避免地发生。 ——罗伯特·亨利","count":510,"chapter":"引言"},{"text":"有时候，很用力地到处寻找特定答案或求证一个特定思路是有用的。但另一些时候，完全放下这个意图才是有用的。","count":510,"chapter":"寻找线索"},{"text":"作为艺术家，我们致力于寻回孩童般的感知能力：一种更天真的状态，那种免受功利或生存本能“审查”的惊奇和喜爱。","count":496,"chapter":"容器和滤器"},{"text":"宇宙在发生着，万事万物都在完成自己应该做的事，它们都在代表宇宙运转，以自己的方式，忠实于自己创造的冲动。","count":490,"chapter":"调谐"},{"text":"深度观察的能力， 是创造力的根基。 透过普通和平庸， 看见原本隐形之物。","count":476,"chapter":"觉察"},{"text":"每一个如是瞬间，都是一次邀请： 深入探索，缩放视角； 开启一切新的存在方式的可能。","count":450,"chapter":"文前"},{"text":"我们对宇宙的感知有多大，宇宙就有多大。我们陶冶自己的觉察方式，就是在拓展宇宙。","count":448,"chapter":"觉察"}]},"CB_D2C2Rg2PY1Ez6y56x63ul82U":{"rating":748,"ratingCount":629,"chapters":[{"title":"好辩的人","chapterUid":27,"chapterIdx":27},{"title":"无处不在的三种类比","chapterUid":25,"chapterIdx":25},{"title":"什么是“归纳”","chapterUid":23,"chapterIdx":23},{"title":"AEIO","chapterUid":21,"chapterIdx":21},{"title":"语言符号的反馈怪圈","chapterUid":5,"chapterIdx":5},{"title":"前言 为什么你必须上这堂“硬核表达课”","chapterUid":3,"chapterIdx":3},{"title":"三个世界","chapterUid":9,"chapterIdx":9},{"title":"打破预期，顺应张力","chapterUid":7,"chapterIdx":7},{"title":"新实用主义语言观","chapterUid":11,"chapterIdx":11},{"title":"意义","chapterUid":29,"chapterIdx":29},{"title":"从真到真，必然地得出","chapterUid":19,"chapterIdx":19}],"highlights":[{"text":"结合语言学带来的启示，语言活动可以区分为意义内核、内容侧与关系侧三个维度。说话是使符号产生意义的行为，因此意义维度事关“语言”的本质属性。我们不仅用语言表达，也用语言思考，人是符号动物，符号表意机制在很大程度上规定了我们的生存状态。内容维度侧重说话人对事物本质的认识，追求的是达成深度理解；关系维度侧重说话人与受话人的权力关系，追求的是建立亲和关系。我们之所以费尽心思组织语言，无非是为了在内容一侧“说到点子上”，在关系一侧“说进心坎里”。","chapter":"前言 为什么你必须上这堂“硬核表达课”","color":5,"_order":3},{"text":"人，作为一个主体存在于世间，最原初的欲望是什么？当然是“成为主体”，而成为主体的唯一途径就是与另一个主体建立关系，让其成为你的对象，毕竟主体是相对于对象存在的。法国哲学家让-保罗·萨特认为，两人相互注视的过程就是彼此争夺主体性的过程，我通过注视你，把你变成对象，你通过注视我，把我变成对象，因此人与人的关系总是存在着相互争夺主体性的欲望张力。","chapter":"语言符号的反馈怪圈","color":5,"_order":5},{"text":"第一重复杂性（无限衍义下的表意困境）是基础性的，反映了语言活动中的表意困难；第二重复杂性是衍生性的，我们试图克服这种表意困难的解义策略反而制造了各种冲突和龃龉。在前一种情况中，意义居无定所；而在后一种情况中，尽管意义有了居所，却是个危楼，被不停地摧毁、重构着。","chapter":"语言符号的反馈怪圈","color":5,"_order":5},{"text":"不管真实情况怎样，揣度、臆测的话语一旦被说出，怀疑、敌对的语境就不可避免地生成了，意义的漂流空间会被新语境逐渐锁死，我们一定会朝着特定的方向解释接收到的一切。此时揣测得准确与否已经不重要了，“真实情况”就在这些交互中实实在在地生成了。","chapter":"语言符号的反馈怪圈","color":5,"_order":5},{"text":"绝对孤立的“没用的东西”一词，是空洞的摆设，是个没用的东西，它的意义只能在句子里通过其他语词符号来间接确认，而其他语词符号的解释意义依然需要其他语词符号来间接解释，无限衍义的“无限”就体现在这里。皮尔士曾为“符号”下过一个悖论性定义：“符号就是我们为了了解别的东西才了解的东西。”","chapter":"语言符号的反馈怪圈","color":5,"_order":5},{"text":"有一个著名的理论，叫符号互动理论，专门研究社会互动中的符号互动，代表人物之一欧文·戈夫曼在其著作《日常生活中的自我呈现》中指出，在我们的日常表达中，包含着两类完全不同的符号互动，一类是“给予”的表达，另一类是“流露”的表达。\n给予是主动的，而流露是被动的。","chapter":"语言符号的反馈怪圈","color":5,"_order":5},{"text":"我们讲了三种权力关系下三种打破预期、顺应张力的方式，但它们仍然只是方法论，我们要追问的是：使我们得出这些方法论背后的沟通观，以及支撑着这种沟通观的基本假设是什么？\n回顾一下前面的例子。主动握手的权力者、出人意料的赞美者、冒犯自己的求助者，他们都通过某些话语、行动打破了预期，发出了一个信号。准确地说，是通过某些话语、行动发出这个信号，从而打破了预期，这个信号是“我选择尊重你”。","chapter":"打破预期，顺应张力","color":5,"_order":7},{"text":"存在主义的基本主张是，人是自为的存在——自己选择，自己创造，自己成为。我们永远不会“是”什么，而总在“成为着”什么。因此，你必须去选择，并对其负责。人永远可以选择，不去选择，也是一种选择，解开死局的唯一方法，是“主动选择”。","chapter":"打破预期，顺应张力","color":5,"_order":7},{"text":"语言世界中基于真问题思辨得来的好答案，帮我们调和了现实世界与经验世界的不对称。","chapter":"三个世界","color":5,"_order":9},{"text":"认知语言学中有一个流派，被称为框架语义学，相关学者将框架定义为“能与典型情境相联系的语言选择的任何系统”。原型框架大大减少了认知活动所需的能量，使得我们只需少数能联系典型情境的关键信息，就能对事物形成“整体性理解”。这种高效且无意识的认知过程，其副作用很明显：一旦我们想在语言世界中具体澄清这些整体性理解时，就会发现根本“无从下嘴”，类似于让一个一直做完形填空题的学生写一篇命题作文——自发地理解有多顺畅，刻意地表达就有多困难，表达的阻塞感因此而生。","chapter":"三个世界","color":5,"_order":9},{"text":"基于心物二元对立的哲学传统，人们习惯性地把世界分成物质现实的和心理主观的。后来的哲人发现，有必要加入一个符号/观念/语言世界——只要世界上出现第二个能使用抽象概念的人，就会存在第三个世界，人类的交往活动、文化生活都在这个世界中展开。三个世界框架在处理人文社科类课题时相当好用，在不同理论家那里有不同的版本，但分类逻辑基本一致。","chapter":"三个世界","color":5,"_order":9},{"text":"严肃性来自一个悖论：我们明知道某件事是个虚幻的游戏，但我们要刻意忽略“我们知道它是游戏”这件事，才能使游戏成立。","chapter":"新实用主义语言观","color":5,"_order":11},{"text":"所以，“我觉得我的工作做得很好，所以我希望您给我涨工资”这个平庸主张的图尔敏加强版是“我已经连续三个月超额完成了公司的KPI，根据激励理论的基本原则，高绩效员工理应得到更好的待遇。除非公司经济条件不允许，或者绩效并非公司最看重的要素，否则，在我的个人意愿上，我真的非常希望您给我涨工资”。","chapter":"新实用主义语言观","color":5,"_order":11},{"text":"图尔敏的《论证的使用》是论证研究领域的扛鼎之作，整本书回答的问题便是：如果经验证据和逻辑都不足以为日常的推论活动提供规范性，那么我们该如何进行公正且有效的说理？他将法学中控辩双方的对抗模型引入生活化的论证场景，最终整理出了图尔敏论证模型。","chapter":"新实用主义语言观","color":5,"_order":11},{"text":"皮尔士认为，判断并不是一个过程，而是一个结果，导致这个结果的理性活动，叫溯因。溯因是比判断更基础的认知活动，一个判断是一个或是多个溯因完成的结果。\n溯因的基本形式是：某人观察到了惊异的事实C；如果命题A是真的，则事实C是理所当然的；所以，有理由相信命题A是真的。","chapter":"新实用主义语言观","color":5,"_order":11},{"text":"中心路径说服会向受话人的心智直接展示因果关系，它能回答“为什么”的问题；外围路径说服则试图用大量的相关性来制造含混的因果印象，它有效的前提是“为什么”没有得到清晰的回答。","chapter":"新实用主义语言观","color":5,"_order":11},{"text":"社会心理学中有一对概念，专门用来讨论这个问���：中心路径说服与外围路径说服。中心路径说服，是我们这里讲的说理论证，是基于论据的说服；外围路径说服，则是透过各种外围因素进行影响，比如洗脑口号、明星代言、意象营造。","chapter":"新实用主义语言观","color":5,"_order":11},{"text":"意义在词语之间漂移，一个符号的意义需要另一个符号来实现，词语注定不能孤军奋战，它既需要靠自家亲戚（近义词）合力来框定一类所指范畴，也需要靠树立一个共同的对立面（反义词）来进一步明确这个家族共同体的领土边界，这便是维特根斯坦揭示出的“家族相似说”。","chapter":"从真到真，必然地得出","color":5,"_order":19},{"text":"维特根斯坦反转的精髓在于提醒我们别把底层与表层搞反了，之前我们以为代码是底层，图形是表层，其实图形才是底层，代码才是表层。生活能解释语言，语言却只能描述生活，语言妄图解释生活、表层妄图解释底层的结果就是“逻辑主义”的出现。","chapter":"从真到真，必然地得出","color":5,"_order":19},{"text":"维特根斯坦说，“在语言中显示自身的东西，我们无法用语言来表示它”，意思是，在图形交互界面的层次能解释为什么这行代码要这样写，但你无法在代码层次解释它自己为什么会被写成这样。因为在人与图形交互界面互动的过程中，这段字符承载的内涵远超过这段字符本身所显示的全部，代码的意义在于使用，语言的意义也在于使用。","chapter":"从真到真，必然地得出","color":5,"_order":19},{"text":"维特根斯坦发现，《逻辑哲学论》自身存在着一个逻辑悖论：他先是假设了“语言存在的一般形式”，并提出了“图式”的说法来说明经验是如何被建构成语言的，但“图式”本身并不在经验内，它只是一种“形式构造”，没有人能判断它是不是真的存在。图式理论本身和上帝一样属于不可说的部分，这就陷入了悖论：如果他的结论成立，那么前提就不成立；如果前提不成立，结论便无法成立。","chapter":"从真到真，必然地得出","color":5,"_order":19},{"text":"基本的感觉经验到底是怎么转化成语言的？维特根斯坦提出“图式说”试图解决这个问题。什么是图式？当你说“这里有一个苹果”时，某种意义上你是在画一幅“画”，即你在自己的脑中挑出一个符号，然后基于逻辑规则画出的一幅画。概念符号相当于画笔和颜料，逻辑规则相当于构图法则，这幅画反映了“这里有一个苹果”的经验现象。\n维特根斯坦强调，先有逻辑框架，再有概念的组合，就像先有构图，再有内容一样，不符合框架的内容是无意义的。在组织语言时，我们常常有这样的经验：有一个框架在你脑中悬着，如果说出来的话不符合这个框架，自己也觉得别扭。这个框架，就是构图的法则，就是逻辑。维特根斯坦认为，“图式”就是连接经验世界和语言的纽带，因此他说：命题是实在的图式，命题是实在的模型。","chapter":"从真到真，必然地得出","color":5,"_order":19},{"text":"逻辑学研究的是“如何从真到真”。注意，逻辑不管“什么是真的”，那是科学的工作，逻辑研究的是“从”和“到”，即从某个前提如何能得到某个结论，它内在的法则是怎样的。","chapter":"从真到真，必然地得出","color":5,"_order":19},{"text":"经过逻辑学家的精密推演和广泛归纳，三段论推理作为人类认知世界的一个理性活动，其内涵和有效性边界已经被彻底澄清，没有一处死角。这意味着，只要牢记这6条规则，抑或是机械地对照前面给出的15种必定有效的形式，无论你智力如何，你一定能正确地在脑中画圈圈，这就是逻辑学的神奇之处。","chapter":"AEIO","color":5,"_order":21},{"text":"类比推理在传统逻辑学中是跑龙套的角色，经常沦为归纳推理下的一个子类，但在认知语言学中，它摇身一变，成了扛大旗的主角，有大量的认知语言学研究是围绕着类比展开的。该领域的公认经典著作是《我们赖以生存的隐喻》和认知科学家侯世达的大作《表象与本质：类比，思考之源和思维之火》，后者花了大量篇幅论证了一个观点：类比是人类认知的核心。","chapter":"什么是“归纳”","color":5,"_order":23},{"text":"侯世达总结道：“范畴的确在操纵我们，我们也的确受制于它们。对此只能承认。我们不仅被囚禁在已知的牢笼里，而且还是终生的刑期。但幸运的是，我们可以不断扩大这个牢笼。事实上，可以无限扩大。只有已知的事物，才能让我们从已知中解脱。”","chapter":"无处不在的三种类比","color":5,"_order":25},{"text":"荣格有句名言：潜意识如果没有进入意识，就会成为命运。","chapter":"无处不在的三种类比","color":5,"_order":25},{"text":"我们的答案，就是那句断言：人是因果动物，以生产和消费理由为生，人亦是否定的化身，以制造和遮蔽悖论为继，溯因使人能言，辩证令人善辩。表面上，因果与理由容不下否定和悖论，那会让语言游戏崩盘；本质里，否定与悖论却是因果与理由产生的条件。正因如此，这个游戏不会停止，它会永无止境地循环下去。","chapter":"好辩的人","color":5,"_order":27},{"text":"因为那个“他异性的纯粹自我”，绝对虚空就被错认成了一种绝对的肯定性，我们创造了一系列非法的悖论，使这种错认变得融贯，开始了系统的自欺——当所有人都以同样的方式错认彼此，一种奇异的确认便完成了，这种确认是由符号材料作为中介确保的，因此是想象性的。人类的知识、欲望、意义乃至自我认知中的绵延生机，皆生发于此，其间种种抵牾，同样来自于此。但无论如何，经由一系列差错、悖论、自欺、忘却，原本不可思议的世界变得可以思，可以议了。","chapter":"好辩的人","color":5,"_order":27},{"text":"所谓“欲望是对欲望的抵御”，同样来自一个重言式：“这不是我想要的”也“不是我想要的”，你无法再问欲望如何才能被止息，止息欲望已经成了欲望的一部分，自我指涉的循环诞生了。\n你必须在这个意义上理解前文中那句欲望总是对欲望的欲望，就像解释总是对解释的解释一样，是一种不断甩掉所指对象的空转。","chapter":"好辩的人","color":5,"_order":27},{"text":"齐泽克曾给出过一个颇为令人费解的论断：欲望是对欲望的抵御。我们要问：对欲望的抵制和否定，为何反而会导致欲望产生？有前文知识的铺垫，道理不难说明，因为两者完全是同构的。\n不妨回顾一下自己的人生经验，我们的欲望往往生成于这样一些否定性的瞬间：在面对一个欲望傀儡（一双球鞋、一款包）时，我们说“原来这不是我想要的”，正是通过无数个“这不是我想要的”，我们创建了一个永远在延迟的欲求对象、一个不可能实现的“想要”。“真”是一种“不假”，是将所有“假”都排除之后剩下的那个东西，“要”也是一种“不要”，你这也不要那也不要，说明你有一个特别想要但注定永远得不到的东西，它寄生于无数傀儡中，但总是会遁逃，它就是纯粹的否定和空无，是欲望的对象和成因。","chapter":"好辩的人","color":5,"_order":27},{"text":"“自我”和“真理”一样，是在与他者的差异之中“确认”自身的。这种迂回的确认导致我们会永远困惑于自我到底是什么，真理到底是什么，必须用“最佳解释就是最佳解释”“我就是我”这种非法但必要的重言式，才能暂时中止追问。好解释可以相互融贯，自我的认识与他者的认知亦可以相互融贯，当人人都说“我就是我”“你就是你”“苹果就是苹果”“真理就是真理”的时候，我们便在广泛的相互确认中完成了系统性的自欺。“自我的基本功能就是系统性地拒绝承认现实”，所有人都患了同样的病，因此奇迹般地获得了“互为健康”的“正常生活”。","chapter":"好辩的人","color":5,"_order":27},{"text":"此处意在揭示符号思维机制中的一个底层漏洞：概念在否定和差异中生成，却在肯定和同一中使用。这意味着一切肯定和同一必须来自对否定和差异的“事先承认”，以及对这种承认的“忘却”。","chapter":"好辩的人","color":5,"_order":27},{"text":"雅克·拉康有句名言：“自我的基本功能就是系统性地拒绝承认现实。”这种基本功能必须借助符号秩序才能实现。这句话也完全可以被篡改为“科学的基本功能就是系统性地遮蔽扭曲现实”，此处没有任何贬义，而是意在强调：只要系统足够精密，我们就能在其中忘乎所以。","chapter":"好辩的人","color":5,"_order":27},{"text":"解释永远需要更多解释，而最佳解释用一个无懈可击的重言式（最佳解释就是最佳解释）强行终止了这个无穷退后，使你无法再问为什么最佳解释是最佳解释，无穷退后转换成了一个自我指涉的无限循环。有趣的是，通过这个非法操作，知识居然有了合法性。这个合法性的内涵，就是前文中提到的：当足够多的最佳溯因解释联结起来，我们就能用一个巨大的理由之网（或者说循环论证之网）来间接认识世界。","chapter":"好辩的人","color":5,"_order":27},{"text":"关于意义从何而来，我推崇侯世达的解释，他认为“意义来自同构”。“意义”并非不可说，只是不能像前面那样抽象地、逻辑地、推论地、穷理地“说”，如果只能那样说，则意味着文学、诗歌、艺术乃至人类想象力的价值都被取消了","chapter":"意义","color":5,"_order":29},{"text":"借由符号学带来的启发，我们归纳出了语言活动的“三重复杂性”。","chapter":"意义","color":5,"_order":29}],"thoughts":[{"text":"前提侧三要素：数据、理据和支撑。结论侧三要素：反驳条件、限定词和主张。","quote":"图尔敏的《论证的使用》是论证研究领域的扛鼎之作，整本书回答的问题便是：如果经验证据和逻辑都不足以为日常的推论活动提供规范性，那么我们该如何进行公正且有效的说理？他将法学中控辩双方的对抗模型引入生活化的论证场景，最终整理出了图尔敏论证模型。","chapter":"新实用主义语言观","_order":11},{"text":"第一重复杂性是由符号的无限衍义性导致的表意困境。说话使符号产生意义，但一个符号的意义却总是需要另一个符号来表示，歧义永远存在，我们永远需要解释\n第二重复杂性：共构语境下的解义困境。语境是不断生成、流变的，猜疑会引发对猜疑的猜疑，我们不断地创造着自身无法掌控的解释链与猜疑链，以误解为代价进行理解。\n第三重复杂性：文化间的理解鸿沟。我们的相互理解，总是大误解之下的小理解，整体误解之中的局部理解，不妨说得更深刻些：集体虚伪为个体自欺创造了条件。","quote":"借由符号学带来的启发，我们归纳出了语言活动的“三重复杂性”。","chapter":"意义","_order":29},{"text":"英国著名哲学家卡尔·波普尔把世界划分为物理世界、主观知识世界和客观知识世界；法国著名精神分析大师雅克·拉康将世界划分为实相界、想象界与符号界；仍然在世的德国哲学泰斗尤尔根·哈贝马斯主张物理世界、经验世界和主体间世界的分类；中国著名语言学家沈家煊先生则将其区别为行域、知域与言域。上述理论家有各自的专业领域，却不约而同地将我们所经验的世界划分为物理、心理、语言三种类型。","quote":"基于心物二元对立的哲学传统，人们习惯性地把世界分成物质现实的和心理主观的。后来的哲人发现，有必要加入一个符号/观念/语言世界——只要世界上出现第二个能使用抽象概念的人，就会存在第三个世界，人类的交往活动、文化生活都在这个世界中展开。三个世界框架在处理人文社科类课题时相当好用，在不同理论家那里有不同的版本，但分类逻辑基本一致。","chapter":"","_order":9999}],"popularHighlights":[{"text":"我们之所以费尽心思组织语言，无非是为了在内容一侧“说到点子上”，在关系一侧“说进心坎里”。","count":528,"chapter":"前言 为什么你必须上这堂“硬核表达课”"},{"text":"因此我主张：先有脑才，再谈口才。一个脑袋空空、胸无点墨的人不可能仅通过学习“口才技巧”便具备优秀的沟通和表达能力。","count":512,"chapter":"前言 为什么你必须上这堂“硬核表达课”"},{"text":"驱动我们玩这个游戏的，绝不是什么讯息的传递，而是对关系的构建。个别时候，我们希望这种关系是平等的，但多数时候，我们希望它是有利于自己生存的差序关系，这种差序关系背后，是欲望的实现和权力的流动。","count":510,"chapter":"第一章 意义无限复杂的语言游戏"},{"text":"你羡慕的人，自由度往往远大于你；你嫉妒的人，略压你一头；你恨的人，是有资格和你争夺主体性的人——暗流涌动的平等关系是最不稳定、最容易出现冲突的关系。","count":448,"chapter":"第二章 关系 你不是嘴笨，是心钝"},{"text":"关于语言活动中伴随的紧张感，有一个开脑洞的答案——说话人感到紧张，最根本的原因是他觉察到了自己的永恒劣势。","count":429,"chapter":"第一章 意义无限复杂的语言游戏"},{"text":"自信的吊诡之处在于，在理性上，我们认为它一定是自己创造的，而在经验中，它又无时无刻不依赖别人的反馈。","count":416,"chapter":"第二章 关系 你不是嘴笨，是心钝"},{"text":"经验值。一切语料都来自经验，拥有好的表达能力的根本前提是说话人对世界拥有足够丰富且细致的感知经验。","count":372,"chapter":"前言 为什么你必须上这堂“硬核表达课”"},{"text":"按照符号学的说法，在传达的过程中，同一个符号会衍生出三种意义，即说话人的“意图意义”、文本自身的“文本意义”、受话人加工出来的“解释意义”。","count":360,"chapter":"第一章 意义无限复杂的语言游戏"},{"text":"有了经验、照应经验的词汇以及言说原理的知识，才可以考虑用何种结构组织出你的言谈。","count":352,"chapter":"前言 为什么你必须上这堂“硬核表达课”"},{"text":"语言学家会告诉你，评价是一种“三角测量”活动，其本质是通过语言，把我和你之外的某个对象设定为参照物，以它为参照，反过来确定我与你的位置与立场，根本目的是明确我们之间的相对关系。","count":340,"chapter":"前言 为什么你必须上这堂“硬核表达课”"},{"text":"你和我的相对关系，必须经由评价第三方的语言活动来间接明确。","count":340,"chapter":"前言 为什么你必须上这堂“硬核表达课”"},{"text":"说话人身为被观察者，感知到了这种令人绝望的永恒劣势，却怎么也逃离不了游戏机制设置的反馈怪圈，他无法用理智澄清这种状况，只能感到持续强化的恐慌和紧张。这显示了一切符号互动的根本性悖论——自我指涉循环。","count":336,"chapter":"第一章 意义无限复杂的语言游戏"},{"text":"一言蔽之，说话是使语言符号产生意义的活动，但一句言语到底有什么意义，取决于谁拥有最终解释权。","count":336,"chapter":"第一章 意义无限复杂的语言游戏"},{"text":"我们交往中的理性太多、觉性太少。下次和朋友见面，记得认真地看他，不要老想着说点什么，只是看着他满意地傻笑也行。如果他问你傻笑什么，你可以说没什么，I see you（我看见了你）。","count":336,"chapter":"第二章 关系 你不是嘴笨，是心钝"},{"text":"可真正的问题在于，你到底想说什么，你有什么值得说的？有洞察力的、启迪人心的观点到底从何而来？要知道，平庸乏味的观点无论如何都不可能组织成发人深省的话语。","count":330,"chapter":"前言 为什么你必须上这堂“硬核表达课”"},{"text":"我们可以将给予和流露的区别理解为表意信息与生俱来的二重性。","count":306,"chapter":"第一章 意义无限复杂的语言游戏"},{"text":"很多人说服能力不强的症结之一就在于他们忽视了理据自身的脆弱性，忘了为其提供必要的支撑","count":304,"chapter":"前言 为什么你必须上这堂“硬核表达课”"},{"text":"我们打腹稿的能力其实差不多，但我能用更少的符号笼络更多的经验，我谈论一个点，却能激活你经验中的一个面，这让我在相同智力、阅历水平下，相比你有更强的感知、理解和表达能力。","count":289,"chapter":"第三章 内容 说到点子上"},{"text":"但他们发现，加诸他人的目光最终总被自身承受，持续的相互欺骗、注视、猜疑，又一次次还施彼身，让房间里的每个人都备受折磨。最后三人终于明白了，原来不需要烈焰、硫酸、刑具和恶鬼，他人在场，就是地狱。","count":288,"chapter":"第二章 关系 你不是嘴笨，是心钝"},{"text":"当你不知道该怎么表达时，停下来自问：我到底想说什么？回答了这个问题，你也就说清楚了整件事。","count":286,"chapter":"前言 为什么你必须上这堂“硬核表达课”"}]},"CB_Ecu56S5563AW6xs6x6BUgBmU":{"rating":901,"ratingCount":38,"chapters":[{"title":"机器的意识","chapterUid":139,"chapterIdx":139},{"title":"反馈与控制","chapterUid":121,"chapterIdx":121},{"title":"第10章 量子计算","chapterUid":110,"chapterIdx":110},{"title":"现代复杂性研究思潮","chapterUid":122,"chapterIdx":122},{"title":"挑战极限","chapterUid":109,"chapterIdx":109},{"title":"几何的算术基础","chapterUid":62,"chapterIdx":62},{"title":"不可约：复数的发现","chapterUid":25,"chapterIdx":25},{"title":"毕达哥拉斯学派","chapterUid":9,"chapterIdx":9},{"title":"导论","chapterUid":6,"chapterIdx":6},{"title":"哥德尔证明","chapterUid":73,"chapterIdx":73},{"title":"柏拉图的理想世界","chapterUid":10,"chapterIdx":10},{"title":"PCP定理与不可近似性","chapterUid":106,"chapterIdx":106},{"title":"丘奇-图灵论题","chapterUid":82,"chapterIdx":82},{"title":"演绎推理：逻辑学和几何学","chapterUid":13,"chapterIdx":13},{"title":"数系的扩张","chapterUid":26,"chapterIdx":26},{"title":"代数基本定理","chapterUid":27,"chapterIdx":27},{"title":"不可计算的函数","chapterUid":86,"chapterIdx":86},{"title":"伽罗瓦的遗珠","chapterUid":30,"chapterIdx":30},{"title":"计算工具","chapterUid":31,"chapterIdx":31},{"title":"判定性问题的证明","chapterUid":83,"chapterIdx":83},{"title":"自然数的定义","chapterUid":49,"chapterIdx":49},{"title":"分析的严格化","chapterUid":43,"chapterIdx":43},{"title":"对角线方法","chapterUid":45,"chapterIdx":45},{"title":"自我指涉","chapterUid":51,"chapterIdx":51},{"title":"逻辑主义进路","chapterUid":53,"chapterIdx":53},{"title":"直觉主义进路","chapterUid":54,"chapterIdx":54},{"title":"图灵机","chapterUid":79,"chapterIdx":79},{"title":"可计算数","chapterUid":81,"chapterIdx":81},{"title":"芝诺悖论：无穷之辩","chapterUid":12,"chapterIdx":12},{"title":"数理逻辑的创立","chapterUid":35,"chapterIdx":35},{"title":"停机问题","chapterUid":84,"chapterIdx":84}],"highlights":[{"text":"自然数最早起源于人类对时间的直觉，因此一个可能的答案是，人类通过观察自然的规律总结出数学。亚里士多德要求公理是不言自明的，这本身就意味着公理是观察自然的结果。因此数学公理可能就意味着这个世界的运行规律与物理有着共同的本质，都是对这个世界的刻画与解读。但数学是人类在过去几千年中由经验总结得出的，这似乎有点不让人放心，因为经验毕竟是经验，有可能会出错，有可能只是对真理的近似描述而非真理本身。这一问题从欧氏几何第五公设的独立性，到第三次数学危机爆发,演变成了摆在眼前的现实难题。公理似乎不再是自然的真理，而是可变的和可人为定义的，数学至今尚缺乏一个统一的基础。因此，到底用何种数学系统来描述和刻画物理世界更合适，就变成了一个困难的选择题。\n如果世界真的是离散的，且满足初等算术的条件，那么我们可以得出一个惊人的结论，即这个世界是可计算的!宇宙是一台图灵机，遵循一组计算规则，通过一个状态到一个状态的转换，完成了生生不息的演化。那么不管这个计算系统有多复杂，它都需要满足哥德尔不完备性定理，即这个宇宙要么是不完备的，要么是不一致的。如果宇宙是一致的，那么必然无法演化出所有可能性;如果宇宙是完备的，它可以演化出所有可能性，则必存在矛盾之处。我们的宇宙要么存在不足，要么存在矛盾,似乎无论如何也没有一个完美的结果。这个结论可能是图灵也未曾想到的，他的图灵机意义之深远，超出了所有人的想象，似乎正好架设在可能与不可能的边界上。","chapter":"导论","color":5,"_order":6},{"text":"物理学里所有的量都必须是普朗克长度的整数倍，比如粒子的大小，或者粒子移动的距离。现代物理学回答不了的问题是，比普朗克长度更小的是什么?这就是无穷的本质，也即“这个世界到底是离散的还是连续的”的终极问题。数学中的未解问题，则可能需要物理来指导，二者共同揭开世界的本源之谜。","chapter":"导论","color":5,"_order":6},{"text":"对图灵信念的批评与争议一直不断。抛开工程问题、心理问题、伦理问题和宗教问题等不谈，最针锋相对的是持有数学柏拉图主义信念的哥德尔所提出来的批评。由于不完备定理的存在，可计算系统内存在着一些机器永远无法判断的命题，但是人却能够直接判断这些命题是否为真。因此哥德尔认为机器的计算永远无法达到人的思维程度，人的心灵高于机器。这种观点被称为“哥德尔信念”。","chapter":"导论","color":5,"_order":6},{"text":"这样从莱布尼茨的构想开始，到乔治·布尔思考人类思维过程，再到图灵证明图灵机与人类计算者等价，最后结合了神经科学的进展，一个实现人类思维过程的有效计算路径终于由麦卡洛克与皮茨总结出来:如果大脑的思维过程可以用图灵在1936 年论文中定义的“有效计算过程”来解释，那么一台图灵机就可以对大脑进行模拟，进而让机器获得与大脑同等程度的智能。这一立场被称为“图灵信念”。","chapter":"导论","color":5,"_order":6},{"text":"数学已经无法带来确定性的结果，我们只能选择接受什么数学系统。现代计算机选择接受古典数学，以图灵机为理论模型，实现了初等数论的加法和乘法。世界上最早的计算机EDVAC项目，通过“冯·诺依曼架构”的设计方法实现了通用图灵机的模型。现代计算机在中央处理器(CPU)中都有运算器，其中包含了算术逻辑单元，实现了初等算术的加法和乘法。也正因如此，所有基于冯·诺依曼架构的现代计算机(实际上包含运算器)，都受到哥德尔不完备性定理的约束。计算机的能力有先天的局限性。","chapter":"导论","color":5,"_order":6},{"text":"可是不能高兴得太早。根据哥德尔不完备定理，ZFC公理系统的一致性同样无法在系统内得到证明，因此我们也不知道ZFC公理系统是否存在矛盾。更糟糕的是，在随后的几十年里，哥德尔和科恩的工作证明了连续统假设与选择公理是独立于C公理系统的，属于不可证���题。因此ZFC公理系统也是不完备的，事情变得扑朔迷离起来。既然选择公理和连续统假设是独立的，那么就可以使用新的公理代替选择公理,来建立新的集合系统。就像当年欧几里得第五公设被证明是独立的，最后催生出非欧几何的各种系统一样，在集合论的ZFC公理体系中，出现了同样的局面。新的公理被加入后，数学家们创造出各种各样的数学系统，其中一些公理还是互相矛盾的，比如决定性公理与选择公理矛盾。在ZF中，如果用决定性公理(AD)代替选择公理(AC)，可以证明每个实数集都是勒贝格可测的，从而不会推导出巴拿赫-塔斯基定理的怪论。类似地，选择公理使得一些分割性质是假的，但决定性公理却能推导出这些分割性质。数学的未来充满不确定性，似乎建立一个大一统的理论越来越困难。第三次数学危机迄今为止的结果不但没有让数学基础收敛，反而越来越发散了。","chapter":"导论","color":5,"_order":6},{"text":"为解决第三次数学危机，在三大流派之外还出现了公理化集合论的方法，可称\n之为第四大流派。以策梅洛为代表的数学家们认为康托尔的集合论之所以出现悖论，是因为允许“所有集合的集合”存在，因此如果通过公理约束了这一条件，就能修复集合论中的漏洞，从而有机会建立一个完善的数学系统。同时，因为康托尔在创立集合论时本身对集合的描述过于模糊，采用了类似直觉的说法，所以也需要通过公理化来让集合论得到精确定义，完成集合论的严格化。这一运动的结果就是著名的集合论策梅洛-弗兰克尔公理系统诞生了。该系统也被称为ZFC公理系统，它由10条公理组成。其中Z为策梅洛的名字首字母，F为弗兰克尔的名字首字母，AC为选择公理，ZF+AC简写为ZFC。从集合论的ZFC公理出发，可以推导出自然数和初等数论，以及其他很多数学系统。当今的数学家们已经普遍接受了ZFC公理系统，它是目前看起来最重要的数学基础。集合论也由此被划分成康托尔的朴素集合论和公理化集合论。","chapter":"导论","color":5,"_order":6},{"text":"然而，就在希尔伯特满怀雄心壮志地向全世界宣布“我们必须知道，我们必将知道”之时，一个叫库尔特·哥德尔的无名后辈横空出世，证明了“一个包含初等算术的希尔伯特形式系统既不完备，也无法从系统内部证明自身的一致性”。哥德尔先用编码的思想将形式系统编码成哥德尔数,然后使用康托尔的对角线方法构造出了一个“既不可证是，又不可证否”的命题，用归谬法完成了证明。哥德尔的方法启发了丘奇和图灵，后两者延续哥德尔的思路，进一步证明了希尔伯特的判定性问题的答案也为否。被希尔伯特寄予厚望的重塑数学基础的计划就这样彻底破产。但是形式系统的性质却因为哥德尔、丘奇和图灵等人的工作，被研究透彻，形成了完善的理论。","chapter":"导论","color":0,"_order":6},{"text":"希尔伯特认为这样的形式化公理系统需要证明公理的独立性、一致性、完备性\n和可判定性°，而算术形式化的相容性证明是这个系统的核心问题。但区别于极端和狂热的形式主义者,希尔伯特在其思想里将数学分为具有真实意义的“真实数学”和不具有真实意义的“理想数学”，并希望通过有穷主义的构造性方法，在元数学\n形式化公理系统的独立性，即要求公理之间互相独立，不存在蕴涵关系;一致性指公理之间是无矛盾的，不会从公理推出相互矛盾的定理;完备性指从公理出发可以推出系统中的所有定理;可判定性则指是否存在一个通用方法可以判定命题是否可证，如果判定性问题有解，那么马上可以知道类似丢番图方程的可解性、哥德巴赫猜想等命题是否可证。\n中证明理想数学的相容性。希尔伯特认为数学真理在于有穷性，这与形式主义者是有所区别的。一旦希尔伯特的构想顺利完成，数学就有了一个坚固的基础，而且所有数学系统都将建立在希尔伯特的元数学基础之上。希尔伯特在20世纪20年代开始实施他的这项宏伟计划，很多数学家投身其中，第三次数学危机似乎就要画上一个句号。","chapter":"导论","color":0,"_order":6},{"text":"尽管希尔伯特本人并不认为自己是形式主义者,但他确实明确提出过抽离符号\n意义的想法，因此形式主义者都将其视作祖师。希尔伯特认为直觉主义的做法不可取，也认为逻辑主义者过于理想化地将数学建立在逻辑公理之上并不现实。希尔伯特早年曾通过模型化的方法重新制定了平面几何的新公理体系,将平面几何的一致性问题转移到了实数代数上，这是一种转移问题的方法，并没有解决根本问题，因为实数代数的一致性也没有得到证明。因此这次希尔伯特希望能够一劳永逸地解决整个数学基础不稳固的问题。这一次他不再使用模型方法来回避问题，而是直面真正的困难和挑战。他试图为数学建立公理化系统，然后抽离符号原本的含义，通过符号之间的变换规则,完成公式之间的变换,而数学证明的过程就是一个公式序列，定理就是公式序列的最后一个公式。希尔伯特认为这个过程可以用来刻画人的思维过程，这个系统即他的形式系统。从此数学的研究对象就高度抽象起来，侧重点从研究数学对象变成了研究对象之间的关系。这为现代数学打开了一扇全新的大门。\n这种研究数学的数学，被称为“元数学”或“证明论”。","chapter":"导论","color":0,"_order":6},{"text":"第二个流派是直觉主义，以庞加莱、克罗内克、布劳威尔和外尔为代表。直觉\n主义者的直觉不是指对事物的认知，而是指数学活动是纯粹的人的思维过程。直觉主义者拒绝承认无理数,也不接受排中律,认为数学必须建立在可构造的基础之上，无理数因为无法被真实构造出来，不应得到承认。这涉及数学的实在论，直觉主义积极的一面在于其承认的数学是可构造的，因此都是可以被应用的，有巨大的社会价值。直觉主义者的观点基本上否定了大部分的古典数学，尤其对排中律的拒绝基本上让古典数学寸步难行。这种对数学阉割的做法遭到来自希尔伯特的强烈反对，为了挽救古典数学，重建数学基础的大厦，希尔伯特创建了公理化的形式系统，提\n出了证明论的思想。","chapter":"导论","color":0,"_order":6},{"text":"罗素在弗雷格的基础上，结合了皮亚诺的符号技术，\n基数表示一个无穷集合的元素个数。\n试图通过逻辑公理推导数学。他和怀特海合著了20世纪最重要的数学著作《数学原理》，这一流派被称为逻辑主义。《数学原理》可以看作对莱布尼茨的逻辑演算和普遍符号语言的一种实现。可惜罗素和怀特海建立的系统，由于不可避免地采用了有争议的可化归性公理、无穷公理和选择公理，而未尽全功，因此试图将数学建立在逻辑公理之上的尝试是失败的。","chapter":"导论","color":0,"_order":6},{"text":"为了应对数学基础的危机，重新建立一个稳固的数学大厦，出现了四个流派，分别从不同的道路进行尝试","chapter":"导论","color":0,"_order":6},{"text":"就在弗雷格撰写的《算术的基本规律》第二卷即将印刷之际，罗素给弗雷格写了一封信，提出了一个悖论，指出根据集合论的定义，一个集合S如果由所有不属于它的集合组成，那么S是否是自己的子集呢?如果S是自己的子集，根据S的定义，它不应该属于S;反之，如果S不属于自己的子集，根据S的定义，它应该被包含在S中。这个悖论被称为“罗素悖论”,它与“理发师悖论”是等价的,即“小镇上的理发师只给不剪自己头发的人理发，那么理发师该不该给自己理发?”罗素悖论看似简单，但极难解决，直接动摇了作为数学基础的集合论，数学陷入空前的危机，一切数学的结论可能不再可靠。","chapter":"导论","color":0,"_order":6},{"text":"在戴德金、康托尔、皮亚诺和弗雷格等人的努力下，自然数被严格定义。\n在康托尔创立了集合论之后，戴德金、弗雷格等人借助集合论定义了自然数，皮亚诺则建立了一个符号体系和自然数的公理系统，他在其中定义了0是自然数，每个自然数有一个唯一的后继，以及自然数的加法和数学归纳法。我们今天的初等算术都在使用皮亚诺的算术公理体系。从皮亚诺算术的公理出发，可以推导出自然数的乘法和除法等四则运算。这样，整个数学的基础就建立在康托尔集合论的基础之上了。19世纪的数学严格化运动，让数学家们对未来充满了信心。第二次数学危机关于无穷小量的危机被消除了。法国数学家庞加莱在1900年的第二届国际数学家大会上乐观地宣称:“今天我们可以宣称绝对的严密已经实现了!”但庞加莱高兴得太早了，因为一场空前的危机正在到来。","chapter":"导论","color":5,"_order":6},{"text":"“自然数”定义的严格性，因而成为一个关键问题。历史的发展很有趣，19世纪的数学家们先精确定义了无理数，然后才精确定义了自然数。无理数的概念发展是数学中的一个核心话题，因为涉及对无穷的理解。自古希腊时期通过几何推理回避了无理数这一怪胎后，无穷的概念沉寂了上千年。到了17世纪，牛顿和莱布尼茨分别独立发明了微积分，其中用到了无穷小这一概念。但牛顿和莱布尼茨都没有解释清楚什么叫无穷小，因此遭到主教贝克莱的批评。贝克莱提出“无穷小量到底是不是0”的悖论，导致第二次数学危机。直到19世纪，柯西精确定义了极限和收敛的概念，建立了极限理论，才驯服了无穷小量:无穷小即任意小的趋于零的变量。可惜的是，柯西的极限理论并没有定义无理数，缺少一个实数系作为极限理论的根据，因此以无理数为极限的无穷序列也就缺少真正的极限。这一缺陷直到19世纪后期，才由魏尔斯特拉斯、戴德金和康托尔弥补，他们的工作精确定义了无理数。在这个过程中康托尔创立了集
