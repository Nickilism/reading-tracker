    const books = [{"title":"X的悲剧","author":"[美] 埃勒里·奎因","start":"2021-01-02","finish":"2021-01-06","rating":8.2,"pages":"376","doubanLink":"https://book.douban.com/subject/26915344/","cover":"https://neodb.social/m/item/doubanbook/2026/01/02/3095b644-6049-47b9-9183-bb7178cbfdf8.jpg","review":"除了易容术过于夸张，大体上挺好的，尤其喜欢引用莎士比亚的那几个桥段。","summary":"证券商哈利·朗斯特里特在电车上被一种奇怪的凶器毒杀，警方进行了地毯式搜索却仍然毫无头绪。无奈之下，萨姆巡官和布鲁诺检察官慕名前往哈姆雷特山庄向年过六十的前著名莎士比亚戏剧演员哲瑞·雷恩寻求帮助。听完案情陈述后，雷恩居然声称自己知道凶手是谁，却拒绝在没得到确凿证据前指认凶手的身份！不料没过多久，一位神秘人来信宣称握有案件的重要线索……","month":1,"country":"美国","wereadId":"852623"},{"title":"傅雷家书","author":"傅雷, 朱梅馥, 傅聪","start":"2021-01-08","finish":"2021-01-13","rating":8,"pages":"336","doubanLink":"https://book.douban.com/subject/26817324/","cover":"https://neodb.social/m/book/2021/09/19f0910072-4109-452d-9cdc-8cb88cc022c2.jpg","review":"原谅我未能依次读完，在读到中段时直接跳读到结尾。《傅雷家书》真的是家书，由傅雷一家人在五、六十年代的信件编排而成，故在可读性上并不是太高。\n\n傅聪能在那个年代有一个知识分子，高艺术修养的父亲，还在这个父亲的谆谆教导下长大，对一众同时代人而言是可以算绝无仅有了吧。豆瓣短评上会看到对傅雷家教方式两种截然不同的评价。对傅聪而言若从结果论，他是幸运的，父亲为他提供了一般家庭永远无法提供的成才条件，并且他自己也够扬眉吐气；若从过程论，虽无直接证据，但字里行间能看出傅聪并不享有一个快乐的童年，在父亲严苛的高标准要求下，能挺过来想必已不容易。所以对于这样的家庭环境，到底是好还是坏呢？我想这里没有两害相权取其轻的标准，更多的是一种个人取舍与选择，同时父亲自己的成长环境与养成性格决定了培养子女的方式。\n","summary":"傅雷家人亲自编定的家书精选本，在选编上更重视傅雷家书的思想性和丰富性，对傅家父子之间关于音乐、文学等艺术，为人处世的人生哲学，以及对文学艺术名家的品评等都尽量忠实收录，是一部厚重、更原汁原味的《傅雷家书》。\n基于家书完整著作权的独占性，本书情节完整，背景清晰，人物鲜明，好看感人。贯穿全书的傅雷家人照片和家书墨迹与内容相辅相成，拉近了家书与读者的距离，迥别于其他内容不完整的选编本。书中珍贵照片、楼适夷初版代序、傅聪家信及英法文信等都是译林独家版权。也就是说，即使2017年傅雷著作权进入公版，其他任何家书选本没有权利收录这些内容，而真正完整、丰富、权威的《傅雷家书》，只能在译林出版社找到正版。","month":1,"country":"中国","wereadId":"840919"},{"title":"鼠疫","author":"(法)阿尔贝·加缪","start":"2021-01-07","finish":"2021-01-15","rating":8.5,"pages":"273","doubanLink":"https://book.douban.com/subject/24257229/","cover":"https://neodb.social/m/book/2021/09/15a22a89ce-81fb-4a08-8289-bdfbcda5d53b.jpg","review":"《鼠疫》中有很多对疫情中人们变化的精彩侧写，在新冠过后阅读颇有感触。","summary":"阿尔贝•加缪（1913—1960）是法国声名卓著的小说家、散文家和剧作家，“存在主义”文学的大师。1957年因“热情而冷静地阐明了当代向人类良知提出的种种问题”而获诺贝尔文学奖，是有史以来最年轻的诺奖获奖作家之一。\n加缪在他的小说、戏剧、随笔和论著中深刻地揭示出人在异己的世界中的孤独、个人与自身的日益异化，以及罪恶和死亡的不可避免，但他在揭示出世界的荒诞的同时却并不绝望和颓丧，他主张要在荒诞中奋起反抗，在绝望中坚持真理和正义，他为世人指出了一条基督教和马克思主义以外的自由人道主义道路。他直面惨淡人生的勇气，他“知其不可而为之”的大无畏精神使他在第二次世界大战之后不仅在法国，而且在欧洲并最终在全世界成为他那一代人的代言人和下一代人的精神导师。","month":1,"country":"法国","wereadId":"912324"},{"title":"十日谈","author":"（意）薄迦丘","start":"2021-01-13","finish":"2021-01-22","rating":8,"pages":"699","doubanLink":"https://book.douban.com/subject/5378429/","cover":"https://neodb.social/m/book/2021/10/2599818389-6ebf-42e2-8f3a-13da746a6a8f.jpg","review":"一想到这本书是600多年前写作的，便肃然起敬。我们都知道，评价一本书的优劣除了文本内容之外，还要还原到成书时的历史、文化背景。就文本而言，本书所述的一百个故事无疑都是通俗易懂言辞直白的，当然也可能是我们的翻译功不可没。而就文本故事内容揭示的寓意而言，作为一个普通读者，我无法直接明白的感受到作者的创作动机和心路历程，只能通过各种解读旁敲侧击的去理解，因此做不了任何客观的评价。","summary":"1348年，意大利一城市瘟疫流行，10名青年男女在乡村一所别墅里避难。他们终日游玩，欢宴，每人每天讲一个故事，10天讲了100个故事。这些故事批判天主教会，嘲讽教会的黑暗和罪恶；赞美爱情是才智和高尚情操的源泉，谴责禁欲主义；无情暴露和鞭挞封建贵族的堕落和腐败，体现了人文主义思想本书是从意大利文直接翻译的全译本，保留了原著古朴、精练、生动的语言风格。","month":1,"country":"意大利","wereadId":"856057"},{"title":"科学哲学","author":"[美] 奥卡沙","start":"2021-01-18","finish":"2021-01-27","rating":8.8,"pages":"139","doubanLink":"https://book.douban.com/subject/3550249/","cover":"https://neodb.social/m/book/2021/09/1677009f09-40f8-4e79-bb36-5db795ec00c5.jpg","review":"一本作为科学哲学入门非常合适的书，因为买的是实体版，意外的发现是双语版本，第一次尝试直接读原文，收获很大。\n\n下面是读书笔记\n\n# 科学哲学\n## 第一章\n第一章中对关于卡尔波普儿的科学定义阐述，让我有了新的认识。之前以为能讲一句科学是「可证伪的」(falsifiable)就感觉很懂了。然而实际上，可证伪本身对于科学的定位仍然是有问题的，书中用了两个例子来说明，一个是波普儿鄙视佛洛依德的精神分析法和马克思的共产主义理论不可证伪性，另一个是牛顿计算的天王星轨道偏移预测了海王星的存在。在两个例子中前者的不可证伪遭到鄙夷，而后者却通过修正得到了证实。\n\n结尾处还引用了维特根斯坦关于「游戏」的定义来说明定义科学的困难，一个很有意思的观点。\n\n## 第二章\n第二章在介绍完推理和归纳的定义区分后作者引入了著名的休谟归纳难题(Hume's Problem of Incduction).即归纳结论是否值得信任，我们无法证明。\n\r\n后世哲学家有从概率角度解释，有从意义角度解释，但都无一个令所有人满意的答案。归纳推理中又延伸出了一种最佳归纳解释(IBE)的方法，书中例举了达尔文进化论和爱因斯坦证明布朗运动展示IBE的使用效果。对于IBE，人们倾向于用简单和简洁作为它的一个要求，但科学哲学家们还无法在此达成一个共识。\n\r\n基于概率的三种解释：频率性解释、主观性解释、逻辑性解释，其中逻辑性解释貌似更利于解答休谟难题，但也碰到了在数学和哲学上无法解释的问题。\n\n## 第三章\n第三章主要涉及的是科学的实现和解释。书中首先介绍了卡尔亨普尔用于解释科学而构建的的“覆盖率”模型（Covering Law Model），这一模型通过引入1、至少一个普适规律和2、一些既定事实来3、解释一个现象（因被解释的现象由普适的自然规律覆盖而得名）。通过两个例子，1、旗杆投影计算旗杆长和2、男性服用避孕药无法怀孕，作者阐述了此模型的弊端，即因果性和相关性问题。实际上，亨普尔的这一模型缺少因果性并非他的无意疏忽，而是他作为一个经验主义者的立场决定的。基于此，近年来有很多哲学家会更倾向于基于因果性的科学解释。\n\n本章后半段探讨了科学能否解释一切的问题，当然，目前并无定论，部分哲学家表示随着科学进步，尽管科学能解释诸多现象产生的原因，但是解释这个原因有何而来则是困难的，如是什么导致的万有引力。我想这当然就是各种宗教和神学被诉诸的一大原因。\n\n最后，本章谈了科学和还原，关于所有科学学科能否最终被还原为物理学来解释的问题，因为人类的研究对象最终都是由物理实体组成的，从这个角度看物理学似乎最终可以统一所有的科学学科。然而，还有一个观念涉及到一个“多重实现”的理论，即同一个物理实体，随让最终都是由原子能微观粒子构成，但是有可能是通过不同的排列组合进行的多重的实现（举了烟灰缸的例子），如果用微观物理学的角度去观察，并不能得出更具体的解释。所以让生物的归生物，经济的归经济，化学的归化学可能是更正确的看法。\n\n## 第四章\r\n第四章开始谈实在论和反实在论，当然指并非广义的实在论，而是自然科学实在论，和其反实在论，或者称为工具主义论。反实在论的观点是科学发现解释的东西包括可观察的和不可观察的，其中对可观察实体的解释为真的毋庸置疑，但不可观察的实体的解释则是不确定的，只是提供了一种预测观察的方便方法。而实在论则不区分可观察实体和不可观察实体，科学能够解释描述我们的世界。\n\n实在论的立足点在于“经验成功”，科学理论能够精确的符合现实观察，并且能够做出预测，则为真，因此还提出一种“无奇迹”论点，不存在这种奇迹，即与理论符合的如此之好的不可观察实体是不存在的。但反实在论的反击同样有力，因为科学发展史上存在数次这样的例子来说明，如燃素论，如以太论，最终由现在的科学证明，这两个不可观察的实体的确是不存在的。为此，实在论者通过诘问如何区分可观察和不可观察实体来进行反击。在用眼睛、眼镜、低倍光学仪器、高倍光学仪器等一系列渐变的观察手段中，如何区分那些“观察”到的实体，哪些算可观察的哪些算不可观察的？通过模糊观察的定义，这一观点让反实在论陷入困境。\n\n反实在论者反驳道，尽管没有一条明晰的可观察和不可观察实体的分界线，但现实中的不可观察实体是确实存在的，这并不妨碍反实在论者对解释这类实体的科学理论提出质疑。反实在论者还提出一种“证据不足理论”，即对于不可观察实体的科学解释基于的是间接的观察，如气体温度变化的动力学解释，由于证据不够充分，实际上可能存在其他不同的科学解释也能符合这种间接观察数据。实在论者虽然承认原则上有这样的可能，但不同的理论的存在优劣的差别，如简单性。然而，对于理论的选择依据怎样的标准本身还是一个值得争议的事情。\n\n最后，实在论者认为，“证据不足理论”本质上其实就是对科学采取归纳法的质疑，因为在实际的科学理论得出操作中，即使是可观察实体，也并未尽到完全观察，如陨石撞击、恐龙的存在，若采取“证据不足理论”，那么很大程度上我们的科学理论都是值得怀疑的。所以跟观察无能否观察和大小反而无关了。\n\n## 第五章\n第五章内容主要论述了科学史家、科学哲学家托马斯库恩的\"科学革命的结构\"中的观点。逻辑实证主义者们对科学史关注过少，高看自然科学，认为存在客观真理和得出真理的有效理论以及科学是绝对客观的和理性的，库恩在这几点上做了有力的反驳。他使用的是“范式转换”、“不可通约性”、“理论负荷”这几个概念。\n\n通过研究科学史，他将科学发展分为常规科学和变革科学，常规科学期中，科学的发展被既有的“范式主导”，范式不仅仅是一套理论，它是对科学的总体观点，包括一系列的价值观、信念、假设等。常规科学的活动是尽量让所有科学发现理论去适应这一范式，而不是相反，直到越来越多的反常现象的出现，才有可能出现范式的变革。而范式之间的切换选择，也并非是朝着理性向上线性发展的，科学的发展史也不是线性的，即非累积性的。科学家在理论上的选择可能就像“群众心理学”一样。\n\n库恩认为，不同范式之间很大程度上是不可通约的，即对两种范式进行比较时，没有一种共同语言能实现其互通。通过这点，他强调范式之间的切换是非客观的。甚至，他认为真理本身是相对范式而言的。在判别两种范式的优劣过程中，我们无法用实验数据的有效性来作为依据，因为这些数据存在“理论负荷”，即被科学家称为数据或事实的东西依赖于她所接受的范式。没有这样的算法能指导我们对科学理论进行选择。\n\n## 第六章\r\n第六章内容不怎么涉及科学哲学的理论知识，主要是举了三个领域，物理、生物学以及心理学上的例子来展示当今的科学哲学难题。\r\n物理学的例子是关于牛顿和莱布尼兹关于空间是否是绝对的争论。\r\n生物学的例子是关于生物学分类到底是该以表现型分类学还是分支分类学为准的争论。\r\n心理学上的例子是关于人的意识到底是否有模块性的争论。\n\n## 第七章\n第七章探讨了科学遇到的评论。“科学主义”是一个贬义词，它指的是对科学的盲目崇拜。近代的科学发展，让它在人们生活中的地位超越了任何其他学科，甚至一切学科问题最终都能用理性的科学来解答，连哲学都只是用来的理清科学知识的一种附庸工具。而在科学内部，自然科学对于社会科学亦有一种优越感，这种优越感的来源可能来自于自然科学使用的“数学化”的方法，亦可能是社会科学还处在发展萌芽期。但即便如此，现今我们对什么是科学方法仍然没有一个准确的答案。\n\n文章后续列举了两个例子来阐述科学面临的挑战。其一是美国民众对达尔文进化论和神创论两种理论之间的选择斗争。这里探讨了神创论反驳进化论只不过是一种理论假说的观点，基于我们的科学实践都是归纳的而非推理的，想要通过数据、实验来完美证明一个理论是不可能的，对于一组数据，总能找到多个符合的理论解释。这也是本书前文论述过的内容。另外一个例子是关于人类社会生物学的，这里探讨了科学家在进行科学实践时是否能秉持价值中立，一如既往，作者从正面到反面对各种观点进行了叙述，最终很难得到一个确切的答案。","summary":"《科学哲学》为当代科学哲学中的主要问题提供了一幅清晰准确的鸟瞰图。何为科学？科学是否客观？科学能否解释一切？萨米尔·奥卡沙开篇扼要介绍科学发展的历程，继尔探讨科学推理的本质、科学领域的革命以及实在论与反实在论等理论问题。作者还审视了专门科学领域中的哲学问题，科学和宗教之间的争端，以及科学作为双刃剑的利与弊。","month":1,"country":"美国"},{"title":"钟表馆事件","author":"[日] 绫辻行人","start":"2021-01-25","finish":"2021-02-01","rating":8.4,"pages":"452","doubanLink":"https://book.douban.com/subject/26771719/","cover":"https://neodb.social/m/book/2021/09/15373094a6-4bd7-460f-b202-952b43269a79.jpg","review":"如今看来四平八稳，但也没有特别的亮点。","summary":"镰仓的寂静山林，隐藏着又一处中村青司设计的神秘建筑---钟表馆。馆内上百个不同的钟表，以不可思议的方式惊人地指向相同的时刻并等速行进着；馆外竖立着一座没有指针的钟塔，其钟铃也从未响起过。十年前，馆主人古峨伦典心爱的女儿不幸去世，随之而来的是古峨家另外六个相关人物的死亡。此后，在那沉默的钟塔下，出现了一个美丽的少女的幽灵，徘徊在静谧的森林中……十年后，以关注超自然现象而闻名的《CHAOS》杂志社，为了采查亡灵的真相，连同W大学超常现象研究会的几名成员，和一位通灵师一起，步入了诡异的钟表馆。然而他们没有想到，为期三天与世隔绝的通灵会，却演变成了疯狂的杀戮时刻。随着时光飞逝，他们一个接一个的倒下，死神的指针最终划破了冷酷的表盘……??","month":2,"country":"日本","wereadId":"23193074"},{"title":"一个叫欧维的男人决定去死","author":"[瑞典] 弗雷德里克·巴克曼","start":"2021-02-03","finish":"2021-02-19","rating":8.5,"pages":"312","doubanLink":"https://book.douban.com/subject/26672693/","cover":"https://neodb.social/m/book/2021/09/1596c7fe9d-ecc4-403c-967b-c7dda1dec81f.jpg","review":"非常细腻的人物刻画，翻译也挺棒。","summary":"来认识一下欧维，这个59岁的老头，脾气古怪，带着坚不可摧的原则、每天恪守的常规以及随时发飙的脾性在社区晃来晃去，被背地里称为“地狱来的恶邻”。他每天一大早就四处巡视，搬动没停进格线的脚踏车，检查垃圾是否按规定分类，抱怨谁家的草坪还不修剪，诅咒那只掉了毛的流浪猫。没完没了 。\n他想自杀。\n直到一个十一月的早晨，当一对话痨夫妇和他们的两个话痨女儿搬到隔壁，不小心撞坏了他的邮筒……\n“读这个故事，”《人物周刊》说，“你会笑，你会哭，会因此想搬到北欧去，因为那里的一切都更可爱一些。”这个发生在瑞典的故事，如生命庆典般绚丽斑斓，它让我们思考，自己是谁，以及我们要如何过这一生。\n有的人称它是《一个的朝圣》瑞典版，读者评价它“令人愉悦又心碎”“搞笑之余让你感动且哭得稀里哗啦”“读到一本好小说的感觉真好”！\n它已被拍成电影（传送门：https://movie.douban.com/subject/26628357/），这里有一个愤怒的恪守常规的普通邻家老头，一对话痨夫妇和话痨女儿、这里有一只掉了毛的乱蓬蓬的倒霉猫，这是一场人与人之间的迷人相遇。","month":2,"country":"瑞典","wereadId":"814146"},{"title":"从一到无穷大","author":"[美] 乔治·伽莫夫","start":"2021-02-19","finish":"2021-02-28","rating":8.5,"pages":"424","doubanLink":"https://book.douban.com/subject/34782541/","cover":"https://neodb.social/m/book/2021/09/173a0ab10a-73cf-4171-bcf4-95ebb9c1e126.jpg","review":"这是一本首次出版于70多年前的科普书，但至今看来仍未过时，书中描写的科普内容无不不是好奇少年心中的向往，如果在初高中时期我能读到这本书，也许会对我此后的人生有些许改变。","summary":"清华大学校长邱勇送给清华大学新生的入学礼物。中国近40年最具影响力的科普书之一。\n◆当你翻开这本书，本书将带你：玩遍数字游戏，感受时间与空间组成的奇妙四维世界；深入微观世界，漫游由一个奇点爆炸而来的无穷宇宙。\n◆权威底本：1961年维京出版社（Viking Press） 作者修订版，首度收录未面世全索引\n◆精心编校：精心修复128幅作者手绘，双色标注2 63处内容重点，根据最新科学发现新增35条译注，特邀数理专家审校\n◆独家定制：《从一到无穷大》重点笔记，随书携带，帮助理解；《从一到无穷大》特别纪念海报，领略科学的诗性与浪漫。\n◆重磅推荐：四川大学李言荣推荐给《人民日报》的必读书目，《数学之美》《文明之光》《浪潮之巅》作者吴军博士、北京大学经济学教授何帆、《21世纪商业评论》主编吴伯凡、清华大学人文学院教授吴国盛多次在公开场合推荐的科普入门读物。\n◆远大意义：它是“大爆炸”理论推动者乔治·伽莫夫的顶级科普经典，风靡全球70余年，鼓舞一代代年轻人走上科学道路。很多在年少时期读过《从一到无穷大》的人，如今有很多活跃在科学领域，或在高等学府成为科学研究的一线力量；或成为传播科学知识的科普达人。\n◆文本价值：从一粒原子，到无穷宇宙，一本书汇集人类认识世界、探索宇宙的方方面面：数论、世界线、相对论、量子力学、核物理、遗传学……\n这本书将会回答你如下问题：\n1.无穷大究竟有多大？\n2.空间有里外之分吗？\n3.为什么三维世界里的人无法想象四维空间？\n4.相对论是怎么“相对”的？\n5.我们怎么才能看到原子的尺寸？\n6.核反应时究竟在发生什么？\n7.生物与非生物的界限在哪里？\n一，二，三……快进入无穷大的科学世界吧","month":2,"country":"美国","wereadId":"26295687"},{"title":"编码宝典","author":"[美] 尼尔·斯蒂芬森","start":"2021-01-27","finish":"2021-03-02","rating":8.1,"pages":"1280","doubanLink":"https://book.douban.com/subject/27077159/","cover":"https://neodb.social/m/book/2021/09/1630ff69f5-f082-46f8-a585-1c8334bf98ef.jpg","review":"三本大书，近百万字，看了一个来月才看完。初识这本书实在看美剧《硅谷》的时候，此书也被誉为极客圣经。尼尔脑袋里有太多稀奇古怪的东西，如果你不能和他同频共振，那看他的书便会昏昏欲睡，我的感受在读第一本的时候尤其如此，后面两本越看越有味道。总的来讲整书的主线似乎没太大波澜，让我有吸引的反而是各类支线上的小故事。最后，本书和赛博朋克没有丝毫关系。","summary":"这是一段长达一千多页的传奇，以破译数据密码为中心线索，结合了历史小说和科技惊险小说的元素，从第二次世界大战破译纳粹密码的“布莱切利公园”一直到现代在东南亚建立的“信息天堂”。这是一部跨越时空的信息流动发展史，被一代又一代IT人奉为“Geek圣经”。\n1942年，年轻的美国海军密码破解专家劳伦斯•沃特豪斯被委派到神秘的2702部队，这个部门的任务是掩盖德军的恩格玛密码已经被破解的事实。他们躲在敌人身后，想法设法在情报战中误导敌方。在2702部队服役的美军中士鲍比•沙夫托，冒着生命危险执行沃特豪斯的计划，与此同时，沙夫托的老朋友，日本的采矿工程师后藤田悟，被委派到菲律宾一座矿山中执行秘密任务，三人的命运紧密相连……\n1997年，兰迪•沃特豪斯通过光纤电缆为菲律宾移民提供讯息，寄生藤公司通过这笔收入在附近建立地下数据库，道格•沙夫托和他的女儿则负责电缆的海底调查工作，而监督这项工程的正是……一个更大的阴谋渐渐披露，2702部队的秘密也渐渐浮出水面。","month":3,"country":"美国","wereadId":"3001112104"},{"title":"看不见的城市","author":"[意大利] 伊塔洛·卡尔维诺","start":"2021-03-03","finish":"2021-03-05","rating":8.7,"pages":"182","doubanLink":"https://book.douban.com/subject/10555509/","cover":"https://neodb.social/m/item/book/2026/02/05/513cbad8-ac0f-4e1c-a296-04bbc21c85d2.webp","review":"如同书中所言，「掌控故事的不是声音，是耳朵」，阅读此书时掌控它的不是文字，而是眼睛。从目录开始，《看不见的城市》就以一种奇特的结构展现在读者面前。在这里我迷失了时间和空间，我进入一个个似乎是假想的却又能在现实中找到模板的城市。书中似乎到处都是卡尔维诺埋下的隐喻，如果说语言是用来描绘情绪，现实的工具，他的文字犹如语言上的语言。\n","summary":"在大陆，王小波、苏童、阿城、止庵是他的忠实粉丝\n在台湾，朱天文，唐诺是卡尔维诺不余遗力的传播者\n在香港，梁文道说他一直在准备谈卡尔维诺，可是一直没准备好\n权威版本，全面修订2006年单行本译本，并增补卡尔维诺各作品自序、后记、注释等重要资料\n知名设计师全新装帧，精装双封设计，书脊烫金，封面采用原创线条图，赋予每部作品文学个性\n卡尔维诺认为他“写了一种东西，它就像是在越来越难以把城市当作城市来生活的时刻，献给城市的最后一首爱情诗。也许我们正在接近城市生活的一个危机时刻，而《看不见的城市》则是从这些不可生活的城市的心中生出来的一个梦想。”","month":3,"country":"意大利","wereadId":"24953405"},{"title":"Man's Search for Meaning","author":"Viktor E. Frankl","start":"2021-03-01","finish":"2021-03-11","rating":8.2,"pages":"196","doubanLink":"https://book.douban.com/subject/2842056/","cover":"https://neodb.social/m/book/2022/05/0243b466c1-8571-481e-8a58-28ed846cab7a.jpg","review":"This is the second english book I’ve read in this year. As a Chinese reader to grasp the whole meaning of this book seems still a little hard for me. In the first part of the book the writer focused on the experience of concentration camp. After that the writer explained what is logotherapy, how he could get through the concentration camp with logotherapy. The core of this kind of method or philosophy of life is to find the meaning of your life.","summary":"We needed to stop asking about the meaning of life, and instead to think of ourselves as those who were being questioned by life-daily and hourly. Our answer must consist not in talk and meditation, but in right action and in right conduct. Life ultimately means taking the responsibility to find the right answer to its problems and to fulfill the tasks which it constantly sets for each individual.\n\nWhen  Man's Search for Meaning  was first published in 1959, it was hailed by Carl Rogers as \"one of the outstanding contributions to psychological thought in the last fifty years.\" Now, more than forty years and 4 million copies later, this tribute to hope in the face of unimaginable loss has emerged as a true classic.  Man's Search for Meaning --at once a memoir, a self-help book, and a psychology manual-is the story of psychiatrist Viktor Frankl's struggle for survival during his three years in Auschwitz and other Nazi concentration camps. Yet rather than \"a tale concerned with the great horrors,\" Frankl focuses in on the \"hard fight for existence\" waged by \"the great army of unknown and unrecorded.\" \n\nViktor Frankl's training as a psychiatrist allowed him a remarkable perspective on the psychology of survival. In these inspired pages, he asserts that the \"the will to meaning\" is the basic motivation for human life. This simple and yet profound statement became the basis of his psychological theory, logotherapy, and forever changed the way we understand our humanity in the face of suffering. As Nietzsche put it, \"He who has a why to live for can bear almost any how.\" Frankl's seminal work offers us all an avenue to greater meaning and purpose in our own lives-a way to transcend suffering and find significance in the act of living.","month":3,"country":"美国"},{"title":"公正","author":"[美] 迈克尔•桑德尔 (Michael J. Sandel)","start":"2021-03-08","finish":"2021-03-17","rating":8.8,"pages":"320","doubanLink":"https://book.douban.com/subject/20366368/","cover":"https://neodb.social/m/book/2021/09/16de4ed5ba-29e2-448a-bc9d-b0b7543a32c2.jpg","review":"一年前，我把大概十年前下载的“Justice”哈佛公开课看完，深受这个课程关于公正讨论的的震撼，由此买了这本书来阅读。就我有限的记忆力所回忆的情况，书本的内容基本与公开课视频上的内容一致，在一些地方做了一些扩展和作者迈克尔桑德尔的评价。作者的写作的特点是把一个观点、制度、矛盾、决定揉碎了，掰开了，从各个角度去分析，去考察，特别是他能举出众多典型并非常切合主题的例子，这也许也是政治哲学的精髓所在。多数时候我们并未能得出一个能说服所有人的结论，未能达成一致的共识。尤其是当我在阅读实体书的同时，配合着微信读书上的电子版阅读，能看到不少读者留下的不同意见之间的讨论。福利、自由、德性，公正的分配到底与哪一个方面有关，本书主要探讨了这三方面的内容。我被康德的绝对命令震撼，被罗尔斯的有利社会分配感动，钦佩于两千多年前提出目的论的亚里士多德，还有作者提及的叙述性共同体，这些纷繁的概念，每一个都值得去了解研究。这本书给我最大的意义可能并非能有一个固定的原则去指导处理现实生活，而是能让我站在一个更广的视界内用各种不同的角度去考察它。","summary":"安乐死是否应该得到法律许可？一条命是否不如十条命贵重？代孕合同是否合法？\n在这个日益物质化的年代，我们的行为选择总在人性和物质之间摇摆不定。我们的社会正陷入尴尬的两难选择当中。我们甚至怀疑法律是否公正，因为法律无法回避个人的道德判断，无法做到中立。\n这让习惯了传统道德观念和固定思维的我们感到不安，但这种不安，却能让我们理性精神保持清醒的状态，促使我们去寻找有关“公正”的“出路”。 “世界最受欢迎的老师之一”的迈克尔·桑德尔教授将带领我们在寻找公正的旅途中，领略思辨的价值和魅力。","month":3,"country":"美国","wereadId":"635838"},{"title":"罗杰疑案","author":"[英] 阿加莎·克里斯蒂","start":"2021-03-14","finish":"2021-03-20","rating":8.2,"pages":"306","doubanLink":"https://book.douban.com/subject/1807516/","cover":"https://neodb.social/m/book/2021/09/15352b8abd-c3c2-47b7-8223-a6bb45c64717.jpg","review":"结尾看的难受","summary":"罗杰·艾克罗伊德是个知道得太多的人。\n他知道他爱着的女人毒死了她的第一个丈夫。他知道有人在敲诈她——现在他知道她因服用过量药物而自杀身亡。\n晚班邮件很快就会让他知道那个神秘的敲诈者是谁。但是罗杰没能把信读完就死了——他坐在书房里被人用刀抹脖子……","month":3,"country":"英国"},{"title":"P.E.T.父母效能训练","author":"[美] 托马斯·戈登","start":"2021-03-21","finish":"2021-03-28","rating":8.4,"pages":"266","doubanLink":"https://book.douban.com/subject/26681417/","cover":"https://neodb.social/m/book/2021/10/16bbc51f55-9236-4fec-a924-772328492516.jpg","review":"算是我看的第三本关于育儿方面的书。所以尽管书中很多观点自己平时也了然在心，但在处理与孩子之间的问题时，经常被抛掷九霄云外，最终变成说教、哄骗、威胁、警告、说服、恳求、鼓吹、教化和羞辱，强迫孩子去做自己认为正确的事情，而这些手段和方式，正是此书极力反对的。尤其是随着小花逐渐长大，她的抗拒和反驳的能量也越来越大，我发现这些错误的方法一个接着一个的失效。我印象最深刻的是书中介绍的“我-信息”和没有输家的“第三法”。实践效果尚未可知，但在阅读过程中我能感受到这些方法的好处。阅读期间，我能带着书中的第三方的视角来审视与孩子之间的冲突，火上心头时，脑海里会有个声音提出反对意见。我想接下来应该好好将书本方法付诸实践。","summary":"父母效能训练（P.E.T.）课程由美国著名心理学家托马斯•戈登于40 多年前创办，专门向父母传授与孩子有效沟通的技巧，并循序渐进地提出建议，以解决家庭冲突，让每个人在冲突中都成为赢家。《父母效能训练》备受推崇的家教经典，经过几十年的使用验证与推广，备受赞誉，在50 多个国家举办培训。这本具有开创性的父母指导书将：\n如何避免成为一位许可型父母；\n如何听孩子才肯说，如何说孩子才愿听；\n如何教孩子面对他们的问题并自己解决；\n如何使用双赢的办法来解决冲突；\n……\n学习和运用《父母效能训练》这本不受时代限制的P.E.T. 教程，将让亲子沟通即刻产生效果：减少家庭战争、少发脾气、不说谎话、不再实施惩罚。不管您家孩子是刚会走路正寻求独立的幼儿，还是开始反叛的青少年，您在使用《父母效能训练》时都会发现：P.E.T. 确实是一套体贴人心且卓有成效的办法，它能帮助您养育一个具有责任心的孩子，塑造一个让孩子快乐成长的家庭环境。\n戈登国际培训公司(Gordon Training International) 于1974 年成立，长期致力于帮助人们正确处理生活、学习和工作中的各种人际关系，传授高效的、基本的沟通技巧和冲突解决办法。如今戈登培训公司已成为一家全球知名的培训机构。","month":3,"country":"美国","wereadId":"3000977533"},{"title":"众病之王","author":"[美] 悉达多·穆克吉","start":"2021-03-19","finish":"2021-04-04","rating":8.7,"pages":"525","doubanLink":"https://book.douban.com/subject/20507206/","cover":"https://neodb.social/m/book/2021/09/15b4cb0d8a-f14d-42e2-943c-9f7d5639e8e2.jpg","review":"一部扎扎实实的癌症传，非常易读且吸引人的科普著作。作者写作视野广，纵深深，画面感强。通过翔实历史资料、专业文献、媒体报道、患者专访等众多信息，搭配上作者的文学技巧，癌症的起源与发展被他娓娓道来。从可能千年前就发现的癌症疾病，到抗癌史上一位位医学家、生物学，科学家、社会活动家的努力，尽管这条路曲折难行，近一个世纪来癌症的疾病机理、癌症的预防换治愈手段人类都有了长足的发展和进步。","summary":"《众病之王：癌症传》是一部饱含人文主义色彩的社科文化著作。作者悉达多•穆克吉历时六年，凭借翔实的历史资料、专业文献、媒体报道、患者专访等众多信息，向读者阐述了癌症的起源与发展，人类对抗癌症、预防癌症的斗争史。作者借由医学、文化、社会、政治等视角透露出一种社会化关怀；生动、文学性的写作手法展现出鲜活的人物和历史事件，让读者为之动容。","month":4,"country":"美国","wereadId":"635969"},{"title":"论摄影","author":"[美] 苏珊·桑塔格","start":"2021-04-07","finish":"2021-04-13","rating":8.4,"pages":"309","doubanLink":"https://book.douban.com/subject/4282084/","cover":"https://neodb.social/m/book/2021/09/1780550b3c-28af-49c2-ab77-e29816cd7af9.jpg","review":"关于摄影，能被诉说的种种我想差不多都被苏珊桑塔格在这本书里道尽了，尽管更多的是断言式的看法，从而缺少理论与论据上的证明，但其言词犀利之处仍让人感觉别开生面。全书金句频频，我最喜欢的事第一篇和最后一篇。除此之外，书中在论述时引用了大量的摄影师和作品的名字，加之作品用的是中文译文想要搜寻也并非是一蹴而就的事情，是以在论述的理解上很多时候并不直观，尤其看到译者的注释连连时我便瞌睡连连。","summary":"《论摄影》不仅是一本论述摄影者的经典著作，而且是一本论述广泛意义上的现代文化的经典著作。它不是一本专业著作，书中也没有多少摄影术语，尽管有志于摄影者，应人手一册。它的对象主要是知识分子、作家和文化人。\n桑塔格深入探讨摄影的本质，包括摄影是不是艺术，摄影与绘画的相互影响，摄影与真实世界的关系，摄影的捕食性和侵略性。摄影表面上是反映现实，但实际上摄影影像自成一个世界，一个影像世界，企图取代真实世界。\n对读者而言，这本书的丰富性和深刻性不在于桑塔格得出什么结论，而在于她的论述过程和解剖方法。这是一种抽丝剥茧的论述，一种冷静而锋利的解剖。精彩纷呈，使人目不暇接。桑塔格一向以庄严的文体著称，但她的挖苦和讽刺在这本著作中亦得到了充分的发挥。\n《论摄影》出版于一九七七年，轰动一时，引起广泛的讨论，并荣获当年的全国图书批评界奖，至今仍被誉为“摄影界的《圣经》”。\n本版配以60余幅世界摄影史上的珍贵照片，推出极具艺术品位与收藏价值的“插图珍藏本”，使《论摄影》真正成为图文并茂的文化经典。","month":4,"country":"美国","wereadId":"23796296"},{"title":"现实不似你所见","author":"[意] 卡洛·罗韦利","start":"2021-04-15","finish":"2021-04-21","rating":8.1,"pages":"248","doubanLink":"https://book.douban.com/subject/27156306/","cover":"https://neodb.social/m/book/2021/09/15ba4a8085-de3e-43d5-a6e0-a920b8204281.jpg","review":"相对论部分不如看长尾科技，量子力学部分不如看贾明子，科学哲学部分不如看牛津通识读本，这本书值得看的地方在于前沿理论物理，圈量子引力相关的部分，但因为理论太过深奥，整体阅读下来倒更多的不像在读一本科普书，而是有点形而上学层面的思考。此外，个人感觉作者动辄就把古希腊的先贤拿来膜拜有点太过牵强，德谟克里特的原子论和量子力学在本质上能有那么多相似吗?","summary":"世界的基本组成部分是什么？时间和空间真的存在吗？现实（Reality）的本质是什么？现象级科普畅销书《七堂极简物理课》作者、意大利理论物理学家卡洛·罗韦利以优雅易懂的方式带我们踏上这场探索现实之旅：从德谟克利特到爱因斯坦，从法拉第到引力波，从经典物理到量子引力……通过介绍现实的概念是如何随时间变迁的，今天的物理学家又是如何理解宇宙的结构的，他为我们提供了比《七堂极简物理课》更深入的理论解释。","month":4,"country":"意大利","wereadId":"928476"},{"title":"你就是孩子最好的玩具·升级版","author":"[美]金伯莉·布雷恩（Kimberley Clayton Blaine）","start":"2021-04-20","finish":"2021-04-22","rating":7.3,"pages":"216","doubanLink":"https://book.douban.com/subject/27015626/","cover":"https://neodb.social/m/book/2021/10/228e040c58-a68f-4280-b8a4-d9895c51fc87.jpg","review":"核心观点基本上与《正面管教》、《效能训练》等大同小异，但在论述和表述方法技巧上感觉差了一些。","summary":"樊登老师力荐：希望更多的人知道，情感引导的方法；希望更多的人知道，无条件的爱是多么的重要。升级版首次收入凡登的详细解读。年度育儿好书，情感引导式教育开山之作，美国妈妈人手一册，短短5步，让你拥有一个健康快乐的孩子，奠定一生的亲密关系。\n你是否知道，你本人（没错，就是你！）比任何玩具都更让孩子喜欢和着迷呢？\n孩子们并不需要智力玩具或者电视节目，他们需要的是你！他们真正看重的是和你在一起的快乐时光，他们需要被重视，需要和父母单独相处而不被打扰的时间，需要和父母建立一生的亲密关系！\n在处理与孩子沟通的问题时，控制、放任、贿赂、威胁都是家长们常用的方法。这些不同类型的教育方法都有一个严重的缺陷，那就是可能导致孩子无法以恰当的方式来表达情感和进行沟通，从而无法建立起父母与孩子的亲密关系，孩子也就无法得到家庭关系所带来的归属感和安全感。\n与这些方法相比，情感引导的教育方法更加充满关爱，也���符合逻辑和人性。因为只有情感引导型父母才会把这些棘手的情况当成了解孩子内心世界的好机会，并且对孩子的情绪给予同情和理解，在沟通中增进亲子关系，进而提高孩子的情商和沟通能力，为他们将来的成长打下有益的基础。","month":4,"country":"美国"},{"title":"罗生门","author":"[日] 芥川龙之介","start":"2021-04-22","finish":"2021-04-27","rating":8.6,"pages":"249","doubanLink":"https://book.douban.com/subject/4908882/","cover":"https://neodb.social/m/book/2021/09/15414e4458-44f4-4c4c-a7a3-fbd76e2554e7.jpg","review":"电影《罗生门》，旧闻大名，曾尝试观看，但因黑白画面便半道受阻。然而罗生门这几个字一直在脑海徘徊，因这几个字的发音、笔画与组合于我有一种特别的吸引力。前些天借着买书冲动便买了。读罢，很是喜欢。都是一个个短篇，表达的内核并不隐晦，但文笔、表述方式是我的菜，亦可能是译者之功劳。","summary":"本书收录芥川的中短篇小说共十三篇。《罗生门》以风雨不透的布局将人推向生死抉择的极限，从而展示了“恶”的无可回避，第一次传递出作者对人的理解，对人的无奈与绝望。书山稗海，文史苑囿，于中沉潜含玩，钩没抉隐，一日发而为文，自是信手拈来，随机生发，纵横捭阖，不可抑勒。由庙堂高官到市井小民，由紫宸之深到江湖之运，其笔下无不呼之即来，腾跃纸上。芥川生性敏感，一般来说，他不重描绘而意在发掘，疏于叙述而工于点化，少的是轻灵与潇洒，多的是沉郁与悲凉。这点不难从其作品中窥其一斑。","month":4,"country":"日本","wereadId":"22781908"},{"title":"绝叫","author":"[日] 叶真中显","start":"2021-05-01","finish":"2021-05-08","rating":8.4,"pages":"440","doubanLink":"https://book.douban.com/subject/35031587/","cover":"https://neodb.social/m/book/2021/09/15bd78419e-9abc-4481-a2ec-c2566a1d49f3.jpg","review":"社会派推理推理，少了阅读本格推理的兴奋，多了揭露社会问题的沉重。有着一副络腮胡的猛男作者以第二人称的视角来阐述女性心理，却令人完全没有生涩感，只是内容话题过于黑暗沉重，阅读之时难免难受，好在结尾处作者给了一些惊喜。","summary":"怀才者的自怜是天鹅的挽歌，\n平庸者的崩坏是野兽的绝叫。\n-\n★日本现象级社会派推理小说\n★同名日剧位居豆瓣“2019评分最高日本剧集”榜单Top10\n★长达四十年的恶女编年史\n★绝对现实，却超乎想象！\n-\n【内容简介】\n铃木阳子死了，死在独居的公寓里。正确说来，是铃木阳 子几个月前死了。因为发现她时，不但遗体遭到屋内的十一只猫啃食，连猫也全数饿死了。铃木阳子显然是「孤独死」的最佳范例，但这名女子为何落到这步田地？她的亲人、朋友、同事在哪里？她的人生轨迹又是如何？\n-\n【编辑推荐】\n《绝叫》是日本新锐社会派推理作家叶真中显创作的推理小说，讲述了女主人公阳子在平庸懦弱的表象之下，隐密的跌宕、罪恶人生。该书揭露常被人们忽视的社会问题，深刻而引人深思，刻画人物思想的变化细腻而一针见血，以阳子的离奇经历，连缀了日本四十年来社会变迁的各种缩影，是日本近年来具有代表性的优秀推理小说。\n该书在日本一经出版就引起极大反响，入围第68回日本推理作家协会奖、第36回吉川英治文学新人奖、第27回“这本推理小说了不起”大奖 、第12回书店大奖、第11回启文堂大奖、周刊文春年度推理小说榜。\n后《绝叫》繁体版问世，使国内推理小说爱好者得以一探究竟。《绝叫》繁体版在豆瓣获得8.6的高评分，是少有的在有简体中文版之前就广受好评的外国小说。\n2019年，根据《绝叫》改编的同名日剧播出，又获得了豆瓣逾万人点评、8.4分的好成绩，并入围豆瓣“2019评分最高日本剧集”榜单Top10。\n2020年7月，《绝叫》简体中文版正式上市，以飨读者。","month":5,"country":"日本","wereadId":"33483909"},{"title":"荒野生存","author":"[美] 乔恩•克拉考尔（Jon Krakauer）","start":"2021-04-28","finish":"2021-05-10","rating":8.3,"pages":"196","doubanLink":"https://book.douban.com/subject/3155180/","cover":"https://neodb.social/m/book/2021/09/179576aac8-4a77-4673-a1e9-eb379fab2a79.jpg","review":"大概十年前我看了根据真人真事改编的电影《荒野生存》，随即它成为我最喜欢的一部电影之一。我被主角抛弃物质生活，归隐丛林的行动所感动、着迷。大学生主人公 Alexander McCandless 并非天生流浪汉，甚至完全相反，他有着家境优渥，学业成绩突出。如果他能按部就班的毕业，工作，应该能过上相当体面的生活。但这种生活并非他所向往，他被梭罗、托尔斯泰影响，亦可能被父母关系不和的家庭氛围影响，他选择抛弃一切人际关系，遁入自然，离开物欲的世界追寻自己真正的生活，寻找自己的答案。\n\n在此之前他选择抛弃自己的爱车，烧掉口袋里的现金作为与过去生活的一种告别仪式。随后他去往无人认识他的小镇，用化名，用能弹钢琴的手去做农活，体验生活，赚点小钱，向他人学习生存技巧，搭车去完成终极的阿拉斯加奥德赛之旅。\n\n毫无疑问，Alex 是一个理想主义者，在这趟终极旅程中他甚至不带地图，指南针，却会带上托尔斯泰、梭罗。但也因此准备不足，经验匮乏最终将自己葬送在大自然。\n\n除了 Alex 之外，本书作者还描绘了另外几位有相似之处的荒野生存名人的经历来帮助读者理解他们的追求，我对其中的 Gene Rosellini印象深刻。\n\n回想起电影中有一幕我至今印象深刻：Alex 在经历一段丛林流浪后，回到城市，他饱受风霜的身体与从前判若两人，他在一家灯红酒绿的餐厅外饥肠辘辘，恍惚中他透过餐厅的窗户看到衣冠楚楚的自己和那些同行们谈笑风生的虚伪样子。也许流浪生活让他感知到真正的自由，但作为社会关系下的人，不可避免的需要一些「塑料」的感情，那个镜子中的他不过是 Another Brick In The Wall。想明白后，随即他便再次决定再次离开城市，回到无人之地。\n\n每个人的内心可能都有过一个抛弃一切出走的时刻，只是多数人缺乏这样的勇气去实践，而 Alex 替我们完成了这一使命，尽管他没有作为英雄返乡，但他的事迹却因此得到了传播，那辆他临终的142公交车也成了朝圣之地，以至于政府为了安全考虑不得不将其移至博物馆。\n\n如果死亡的定义是被整个世界遗忘，如此看来Alex 还远未真正的死亡，他的故事被记录出书，被拍成电影，已在这个世界留下浓重的一笔。\n\nHappiness is real when shared.","summary":"扣动美国人心弦的阿拉斯加之谜：\n为什么富家子弟、名牌大学毕业生放弃一切走进阿拉斯加荒野？\n为了逃离沉重的家庭桎梏？躲避复杂的人际关系？\n渴望惊心动魄的冒险？还是执着探寻灵魂之乡？\n为什么他在萍水相逢的过客心中都留下了刻骨铭心的印记？\n为何一个无名的旅行者竟引起美国媒体的争相报道？\n为何一个年轻流浪者在美国主流社会刮起一阵阅读、讨论旋风？\n记者乔恩·克拉考尔沿着他的足迹奔走于美国西部，走访与他的旅途曾有交集的人，阅读他留下的谜样日记、照片、书籍和信件，并毫无保留地讲述自己年轻时的“魔指”峰冒险，以及使他醉心户外探险的家庭、心理因素，试图解开这个“阿拉斯加之谜”。","month":5,"country":"美国","wereadId":"23768863"},{"title":"不存在的骑士","author":"[意] 伊塔洛·卡尔维诺","start":"2021-05-11","finish":"2021-05-13","rating":8.5,"pages":"138","doubanLink":"https://book.douban.com/subject/6789551/","cover":"https://neodb.social/m/book/2021/09/15955f53b9-a748-4a4b-a968-3a086cc3e178.jpg","review":"有些天马行空的想象力，作为小说我觉得可读性很强，同时又有一些形而上学的思考，如同书扉页上那句「我会告诉你你想知道的东西，但我从来不会告诉你真实」","summary":"《卡尔维诺经典:不存在的骑士》内容简介：是卡尔维诺“我们的祖先”三部曲之一。“我们的祖先”三部曲包括：《卡尔维诺经典:不存在的骑士》、《分成两半的子爵》、《树上的男爵》，这三个故事代表通向自由的三个阶段，关于人如何实现自我的经验：在《卡尔维诺经典:不存在的骑士》中争取生存，在《分成两半的子爵》中追求不受社会摧残的完整人生，在《树上的男爵》中有一条通向完整的道路——这是通过对个人的自我抉择矢志不移的努力而达到的非个人主义的完整。\n模范军人阿季卢尔福，存在于一具空空的盔甲之中，却是完美骑士的化身，唯有他使铠甲具有意义。当他名扬天下的业绩被挑战、被质疑、将被抹杀的时候，他的存在还能成立吗？","month":5,"country":"意大利","wereadId":"24953399"},{"title":"人性的因素","author":"[英] 毛姆","start":"2021-04-23","finish":"2021-05-17","rating":8.2,"pages":"644","doubanLink":"https://book.douban.com/subject/27167267/","cover":"https://neodb.social/m/book/2021/10/260e09506d-8c91-499a-954a-1852d5b16879.jpg","review":"总体上略显平淡，前后看了《罗生门》和这本书，感觉芥川龙之介的短篇更胜一筹。","summary":"★享受真正地道的文学乐趣，不能错过的英语作家——作为狄更斯以来蕞受欢迎的英语小说家，毛姆深知什么样的故事拥有持久的魅力，在各个时代与阶层始终拥有大量读者。“在给予读者地道的文学趣味这个层面，很少有作家能比毛姆做得更好”（尼古拉斯·莎士比亚）。\n.\n★豆瓣评选2018年最令人期待新书，“英语文学中最好的短篇故事”，口碑译本第2卷全新上市——译自毛姆亲自作序的“标准定本”，为国内仅见的独译版。全集第1卷《爱德华·巴纳德的堕落》（2016）入选单向街书店文学奖“年度文学翻译”、豆瓣年度最佳短篇小说集。“给毛姆半页的时间，你就已经进入那个故事，不想离开。”\n.\n威廉•萨默塞特•毛姆（W. Somerset Maugham，1874—1965），英国著名小说家、剧作家、短篇小说作家。马尔克斯将毛姆列为最钟爱的作者之一。奥威尔称毛姆是“影响我最大的现代作家，我深深地钦佩他摒除虚饰讲述故事的能力”。\n短篇小说在毛姆的创作中占有重要地位，安东尼•伯吉斯就曾评价他写下了“英语文学中最好的短篇故事”。《人性的枷锁》《刀锋》等长篇小说使毛姆名闻世界，而他的短篇则以编织故事的精湛技巧，对人性和社会生活的敏锐洞察，为其赢得了更多读者，成为一种全球现象。\n1951年，毛姆出版四卷本短篇小说全集，共收录91个故事，并亲自确定篇目和顺序，为每一卷撰写序言。1963年企鹅出版社在此基础上推出新版，自此被认作标准定本，多次重版。本书即译自2002年企鹅版全集。\n毛姆作品中文译本繁多，短篇小说多以精选集形式出版。本次计划推出的《毛姆短篇小说全集》（四卷本）将以精彩译文再现毛姆短篇作品的全貌。本书为第二卷。","month":5,"country":"英国","wereadId":"29348498"},{"title":"Show Your Work!","author":"Austin Kleon","start":"2021-05-09","finish":"2021-05-23","rating":8.3,"pages":"224","doubanLink":"https://book.douban.com/subject/25857796/","cover":"https://neodb.social/m/book/2021/12/048e3a1826-99d5-4ad9-8f2b-ff7d5f084f84.jpg","review":"算是今年读的第四本英文原文书，相比其他三本，这本英文书的难度要低不少，口语化、短语内容较多。所以理解起来就很容易。作者在书中详细介绍了「分享自己与工作」的好处、方法。总的来看，都算比较容易被认可的道理性叙述。全文有相当篇幅名人名句引用，都挺切合主题的。偶尔能翻看这样的书，看看那些虽然早就知道但在生活工作中经常被遗忘的道理、方法、人生态度，也能视作一种精神锻炼。","summary":"Show Your Work! is about why generosity trumps genius. It’s about getting findable, about using the network instead of wasting time “networking.” It’s not self-promotion, it’s self-discovery—let others into your process, then let them steal from you. Filled with illustrations, quotes, stories, and examples, Show Your Work! offers ten transformative rules for being open, generous, brave, productive.","month":5,"country":"美国"},{"title":"自由及其背叛","author":"[英]以赛亚·伯林","start":"2021-05-21","finish":"2021-06-04","rating":8.5,"pages":"408","doubanLink":"https://book.douban.com/subject/34869836/","cover":"https://neodb.social/m/book/2021/10/06029c6f0c-1a5f-4d45-b322-307bb76ca665.jpg","review":"# 读后感\n初看这本书的标题会误以为又会是一本难啃的哲学著作，打开之后才发现是伯林在1952年做BBC节目时的系列讲演。去年曾尝试度过卢梭的《社会契约论》，很难看进去，而伯林对卢梭的解读的语言则相对通俗易懂很多。自由不仅困惑凡人，在那些大哲人、思想家的论述中也不尽相同，甚至会完全相反。柏林说思想家可以分两类，一类是回答先前提出问题的人，如牛顿、休谟；另一类改变了问题性质，不解决问题却能强烈影响论述对象，如康德、陀氏。书中伯林介绍的启蒙运动和法国大革命时期的六位思想家便属第二类。非常棒的一次阅读体验，译林这版书的装帧也不错，看完再加购伯林的书。\n\n# 卢梭\n在卢梭看来自由是人的本质，而不类似爱尔维修、洛克、密尔等存在一部分不可剥夺的自由或者为了功利主义下的自由。一方面是绝对的自由，一方面是权威的压制。卢梭的天才在于能将二者统一起来。人是理性的动物，那么，理性的人能够达成或者目标的正当生活，即良善的生活便应该是一致的。「向全体人奉献出自己，他就没有向任何人奉献出自己」。「人生而自由，但处处又收到枷锁的束缚」，只要这枷锁是自己加给自己的，自己控制的，便不算剥夺自由，不与自由相悖。他认为人性本善，即使在行恶那也是出于外部的原因限制，在内心深处还是潜在的想要行善，这种对自我的赞美，被希特勒、墨索里尼等所利用，最终却造成了极大的自由成就极大的奴役。\n# 费希特\n18世纪的德国人因国立不济，采取一种斯多噶主义的处世观。有很多外部条件无法抗争，只能接受，或者面对暴行，要么不去想它，要么离开它。将处世中心从外部转向内部，关注自己的内心，从物质的转向精神的。\n# 黑格尔\n黑格尔的绝对精神，是一种把整个宇宙看成是类似个体的精神、灵魂似的一种学说，它是高度形而上学的，无法用科学理论方式来论证。因为他认为科学无法解释目的，比如桌子为什么不会飞，无法用科学的语言进行有效的本质上的解释，科学规律只是对过往经验现象的概括，无法进行目的性的解释。精神在这种发展过程中根据辩证法来发挥作用。正题、反题，再到飞跃的合题，循环往复。这种观点可以用来看到国家、制度、英雄人物的出现和发展。黑格尔认为这一过程是一种理性的过程，即符合规律的过程。人不应该把规律视为一种外部性的东西，而应该与其融合，如在理解2+2=4后，这种理性和规律就会让我们知道明白，2+2不可能等于别的数，它必然只能等于4。这是一种规则、模式、形式，不同于科学根据经验而得出的归纳。因此，他从中得出：自由就是对必然的认可。只有不违反支配世界规律的情况下，我们才是自由的。理解事物就是理解它存在的理由，它不可能是别的样子，我们也不想让它变成别的样子。\n凡是都是精神发展的结果，顺之者昌，逆之者亡。不要急于评价伟人的价值，不要害怕变革、动荡，要站在历史的角度看，随着历史的发展，人类理性的深入会改变先前认为的价值。历史所实现的东西才是���价值的。\n\n要从模式的角度来考察世界，不是从个体。国家是最重要的模式。世界的前进是理性的化身，他鄙视功利主义，因为那只是主管的善而不是客观的善，他将善和成功等同。这是反常识的。\n\n# 圣西门\n又一个自认为是新弥赛亚的人。他是最早严肃关注经济因素的人、发明精英治理社会观念的人。\n圣西门的历史观比起同时代人有着领先的眼光。当马克思过分的聚焦于经济基础决定上层建筑等社会阶层物质层面的方面的时候，圣西门在强调经济与科技进步之外还引入了观念等精神层面的思考。他认为阶级是观念的产物，进步的发生不取决于阶级冲突或者科技进度单方面，比如奴隶制的废除少不了基督教观念的发展。他认为必须将历史理解成人类为满足各种需要而进行的一种进化过程，如中世纪在那个时代的人并不黑暗。进步只能站在今天的时间立场来看待。他反对民主制反对自由主义，认为专家，如银行家、科学家、数学家、艺术家等群体才能把事情办好，才能让社会发展，不会过时，才能设计出满足大多数人需求的社会。他精彩的分析了法国大革命失败的原因。圣西门主义：社会需要精英人物来引领，对于精英与凡人只能用双重道德标准，自由、平等、民主等必须撤出，为更明细、更大胆、更新的东西让路：大商业、国家资本主义、科学组织、世界联邦。\n\n# 迈斯特\n迈斯特生于毗邻法国的萨瓦国，出生在法国大革命之前，他对法国带有一种固有的崇拜，因此对于法国大革命的革命派持强烈的批评态度。此人是极端狂热的君主主义者，教皇权威支持者，骄傲、固执、聪明，为抵制封建时期的进去作垂死挣扎的人物。","summary":"伯林教会我们，如何看穿以自由之名伤害自由的人。\n本书根据1952年伯林在BBC第三套节目所做的系列演讲整理而成，囊括了伯林关于自由与观念史的原创洞见。伯林向我们表明，正是爱尔维修、卢梭、费希特等哲人对自由观念的滥用和误读，妨碍了自由观念的发展，也阻碍了个体自由的实现。要真正理解自由，就必须从这些自由卫士的错误中吸取教训，避免赋予自由过多的王冠和权柄。","month":6,"country":"英国","wereadId":"849522"},{"title":"马文·柯林斯的教育之道","author":"（美）马文·柯林斯, （美）希维娅·塔玛金","start":"2021-05-23","finish":"2021-06-12","rating":8.5,"pages":"312","doubanLink":"https://book.douban.com/subject/33394561/","cover":"https://neodb.social/m/book/2021/10/08aa9a7df3-9654-45eb-812f-9d47c7f0f469.jpg","review":"作为美国教育界的传奇人物，马文柯林斯有自己独特的教育人格魅力，这种个人特质是难以仅仅通过阅读此书就能效仿的。这两年我看的几本家庭教育类书籍，更多的是侧重在与孩子沟通、人格培养等的相处之道上，而马文作为一名小学教师，其教育之道则更多的落在学习阅读之上。如果要总结出我从这本书学习到的教育方法，我想应该是以下两点：\n1. 注重语言文字的学习（尽管书中强调的是英文的拼读并不适合中文），从而进一步推广到阅读，阅读不怕提前，可以超越年龄的阅读。家长要自己读，筛选经典给孩子读。\n2. 不要给孩子贴标签，要尊重孩子，鼓励孩子，直接表达对他们的爱（说易做难）。\n教育之道固有优劣之分，但孩子并非千人一面的璞玉，如何打磨具体到个别孩子身上仍然需要思考具体的教育方法。\nBTW：本书叙述上在第三人称与第一人称中切换，挺有意思。\n","summary":"为什么一间教室发生的故事会引起全美媒体的报道以及全国范围对教育的讨论？\n为什么一名中小学教师会连续被两任美国总统邀请担任教育部长？\n为什么全美和欧洲各国的教师会来到这所学校观摩她的教学并参加培训与研讨？\n为什么成千上万的家长会给她写信希望其帮助解答养育子女的困惑？\n本书不仅讲述了当代传奇教师马文·柯林斯在教育这条道路上的挣扎与成功——她在公立小学担任多年教师，之后创办了只有一间教室的学校并将其发展壮大，更包含其课堂教学的详尽实录，清晰地传达了她的教育理念、方式与方法。\n马文的学生最初的学习水平远低于平均水平，有着各种“问题”。但在她的眼中，从来没有失败的学生，只有失败的教育。她的信念、勇气、执着与奉献，帮助她的学生发生了奇迹般的转变。后进生的学习成绩超过其年龄的平均水平，单词都拼不对的孩子能阅读莎士比亚的作品。一群没有自信、被所有人认为注定要失败的孩子根本性地转变了对学习的态度，取得了极高的学习成就与令人惊叹的成功。\n在本书中，你将读到马文·柯林斯的教育之道：\n如何用赞美和鼓励建立孩子自信，释放他们无限潜能\n如何用爱、耐心、高要求、严标准让后进生变得优秀，让优秀的学生变得卓越\n如何让孩子爱上学校和学习、学会并爱上阅读\n如何用提问、课堂讨论激发学生思考\n如何拥有好的课堂纪律，如何对待公然与你敌对的孩子\n如何让孩子拥有积极乐观的生活态度，去努力，去争取\n……\n本书的两份附录，分别是写给家长与教师的，就如何实现高质量的教育和为孩子创建更加美好成功的未来，给出了切实可行的建议。\n包括教师、校长、家长在内的所有教育者将因阅读此书而受益，进而让他们的孩子获益终生。","month":6,"country":"美国","wereadId":"33091684"},{"title":"十三层空间","author":"[美] 丹尼尔·加卢耶","start":"2021-06-13","finish":"2021-06-15","rating":8.4,"pages":"350","doubanLink":"https://book.douban.com/subject/27001144/","cover":"https://neodb.social/m/book/2021/09/16c84b898d-9ef9-43eb-9c5b-624cc33b572a.jpg","review":"第一人称写作的科幻故事，阅读体验简洁明快。核心科幻点类似前段时间看的冈岛二人1989年的《克莱因壶》，但关键在于此作创作于1964年，比起《编码宝典》，这才更应该被奉为赛博朋克圣经。","summary":"并不遥远的未来，一家技术超前的科技公司建立了虚拟世界“幻世-3”，通过收集其中的民意数据，为商业公司提供营销策略。然而，“幻世-3”项目的核心成员道格拉斯·霍尔却发现，随着程序的运行，身边出现了许多怪事：先是技术主管神秘死亡、同事失踪；接着“幻世-3”里的虚拟角色闯进了 这个世界；再后来，就连他所处世界的真实性也变得岌岌可危起来……\n超越时代的科幻经典，对后来科幻小说的赛博朋克流派和《黑客帝国》等电影影响至深，1999年被改编成电影。\n大事记\n1964年：《幻世-3》（Simulacron-3）英文原版出版\n1973年：改编电影《世界旦夕之间》Welt am Draht/World on a Wire\n1999年：改编为电影《十三层空间》（The Thirteenth Floor）（又名：异次元骇客）\n受本书影响拍摄的《黑客帝国》（The Matrix）上映\n2017年：中文版以《十三层空间》之名正式出版\n美国知名科幻作家迈克·雷斯尼克如此评价本书：\n早在威廉·吉布森那本正式拉开“赛博朋克”运动序幕的经典之作《神经漫游者》问世的二十年之前，《十三层空间》就已经开创了“赛博朋克”。","month":6,"country":"美国","wereadId":"41746752"},{"title":"乡土中国","author":"费孝通","start":"2021-06-14","finish":"2021-06-24","rating":8.5,"pages":"281","doubanLink":"https://book.douban.com/subject/34813913/","cover":"https://neodb.social/m/book/2022/05/312672066a-958d-4a38-a380-3536b277bf9a.jpg","review":"非常有意思的关于中国乡土社会的洞见。印象最深的有以下几点：\n1、乡土社会的中国是农业性质的，不同于游��民族，他们靠着土地为生，稳定、不流动成为主题，安土重迁，生于斯，死于斯，从而演化出一个熟人社会。\n2、乡土社会使文字传播收到阻碍，一方面在熟人社会中，比起面对面的语言，文字是更间接的传意工具，另一方面生活形式的单一稳定，导致用于代表经验、记忆的文字象征体系匮乏。\n3、与西洋社会的团体格局不同，乡土中国采取的是一种差序格局的组织方式，即我们的没有分界明晰的最小社会单位概念，群己界限模糊，人与人的关系更像伸缩性的网络，不以个人为中心，而以自我为中心。在私人道德上，团体格局奉行的人人生而平等，而差序格局的出发点则是从己向外的“克己复礼”。无数私人网络搭建的差序格局社会，致使道德和法律标准也因人之关系网络伸缩而伸缩。\n4、不同于西方社会法治，乡土中国采取的是人治，即礼治。礼不靠外在权力推行，而是从教化中养成的个人敬畏之感，这种养成有赖于乡土社会的稳定、不流动特点，因为在一个变迁缓慢的社会，礼可以用来应付生活问题。礼与法的不同点在于法需要权力机构来维护，而维持礼这种规范的是传统。\n5、从法治和礼治的不同，演化导致对律师、诉讼的观点变化。现代社会是处在变化的社会，因而法律也是与时俱进的，成为专业的知识并无争议。而在乡土社会，诉讼意味着不合礼，恐有道德问题，是需要被教育的。\n6、中国作为一个传统的农业大国，加之知足以及注重伦常、礼的儒家思想，形成一种匮乏经济，匮乏经济是一种封闭、静止的经济，在资源有限时，匮乏经济寻求的是一种知足的被动的解决知之道，从而形成一种技术停顿，社会静止的局面。而与之相对的，西方世界采取的是一种扩张的、动的丰裕经济。在丰裕经济下，是重“用”的，科学就是在这种背景下诞生。\n","summary":"本书包含《乡土中国》和《乡土重建》两部分。","month":6,"country":"中国","wereadId":"651366"},{"title":"骗局","author":"（美）丹·布朗","start":"2021-06-25","finish":"2021-07-01","rating":8,"pages":"410","doubanLink":"https://book.douban.com/subject/3700600/","cover":"https://neodb.social/m/book/2021/10/04f9b08db9-46ee-47a4-8a52-e6384e27a50a.jpg","review":"仿佛一部好莱坞商业动作片","summary":"美国总统大选在即，共和党总统候选人参议员塞奇威克·塞克斯顿猛烈抨击现任总统的航空航天政策，得到了大多数美国选民的支持，形势对现任总统的连任极为不利。就在这个关键时刻，国家航空航天局向总统报告了一项惊人的科学成果：他们在北冰洋之下有重大发现……这个发现对美国的航空航天政策和迫在眉睫的总统大选都意义重大。\n为了证实这项非同小可的发现，总统派遣国家勘测局的情报分析员，同时也是总统竞选对手的千金雷切尔·塞克斯顿前往冰川覆盖、气候恶劣的北极圈，与极富个人魅力的偶像型科学名人迈克尔·托兰以及几位来自不同领域的科学家一道对之进行核查。雷切尔和迈克尔意外地发现了一个不可思议的科学骗局。\n还没来得及跟总统取得联系，雷切尔和迈克尔就遭到了三角洲特种部队的几个神秘杀手的袭击。这些杀手被一只企图不顾一切掩盖真相的幕后黑手操纵。雷切尔和迈克尔开始了惊险刺激的逃亡之旅，支撑他们活下来的最后一丝希望就是要查明真相……","month":7,"country":"美国","wereadId":"935481"},{"title":"白痴","author":"[俄] 陀思妥耶夫斯基","start":"2021-07-13","finish":"2021-07-12","rating":8.8,"pages":"696","doubanLink":"https://book.douban.com/subject/25887933/","cover":"https://neodb.social/m/book/2021/09/176c5fe0e9-abcf-48a9-b20d-d883d384bc81.jpg","review":"「描绘人内心的全部深度」，首读陀氏，相见恨晚。","summary":"小说描写19世纪60年代出身贵族的绝色女子娜斯塔霞常年受地主托茨基蹂躏，后托茨基愿出一大笔钱要把她嫁给卑鄙无耻的加尼亚。就在女主人公的生日晚会上，被人们视为白痴的年轻公爵梅诗金突然出现，愿无条件娶娜斯塔霞为妻，这使她深受感动。在与公爵即将举行婚礼的那天，娜斯塔霞尽管深爱着公爵，但还是跟花花公子罗果仁跑了，最后遭罗果仁杀害。","month":7,"country":"俄罗斯","wereadId":"31808223"},{"title":"影响力","author":"[美] 罗伯特•B•西奥迪尼 (Robert B. Cialdini)","start":"2021-07-08","finish":"2021-07-14","rating":7.8,"pages":"286","doubanLink":"https://book.douban.com/subject/5287474/","cover":"https://neodb.social/m/book/2021/09/16b4d9bb2f-89bb-431e-8b40-a599c0d71ac5.jpg","review":"因为听了几期翻电，看这类心理学相关书籍的时候就特别警惕。书里面用了不少所谓的原理，但在我看来这些高概念，并不需要如此专业化的术语包装描述，就书中所述的7个原理，无一不是我们日常生活中常见的。所以在阅读前后阅读后，我并没有收获任何心理学上的知识。\n我认为本书最有价值的地方到并不在那些理论，而是那些实验和案例，有些例子挺精彩，但有些例子有点强行关联，并不与提出的理论相符合，比如抬头看天的例子，说几个人一起望天，会让路人也纷纷望天表明的是一种社会认同原理的心理学概念，我并不这么认为，就我而言，会跟着别人望天只是处于好奇，看天上有什么值得我注意的地方，甚至心理还会有预设，是出现飞碟了，还是有人要跳楼了，与所谓的社会认同毫不相关。\n在统计学上相关性和因果性并不相同，作者总是能用简单的案例得出符合其理论的结果。然而作者几乎没有列出相关实验和例子的出处来源，实验案例的真实性又打了折扣。","summary":"自1986年出版以来，作为获得美国心理协会、美国心理学基金会年度大奖提名的西奥迪尼经典著作，本书已经成为史上最强大、最震摄人心、最诡谲的心理学畅销书，24年来，被翻译成26种文字广为传播，全球销量超过300万册。时至今日，本书仍位列亚马逊总排行榜Top400之中，并雄踞消费者行为学和应用心理学类畅销书榜首。也正是在这个畅销版本的基础上，西奥迪尼才衍生出后来为斯坦福大学等多所名校所采用的教材版本。    没有专家解读，没有每章导读，这是一本最原汁原味的《影响力》，醇厚甘甜，久而弥笃。阅读本书仿佛是与西奥迪尼面对面，让你可以细细聆听，在定格的经典中体味无孔不入的影响力。    本书由斩获国家级图书大奖”文津奖”的《牛奶可乐经济学》的译者担纲翻译，语言生动流畅，意趣盎然，西奥迪尼式的诡谲与雄辩惟妙惟肖，跃然纸上。","month":7,"country":"美国","wereadId":"823426"},{"title":"读库1705","author":"张立宪 主编","start":"2021-07-15","finish":"2021-07-21","rating":8.3,"pages":"352","doubanLink":"https://book.douban.com/subject/27127478/","cover":"https://neodb.social/m/book/2021/12/09ead8799b-02f6-48c4-89ca-76e70e3779f6.jpg","review":"第一次读读库，挑了一本豆瓣评分最高的。说来挺有缘的，第一篇WBW的，因为一直有关注博客，很熟悉；第四篇讲十二怒汉的，刚好看过电影，且非常喜欢，文章中有不少电影幕前幕后的信息，同时思考了陪审团制度，收获不少；第五篇我虽未看过基地系列，但一直将其作为必读书目，也读过作者汪洁的书，当作基地入门阅读挺好。其余三篇，描写了不同地点、时代、风土，文字平实、阅读流畅，权当开阔眼界。","summary":"本期《读库》一共包含了六篇文章。《未来的人会是怎样》、《“美漂”一家》、《布达拉宫的流动画卷》、《〈十二怒汉〉与陪审团》、《当地球已成远古传说》和《在抗战中度过的童年》。\n《未来的人会是怎样》是蒂姆·厄班（Tim Urban）的最新作品，由谢熊猫君翻译，首发于《读库》。这篇新作探讨在一个由人工智能和“其他所有生物”组成的未来，人类的出路在哪里。文章从作者与埃隆·马斯克（Elon Musk）聊后者成立新公司Neuralink的使命开始，回顾了人类大脑的演化历史，解释什么是脑机接口，人类是怎么思考和交流的，进而探讨未来的样子。未来可能比我们预期的还要不可思议。\n《“美漂”一家》讲述的是作者朋友一家为了家庭新到来的小生命，辗转赴美生子的经历。其间有与入境官员的多次交涉，与二房东与租客的相处，以及新认识朋友的援手相助，伴随大力的讲述，读者似能与主人公的心绪一同起伏变化。\n2009年在准备中国美术馆蓝志贵个展时（可参看《读库1604》），黄建鹏选择了蓝志贵拍摄的十多幅以布达拉宫为背景的系列作品，放在展厅显著位置，观众反响强烈。之后，他便时时关注和收集关于布达拉宫的原版影像。多年来，他收藏了千余幅关于西藏的影像原作和摄影作品。《布达拉宫的流动画卷》展示的是给他留下最深刻印象的三十四幅照片，都是二十世纪初至1980年代的西藏影像，“宁静、平和，经过时间的沉淀，凝聚出一种喜马拉雅崇高的气质”。\n在中国，许多民众对陪审团的认知几乎都来自《十二怒汉》。今年距离首版《十二怒汉》上映，正好一个甲子。当下社会，价值多元，众声喧哗，与六十年前相比，更需要常识与理性、宽容和共识。《〈十二怒汉〉与陪审团》是何帆翻译《十二怒汉》剧本后写的译者序，希望透过一场法庭纷争，重温一次法治课程。\n阿西莫夫的科幻小说代表作是厚厚的《基地》系列，这些小说的创作时间前后跨越将近四十年，由七本小说组成，如今已成为美国科幻小说黄金时代的顶峰。汪洁在《当地球已成远古传说》里从小说的写作脉络开始介绍，厘清了《基地》的版本结构。\n《在抗战中度过的童年》这组文章是作者吕霞在成都金陵大学附中的作文，1945年曾发表在叶圣陶主办的《开明少年》上。1937年抗战开始那年，吕霞九岁。当年11月，吕霞一家从京沪线上的家乡开始往内地搬，一路走走停停，坐了黄包车再上船，下了船坐火车，离开长沙继续坐船走，暂时安顿在湘潭，待了一段时间，从长沙辗转去到云南。十四岁的小作者将路途上的点滴都记录下来，让今天的读者透过她的眼睛望向那个时代。","month":7,"country":"中国"},{"title":"哲学·科学·常识","author":"陈嘉映","start":"2021-07-13","finish":"2021-07-29","rating":8.2,"pages":"370","doubanLink":"https://book.douban.com/subject/27139938/","cover":"https://neodb.social/m/book/2021/09/153afdfccf-06ec-48b7-9be4-45d66588a0ee.jpg","review":"阅读体验感一般，概念性的东西比较枯燥，书中有多处前后重复的内容。","summary":"【内容简介】\n《哲学•科学•常识》是陈嘉映的代表作，这本书既是对历史上人类求知之路的回顾，也是对人之本、知识之本的追问。\n人类之所以不懈探求这个世界的究竟，正是因为我们相信，世界的答案是存在的。但是在求知之路上，我们又时常迷失，冒出“为什么要学这个？”之类的怀疑。难道果真如老子所说，“为学日益，为道日损”？人们在科学或者人文的道路上探索，有时竟恍然不知我们对世界的理解是在深入，还是在背离。\n人类解释世界的努力，前有神话、巫术，后有哲学、科学。排除了千难万险，才抵达日心说、牛顿力学、进化论、量子物理，才使得科学成为“真理”的代言者。一方面人们常常反思，科学为什么会取得这样的成功？人们经历着同样的世界，为什么只有欧洲产生了科学？另一方面，我们也为科学之成功付出了代价：用科学来逼近“真理”，却将人的心灵排除出真理的领域之外。用数学和实验思维树立的科学大厦里，没有人之善恶、悲喜的位置——科学果真是关于这个世界最好的答案吗？\n《哲学•科学•常识》是陈嘉映站在人类认知发展前端的一次回望：请循其本，我们对真理的探求，究竟是要探索未知的领域，取得从前不为人知的发现？还是要理解我们存在于其中的世界，在纷繁的人世间消解困惑，更好地生活？\n———————————————————————————————\n【编辑推荐】\n1.\t此次《哲学•科学•常识》新版，由陈老师重新构思最后一章，全新校读，重磅回归！《哲学•科学•常识》初版于2005年，是让陈嘉映走入大众智识读者视野的开创之作。出版十余年来，好评不断。\n2.\t这本书主题虽是科学哲学，但却是陈嘉映对于人类知识的“科学与人文之争”、“理论和现实之争”给出的回答。对于一代青年读者来说，《科学•哲学•常识》是他们世界观和学习生涯的一本指路之书。\n3.\t用深刻的思维和广博的学识，讲平白、中肯的哲理，点中普通智识读者的迷津。科学就代表着真理吗？为什么人们学得越多，却越不能理解这个世界？哲学在现代生活中还有什么用？……陈嘉映观照的问题，很多是我们在求知之路上自然困惑的。\n4.\t《哲学•科学•常识》也是一本亲民的科学哲学入门书。“科学哲学”是对科学思维和逻辑的批判性思考，在科学进步的今天尤其重要。什么样的科学概念，才有颠覆观念、引发变革的力量？引力波、暗物质“在理论上存在”和“在现实中存在”有什么不同？ ……这都是本书十分关切的话题。","month":7,"country":"中国","wereadId":"933062"},{"title":"人鼠之间","author":"[美] 约翰·斯坦贝克","start":"2021-07-29","finish":"2021-08-02","rating":8.4,"pages":"118","doubanLink":"https://book.douban.com/subject/30388871/","cover":"https://neodb.social/m/book/2021/12/04ddc6131a-4523-41e8-b267-2d810f7a91da.jpg","review":"结局当然是注定的，一部好作品就是在让人流连时作出那个必然的结局，意外却又情理之中。关于梦想的问题，我倒不觉得乔治亲手结束了梦想，反倒是用自己的手保全了那个无法实现的梦想，与老砍迪的狗形成对比。\n","summary":"莱尼身高两米，力气大得吓人，但心智却像个孩子，经常闯祸。他唯一的朋友是从小和他一起长大的乔治。乔治带着他到处打零工糊口。他们有一个梦想，希望有一天能有自己的一小块土地，一间小屋，还有一头牛，一只兔笼，再养些小鸡。然而，这样卑微的要求也不过是一场梦。\n这次，他们流浪到一座农场。永无休止的流浪生活总算到了尽头，但梦想也到了尽头。乔治终于帮莱尼找到一个地方。在那里，莱尼永远不会再闯祸，永远不会再受伤害，永远不需要再逃亡……\n《人鼠之间》首版于1937年，是约翰•斯坦贝克的代表作之一，书名来自英国诗人彭斯的诗句“人也罢，鼠也罢，最如意的安排也不免常出意外”，寓意小人物的悲惨命运。","month":8,"country":"美国","wereadId":"26001263"},{"title":"你一定爱读的极简欧洲史","author":"[澳]约翰·赫斯特（John Hirst）","start":"2021-07-07","finish":"2021-08-05","rating":8.3,"pages":"229","doubanLink":"https://book.douban.com/subject/5366248/","cover":"https://neodb.social/m/book/2021/09/157b81af67-dd02-4968-be88-8d56ba5b577b.jpg","review":"非常好的一个欧洲历史框架介绍书，从战争、宗教、民主、语言等各个维度提供了欧洲历史的发展脉络与解读。知识都具有互通性，对于历史尤其如此，有了这样一个欧洲历史的框架认识，再去读其他书籍，就算是某个历史片段的，也会大有裨益。","summary":"“欧洲，为什么老是抢第一？”澳大利亚知名历史学家约翰•赫斯特在本书中的一场引人入胜的探索，为我们梳理出欧洲文明所以能改变全世界的各种特质。\n作者从三大元素：古希腊罗马文化、基督教教义以及日耳曼战士文化开篇，描述了这三大元素如何彼此强化，又相互对立，最终形塑为欧洲文明的内 核；继而在诸多世纪以来催生帝国与城邦，激发征服与十字军东侵，造就出许多性格截然分明的人物——如仁慈的皇帝、好斗的教皇、侠义的骑士，乃至世上第一批享受繁荣和启蒙果实的公民。哲学思维、民主制度的渊源、政治权力的传递、甚至是医学、生物学使用拉丁文的源始，这种种欧洲因素不断形塑了现代文明的各种特质，使欧洲遥遥走在现代世界的前列。\n本书以清晰、幽默、发人深省的笔调，杂以活泼的插图，叙述了一个不同凡响的文明，及其对人类社会的巨大冲击与巨大贡献。","month":8,"country":"澳大利亚","wereadId":"624848"},{"title":"树下长椅","author":"[法] 克里斯多夫·夏布特","start":"2021-08-08","finish":"2021-08-08","rating":8.2,"pages":"328","doubanLink":"https://book.douban.com/subject/30458203/","cover":"https://neodb.social/m/book/2021/09/15e2084d61-3967-4d62-a299-63e42ea7f0ac.jpg","review":"树下的一张长椅，是流浪汉的入夜之床，是老情侣分享蛋糕的喜悦处所，是油漆工的职责所在，是讨厌警察，是忙碌的谢顶上班族的必经之路，是小年轻情侣刻下情愫的共同回忆…春去秋来又一春，长椅见证了世间百态与百态的变化。","summary":"一场无声的交响曲\n一部无对话的话剧\n《灯塔》作者的又一次艺术实验\n用一把长椅展现人生百态\n用一个个过客描绘光阴的故事\n——————————————\n*编辑推荐*\n《灯塔》作者挑战自我、拓展漫画边界之作。已有电影短片、音乐剧改编版，但原著的魅力无法超越！\n《树下长椅》近乎无字，不借助任何外力。\n“漫画诗人”只用极简的黑白图像和缓慢的固定镜头叙事：一点木头加一点钢，构成一把公共长椅，一刻、一天、一季、一年，有人视而不见地路过，也有形形色色的人在这里登场，在巧手安排下擦肩而过、相遇、命运交织，犹如表演了一场芭蕾舞。\n这是一本沉默的书，沉默得如同一把椅子，只待读者来参与、体验，来唤醒一个个无名之人，激活一幕幕人间喜剧，品味隐藏在书中的情节……和时光。\n*内容简介*\n这部三百多页的图像小说讲的是一把长椅的故事。一点木头加一点钢，一棵树下的一把公共长椅，形形色色的人在这里相遇、分离、成长、转变，他们有的定期来这里小憩，有的一去不复返，有的一直在等待……\n树下长椅默默地见证了这些男女老少的登场、退场，在漫长的时光中撷取一个个瞬间，构成一幅人生的拼图。\n*媒体推荐*\n一部绘声绘色的无声电影……鲜有人能如夏布特一般会讲故事，会将无事之事讲得如此扣人心弦。\n——《法国电视周刊》\n离奇、感人、滑稽……\n——《世界报》杂志版\n诗意、有趣、感性！\n——《巴黎竞赛画报》\n这328页打上夏布特“注册商标”的黑白漫画华丽无比，充满感性、极简和人道主义的味道。\n——《剧本》\n有一件事是确定的，读过本书的人再也不可能以同样的方式观看或者坐在一把公共长椅上了。\n——《书迷》","month":8,"country":"法国","wereadId":"3001222600"},{"title":"散步去","author":"[日] 谷口治郎","start":"2021-08-09","finish":"2021-08-15","rating":8.3,"pages":"232","doubanLink":"https://book.douban.com/subject/26939973/","cover":"https://neodb.social/m/book/2021/09/157a2ffb8e-3585-40fc-8f90-8f4442f56702.jpg","review":"安静、舒适、治愈","summary":"中年男士和家人搬到小镇上，开始了散步的日子。行走过如同睡去的街区，攀爬过微缩的富士山景，观察富有生趣的动物，欣赏不期而至的风景。散步中，不同的人们交会了，不同的人生也在交错着。轻松、安静、徐缓，时有偶遇、时有惊喜。看似平凡的散步，为日常注入了新的元素。\n《散步去》汇集了 谷口治郎18 篇散步的故事，同时收录了短篇漫画《梦》《东京幻觉》《月夜》。《散步去》是享誉欧美的日本漫画大师、《孤独的美食家》作画者谷口治郎的代表作，以堪比小津安二郎镜头的画笔描绘了日常的散步之乐和生活之美，充满诗意、沁人心脾，让如今在快节奏生活中身不由己的读者，会心一笑又深深思考。","month":8,"country":"日本","wereadId":"3000004249"},{"title":"长日将尽","author":"[英] 石黑一雄","start":"2021-08-10","finish":"2021-08-16","rating":8.6,"pages":"337","doubanLink":"https://book.douban.com/subject/30142261/","cover":"https://neodb.social/m/book/2021/09/1573d06b4f-d4f3-4203-a57d-402b6d26967d.jpg","review":"译文克制优雅，读之畅快。关于内容，作者通过第一人称絮叨的回忆塑造了一名以「伟大」为目标的管家史蒂文斯。他的爱岗敬业程度已堪称机器人，摒除了很多作为正常社会人的欲望、思想，处理一切事件都带着身为管家底层身份。但他将这理解为尊严，一种遇事处变不惊，不当众「宽衣解带」的学养，以至于在那些在他个人人生至关重要或者意义非凡的时刻，他还是要做那一颗达林顿勋爵府上的齿轮，不会停下一丝，为那些关爱他的人思考一分。","summary":"★2017诺贝尔文学奖得主石黑一雄代表作、布克奖获奖小说\n★长日将尽，一曲帝国衰落的挽歌，一场擦肩而过的爱情\n★同名电影（又译《告别有情天》）获多项奥斯卡奖、英国电影学院奖提名，\n英国影帝安东尼•霍普金斯、实力女星爱玛•汤普森主演\n《长日将尽》是诺奖得主石黑一雄1989年获布克奖的作品，也是石黑一雄最重要的代表作。小说以管家史蒂文斯的回忆展开，讲述了自己为达林顿勋爵服务的三十余年时光里的种种经历；虽然达到了职业巅峰，但史蒂文斯过于冷酷地压抑自我情感，追求完美履行职责，而在父亲临终前错过最后一面，之后又与爱情擦肩而过。小说通过主人公的回忆，将一个人的生命旅程在读者眼前抽丝剥茧，同时也折射出一战与二战之间那段非常时期的国际政治格局。\n1993年根据小说翻拍的同名电影（又名《告别有情天》）由英国著名演员安东尼•霍普金斯和艾玛•汤普森主演，获得八项奥斯卡奖提名和六项英国电影学院奖提名，成为影史经典。","month":8,"country":"英国","wereadId":"934407"},{"title":"牛津大学哲学通识课：政治哲学","author":"[英] 乔纳森·沃尔夫（Jonathan Wolff）","start":"2021-08-22","finish":"2021-08-27","rating":8.4,"pages":"336","doubanLink":"https://book.douban.com/subject/33436180/","cover":"https://neodb.social/m/book/2021/09/15e00c8983-1f42-4fad-aeaa-62a3a8213ee6.jpg","review":"总体上一次不错的阅读，关于罗尔斯和穆勒的部分与桑德尔的公正有重叠内容，但后者在案例选取上我觉得会更深刻一些。大致上解答了一些低级的疑惑，也引发了一些高级的疑惑，我想这也是哲学的意义之一吧。","summary":"人生而在群体之中，与众人之事休戚相关。善用理智来思考公共事务，是公民的责任。\n群体该如何组织，才能让其中的众人追求良善生活？权力、财富、自由、权利，怎样分配算是公平？遵循社群传统价值重要，还是自由发展个性重要？对待少数、弱势、外来群体，用什么方式才符合正义？\n在这本影响了几代人走上思考公共事务之路的书中，牛津大学哲学家、公共政策教授乔纳森·沃尔夫搭起理解政治的框架，从自然状态、国家、民主、自由、财产五个环环相扣的问题切入，带出从柏拉图、霍布斯到罗尔斯、诺齐克的众多政治哲学家的洞见和争鸣。当然，每个时代对正义的追求都有疏漏，沃尔夫整合2500年来的思想资源，回应性别、种族、身心障碍、性取向、移民入境这些当下论题，追问每个人的正义、每个地方的正义能如何实现。\n不管是古老的争论还是全新的挑战，政治哲学都不可能，也不应该给出一锤定音的解答。它能带来的，是讨论公共事务时应有的明晰和平正，是让我们更清晰地思考，更理性地谈论，更真诚地关怀。\n读完这本书，也许我们仍会有很多疑惑，但回望时就会发现，哲学已经带我们离开了稀里糊涂的无知，走近了见多识广者需要面对的困惑。\n\n----------\n\n1. 影响几代人的经典通识，第三版全新推出。\n牛津大学哲学家乔纳森·沃尔夫致力于将严谨的学理探究应用于现实问题，从哲学角度思考公共事务。他的这本《政治哲学》于1996年首版出版后，立刻成为广受认可的通识著作，影响众多年轻人走上思索公共事务之路。\n20多年来，这本通识著作影响了几代人，现已经更新到第三版。第三版不仅在细节上有不少增补，末章更是整章重写，体现了政治哲学近年来的新进展，以及沃尔夫参与公共政策制定、公共议题讨论的经验，回应了女权、种族、移民等等当下热议的话题。\n2. 六大问题环环相扣，搭建思考公共事务的框架。\n作为政治哲学的通识入门作品，这本书无意囊括从古到今一切学说，而是用六大核心问题搭建思考框架，通过追问自然状态、国家、民主、自由、财产、全球正义等六大问题，我们就能了解思想家希望解决的困境，进而掌握理解政治哲学的窍门。\n3. 用通俗的语言说深刻的事，使从古到今的思想鲜活起来。\n沃尔夫擅长用通俗的语言说深刻的事，因为他已熟知那些哲学巨著中的精妙思想，也反复思考过怎样将其传达出来，应用于现实。他不仅用问题激发思考，用思考带动理解，还用贴近的例子来阐发高深的著作，比如用航海旅行的例子来反思柏拉图对民主的思考，在餐馆点菜的场景中解释罗尔斯著作中蕴含的理性选择。他用语言的力量让看起来可畏的理论平易了起来。\n4. 立场平衡，理性温情。\n对于与自身休戚相关公共事务，人们的立场往往非常不同。沃尔夫并不向读者灌输自己的观念，而是将不同思想传统的不同看法平衡列出，让它们互相对话，启发读者运用自己的理性，理解不同的立场，完善自己的观念。他对处于弱势的群体存有温情的理解，这让他对公平正义问题的阐发更有力量。\n5. 学者交口称赞，政治哲学导论的标杆。\n《论政治》作者、普林斯顿/牛津元老级政治学家阿兰·瑞安称之为“政治哲学导论应有的样子”，萨塞克斯大学政治学教授詹姆斯·汉普希尔、格拉斯哥大学政治哲学教授达德利·诺尔斯不约而同地表示，他们还没有见过比沃尔夫这本更好的政治哲学导论。","month":8,"country":"英国","wereadId":"25890902"},{"title":"魍魉之匣（上）","author":"[日] 京极夏彦","start":"2021-08-27","finish":"2021-09-01","rating":8.5,"pages":"473","doubanLink":"https://book.douban.com/subject/3162513/","cover":"https://neodb.social/m/book/2021/09/1531c212d9-3759-4620-bccb-f75df80476bf.jpg","review":"有些评论说作者啰嗦、不讲悬疑设定，我倒觉得这些看似废话的理论才是真正的意思所在，作者有渊博的中国古典文化知识，同时在神秘主义、灵媒、异能方面的形而上学思考也甚为精彩，用箱子的隐喻串联故事情节，非常有意思的阅读。","summary":"两个美貌且彷佛不食人间烟火的少女，相偕在夜里去湖边欣赏月光，其中一名少女却意外落车而身受重伤。无意间搭同一班车下班的刑警木场修在强忍疲惫下接手处理案件，却意外发现身受重伤少女的亲人，是他暗恋了许多年的女演员。木场一面强自按捺内心情感浮动，一面却也深陷难缠案件。身受重伤的少女在送到一栋盒状的建筑物后，在众目睽睽之下居然凭空消失了……\n作家关口偶尔为之取材写作的三流杂志《月刊实录犯罪》，正在追查相模湖发生的分尸杀人案，编辑鸟口和关口联袂前往现场追查，却在路途中迷路而误入一栋奇怪的盒状建筑物……\n在病床上消失的少女、相模湖分尸杀人案、追查案件的木场和关口、盒子般奇怪的建筑物，到底是什么将他们联系在一起？魍魉，真的只存在人心吗？\n【魍魉】\n最早称作“罔两”，为影子之意。东汉的《说文解字》中，则成了“罔两，山川之精物也”，不过魍魉确切的形象，《淮南子》中始见真章，形容其为“状如三岁小儿，赤黑色、赤目、赤爪、长耳、美发”；《搜神记》中引“夏鼎志”云“‘罔象’如三岁儿，赤目，黑色，大耳，长臂，赤爪。索缚，则可得食。”《本草纲目》 则称其“喜食人尸肝”。\n【火车】\n西国云州萨摩边境或东国一带有异事。葬送之时，俄有大风雨，其烈足以吹倒往来行人，葬棺时被吹飞。若掷守护数珠则异事消。否则棺木飞走，失其尸。此即火车捉尸，乃甚为恐怖耻辱之事也。愚俗有言：生涯多为恶事，地狱火车来迎。火车携走死尸后撕裂其身，挂于山中树枝岩头。火车之名，乃佛者先言（中略）。捉火车事，和汉多有事例。曰此乃魍魉之兽所为，魍魉或作罔两、方良。酉阳杂俎引周礼曰：“方相氏殴罔像。好食亡者肝。而畏虎与栢。墓上树栢，路口致石虎为此也。”此兽常于送葬之时出来危害。故汉土圣人之世，方相氏披熊皮，作四目之形，大丧之时立于棺柩前，持戈入穴，击四隅，乃为殴此兽是也。此即险道神。或可见事物之源。","month":9,"country":"日本","wereadId":"CB_DMl62Z60kACU6L06Ln"},{"title":"魍魉之匣（下）","author":"[日] 京极夏彦","start":"2021-09-02","finish":"2021-09-07","rating":8.2,"pages":"417","doubanLink":"https://book.douban.com/subject/3162527/","cover":"https://neodb.social/m/book/2021/09/16507dff05-dd70-43c4-9896-2dafa87b8ca3.jpg","review":"相较而言解谜的第二部个人感觉反倒没那么有意思，反转设定脑洞是挺大的，但是画面感尺度有点过大。","summary":"两个美貌且彷佛不食人间烟火的少女，相偕在夜里去湖边欣赏月光，其中一名少女却意外落车而身受重伤。无意间搭同一班车下班的刑警木场修在强忍疲惫下接手处理案件，却意外发现身受重伤少女的亲人，是他暗恋了许多年的女演员。木场一面强自按捺内心情感浮动，一面却也深陷难缠案件。身受重伤的少女在送到一栋盒状的建筑物后，在众目睽睽之下居然凭空消失了……\n作家关口偶尔为之取材写作的三流杂志《月刊实录犯罪》，正在追查相模湖发生的分尸杀人案，编辑鸟口和关口联袂前往现场追查，却在路途中迷路而误入一栋奇怪的盒状建筑物……\n在病床上消失的少女、相模湖分尸杀人案、追查案件的木场和关口、盒子般奇怪的建筑物，到底是什么将他们联系在一起？魍魉，真的只存在人心吗？\n【魍魉】\n最早称作“罔两”，为影子之意。东汉的《说文解字》中，则成了“罔两，山川之精物也”，不过魍魉确切的形象，《淮南子》中始见真章，形容其为“状如三岁小儿，赤黑色、赤目、赤爪、长耳、美发”；《搜神记》中引“夏鼎志”云“‘罔象’如三岁儿，赤目，黑色，大耳，长臂，赤爪。索缚，则可得食。”《本草纲目》 则称其“喜食人尸肝”。\n【火车】\n西国云州萨摩边境或东国一带有异事。葬送之时，俄有大风雨，其烈足以吹倒往来行人，葬棺时被吹飞。若掷守护数珠则异事消。否则棺木飞走，失其尸。此即火车捉尸，乃甚为恐怖耻辱之事也。愚俗有言：生涯多为恶事，地狱火车来迎。火车携走死尸后撕裂其身，挂于山中树枝岩头。火车之名，乃佛者先言（中略）。捉火车事，和汉多有事例。曰此乃魍魉之兽所为，魍魉或作罔两、方良。酉阳杂俎引周礼曰：“方相氏殴罔像。好食亡者肝。而畏虎与栢。墓上树栢，路口致石虎为此也。”此兽常于送葬之时出来危害。故汉土圣人之世，方相氏披熊皮，作四目之形，大丧之时立于棺柩前，持戈入穴，击四隅，乃为殴此兽是也。此即险道神。或可见事物之源。","month":9,"country":"日本"},{"title":"科学革命的结构","author":"[美]托马斯·库恩, [美]伊安·哈金 (导读)","start":"2021-09-08","finish":"2021-09-17","rating":8.5,"pages":"252","doubanLink":"https://book.douban.com/subject/20376550/","cover":"https://neodb.social/m/book/2021/09/15e30272c6-9692-41ee-80d6-46a32eab2a8f.jpg","review":"- 科学发展不是线性累计的\n- 范式转换就是一场科学革命\n- 一项科学发现可能并无准确的时间，因为范式还未转换\n- 常规科学是一项解谜游戏\n- 科学家通常难以完成范式转变，科学革命的完成很多时候要靠顽固权威派的逝去，与年轻一代的成长\n- 如同达尔文的进化论，科学发展不指向任何目标，包括接近真理。","summary":"本书是20世纪学术史上最有影响的著作之一，是科学史与科学哲学研究的学者们不可不读的基本文献。它引导了科学哲学界的一场认识论的大变革，成为科学哲学史上一道重要的分水岭。其影响不仅在于科学史、科学哲学、科学社会学等相关领域，而且延伸到社会学、文化人类学、文学史、艺术史、政治 史、宗教史等人文和社会科学领域，甚至在社会公众领域也产生了深刻的影响。书中提出的“范式转换”一语如今已成为我们耳熟能详的一个重要词汇。本书自1962年面世以来就引起强烈反响，掀起了一股世界性的研究热潮，其影响至今不衰。本版是芝加哥大学出版社为庆祝本书问世五十周年而作，新加入加拿大哲学家伊安·哈金教授所写的导读。“自然科学的发展除了按常规科学一点一滴地积累之外，还必然要出现“科学革命”。科学革命不仅仅使科学的面貌焕然一新，而且还会引起人们世界观的变革。” - 托马斯·库恩","month":9,"country":"美国"},{"title":"银河帝国：基地七部曲","author":"[美] 艾萨克·阿西莫夫","start":"2021-07-23","finish":"2021-10-18","rating":8.3,"pages":"2888","doubanLink":"https://book.douban.com/subject/26389895/","cover":"https://neodb.social/m/book/2021/09/16aa293ee2-c961-41e5-beec-fd418b1b4baf.jpg","review":"七本书，断断续续看了近三个月，像是完成了某一重大任务，看完如释重负。总的来讲基地系列还是值得一读的，虽然部分内容略显拖沓，但每每总在我即将瞌睡之时，会有一些意想不到的翻转出现。在读基地时难免也会将其与三体进行比较，毫无疑问我个人会更喜欢三体，但又想到基地系列诞生的年代以及作者创作基地时横跨了49年这样的事实，便又觉得基地有其独特的魅力。","summary":"人类蜗居在银河系的一个小角落——太阳系，在围绕太阳旋转的第三颗 行星上，生 活了十多万年之久。\n人类在这个小小的行星（他们称之为“地球”）上，建立了两百多个不同的行政区域（他们称之为“国家”），直到地球上诞生了第一个会思考的机器人。\n在机器人的帮助下，人类迅速掌握了改造外星球的技术，开启了恢弘的星际殖民运动；人类在银河系如蝗虫般繁衍扩张，带着他们永不磨灭的愚昧与智慧、贪婪与良知，登上了一个个荒凉的星球，并将银河系卷入漫长的星际战国时代，直至整个银河被统一，一个统治超过2500万个住人行星、疆域横跨十万光年、总计数兆亿人口的庞大帝国崛起——银河帝国。\n一个微妙的转折发生在银河帝国建国后的12020年。哈里·谢顿，这个刚满32岁的年轻数学家，开创了“心理史学”，这门学科能用数学公式准确推演全人类的未来——“预言”从此成为一门可以信任的科学，人类由此可以看见未来。\n谢顿的第一个预言是：虽然毫无征兆，但已存在一万两千年之久的银河帝国即将灭亡。\n一时间，银河震动，帝国飘摇；皇帝、宰相、夺权者、反叛星球，各方势力立刻剑拔弩张，人类银河时代最伟大的传奇就此开启……","month":10,"country":"美国"},{"title":"牛津大学哲学通识课：道德哲学","author":"[英]乔纳森·沃尔夫","start":"2021-10-09","finish":"2021-10-22","rating":8.6,"pages":"416","doubanLink":"https://book.douban.com/subject/33417102/","cover":"https://neodb.social/m/book/2021/09/1693c2a548-c340-436c-984a-f97c227551d8.jpg","review":"非常棒的道德哲学入门书，部分内容和桑德斯的《公正》有重叠，但仍然值得阅读，相较而言，比起另外一本姊妹篇《政治哲学》，个人更喜欢这本，也可能是翻译的功劳。另外，本书的索引做的非常全面仔细。","summary":"怎么做才对？什么样的生活才算好？这些我们日日面对的问题，追问下去，就会触达道德的本质。\n因此，道德哲学不仅仅是一项学术事业，而是对于什么样的人生才值得过的省察。追寻良好生活，意味着敢于运用自己的理智，去思索至关重要的问题，而不是想都不想就接受别人给出的答案。\n为了这样的道德启蒙，牛津大学哲学家乔纳森·沃尔夫结合几十年的哲学思考与道德实践，为每个愿意探索人生幸福根基的人，写下了这部明晰晓畅的通识著作。他从头梳理2500年的道德探究，使功利主义、道义论、德性伦理三大流派在交锋中相互阐明，让众多大思想家的洞见成为我们时代的道德资源。从古典时代到21世纪，道德哲学追问至为根本的问题，也不断回应每个时代中至为切近的问题。理性的思考加上共情的理解，在质疑、挑战中完善思考与实践，这是形塑道德人生观的途径，也是道德进步的动力。\n\n----------\n\n1. 牛津大学重量级哲学家，广受期待的通识新作。\n牛津大学哲学家乔纳森·沃尔夫治学30多年来著述丰厚，他始终留意将哲学带出书斋，看重思想对现实的改变。他此前的通识经典《政治哲学》已成为标杆之作，而这本《道德哲学》则是他全新出版的通识作品，用他一贯明晰晓畅的语言风格，为以追寻良好生活为重要目的的道德哲学，贡献了一部新的通识经典。\n2. 整合2500年思想资源，梳理三大流派，解答当下道德困境。\n对于“怎么做才对？”“什么样的生活才算好？”这两个关系到人生幸福抉择的核心问题，我们每个人都会做出不同的回答，而从亚里士多德到边沁、康德，再到当代的罗尔斯、安斯康姆等等，2500年来的哲学家也有极为不同的洞察。在《道德哲学》中，沃尔夫梳理功利主义、道义论、德性伦理三大流派，从结果、动机、品格各个方面讨论我们如今面临的道德难题。\n3. 分章回顾、延伸阅读、术语解释、关键词索引，把握道德哲学的关键问题。\n《道德哲学》从哲学思考、道德推理的基本开始，整合大量思想资源，回应种种当下议题。为了让读者在阅读过程中更有方向感，沃尔夫在每一章的末尾设置了回顾和延伸，在附录提供了简明的术语解释和丰富的关键词索引，希望了解道德哲学、关注伦理议题、做出进深研究的读者，都可以从中获益。\n4. 哲学推理、思维实验、生活案例，借助哲学工具告别盲从，重塑道德人生观。\n道德哲学不仅仅是一项学术事业，而是对于什么样的人生才值得过的省察。追寻良好生活，意味着敢于运用自己的理智，去思索至关重要的问题，而不是想都不想就接受别人给出的答案。沃尔夫希望读者能够获得独立运用理性的工具，因此，他详述了哲学推理的基本方法，回顾了2500年来道德思考及实践在质疑、挑战中完善的过程，用思维实验、生活案例等方式，启发我们告别盲从盲信，运用哲学的工具过好自己的人生。","month":10,"country":"英国","wereadId":"25890906"},{"title":"Word Power Made Easy","author":"Norman Lewis","start":"2021-08-05","finish":"2021-10-24","rating":8.6,"pages":"528","doubanLink":"https://book.douban.com/subject/1756614/","cover":"https://neodb.social/m/book/2021/09/165735a026-0869-41ca-a8f1-deb016b9f4b9.jpg","review":"花了将近三个月，终于啃完这本英文单词学习书。若非对英文有所兴趣，我定也坚持不下来。这过程中也许学了几百个单词，但学完之后忘了大半，但比起单词来说，本书给我更大的收获是提供了阅读英文原文书的动力，这也是我读此书的目的所在。本书对英文词根在各个领域学科范围做了介绍，通过众多练习例句让读者加深英文中来自古希腊与拉丁语的词根印象，并学会如何做同根词的词汇演绎。\n\n阅读本书的乐趣不仅在学习到新单词，更在于作者时不时的冒泡与读者打趣分享他对词汇的理解。如作者所言，单词是概念的符号，没有相应的词汇便形成不了对应的概念，没有相应的概念，便无法形成对应的知识，从而无缘智慧。所以语词是迈向智慧的前提。阅读过程中我已将背单词养成习惯，通过欧陆词典进行反复练习，接着再配上各类短文长文、影视剧集材料，将整个输入过程尽量做到完整。","summary":"Do You Always Use the Right Word?\nCan You Pronounce It -- and Spell It -- Correctly?\nDo You Know How to Avoid Illiterate Expressions?\nDo You Speak Grammatically, Without Embarrassing Mistakes?\nIf the answer to any of these questions is NO, you ought to read Word Power Made Easy. Now thoroughly revised to eliminate outmoded references and to to reflect current idioms, it remains the best and quickest means to a better vocabulary in the English language.\nEach chapter ends with review. Each section ends with a progressive check. Numerous tests will help you increase and retain the knowledge you acquired. Word Power Made Easy does more than just ass words to you vocabulary. It teaches ideas and a method of broadening knowledge as an integral part of the vocabulary building process.","month":10,"country":"美国","wereadId":"3001451303"},{"title":"狭义与广义相对论浅说","author":"[美] 阿尔伯特·爱因斯坦","start":"2021-09-30","finish":"2021-10-26","rating":8.5,"pages":"108","doubanLink":"https://book.douban.com/subject/30278176/","cover":"https://neodb.social/m/book/2021/12/0780db7adc-a9f2-4b19-a540-f064ae7de641.jpg","review":"「浅」也是相对的。","summary":"相对论作为现代物理学的重要组成部分，是现当代物理学的两大支柱这一。爱因斯坦作为人类历史上最伟大的科学家，不仅创立了深奥的相对论理论，而且为了让这一深奥的科学理论为更多的人了解，他写作了这本《狭义与广义相对论浅说》。本书分为三大部分：狭义相对论、广义相对论、对整个宇宙的一些思考，深入浅出地介绍了人类思想史上最精彩的科学理论。本书是物理学科中的重要经典著作之一，面世以来流传整个世界，多年来一直印行不辍。","month":10,"country":"美国","wereadId":"33209737"},{"title":"Metaphors We Live By","author":"George Lakoff, Mark Johnson","start":"2021-10-23","finish":"2021-11-03","rating":8.6,"pages":"242","doubanLink":"https://book.douban.com/subject/1456266/","cover":"https://neodb.social/m/book/2021/09/16853572b1-ab68-4f05-b6f9-847ae3acc598.jpg","review":"非常有启发的一本书，作者通过概念化隐喻调和了主观主义和客观主义的矛盾，发展出了理解世界理解真理的一个全新范式。因为隐喻本身构建在文化、文字上，所以书中众多例子用英文读可能才能有更深刻的体会，幸运的是，本书虽然成文于40年前，但其英文写作在我读来也并不艰涩。","summary":"People use metaphors every time they speak. Some of those metaphors are literary - devices for making thoughts more vivid or entertaining. But most are much more basic than that - they're \"metaphors we live by\", metaphors we use without even realizing we're using them. In this book, George Lakoff and Mark Johnson suggest that these basic metaphors not only affect the way we communicate ideas, but actually structure our perceptions and understandings from the beginning. Bringing together the perspectives of linguistics and philosophy, Lakoff and Johnson offer an intriguing and surprising guide to some of the most common metaphors and what they can tell us about the human mind. And for this new edition, they supply an afterword both extending their arguments and offering a fascinating overview of the current state of thinking on the subject of the metaphor.","month":11,"country":"美国"},{"title":"2001：太空漫游","author":"[英] 阿瑟·克拉克","start":"2021-11-05","finish":"2021-11-10","rating":8.5,"pages":"320","doubanLink":"https://book.douban.com/subject/30471298/","cover":"https://neodb.social/m/book/2021/09/154371bc1d-8407-4259-8044-aafdea03673d.jpg","review":"在创作50多年后欣赏对它的时代而言的同时又是描述距今20年前的「科幻」，有一种奇怪的体验，因为竟然丝毫没有在看一本「古典」科幻的感觉，这点感触很不同于阿西莫夫的基地系列。本书行文流畅，情节引入，同时里面涉及到各种人类、机器、哲学的探讨，也正是这些具有划时代意义的探讨让本书从出不过时，作为系列作品的第一部，结尾看的还不甚明白，那段景物描写也许是我缺乏想象力，很难感同身受，希望在后续作品中能看到更精彩的内容。","summary":"◆《太空漫游》拓展了人类理解宇宙的宽度、广度和深度。 从普通读者到刘慈欣到NASA科学家，都从中获得启迪。\n◆刘慈欣：“我所有作品都是对《太空漫游》的拙劣模仿！”\n◆科幻文学历史上不可超越的至高神作！\n◆50年来，影响了后世几乎所有科幻作品：《三体》《流浪地球》《星际穿 越 》《星球大战》《阿凡达》《黑客帝国》《地心引力》《降临》《异形》《飞向太空》《第三类接触》《人工智能 》 《终结者》《超时空接触》《普罗米修斯》《疯狂的外星人》……\n◆入选美国国家公共电台、《轨迹》杂志、英国《卫报》有史以来最伟大的100部科幻-奇幻小说。\n◆入选美国亚马逊评选的有生之年必读的100部科幻-奇幻小说！\n◆同名改编电影，由斯坦利•库布里克执导，登顶所有科幻电影榜单！\n◆关于人类探索太空和自身的恢宏构想！讲透“我们是谁，我们从哪里来，我们到哪里去”的终极奥秘！\n◆作者阿瑟•克拉克与阿西莫夫、海因莱因一起并称为“20世纪科幻三巨头”，被誉为科幻小说之王。一生创作100多部作品，被翻译成40多种语言，作品总销量1亿多册。\n◆阿瑟•克拉克被誉为20世纪伟大的太空预言家，他针对太空技术作出的许多预测都成为现实，地球静止卫星的轨道正是因为他而被命名为“克拉克轨道”。\n◆《2001：太空漫游》是克拉克永恒的科幻经典《太空漫游四部曲》第一部，也是阿瑟•克拉克极负盛名和被公认的至高杰作！\n◆全新精装典藏版！采用烫银+UV工艺！收录15幅精美剧照！\n◆随书附赠一张精美太空船票，跟随本书一起探索太空！\n·\n【内容简介】\n·\n关于人类探索太空和自身的恢宏构想！讲透“我们是谁，我们从哪里来，我们到哪里去”的终极奥秘！\n·\n一块跨越300万年历史的神秘石板，从300万年前促使猿人向人类进化，到现在指引人类驶向太空的更深处。\n一场跨越地球到土星十亿公里的太空之旅，人类跟随更高级文明的指引，试图找到太空和自身的答案。\n人类文明究竟是自然演化，还是更高级文明的一场实验？宇宙文明演化的终点又在哪里？在《2001：太空漫游》里，阿瑟•克拉克给了我们一个终极而恢宏的答案。\n·\n【名人推荐】\n·\n我所有作品都是对《2001：太空漫游》的拙劣模仿，科幻文学在此达到了一个顶峰，之后再也没有人能超越，即使是克拉克本人。————刘慈欣（《三体》《流浪地球》作者）\n·\n无论是小说还是电影，《2001：太空漫游》都开启了人们探索未来和太空的心智���——尼尔•盖曼（《美国众神》《北欧众神》作者）\n·\n是克拉克为我们的登月提供了最重要的知识动力。——美国国家航空航天局（NASA）\n·\n阿瑟•克拉克是世界上独一无二的科幻作家，拥有无穷的想象力、智慧、知识和好奇心。——斯坦利•库布里克（《2001：太空漫游》电影导演）\n·\n阿瑟•克拉克和阿西莫夫的作品，让我走上了成为科幻作家的道路。——特德•姜（科幻作家，《你一生的故事》作者）\n·\n克拉克对我产生了很大的影响……克拉克的英文是很优美的，不是花哨，而是在选择用语的时候非常抒情、优雅。当有很多种可选择的表达时，他总是很仔细地选择。所以他对我的影响来自这三方面：他的风格、他对抽象问题的探讨和他的表达。——罗伯特•索耶（雨果奖、星云奖得主）\n·\n还没看过《2001：太空漫游》的地球人要抓紧恶补一下了。这非常有助于你为即将快速到来的全民太空时代做好最基础的准备。 ——姬十三（果壳网CEO）\n·\n至于我自己，为什么要写作科幻呢？要回答这个问题，我必须回到我13岁时，读完阿瑟•克拉克的《2001太空漫游》后，仰望星空，觉得宇宙如此的浩瀚，而我自己特别渺小……就是这种原初的感动和敬畏，让我开始拿起笔来写作，创作我自己的科幻世界。——陈楸帆（科幻作家，《荒潮》作者）\n·\n使大刘成为大刘的一套书。喜欢大刘的人能不看吗？非看不可！反复读才是！\n——吴岩（科幻作家，中国科普作家协会副理事长）\n·\n【媒体评价】\n·\n充满诗意、科学想像力和克拉克典型的讽刺幽默。他站在宇宙的前端，让我们以不同的视角看到这个宇宙……一本关于人类历史的复杂寓言。──《纽约客》\n·\n令人眼花缭乱……痛苦扭曲……一次思想的狂欢。——《时代周刊》\n·\n令人难以置信！——《生活》杂志\n·\n《2001：太空漫游》并不是一部简单的科幻小说，它是科幻小说的里程碑。——《纽约时报》\n·\n克拉克用他对外星世界一丝不苟的创造力创作了一部令人惊讶的作品，这也证明了克拉克是一个大师！——《图书馆杂志》\n·\n在克拉克诞辰100周年的今天，克拉克仍然是无可置疑的科幻小说之王。克拉克是一位能够提升你的想象力的作家。——《卫报》","month":11,"country":"英国","wereadId":"25164805"},{"title":"富兰克林自传（中英文对照）","author":"[美] 本杰明·富兰克林","start":"2021-10-26","finish":"2021-11-12","rating":8.2,"pages":"294","doubanLink":"https://book.douban.com/subject/2014301/","cover":"https://neodb.social/m/book/2021/11/284f1bebe6-c132-47c0-8913-68aba8655fa7.jpg","review":"不谈书中内容，但记一笔读时感受：此书虽然写于1771 至 1790年，但读起来丝毫未觉有「古人」之感，并且我读的是中英双语版，英文部分相较如今的变化也不大，很容易上手。相对而言，在读另一本成书晚近百年的沈复的《浮生六记》，却完全是另一番光景，此处的文言文较之彼处的英文竟更令我难解。","summary":"《富兰克林自传(中英文对照)》主要内容：他是美国著名的思想家、政治家、外交家和科学家、实业家，不仅是美利坚合众国的缔造者之一，更因其光辉的人性而名垂史册，受到成功学大师戴尔·卡耐基，拿破仑·希尔和奥格·曼狄诺的推崇，成为美国乃至全世界人民心目中的楷模！","month":11,"country":"美国"},{"title":"言论的边界","author":"[英] 安东尼·刘易斯","start":"2021-11-11","finish":"2021-11-19","rating":8.4,"pages":"198","doubanLink":"https://book.douban.com/subject/4850629","cover":"https://neodb.social/m/book/2021/09/153aba0381-3146-46a9-9381-7f0f2297a0d8.jpg","review":"一部美国宪法第一修正案的简史，作者通过大量的司法案例实践，大法官们的思考，新闻从业者与政府之间的对抗，民众对自由表达的渴望梳理了两百多年来关于言论自由这一「社会核心价值观」在美国的发展。正印证了霍姆斯大法官的那句「法律的生命在于经验而非逻辑」。","summary":"本书作者以理性客观的视角和深入浅出的文笔，向读者介绍了美国宪法第一修正案产生的历史背景，及其对美国社会的过去、现在和可预计的将来所产生的深刻影响。","month":11,"country":"英国","wereadId":"3000008675"},{"title":"对空言说","author":"[美] 约翰·杜翰姆·彼得斯","start":"2021-11-22","finish":"2021-12-08","rating":8.3,"pages":"410","doubanLink":"https://book.douban.com/subject/26810561/","cover":"https://neodb.social/m/book/2021/09/15ad75acbe-c462-4fab-a53e-ea807911e53d.jpg","review":"据说是传播学领域的大作，对交流、撒播、传心术等看似日常的用词，作者做了丰富的意向分析、历史溯源。感慨于作者的阅读文本量之巨大，全书几乎每一页都是各种引用，有些引文内容可能由于我学识浅薄，甚至觉得来自于某些犄角旮旯。\n\n因为对这一领域毫无研究，阅读这本传播学观念史时难免走马观花，只能记住一些人名和感兴趣的片段式内容，没法形成一个谱系式印象。也许以后遇到类似主体还能回头再翻翻，将其当作一本工具书。","summary":"在当今社会，传播扮演着至关重要而又独一无二的角色。\n《对空言说：传播的观念史》一书，以广泛的跨学科的人文视角，向读者展现了传播的观念史，它不仅阐述了传播观念的历史沿革，而且旁征博引，论及历史、哲学、宗教、文化乃至法学与技术史领域，将传播的视域追溯至西方思想中那些最根本的问题。即体现了传播学研究的人文取向，也以一种通俗大众的表达方式激发了公众对传播学的兴趣。\n《对空言说》为突破美国实证主义传播学研究传统提供了可行的路径，也因此成为传播思想史的奠基之作。该书在2000年荣膺美国传播学会奖，这是美国传播学界的最高奖项，并在传播学界乃至公众之间激发起广泛的对话。","month":12,"country":"美国"},{"title":"占星术杀人魔法","author":"（日）岛田庄司","start":"2021-11-28","finish":"2021-12-09","rating":8.1,"pages":"348","doubanLink":"https://book.douban.com/subject/10740776/","cover":"https://neodb.social/m/book/2021/09/15184817f8-f13f-409b-bcfb-ed295bcf6d85.jpg","review":"推理小说的核心卖点是诡计的运用，就本书的诡计来说在现在这个时间点看来自然以无甚新奇，但考虑到成书于40年前这一事实，这又是值得钦佩之事。","summary":"四十年前，一桩占星术连续杀人案件轰动全日本！先是画家梅泽平吉在密室被人重击致死，接着是他早已出嫁的长女在家中被奸杀，最后甚至连与他同住的六个女儿也全部失踪。尸体陆续被发现埋在日本各地，而每个人身上都被切掉一部分！\n梅泽平吉遗留的手记上写明他要依据“占星术”肢解重组六个女儿！难道他死而复活来完成幻异的艺术创作？当又没有证据与动机指向其他与本案相关的人——这可说是一桩找不到凶手的命案……\n四十年后，眼见这桩诡谲至极的凶案变成邪灵的诅咒，本职占星师兼职侦探的御手洗洁却意外的得到一封告白遗书！悬宕四十年无解的奇案终于现出一线曙光，御手洗洁决定在一星期��破解这件史上最不苦思议、超大规模的占星术杀人魔法！","month":12,"country":"日本","wereadId":"23193084"},{"title":"Steal Like an Artist","author":"Austin Kleon","start":"2021-12-10","finish":"2021-12-13","rating":7.9,"pages":"160","doubanLink":"https://book.douban.com/subject/7061613/","cover":"https://neodb.social/m/book/2021/09/16d16fa343-0cc4-4d65-ac25-a236c47d3015.jpg","review":"光看里面名人名言应该就够了，相比之下，作者另外一本 share your work 会更好一点。","summary":"You don’t need to be a genius, you just need to be yourself. That’s the message from Austin Kleon, a young writer and artist who knows that creativity is everywhere, creativity is for everyone. A manifesto for the digital age, Steal Like an Artist is a guide whose positive message, graphic look and illustrations, exercises, and examples will put readers directly in touch with their artistic side.\nWhen Mr. Kleon was asked to address college students in upstate New York, he shaped his speech around the ten things he wished someone had told him when he was starting out. The talk went viral, and its author dug deeper into his own ideas to create Steal Like an Artist, the book. The result is inspiring, hip, original, practical, and entertaining. And filled with new truths about creativity: Nothing is original, so embrace influence, col- lect ideas, and remix and re-imagine to discover your own path. Follow your interests wherever they take you. Stay smart, stay out of debt, and risk being boring—the creative you will need to make room to be wild and daring in your imagination.","month":12,"country":"美国","wereadId":"3000045132"},{"title":"莫失莫忘（双语版）","author":"[英] 石黑一雄","start":"2021-12-13","finish":"2021-12-23","rating":8.5,"pages":"560","doubanLink":"https://book.douban.com/subject/30480995/","cover":"https://neodb.social/m/book/2023/01/03c4fe01ec-c958-4366-9dbe-30a30c8294ef.jpg","review":"As a English learner I'm happy I can understand most of the fiction without looking up to dictionaries. The words in the fiction is simple but sometimes profound. \n\n有幸在图书馆借的双语版，打算开始看的时候，才发现译者将Never Let Me Go翻译成莫失莫忘，我的确有点失望，故转而直接看英文。好在石黑一雄这本小说的文字都比较易懂，几乎都是短句，偶有几个不认识的单词查一查，完全能看下来，虽然在阅读速度上慢了一点，但能读到诺奖得主的原文，也是一种学习和体验。读的第一本石黑一雄的小说是《长日将尽》，而这本就像是跟《长日将尽》用的一个酒瓶子，但是换了酒。这种换酒不换瓶的操作，在读起来时有一种熟悉又陌生的感觉。一贯的克制情感的描写，配合上这样一个反乌托邦的科幻设定，令人多次哽咽。","summary":"★ 中英双语品鉴2017年诺奖得主代表作\n★ 一场史无前例的情感体验 一部生物工程时代的《一九八四》\n------------------------------------------------------------------------------------------------------\n“《莫失莫忘》的重点不在于如何看待克隆人，而是在于如何将人看成克隆人，令人反思生命的意义。”\n——台湾学者陈重仁\n“本书堪称生物工程时代的《一九八四》。”\n——美国《村声》杂志\n\n“表现杰出……石黑一雄针对人类关系的磨炼做了一次最深入的陈述……堪称石黑先生迄今描绘最为精准、最感人的一部作品。”\n──英国《卫报》\n------------------------------------------------------------------------------------------------------\n《莫失莫忘》是石黑一雄一部具有反乌托邦色彩的科幻小说，曾入围2005年布克奖和美国书评人协会奖决选名单。英格兰乡村深处的黑尔舍姆学校中，凯西、露丝和汤米三个好朋友在这里悠然成长。他们被导师小心呵护，接受良好的诗歌和艺术教育。然而，看似一座世外桃源的黑尔舍姆，却隐藏着许多秘密。凯西三人长大后，逐渐发现记忆中美好的成长过程，处处都是无法追寻的惶惑与骇人的问号……","month":12,"country":"英国","wereadId":"25291542"}];
    const wereadData = {"624848":{"rating":691,"ratingCount":15175,"highlights":[{"text":"拉丁文本身就饶富词尾变化，无须借助in或of这类的介词。英文的“公元”由六个单词组成：in the year of the lord；拉丁文只需两个单词：anno domini，这就是拉丁文适合当座右铭的原因之一——如此言简意赅。你不会在关键词之间发现拉拉杂杂的赘词。拉丁文里也不需要定冠词the或不定冠词a，an。annus既是指特定的一年（the year），也可指任何一年（a year）。","chapter":"第七章 语言：从两种变几十种","color":0},{"text":"anno意为年度中，domini意为上帝。今天我们的历法以AD计算年份，就是这两词的缩写，意思是从耶稣基督诞生那年算起。","chapter":"第七章 语言：从两种变几十种","color":0},{"text":"在东边，依照君士坦丁堡的规矩，皇帝不但是整个帝国世俗事务的统御者，也是教会的统治者。他们也有个最高主教，但这位最高主教由皇帝指派，也归皇帝管辖。在西边，教会和国家则是分开的两个权力单位，各有各的权威。这对国王来说是个不曾或断的障碍，让他无法号称普天下都是他一个人的。\n","chapter":"第六章 皇帝和教皇到底谁大？","color":0},{"text":"新教教义从一开始便是以保障个人自由为出发点，因为它干犯教皇和主教的权威，提升了个人的意识和地位。在英国，它与自由的关系更是密不可分，因为英国的敌人——法国和西班牙的专制君主都是天主教徒，而那些试图架空议会的英国国王不是信奉天主教就是对天主教手软之辈。保存国会与保存新教信仰合而为一，成了殊途同归的新教志业。","chapter":"第五章 有国王的民主，没国王的极权","color":0},{"text":"拟定这些自由原则用以支持这场国会政变的是英国哲学家约翰·洛克（John Locke）。他的著作《政府论》（Two Treatises on Government）出版于1690年，彼时革命才刚尘埃落定。洛克的主张是：依据罗马自然法的观念，每个人都拥有与生俱来的生存权、财产权和自由权，而透过政府的成立，人民有如和政府签下契约：人民授予政府权力，为的是让自己的权利得到保护；如果政府不能保护人民的这些权利，人民有权解散政府，重新建立新的政府。过去有关国王如神祇一般的地位、臣民服从君命的义务，这些观念通通都被扫到一边，成立政府已与签订一纸商业契约无异。","chapter":"第五章 有国王的民主，没国王的极权","color":0},{"text":"人是善变无常的、优柔寡断的、浅薄无知的、容易被操弄的，而政治是一种精细的艺术，需要智慧和良好判断，这不是每个公民都拥有的特质。","chapter":"第四章 民主意识，这样开始的","color":0},{"text":"维京人，又称诺曼人、北欧人，是最后一批侵略者，在9世纪和10世纪，也就是继伊斯兰进占后的两个世纪，横行于整个欧洲。","chapter":"第三章 争战一千年","color":0},{"text":"穆斯林也承认耶稣和耶稣之前的先知们确实是先知，但深信穆罕默德是世上最后一位先知，能指引大家走向唯一真神安拉的怀抱。伊斯兰教比起基督教来说简单许多。他们没有希腊人那种奇思妙想，认为基督教的神是三位一体——圣父、圣子、圣灵，三者各有所司但地位相等，各有分别却又形同一体。在伊斯兰教看来，唯一的神就是安拉而已。穆斯林对基督徒和犹太人相当宽容，基督徒却总认为穆斯林欺世盗名，是真正信仰的毁灭者。\n","chapter":"第三章 争战一千年","color":0},{"text":"日耳曼蛮族并不是把原有的居民赶走，也不是由雄兵战士压境进袭。这些日耳曼人是带着妻小，打算来此定居的；他们在某些地区形成了人口密集的社群，有些地方则零零落落，人迹微稀。","chapter":"第三章 争战一千年","color":0},{"text":"罗马帝国曾经遭到三次大规模侵略。第一次的侵略者是日耳曼蛮族，继而是穆斯林（指伊斯兰教徒），再来是北欧人，或称维京人。","chapter":"第三章 争战一千年","color":0},{"text":"对一切事物充满质疑，人会迷失方向；我们不能光靠理性过日子，一定要靠风俗、习惯和宗教对个人指点迷津，才可能成就一个社会。","chapter":"间奏篇 古典情怀今犹在","color":0},{"text":"浪漫主义崇尚情感、文化、民族主义和自由解放，图中和这个箭头背道而驰的是理性、科学和进步。","chapter":"第二章 神性到理性，科学到浪漫","color":0},{"text":"浪漫主义运动也催生了民族主义的意识形态，这个观念在当今世界里依然是一股强大的力量。民族主义主张，拥有相同文化和语言的民族必须生活在一起、成立自己的政府。","chapter":"第二章 神性到理性，科学到浪漫","color":0},{"text":"浪漫主义运动崇尚感受、情绪以及所有的强烈的情感。","chapter":"第二章 神性到理性，科学到浪漫","color":0},{"text":"浪漫主义的信息是：文明是人为的，它束缚了我们、局限了我们，唯有活在传统文化当中，你才算是活得完整。","chapter":"第二章 神性到理性，科学到浪漫","color":0},{"text":"它的根本不同在于将理性用于一切事物，让知识领域里没有层级之分。","chapter":"第二章 神性到理性，科学到浪漫","color":0}],"thoughts":[],"popularHighlights":[{"text":"对一切事物充满质疑，人会迷失方向；我们不能光靠理性过日子，一定要靠风俗、习惯和宗教对个人指点迷津，才可能成就一个社会。","count":7824,"chapter":"间奏篇 古典情怀今犹在"},{"text":"希腊人的观点：这是一个简单、符合逻辑、能以数学表达的世界。基督教的观点：这是个邪恶的世界，唯有耶稣能拯救它。日耳曼蛮族的观点则是：打仗是好玩的事。这些看似天差地远的元素组合在一起，造就了欧洲的文明。","count":6596,"chapter":"第一章 从希腊说起，讲到日耳曼"},{"text":"人是善变无常的、优柔寡断的、浅薄无知的、容易被操弄的，而政治是一种精细的艺术，需要智慧和良好判断，这不是每个公民都拥有的特质。","count":2821,"chapter":"第四章 民主意识，这样开始的"},{"text":"没错，当你身在洞里，你不可能看到真相。","count":2702,"chapter":"间奏篇 古典情怀今犹在"},{"text":"几何学是个简单、优雅、逻辑的系统，非常赏心，也非常之美。美？希腊人确实认为它很美。","count":2544,"chapter":"第一章 从希腊说起，讲到日耳曼"},{"text":"在他们眼里，几何学是引导人类认知宇宙本质的一个途径。","count":2235,"chapter":"第一章 从希腊说起，讲到日耳曼"},{"text":"活着不是目的，好好活着才是。","count":2050,"chapter":"间奏篇 古典情怀今犹在"},{"text":"你会发现，要劝动一个日耳曼人下田耕种，耐心等着一年一度的收成，要比劝他去挑战敌人、赢得受伤的奖赏来得困难。他认为，能靠流血换到的东西却去流汗得来，是没骨气、等而下之的事。","count":2034,"chapter":"第一章 从希腊说起，讲到日耳曼"},{"text":"从私有财产权出发，衍生出人权观念，是西方价值的核心。","count":2000,"chapter":"第一章 从希腊说起，讲到日耳曼"},{"text":"唯有答案简单，才可能近乎正确。","count":1950,"chapter":"第一章 从希腊说起，讲到日耳曼"},{"text":"这是西方普遍面对的困境：我们很聪明，可是我们不断在发现自己的无足轻重。","count":1914,"chapter":"第二章 神性到理性，科学到浪漫"},{"text":"在犹太民族的宗教里，一如基督教中，道德与宗教是密不可分的，但其他宗教就不见得如此。","count":1908,"chapter":"第一章 从希腊说起，讲到日耳曼"},{"text":"你似乎被分裂成两半。对我们的孩童，你希望他们懂得科学就好，可是你也羡慕那些传统信仰没有断裂的人。","count":1872,"chapter":"第二章 神性到理性，科学到浪漫"},{"text":"中国文明由于没有中断，因而没有反思的机会，也就没有文艺复兴、宗教改革、科学革命那种再生的动力。","count":1848,"chapter":"推荐序 历史，是最好的避险秘笈！"},{"text":"不是所有的东西都属于国王”，这是欧洲自由和繁荣的基石。","count":1792,"chapter":"结语 欧洲，为什么可以抢第一？"},{"text":"基本上每个男人都有参政权，但有钱人的声音最大。","count":1768,"chapter":"第四章 民主意识，这样开始的"},{"text":"希腊人研究科学，并不像我们是先有假设再用实验去验证，他们认为，只要你开始思索，努力推敲，就可以得出正确答案。因此，他们根据灵感，大胆揣测。","count":1742,"chapter":"第一章 从希腊说起，讲到日耳曼"},{"text":"欧洲文明是独特的，因为它一直是唯一能让世界其他地区马首是瞻的文明。","count":1720,"chapter":"第一章 从希腊说起，讲到日耳曼"},{"text":"我的目的是从中找出欧洲文明的基本元素，看这些元素如何透过时间重新组合，从古旧中形塑出新的样貌；看旧有的东西如何屹立不摇、风云再现。","count":1708,"chapter":"引言 历史，带领我们更贴近人生"},{"text":"从裸体作品到罪恶的赤身露体再回归裸体作品，可以代表古典时期到中世纪再到近代的意涵演变，而这正是文艺复兴对它本身的理解。","count":1648,"chapter":"第二章 神性到理性，科学到浪漫"}]},"635838":{"rating":874,"ratingCount":3804,"highlights":[{"text":"对于康德和罗尔斯而言，权利优先于善。那些界定我们的各种义务和权利的公正原则，应当中立于各种关于良善生活的观念。康德认为，为了达到这一道德法则，我们必须抽离于自己各种偶然的利益和目的。罗尔斯坚持认为，为了慎议公正，我们应当搁置我们各种特殊的目的、情感以及各种善观念，这是在无知之幕背后思考公正的关键。\n这种思考公正的方式与亚里士多德思考公正的方式相冲突。亚里士多德认为，公正原则不能够或不应当中立于良善生活。与之相反，他坚持认为，公正宪制的目的之一就在于养成好公民、培育好品质。他认为，如果我们不慎议所分配的物品—如职务、荣誉、权利和机会—的意义，我们就不可能慎议公正。","chapter":"公正与良善生活","color":0},{"text":"我在试着通过本书中所考虑的这些或那些事例来提出，这种自由观是有缺陷的。但是，在这里，自由并不是唯一受到威胁的东西，同样岌岌可危的是：我们如何思考公正。","chapter":"公正与良善生活","color":0},{"text":"那种对家庭成员和同胞的行为而感到骄傲和羞愧的能力，与集体责任的能力密切相关。这两种能力都要求我们将自己看做情境的自我—受制于那些我们并没有选择的道德纽带，并暗含于那些塑造我们作为道德主体的身份的各种叙述当中","chapter":"团结是对自己人的一种偏袒吗？","color":0},{"text":"由于公共生活和共同分享的历史，我们对同胞公民们的幸福肩负着一种特殊的责任。而这也依赖于我们接受那种叙述性的人格观念，根据这种人格观念，我们作为道德主体的身份与我们所居住的共同体紧密相关。","chapter":"爱国主义是一种美德吗？","color":0},{"text":"作为道德主体，我们并非由自己的目的所界定，而是由自己的选择能力所界定。","chapter":"公正与自由","color":0},{"text":"罗尔斯认为权利优先于善的理由，反映出这样一种信念—“一个有道德的人，就是一个拥有他所选择的各种目的的主体。”","chapter":"公正与自由","color":0},{"text":"这种推理模式正是康德和罗尔斯所反对的。他们认为，权利优先于善。那些将我们的义务和权利具体化的原则，不应当建立在任何特殊的关于良善生活的观念之上。","chapter":"政府应当在道德上保持中立吗？","color":0},{"text":"对于亚里士多德而言，奴隶制要成为公正的，就必须满足两个条件：它必须是必要的；同时，它必须是自然的。","chapter":"政治与良善生活","color":0},{"text":"我们并不是先默默地理解这些事物，然后再用词语表达出来；语言是我们识别、慎议善的介质。￼","chapter":"如果不参与政治，你能成为一个好人吗？","color":0},{"text":"在亚里士多德看来，政治关系到某种更高的事物，它关系到试着怎样去过一种好生活。政治的目的完全在于：使人们能够发展各自独特的人类能力和德性—能够慎议共同善，能够获得实际的判断，能够共享自治，能够关心作为整体的共同体的命运。","chapter":"政治的目的是什么？","color":0},{"text":"亚里士多德批判了两种主要的、会对政治权威提出要求的制度—寡头制和民主制。他认为每种制度都有一种主张，不过都是部分的主张。寡头制认为，城邦应当由富人统治，而民主制则认为，出生自由是公民身份和政治权威的唯一标准。但是两者都夸大了各自的主张，因为他们都误解了政治共同体的目的。","chapter":"政治的目的是什么？","color":0},{"text":"将最好的长笛给最佳长笛吹奏者的最显而易见的理由是，这样做将会产生最好的音乐，对我们听众有利。然而，这并不是亚里士多德的理由。他认为，最好的长笛应当归给最佳长笛吹奏者的理由是，这是长笛存在的目的—被很好地吹奏。","chapter":"公正、目的与荣誉","color":0},{"text":"现代的各种公正理论，都试图将公平和权利的问题与荣誉、德性和道德应得的问题分离开来。它们寻求那些中立于各种目的的公正原则，并使人们能够自己选择和追求他们的目的。亚里士多德（公元前384～公元前322）并不认为，公正可以以这种方式保持中立。他认为，关于公正的争论，不可避免地就是关于荣誉、德性以及良善生活本质的争论。","chapter":"公正、目的与荣誉","color":0},{"text":"亚里士多德政治哲学的核心是两种观念，两者都体现于关于考利的争论当中：\n1.公正是目的论的。对于权利的界定要求我们弄明白所讨论的社会行为的目的（telos，意图、目标或本性）。\n2.公正是荣誉性的。为了推理一种行为的目的—或讨论之，就至少要部分地推理或讨论它应当尊敬或奖励什么样的德性。","chapter":"公正、目的与荣誉","color":0},{"text":"不仅仅只有一种工具性的目的（鼓舞拉拉队），同时也有一种荣誉性的或模范性的目的（庆祝某种卓越或德性）。","chapter":"第八章 谁应得什么？/亚里士多德","color":0},{"text":"德沃金的重点在于：录取中的公正并不是在奖赏优点与德性，只有当一所大学界定了自己的使命时，我们才能知道，什么才算是分配大学新生名额的公平方式。该使命界定了相关的美德，而不是相反。德沃金关于大学录取的论证，与罗尔斯关于收入分配的论证类似，它与道德应得无关。","chapter":"民族偏好侵犯了权利吗？","color":0},{"text":"支持反歧视行动的补偿性理由是否能够回答这一反驳，取决于“集体责任”这一令人费解的观念：我们是否具有一种道德责任来纠正前一辈人所犯下的错呢？为了回答这一问题，我们需要更多地了解道德责任是如何产生的。我们是仅仅作为个体来承担责任呢，还是某些责任要求我们作为具有历史身份的共同体的成员来承担？","chapter":"补偿过往之错","color":0},{"text":"赞同将民族和种族纳入考虑因素的三个原因：纠正标准化考试中的偏见、补偿过往之错和促进多样性。","chapter":"第七章 反歧视政策之争","color":0},{"text":"罗尔斯建议我们这样来处理这些事实：同意“与他人分享命运”，并且“只有当利用那些自然和社会环境的偶然性能够有利于整体时，我们才能这么做","chapter":"生活是公平的吗？","color":0},{"text":"我们应当反对这样一种论点：制度的安排总是有缺陷的，因为自然才能的分配和社会环境的偶然性因素是不公正的，而这种不公正不可避免地必然要转移到人类的制度安排之中。这种思想有时候被用来作为对不公正熟视无睹的借口，仿佛拒绝默认不公正的存在和不能接受死亡一样。（我认为）自然的分配无所谓公正不公正，人们降生于社会的某一特殊地位也说不上不公正。这些只是一些自然事实。公正或不公正在于制度处理这些事实的方式。","chapter":"生活是公平的吗？","color":0},{"text":"这些工资上的差异公平吗？对罗尔斯而言，这个问题的答案，将取决于它们是否源于一种有利于社会最不利者们的税务体制和再分配体制。","chapter":"反对道德应得","color":0},{"text":"但是，在我们对较少的东西拥有权利的同时，我们不会比他人具有更少的价值和更少的道德应得。这一点对于生活在我们这个社会中的那些缺少某些特权地位，以及拥有较少这个社会所恰好奖励的各种才能的人而言，同样是真实的。","chapter":"反对道德应得","color":0},{"text":"1.封建制度或种姓制度：基于出生的固定等级制\n2.自由至上主义：拥有形式上的机会均等的自由市场\n3.精英统治制度：拥有公平机会均等的自由市场\n4.平等主义：罗尔斯的差异原则","chapter":"一个平等主义的噩梦","color":0},{"text":"差异原则实际上体现了一种协议，即将自然才能的分配看做一种公共资产，并共享这一分配的好处，而无论其结果是什么。那些受到自然宠爱的人们，无论他们是谁，都只有当他们的好运气改善了那些不利者的状况时，才能从自己的好运气中获利。那些在天赋上占优势的人们，不能因为天分较高而仅仅自己受益，而要通过抵消那些训练和教育所产生的费用，从而帮助那些比较不幸的人们。没有人应当得到更大的自然能力，也没有人在社会上值得拥有更加有利的起点。然而这并不由此产生这样一种观点：人们应当消除这些差别。我们还有另外一种途径来处理它们。人们能够安排社会的基本结构，以至于这些偶然性对那些最不幸者有利。","chapter":"一个平等主义的噩梦","color":0},{"text":"契约的道德约束力来自于两种不同的理念：意志自由和互惠性。然而，大多数实际的契约都缺乏这些理念。","chapter":"设想完美的契约","color":0},{"text":"由于我们同时栖居于两种立场之中—必然的王国和自由的王国—所以在我们所做的与我们所应当做的之间，在事物所是的方式与它们所应当是的方式之间，就总是存在有一个鸿沟。","chapter":"对康德的疑问","color":0},{"text":"这两种视角的对立关系将我们已经讨论过的三种对比串联起来：\n对比1（道德）：义务 Vs. 倾向\n对比2（自由）：自律 Vs. 他律\n对比3（理性）：绝对命令 Vs. 假言命令\n对比4（立场）：理智王国 Vs. 感性王国\n作为一个自然的存在，我属于感知世界，我的行为由自然法则和因果规律而决定，这是物理学、生物学以及神经科学所能描述的人类行为的一个方面。作为一个理性存在，我居住在理智王国。在这里，由于独立于自然法则，我能够自律，能够根据我给自己所设定的法则而行动。","chapter":"对康德的疑问","color":0},{"text":"每个运用纯粹实践理性的人，都会得出同样的结论—都会达到一个单一的（普遍的）绝对命令。“因此，一个自由的意志，与一个遵从道德法则的意志，是同一回事。”","chapter":"对康德的疑问","color":0},{"text":"自由地行动—亦即自律—与有道德地行动、遵从绝对命令地行动，是一回事。","chapter":"道德与自由","color":0},{"text":"现在我们可以弄明白康德所说的那种道德和自由之间的联系了。有道德地行动意味着出于义务—为了道德法则—而行动。道德法则由一个绝对命令所构成，也即一个要求我们尊敬地将他人当做目的本身而加以对待的原则。只有当我的行为与这个绝对命令相一致的时候，我才是自由地行动。因为，无论什么时候当我依据一个假言命令而行动的时候，我都是为了某些外在于我而给定的利益或目的。可是在这种情况下，我并没有真正的自由；我的意志不是由我自己决定的，而是由外在力量决定的—由我的环境需要或我恰好拥有的各种期望和欲求所决定的。","chapter":"道德与自由","color":0},{"text":"对于康德而言，自尊和尊重他人源自于一个并且是同样的原则。我们对于理性存在的人，对于人性的载体，负有尊重的义务。它与这个人实际上是谁并无关系。","chapter":"绝对命令Vs.假言命令","color":0},{"text":"应当这样行为：不要总是将人—无论是你自己本身还是任何其他人—仅仅看做一种手段而加以对待，而总是同时也把他们看做一种目的而加以对待。","chapter":"绝对命令Vs.假言命令","color":0},{"text":"康德将第一种形式称为普遍法的准则：“只按照你同时认为也能成为普遍规律的准则去行动。","chapter":"绝对命令Vs.假言命令","color":0},{"text":"康德的理性观念—与道德有关的实践理性—并不是工具性的理性，而是“纯粹实践理性，它忽视所有的经验目的而设定了一种先验性”。","chapter":"道德的最高原则是什么？","color":0},{"text":"我们可以通过弄明白康德是如何将三个重要的观念—道德、自由和理性—联系在一起的，从而接近他的答案。他通过一系列的对比和二元论来解释这些观念。它们涉及一些晦涩难懂的术语，不过如果你注意到这些截然不同的术语中的相似之处的话，那么你就能很好地理解康德的道德哲学了。以下是一些需要记住的对比：\n对比1（道德）：义务 Vs. 倾向\n对比2（自由）：自律 Vs. 他律\n对比3（理性）：绝对命令 Vs. 假言命令","chapter":"道德的最高原则是什么？","color":0},{"text":"自由地行动并不是为给定的目的选择最佳的方式，而是选择目的本身","chapter":"什么是自由？","color":0},{"text":"康德的推理如下：当我们像动物一样追求快乐或避免痛苦时，我们并不是真正自由地行动，而是作为欲望和渴求的奴隶而行动。为什么呢？因为无论何时，只要我们是在追求欲望的满足，那么我们所做的任何事情，都是为了某种外在于我们的目的。我以这种方式来充饥，以那种方式来解渴。","chapter":"什么是自由？","color":0},{"text":"康德认为，每个人都值得尊重，这并不是因为我们拥有自身，而是因为我们是理性的存在，即能够进行推理；我们也是意志自由的存在，能够自由地行动和选择。","chapter":"使幸福最大化的问题","color":0},{"text":"康德反对第一种进路（使福利最大化）和第三种进路（促进德性）。他认为，这两种进路都没有尊重人类自由。因此，康德是第二种进路—将公正与道德同自由联系起来—的强有力的倡导者。然而，他所提出的自由观念要求更为苛刻—比我们在市场上买卖东西时所行使的选择自由要更加苛刻。康德认为，我们日常所认为的市场自由或消费自由并不是真正的自由，因为它仅仅满足我们事先并没有选择的各种欲望。","chapter":"康德论权利","color":0},{"text":"它依赖于这样一种观念—我们是理性的存在，值得拥有尊严和尊重。","chapter":"康德论权利","color":0},{"text":"这一推理路线将我们带到自由至上主义主张的道德核心—自我所有权的观念。如果我拥有自身，那么我就必须拥有我自己的劳动力。","chapter":"迈克尔·乔丹的钱","color":0},{"text":"诺齐克反对模式化的公正理论，而支持那些尊重人们在自由市场中所做出的选择的公正理论。他认为分配公正取决于两个条件—初始拥有的正当性和财产转移的正当性。","chapter":"自由市场哲学","color":0},{"text":"出生于奥地利的经济学家兼哲学家弗里德里希·哈耶克（Friedrich A. Hayek，1899～1992）认为，任何企图带来更大的经济平等的尝试都注定具有压迫性，并且对一个自由的社会是有害的。","chapter":"最小政府","color":0},{"text":"自由至上主义者们并不是以经济效率的名义—而是以人类自由的名义，支持不受约束的市场，并反对政府管制。他们的核心主张是：我们每一个人都拥有一种根本性的自由权—用自己拥有的事物去做任何事情的权利，只要我们同样尊重他人这样做的权利。","chapter":"第三章 我们拥有自身吗？/自由至上主义","color":0},{"text":"它的最恰当的称号就是一种尊严感，所有的人类都以这种或那种方式拥有这种尊严感。","chapter":"约翰·斯图亚特·密尔","color":0},{"text":"一个人如果连欲望和冲动都不是自己的，他就没有品格可言，就像一个蒸汽机没有品格一样。”","chapter":"约翰·斯图亚特·密尔","color":0},{"text":"边沁写道：“当一个人想要反抗功利原则时，他所引用的理由正来自于这个原则本身—而他自己都意识不到这一点。”","chapter":"杰里米·边沁的功利主义","color":0},{"text":"它反驳这样一种观念：正当的行为仅仅是对结果—代价和受益—的一种算计。它暗示道德意味着更多的东西—某种与人类恰当地对待他人的方式相关的东西。","chapter":"第二章 最大幸福原则/功利主义","color":0},{"text":"在这种从行动领域向理性王国之间来回思考的过程中发生的思想上的转变，就是道德反思。","chapter":"道德困境","color":0},{"text":"悬置偶然性","chapter":"失控的电车","color":0},{"text":"我们当今的一些争论反映出我们在以下问题上的分歧：将幸福最大化、尊重自由以及培养德性意味着什么？","chapter":"三种考量公正的角度","color":0},{"text":"相比之下，德性的论证基于这样一种判断，即：贪婪是一种国家应当反对的恶。然而，应当由谁来判断什么是善，什么是恶呢？难道多元社会中的公民们不是对这些事物存在分歧吗？难道将关于德性的评判引入法律不会有危险吗？在面临这些担忧的时候，很多人都认为，政府应当在善恶之争中持中立态度，不应试图培养良好心态，或修正不良品性。","chapter":"福利、自由与德性","color":0},{"text":"通过惩罚而非奖励贪婪的行为，社会肯定了那种为了群体善而共同牺牲的公民美德。","chapter":"福利、自由与德性","color":0},{"text":"如果你仔细观察价格欺诈的争论，你就会发现那些维护和反对价格欺诈的论证，都围绕着三种观念展开：使福利最大化、尊重自由和促进德性。其中的每一种观念都引向了一种不同的思考公正的方式。","chapter":"福利、自由与德性","color":0}],"thoughts":[{"text":"大学为自己的使命立法，成绝对命令，基于绝对命令行事便合乎道理。不以学生为工具，而以成就他们为目的。","quote":"德沃金的重点在于：录取中的公正并不是在奖赏优点与德性，只有当一所大学界定了自己的使命时，我们才能知道，什么才算是分配大学新生名额的公平方式。该使命界定了相关的美德，而不是相反。德沃金关于大学录取的论证，与罗尔斯关于收入分配的论证类似，它与道德应得无关。","chapter":""},{"text":"被罗尔斯的发言感动到。\n人出生后被定义的高低贵贱、聪明愚蠢、贫穷富有，那都无所谓公正与否，因为它们都具有道德偶然性（与此刻社会的需求匹配程度）。而降生后所处的环境，社会的制度，人们的观念加之在这些天性之上时，才出现了公正与不公正。我们能做的应该是改变这些制度与观念，向更公正的目标进发，而不是做一只埋头的鸵鸟，接受实然不去追求应然。","quote":"我们应当反对这样一种论点：制度的安排总是有缺陷的，因为自然才能的分配和社会环境的偶然性因素是不公正的，而这种不公正不可避免地必然要转移到人类的制度安排之中。这种思想有时候被用来作为对不公正熟视无睹的借口，仿佛拒绝默认不公正的存在和不能接受死亡一样。（我认为）自然的分配无所谓公正不公正，人们降生于社会的某一特殊地位也说不上不公正。这些只是一些自然事实。公正或不公正在于制度处理这些事实的方式。","chapter":""},{"text":"这也是另一种意义上的将人当成目的，而非工具，因为只有工具才会有趁手不趁手，适合不适合。","quote":"但是，在我们对较少的东西拥有权利的同时，我们不会比他人具有更少的价值和更少的道德应得。这一点对于生活在我们这个社会中的那些缺少某些特权地位，以及拥有较少这个社会所恰好奖励的各种才能的人而言，同样是真实的。","chapter":""},{"text":"虽然与功利主义出发点不同，但似乎落脚的地方都会成为多数人对少数人的剥削。","quote":"差异原则实际上体现了一种协议，即将自然才能的分配看做一种公共资产，并共享这一分配的好处，而无论其结果是什么。那些受到自然宠爱的人们，无论他们是谁，都只有当他们的好运气改善了那些不利者的状况时，才能从自己的好运气中获利。那些在天赋上占优势的人们，不能因为天分较高而仅仅自己受益，而要通过抵消那些训练和教育所产生的费用，从而帮助那些比较不幸的人们。没有人应当得到更大的自然能力，也没有人在社会上值得拥有更加有利的起点。然而这并不由此产生这样一种观点：人们应当消除这些差别。我们还有另外一种途径来处理它们。人们能够安排社会的基本结构，以至于这些偶然性对那些最不幸者有利。","chapter":""},{"text":"在应然和实然之间做出正确的选择，也是理性的人区别于动物之所在。","quote":"由于我们同时栖居于两种立场之中—必然的王国和自由的王国—所以在我们所做的与我们所应当做的之间，在事物所是的方式与它们所应当是的方式之间，就总是存在有一个鸿沟。","chapter":""},{"text":"看人以目的为基础","quote":"应当这样行为：不要总是将人—无论是你自己本身还是任何其他人—仅仅看做一种手段而加以对待，而总是同时也把他们看做一种目的而加以对待。","chapter":""},{"text":"自由为自己立法","quote":"因此，如果我们能够掌控自由，我们就必须能够不根据那给予我们或强加给我们的法则而行动，而是根据我们给自己所定的法则而行动。","chapter":""},{"text":"经济系统是一个复杂系统，即使有同样的初始条件和转移机制，它的走向和状态都是千差万别，如果没有制度制约，它便可能成为一个极恶的系统。","quote":"诺齐克反对模式化的公正理论，而支持那些尊重人们在自由市场中所做出的选择的公正理论。他认为分配公正取决于两个条件—初始拥有的正当性和财产转移的正当性。","chapter":""},{"text":"在人类回答灵魂的本质问题之前，快乐的高级与低级区分我想是没有答案的，即使生物科学能发展到精确判断某种活动能帮助你分泌出多少多巴胺。","quote":"它的最恰当的称号就是一种尊严感，所有的人类都以这种或那种方式拥有这种尊严感。","chapter":""},{"text":"在人类回答灵魂的本质问题之前，快乐的高级与低级区分我想是没有答案的，即使生物科学能发展到精确判断某种活动能帮助你分泌出多少多巴胺。","quote":"对于边沁而言，快乐就是快乐，痛苦就是痛苦。评判一种体验与其他相比是更好还是更坏的唯一基础，就是它所产生的快乐或痛苦的强度和持久度。所谓的更高级的快乐或更高贵的德性只是能产生更强烈、更持久的快乐罢了。边沁并没有认识到不同的快乐所具有的质的差别。“快乐的量是平等的，”他写道，“图钉游戏与诗歌一样好。”[插图]（图钉游戏是一种小孩子的游戏。）\n边沁功利主义的部分吸引力正在于这种不加评判的精神。它如其所是地接受人们的各种偏好，而不对它们的道德价值作任何评判。所有的偏好都同等重要。边沁认为，认为某些快乐在本质上优于其他快乐，是一种专横的行为。有些人喜欢莫扎特，而有些人喜欢麦当娜；有些人喜欢芭蕾，而有些人喜欢保龄球；有些人读柏拉图，而有些人读《阁楼》[插图]。","chapter":""},{"text":"法律之外，以理服人。然而人们对道理的认识并非统一，这也便是矛盾的源头。","quote":"相比之下，德性的论证基于这样一种判断，即：贪婪是一种国家应当反对的恶。然而，应当由谁来判断什么是善，什么是恶呢？难道多元社会中的公民们不是对这些事物存在分歧吗？难道将关于德性的评判引入法律不会有危险吗？在面临这些担忧的时候，很多人都认为，政府应当在善恶之争中持中立态度，不应试图培养良好心态，或修正不良品性。","chapter":""}],"popularHighlights":[{"text":"根据康德的思想，自由地行动就是自律地行动，自律地行动就是根据我给自己所立的法则而行动——而不是听从于本性或社会传统的指令。","count":3248,"chapter":"什么是自由？"},{"text":"只有中世纪的哲学家和神学家才会认为商品交换应当根据基于传统或物品固有价值的“正当的价格”来进行。在当下的市场经济中，价格应该由供求关系决定，“正当的价格”在商品交换中已不复存在。","count":2938,"chapter":"第一章 做正当之事"},{"text":"一个公正的社会应当努力推进其公民的德性吗？或者，法律是否应当在各种德性观念保持中立，以使公民们能够自由地为自己选择最佳的生活方式？","count":2465,"chapter":"福利、自由与德性"},{"text":"美国公众反对发放奖金和政府救助的真正原因并不在于他们奖励贪婪，而在于他们奖励失败。","count":2272,"chapter":"对政府救助的愤慨"},{"text":"我们有时候将道德推理看做是说服他人的一种途径，然而，它同时也是一种澄清我们自身的道德信念，了解自己相信什么、以及为何如此的途径。","count":1512,"chapter":"失控的电车"},{"text":"道德的最高原则就是使幸福最大化，使快乐总体上超过痛苦。对边沁而言，正当的行为就是任何使功利最大化的行为。他所说的“功利”，意指任何能够产生快乐或幸福，并阻止痛苦或苦难的东西。","count":1372,"chapter":"杰里米·边沁的功利主义"},{"text":"他总结道，公众所忍受的痛苦的总量，要超过那些被赶到救济院的乞丐们所感受到的不幸福。","count":1350,"chapter":"杰里米·边沁的功利主义"},{"text":"康德认为，每个人都值得尊重，这并不是因为我们拥有自身，而是因为我们是理性的存在，即能够进行推理；我们也是意志自由的存在，能够自由地行动和选择。","count":1343,"chapter":"使幸福最大化的问题"},{"text":"当我们他律地行动时，我们是为了某些外在于我们的给定的目的去行动，我们是自己所追求的各种目的的工具，而非目的的设定者。","count":1305,"chapter":"人与物"},{"text":"我们在自由市场中所做出的选择到底有多自由？是否有一些特定的德性和更高的善是无法在市场上受到尊重的，并且是金钱所不能购买的？","count":1296,"chapter":"怀孕外包"},{"text":"事物所是的方式，并不决定它们应当所是的方式。","count":1287,"chapter":"生活是公平的吗？"},{"text":"从做好事中获得乐趣，并不一定破坏其道德价值。康德告诉我们，重要的是，人们之所以做某件好事是因为它是正当之事——而无论这样做是否给我们带来快乐。","count":1207,"chapter":"何谓道德？寻求动机"},{"text":"企图利用别人的困难和痛苦发财是不对的。","count":1140,"chapter":"第一章 做正当之事"},{"text":"索维尔认为，冰块、桶装水、屋顶修理、发电机以及汽车旅馆的过高价格，有利于限制消费者使用这些物品，也有利于刺激别处的供应商给飓风受灾地区提供最急需的物品和服务。","count":1139,"chapter":"第一章 做正当之事"},{"text":"这也解释了为什么康德式的尊敬原则适合于普遍人权的学说。对于康德而言，公正要求我们支持所有人的人权，无论他们生活在哪里，以及我们与他们有多熟悉；仅仅因为他们是人类，具有理性能力 经书和一个启示。","count":180,"chapter":"马车和马"},{"text":"只有一个人的缺席引人注目——丹尼斯·斯拉蒙。他花了整个下午和美国临床肿瘤学会的乳腺肿瘤学家规划下一期的赫赛汀试验后，跳进自己破旧的尼桑小轿车，开车回家了。","count":180,"chapter":"药品、身体和证明"},{"text":"消毒和麻醉这两项技术的突破，让手术化蛹成蝶，从中世纪的桎梏中摆脱出来。","count":170,"chapter":"遥表同情"},{"text":"基因在功能上，就是把生物特性从一个细胞运载到另一个、从上一代传给下一代的遗传单位。在物理形态上，基因以染色体的形式存在于细胞内部。在化学成分上，基因是由脱氧核糖核酸组成的。","count":169,"chapter":"第五部分 正常自我的扭曲态"},{"text":"致癌基因的前体，也就是毕晓普和瓦缪斯所称的“原癌基因”是正常的细胞基因。化学物质或X射线引发的突变导致癌症，并不是因为向细胞里“插入”外源基因，而是因为激活了内源的原癌基因而达成的。","count":169,"chapter":"猎杀sarc"},{"text":"在癌症研究史上，第一次由一个核心分子逻辑把药物、药物靶向受体及癌细胞结合在了一起。","count":165,"chapter":"了解敌人"},{"text":"要在人群层面减少一种疾病或任何疾病的死亡率，已知的唯一办法就是预防。","count":165,"chapter":"统计癌症"}]},"651366":{"rating":856,"ratingCount":30665,"highlights":[{"text":"这在差序社会里可以不觉得是矛盾；因为在这种社会中，一切普遍的标准并不发生作用，一定要问清了，对象是谁，和自己是什么关系之后，才能决定拿出什么标准来。","chapter":"维系着私人的道德","color":0},{"text":"孔子的困难是在“团体”组合并不坚强的中国乡土社会中并不容易具体地指出一个笼罩性的道德观念来。仁这个观念只是逻辑上的总合，一切私人关系中道德要素的共相，但是因为在社会形态中综合私人关系的“团体”的缺乏具体性，只有个广被的“天下归仁”的天下，这个和“天下”相配的“仁”也不能比“天下”观念更为清晰。所以凡是要具体说明时，还得回到“孝悌忠信”那一类的道德要素。正等于要说明“天下”时，还得回到“父子，昆弟，朋友”这些具体的伦常关系。","chapter":"维系着私人的道德","color":0},{"text":"于是像格兰亨姆的公律，坏钱驱逐好钱一般，公德心就在这里被自私心驱走。","chapter":"差序格局","color":0},{"text":"所谓学就是在出生之后以一套人为的行为方式作模型，把本能的那一套方式加以改造的过程。学的方法是“习”。习是指反复地做，靠时间中的磨练，使一个人惯于一种新的做法。","chapter":"再论文字下乡","color":0},{"text":"语言只能在一个社群所有的相同经验的一层上发生。群体愈大，包括的人所有的经验愈繁杂，发生语言的一层共同基础也必然愈有限，于是语言也愈趋于简单化。这在语言史上是看得很清楚的。","chapter":"文字下乡","color":0},{"text":"文字所能传的情、达的意是不完全的。这不完全是出于“间接接触”的原因。我们所要传达的情意是和当时当地的外局相配合的。你用文字把当时当地的情意记了下来，如果在异时异地的圜局中去看，所会引起的反应很难尽合于当时当地的圜局中可能引起的反应。文字之成为传情达意的工具常有这个无可补救的缺陷。于是在利用文字时，我们要讲究文法，讲究艺术。文法和艺术就在减少文字的“走样”。","chapter":"文字下乡","color":0},{"text":"这过程是《论语》第一句里的“习”字。“学”是和陌生事物的最初接触，“习”是陶炼，“不亦悦乎”是描写熟悉之后的亲密感觉。在一个熟悉的社会中，我们会得到从心所欲而不逾规矩的自由。这和法律所保障的自由不同。规矩不是法律，规矩是“习”出来的礼俗。从俗即是从心。换一句话说，社会和个人在这里通了家。","chapter":"乡土本色","color":0}],"thoughts":[{"text":"说到这里，又想起来罗尔斯的「无知之幕」","quote":"这在差序社会里可以不觉得是矛盾；因为在这种社会中，一切普遍的标准并不发生作用，一定要问清了，对象是谁，和自己是什么关系之后，才能决定拿出什么标准来。","chapter":""},{"text":"所谓「读书千遍，其义自现」，从这个方面来讲，读者虽与作者可能在空间与
