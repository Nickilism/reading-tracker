      if (!searchQuery) return allBooks;
      const q = searchQuery.toLowerCase();
      return allBooks.filter(b =>
        (b.title && b.title.toLowerCase().includes(q)) ||
        (b.author && b.author.toLowerCase().includes(q))
      );
    }

    function updateFilterCounts(list) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const key = btn.dataset.filterKey;
        if (!key) return;
        if (key === 'all') {
          btn.textContent = `全部 (${list.length})`;
        } else if (filterMap[key]) {
          btn.textContent = btn.dataset.baseLabel + ` (${list.filter(filterMap[key]).length})`;
        }
      });
    }

    function updateStats(list) {
      const n = list.length;
      document.getElementById('total-books').textContent = n;
      document.getElementById('total-pages').textContent =
        list.reduce((s, b) => s + (parseInt(b.pages) || 0), 0).toLocaleString();
      if (n) {
        const days = list.map(b => {
          const s = new Date(b.start), f = new Date(b.finish);
          return (f - s) / (1000 * 60 * 60 * 24);
        }).sort((a, b) => a - b);
        const median = days.length % 2 === 0
          ? (days[days.length/2 - 1] + days[days.length/2]) / 2
          : days[Math.floor(days.length/2)];
        document.getElementById('avg-reading-time').textContent = median.toFixed(1);
      } else {
        document.getElementById('avg-reading-time').textContent = '0';
      }
      // Country badges
      const cc = {};
      list.forEach(b => { if (b.country) cc[b.country] = (cc[b.country] || 0) + 1; });
      const cg = document.getElementById('country-grid');
      cg.innerHTML = '';
      Object.entries(cc).sort((a, b) => b[1] - a[1]).forEach(([country, count]) => {
        const badge = document.createElement('div');
        badge.className = 'country-badge';
        badge.innerHTML = `<span class="country-flag">${COUNTRY_FLAGS[country] || ''}</span>${country}<span class="country-count">×${count}</span>`;
        cg.appendChild(badge);
      });
      updateFilterCounts(getSearchOnlyBooks());
    }

    function updateChart(list) {
      const counts = {};
      actualMonths.forEach(m => { counts[m] = 0; });
      list.forEach(b => { if (counts[b.month] !== undefined) counts[b.month]++; });
      monthChart.data.datasets[0].data = actualMonths.map(m => counts[m]);
      monthChart.options.scales.y.max = Math.max(Math.max(...actualMonths.map(m => counts[m])) + 1, 4);
      monthChart.update();
    }

    function applySearchAndFilter() {
      const filtered = getFilteredBooks();
      updateStats(filtered);
      updateChart(filtered);
      if (filtered.length > 0) {
        renderWall(filtered);
        renderBooklist(getSortedList(filtered));
        if (booklistOpen) {
          document.getElementById('booklist-content').classList.add('open');
          document.getElementById('booklist-toggle').classList.add('open');
        }
      } else {
        document.getElementById('cover-wall').innerHTML = '<div class="no-results">没有找到匹配的书籍</div>';
        document.getElementById('booklist-content').innerHTML = '<div class="no-results">没有找到匹配的书籍</div>';
        document.getElementById('wall-count').textContent = '0 本';
      }
    }

    // ===== 搜索框事件 =====
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');

    // 从 URL 预填
    const urlParams = new URLSearchParams(window.location.search);
    searchQuery = urlParams.get('search') || '';
    searchInput.value = searchQuery;
    if (searchQuery) searchClear.classList.add('visible');

    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        searchQuery = e.target.value.trim();
        const url = new URL(window.location);
        if (searchQuery) {
          url.searchParams.set('search', searchQuery);
        } else {
          url.searchParams.delete('search');
        }
        history.replaceState(null, '', url);
        searchClear.classList.toggle('visible', !!searchQuery);
        applySearchAndFilter();
      }, 150);
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      searchClear.classList.remove('visible');
      const url = new URL(window.location);
      url.searchParams.delete('search');
      history.replaceState(null, '', url);
      applySearchAndFilter();
      searchInput.focus();
    });

    // ===== 筛选按钮 =====
    const filtersEl = document.getElementById('filters');
    filterBtns.forEach(fb => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (fb.key === 'all' ? ' active' : '');
      btn.textContent = fb.label;
      btn.dataset.filterKey = fb.key;
      btn.dataset.baseLabel = fb.label.replace(/\s*\(\d+\)\s*$/, '');
      btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = fb.key;
        applySearchAndFilter();
      };
      filtersEl.appendChild(btn);
    });

    // ===== 渲染封面墙 =====
    function renderWall(list) {
      document.getElementById('wall-count').textContent = `${list.length} 本`;
      const wallEl = document.getElementById('cover-wall');
      wallEl.innerHTML = '';
      // 按 finish 时间升序排列
      const sorted = getSortedList(list);
      sorted.forEach(b => {
        const item = document.createElement('div');
        item.className = 'cover-item';
        item.innerHTML = `
          <div class="cover-link" onclick="openBookPanel(${allBooks.indexOf(b)})" title="${b.title}">
            <div class="cover-img-wrap">
              <img src="${b.cover}" alt="${b.title}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 150%22><rect fill=%22%23f6f5f4%22 width=%22100%22 height=%22150%22/><text x=%2250%22 y=%2280%22 text-anchor=%22middle%22 fill=%22%23a39e98%22 font-size=%2210%22>${b.title}</text></svg>'">
              <div class="cover-overlay">
                <div class="cover-title">${b.title}</div>
                <div class="cover-author">${b.author}</div>
                <div class="cover-rating">${stars(b.rating)} ${b.rating}</div>
              </div>
            </div>
          </div>`;
        wallEl.appendChild(item);
      });
    }

    // ===== 渲染书单列表 =====
    function renderBooklist(list) {
      const content = document.getElementById('booklist-content');
      content.innerHTML = list.map((b, idx) => {
        const m = monthMeta[b.month];
        let reviewSection = '';
        if (b.review) {
          const needsTruncation = b.review.length > 60;
          const truncatedText = needsTruncation ? b.review.substring(0, 60) + '...' : b.review;
          reviewSection = `
            <div class="book-review" id="review-${idx}" data-full="${encodeURIComponent(b.review)}" data-truncated="${needsTruncation}">
              ${truncatedText.replace(/\n/g, '<br>')}
            </div>
            ${needsTruncation ? `<button class="review-more-btn" onclick="toggleReview(${idx}, this)">展开</button>` : ''}
          `;
        }
        return `<div class="book-row">
          <div class="book-info">
            <div class="book-dates">${b.start}<br>${b.finish}</div>
            <div class="book-title"><a href="${b.doubanLink}" target="_blank" style="color:inherit;text-decoration:none;">${b.title}</a></div>
            <div class="book-author">${b.author}</div>
            <div class="book-meta">
              <span class="month-tag" style="background:${m.bg};color:${m.color}">${m.label}</span>
              <span class="star-rating">${stars(b.rating)}</span>
              <span class="rating-num">${b.rating}</span>
              ${b.pages ? `<span class="pages-tag">${b.pages}页</span>` : ''}
            </div>
            ${reviewSection}
          </div>
        </div>`;
      }).join('');
    }

    function toggleReview(idx, btn) {
      const review = document.getElementById(`review-${idx}`);
      const isCollapsed = btn.textContent === '展开';
      const fullText = decodeURIComponent(review.dataset.full);

      if (isCollapsed) {
        review.innerHTML = fullText.replace(/\n/g, '<br>');
        btn.textContent = '收起';
      } else {
        review.innerHTML = fullText.substring(0, 60) + '...';
        btn.textContent = '展开';
      }
    }

    // ===== 展开/收起书单 =====
    function toggleBooklist() {
      const toggle = document.getElementById('booklist-toggle');
      const content = document.getElementById('booklist-content');
      booklistOpen = !booklistOpen;
      toggle.classList.toggle('open', booklistOpen);
      content.classList.toggle('open', booklistOpen);
    }

    // ===== 排序函数 =====
    function getSortedList(list) {
      const sorted = [...list];
      const dir = currentSortDir === 'desc' ? -1 : 1;
      switch (currentSortField) {
        case 'finish': return sorted.sort((a, b) => a.finish.localeCompare(b.finish) * dir);
        case 'rating': return sorted.sort((a, b) => (a.rating - b.rating) * dir);
        case 'pages': return sorted.sort((a, b) => ((parseInt(a.pages) || 0) - (parseInt(b.pages) || 0)) * dir);
        default: return sorted;
      }
    }

    // ===== 排序按钮事件 =====
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const field = btn.dataset.sort;
        if (currentSortField === field) {
          // 同字段点击 → 切换方向
          currentSortDir = currentSortDir === 'desc' ? 'asc' : 'desc';
        } else {
          // 不同字段 → 切换到该字段，默认降序
          currentSortField = field;
          currentSortDir = 'desc';
        }
        // 更新按钮文字
        const fieldLabels = { finish: '时间', rating: '评分', pages: '页数' };
        document.querySelectorAll('.sort-btn').forEach(b => {
          const f = b.dataset.sort;
          const a = (currentSortField === f) ? currentSortDir : 'desc';
          b.textContent = fieldLabels[f] + (a === 'desc' ? ' ↓' : ' ↑');
          b.classList.toggle('active', currentSortField === f);
        });
        applySearchAndFilter();
      });
    });

    // ===== 图表 =====
    const maxMonthlyCount = Math.max(...actualMonths.map(m => monthCounts[m]));
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const chartTextColor = isDark ? '#9e9a96' : '#615d59';
    const chartGridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.05)';
    const monthChart = new Chart(document.getElementById('monthChart'), {
      type: 'bar',
      data: {
        labels: monthLabels,
        datasets: [{
          label: '本数',
          data: actualMonths.map(m => monthCounts[m]),
          backgroundColor: actualMonths.map(m => MONTH_COLORS[m - 1].bg),
          borderColor: actualMonths.map(m => MONTH_COLORS[m - 1].color),
          borderWidth: 1,
          borderRadius: 6,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
        },
        scales: {
          y: {
            beginAtZero: true,
            max: Math.max(maxMonthlyCount + 1, 4),
            ticks: { stepSize: 1, font: { family: 'Inter', size: 11 }, color: chartTextColor },
            grid: { color: chartGridColor },
            border: { display: false }
          },
          x: {
            ticks: { font: { family: 'Inter', size: 12 }, color: chartTextColor },
            grid: { display: false },
            border: { display: false }
          }
        }
      },
      plugins: [{
        id: 'monthDataLabels',
        afterDatasetsDraw(chart) {
          const { ctx, data, scales } = chart;
          ctx.save();
          ctx.font = '600 11px Inter';
          ctx.fillStyle = chartTextColor;
          ctx.textAlign = 'center';
          data.datasets[0].data.forEach((value, index) => {
            if (value > 0) {
              const x = scales.x.getPixelForValue(index);
              const y = scales.y.getPixelForValue(value) - 6;
              ctx.fillText(value, x, y);
            }
          });
          ctx.restore();
        }
      }]
    });

    // ===== Book Notes Panel =====
    const panelOverlay = document.getElementById('panelOverlay');
    const bookPanel = document.getElementById('bookPanel');
    const panelClose = document.getElementById('panelClose');
    const panelHeader = document.getElementById('panelHeader');
    const panelBody = document.getElementById('panelBody');
    const panelDragBar = document.getElementById('panelDragBar');

    function openBookPanel(bookIndex) {
      const b = allBooks[bookIndex];
      if (!b) return;
      const weread = b.wereadId ? wereadData[b.wereadId] : null;
      renderPanelContent(b, weread);
      // 补偿滚动条宽度，防止背景抖动
      const scrollbarW = window.innerWidth - document.documentElement.clientWidth;
      document.body.style.overflow = 'hidden';
      document.body.style.paddingRight = scrollbarW + 'px';
      panelOverlay.classList.add('active');
      bookPanel.classList.add('active');
    }

    function closeBookPanel() {
      panelOverlay.classList.remove('active');
      bookPanel.classList.remove('active');
      document.body.style.overflow = '';
      document.body.style.paddingRight = '';
    }

    panelOverlay.addEventListener('click', closeBookPanel);
    panelClose.addEventListener('click', closeBookPanel);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && bookPanel.classList.contains('active')) {
        closeBookPanel();
      }
    });

    // Mobile drag-to-close
    let dragStartY = 0;
    let dragging = false;
    panelDragBar.addEventListener('touchstart', (e) => {
      dragStartY = e.touches[0].clientY;
      dragging = true;
    });
    document.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      const dy = e.touches[0].clientY - dragStartY;
      if (dy > 0) {
        bookPanel.style.transform = 'translateY(' + dy + 'px)';
      }
    });
    document.addEventListener('touchend', (e) => {
      if (!dragging) return;
      dragging = false;
      const dy = e.changedTouches[0].clientY - dragStartY;
      bookPanel.style.transform = '';
      if (dy > 100) {
        closeBookPanel();
      }
    });

    function renderPanelContent(book, weread) {
      const coverHtml = book.doubanLink
        ? '<a href="' + book.doubanLink + '" target="_blank" style="display:block;flex-shrink:0;"><img class="panel-cover" src="' + book.cover + '" alt="' + book.title + '" onerror="this.style.display=\'none\'"></a>'
        : '<img class="panel-cover" src="' + book.cover + '" alt="' + book.title + '" onerror="this.style.display=\'none\'">';
      panelHeader.innerHTML =
        coverHtml +
        '<div class="panel-book-info">' +
          '<div class="panel-title">' + book.title + '</div>' +
          '<div class="panel-author">' + book.author + '</div>' +
          (weread && weread.rating
            ? '<div class="panel-rating">微信读书推荐值 <span class="panel-rating-score">' +
              (weread.rating / 10).toFixed(1) + '%</span> · ' +
              formatRatingCount(weread.ratingCount) + '人评价</div>'
            : '')
        + '</div>';

      let html = '';

      // 书籍简介（可折叠）
      if (book.summary) {
        const needsCollapse = book.summary.length > 150;
        html += '<div class="panel-section">';
        html += '<div class="panel-summary-toggle" onclick="togglePanelSummary(this)">';
        html += '<span class="panel-section-title" style="margin-bottom:0">书籍简介</span>';
        html += '<span class="panel-summary-arrow">▼</span>';
        html += '</div>';
        html += '<div class="panel-summary-text' + (needsCollapse ? ' collapsed' : '') + '" id="panelSummaryText">' +
          book.summary.replace(/\n/g, '<br>') + '</div>';
        html += '</div>';
      }

      // 全书点评
      if (book.review) {
        html += '<div class="panel-section">';
        html += '<div class="panel-section-title">全书点评</div>';
        html += '<div class="panel-review-card">';
        const needsCollapse = book.review.length > 200;
        html += '<div class="panel-review-text' + (needsCollapse ? ' collapsed' : '') + '" id="panelReviewText">' +
          book.review.replace(/\n/g, '<br>') + '</div>';
        if (needsCollapse) {
          html += '<button class="panel-review-toggle" onclick="togglePanelReview(this)">展开全文</button>';
        }
        html += '</div>';
        html += '</div>';
      }

      if (!weread) {
        if (!book.review && !book.summary) {
          html += '<div class="panel-empty">暂无微信读书笔记</div>';
        }
        panelBody.innerHTML = html;
        return;
      }

      // Tabs
      const hlCount = weread.highlights ? weread.highlights.length : 0;
      const thCount = weread.thoughts ? weread.thoughts.length : 0;
      const popCount = weread.popularHighlights ? weread.popularHighlights.length : 0;

      html += '<div class="panel-tabs">';
      html += '<button class="panel-tab active" data-tab="highlights">划线 (' + hlCount + ')</button>';
      html += '<button class="panel-tab" data-tab="thoughts">想法 (' + thCount + ')</button>';
      html += '<button class="panel-tab" data-tab="popular">热门划线 (' + popCount + ')</button>';
      html += '</div>';

      // Highlights tab
      html += '<div class="panel-tab-content active" data-tab-content="highlights">';
      if (hlCount > 0) {
        weread.highlights.forEach(function(h) {
          html += '<div class="panel-note-item">';
          html += '<div class="panel-note-text">' + escapeHtml(h.text) + '</div>';
          if (h.chapter) html += '<div class="panel-note-chapter">——' + escapeHtml(h.chapter) + '</div>';
          html += '</div>';
        });
      } else {
        html += '<div class="panel-empty">暂无划线</div>';
      }
      html += '</div>';

      // Thoughts tab
      html += '<div class="panel-tab-content" data-tab-content="thoughts">';
      if (thCount > 0) {
        weread.thoughts.forEach(function(t) {
          html += '<div class="panel-note-item">';
          if (t.quote) {
            html += '<div class="panel-quote">' + escapeHtml(t.quote) + '</div>';
          }
          html += '<div class="panel-thought-content">' + escapeHtml(t.text) + '</div>';
          if (t.chapter) html += '<div class="panel-note-chapter">——' + escapeHtml(t.chapter) + '</div>';
          html += '</div>';
        });
      } else {
        html += '<div class="panel-empty">暂无想法</div>';
      }
      html += '</div>';

      // Popular highlights tab
      html += '<div class="panel-tab-content" data-tab-content="popular">';
      if (popCount > 0) {
        weread.popularHighlights.forEach(function(p) {
          html += '<div class="panel-note-item">';
          html += '<div class="panel-note-text">' + escapeHtml(p.text) + '</div>';
          html += '<div class="panel-note-count">' + p.count + '人划线</div>';
          if (p.chapter) html += '<div class="panel-note-chapter">——' + escapeHtml(p.chapter) + '</div>';
          html += '</div>';
        });
      } else {
        html += '<div class="panel-empty">暂无热门划线</div>';
      }
      html += '</div>';

      panelBody.innerHTML = html;

      // Tab click handlers
      panelBody.querySelectorAll('.panel-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
          panelBody.querySelectorAll('.panel-tab').forEach(function(t) { t.classList.remove('active'); });
          panelBody.querySelectorAll('.panel-tab-content').forEach(function(c) { c.classList.remove('active'); });
          tab.classList.add('active');
          panelBody.querySelector('[data-tab-content="' + tab.dataset.tab + '"]').classList.add('active');
          // 切换 tab 后重置滚动位置，防止抖动
          panelBody.scrollTop = 0;
        });
      });
    }

    function togglePanelReview(btn) {
      var textEl = document.getElementById('panelReviewText');
      if (textEl.classList.contains('collapsed')) {
        textEl.classList.remove('collapsed');
        btn.textContent = '收起';
      } else {
        textEl.classList.add('collapsed');
        btn.textContent = '展开全文';
      }
    }

    function togglePanelSummary(toggleEl) {
      var textEl = document.getElementById('panelSummaryText');
      var arrow = toggleEl.querySelector('.panel-summary-arrow');
      if (textEl.classList.contains('collapsed')) {
        textEl.classList.remove('collapsed');
        arrow.textContent = '▲';
      } else {
        textEl.classList.add('collapsed');
        arrow.textContent = '▼';
      }
    }

    function formatRatingCount(count) {
      if (count >= 10000) return (count / 10000).toFixed(1) + '万';
      if (count >= 1000) return (count / 1000).toFixed(1) + 'k';
      return String(count);
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ===== 初始渲染 =====
    applySearchAndFilter();
  </script>
</body>
</html>
