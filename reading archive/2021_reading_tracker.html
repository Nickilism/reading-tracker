教育当以人格教育为主，知识其次。孩子品德高尚，为人正直；学问欠缺一些没有关系。","count":3465,"chapter":"出版说明"},{"text":"人没有苦闷，没有矛盾，就不会进步。有矛盾才会逼你解决矛盾，解决一次矛盾即往前迈进一步。到晚年矛盾减少，即是生命将要告终的表现。没有矛盾的一片恬静只是一个崇高的理想，真正实现的话并不是一个好现象。","count":3145,"chapter":"一九六一年"},{"text":"坚持真理的时候必须注意讲话的方式、态度、语气、声调。要做到越有理由，态度越缓和，声音越柔和。坚持真理原是一件艰巨的斗争，也是教育工作，需要好的方法、方式、手段，还有是耐心。万万不能动火，令人误会。","count":2925,"chapter":"一九五六年"},{"text":"园丁以血泪灌溉出来的花果迟早得送到人间去让别人享受，可是在离别的关头怎么免得了割舍不得的情绪呢？","count":2730,"chapter":"一九五四年"},{"text":"一个人孤独了，思想集中，所发的感想都是真情实意。","count":2628,"chapter":"一九五四年"},{"text":"孩子，一个人往往对有在手头的东西（或是机会，或是环境，或是任何可贵的东西）不知珍惜，直到要失去了的时候再去后悔！这是人之常情，但我们不能因为是人之常情而宽恕我们自己的这种愚蠢，不想法去改正。","count":2562,"chapter":"一九五五年"},{"text":"斗争的方式当然不是紧张，而是冲淡，而是多想想人生问题，宇宙问题，把个人看得渺小一些，那么自然会减少患得患失之心，结果身心反而舒泰，工作反而顺利！","count":2533,"chapter":"一九五四年"},{"text":"赤子之心这句话，我也一直记住的。赤子便是不知道孤独的。赤子孤独了，会创造一个世界，创造许多心灵的朋友！永远保持赤子之心，到老也不会落伍，永远能够与普天下的赤子之心相接相契相抱！","count":2509,"chapter":"一九五五年"},{"text":"孩子，我真恨不得天天在你旁边，做个监护的好天使，随时勉励你，安慰你，劝告你，帮你铺平将来的路，准备将来的学业和人格。","count":2460,"chapter":"一九五四年"},{"text":"年纪大的人终是往更远的前途看，许多事你们一时觉得我看得不对，日子久了，现实却给你证明我并没大错。","count":2394,"chapter":"一九五四年"},{"text":"一般青年都感到求知欲极旺，根底太差，一下子补又补不起来的苦闷。","count":2364,"chapter":"一九五四年"},{"text":"我们历来问你讨家信，就像讨情一般。你该了解你爸爸的脾气，别为了写信的事叫他多受屈辱，好不好？","count":2295,"chapter":"一九五五年"}]},"849522":{"rating":844,"ratingCount":868,"highlights":[{"text":"虽说我们可能不赞同这类人的看法，但我们要记住，自由既需要有人批评也需要有人支持。毕竟，正如在歌德的《浮士德》中，批评上帝之道的靡菲斯特并非完全没有得到答复。","chapter":"迈斯特","color":0},{"text":"在此之后，人们总想看到事物的阴暗面，在我们这个时代，心理分析中令人不寒而栗的方面……应归咎于人类对阴暗面的这种强烈渴望——阴暗面是比较尖刻、比较实际、比较真实的，它比过于乐观、过于机械、过于图式化的信仰更有效地满足人们的需要","chapter":"迈斯特","color":0},{"text":"伏尔泰是迈斯特的死对头，迈斯特谈到这个可怕魔鬼的狰狞笑容时，极为愤恨，圣西门却说，也许未来的社会就在于迈斯特与伏尔泰的结合。","chapter":"迈斯特","color":0},{"text":"人只有受到权威的恐怖约束才能获救。在他们的生活中，必须时时刻刻向他们提起位于创造核心的那个可怕的不解之谜；他们必须通过不断受难来赎罪；处处让他们意识到自己的愚蠢、恶意、无助，以此来让他们谦卑。战争、酷刑、苦难是人类不可避免的命运。","chapter":"迈斯特","color":0},{"text":"要想让人们在社会中生活，唯一的办法是防止他们产生疑问，阻止他们质疑的唯一办法是使用恐怖。假如事物的本质模糊不可测定，那么人们只有服从它。一旦人们参透事物本质，一旦它是理性的东西，一旦人们能够理解它，他们就不会畏惧它。他们不会敬畏它，不会尊重它，所以它就会垮掉。因此，我们需要的是模糊而无法理解的东西。","chapter":"迈斯特","color":0},{"text":"迈斯特说，在当今时代，信仰完全空洞的言辞和空洞的公式造成的结果是，“社会的两只锚——宗教和奴隶制——已经同时失效，社会这艘船让风暴给卷走了，失事遇难”。","chapter":"迈斯特","color":0},{"text":"形而上学的神眼所看到的、被称做权利的抽象实体，要么来自人类的权威，要么来自神的权威。至于著名的抽象物——人，大革命以它的名义发动，最残酷的大屠杀以它的名义组织，许多无辜者以它的名义惨遭屠杀：“在我一生中，”迈斯特说，“我见过法国人、意大利人、俄国人……我也知道，亏了孟德斯鸠，那个人可能是波斯人。但是，至于说‘人’，我宣布我在生活中从未见过他：如果他存在的话，他也不为我所知。”","chapter":"迈斯特","color":0},{"text":"他认为，要是不给人类戴上镣铐而且用最严格的纪律来约束他们，他们就很可能因为自相残杀而毁灭。","chapter":"迈斯特","color":0},{"text":"没有一件东西能够永世长存，除非这件事物不是理性建立的，因为理性建立什么，就会毁掉什么。","chapter":"迈斯特","color":0},{"text":"迈斯特主要反对这种臆断：理性对事物有支配作用。","chapter":"迈斯特","color":0},{"text":"在迈斯特和托尔斯泰看来，生活本身就像这种战役，任何从理性的角度描写它的企图，都是对本质上极端非理性、极端凌乱而且不遵循任何有迹可寻的规律或规则的一种可怕的歪曲、梳拢、整理、排序的过程。","chapter":"迈斯特","color":0},{"text":"战役的输赢在于心理，战役的输赢在于信仰行为。","chapter":"迈斯特","color":0},{"text":"迈斯特说，这是因为，战争本身在某种意义上是神圣的，因为它是世界的规律。这是迈斯特的一个核心学说：理性主义观念并没有发生作用。如果你真的想知道人们的行为何以表现出这个样子，你得到非理性领域里寻找答案。这是一种信奉彼岸世界而不信奉此岸世界的神秘主义。","chapter":"迈斯特","color":0},{"text":"在有生命的物质和自然界的广大领域，一种明目张胆的暴力占据着统治地位，这是一种因袭习惯的狂暴，它武装了所有的生灵，直到它们走向共同的命运：死亡。一旦你离开无生命的王国，你就会发现，暴力死亡的旨令已经铭刻在生命的边界。","chapter":"迈斯特","color":0},{"text":"在原则上，自然的具体作用，可以从一套公理中推导出来，这套公理类似于几何理论中的公理，或者物理和化学理论中的公理，只要你知道这些公理的话。","chapter":"迈斯特","color":0},{"text":"他们的共同之处在于，他们都相信，在本质上，人，即便不是善的，但无论如何也不会是恶的，人有仁慈的潜能，每一个人，在不受骗子或傻子迷惑的时候，最善于鉴别自己的利益和价值；在总体上，每一个人都倾向于奉行自己的理解力所提供的行为准则。","chapter":"迈斯特","color":0},{"text":"原因是，虽然迈斯特说的可能是过去的语言，可内容却是当前反民主言论的实质；与他进步的同时代人相比，他真正是极端现代的，他的出生并没有落后于他的时代。","chapter":"迈斯特","color":0},{"text":"往好里说，他是一个悲剧性的、有教养的人物，他否定和反对自己不合时宜诞生其中的那个诡诈和庸俗的世界；往坏里说，他是一个顽固派，自欺欺人、死硬到底，他肆意咒骂非凡的新时代，对于新时代的好处，因为太固执而看不到，因为太麻木而感受不到。","chapter":"迈斯特","color":0},{"text":"整个观念的核心是科学或科学主义——它笃信，除非在严格的纪律之下，由那些理解什么是构成世界的物质、人类和非人类的人去做事情，否则就会导致混乱和挫折。只有精英人物才能做到这一点。精英人物只能奉行双重道德标准，一套为自己，一套为别人。自由、民主、自由放任的个体主义、封建主义——所有这些没有多大意义的形而上的观念、口号、词语，必须撤出，给某些更明晰、更大胆、更新的东西让路：大商业、国家资本主义、科学组织、世界和平组织、世界议会、世界联邦。这些都是圣西门主义性质的。","chapter":"圣西门","color":0},{"text":"从这一点出发，他发展出这样一种观念，必须将历史理解成人类为满足各种需要而进行的一种进化过程，正因为这个原因，需要不同，满足也就不同。","chapter":"圣西门","color":0},{"text":"不过，他认为，这些观念产生的独立性影响，要比马克思主义者赋予它们的多得多，因此，他认为，发明，尤其是阶级，既是思想的产物，也是科技进化本身的产物。","chapter":"圣西门","color":0},{"text":"为了改良人类，人们必须去了解，去学习，去研究一切科学和艺术，不仅如此，人们必须饱尝生活经验的甘苦，人们必须理解美德和罪恶的真正本质，为了做到这一步，人们必须拥有尽可能多的生活经验。人们必须尽可能地接触生活。","chapter":"圣西门","color":0},{"text":"他是第一个（不是带着那种冷漠态度，而带着极大的狂热和热情，他天性如此）发明宗教替代物的人，所谓宗教替代物，就是那种世俗化的、人性化的、消除神学色彩的基督教的变种","chapter":"圣西门","color":0},{"text":"还有，是圣西门而不是别人发明了精英治理社会这种观念，他采用了双重道德标准。","chapter":"圣西门","color":0},{"text":"圣西门最早在现代意义上将阶级界定为经济社会实体，阶级取决于科技的进步——机器的进步，人类获取、分配和消费产品的方式的进步。简言之，他是历史上严肃关注经济因素的第一人。","chapter":"圣西门","color":0},{"text":"黑格尔式的自由完全是由征服或占有阻挠你的事物构成的，直到你征服和占有了一切，你就是世界的主人。在你做到这一步之前，你最好把你不得已而为之的原因理解成义务，不要去抗议、哀悼和抱怨压在你身上的那些可怕的负担，而要满心欢喜地欢迎它们。不过满心欢喜地欢迎负担可不是自由。","chapter":"黑格尔","color":0},{"text":"黑格尔最有原创性的成就或许在于，他发明了思想史这一观念：因为，在他之前肯定没有人写过或构思过哲学或其他思想的历史，这种历史不是以松散的、先后承递的形式出现的——先讲一位大哲及其思想体系，再讲另一位大哲及其思想体系——它表现的形式是，思想观念从一代思想家到另一代思想家的持续性发展，将思想观念的发展与一个社会或文化的经济或社会或其他变化联系在一起。","chapter":"黑格尔","color":0},{"text":"当我阅读法国大革命或文艺复兴的史书时，我的兴趣点很少放在人类文明的这些伟大事件与巴比伦或阿兹特克文明的共同之处，这是社会学家的兴趣所在，它在本质上的确可能具有启发意义，但历史学家的职责在于传达差异而非相似，在于描绘一幅有关一系列独特的、绝对特殊的事件和人物的画面——是一幅画面而不是一个X光片。","chapter":"黑格尔","color":0},{"text":"说到底，一种价值观，如果你想让它是现实的，它就必须是客观的，“客观的”就意味着它是世界（理性、世界模式）的意图，世界在不可阻挡的发展过程中下一步所提供的，这是画轴逐渐展开的过程，是不可避免的行进过程，是黑格尔所说的“上帝穿越宇宙的远征”，在他看来，它最终是国家的活动。","chapter":"黑格尔","color":0},{"text":"通过一场革命、一场战争、通过改变人类思想和行动的大英雄出世来改造那个过程，先前时代的价值观就会自动被取代，一代人认为是可憎的东西，在下一代人看来却是公正的。因此，且让我们去等待，因为只有历史所实现的东西才是有价值的。","chapter":"黑格尔","color":0},{"text":"在黑格尔看来，理解历史实际上就是从总体上理解事物的本质，这就是它自动与它们的模式进行的有意识的自我认同，所以说，自由与理性是一回事；有理性就是去理解；理解就是吸收到某人的自身存在之中；不自由就意味着受到外部障碍的抵制。","chapter":"黑格尔","color":0},{"text":"简言之，有一个庞大的、单一的、无所不包的理性，他称其为精神，精神的发展就是所发生的一切。它就是精神的发展，因为不存在别的什么东西；它是一种自我发展，因为没有什么别的东西能够发展它。如果我们理解它，我们就是它想利用的工具。如果我们不理解它，我们就会奋力反对它而且会失败。","chapter":"黑格尔","color":0},{"text":"因为凡事都像你想像的那样进行，没有什么东西阻碍你，这是绝对的自由，唯一享有绝对自由的东西是绝对的精神——万事万物身上都有这种绝对的精神。世界在总体上完全是自由的，如果我们将自己等同于世界的理性原则，那么我们就是自由的。","chapter":"黑格尔","color":0},{"text":"如果我想在历史上发挥作用，我就绝不能违反支配人类制度的规律。这种顺从不是我在无可奈何情况下有意识地采取的一种默认态度，虽说我宁愿自由。理解事物不可能是别的样子，就是不想让它们变成别的样子，因为，理解事物就是理解它们存在的理由。","chapter":"黑格尔","color":0},{"text":"在生活中获得我正在追求的东西之外，还有什么东西称得上自由？只有在不违反支配这个世界规律的情况下，我才能做到这一点。","chapter":"黑格尔","color":0},{"text":"可以说，就自然的目的、自然的意图而言，你与自然“同一”。这种统一，这种与宇宙同一的现象，一直是所有伟大的神秘主义者和形而上学家所追求的目标。黑格尔以生硬的、晦涩的和偶尔庄重的语言阐述了这种观念。他从中得出了那有名的悖论：自由就是对必然的认可。","chapter":"黑格尔","color":0},{"text":"这种吸收观念在黑格尔那里非常重要，因为他对规律的看���不同于科学和常识对规律的看法；科学和常识都认为，规律是对已发生事件的概括，而黑格尔则把规律当成了规则、模式、形式，类似于算术、建筑或音乐所遵循的规则或逻辑。","chapter":"黑格尔","color":0},{"text":"除非由后一步骤完成前一步骤，否则先前的步骤就“无法理解”，这就像追溯地毯图案的由来那样。","chapter":"黑格尔","color":0},{"text":"接下来整个过程重新开始；新的创造被它自身内在的反对力量蚕食，直到这种紧张关系再次发展到顶峰，产生下一次飞跃。在黑格尔看来，这就是历史，这就是对断裂（discontinuities）和悲剧的解释。","chapter":"黑格尔","color":0},{"text":"这里出现了一个更为深入的问题，“精神到底是怎样发挥作用的？其机制是什么？其模式是什么？”黑格尔认为他已经发现了答案。他说，精神根据他所说的辩证法发挥作用。在他看来，只有从思想或艺术创造角度才能理解辩证法；他将它应用于宇宙，因为，他认为，宇宙之中存在的是一种思想行动，或是一种自我创造的行动，它是自我创造，因为不存在别的东西。","chapter":"黑格尔","color":0},{"text":"除非我们将它们与一个有目的性的系统联系起来，除非它们合乎一种模式，否则它们无从解释。","chapter":"黑格尔","color":0},{"text":"人类历史是我们通过感觉、思考、以某种方式活动而创造出来的，通过创造历史，我们能够理解历史，这就是为什么，理解历史是一种“内部”观点，而我们理解桌子和椅子则是一种“外部”观点。￼","chapter":"黑格尔","color":0},{"text":"因此，历史只不过是人类经验的记录。","chapter":"黑格尔","color":0},{"text":"他系统地阐述了这个观点，宇宙实际上是世界精神的自我发展。世界精神类似于个体的精神，只不过它涵盖和等同于整个宇宙。如果你能够将宇宙想象成一种有灵魂的实体，在具有灵魂方面，它大致与拥有灵魂、意图、目的、意志的个体相同，只不过它的意义无疑要更大一些，那么，你就可以问“事情为什么会这样发生？”它们这样发生，乃是因为，它们是一个具有目的、意图和方向的庞大精神运动的一部分，就像人类具有目的、意图和方向一样。我们是怎么认识那个方向的呢？因为我们是它的一部分。因为每一个个体都是一个无限整体的有限元素，而无限的整体，就集体而言，具有某种目的和某种方向性。","chapter":"黑格尔","color":0},{"text":"这种家族面貌，对其内容进行分析，我们称其为历史的解释。","chapter":"黑格尔","color":0},{"text":"这些人具有特定的看法，具有某些价值观，他们感觉自己对于某些体验很熟悉，但觉得其他体验完全陌生。这就是对“为什么”这个问题的答案，它完全不同于科学提供的答案，这就是维柯和赫尔德所处理的问题。这正是黑格尔试图概括的，他的看法是，宇宙所有的问题都可以根据“为什么”这个“比较深刻的”意义来回答。","chapter":"黑格尔","color":0},{"text":"这就是笛卡尔说历史不是一门科学的原因——因为不存在适用于历史的普遍规律。整个历史过程纷繁多变，差异远远多于相似，将这么不稳定的题材集合起来，是做不到的，这些题材鲜为人知，里面很难说有重复现象，几乎不存在能够用少数有效的公式来解释的一致性。","chapter":"黑格尔","color":0},{"text":"黑格尔的追随者们宣称，先前他们从外部看待事物，而现在他们从内部看待事物。他们先前看到的只是外表、外壳，而现在他们看到的是内在本质、内在目的；事物趋向的本质性目的。他们具有一种对立于“外部”视域的“内部”视域，这种内外差异是理解整个黑格尔体系的关键。","chapter":"黑格尔","color":0},{"text":"实际上我们已经与英法的自由观念相距甚远，英法的自由观念允许每一个人都可以有他的圈子，在那个小小的、但必不可少的空间内，他可以为所欲为，作恶或者行善，为了选择而选择，在这个空间里，选择的价值本身被认为是神圣的。","chapter":"费希特","color":0},{"text":"康德尊重人性以及它的神圣权利，费希特把自由等同于自我肯定，等同于将你的意志强加给他人，等同于消除你愿望的障碍，最后等同于一个获胜的民族阔步前行去实现它的命运，以回应超验理性向它提出的内在要求，在超验理性面前，所有物质性的东西一定瓦解。","chapter":"费希特","color":0},{"text":"思想先于行动，正如闪电先于雷鸣。德国的雷鸣是德国式的，它不是匆忙而至，它在低沉的轰隆声中缓慢到来；但它最终会到来，一旦你听到它轰轰的响声，在世界历史上还从未有什么东西这样响过，你就应该知道，德国的雷电已经击中目标。这个声音一响，老鹰的尸体就会从天而降，最遥远的非洲沙漠里的狮子……","chapter":"费希特","color":0},{"text":"从强调理性转移到强调意志，产生了如下自由观念：它不是不干涉的观念、不是允许每一个人自由选择的观念，而是自我表现的观念，将你自身强加于介质之上的观念，清除你自己的障碍的观念。只有通过征服障碍才能清除障碍：在数学中，通过理解；在物质生活中，通过攫取；在政治中，通过征服。这就是以下观念的核心，这种观念认为，一个自由的民族是一个获胜的民族，自由即是力量，征服和自由是一回事儿。","chapter":"费希特","color":0},{"text":"这是一种神学性质的学说，显然，费希特在这种意义上是一名神学家，黑格尔也是，假如说他们是世俗思想家，这绝非善意。","chapter":"费希特","color":0},{"text":"费希特从孤立的个体观念出发，孤立的个体实现自然或暴君无法企及的某种内在的理想，费希特逐渐采取了这样一种思想，即，个体本身什么也不是，人离开社会什么也不是，人离开群体什么也不是，人几乎不存在。他开始怀疑，个体不存在，他一定消失了。只有群体（Gattung）存在，只有它才是真实的。","chapter":"费希特","color":0},{"text":"自我是一种精神，但它不是孤立的精神，正是在这里，费希特开始走上引向这类独特结论的道路，这条道路导致如下观念：自我根本不是个体的人类，个体与社会有关，或许自我，即人类的自我，的确不仅是历史和传统的产物，而且通过柏克所说的千丝万缕、牢不可破的精神环节与其他人密切联系起来，自我只是作为整体模式的组成部分而存在，它是这个整体模式的构成元素。如此一来，假如说自我是在某年出生、过着某种生活、处于某种物质环境之下、在某一日期死于某地的一个经验性的个体，这是欺人之谈。费希特开始倾向一种神学式的自我观；他说，真正的、自由的自我不是包裹在身体之内而且处在一定的时间和地点之内的经验性自我，*它是所有人共有的一个自我，它是一个超级自我，它是一个较大的、神圣的自我，费希特现在逐渐开始把它与自然、上帝、历史、民族相等同。￼","chapter":"费希特","color":0},{"text":"我想做事而没有人能够阻止我，只有在这时候，我才是自由的，而且只有当发挥作用的是我的内在自我，而我不受别的东西影响的时候，我才这么做*。","chapter":"费希特","color":0},{"text":"拿破仑把自己的个性投向整个欧洲的版图，他塑造了法国人、德国人、意大利人、俄国人的思想，就像作曲家调节音响、画家调和颜色一样——拿破仑是道德的最高表现￼。因为他在表现自己的个性，他在坚持自己的主张，他正在实施那种不断地驱动自己的内在理想。","chapter":"费希特","color":0},{"text":"如果唯一重要的是动机，如果一个人只需为他个人的人格正直负责，即，他应当诚实不欺，不管怎样他都不应当去欺诈，无论外部世界（经济和政治领域，易受外界因素干扰的、空间中物质性物体所在领域）发生什么事情，这些事情都不应侵犯道德活动的领地。事实上，这就是费希特的早期想法。￼","chapter":"费希特","color":0},{"text":"自律，即真正的自由，向我本人发布命令，随心所欲行事的我服从这些命令。自由便是服从自己给自己下的指令。这就是卢梭的道德自由概念，而且它也是康德的自由概念。","chapter":"费希特","color":0},{"text":"在康德看来，这是一种亵渎。在他看来，宇宙之中唯一具有终极价值的东西便是作为个体的人类。","chapter":"费希特","color":0},{"text":"卢梭根本不赞成情感的放纵。相反，他说（而且他背后有一个伟大的哲学传统）：感情使人们分离，理性使人们统一。感情、情感是主观性的、个体性的，因人而异，因国家而异，因气候而异；只有理性才是每一个人都有的，而且只有理性才是一贯正确的。","chapter":"卢梭","color":0},{"text":"艺术行为是一种延续性活动，它是一个行为过程，证明它正确的依据是，它服从某种内在的冲动。这种服从是一种理想的实现，他正是为这种理想而活着，他为之献身，将其视为使命和天职。","chapter":"费希特","color":0},{"text":"因而，康德说，宇宙中最神圣的东西，唯一完全是善的东西，便是善良意志，也就是说自由的、道德的、精神的内在自我。","chapter":"费希特","color":0},{"text":"真正的理想不能依靠受制于外在环境的东西；它必须依赖一种内在的理想，以及奉行这种内在的理想；它必须完成我真正的自我要求我去做的东西。真正的理想将遵守道德律令。如果这些律令是由某种外在的力量颁布的，那么我就不是自由的，因此我就是奴隶。但是，如果是我命令自己做这些事情的，那么，正如卢梭所言，我就不再是奴隶，因为我控制了自己；我的行为是自己作出的，这就是自由。","chapter":"费希特","color":0},{"text":"有两个敌人我必须避开。一个敌人是支配事物的无情的物质规律，另一个是邪恶小人的专断的意志力量（will-power）、命运的无常变幻以及不幸的环境。我躲避它们的办法是，利用一种酸葡萄原理，我愿意把它说成是一种非常崇高的、非常宏大的酸葡萄原理。","chapter":"费希特","color":0},{"text":"德国人对卢梭强调的恶意不那么担心，他们主要担心的是卢梭认为无关紧要的事物的本性。对于他们而言，自由似乎意味着不受宇宙的铁定的必然性的束缚——自由主要指不受外在世界严格规律的束缚，而不是不受邪恶或愚蠢之徒的束缚。","chapter":"费希特","color":0},{"text":"这样一来，最不受约束的自由与最严苛和最有奴役性的权威发生了重合。","chapter":"卢梭","color":0},{"text":"我这么做是因为，这是他内心里更优秀的、更现实的自我会做出的行为，假如他允许它说话的话。我不仅把我自己当成了主宰自身行动的权威，也当成了主宰别人行动的权威。这就是卢梭有名的警句——社会有权强迫人们获取自由——的含义。","chapter":"卢梭","color":0},{"text":"从这种社会契约观念，卢梭逐渐转向公意这一观念，公意差不多是一个庞大的、超个人的实体的拟人化意愿，这个实体被称为“国家”，它现在不再是霍布斯笔下的那个压倒一切的利维坦，而更像一个团队，一个教会，多样性中的统一性，比“我”更大的东西，我将自己的个性沉浸其中，只是为了再次发现它。","chapter":"卢梭","color":0},{"text":"所以卢梭说：“人天生是自由的，然而他处处受枷锁的束缚。”","chapter":"卢梭","color":0},{"text":"假如这副枷锁只是应当遵守的规则，是你内在的天性最自由、最有力、最有自发性的表现，那么，这副枷锁就不再束缚你了——因为自我控制并不是控制。自我控制是自由。","chapter":"卢梭","color":0},{"text":"卢梭是历史上最伟大而好斗的低俗之士，是一种天才型的弃儿；像卡莱尔，还有在某种意义上的尼采，当然还有D.H．劳伦斯和邓南遮等人物，以及诸如希特勒和墨索里尼这类以造反起家的小资产阶级，都是他的思想继承人。","chapter":"卢梭","color":0},{"text":"“只要议会中的几个人认为他们自成一体，那么他们就只有一种单独的意志。国家所有成员恒常不变的意愿是普遍的意愿。”","chapter":"卢梭","color":0},{"text":"在他看来，自然的必然是善的，如果所有的人都是自然的，他们就都是善的，那么，他们所寻求的东西，会使所有人感到满足，将所有人聚集在一起，形成一个和谐的整体。","chapter":"卢梭","color":0},{"text":"他的答案具有疯人通常具有的那种简单和精神错乱。不存在妥协的问题。如果换一个角度来观察这个问题，就会突然发现，这两种相互对立的价值非但不是格格不入的，而且它们之间根本不存在对立，它们不是两种价值，而是一种。","chapter":"卢梭","color":0},{"text":"卢梭在《社会契约论》中给出了举世闻名的答案，即每个人“既然是向全体奉献出自己，他就没有向任何人奉献出自己”","chapter":"卢梭","color":0},{"text":"卢梭的观点是一种世俗的加尔文主义，因为他一直坚持认为，法则不是一成不变的惯例，不是实用性的工具，它完全是根据非人为的，因而是永恒的、普适性的、绝对的神圣真理和神圣规则，去制定适合于特定时间、地点和人物的规则的过程。","chapter":"卢梭","color":0},{"text":"幸福不是人追求的目标：人类追求的目标是过上一种正确的生活。","chapter":"卢梭","color":0},{"text":"如果他不去做，那么他根本就不是人：因为他不负责任。整个道德责任观念，在卢梭看来，几乎超过了人的理性，是人的本质，它依靠的一个事实是，人能够作出选择，在其他可能性中进行选择，在不受强制的情况下自由地选择。","chapter":"卢梭","color":0},{"text":"在他看来，自由是一种绝对的价值。在他的眼里，自由就好像是一种宗教式的概念。在他眼里，自由与人类个体是等同的。说一个人成其为人，与说他是自由的，几乎是一回事儿。","chapter":"卢梭","color":0},{"text":"不过，我的主要意思是，他们之间争论的只是界线划在哪里的问题，然而这个界线是变动不居的。在中世纪，当时政治思想在很大程度上还是神学性质的，这场争执表现在，在人的身上，原罪的力量是否大于自然或上帝所赋予的理性的力量——原罪使人狂放不羁、作恶多端、贪得无厌和无法无天，理性使人追求善和正确目的，它是上帝灌输给他的","chapter":"卢梭","color":0},{"text":"始于不受限制的自由，终于不受限制的专制。","chapter":"卢梭","color":0},{"text":"爱尔维修心里很清楚自然教给了他什么。他知道，自然告诉他，人们能够做到而且应该做的事情仅仅就是追求快乐和回避痛苦，以此为基础，他建立了一套功利主义思想体系，这套思想体系在世界上最佳意志的武装之下，在最纯粹的动机的启发下，反对不公正，反对蒙昧无知，反对专断的统治，反对18世纪社会里依然充斥的所有恐怖，直接导致了技术官僚暴政的最终出现。它利用另一种暴政，一种技术暴政、一种理性暴政，取代了无知、恐惧、迷信的教士、专断的国王的暴政以及18世纪启蒙运动所反对的一切妖魔鬼怪的暴政，技术暴政同样敌视自由，同样敌视如下观念，即人类生活中最珍贵的是为了选择而选择，不仅是选择善的东西，而且是选择本身。它的这种敌视态度和方式一直受到利用，为法西斯主义张目，为几乎所有企图妨碍人类自由和把人类社会当做一个连续的、和谐的整体进行活体解剖的行为辩护，这个整体，不允许人们具有丝毫个人首创精神。","chapter":"爱尔维修","color":0},{"text":"孔多塞能够非常明确地说，“自然用一条无法挣断的锁链，将真理、幸福和美德绑在了一起”。由此可以得出结论，无论是谁，只要他彻底了解真理，他也就有了美德和幸福。","chapter":"爱尔维修","color":0},{"text":"且允许我略微强调一下对这种制度——这个美好的新世界（因为那正是它要实现的）的预设。首先，所有的价值问题都是确凿有据的，答案都可以通过观察和推理来发现。伦理学和政治学属于自然科学。有些人比别人更善于发现它们的规律。道德和政治方面特定的知识和技巧是存在的，是专家们必须掌握的。这些专家应当被赋予至高无上的权力。其次，所有的终极目标彼此相通。它们不能相互冲突。这个命题经常被人类的经验所否定。","chapter":"爱尔维修","color":0},{"text":"在爱尔维修所描述的世界里，没有或几乎没有个体自由的空间。在他的世界里，人们可能变得幸福，但自由观念最终消失了。之所以说它消失了，乃是因为，作恶的自由消失了，因为现在每个人只能做善事。我们已经像动物那样，被训练得只能寻求对我们有用的事物。在这种情况下，自由，如果它包括可以随心所欲地行事，什么都可以做的自由，甚至能够选择毁坏我们自身的自由，假如我们愿意的话——那种自由逐渐被成功的教育铲除。","chapter":"爱尔维修","color":0},{"text":"爱尔维修固守的一条原则是，教育和法律是万能的。","chapter":"爱尔维修","color":0},{"text":"伏尔泰说，“如果大众开始推理了，我们可就遇到麻烦了”；他还说，“人民就是老牛，他们需要的是一副牛轭，一根赶牛棒和饲料。”","chapter":"爱尔维修","color":0},{"text":"哲学家们该做什么？他如何去改变世界？这不能靠传道，因为人们不愿意去听。他必须采取更为激烈的手段才能达到目的。他必须通过立法和为人类这头犟驴发明一套大棒和胡萝卜的制度才能做到。","chapter":"爱尔维修","color":0},{"text":"专家或哲学家唯一的任务便是创造一个世界，在这个世界上，人们以最小的痛苦，最有效、最省时、最便捷的方式去获取他们只能去追求的结果。爱尔维修所说的相当于这些。他说，哲学家实际上是大厦的建筑师（他指的是建造者）。计划已经摆在那里，因为它可见于人的天性之中；这项计划的内容就是追求快乐和避免痛苦。","chapter":"爱尔维修","color":0},{"text":"还有一些思想家，他们的伟大体现在另一方面：他们不是回答以前提出的问题，而是改变了问题自身的性质，变换了那些问题之所以成其为问题的视角；不是解决了问题而是强烈影响了他们的谈话对象，让谈话对象“换一种眼光”来看待事物，按照当前的眼光，以前的不解之谜和问题不复出现，或者说，至少不再作为相当紧迫的问题出现。","chapter":"导论","color":0},{"text":"伯特兰·罗素曾经说过，读大哲学家的理论（不是读数学家或逻辑学家著作，他们处理的是符号，而非经验事实或人类特征），需要着重考虑的是，他们都拥有某种核心的生活观，拥有生活为何物，以及应当如何生活的观念","chapter":"导论","color":0},{"text":"爱尔维修谴责无知、残酷、不公正和蒙昧主义；卢梭义愤填膺地痛斥艺术和科学以及知识分子，替（或自以为在替）简朴的人类灵魂张目；黑格尔和费希特赞美组织有序的庞大整体，也就是他们所从属的国家组织，而且还谈到奉献、使命和民族义务，以及在执行共同的任务当中与他人认同所获得的快乐；圣西门谈到，生产者将来会生活在消除一切争执的社会里，在这个社会，工人和资本家都团结在某一合理的制度之下，我们所有的经济顽症以及由此产生的其他苦难，将一劳永逸地获得解决；最后，迈斯特将生活描述为植物、动物和人类之间不断的斗争，让人不寒而栗，在这个浸透鲜血的战场上，弱小、无力和邪恶的人类彼此厮杀不停，除非动用最严格和最有力的禁律才能震慑住，人只是偶尔才能超越自身，应对自我奉献或自我牺牲所带来的巨大痛苦。","chapter":"导论","color":0}],"thoughts":[{"text":"这家伙在法国大革命被伤的很深","quote":"好了，这一代人中的聪明之士建立了它，而下一代人中更聪明的人士可能把它弄得千疮百孔，他们用优越的、更微妙的、更聪明的、更有破坏力的理由，能够彻底毁掉它。没有一件东西能够永世长存，除非这件事物不是理性建立的，因为理性建立什么，就会毁掉什么。\n人在本质上是堕落的、邪恶的、胆怯的和道德败坏的。罗马教会、基督教所谓原初的罪恶，也就是原罪，是对人性最真实的心理洞察。如果放任自流的话，人类会把彼此撕成碎片。在此迈斯特与他的时代完全对立：他认为，要是不给人类戴上镣铐而且用最严格的纪律来约束他们，他们就很可能因为自相残杀而毁灭。他认为，人性从根本上说是自我毁灭性的，需要加以抑制和控制。唯一可信赖的东西，唯一可靠的东西，不是人造的；因为，如果它是人造的话，它同样可被人毁掉。","chapter":""},{"text":"但是冷兵器时代的战争已经过去，今时的战争不同往日。","quote":"这与两人决斗不同，两人决斗的时候，可以明显看出一方力量大，一方力量小。战役的输赢在于心理，战役的输赢在于信仰行为。实际的情况表现为某种神秘的内在力量的结果，这股神秘的内在力量当然不是理性的算计，也不是教科书上的规则的仔细应用，不是导致战争输赢的某种精细的理性算计或计划。\n托尔斯泰在《战争与和平》中对博罗季诺战役的描写，就是悉心遵循了迈斯特的观点。托尔斯泰读过迈斯特的书，因为迈斯特在圣彼得堡生活的那段时期，很让托尔斯泰感兴趣，他仿效迈斯特对战争场面的描述，他描写了参战者的内心感受，而不是给出井然有序、整齐利落的描述，而后者正是目击者和历史学家在事后构建的。在迈斯特和托尔斯泰看来，生活本身就像这种战役，任何从理性的角度描写它的企图，都是对本质上极端非理性、极端凌乱而且不遵循任何有迹可寻的规律或规则的一种可怕的歪曲、梳拢、整理、排序的过程。","chapter":""},{"text":"这类比喻这有意思","quote":"向人类打开那一扇扇已经被先前的思想家撬开一半或四分之一的大门，是他的使命，他为此而献身，将这些大门一劳永逸地猛然推开，是他的特权。","chapter":""},{"text":"哈，就是开篇说的有些哲学家不给出正面的答案，但是能改变问题的角度","quote":"如果换一个角度来观察这个问题","chapter":""},{"text":"这是爱尔维修意图找到的牛顿定律式的道德哲学答案。","quote":"专家或哲学家唯一的任务便是创造一个世界，在这个世界上，人们以最小的痛苦，最有效、最省时、最便捷的方式去获取他们只能去追求的结果。爱尔维修所说的 后面露出了笑意。","count":2760,"chapter":"第一部"},{"text":"只有清新的空气或小商贩从郊区带回的一篮篮鲜花可以宣告春天来临；那是市场上出售的春天。","count":2718,"chapter":"第一部"},{"text":"然而，在长期的惊慌之后，人人的心都似乎变硬了，即使旁边有人痛苦呼号，谁都会照样走路或生活，仿佛呻吟已经成为人的天然语言。","count":2717,"chapter":"第二部（一）"},{"text":"仿佛承载我们房屋的大地正在清洗使它感到重负的体液，让一直在它身体内部折磨它的疮疖和脓血升到表面来。","count":2532,"chapter":"第一部"}]},"928476":{"rating":861,"ratingCount":1501,"highlights":[{"text":"在日常生活中，我们从没见过单个的基本粒子，或者单个空间量子。我们看到石头、高山和朋友的脸庞——我们所看到的这些东西，每一个都由无数的基本要素组成。我们始终在与平均值发生关联，平均值的运作就是：损耗热量，并且从中产生时间。","chapter":"12．信息","color":0},{"text":"当我们得到关于某一系统新的信息时，相关信息的总量不能无限增加（由于第一条基本原理），之前信息的一部分变得不相关了，也就是说，它对预测未来不再有任何作用。在量子力学中，当我们与一个系统相互作用时，我们不仅是了解到一些内容，也“删去”了关于系统的一部分相关信息。","chapter":"12．信息","color":0},{"text":"一个系统的描述只不过是总结过去所有与之发生的相互作用，并使用它们来预测未来相互作用的影响。\n量子力学的整个形式结构很大程度上可以表述为两条简单的基本原理：\n1．任何物理系统中的相关信息是有限的。\n2．你永远能够得到一个物理系统的新信息。","chapter":"12．信息","color":0},{"text":"理论所描述的世界与我们熟知的世界大相径庭。再没有包含世界的空间，也没有事件发生于其中的时间，有的是空间量子和物质不停相互作用的基本过程。就像平静清澈的高山湖是由快速振动的无数极小的水分子组成的，被连续空间和时间包围的幻觉是这些密集发生的基本过程产生的模糊景象。","chapter":"7．时间不存在","color":0},{"text":"量子力学教会我们，不要以处在某一状态的“物体”的角度来思考世界，而应该从“过程”的角度来思考。过程就是从一次相互作用到另一次相互作用的历程。物体的属性只有在相互作用的瞬间才以分立的方式呈现，也就是只在这些过程的边缘，只在与其他物体发生关联时才出现。无法对其做出完全确定的预测，只能进行概率性的预测。","chapter":"4．量子","color":0},{"text":"总结一下，量子力学发现了世界的三个特征：\n● 分立性。系统状态的信息是有限的，由普朗克常数限定。\n● 不确定性。未来并非完全由过去决定。我们所见的严格的规律性最终是统计学上的。\n● 关联性。自然的事件永远是相互作用。系统的全部事件都相对于另一系统而出现。","chapter":"4．量子","color":0},{"text":"量子力学描述的不是物体：它描述的是过程，以及过程之间连接点的事件。","chapter":"4．量子","color":0},{"text":"在量子力学描述的世界中，实在只存在于物理系统之间的关联之中。并不是事物进入关联，而是关联是“事物”的基础。量子力学的世界不是物体的世界，它是事件的世界。","chapter":"4．量子","color":0},{"text":"它描述的是事物如何出现和事物之间如何相互作用。它没有描述哪里会有一个粒子，而是描述了粒子如何向其他粒子展现自己。存在的事物被简化为可能的相互作用的范围。实在成了相互作用，实在成了关联。","chapter":"4．量子","color":0},{"text":"我们看不到这些普遍存在的起伏，仅仅是因为它们尺度极小；在大尺度上它们没法像宏观物体一样被我们观测到。我们看一块石头，会觉得它就静止在那儿。但如果我们能够看到石头的原子，就会观察到它们在不停地四处传播，永不停息地振动。量子力学为我们揭示出，我们观察的世界越细微，就越不稳定。世界并非由小石子构成，它是振动，是持续的起伏，是一群微观上转瞬即逝的事件。","chapter":"4．量子","color":0},{"text":"量子力学的第一个含义就是，系统内部能够存在的信息有一个上限：系统所处的可区分状态的数量是有限的。无穷是有限的，是理论的第一个重要方面，这正是德谟克利特窥见的自然的分立性。普朗克常量h衡量了这一分立性的基本尺度。","chapter":"4．量子","color":0},{"text":"图4.6 世界由什么构成？","chapter":"4．量子","color":0},{"text":"但爱因斯坦意识到能量与质量是同一实体的两面，就如电场和磁场是同一种场的两个面向，空间和时间是同一事物即时空的两个面向。这表明，质量本身并不守恒；能量——按照当时理解的那样——也不守恒。一种可以转化为另一种，只存在一个守恒定律，而非两个。守恒的是质量与能量的总和，而非其中任意一个。一定存在某个过程，可以把能量转化为质量，或把质量转化为能量。","chapter":"第二部分 革命的开端","color":0},{"text":"如果我们像小王子那样生活在一个直径几千米的小行星上，就会很容易发现我们是住在一个球面上。如果我们的大脑和感官可以更加精密，如果我们可以轻易地感知一纳秒的时间，就不会产生普适的“现在”的概念，我们会很容易意识到在过去与未来之间存在着中间区域。我们会意识到说“此时此地”是有意义的，但是把“此时”当作全宇宙共同的“此时”是没有意义的。","chapter":"第二部分 革命的开端","color":0},{"text":"心产生的神秘的力，是漏斗壁弯曲的特点使珠子旋转。行星环绕太阳运动、物体下落，都是因为它们周围的空间是弯曲的（图3.6）。","chapter":"第二部分 革命的开端","color":0},{"text":"他采取了一种内部的而非外部的视角：即在地球上行走的人的视角，而非从远处看地球的人的视角。乍看起来，用这种方式解释地球是球体似乎毫无意义又复杂难懂。布鲁内托为什么不直接说地球像个橘子呢？请思考：假如有只蚂蚁在橘子上爬，到某个点时它会发现自己上下颠倒，必须用腿上的小吸盘吸住橘子，以免掉下去。然而地球上的旅行者从来不会发现自己上下颠倒，腿上也无须那样的吸盘。布鲁内托的描述并没有看起来那么古怪。","chapter":"第二部分 革命的开端","color":0},{"text":"全部的现代通信技术——收音机、电视、电话、电脑、卫星、Wi-Fi、网络等——都是麦克斯韦预言的应用；麦克斯韦方程组是电信工程师进行一切计算的基础。以通信为基础的现代世界，源自一个贫穷的伦敦装订工的灵感——充满想象力的奇思妙想——他用心灵之眼看到了那些线条，一个出色的数学家把这一观点转述成了方程，领悟到眨眼间这些线的波动就可以把信息从地球的一端传递到另一端。","chapter":"2．经典","color":0},{"text":"世界与我们在学校里学到的大相径庭。世界的基本结构正在显现，它由一群量子事件生成，其中时间和空间都不存在。量子场绘制了空间、时间、物质与光，在事件之间交换信息。实在（Reality）是由独立事件构成的网络，概率使它们相互关联，在两个事件之间，空间、时间、物质与能量消融在一团概率云中。","chapter":"引言：岸边漫步","color":0}],"thoughts":[{"text":"因弯曲导致下落的表述隐含了牛顿引力的人为体验前提，但是这个例子本身却在引导人们理解与牛顿解释不相符的爱因斯坦解释。","quote":"心产生的神秘的力，是漏斗壁弯曲的特点使珠子旋转。行星环绕太阳运动、物体下落，都是因为它们周围的空间是弯曲的（图3.6）。","chapter":""},{"text":"这论述忽略了那些发明家，是他们将技术上升到运用，没有他们，也就没有那些收音机、电视、电话…当然麦克斯韦们到工作是决定性的。","quote":"全部的现代通信技术——收音机、电视、电话、电脑、卫星、Wi-Fi、网络等——都是麦克斯韦预言的应用；麦克斯韦方程组是电信工程师进行一切计算的基础。以通信为基础的现代世界，源自一个贫穷的伦敦装订工的灵感——充满想象力的奇思妙想——他用心灵之眼看到了那些线条，一个出色的数学家把这一观点转述成了方程，领悟到眨眼间这些线的波动就可以把信息从地球的一端传递到另一端。","chapter":""},{"text":"这恰恰不是说明柏拉图的爱智慧学的思考吗？至少从字面意义上，他不仅要结论还要与之对应的推导。","quote":"伟大的柏拉图彻底迷失了方向！","chapter":""}],"popularHighlights":[{"text":"在一个事件的过去与未来之间（例如，你正在阅读的此时此刻与你的过去与未来之间），存在一个“中间区域”，一个“延展的现在”，一个既非过去亦非未来的区域。这就是狭义相对论的发现。","count":400,"chapter":"第二部分 革命的开端"},{"text":"量子引力是继承《数沙者》追求的众多方式之一。我们正数着构成宇宙空间的微粒。巨大的宇宙，但是有限。 唯一真正无限的是我们的无知。","count":396,"chapter":"11．无穷的终结"},{"text":"我们应该把时间看成局部的现象：宇宙中的每个物体都有它自己的时间之流，其速度由当地的引力场决定。","count":378,"chapter":"7．时间不存在"},{"text":"亚里士多德的作品全部保留了下来，西方思想据此重新建立，而非来自德谟克利特。也许，如果德谟克利特所有的作品都能够流传下来，而亚里士多德的作品全都失传了，我们文明的思想史可能会更好……","count":336,"chapter":"第一部分 源头"},{"text":"一对双胞胎，一个在海边生活，另一个在山上生活。当他们再次相见时，住在山里的要更老。这就是引力的时间膨胀。","count":306,"chapter":"第二部分 革命的开端"},{"text":"时间是我们忽略了事物微观物理状态的结果。时间是我们所没有的信息。 时间是我们的无知。","count":300,"chapter":"12．信息"},{"text":"伟大的科学与伟大的诗歌都充满想象力，甚至最终会有同样的洞见。我们的文化中科学与诗歌互相分离，这很愚蠢，它们都是打开我们的视野、让我们看到世界复杂与优美的工具。","count":294,"chapter":"第二部分 革命的开端"},{"text":"科学由实验、假设、公式、计算与讨论组成，但这些只是工具，就如乐手的乐器。正如音乐中重要的是音乐本身，科学里真正重要的是科学所提供的对世界的理解。","count":272,"chapter":"引言：岸边漫步"},{"text":"也许我们如今所了解的一切都只是我们目前尚未了解的某种东西的近似。","count":266,"chapter":"2．经典"},{"text":"但不只空间会弯曲，时间也会。爱因斯坦预言，在地球上海拔高的地方，时间流逝得更快，海拔低的地方要慢些。","count":266,"chapter":"第二部分 革命的开端"},{"text":"量子力学以一种根本的方式扩展了相对性：一个物体的所有变量都只相对于其他物体而存在。自然只是在相互作用中描绘世界。","count":255,"chapter":"4．量子"},{"text":"马特维在他率先领悟到我们关于时空的观念必须彻底转变的第二年，就被斯大林的警察逮捕了，并被判处死刑。他的死刑在他试验的同一天执行，1938年2月18日。死时年仅三十岁。","count":240,"chapter":"第三部分 量子空间与关联的时间"},{"text":"在热量产生的那个时刻，过程就不可逆转了：过去与未来区分开来。一直是热量并且只有热量才能把过去与未来区别开。","count":234,"chapter":"12．信息"},{"text":"所有的物体都是由原子构成的——这些原子是一些小小的粒子，它们一直不停地运动着。当彼此略微离开时相互吸引，当彼此挤得过近时又相互排斥。只要稍微想一下，你就会发现，这句话包含了大量的有关世界的信息。","count":220,"chapter":"第一部分 源头"},{"text":"量子力学为我们揭示出，我们观察的世界越细微，就越不稳定。世界并非由小石子构成，它是振动，是持续的起伏，是一群微观上转瞬即逝的事件。","count":210,"chapter":"4．量子"},{"text":"德谟克利特的道德理想是通过节制与平衡，通过信任理性来让自己不被情绪主导，达到心灵的宁静。","count":209,"chapter":"第一部分 源头"},{"text":"德谟克利特优美的语言让人感受到一种深刻的普世主义：“对智者而言，整个世界是开放的。一个美好灵魂的故乡是整个世界。”","count":204,"chapter":"第一部分 源头"},{"text":"重要的不是假设我们通晓一切，而是相反：意识到昨天的无知可能被今天阐明，今天的无知可以被明天照亮。","count":200,"chapter":"11．无穷的终结"},{"text":"时间不是自己独立存在的，应该承认，离开了事物的活动，人们就不能感受到时间本身。 ——卢克莱修，《物性论》","count":198,"chapter":"7．时间不存在"},{"text":"辩论的渴望与更深入理解的渴望，一直持续到他生命的最后一刻。质疑，也持续到最后一刻。 这种永恒的质疑，正是科学的源头。","count":187,"chapter":"4．量子"}]},"933062":{"rating":778,"ratingCount":1296,"highlights":[{"text":"首创实证主义这个词的孔德说：“实证哲学的基本性质，就是把一切现象看成服从一些不变的自然规律；精确地发现这些规律，并把它们的数目压缩到最低限度，乃是我们一切努力的目标，因为我们认为，探索那些所谓的始因或目的因，对于我们来说，乃是绝对办不到的，也是毫无意义的。”","chapter":"第七章 自然哲学与实证科学","color":0},{"text":"我们今天从笛卡儿对演绎的倚重把笛卡儿叫作理性主义，以与经验主义相对待，仿佛一方注重推理而另一方注重经验或实验，这种综述在很大程度上错失了要点。笛卡儿的演绎主义是其哲学构想的必然结果，而不仅仅是某种特别的态度。从怀疑一切到我思故我在到心物两分到物理事物之定义为广延到物理学原理到各式物理定律是一个连续体，只有这样才能保证新物理学仍然是哲学的一部分，保证物理学的自然哲学身份。","chapter":"第七章 自然哲学与实证科学","color":0},{"text":"按照希尔伯特的说法，去除了概念内容之后，“我们最后得到的不是用普通语言传达的实质数学知识，而只是含有按照确定规则逐次生成的数学符号和逻辑符号的一组公式而已。……于是实质演绎就被一个由规则支配的形式程序替换了”。","chapter":"第六章 数学化","color":0},{"text":"引力不是世界的构造成分，是超自然的但数学可以把握的力量。它不是一种物理力，而是一种“数学的力”。","chapter":"第五章 科学概念","color":0},{"text":"我们为什么要接受这些新定义和新概念？我们可以这样回答：因为依据这些概念才能建构起一种特定的力学理论。反过来说，为了建构一种有效的科学理论，科学家必须重新定义一些概念，或者创造某些概念。我们要不要接受这些新定义和新概念，端赖于这个新理论是否更好地解释了力学世界。","chapter":"第五章 科学概念","color":0},{"text":"R.哈瑞说：“和其他科学相比，物理学的发展远为突出地交织着对概念基础的哲学分析与很多初看起来像是自行其是的科学研究纲领。”","chapter":"第五章 科学概念","color":0},{"text":"语词是概念的最终形式或最明确的形式。","chapter":"第五章 科学概念","color":0},{"text":"大致可以说，概念是一些事实的结晶，结晶为一种较为稳定的理解图式，概念里包含着我们对世界的一般理解。","chapter":"第五章 科学概念","color":0},{"text":"近代科学的发展来自对世界的一种整体的数理筹划，注重实验更多是这一筹划的结果而不是其原因。所以，我不赞成用实验科学来概括近代科学。","chapter":"下篇","color":0},{"text":"一般说来，自然哲学依赖于经验，依赖于经验事实，是我们的自然理解的形式化；而实证科学越来越依赖于通过仪器观察到的事实，依赖于可以通过实验生产出来的事实，是依照设计好的方案对世界进行探索。","chapter":"下篇","color":0},{"text":"自然现象在其丰富性中被我们经验，哲学家剥除经验中的纯主体成分，确定经验事实，同时在经验中寻找形式线索，确立这些线索的逻辑统一，形成理论。实证科学则相反，它从由理想简化的条件开始，通过改变条件和增加变量得到更复杂的模型。","chapter":"下篇","color":0},{"text":"但只要我们的语言区分经验和实验，把近代科学叫作“经验科学”就是不妥当的。实际上柯瓦雷早已明确指出，我们不仅需要把经验和实验区分开来，甚至应当把它们“对立起来”。","chapter":"下篇","color":0},{"text":"最关键的一点是，从伽利略的斜面实验和摆实验开始，实验逐步把理论与事实清楚地区分开来。","chapter":"下篇","color":0},{"text":"然而，就一个命题的意义来看，它同等地依赖于反对者，一如依赖于拥护者。意义不取决于赞成或拥护，而是取决于赞成或拥护的深度。真理是镶嵌在意义之中的。初等教科书倾向于简单地用今天的对错标准来叙述科学史，结果敉平了历史之为历史的历史深度。","chapter":"第二章 从希腊天学到哥白尼革命","color":0},{"text":"两者的根本差别在于，神话通过传说和想象来编织这种解释，而哲学则通过经验—事实来编织这种解释。","chapter":"上篇","color":0},{"text":"再说一遍，“哲学”有广义，有狭义。广义是爱智慧，或者是深刻、深层思考、玄乎的思想、无用的思想等等，在这个意义上，中国当然有哲学，每个民族都有自己的哲学，甚至可以说每个人都有哲学。而狭义的哲学，是理论的求真态度。这种态度主要属于希腊。各个民族都爱智慧，至少其中有一些人爱智慧。但并非各个民族都以理性态度来建构理论。","chapter":"上篇","color":0},{"text":"神话和神话式理论不会因为不应验甚至不会因为正当而锐利的批判而消亡，是理性的理论取代了它们。","chapter":"上篇","color":0},{"text":"理性态度的第一个特征是反思，在他者的背景下看待自己。","chapter":"上篇","color":0},{"text":"感应认知真正的生命力在于它提供了各种认知原型，这些原型仍然在深层调节着我们的认知，我们的理知理解仍不断从中汲取营养。","chapter":"上篇","color":0},{"text":"实际上，我们今天所谓理解了，在很大程度上就是说：被纳入了认知原型。","chapter":"上篇","color":0},{"text":"人类，包括初民在内，也不仅是在应付这个世界，他们想理解这个世界。这包括并且首先体现在追问生死，追问世界的起源与构造，追问种族的起源，等等。","chapter":"上篇","color":0},{"text":"科学越进步，感情、道德、艺术就显得越虚幻。科学所揭示的宇宙是一个没有目的没有意义的宇宙。","chapter":"导论","color":0},{"text":"正是由于世界不再被看作一个有意义的统一体，而是被当作一种具有因果联系的场所，对世界的宰制才成为可能，工具理性的行为因而才兴盛起来。","chapter":"导论","color":0},{"text":"强建构主义或曰强纲领的建构主义（SSK）主张，科学并不是什么客观知识，而是科学家共同体内部谈判的结果；科学理论是一种社会构造，其合法性并不取决于事实性的因素；在科学知识的建构中，自然界仅仅充当微不足道的角色，科学不过是一种意识形态，就像另一个神话故事；","chapter":"导论","color":0},{"text":"所谓建构主义，属于解构主义的大思潮，虽然两个名称在字面上相反。建构主义对抗科学主义，张扬人文精神，对科学的真理性全面提出质疑。","chapter":"导论","color":0},{"text":"也许，科学主义和建构主义都是片面的，我们应当全面地看问题。这样的句式属于官老爷的总结报告，严禁出现在哲学写作中。我还没学会怎样写哲学，但我相信已经学会了不怎样写。","chapter":"导论","color":0},{"text":"的初步回答是：数学的最大特点在于进行长程推论而不失真，因此，科学可以借数学语言通达感官远远不及的世界而仍保持真实。但反过来，数学对理解充满感性的日常世界只有很少的、间接的帮助。","chapter":"导论","color":0},{"text":"哲学的任务是回到它的出发点，以理性态度从事经验反思和概念考察，以期克服常识的片断零星，在一定程度上获得更为连贯一致的理解。","chapter":"导论","color":0},{"text":"在现代汉语里，部分地由于继承了马克思对科学一词的用法，科学这个词本身就具有排他的正确性、真理性等基本含义。","chapter":"导论","color":0}],"thoughts":[{"text":"这句话有问题","quote":"需要一个力来维持","chapter":""},{"text":"概念来自于经验事实的总结，语词是概念的最终或最明确的形式。当语词不能明确的指示概念意含时，那么在把握语词与其对应的概念上便存在先天不足。","quote":"我们不懂希腊文的人，听不到这些感性线索，这些元素名称对我们就是干巴巴的、需要死记硬背的科学术语。","chapter":""},{"text":"此乃造句论理","quote":"也许，科学主义和建构主义都是片面的，我们应当全面地看问题。这样的句式属于官老爷的总结报告，严禁出现在哲学写作中。我还没学会怎样写哲学，但我相信已经学会了不怎样写。","chapter":""}],"popularHighlights":[{"text":"科学越进步，感情、道德、艺术就显得越虚幻。科学所揭示的宇宙是一个没有目的没有意义的宇宙。","count":1072,"chapter":"导论"},{"text":"科学把心灵留在了画面之外，科学世界观没有为喜怒哀乐美丑善恶留下席位。","count":442,"chapter":"序"},{"text":"既得其母，以知其子； 既知其子，复守其母。","count":429,"chapter":"引言"},{"text":"科学对人类的影响可以分成两个大的方面。一 20美元纸币化成灰烬。","count":323,"chapter":"04 流浪，流浪"},{"text":"他们根本就不会认真对待我说的话，以为我会欣然接受他们赠送的新车。从现在开始，我不得不慎重考虑，以后再也不接受他们任何礼物了，否则他们会以为能买到我的尊重。","count":306,"chapter":"03 再见，亚特兰大"},{"text":"亚历克斯大声说：“如果你不拿着，我就把它们都扔掉！我不想知道现在是几点，不想知道今天是几月几日，也不想知道我究竟在哪儿，这些都不重要。”","count":288,"chapter":"01 搭便车的男孩"},{"text":"他的房间就像一个修行室，只有一张直接放在地上的薄床垫、一个牛奶箱和一张桌子。房间的摆设井井有条，干净简洁，如同军营一般。他没有电话，这样，沃尔特和比莉就没法给他打电话了。","count":270,"chapter":"03 再见，亚特兰大"},{"text":"原来离开是一件如此容易的事情，这种感觉实在是太好了，世界在我面前展开了无限可能。","count":252,"chapter":"14 野性的呼唤"},{"text":"我想要跃动而非宁静的生活历程，我想要刺激和危险，为我的挚爱献出生命，我感到体内有许多能量在涌动，却无法在平静的生活中为它们找到出口。","count":242,"chapter":"03 再见，亚特兰大"},{"text":"回避是一种儿童避免行为混乱的自卫反应，如果把这条规律套用到成人世界里，我们可以看到，采取回避反应的婴儿长大以后，人生目标很有可能是某种意义或者生命的秩序，而不是完全依赖人际关系。","count":242,"chapter":"07 贞洁无瑕的道德"},{"text":"冒险精神是一个人生命的核心，生命的快乐来自于发现新的世界，没有什么比每天迎接不同的地平线和新的太阳更让人快乐了。","count":224,"chapter":"06 生命中的空白"},{"text":"如果你认为快乐仅仅或主要来自于人和人之间的交往，那你就错了。上帝已经把快乐藏在我们身边，藏在我们遇见的每一件事当中。我们需要做的，不过是鼓起勇气，推翻我们自以为是的过去，并创造属于我们自己的新生活。","count":221,"chapter":"06 生命中的空白"},{"text":"‘那我就爬到树上去’。我告诉他，那儿的树都不高，灰熊随随便便就能推倒一棵黑云杉，即使你爬到树上也很危险，结果他还是不听。无论我说什么，他都会反驳我","count":210,"chapter":"01 搭便车的男孩"},{"text":"不必给我爱，不必给我钱，不必给我名誉，给我真理吧。我坐在一张放满了山珍海味的餐桌前，受到奉承的招待，可是那里没有真理和诚意；宴罢之后，从这冷淡的桌上归来，我饥饿难当。这种招待冷得像冰。","count":210,"chapter":"12 无法原谅的错误"},{"text":"他厌倦了布尔海德，厌倦了每天打卡上班的日子，厌倦了和“塑料人”一起工作，决定离开那里。","count":208,"chapter":"05 一路向西"},{"text":"可是他说：‘不行，我要搭便车去北方。如果我坐飞机去，那就是作弊，这样整个旅行就毁了。’”","count":208,"chapter":"07 贞洁无瑕的道德"},{"text":"亚历克斯说：“不用了，谢谢，我现有的装备已经足够了。”","count":204,"chapter":"01 搭便车的男孩"},{"text":"在地空交流的标准手势当中，举起一只胳膊代表“这里一切正常，不需要救援”，如果要表示“情况不妙，请立即救援”，则需要举起两只胳膊。可惜，麦康知道这些时已经太晚了。","count":196,"chapter":"08 愚蠢？傲慢？疯狂？"}]},"23796296":{"rating":763,"ratingCount":849,"highlights":[{"text":"需要拍摄一切事物的最后一个理由，存在于消费本身的逻辑。消费意味着燃烧，意味着耗尽——因此需要再添和补充。当我们制造影像和消费影像时，我们需要更多影像；和更多更多影像。但影像不是需要搜遍全世界才能找到的财宝；它们恰恰就在手边，举目皆是。","chapter":"影像世界","color":0},{"text":"我们的社会认为应该有一个包含各种不延续的选择和看法的光谱。他们的社会是围绕着一个单一的、理想的观察者建构起来的；照片则为这一“大独白”尽它们的一份绵力。","chapter":"影像世界","color":0},{"text":"中国人不希望照片有太多意义或太有趣。他们不希望从一个不寻常的角度看世界和发现新题材。照片被假定要展示已被描述过的东西。摄影对我们来说是一把双刃剑，既生产陈腔滥调（陈腔滥调的法语原文既有措辞陈腐之意，又有照相负片之意），又提供“新鲜”观点。对中国当局来说，只有陈腔滥调——他们不认为这是陈腔滥调而认为是“正确”观点。","chapter":"影像世界","color":0},{"text":"我们觉得中国人幼稚，竟没有看出那扇有裂缝的剥落的门的美、无序中蕴含的别致、奇特的角度和意味深长的细节的魅力，以及背影的诗意。我们有一个关于美化的现代概念——美不是任何东西中固有的，而是需要被发现的，被另一种观看方式发现——和一个关于意义的更宽泛的概念，后者已由摄影的很多用途所证明和有力地强化。一样东西的变体之数目愈多，其意义的可能性亦愈丰富：因此，照片在西方蕴含的意义要比在今天中国多。","chapter":"影像世界","color":0},{"text":"相机把异国情调的事物变近、变亲密；把熟悉的事物变小、变抽象、变陌生、变远。它以一次轻易、已形成习惯的活动，给我们自己的生活和他人的生活同时带来参与和疏离——使我们参与，同时确认疏离。","chapter":"影像世界","color":0},{"text":"老照片扩充我们脑中的过去的影像，正在拍摄的照片则把现在的东西转化成一种脑中影像，变得像过去一样。相机建立一种与现在的推论式关系（现实是通过其痕迹而被知晓的），提供一种即时追溯的观点来看待经验。照片提供了模拟性的占有形式：占有过去、现在以至将来。","chapter":"影像世界","color":0},{"text":"照片与其说是记忆的工具，不如说是发明记忆或取代记忆。","chapter":"影像世界","color":0},{"text":"现实被理解为难以驾驭、不可获得，而照片则是把现实禁锢起来、使现实处于静止状态的一种方式。或者，现实被理解成是收缩的、空心的、易消亡的、遥远的，而照片可把现实扩大。你不能拥有现实，但你可以拥有影像（以及被影像拥有）","chapter":"影像世界","color":0},{"text":"对巴尔扎克来说，整个环境的精神可以用一个物质细节来披露，不管表面上多么不起眼或任意。一生也许可以用片刻的外表来概括。￼而外表的一次变化也是本人的一次变化，因为他拒绝假设在这些外表背后还有任何“真”人。巴尔扎克向纳达尔表达的别出心裁的理论——也即身体是由无限系列的“幽魂般的影像”构成的——令人惊诧地呼应他的小说中所表达的被认为是现实主义的理论，也即一个人是各种外表的总和，只要予以适当关注，就可以使这些外表产生出无限层次的意义。","chapter":"影像世界","color":0},{"text":"巴尔扎克对被拍照也怀有一种类似的“隐约的恐惧”。据纳达尔说，巴尔扎克的解释是\n每个身体在自然状态下都是由一系列幽魂般的影像构成的，这些影像层层叠叠直至无限，包裹在无穷小的薄膜中……人类从来不能从某个鬼影、从某种不可触摸的东西中，或从乌有中创造一个物件，即是说，创造某个物质形式——因此每一次达盖尔银版制作都是要抓住它聚焦的那个身体的其中一层，使其脱离，将其用掉。","chapter":"影像世界","color":0},{"text":"谁也不会在任何意义上把一幅画架油画当成是其描绘对象的共同实在体；画只是表现或指涉。但一张照片不只是与其被拍摄对象相似，不只是向被拍摄对象致敬。它是那被拍摄对象的一部分，是那被拍摄对象的延伸，并且还是获取那被拍摄对象、控制那被拍摄对象的一种有效手段。","chapter":"影像世界","color":0},{"text":"虽然摄影产生了可被称为艺术的作品——艺术要求主观性、艺术可以说谎、艺术予人审美乐趣——但摄影首先就根本不是一种艺术形式。摄影像语言一样，是一种创造艺术作品（和其他东西）的媒介。","chapter":"摄影信条","color":0},{"text":"语言贫乏的理由，并非偶然：也即，丰富的摄影批评传统的缺席。这是每当摄影被视为一门艺术时，摄影本身便会显露的固有问题。","chapter":"摄影信条","color":0},{"text":"一部较简陋、较低性能的相机被认为可产生较有趣或较有表现力的结果，为创作上的意外留有更大余地","chapter":"摄影信条","color":0},{"text":"诚如摄影师们所描述的，拍照既是占有客观世界的一种无限度的技术，又是那个单一的自我的一种不可避免地唯我论的表达。照片描绘各种现实，这些现实尽管已存在，却只有相机可以揭示它们。照片还描绘一种个人气质，这气质通过相机对现实的裁切而发现自己。","chapter":"摄影信条","color":0},{"text":"摄影对现实主义的承担并不是使摄影局限于某些题材，把这些题材视作比其他东西更为真实，而是突显形式主义者对每一件艺术作品都具有的特点的理解：现实，用维克托·什克夫斯基￼的话来说，就是去除熟悉。","chapter":"摄影信条","color":0},{"text":"但是，摄影的美学化倾向是如此严重，使得传递痛苦的媒介最终把痛苦抵消。相机把经验微缩化，把历史变成奇观。照片创造同情不亚于照片减少同情和疏远感情。摄影的现实主义给认识现实制造了混乱：在道德上麻木（长期而言），在感觉上刺激（长远和短期而言）。因此，它开了我们的眼界。这就是大家一直在谈论的新视域。","chapter":"视域的英雄主义","color":0},{"text":"关心社会的摄影师假设他们的作品可传达某种稳定的意义，可以揭示真相。但这种意义是注定要流失的，部分原因是照片永远是某种环境中的一个物件；即是说，不管该环境如何形成对该照片的临时性——尤其是政治性——使用，该环境都将不可避免地被另一些环境所取代，而这另一些环境将导致原先那些使用的弱化和逐渐变得不相干。","chapter":"视域的英雄主义","color":0},{"text":"“依我看，”文学写实主义的最重要倡导者左拉在从事十五年业余摄影之后，于一九〇一年断言，“你不能宣称你真的看到什么，除非你把它拍摄下来。”照片并非只是记录现实，而是已成为事物如何呈现在我们面前的准则，从而改变了现实这一概念，也改变了现实主义这一概念。","chapter":"视域的英雄主义","color":0},{"text":"人们希望见到理想化的形象：一张他们自己的照片，显示他们最好看的样子。当相机给出的照片的形象不比他们实际的样子更吸引人时，他们会感到自己受训斥。","chapter":"视域的英雄主义","color":0},{"text":"对自己的房子感到骄傲的主人，很可能会拿出该房子的照片，向客人展示它有多棒。我们学会透过照片来看自己：觉得自己有吸引力，恰恰是认定自己在照片里会很好看。照片创造美的事物，然后——经过一代又一代的拍照——把美的事物用光。例如，某些壮丽的自然风景，差不多完全丢给业余摄影爱好者那兴致勃勃的注意力去蹂躏。这些影像的暴饮暴食者可能会觉得落日太陈旧；那些落日现在看起来，哎呀，实在太像照片了。","chapter":"视域的英雄主义","color":0},{"text":"相机在美化世界方面所扮演的角色，是如此成功，使得照片而非世界变成了美的事物的标准。","chapter":"视域的英雄主义","color":0},{"text":"马克思曾批评哲学一味只求理解世界而不是改变世界。在超现实主义感受力的范围里作业的摄影师则告诉我们，就连试图理解世界也是无聊的，并提议我们搜集世界。","chapter":"忧伤的物件","color":0},{"text":"照片中的世界与真实世界的关系也像静止照片与电影的关系一样，根本就是不准确的。生命不是关于一些意味深长的细节，被一道闪光照亮，永远地凝固。照片却是。","chapter":"忧伤的物件","color":0},{"text":"一本书的阅读时间是由读者决定的，一部电影的观看时间则是由导演决定的，对影像的感知只能像剪辑允许的那样快或那样慢。因此，一张可以使我们在某个时刻流连多久都可以的静止照片，是与电影的形式相抵触的，就像一批把某人的一生或某个社会的某些时刻冻结起来的照片，与那个人和那个社会的形式是相抵触的，因为那形式是时间里的一个过程，在时间里流动。","chapter":"忧伤的物件","color":0},{"text":"超现实主义是一门把奇形怪状一般化再从中发现细微差别（和魅力）的艺术。没有任何活动比摄影更适合于运用超现实主义手法，我们最终也从超现实主义角度看所有照片。","chapter":"忧伤的物件","color":0},{"text":"原则上，摄影是执行超现实主义的授权，对题材采取一种绝无妥协余地的平等主义态度。（一切都是“真”的。）实际上，摄影——就像主流超现实主义的品味本身一样——对废物、碍眼之物、无用之物、表层剥落之物、奇形怪状之物和矫揉造作之物表现出一种积习难改的嗜好。","chapter":"忧伤的物件","color":0},{"text":"在过去，对现实不满本身表达了一种对另一个世界的向往。在现代社会，对现实不满本身表达了对复制这个世界的向往，并且是强烈地、最难以令人忘怀地表达。仿佛只有把现实当作一个物件来看——通过照片的摆布——它才真正是现实，即是说，超现实。","chapter":"忧伤的物件","color":0},{"text":"但是我们这种对（流动或静止的）影像和印刷品中日益奇形怪状的东西的接受能力，是要付出高昂代价的。长远而言，它的作用不是解放自我而是削弱自我：这是一种对恐怖的东西的伪熟悉，它增强异化，削弱人们在真实生活中做出反应的能力。","chapter":"透过照片看美国，昏暗地","color":0},{"text":"十九世纪最有逻辑的唯美主义者马拉美说，世界上的一切事物的存在，都是为了在一本书里终结。今天，一切事物的存在，都是为了在一张照片中终结。","chapter":"在柏拉图的洞穴里","color":0},{"text":"如果形容说，人们患上了摄影强迫症，大概是不会错的：把经验本身变成一种观看方式。最终，拥有一次经验等同于给这次经验拍摄一张照片，参与一次公共事件则愈来愈等同于通过照片观看它。","chapter":"在柏拉图的洞穴里","color":0},{"text":"需要由照片来确认现实和强化经验，这乃是一种美学消费主义，大家都乐此不疲。工业社会使其公民患上影像瘾；这是最难以抗拒的精神污染形式。强烈渴求美，强烈渴求终止对表面以下的探索，强烈渴求救赎和赞美世界的肉身——所有这些情欲感觉都在我们从照片获得的快感中得到确认。","chapter":"在柏拉图的洞穴里","color":0},{"text":"摄影对世界的认识之局限，在于尽管它能够激起良心，但它最终绝不可能成为伦理认识或政治认识。通过静止照片而获得的认识，将永远是某种滥情，不管是犬儒的还是人道主义的滥情。","chapter":"在柏拉图的洞穴里","color":0},{"text":"相机所表述的现实必然总是隐藏多于暴露","chapter":"在柏拉图的洞穴里","color":0},{"text":"美学距离似乎就形成于观看照片的经验中，如果不是立即就形成，也肯定会随着时间流逝而形成。时间最终会在艺术层次上给大多数照片定位，哪怕是最业余的照片。","chapter":"在柏拉图的洞穴里","color":0},{"text":"看邪恶影像如同看色情影像。拍摄下来的暴行画面带来的震撼，随着反复观看而消失，如同第一次看色情电影感到的吃惊和困惑，随着看得更多而消失。","chapter":"在柏拉图的洞穴里","color":0},{"text":"拍照与世界的关系，是一种慢性窥淫癖的关系，它消除所有事件的意义差别。","chapter":"在柏拉图的洞穴里","color":0},{"text":"照片包装世界，自己似乎也招致被包装。","chapter":"在柏拉图的洞穴里","color":0},{"text":"照片篡改世界的规模，但照片本身也被缩减、被放大、被裁剪、被修饰、被窜改、被装扮。","chapter":"在柏拉图的洞穴里","color":0},{"text":"拍摄就是占有被拍摄的东西。","chapter":"在柏拉图的洞穴里","color":0},{"text":"照片在教导我们新的视觉准则的同时，也改变并扩大我们对什么才值得看和我们有权利去看什么的观念。照片是一种观看的语法，更重要的，是一种观看的伦理学。","chapter":"在柏拉图的洞穴里","color":0}],"thoughts":[{"text":"苏珊桑塔格没能预见到，全球50%的监控摄像头安装在中国。","quote":"可以假设，中国人最终会像我们那样把摄影当作工具来用，但也许不会把录像作为公共场所的监视工具。我们倾向于把性格与行为等同起来，这使得在公共场所广泛安装由摄像机提供的从外部监视的机器更容易被接受。中国的秩序标准更具压制性，这就需要不仅监视行为而且改变人心；在那里，监视已内部化到前所未有的程度，这意味着他们的社会把摄像机当作监视工具的前景是较有限的。","chapter":""},{"text":"想起了约翰密尔的《论自由》","quote":"我们的社会认为应该有一个包含各种不延续的选择和看法的光谱。他们的社会是围绕着一个单一的、理想的观察者建构起来的；照片则为这一“大独白”尽它们的一份绵力。","chapter":""},{"text":"煽动性的由来","quote":"此外，电影把数小时的手术浓缩成数分钟，只把一些有趣的部分以有趣的方式表现出来，即是说，带着要令人骚动或吃惊的意图。戏剧性被布局和蒙太奇的惯用手法戏剧化。无论是我们一页页翻阅一本摄影杂志，还是一部电影出现新的连续镜头，都会造成一种对比，要比真实生活中的连续事件之间的对比更强烈。","chapter":""},{"text":"记忆在很多时候提供的是一种感觉与当时氛围的描述，而无法推敲其细节，而照片提供了一个可供分析的入口。","quote":"照片与其说是记忆的工具，不如说是发明记忆或取代记忆。","chapter":""},{"text":"妥妥的精选相机营销话术，「你不能拥有现实，但你可以拥有影像——索妮阿尔法7」","quote":"现实被理解为难以驾驭、不可获得，而照片则是把现实禁锢起来、使现实处于静止状态的一种方式。或者，现实被理解成是收缩的、空心的、易消亡的、遥远的，而照片可把现实扩大。你不能拥有现实，但你可以拥有影像（以及被影像拥有）","chapter":""},{"text":"我倒觉得可能是摄影师更在乎的是自己技艺得到展示，找到自己的摄影之道，如孔子所言，君子不器的一种践行方式。","quote":"一部较简陋、较低性能的相机被认为可产生较有趣或较有表现力的结果，为创作上的意外留有更大余地","chapter":""},{"text":"照片是否只是描绘现实，并揭示它们，我觉得还是两说。","quote":"诚如摄影师们所描述的，拍照既是占有客观世界的一种无限度的技术，又是那个单一的自我的一种不可避免地唯我论的表达。照片描绘各种现实，这些现实尽管已存在，却只有相机可以揭示它们。照片还描绘一种个人气质，这气质通过相机对现实的裁切而发现自己。","chapter":""},{"text":"数字计算摄影的发展以及计算机算力的增长，绘画和摄影本身的界限有时候在变得模糊，当一位摄影后期技术人员对数字照片上的像素点进行修改、调色、移动时，从本质上说着不也是一种绘画吗？","quote":"因为，一张照片在本质上是永远不能完全超越其表现对象的，而绘画却能。一张照片也不能超越视觉本身，而超越视觉在一定程度上却是现代主义绘画的终极目标。","chapter":""},{"text":"具有讽刺意味的是，眼见不为实，照片才为实，因为这种真实是表达者口中的真实，它需要佐证，而非人们内心的真实。","quote":"“依我看，”文学写实主义的最重要倡导者左拉在从事十五年业余摄影之后，于一九〇一年断言，“你不能宣称你真的看到什么，除非你把它拍摄下来。”照片并非只是记录现实，而是已成为事物如何呈现在我们面前的准则，从而改变了现实这一概念，也改变了现实主义这一概念。","chapter":""},{"text":"这可不就是购物平台、买家秀、卖家秀的真实写照。","quote":"需要由照片来确认现实和强化经验，这乃是一种美学消费主义，大家都乐此不疲。工业社会使其公民患上影像瘾；这是最难以抗拒的精神污染形式。强烈渴求美，强烈渴求终止对表面以下的探索，强烈渴求救赎和赞美世界的肉身——所有这些情欲感觉都在我们从照片获得的快感中得到确认。","chapter":""},{"text":"因为时间积累会带来现代性无法���造的「复古味」，任何企图模仿「复古味」的滤镜与后期也只能是模仿，最终须等待时间来「作古」，而最业余的照片，有时候在散发「复古味」的同时，还带有一丝真诚，这则真诚随着时间的变化如同酒一般，历久越纯，更是现代性难以企及的妄想。","quote":"美学距离似乎就形成于观看照片的经验中，如果不是立即就形成，也肯定会随着时间流逝而形成。时间最终会在艺术层次上给大多数照片定位，哪怕是最业余的照片。","chapter":""},{"text":"感官刺激的上限被提高后，人对刺激的响应变得疲乏","quote":"看邪恶影像如同看色情影像。拍摄下来的暴行画面带来的震撼，随着反复观看而消失，如同第一次看色情电影感到的吃惊和困惑，随着看得更多而消失。","chapter":""},{"text":"计算机发展之后，存入硬盘才是一种占有，但究其根本，那些占有的不过就是0和1。然而反观现实世界的占有与物欲，到底如何才算占有呢？带着终将死去，消逝不见的前提，从这个意义上讲，任何人类并不占有任何东西。","quote":"拍摄就是占有被拍摄的东西。","chapter":""}],"popularHighlights":[{"text":"拍摄就是占有被拍摄的东西。它意味着把你自己置于与世界的某种关系中，这是一种让人觉得像知识，因而也像权力的关系。","count":1536,"chapter":"在柏拉图的洞穴里"},{"text":"使用相机，可平息工作狂的人在度假或自以为要玩乐时所感到的不工作的焦虑。他们可以做一些仿佛是友好地模拟工作的事情：他们可以拍照。","count":1326,"chapter":"在柏拉图的洞穴里"},{"text":"拍照是核实经验的一种方式，也是拒绝经验的一种方式——也即仅仅把经验局限于寻找适合拍摄的对象，把经验转化为一个影像、一个纪念品。","count":1003,"chapter":"在柏拉图的洞穴里"},{"text":"绘画或散文描述只能是一种严格地选择的解释，照片则可被当成是一种严格地选择的透明性。","count":882,"chapter":"在柏拉图的洞穴里"},{"text":"最近，摄影作为一种娱乐，已变得几乎像色情和舞蹈一样广泛——这意味着摄影如同所有大众艺术形式，并不是被大多数人当成艺术来实践的。它主要是一种社会仪式，一种防御焦虑的方法，一种权力工具。","count":814,"chapter":"在柏拉图的洞穴里"},{"text":"人类无可救赎地留在柏拉图的洞穴里，老习惯未改，依然在并非真实本身而仅是真实的影像中陶醉。","count":803,"chapter":"在柏拉图的洞穴里"},{"text":"摄影影像似乎并不是用于表现世界的作品，而是世界本身的片断，它们是现实的缩影，任何人都可以制造或获取。","count":660,"chapter":"在柏拉图的洞穴里"},{"text":"照片实际上是被捕捉到的经验，而相机则是处于如饥似渴状态的意识伸出的最佳手臂。","count":648,"chapter":"在柏拉图的洞穴里"},{"text":"摄影是随着摄影的工业化才取得其艺术地位的。由于工业化为摄影师的工作提供了社会用途，因此，对这些用途的反应也加强了摄影作为艺术的自觉性。","count":560,"chapter":"在柏拉图的洞穴里"},{"text":"没有任何时刻比另一个时刻更重要；没有任何人比另一个人更有趣。","count":558,"chapter":"透过照片看美国，昏暗地"},{"text":"摄影已变成体验某些事情、表面上参与某些事情的主要手段之一。","count":546,"chapter":"在柏拉图的洞穴里"},{"text":"所谓准确就是符合他们自己对贫困、光感、尊严、质感、剥削和结构的观念。","count":540,"chapter":"在柏拉图的洞穴里"},{"text":"照片本身不能解释任何事物，却不倦地邀请你去推论、猜测和幻想。","count":504,"chapter":"在柏拉图的洞穴里"},{"text":"收集照片就是收集世界。","count":476,"chapter":"在柏拉图的洞穴里"},{"text":"虽然人们会觉得相机确实抓住现实，而不只是解释现实，但照片跟绘画一样，同样是对世界的一种解释。","count":464,"chapter":"在柏拉图的洞穴里"},{"text":"十九世纪最有逻辑的唯美主义者马拉美说，世界上的一切事物的存在，都是为了在一本书里终结。今天，一切事物的存在，都是为了在一张照片中终结。","count":455,"chapter":"在柏拉图的洞穴里"},{"text":"破灭的希望、青年人的放浪形骸、殖民地战争和冬季体育活动是相同的——都被相机平等化了。拍照与世界的关系，是一种慢性窥淫癖的关系，它消除所有事件的意义差别。","count":435,"chapter":"在柏拉图的洞穴里"},{"text":"马克思曾批评哲学一味只求理解世界而不是改变世界。在超现实主义感受力的范围里作业的摄影师则告诉我们，就连试图理解世界也是无聊的，并提议我们搜集世界。","count":432,"chapter":"忧伤的物件"},{"text":"拍照就是参与另一个人（或物）的必死性、脆弱性、可变性。所有照片恰恰都是通过切下这一刻并把它冻结，来见证时间的无情流逝。","count":429,"chapter":"在柏拉图的洞穴里"},{"text":"当我们害怕，我们射杀。当我们怀旧，我们拍照。","count":420,"chapter":"在柏拉图的洞穴里"}]},"24953399":{"rating":862,"ratingCount":3788,"highlights":[{"text":"一页书的价值只存在于它被翻到的时候，而后来的生活定会翻遍和翻乱这本书上的每一页。","chapter":"12","color":0},{"text":"“告诉他，我是罗西利奥内侯爵之子，前来替父报仇。”\n通译传话，哈里发将一只五指并拢的手举起来。\n“他是谁？”\n“我父亲是谁？这是你对他的又一次新的侮辱！”","chapter":"04","color":0},{"text":"“他一贯如此疯疯癫癫，对皇上说着话，头脑就混乱起来，弄不清自己和对面的人谁是皇帝了。”","chapter":"03","color":0},{"text":"可以说，名字只是在他身上滑过，从来不能粘住。","chapter":"03","color":0},{"text":"朗巴尔多的眼睛在他们之中搜寻着一件东西：阿季卢尔福的白色铠甲。他希望与之重逢，因为也许它的出现能使军队中除它之外的其余部分显得更加实在，或者是因为他所遇见的最坚强的表现偏偏属于那位不存在的骑士。","chapter":"02","color":0}],"thoughts":[{"text":"这里有四个客体：完人精神（阿季卢尔福）、行尸走肉（古尔杜鲁）、有追求的凡人（朗巴尔多）、战士的尸体。尸体自身无法言语，但借由其他三位做了表达。","quote":"你将变成草，然后是吃草的牛的奶，喝牛奶的孩子的血，如此等等。尸体呀，你看，你不是活得比我强得多啦？”\n朗巴尔多拖着一具尸体，想道：“死人呀，我跑呀跑，就是为了跑到这里来像你一样被人抓住脚后跟拖走。现在你眼睁睁地死不瞑目，你在石头上磕碰的脑袋面朝青天，在你看来，这将我驱使至此的疯狂劲头究竟是什么呢？这战争狂热和爱情狂热又是什么呢？我要好好想想。死人啊，你使我思考起这些问题。可是能有什么改变呀？什么也不会变。我们除了这些进坟墓之前的日子外没有别的时间，对我们活人是如此，对你们死人也是如此。我不能浪费时日，不能浪费我现有的生命和我将可能有的生命。应该用这生命去为法兰克军队建立卓越功勋，去拥抱高傲的布拉达曼泰。死人哪，我愿你没有虚度你的光阴。无论如何，你的骰子已亮出它们的点数。","chapter":""},{"text":"似乎有种镜子的隐喻","quote":"“他一贯如此疯疯癫癫，对皇上说着话，头脑就混乱起来，弄不清自己和对面的人谁是皇帝了。”","chapter":""}],"popularHighlights":[{"text":"“当一个女人对所有实实在在的男人都失去兴趣之后，唯一给她留下希望的就只能是一个根本不存在的男人……”","count":3666,"chapter":"06"},{"text":"究竟是什么东西能够使人们闭上眼睛，失去自我感觉，沉入数小时的时间空洞之中，然后醒过来，找回与从前相同的自我，重新接起自己的生命之绳，阿季卢尔福无法知晓其中的奥秘。","count":3156,"chapter":"02"},{"text":"“他也能学会的……我们过去也不懂得应当怎样生活在世界上……也是边生活边学会……”","count":2502,"chapter":"11"},{"text":"那些终于从头盔和铠甲里脱身出来的人，由于各自复归为不会彼此混淆的、有特征的自我而感到满足和舒畅，都已经在那里酣然入梦了。","count":2119,"chapter":"02"},{"text":"戈尔本特拉茨和叙拉的圭尔迪韦尔尼和阿尔特里家族的阿季卢尔福·埃莫·贝尔特朗迪诺无疑堪称一个模范军人；但是大家一致公认他是一个讨厌的家伙。","count":1751,"chapter":"01"},{"text":"别人身上出现的或是惊慌、或是失望、或是愤怒的情态都能使阿季卢尔福立刻变得心平气静，产生出良好的安全感。他意识到自己可以免受存在着的人们所遭受的惊恐和忧愁，便摆出一副保护者的优越姿态。","count":1690,"chapter":"02"},{"text":"除了宗教礼仪、三日祈祷、九日祈祷、收庄稼、摘葡萄、鞭打奴仆、乱伦、放火、绞刑、兵匪、抢掠、强奸、瘟疫之外，我们其他什么也不曾见识过。","count":1649,"chapter":"04"},{"text":"编写故事的技巧就在于擅长从子虚乌有的事情中引申出全部的生活；而在写完之后，再去体验生活，就会感到那些原来自以为了解的东西其实毫无意义。","count":1599,"chapter":"06"},{"text":"“我的名字在我的旅途的终点。”","count":1458,"chapter":"08"},{"text":"倘若证明他所救的索弗罗妮亚不是处女，他的骑士身份也将烟消云散，他后来的一切作为都将被否定，将统统失效，一切称号、爵位都将被废止。因而他的任何职权就将同他本人一样不复存在了。","count":1445,"chapter":"07"},{"text":"他重新开始在各国流浪。自从把圣杯骑士团作为唯一的理想来怀念之后，他曾对一切荣誉、一切享乐不屑一顾。现在理想破灭了，他将替自己不安的灵魂找一个什么样的追求目标呢？","count":1411,"chapter":"10"},{"text":"“你不要探问圣杯的意图，见习生！”老者警告他，“不是我们在这么干，是圣杯，它附在我们身上操纵我们的行动！在它这疯狂的爱中寻找乐趣吧！”","count":1352,"chapter":"10"},{"text":"青年总是这样追逐着少女。真是对她的爱情在推动着他吗？或许首先不是爱情本身，他是在追求只有女人才能给予的自我存在的确实感吧？","count":1254,"chapter":"06"},{"text":"现在所有的这些个事情都可以安排停当：可将一次替叔父雪恨的行为折算为半件替父亲复仇的事情，这样如果我们还欠一件代父报仇的话，就算已经完成了。”","count":1230,"chapter":"02"},{"text":"“如果我打瞌睡，哪怕只是一瞬间，我就会神智消散，失去我自己。因此，我必须清醒地度过白天和黑夜里的每一分每一秒。”","count":1230,"chapter":"02"},{"text":"难道他要报杀父之仇的愿望、渴望参战、渴望成为查理大帝的卫士的愿望，也都只不过是像阿季卢尔福骑士摆弄松球一样，是不甘寂寞、难耐空虚的一种平庸的表现吗？","count":1155,"chapter":"02"},{"text":"“哟，哟！什么也没看见！”查理大帝说，“既然您不存在，您如何履行职责呢？” “凭借意志的力量，”阿季卢尔福说，“以及对我们神圣事业的忠诚！”","count":1134,"chapter":"01"},{"text":"阿齐拉，我好像早就一直爱着您……好像已经为您神魂颠倒了……","count":1134,"chapter":"10"},{"text":"至高无上的权力往往使哪怕最能克己的君主也会失去约束，变得骄纵任性。","count":1044,"chapter":"07"},{"text":"一页书的价值只存在于它被翻到的时候，而后来的生活定会翻遍和翻乱这本书上的每一页。","count":990,"chapter":"12"}]},"24953405":{"rating":814,"ratingCount":5377,"highlights":[{"text":"生者的地狱是不会出现的；如果真有，那就是这里已经有的，是我们天天生活在其中的，是我们在一起集结而形成的。免遭痛苦的办法有两种，对于许多人，第一种很容易：接受地狱，成为它的一部分，直至感觉不到它的存在；第二种有风险，要求持久的警惕和学习：在地狱里寻找非地狱的人和物，学会辨别他们，使他们存在下去，赋予他们空间。","chapter":"隐蔽的城市 之五","color":0},{"text":"掌控故事的不是声音，而是耳朵。","chapter":"九","color":0},{"text":"从这面到那面，城市的各种形象在不断翻番，但是却没有厚度，只有正反两面：就像一张两面都有画的纸，两幅画既不能分开，也不能对看。","chapter":"城市与眼睛 之五","color":0},{"text":"记忆既不是短暂易散的云雾，也不是干爽的透明，而是烧焦的生灵在城市表面结成的痂，是浸透了不再流动的生命液体的海绵，是过去、现在与未来混合而成的果酱，把运动中的存在给钙化封存起来：这才是你在旅行终点的发现。","chapter":"城市与天空 之一","color":0},{"text":"我想：人到生命的某一时刻，他认识的人当中死去的会多过活着的。这时，你会拒绝接受其他面孔和其他表情：你遇见的每张新面孔都会印着旧模子的痕迹，是你为他们各自配戴了相应的面具。","chapter":"城市与死者 之二","color":0},{"text":"像菲利德这样的城市很多，它们能够躲过所有凝视的目光，却躲不过那些出其不意投来的目光。","chapter":"城市与眼睛 之四","color":0},{"text":"“记忆中的形象一旦被词语固定住，就给抹掉了。”波罗说。“也许，我不愿意全部讲述威尼斯，就是怕一下子失去她。或者，在我讲述其他城市的时候，我已经在一点点失去她。”","chapter":"六","color":0},{"text":"“为了区分其他城市的特点，我必须总是从一座总隐于其后的首要的城市出发。对于我，那座城市就是威尼斯。”","chapter":"六","color":0},{"text":"这样，城市在她空着的棋盘上不断移动着，重复着她始终如一的生活。居民们反复演出同样的场景，只是更换了演员；他们重复着同样的台词，不过改变了口音而已；他们张开不同的嘴巴，打着同样的哈欠。在帝国的所有城市中，只有埃乌特洛比亚保持始终不变。这个城市最尊崇的无常之神墨丘利造出了这种暧昧的奇迹。","chapter":"城市与贸易 之三","color":0},{"text":"虚假永远不在于词语，而在于事物自身。","chapter":"城市与符号 之五","color":0},{"text":"这并非由于她们都同样真实，而是由于她们都同样是假想的。前者包含了被当做必需而接受的东西，但其实尚非不可或缺；而后者被想象为有可能存在，但瞬间之后就再也不可能了。","chapter":"城市与欲望 之四","color":0},{"text":"“你是为了回到你的过去而旅行吗？”可汗要问他的话也可以换成：“你是为了找回你的未来而旅行吗？”\n马可的回答则是：“别的地方是一块反面的镜子。旅行者能够看到他自己所拥有的是何等的少，而他所未曾拥有和永远不会拥有的是何等的多。”","chapter":"二","color":0},{"text":"马可·波罗想象着自己回答(或者忽必烈汗想象着他的回答)说，越是在远方城市陌生的小区里迷失方向，就越能了解为到达该城所经过的那些城镇，再回首追溯旅程各站，重新认识当初起航的海港和年轻时所熟悉的地方，孩提时终日奔跑过的威尼斯的小广场和自家周围的一切。\n这时，忽必烈汗打断马可或想象着打断他，或者马可想象着被可汗的提问打断：“你前进的时候总是回头向后看吗？”或者：“你所见过的一切总在你的背后吗？”或者：“你的旅行总是发生在过去吗？”\n这都是为了让马可·波罗能够解释，或者自己想象解释，或者被想象成解释，或者终于能够解释，他所追寻的永远在自己的前方，即使是过去的，也在旅行过程中渐渐变化，因为旅行者的过去会随着他的旅行路线而变化，这并非指每过去一天就补充一天的最近的过去，而是指最遥远的过去。每到一个新城市，旅行者就会发现一段自己未曾经历的过去：已经不复存在的故我和不再拥有的事物的陌生感，在你所陌生的不属于你的异地等待着你。","chapter":"二","color":0},{"text":"只要在城市范围之内，居民们随便在哪里挖一个垂直的地洞就能提出水来：城市的绿色周边正是看不见的地下湖的湖岸线，看不见的风景决定着可视的风景，阳光之下活动着的一切，都是受地下封闭着的白垩纪岩石下的水波拍击推动的。","chapter":"轻盈的城市 之一","color":0},{"text":"正如所有的经济史书籍所解释的，城市是一些交换的地点，但这些交换并不仅仅是货物的交换，它们还是话语的交换，欲望的交换，记录的交换。","chapter":"前言","color":0}],"thoughts":[{"text":"这篇有点惊悚，但又意喻深刻","quote":"","chapter":""},{"text":"眼睛虽无法同时对看，但感受却能同时进行","quote":"从这面到那面，城市的各种形象在不断翻番，但是却没有厚度，只有正反两面：就像一张两面都有画的纸，两幅画既不能分开，也不能对看。","chapter":""},{"text":"威尼斯是马可关于城市的共相，而他述说的都是殊相。","quote":"“为了区分其他城市的特点，我必须总是从一座总隐于其后的首要的城市出发。对于我，那座城市就是威尼斯。”","chapter":""},{"text":"人无法尽透物自身，却以真假示之。","quote":"虚假永远不在于词语，而在于事物自身。","chapter":""},{"text":"现实性，让其成为必需，这是实然；想象空间却因现实的确立而倒塌，这是应然尽毁。\n不要被实然束缚。","quote":"这并非由于她们都同样真实，而是由于她们都同样是假想的。前者包含了被当做必需而接受的东西，但其实尚非不可或缺；而后者被想象为有可能存在，但瞬间之后就再也不可能了。","chapter":""},{"text":"如果旅行总是发生在总过去，但无限回溯后，旅行的起点是什么？如果旅行只在前方，那又是为何眼前的景象都似曾相识？\n也许旅行的前方已不是那个前方，它揉杂了你的过往，而当你见到那个前方时，你的过往亦不再是过往的那个过往，而混合了眼前的前方。\n这里可以把「旅行」两字换成「我」，把「前方」两字换成「未来的我」，把「过往」两字换成「过去的我」。当你活着，睁开眼，目视前方，即你的未来，这个「我」便处在变化之中，他是你所有时间集的合体，决定未来的你的不仅是此刻的你，还有过往的你，而此刻的你又会立刻变成过去的你。\n从这个意义上来讲，人来到未来，也是一种「回到过去」。","quote":"马可·波罗想象着自己回答(或者忽必烈汗想象着他的回答)说，越是在远方城市陌生的小区里迷失方向，就越能了解为到达该城所经过的那些城镇，再回首追溯旅程各站，重新认识当初起航的海港和年轻时所熟悉的地方，孩提时终日奔跑过的威尼斯的小广场和自家周围的一切。\n这时，忽必烈汗打断马可或想象着打断他，或者马可想象着被可汗的提问打断：“你前进的时候总是回头向后看吗？”或者：“你所见过的一切总在你的背后吗？”或者：“你的旅行总是发生在过去吗？”\n这都是为了让马可·波罗能够解释，或者自己想象解释，或者被想象成解释，或者终于能够解释，他所追寻的永远在自己的前方，即使是过去的，也在旅行过程中渐渐变化，因为旅行者的过去会随着他的旅行路线而变化，这并非指每过去一天就补充一天的最近的过去，而是指最遥远的过去。每到一个新城市，旅行者就会发现一段自己未曾经历的过去：已经不复存在的故我和不再拥有的事物的陌生感，在你所陌生的不属于你的异地等待着你。","chapter":""}],"popularHighlights":[{"text":"你若是每天八个小时切割玛瑙、石华和绿玉髓，你的辛苦就会为欲望塑造出形态，而你的欲望也会为你的劳动塑造出形态；你以为自己在享受整个阿纳斯塔西亚，其实你只不过是她的奴隶。","count":7758,"chapter":"城市与欲望 之二"},{"text":"在梦中的城市里，他正值青春，而到达伊西多拉城时，他已年老。广场上有一堵墙，老人们倚坐在那里看着过往的年轻人；他和这些老人并坐在一起。当初的欲望已是记忆。","count":6208,"chapter":"城市与记忆 之二"},{"text":"“记忆中的形象一旦被词语固定住，就给抹掉了。”波罗说。“也许，我不愿意全部讲述威尼斯，就是怕一下子失去她。或者，在我讲述其他城市的时候，我已经在一点点失去她。”","count":5652,"chapter":"六"},{"text":"城市不会泄露自己的过去，只会把它像手纹一样藏起来，它被写在街巷的角落、窗格的护栏、楼梯的扶手、避雷的天线和旗杆上，每一道印记都是抓挠、锯锉、刻凿、猛击留下的痕迹。","count":5310,"chapter":"城市与记忆 之三"},{"text":"你放眼打量街巷，就像翻阅写满字迹的纸页：城市告诉你所有应该思索的东西，让你重复她的话，而你虽以为在游览塔马拉，却不过是记录下她为自己和她的各部分所定下的名称。","count":4788,"chapter":"城市与符号 之一"},{"text":"我想：人到生命的某一时刻，他认识的人当中死去的会多过活着的。这时，你会拒绝接受其他面孔和其他表情：你遇见的每张新面孔都会印着旧模子的痕迹，是你为他们各自配戴了相应的面具。","count":4214,"chapter":"城市与死者 之二"},{"text":"别的地方是一块反面的镜子。旅行者能够看到他自己所拥有的是何等的少，而他所未曾拥有和永远不会拥有的是何等的多。","count":4160,"chapter":"二"},{"text":"为了让人更容易记住，左拉被迫永远静止不变，于是就萧条了，崩溃了，消失了。大地已经把她忘却了。","count":3860,"chapter":"城市与记忆 之四"},{"text":"记忆也在夸张：反复重复着各种符号，以肯定城市确实存在。","count":3562,"chapter":"城市与符号 之二"},{"text":"虚假永远不在于词语，而在于事物自身。","count":3128,"chapter":"城市与符号 之五"},{"text":"每个城市都从她面对的荒漠获得自己的形状；于是，赶骆驼的人和水手所看到的，就是这样处在沙的荒漠与水的荒漠之间的苔斯皮那。","count":2980,"chapter":"城市与欲望 之三"},{"text":"虽然悬在深渊之上，奥塔维亚居民的生活并不比其他城市的更令人不安，他们知道自己的网只能支撑这么多。","count":2808,"chapter":"轻盈的城市 之五"},{"text":"无论如何，今日的都市更具魅力，因为只有通过她变化了的今日风貌，才唤起人们对她过去的怀念，而抒发这番思古怀旧之情。","count":2795,"chapter":"城市与记忆 之五"},{"text":"每到一个新城市，旅行者就会发现一段自己未曾经历的过去：已经不复存在的故我和不再拥有的事物的陌生感，在你所陌生的不属于你的异地等待着你。","count":2475,"chapter":"二"},{"text":"有人说，这证明了一种假设，那就是每个人心里都有一座仅仅由差异构成的城市，一座既无形象又无形态的城市，而那些特别的城市则填充了它。","count":2394,"chapter":"城市与符号 之三"},{"text":"人们说，这不仅是现在才发生的事：事实上，是那些死人依照地下城市的样子建造了地上埃乌萨皮娅。还有人说，在这两座姊妹城里，没办法知道谁是死者，谁是生者。","count":2380,"chapter":"城市与死者 之三"},{"text":"我已经想启程离去。“你随时可以启程而去，”他们说，“不过，你会抵达另外一座特鲁德，绝对一模一样：世界被唯一的一个特鲁德覆盖着，她无始无终，只是飞机场的名字在更换而已。”","count":2282,"chapter":"连绵的城市 之二"},{"text":"最早来的人们想不通，是什么吸引那些人来佐贝伊德，走进这个陷阱，这座丑陋的城市。","count":2265,"chapter":"城市与欲望 之五"},{"tex 同体的拙劣模仿，它在国家层面建立起一个冒牌的“平等”公民共同体，这样的共同体掩盖了市民社会里不平等的个人之间以自我为中心的日常竞争，在那里，人们“把他人看作工具，把自己也降为工具，并成为异己力量的玩物”。￼赋予公民的权利强化了市民社会的自我中心主义和对抗倾向。","chapter":"自由主义的问题","color":0},{"text":"功利主义作为一种“深奥的秘传”学说，只展示给开明的精英人士","chapter":"证成自由原则","color":0},{"text":"认定某一意见正确乃是因为它在一切与之竞争的场合中都未被驳倒，与认定它正确乃是为了它不受反驳，这两者之间有着天壤之别。","chapter":"第四章 自由的地位","color":0},{"text":"也就是说，对于“为什么这些人应该统治？”或者“什么因素使得他们的统治是合法的？”这样的问题，唯有民主制给出了一个我们可以接受的答案。","chapter":"结论","color":0},{"text":"穆勒主张，专制制度导致消极被动，因为它塑造出来的民族无须了解或学习国家事务。这不仅影响个人，也会影响国家的繁荣。“让一个人不能为国家做任何事情，他就不会关心国家。”￼而如果臣民主动了解各种信息且主动学习，并对国家事务具有积极的兴趣，他们就不会长期满足于自己的屈从状态。","chapter":"代议制民主","color":0},{"text":"柏拉图的哲学家国王与卢梭的选举贵族制之间的关键差异就在于，卢梭的统治者并没有权力制定法律。","chapter":"卢梭与公意","color":0},{"text":"然而，如果我们可以主张，投票的意义不仅仅在于对公共善（public good）表达一种意见，那么或许就可以找到一种对民主更强有力的辩护。","chapter":"反民主的柏拉图","color":0},{"text":"柏拉图的言外之意是，投票的意义在于就下述问题表达意见：对于作为一个整体的国家来说，什么是最好的？","chapter":"反民主的柏拉图","color":0},{"text":"但是正如穆勒所指出的，这里的谬误在于认为人民是一群同质的人，具有一种单一的利益，每个人受到每一项政策的影响都是一样的。但是我们并非如此，我们有不同的目标、利益与计划；我们生活在不同的地方，具有不同的寿命。","chapter":"第三章 谁应当统治？","color":0},{"text":"休谟的回答是，人类并不是非常善于理性地行动。假定我们有两种行为可以选择，一种行为眼下就可以获得蝇头小利，另一种行为可以获得更大的利益，但得在更远的将来才能得到。尽管采取第二种行为才最终符合我们的利益，但休谟认为，任凭我们自己选择的话，我们往往都会选择第一种","chapter":"公平原则","color":0},{"text":"卢梭认为，面对稀缺，人类的第一反应不是霍布斯式的竞争，而是创新。这里，也许卢梭依靠的是这样一个观念：由于野蛮人天性就反感伤害他人，所以大多数人宁愿通过劳作来获得他们所需要的，也不愿夺取他人之物。正是使得工作更加容易的创新，即制造工具，第一次唤醒了人的骄傲与聪明才智。","chapter":"卢梭","color":0},{"text":"。霍布斯与洛克忽视了人类动机的一个重要方面，即同情或怜悯，因此他们高估了自然状态下冲突的可能性。卢梭认为，每个人“看见自己的同类受苦，天生就有一种反感”。","chapter":"卢梭","color":0},{"text":"如果自然法是可强制执行的，那么许多其他权利都可以得到保障，即便是在自然状态下。对洛克来说，这些权利中最重要的就是私有财产权。","chapter":"洛克","color":0},{"text":"洛克说，自然法就是，谁也不应该伤害他人的生命、健康、自由或所有物。","chapter":"洛克","color":0},{"text":"霍布斯的平等原则是一种关于所有人身心能力的主张。对洛克来说，它是一个关于权利的道德主张：没有人有一种自然权利让其他任何人从属于自己。","chapter":"洛克","color":0},{"text":"思考霍布斯的论证的方法之一就是，在自然状态下，从个人角度而言的理性行为就是攻击他人（出于我们已经看到的那些理由），而这将导致战争状态。然而，自然法告诉我们，战争状态对人来说并不是不可避免的处境，因为我们还可以做出另外一个层次的行为，即集体理性。要是我们能够通过某种方式上升到集体理性的层次，并服从自然法，我们就可以生活在和平状态，免于恐惧。","chapter":"霍布斯","color":0},{"text":"在自然状态下，没有正义或非正义，没有对或错。道德观念没有运用的余地。这就是霍布斯所谓的“自由的自然权利”（Natural Right of Liberty）。","chapter":"霍布斯","color":0},{"text":"总之，霍布斯看到了自然状态下发动攻击的三条主要理由：为了利益（gain），为了安全（先发制人防范侵犯者），以及为了荣誉（glory）或名声。","chapter":"霍布斯","color":0}],"thoughts":[{"text":"Hell of a insight","quote":"功利主义作为一种“深奥的秘传”学说，只展示给开明的精英人士","chapter":""},{"text":"实际上，我认为还可以用第三章中穆勒提出的人民不是同质的观点来进行对卢梭的反驳。有的人就是希望追求真理，即使付出代价，而有的人更喜欢活在谎言，只要感光刺激，如同电影黑客帝国中总是有人会选择蓝色药丸，也总是会有人选择红色药丸。","quote":"一个意见是否有用的说法本身就是一个意见，它如同那个意见一样是可以争辩、可以讨论，也需要讨论的。要想判定一个意见错误，就像要判定它有害一样，都需要一个万无一失的意见判定人","chapter":""},{"text":"以实践检验，以时间检验","quote":"认定某一意见正确乃是因为它在一切与之竞争的场合中都未被驳倒，与认定它正确乃是为了它不受反驳，这两者之间有着天壤之别。","chapter":""},{"text":"柏拉图的统治者是持刀人，卢梭的统治者是刀本身。","quote":"柏拉图的哲学家国王与卢梭的选举贵族制之间的关键差异就在于，卢梭的统治者并没有权力制定法律。","chapter":""}],"popularHighlights":[{"text":"霍布斯观点的实质就是认为，在没有政府的情况下，人性不可避免地会把我们带向严重的冲突。因此，对霍布斯而言，政治哲学从研究人性开始。","count":486,"chapter":"霍布斯"},{"text":"一个对政治没有兴趣的人，我们并不说他是一个只关心自己事务的人，而是说他根本就没有事务。","count":324,"chapter":"导论"},{"text":"穆勒主张，应该给予那些特别善于运用其判断力的人不止一张选票。他觉得应该偏袒那些特别聪明的人或者受过良好教育的人，给他们两张或者更多选票（他并没有谈论最终的细节）。","count":324,"chapter":"代议制民主"},{"text":"思考国家的一个自然而然的起点就是追问：要是没有国家会怎样？要想理解为什么我们会拥有某物，通常情况下，一个很好的策略就是考虑没有它会怎样。","count":288,"chapter":"第一章 自然状态"},{"text":"但是，从稀里糊涂的无知到见多识广后的困惑，这一过程中所取得的进步我们一定不要低估。","count":240,"chapter":"导论"},{"text":"我们变得依赖于我们最初视为奢侈品的东西。随着新鲜感的消失，拥有它们只给我们带来很少快乐，或者甚至根本就没有快乐，而失去它们将是灾难性的，即便我们曾经没有它们也过得很好。","count":230,"chapter":"卢梭"},{"text":"从根本上说，在洛克与社会契约论者看来，当且仅当国家声称对其拥有权威的每个人都同意时，国家才是正当的。","count":224,"chapter":"第二章 证成国家"},{"text":"研究事情是怎样的将有助于解释事情能够怎样，而研究事情能够怎样对于评价事情应该怎样来说是不可或缺的。","count":221,"chapter":"导论"},{"text":"没有政府并不意味着就不能对个人行为施加任何形式的社会控制。社会压力、公共舆论、对坏名声的恐惧，甚至流言蜚语，所有这一切都可以影响个人行为。做出反社会行为的人会遭到排斥。","count":195,"chapter":"无政府主义"},{"text":"总之，霍布斯看到了自然状态下发动攻击的三条主要理由：为了利益（gain），为了安全（先发制人防范侵犯者），以及为了荣誉（glory）或名声。","count":192,"chapter":"霍布斯"},{"text":"那些宁愿不参与的人会发现，他们的政治决定由别人为他们做了，不管他们是否喜欢别人为他们做决定。实际上，什么也不说或者什么也不做就是认可现状，无论现状多么令人反感。","count":187,"chapter":"导论"},{"text":"拥有财富与享有政治权力之间是否应该存在某种联系呢？","count":182,"chapter":"导论"},{"text":"凌驾于我之上的政治权力只有通过我的自愿行为才能创造出来。他人不会拥有凌驾于我之上的政治权力，除非我已经授予他们这种权力。","count":180,"chapter":"社会契约"},{"text":"在合理范围内有一套共同的法律，要比任何人对最好的法律应该是什么这个问题做出的私人判断重要得多。","count":170,"chapter":"社会契约"},{"text":"文明社会的出现被认为是对自然状态下的战争状态或接近于战争的状态所做出的反应。","count":165,"chapter":"卢梭"},{"text":"我们可能会认为，这是一个有点险恶的观点，它带有一种灌输的意味。尽管卢梭念念不忘保护个人自由，但有些批评者声称在他的思想里觉察到了法西斯主义的弦外之音。人们要被教育塑造得为了国家而忘记自我。","count":162,"chapter":"卢梭与公意"},{"text":"当个人理性与集体理性相背离时，很难根据就集体而言属于理性的方式来实现合作。每一个体都会受一种诱因的驱使而“背叛”，做出从个体的角度看是理性的行为。","count":156,"chapter":"霍布斯"},{"text":"把基于良心的不服从当作叛国，以便维系社会的团结，这确实是错的。持不同意见的公民应该有容身之地。不能为了和平就让他或她保持沉默：或许多数派是错的呢？但是即便多数派是正确的，也仍然应该关注持不同意见者。","count":154,"chapter":"卢梭与公意"},{"text":"霍布斯的平等原则是一种关于所有人身心能力的主张。对洛克来说，它是一个关于权利的道德主张：没有人有一种自然权利让其他任何人从属于自己。","count":150,"chapter":"洛克"},{"text":"太多的导论性著作都给人一种印象：所研究的领域是由教条创立的，所谓的理解就是掌握指南或规则手册。我试图避免这种过度简化。","count":144,"chapter":"第一版前言"}]},"25890906":{"rating":823,"ratingCount":231,"highlights":[{"text":"这些伟大的道德哲学家对我所说的这些会怎么看呢？边沁和穆勒可能会主张，我描绘的这幅画面实际上还是功利主义，只不过进行了乔装打扮，从长远的角度来看问题。而康德很有可能斥之为大众化思考，是“令人作呕的大杂烩”。亚里士多德则可能会宽容些，认为我即便尚未抵达终点，至少正走在通往道德成熟的道路上。而且，他尤其会赞同我们在研究伟大哲学家的著作时，没有把它们纯粹当作某种智力练习，而是将它们用作一种培养道德人生观的途径。但愿我在本书中没有给大家留下“道德哲学不过是一项学术事业”的印象。","chapter":"从道德哲学中学习","color":0},{"text":"鉴于道德哲学强调理性（在康德主义传统中）和计算（在功利主义传统中）的重要性，再辅以只有男性才有能力冷静、有逻辑地进行最高级别的思考这种充满性别歧视的偏见，我们有理由说，女性是被“欺负走的”。因此，道德哲学才会将女性排除在外，成为男性价值观的“殖民地”。","chapter":"权力、特权、多样性","color":0},{"text":"关怀伦理学（在第十一章中曾简单提及）是从女权角度思考伦理学的主要进路，但绝非唯一进路，它同样看重情境，关注每种具体情况的细节，而非追求一般化的公式。此外，关怀伦理学还主张，情感投入和个人关系，尤其是爱、同情和同理心这类关怀性质的关系，对于道德思考来说至关重要。","chapter":"关怀伦理学","color":0},{"text":"一种有影响力的传统认为，康德哲学以及功利主义提供的是一种正义伦理学（ethics of justice，或者更准确一些，是原则伦理学），而非关怀伦理学（ethics of care）。","chapter":"性别与种族：回顾","color":0},{"text":"在为奴隶制辩护的问题上，亚里士多德和洛克半斤八两。他几乎没有投入多少努力，只是说有些人一出生便注定适合统治，而另一些人则适合被统治。他们无法为奴隶制提供合理的根据，这给我们所有人都上了一堂课：对特权盲目且下意识的保护，会明显歪曲我们的分析能力。","chapter":"亚里士多德论性别与种族","color":0},{"text":"实验者提出了这样一个假说：在“实时”的伦理困境中，真正重要的是你所处的境遇本身，而不是你是哪种人。这个观点有时被称为境遇伦理学（situational ethics）。","chapter":"你有品格吗？","color":0},{"text":"但同样重要的是，在道德上有德性的人要能在“高尚与正义的”行为中找到乐趣。如果德性是一种牺牲的话，那么在亚里士多德看来，它就不是严格意义上的德性。","chapter":"德性的习得","color":0},{"text":"我们要习惯成“德性”，必须将四种元素结合在一起：然（是什么），所以然（为什么），实践练习（如何做），乐趣（或许可以说是快乐）。","chapter":"德性的习得","color":0},{"text":"自然赋予了我们接受德性的能力，但只有通过实践，我们才能完全实现它们。","chapter":"德性的习得","color":0},{"text":"自由是克制你的欲望，遵照理性来行动；反过来，理性需要你在行动时，要当作你可以通过你的意志，让你的行为准则成为普遍法则那样。理性——对自由的行使——产生道德。","chapter":"自由与道德","color":0},{"text":"康德提出我们人类非常不善于计算结果，遵循坚定的原则反倒会有更好的表现，","chapter":"运用康德的理论","color":0},{"text":"在康德之前，虽然许多哲学家提供了支持或反对这么做或者那么做的理由，并且给出了详尽的论证，却没能拿出什么可以用来计算答案的正式方法。康德觉得这个缺陷太不光彩，所以决心做得更好。我们可以把他的解决方案描述为几个步骤。在将其应用到某个具体的道德问题上时，你需要回答下列问题：\n1.你打算采取什么行动？\n2.你的行为准则是什么？\n3.a.你会希望你的行为准则成为普遍法则吗？\nb.你是在提议将你自己或者别人仅仅当成一种手段，而非将其当成目的本身来对待吗？\nc.你在行动时遵照的是目的王国中的某个成员为其订立普遍法则时会遵守的准则吗？","chapter":"运用康德的理论","color":0},{"text":"我们认识到在康德看来，生命拥有这种固有价值后，或许才可以开始更好地理解他的立场。与他这个立场相对的观点是，生命本质上至多是一个痛苦和快乐的容器。","chapter":"道德最高原则的表述公式","color":0},{"text":"康德想让我们明白，道德是我们每一个理性生物制定的法律体系，但它也约束着我们每个人。我们通过自己的理性来制定这些法则，但是它们又必须具有普遍性——要约束包括我们自己在内的每个人。","chapter":"道德最高原则的表述公式","color":0},{"text":"本章开头的引文就是人性公式，表述如下：\n你行动时，永远要把人性，无论是你自己的人性，还是他人的人性，同时视作目的，而不仅仅是一种手段。（4:429，p.38）","chapter":"道德最高原则的表述公式","color":0},{"text":"目的王国公式的表述如下：\n你行动时，要按照一个只是可能存在的目的王国中的成员为其订立普遍法则时遵守的准则。（4:439，p.46）","chapter":"道德最高原则的表述公式","color":0},{"text":"在康德的理论中，这是关键所在，因为他主张行为的道德价值不在于其目的，而在于决定该行为时所使用的准则。康德将准则的概念解释为“意志的原则”，并且将“意志”同偏好或情感做了区分。","chapter":"绝对命令","color":0},{"text":"康德说，道德的命令是绝对的，也就是说它们不是假设的或假言的。绝对的意思就是“不容置疑”或者“无条件的”。“不要说谎”便是一种道德的绝对命令，相比之下，“如果你不想惹麻烦，就别说谎”则是一种审慎（prudence）的假言命令，任何主要出于避免惹麻烦而不说谎的人，都不是通过出于义务的目的行事而表现出善良意志。康德会说，他们的行为虽然遵从了道德律，却没有任何道德价值。","chapter":"绝对命令","color":0},{"text":"康德认为，道德的终极原则更接近于逻辑原则，而非科学理论。但是，如果剔除了与人有关的事实，那我们还剩什么？只有康德视为道德的“形式”（formal）特征的东西了。这里的形式就是“形式逻辑”里的那个形式，或者也可以理解为“与理念有关”的东西。因此，康德认定，道德必须基于道德律的形式，或者理念。","chapter":"绝对命令","color":0},{"text":"道德律的主要形式要素是：（a）因为它是道德的，所以具有规范性，也就是说为行为设立标准；（b）因为它是法则，所以具有普遍性。故而善良意志是通过行动表现出来的，而行动则要依照具有规范性、普遍性的道德律的纯粹理念，不掺杂任何经验的东西。","chapter":"绝对命令","color":0},{"text":"但他也承认，在生活中，我们永远都不能确信一个人的行为动机是什么，即便我们自己的动机也一样，因为我们还可能受某种“隐秘”冲动的驱使。因此他说，在世界历史上，可能从未出现过什么真正具有道德价值的行为。","chapter":"善良意志","color":0},{"text":"如果快乐或即时的同情心是你帮助他人的主要理由，那么你的行为便缺乏道德价值。","chapter":"善良意志","color":0},{"text":"康德认为，如果一个人享受向他人传播幸福、为他人做好事，那他们的行为便没有真正的道德价值。他们的行为只有在出于义务的目的时，才拥有道德德性。","chapter":"善良意志","color":0},{"text":"当然，“按照义务”做事要好过诓骗，但道德价值只同行事出于义务目的的人有关。","chapter":"善良意志","color":0},{"text":"与功利主义形成鲜明对比的是，康德认为，善良意志之所以是善的，并非因为它能实现什么，而是因为它本身就是善的。用我们前面提到过的一个说法来讲，就是它拥有固有价值（本身具有价值），而非工具价值（是一种用来完成或实现其他有价值事物的手段）。即便它实际上无法实现任何东西，善本身也是有价值的。","chapter":"善良意志","color":0},{"text":"康德更关心的是从客观上来讲，哪些东西是你可能愿意使之实现的。他更为严格的观点将普遍性同他所谓的理性联系到了一起：什么是你可能或者不可能希望实现的，而不是什么是你喜欢或不喜欢的，甚至也不是如果大家都做出同样的行为会造成什么后果。如果你不可能希望全世界都遵守那条（假设）你用行动使之成真的普遍准则，那你的行为便有违道德。","chapter":"道德的最高原则","color":0},{"text":"在《实践理性批判》一书中，康德写道：“道德实际上并不是有关如何让我们快乐的学说，而是有关我们如何配得上享受幸福的理论。”（1788/1956，p.134）","chapter":"道德的最高原则","color":0},{"text":"（追求道德思考的大众化，会产生）一种令人作呕的大杂烩，里面只有一些东拼西凑的观察和思虑不周的原则，但头脑空空的人却陶醉其中，因为这些在日常闲谈中很有用。\n——伊曼努尔·康德，《道德形而上学原理》","chapter":"第十章 道义论：康德","color":0},{"text":"这也正是为什么穆勒虽然是一位自由和平等的伟大捍卫者，但对于自己作为殖民管理者的身份感到心安理得。在这里，我们便看到了功利主义的偶然性在实际中的运用。它是否推崇自由，取决于许多周遭情况的偶然性。","chapter":"偶然性问题：性别和种族","color":0},{"text":"沁否认了可以为功利主义找到直接证明的可能性，“因为被用来证明其他一切的东西，本身无法得到证明”（边沁，1789/1970，p.13），然后，他提供了一种间接的证明方式。他罗列出了所有他认为可用的道德立场，包括功利主义，然后进行论证，一一驳斥其他理论。这种论证策略很有意思；如果成功，那功利主义便会是唯一立于不败之地的理论。我们可以称之为排除论证（argument by elimination），因为它试图排除所有的竞争者。","chapter":"边沁道德哲学的背景","color":0},{"text":"社会契约道德看起来完全不像某种契约时才会产生最好的效果。如果它看起来太像契约的话，人们或许就会开始怀疑是不是停止合作才符合他们的利益。到那时，契约便会作废。","chapter":"社会契约","color":0},{"text":"但维护者的回应是，利用私利来促进公利，恰恰是资本主义的优势所在","chapter":"伦理利己主义","color":0},{"text":"正如荷兰裔英国思想家伯纳德·曼德维尔（1670—1733）指出的那样，“私人的恶行”带来了“公共的美德”","chapter":"伦理利己主义","color":0},{"text":"总结一下心理利己主义的讨论就是，即便道德确实可以被化约成自利，道德理论家的任务也依然没有完成。原因是道德理论有着各种各样的形式和变体，哪种形式的道德最有利于促进自利并不清楚，所以，即便与我们通常认为的形式有所不同，道德哲学也有必要——因为它引出了短期的自利和利他如何实现最佳搭配，才能保护长期个人利益的问题。","chapter":"自利与进化","color":0},{"text":"自我牺牲根本就不可能有，必然存在别有用心的动机。但为什么必须存在？这个论证是预设了心理利己主义为真，而不是提供了任何相信其为真的理由，对吧？","chapter":"心理利己主义","color":0},{"text":"这个观点可以用所谓的逻辑错误或者谬误来表述，也就是从“是怎样”（事实判断）推出“应该怎样”（价值判断）。所以，人们有时会主张，自然法理论犯的正是这个错误。比如，我们思考一下这个论证：因为性的目的是生育，所以避孕在道德上是错误的。这似乎就是从一个事实（性的目的是生育）得出了一个价值判断（避孕是错误的）。因此可以得出，自然法理论有着致命的缺陷，因为它的基础就是错误的推理。","chapter":"宗教与自然法","color":0},{"text":"因此，自然法理论是目的论道德，将道德规则视为我们完成上帝（或别的）目的的途径。","chapter":"宗教与自然法","color":0},{"text":"两难困境，首先，需要两个选项绝对不同［用哲学术语来说就是，它们必须排他（exclusive），也就是说互不相容］；其次，它们必须包含所有可能性［它们必须穷尽（exhaustive），也就是说把所有的选项都要说到］。","chapter":"神命与游叙弗伦困境","color":0},{"text":"游叙弗伦困境就是指如果上帝发现了道德，那么道德的基础就是独立存在的，与宗教无关；但如果上帝发明了道德，那么它完全有可能是一套任意制定的规则。如果是这样，那么从道德角度来看，我们凭什么要遵守这些规范呢？","chapter":"神命与游叙弗伦困境","color":0},{"text":"因果责任和道德责任不是一回事，二者可以分开：有因果责任而无道德责任，有道德责任而无因果责任，都有可能发生。","chapter":"决定论与道德责任","color":0},{"text":"麦凯的论证可以简单地表述为：\n前提1：如果客观价值存在，那它们必然不存在于物质领域，并且有“固有的‘要做性’”。\n前提2：没有什么可以不存在于物质领域，并且有“固有的‘要做性’”。\n因此，\n结论：客观价值不存在。","chapter":"伦理、语言、形而上学与认识论","color":0},{"text":"斯蒂文森把企图说服的这个要素加入了他对道德判断的分析中：它们在表达你的情绪时，也在邀请他人产生相同的情绪。这种表达主义的扩展形式，更符合我们在日常生活中对道德语言的使用。","chapter":"个人主观主义","color":0},{"text":"非认知主义不认为道德主张表达的是真正的信念，而是认为它们表达的是那些与表达者有关的东西：品味、偏好、情绪或者做判断之人的其他主观想法。","chapter":"个人主观主义","color":0},{"text":"道德陈述表达的是我们的态度或者情感。这类观点被称为情绪主义（emotivism）或表达主义","chapter":"个人主观主义","color":0},{"text":"价值是等待我们去发现的客观存在，还是在某种程度上由我们制造的主观想象？如果确实是我们创造了价值，那么价值是全人类的创造，是某个群体或文化的创造，还是我们每个独立个人的创造？","chapter":"个人主观主义","color":0},{"text":"总而言之，虽然在一定意义上，尼采确实认为道德规范纯粹是弱者用来钳制强者的一种手段，但他的直接目标还是他那个时代的基督教道德。不过，按照我们较为认可的那种解读，尼采的观点似乎是，基督教道德尽管控制着现代生活，但现在已经不合时宜，弊大过了利。而一种更深层次的道德形式——好与坏的道德，而非善与恶——却不会成为弱者用以钳制强者的手段。","chapter":"道德与习俗","color":0},{"text":"人类迄今为止认为重要的那些东西，连现实都不是，只能算是错觉，再严格一点儿说，只能算是病态天性中的糟糕直觉制造出来的谎言。\n——弗里德里希·尼采，《瞧！这个人》","chapter":"第三章 怀疑主义与主观主义","color":0},{"text":"较为适度的“二层面”道德相对主义观点——将所有社会都秉承的道德核心，同各个社会可能在文化上相异的相对主义要素区分开来——是一种可能的妥协。","chapter":"本章回顾","color":0},{"text":"那些青睐相对主义的人想要主张，一个社会不应干涉另一个社会的价值观。但要得出这个结论，就等于在说，文化自主权是一项普遍价值，可这其实是自由主义的一种形式，或者像我说的那样，是一种伪相对主义，不是严格意义上的相对主义。","chapter":"本章回顾","color":0},{"text":"黄对道德规范的两种层面所做的区分。一是所有道德规范共有的“道德核心”：合作、解决冲突和提供美好生活之典范的价值。二是社会的具体实践，它们提供了详细的规则，而且可能因社会的不同而有所差别。那么，问题就成了生殖器切割是否违背了道德核心。在这个问题上，不同版本的道德相对主义或许会有分歧，而这种分歧取决于人们如何看待切割的习俗，以及究竟如何对核心和具体规则做出区分。","chapter":"适度的相对主义","color":0},{"text":"相对于元伦理学，有关“我们应该在道德上怎么做”这类偏实际问题的研究，通常被称为规范伦理学（normative ethics）。","chapter":"道德探究的本质","color":0},{"text":"哲学家为道德哲学划分出了三块不同领域：元伦理学、规范伦理学和应用伦理学。","chapter":"道德探究的本质","color":0}],"thoughts":[{"text":"是先有人的存在，还是先有人的目的意义的存在？","quote":"同样，人类也有用途，如果不能遵循那些可以让他们实现忠于其本质的用途的规则，那么人就会被认为有缺陷。","chapter":""},{"text":"我认为我对某些食物的厌恶是与生俱来的，但对某种道德观念的形成却与成长环境强相关。厄，问题是如何证明我对这种食物的厌恶是与生俱来而非也受环境影响呢？","quote":"非认知主义不认为道德主张表达的是真正的信念，而是认为它们表达的是那些与表达者有关的东西：品味、偏好、情绪或者做判断之人的其他主观想法。","chapter":""},{"text":"似乎有点否定人的思考过程，将情绪发生变成一种开关按钮的触发了。","quote":"道德陈述表达的是我们的态度或者情感。这类观点被称为情绪主义（emotivism）或表达主义","chapter":""}],"popularHighlights":[{"text":"要获得启蒙就要独立思考，不能不假思索地接受别人的思想，连它们是不是有道理都不自己先想一想。","count":306,"chapter":"前言"},{"text":"思考某个道德问题时，关键理念之一是站在他人的角度来看待事物。","count":252,"chapter":"前言"},{"text":"对于道德哲学家而言，有关价值的本质、伦理规则的来源和我们如何了解它们的问题，都是元伦理学（meta-ethics）问题。","count":170,"chapter":"道德探究的本质"},{"text":"道德是一个规范性学科，目的是理解事物应该是什么样，而不是寻找证据来说明事物是什么样。","count":160,"chapter":"道德推理"},{"text":"道德是保护弱者不受强者伤害的一种手段。在某些情况下，如果有机会，真正的强者有权利——甚至有义务——忽略种种规则。","count":144,"chapter":"道德与习俗"},{"text":"这种观点认为价值存在于世界中，不以人类意志为转移，被称为道德实在论（moral realism）","count":126,"chapter":"是客观主义，还是文化相对主义？"},{"text":"我们人类缺乏自由意志，因此对我们的行动不负有道德责任。","count":121,"chapter":"本书的安排"},{"text":"那我们是应该轻描淡写地说这是一种文化差异，还是应该说一个国家在道德上犯了错？不过，一些人仍然坚持认为，一种文化无权评判另一种文化，并且提出，正如礼节规范因文化而异，道德规范同样因文化而不同。","count":120,"chapter":"道德实践的种类"},{"text":"主观主义在没有解决分歧的情况下消解了道德问题，我们能接受吗？","count":112,"chapter":"个人主观主义"},{"text":"在求索智慧这件事上，愿每个人在年少时都不迟钝，在年老后都不倦怠。因为对于灵魂的健康而言，没有哪个年龄是太早或者太晚的。","count":110,"chapter":"第一章 道德哲学与道德推理"},{"text":"柏拉图主张，尘世中的我们永远都无法体验到纯粹的善，因为任何善行或者善人都会有不完美之处。但就如同圆存在完美理型一样，善也存在一种理想的形式，只不过在物质世界中不存在罢了。","count":110,"chapter":"是客观主义，还是文化相对主义？"},{"text":"康德认为，如果一个人享受向他人传播幸福、为他人做好事，那他们的行为便没有真正的道德价值。他们的行为只有在出于义务的目的时，才拥有道德德性。","count":110,"chapter":"善良意志"},{"text":"结构性不公的一个特点便是谁该负责任很难界定，因为这种责任是高度分散的，每个人都承担了一部分。","count":108,"chapter":"采取行动"},{"text":"无论哪个例子，心理利己主义者都可以说，你是在做出短期的牺牲，放长线钓大鱼。这个例子并不能证明长期的自我牺牲行为存在。","count":105,"chapter":"心理利己主义"},{"text":"明白他人受苦——就像你自己也会受苦一样——似乎给了你一个尽力善待他人的理由。但如果这是你在违规后感到难受的理由，那么道德规则似乎就牵涉到某种自利之外的东西。","count":105,"chapter":"心理利己主义"},{"text":"最好的哲学家能做的，也只是启发你找到一种看待世界以及其中每个个体的方法。","count":102,"chapter":"道德哲学的意义"},{"text":"人们时常会求助于道德哲学，是因为他们在人生中遇到某种严重的道德困境后，想要解决它，或者至少想通过了解那些大哲人的著作，让问题有所缓解。","count":98,"chapter":"道德哲学的意义"},{"text":"所以在决定采信哪个理论时，我们要问的是“什么理论能为数据提供最佳解释”，而不是“什么理论最符合数据”。","count":96,"chapter":"道德推理"},{"text":"主观主义观点可以归纳为：能识别善良行为是一回事，但知道社会赞同它们完全是另一回事了。","count":96,"chapter":"客观的道德概念"},{"text":"通过类比来进行论证的好处是，如果我们能在两个探索领域中做出令人信服的比较，那么就可以利用在其中一个领域获得的知识，来阐明另一个领域中的问题，而这可以很有成效。","count":91,"chapter":"道德推理"}]},"26001263":{"rating":796,"ratingCount":4264,"highlights":[],"thoughts":[],"popularHighlights":[{"text":"“有很多像我们一样的人在农场打工，他们是天底下最寂寞的人。他们没有家人，居无定所。他们到农场打工，赚一笔钱，然后到镇上去花个精光，然后，转眼之间，他们已经又在别的农场打工了。他们没有未来，没有希望。”","count":1700,"chapter":"01"},{"text":"人都需要伴——需要感觉有人陪在身边。”他的声音有点呜咽，“人没有伴是会发疯的。只要有人做伴就好，不管是谁都没关系。告诉你。”他忽然大喊，“告诉你，人太寂寞是会生病的。”","count":1520,"chapter":"04"},{"text":"“他是个好人。”史林姆说，“做好人不需要很聪明。我倒觉得，有时候人世间的状况正好颠倒。真正聪明的家伙往往都不是好东西。”","count":1430,"chapter":"03"},{"text":"她的脖子被伦尼扭断了。","count":1411,"chapter":"05"},{"text":"伦尼抬头看着他，一脸悲伤。“老鼠实在太小了。”他拼命解释，“我只不过轻轻摸了一下，老鼠就开始咬我的手指头，我轻轻捏一下它们的头，它们就死了——因为老鼠实在太小了。","count":918,"chapter":"01"},{"text":"我发现很多人都是这样——找个人说话，不管他听得懂听不懂。无所谓，根本无所谓。反正重要的就是找人说话，要不然，安安静静坐着不说话也没关系。反正都一样，没什么差别。","count":910,"chapter":"04"},{"text":"三个人都坐着没动，沉浸在美好的想象中。三个人都在想，等哪天梦想实现了，未来将是多么美好。","count":858,"chapter":"03"},{"text":"乔治慢慢地说：“——我想，其实我一开始就明白，我们是永远办不到的。刚开始只是因为他很喜欢听我讲，后来，我自己也渐渐以为真的办得到。”","count":682,"chapter":"05"},{"text":"明天我们就要上工了。我看到远处有打谷机。也就是说，我们很快就要把整袋的谷子甩上肩，扛来扛去，做牛做马累得半死。所以，今天晚上我打算舒舒服服地躺在这里看天空。我喜欢这种感觉。”","count":644,"chapter":"01"},{"text":"萨利纳斯河静静奔流，流到索莱达南边几公里处，河道忽然逼近山脚，河水陡然变深，水色陡然变绿，河面波光粼粼，流经阳光遍照的黄沙丘，河水逐渐变得温热，然后形成一泓窄窄的水潭","count":555,"chapter":"01"},{"text":"因为我从来没见过有人对别人这么热心，我只是很好奇，你到底有什么目的。”","count":544,"chapter":"02"},{"text":"后来，等他们都走了，坎迪蹲到干草堆上，看着柯利老婆的脸。“你这个可怜虫。”他轻声说。","count":540,"chapter":"05"},{"text":"“进来吧。反正谁都可以进
