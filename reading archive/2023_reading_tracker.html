热情，让他们能够忍受如此可怕的痛苦，现在我已经明白了。他们都凝视过这乳白色的云和向东飘去的乌云，当时他们心里在想些什么，我也明白了。","count":144,"chapter":"Ⅱ 塞巴斯蒂安·罗德里戈的书信"},{"text":"为了教化日本人，为了主的荣光，今天我们历尽艰辛来到这东方，在往后的旅途中等待我们的，恐怕是从非洲到印度洋的海上旅行无法比拟的困难和危险。","count":135,"chapter":"Ⅰ 塞巴斯蒂安·罗德里戈的书信"},{"text":"我们的宗教之所以能如水渗入泥土般在当地农民中传播开来，就是因为这群人有生以来第一次感受到了人性的温暖，因为遇到了把他们当人看的人，是司祭们的仁慈打动了他们的心。","count":120,"chapter":"Ⅲ 塞巴斯蒂安·罗德里戈的书信"},{"text":"大部分中国人对我们的宗教不感兴趣。","count":119,"chapter":"Ⅰ 塞巴斯蒂安·罗德里戈的书信"},{"text":"他们连喜悦和悲伤都不能流露出来，长久的秘密生活让这些信徒的脸变得像面具一样，真是令人感到痛苦和悲哀。我不理解，神为什么要带给信徒们这样的苦难？","count":112,"chapter":"Ⅲ 塞巴斯蒂安·罗德里戈的书信"},{"text":"官差反复告诉信徒们，踩踏圣像只是一种形式，只要踩上去就行了。即使踩了，也不会影响内心的信仰，奉行所也无意追究及此。","count":112,"chapter":"Ⅵ"},{"text":"老实说，我也没想过我们会被抓。人是种奇妙的生物，内心深处似乎总觉得，别人或许在劫难逃，只有自己不论多么危险，必定能安然渡过。","count":110,"chapter":"Ⅲ 塞巴斯蒂安·罗德里戈的书信"},{"text":"我生来就是弱者，上帝却要我效法强者，那不是强人所难吗？","count":110,"chapter":"Ⅵ"},{"text":"“不是的。不妨想象成被妻子背叛的丈夫，他仍然爱着妻子，但无法原谅妻子对自己的背叛。一个还爱着妻子，又对她的行为感到厌恶的丈夫的心情……或许那就是基督对犹大的心态吧。”","count":108,"chapter":"Ⅳ 塞巴斯蒂安·罗德里戈的书信"},{"text":"只有说这些话的时候，费雷拉的眼里才闪着热切的光亮。不知为何，他的表情让人感受到一种真实感，不像是失败者的自我欺骗","count":108,"chapter":"Ⅶ"},{"text":"那不是鼾声。那是信徒们被处以穴吊的呻吟声。”","count":108,"chapter":"Ⅷ"},{"text":"“基督一定会为了他们弃教的！”","count":108,"chapter":"Ⅷ"},{"text":"“神父，这都是因为你们，因为你们把自私的梦想强加给日本。你可曾想过，为了那个梦想，给多少百姓带来了苦难？看！血又在流了，那些懵懂无知的人的血又在流了。”","count":104,"chapter":"Ⅶ"},{"text":"仁慈之道，归根结底就是舍弃自我。所谓自我，就是过分拘泥于宗派之别。在为他人奉献这一点上，佛教和天主教并无二致，重要的是能否身体力行。","count":104,"chapter":"Ⅶ"},{"text":"“基督会弃教的。为了爱，即使牺牲自己的一切。”","count":102,"chapter":"Ⅷ"},{"text":"但，那又怎样？那又如何？能评判我的心的，只有主，而不是那些人。他紧咬着嘴唇，摇摇头。","count":102,"chapter":"Ⅸ"},{"text":"“主啊，我恨你始终沉默。” “我没有沉默，我和你们一起受苦。”","count":100,"chapter":"Ⅸ"},{"text":"“将我们的神扭曲、改变，创造出不同的东西……”司祭反复咀嚼着费雷拉的话，“可那不也还是我们的上帝吗？”","count":98,"chapter":"Ⅶ"}]},"3300108056":{"rating":898,"ratingCount":183,"highlights":[],"thoughts":[],"popularHighlights":[{"text":"做一个不满足的人比做一只满足的猪好","count":30,"chapter":"索引"}]},"CB_1cl3t93s67Nh6eH6cNGu2Dcm":{"rating":0,"ratingCount":0,"highlights":[{"text":"要提高居民收入，就要继续推进城市化，让人口向城市尤其是大城市集聚。虽然制造业是生产率和科技进步的主要载体，但从目前的技术发展和发达国家的经验看，制造业的进一步发展吸纳不了更多就业。产业链全球化之后，标准化程度越来越高，大多数操作工序都由机器完成。比较高端的制造业，资本密集度极高，自动化车间里没有几个工人。美国制造业虽然一直很强大，但吸纳的就业越来越少（图7-6），这个过程不会逆转。所以解决就业和提高收入必须依靠服务业的大发展，而这只能发生在人口密集的城市中。不仅传统的商铺和餐馆需要人流支撑，新兴的网约车、快递、外卖等都离不开密集的人口。要继续推进城市化，必须为常住人口提供相应的公共服务，让他们在城市中安居乐业。这方面涉及的要素市场改革，包括户籍制度和土地制度的改革，第五章已经详细阐释过。","chapter":"第三节 再平衡与国内大循环","color":0},{"text":"虽然从会计核算角度讲，投资确实可以提升当下的GDP数字，但若投资形成的资产不能提高生产率、带来更高的收入，不能成为未来更高的消费，这种投资就没有形成实质性的财富，就是浪费。假如政府借钱修了一条路，很多人都用，降低了通勤和物流成本，提高了生产率，那就是很好的投资。但若政府不断挖了修、修了再挖，或干脆把路修到人迹罕至之处，经济账就算不回来了。这些工程所带来的收入远远抵不上成本，结果就是债务越积越高。虽然修路时的GDP上升了，但实际资源是被浪费掉了。","chapter":"第一节 低消费与产能过剩","color":0},{"text":"GDP由三大部分组成：消费、投资、净出口（出口减进口）。我国加入WTO之后，投资和净出口占比猛增（图7-4），消费占比自然锐减（图7-2）。这种经济结构比较脆弱，不可持续。一来外国需求受国外政治、经济变化影响很大，难以掌控；二来投资占比不可能一直保持在40%以上的高位。超出消费能力的投资会变成过剩产能，浪费严重。","chapter":"第一节 低消费与产能过剩","color":0},{"text":"天马行空的理论还有不少，但语言、文化、习惯等因素长期不变，解释不了我国储蓄率近些年的起起落落，所以还得从分析经济环境的变化入手。目前主流的解释是计划生育、政府民生支出不足、房价上涨三者的共同作用。","chapter":"第一节 低消费与产能过剩","color":0},{"text":"我国居民储蓄率很高，20世纪90年代就达到了25%—30%。同期美国的储蓄率仅为6%—7%，欧洲主要国家比如德、法就是9%—10%。日本算是储蓄率高的，也不过12%—13%。国家之间储蓄率的差异，可以用文化、习惯甚至语言和潜意识来解释。可能中国人历来就是特别勤俭，舍不得花钱。前些年有一个很吸引眼球的研究，讲世界各地的语言与储蓄率之间的关系。很多语言（如英语）是有时态的，因此在讲到“过去”“现在”“未来”时，语法要改变，会让人产生一种“疏离感”，未来跟现在不是一回事，何必担心未来，活在当下就好。因此说这种语言的人储蓄率较低。很多语言（如汉语和德语）没有时态，“往日之我”“今日之我”“明日之我”绵延不断，因此人们储蓄率也较高。(3)","chapter":"第一节 低消费与产能过剩","color":0},{"text":"这些巨大的成功背后，也隐藏着两重问题。第一是内部经济结构失衡：重生产、重投资，相对轻民生、轻消费，导致与巨大的产能相比，国内消费不足，而消化不了的产品只能对外输出。这就带来了第二个问题：国外需求的不稳定和贸易冲突。过去20年，世界制造业中我国的占比从5%上升到28%，对应的是“七国集团”占比从62%下降到37%，而所有其他国家占比几乎没有变化（图7-1）。这背后不仅是中国经济面貌翻天覆地的变化，也是发达国家经济结构的巨大变化。面对剧烈调整，出现贸易冲突甚至贸易战，一点也不奇怪。","chapter":"第七章 国内国际失衡","color":0},{"text":"如果借来的钱能用好，能变成优质资产、产生更高收入，那债务负担就不是问题。但如果投资失败或干脆借钱消费挥霍，那就没有新增收入，还债就得靠压缩支出：居民少吃少玩，企业裁员控费，政府削减开支。但甲的支出就是乙的收入，甲不花钱乙就不挣钱，乙也得压缩支出。大家一起勒紧裤腰带，整个经济就会收缩，大家的收入一起减少。若收入下降得比债务还快，债务负担就会不降反升。这个过程很痛苦，日子紧巴巴，东西没人买，物价普遍下跌，反而会加重实际债务负担，因为钱更值钱了。如果抛售资产去还债，资产价格就下跌，银行抵押物价值就下降，风险上升，可能引发连锁反应。","chapter":"第四节 化解债务风险","color":0},{"text":"银行风险会传导到其他金融部门。比如银行可以把各种按揭贷款打包成一个证券组合，卖给其他金融机构。这种业务挫伤了银行信贷分析的积极性。如果银行借出去的钱转手就能打包卖给下家，那银行就不会在乎借钱的人是不是真的有能力还钱。击鼓传花的游戏，传的是什么东西并不重要，只要有人接盘就行。在2008年金融危机中，美国很多按揭贷款的质量很差，借款人根本没能力还钱，有人甚至用宠物的名字都能申请到按揭，所以这次危机也被称为“次贷危机”。","chapter":"第二节 债台为何高筑欧美的教训","color":0},{"text":"土地价值顺着经济周期起落，繁荣时地价上涨，衰退时地价下跌。而以土地为抵押物的银行信贷也顺着土地价值起落：地价上涨，抵押物价值上行，银行利润上升，资本充足率也上升，更加愿意多放贷，为此不惜降低放贷标准，逐渐积累了风险。经济衰退时，上述过程逆转。所以银行很少雪中送炭，却常常晴天送伞，繁荣时慷慨解囊、助推经济过热，衰退时却捂紧口袋、加剧经济下行。","chapter":"第二节 债台为何高筑欧美的教训","color":0},{"text":"全球金融自由化浪潮始于20世纪70年代布雷顿森林体系的解体。在布雷顿森林体系下，各国货币以固定比例与美元挂钩，美元则以固定比例与黄金挂钩。要维持这一固定汇率体系，各国都需要充足的外汇储备去干预市场，防止汇率波动。所以国际资本流动的规模不能太大，否则就可能冲破某些国家的外汇储备，威胁整个体系。而要限制国际资本流动，就要限制国内银行放贷规模，否则借到钱的居民或企业就会增加消费品或投资品的进出口，过量的国际贸易和结算会引发过量的国际资本流动。\n布雷顿森林体系解体后，发达国家之间实行了浮动汇率，放开了跨境资本流动。企业和居民既可以从本国银行借钱，也可以从外国银行借钱，所以单方面管控国内银行的信贷规模就没用了，于是各国纷纷放松了对银行和金融机构的业务限制，自由化浪潮席卷全球。但银行危机也随之而来。1980年至2010年，全球发生了153次银行危机，平均每年5次。而在布雷顿森林体系下，1945年至1970年，全球总共才发生了2次银行危机。纵观整个19世纪和“二战”之前，全球银行危机的频率都与国际资本流动规模高度相关。","chapter":"第二节 债台为何高筑欧美的教训","color":0},{"text":"诺贝尔经济学奖获得者罗纳德·科斯（Ronald Coase）早在20世纪30年代就问过：“企业和市场的边界在哪里？”“市场如果有效，为什么会有企业？”这些问题不容易回答。如果追问下去，企业和政府的边界又在哪里？从纸面定义看，各种实体似乎泾渭分明，但从实际业务和行为模式来看，融资平台类公司就是企业和政府的混合体，而民营企业如华夏幸福，又承担着政府的招商职能。现实世界中没有定义，只有现象，只有环环相扣的权责关系。或者按张五常的说法，只有一系列合约安排。(9)要想理解这些现象，需要深入调研当事人面临的各种约束，包括能力、资源、政策、信息等，简单的政府—市场二元观，没什么用。","chapter":"第一节 城投公司与土地金融","color":0},{"text":"20世纪八九十年代，大部分城市建设经费要靠财政拨款。1994年分税制改革后，地方财力吃紧，城市化又在加速，城建经费非常紧张，如果继续依靠财政从牙缝里一点点抠，大规模城建恐怕遥遥无期。但要想在城市建设开发中引入银行资金，需要解决三个技术问题。第一，需要一个能借款的公司，因为政府不能直接从银行贷款；第二，城建开发项目繁复，包括自来水、道路、公园、防洪，等等，有的赚钱，有的赔钱，但缺了哪个都不行，所以不能以单个项目分头借款，最好捆绑在一起，以赚钱的项目带动不赚钱的项目；第三，仅靠财政预算收入不够还债，要能把跟土地有关的收益用起来。\n为解决这三个问题，城投公司就诞生了。发明这套模式的是国家开发银行。","chapter":"第二节 地方政府债务","color":0},{"text":"土地的资本化运作，本质是把未来的收益抵押到今天去借钱，如果借来的钱投资质量很高，转化成了有价值的资产和未来更高的收入，那债务就不是大问题。但地方官员任期有限，难免会催生短视行为，寅吃卯粮，过度借债去搞大项目，搞“面子工程”，功是留在当代了，利是不是有千秋，就是下任领导的事了。如此一来，投资质量下降，收益不高，债务负担就越来越重。","chapter":"第二节 土地财政","color":0},{"text":"低收入人群想要提高收入，最直接的方式就是到经济发达城市打工，这些城市能为低技能工作（如快递或家政）提供不错的收入。若人口不能自由流动，被限制在农村或经济落后地区，那人与人之间的收入差距就会拉大，地区和城乡间的收入差距也会拉大。目前，我国人口流动依然受限，以地方政府投资为主推动的城市化和经济发展模式是重要因素之一。重土地轻人，民生支出不足，相关公共服务（教育、医疗、养老等）供给不足，不利于外来人口在城市中真正安家落户，不利于农村转移劳动力在城市中谋求更好的发展。地方政府长期倚重投资，还会导致收入分配偏向资本，降低劳动收入占比，对中低收入人群尤其不利。第七章会讨论这种分配结构及其带来的各种问题，本节先聚焦人口流动问题。","chapter":"第二节 不平衡与要素市场改革","color":0}],"thoughts":[],"popularHighlights":[]},"CB_3Ha8Te8Tz4ST6ej6cN9qK7X3":{"rating":0,"ratingCount":0,"highlights":[{"text":"把他的注意力和对交谈者的兴趣传递给对方，并代表对方提出问题。他提","chapter":"艾里希·弗洛姆生命中的爱","color":0},{"text":"爱的能力取决于我们本人成熟的程度，以及在我们同世界和同自己的关系中能不能发展一直创造性的倾向。这种脱离自己的过程、诞生和成熟的过程需要另一种品质作为必不可少的条件：那就是信仰。爱情是以信仰为基础的。","chapter":"第四章　爱的实践","color":0},{"text":"但是做一些简单的练习就能帮助他集中，譬如：轻松地坐着（即不要懒散，也不要紧张），把眼睛闭上，努力使自己的眼前出现一片白色，并排除一切干扰自己的画面和念头。然后可试着观察自己的呼吸——不要去想它，也不要去影响它，而只是要意思到自己在呼吸。另外还要试着得到一种“自我”的感受；我=我的自己+我的力量的中心+我的世界的创造者。至少每天早晨要做二十分钟这样的练习（如果有可能还有延长）和每晚睡觉前坚持练习。","chapter":"第四章　爱的实践","color":0},{"text":"另一方面，我们的宗教状况也反映了当代西方资本主义社会的新特征。在这里，为了说明问题我想重复一下我前面提到的一些结论。现代人已经变成了一种商品，他体验到的生命力是一笔资本，他可以根据他在人口市场的地位用这笔资本去获得尽可能高的利润。他捅他自己、同他同时代的人和大自然产生异化。他的主要目标是要把他的技能、知识和人格同他人进行有利交换，而那些人则与他一样的行事。生活只有一个目的，那就是要活下去，准则只有一个，那就是做一笔好买卖，满足消费的要求。","chapter":"第三章　爱情及其在当代西方社会的衰亡","color":0},{"text":"爱情只能产生于这样两个人中间，这两个人都从他们生存的圈子里跳出来并互相结合，同时他们每个人都又能脱离自我中心去体验自己。只有这种“中心体验”才是人的现实，才是生活，才是爱情的基础。这样体验到的爱情是不断地挑战，这种爱情不是避风港，而是一种共同的努力、成长和劳动。如果两个人能从自己的生命的本质出发，体验到通过与自觉地一致，与对方结成一体，而不是逃离自我，那么在这样的基本事实面前，就连和谐、冲突、欢乐和悲伤这样的东西也就只能退居第二位了。“爱情的存在只有一个证明：那就是双方联系的深度和每个所爱之人的活力和生命力。这也是我们所能看到的爱情的唯一成果。”","chapter":"第三章　爱情及其在当代西方社会的衰亡","color":0},{"text":"在另一种给位严重的病态爱情形式中，患者同母亲的联系更深，也更缺乏理性。在这种情况下，形象地说，问题不在于病人想回到母亲爱护的双臂之中或者给予养料的乳房，而是回到母球接受一切——和破坏一切——的怀抱里。如果说精神健康的本质在于脱离母亲的子宫，进入世界，那么严重精神病的本质就是被母体所吸引，要重新回到母体——也就是被夺走生命。这种联系往往出现在和母亲的关系中，他们的母亲以这种接受——破坏的方式同孩子联系在一起。又时她们是以爱的名义，有时是以履行责任的名义要在自己身上保留孩子，保留成长的孩子以及成年后的孩子。只有通过她们，孩子才能呼吸。这些男子除了一些侮辱女性的表面关系外不可能爱别的女人。她们不能自由和独立，而只能永远是一个残废者或者是一个罪犯。","chapter":"第三章　爱情及其在当代西方社会的衰亡","color":0},{"text":"把爱情看作是性满足的产物，把爱情看作是结伴思想和防止孤独的避风港，这两种观点是西方社会中爱情衰亡的两种“正常”形式，是由社会决定并造成的爱情病理学。这种病理学有许多个性化的形式，其结局都是自觉地受苦。","chapter":"第三章　爱情及其在当代西方社会的衰亡","color":0},{"text":"决定弗洛伊德理论的第二个因素是当时占主导地位的有关人类学的思想，这种思想是以资本主义的结构为基矗为了证明资本主义符合人的自然要求，就必须先证明人就其本质来看是一个竞争者，是他人的敌人。经济学家根据人具有追求利润的不可遏制的愿望和达尔闻达尔文主义者根据弱肉强食的生物原则都证明了这一观点，而弗洛伊德则通过男人被占有所有女性的愿望所驱使，只是社会的压力迫使他们收敛的观点得出同样的结论。因此按照弗洛伊德的观点所有的男子都相互妒忌，并且即使造成这种妒忌的所有社会和经济的原因都一概消失后，这种妒忌、这种竞争仍将存在。 　　","chapter":"第三章　爱情及其在当代西方社会的衰亡","color":0},{"text":"所有这一切无非是表明这两个人的关系如上了油一样毫无摩擦，但这两个人一辈子都会互不了解，永远达不到“中心关系”，而是敬如宾客，只是尽力使对方舒适而已。这样的爱情和婚姻概念实际上是强调保护自己免遭不可忍受的孤独感的侵袭。在“爱情”中人们终于找到了避风港。两个人结成用以反对全世界的同盟，却把这种两个人的自私看作是爱情和信赖。","chapter":"第三章　爱情及其在当代西方社会的衰亡","color":0},{"text":"人与人之间的隔膜得不到克服，这种感觉就会不断出现。但我们的文明提供了各种可能性，使人们感觉不到这种孤独。这首先就是人们每天都重复着千篇一律僵化的机械性工作，这种工作秩序使他们不再自觉地感到人追求超越和统一的基本要求。但是光靠这个还不行，因此人就通过享受，通过娱乐工业提供的音乐、画片，以及通过不断地购买新的物品去减少这种尚未意识到的绝望。事实上现代人很像休克斯勒尔（休克斯勒尔(1894——1963),美国作家，深受佛教的影响。——译者注）在他的《美丽的新世界》一书中描绘的那付样子：“营养充分，穿戴讲究，性欲得到满足，但却没有自我，同他同时代的人也只有表面的接触。”","chapter":"第三章　爱情及其在当代西方社会的衰亡","color":0},{"text":"　　那结果是什么呢？如果就是现代人对自己、对同代人和对大自然产生异化。他变成一种商品，体验到自己的生命力实际是一笔资本，这笔资本在既定的市场条件下要给他带来最大的利润。人与人之间的关系从本质上来看是互为陌生的，是自动机器之间的关系，其安全感的基础就是要想方设法靠拢一群人，在思想、感情和行动中同这一群人保持一致。虽然每个人都努力同别人接近，但实际上都是孤独的，充满了不安全感、恐惧感和负罪感。","chapter":"第三章　爱情及其在当代西方社会的衰亡","color":0},{"text":"资本集中带来的另一个决定性特点是劳动组织的特殊形式，这也是现代资本主义的特点之一。高度集中、分工严密的企业导致一种新的劳动组织，在这一组织中个人失去了个性，而成为机器中一个可以随时调换的齿轮。现代资本主义中个人的问题可以归纳如下：　　现代资本主义需要大批能在一起协调工作的人。这些人对消费的需求越来越高，但他们的口味是标准化的，既容易受到控制，又能预测。现代资本主义需要的人是一方面能感觉到自己是自由和独立的并相信自己不屈服于任何权威、原则和良心，另一方面他们又准备执行命令，完成别人交给的任务，服服贴贴地进入社会这部机器中去，规规矩矩地听人摆布，自愿服从领导，盲目地受人指挥——只有一个例外，那就是他们要不遗余力地干活，永远地发挥作用和力争晋升。","chapter":"第三章　爱情及其在当代西方社会的衰亡","color":0},{"text":"在人类历史上我们看到，或可以预知这一发展：对神的爱一开始是完全依赖同母神的联系，然后发展到无条件的服从一个像父亲那样的神，最后发展到成熟的阶段。在这个阶段，神不再是独立于人之外的势力，人自己就体现了爱和正义的原则并同神合二为一，而且人只是在一种充满诗意的象征意义上谈及神。","chapter":"第二章　爱情的理论","color":0},{"text":"在占统治地位的西方宗教中对神的爱基本上就是相信神，相信神的存在，相信神的正义和神的爱。对神的爱基本上是一种思想上的体验。在东方宗教中和在西方的神秘主义中对神的爱是一种对统一和爱的强烈感情体验，这种体验同生活中的每一种爱神的表现不可分割。","chapter":"第二章　爱情的理论","color":0},{"text":"因此东方的思想导致宽容和努力改造人自身（但不导致技术），与此相反，西方的立场导致不宽容、教义和科学、天主教和原子能的发现。","chapter":"第二章　爱情的理论","color":0},{"text":"人的全部生活，每一件微不足道和每一件事关重大的行动都取决于对神的了解，但这种了解不是通过正确的思考，而是通过正确的行动得来的。这一点在东方宗教中表现尤为明显。无论是婆罗门教，佛教还是道教，宗教的最终目的不是正确的信仰，而是正确的行动。在犹太教中也可以找到这一点。在犹太教的传统中，几乎没有出现过由信仰引起的教会分裂。","chapter":"第二章　爱情的理论","color":0},{"text":"我上面谈到了亚里士多德逻辑同悖论逻辑之间的区别，这样就为我下面阐明这两种逻辑对神爱概念理解的区别打下了基矗悖论逻辑的导师认为人只有在现实的矛盾中才能感觉现实，人永远无法在思想上把握最终实体，把握宇宙。这一理论的结论就是人们不应该把从思想上找到答案看作最终目的。思想只能使我们认识到思想不能使我们作出最终回答，思想的世界囿于悖理之中。最终把握世界的唯一可能性不在思想，而在体验统一。这样悖论逻辑就导致下列结论：对神的爱既不是从思想上了解神，也不是指自己爱神的思想，而是在爱的体验中体验自己同神的一致。","chapter":"第二章　爱情的理论","color":0},{"text":"悖论逻辑对神的概念具有根本性的意义。只要神体现最终现实，只要人的精神只能在矛盾中感觉现实，就不可能对神下一个肯定的定义。在吠檀多经中一个全知和全权的神是无知的最高形式，这里我们就可以看到这一思想同道家的无名，同向摩西现身的无名上帝以及同爱克哈特的“绝对虚无”是有联系的。人只能认识否定，而不能认识对最终实体的肯定。“人根本不可能知道神是什么，人也许能知道一些神不是什么……这样理智就不会满足于任何物体，而是越来越渴望追求最终的至善至美。”对爱克哈特来说“神明就是否定之否定，否认之否认……所有创造物内部都有一种否定，否定自己是另外一种事物”。由此就可得出，对爱克哈特大师来说神只是“绝对虚无”，就象最终现实对喀巴拉(喀巴拉，原意为“传授之教义”，犹如犹太教神秘主义体系。——译者注)来说是无穷一样。","chapter":"第二章　爱情的理论","color":0},{"text":"一切有能力爱别人的人必定也爱自己。原则上爱自己和爱别人是不可分的。真正的爱是内在创造力的表现，包括关怀、尊重、责任心和了解诸因素。爱不是一种消极的冲动情绪，而是积极追求被爱人的发展和幸福，这种追求的基础是人的爱的能力。","chapter":"第二章　爱情的理论","color":0},{"text":"同父亲的关系则完全不同。母亲是我们的故乡，是大自然、大地和海洋。而父亲不体现任何一种自然渊源。在最初几年内孩子同父亲几乎没有什么联系，在这个阶段父亲的作用几乎无法同母亲相比。父亲虽然不代表自然世界，却代表人类生存的另一个极端：即代表思想的世界，人所创造的法律、秩序和纪律等事物的世界。父亲是教育孩子，向孩子指出通往世界之路的人。","chapter":"第二章　爱情的理论","color":0},{"text":"“先结婚，后恋爱”的说法。在现代西方世界这种观点被视为是完全错误的。人们认为爱情是一种自发的感情反应，人们会突然被一种无法抗拒的感情所控制。这里人们只看到两个人的特点，而没有看到——所有的男人都是亚当的一部分，所有的女人都是夏娃的一部分这一事实。人们拒绝认识性爱的一个重要因素：即意志的因素。爱一个人不仅是一种强烈的感情——而且也是一项决定，一种判断，一个诺言。如果爱情仅仅是一种感情，那爱一辈子的诺言就没有基矗一种感情容易产生，但也许很快就会消失。如果我的爱光是感情，而不同时又是一种判断和一项决定的话，我如何才能肯定我们会永远保持相爱呢？","chapter":"第二章　爱情的理论","color":0},{"text":"如果男女双方确实相爱，他们的性爱就具备一个先决条件——那就是我从我生命的本质出发去爱对方，并且去体验对方的本质。人就其本质来看都是一样的，我们既是整体的部分；又是整体，因此实际上爱谁都一样。从根本上来看爱情是意志的行为，是人作的一项把全部生命交付对方的决定。","chapter":"第二章　爱情的理论","color":0},{"text":"大多数人认为性要求是同爱情联系在一起的，所以他们很容易得出具有迷惑性的结论：即如果两个人互相愿意占有对方的身体，他们就是互爱了。爱情毫无疑问会引起性结合的要求，在有爱情的情况下，这种生理关系就不会带有占有或被占有的野心和欲望，而是充满了温柔。如果生理上的结合要求不是以爱情为基础，如果性爱不具有博爱的成分，那么只会造成一种纯生理的暂时的结合。性的吸引力虽然在一刹那间会造成两者结合的幻觉，但是如果没有爱情，在这次结合后留下来的只有陌生的感觉，他们之间的距离没有缩校他们仍是一对陌生人，他们不是觉得羞愧，就是相互憎恨，因为他们比过去更强烈地感受到在幻觉消失后留下来的这种陌生感。温柔绝不是如弗洛伊德所说是性本能的升华，而是博爱的一种直接表现，既表现在爱的生理形式中，也表现在爱的非生理形式中。","chapter":"第二章　爱情的理论","color":0},{"text":"在这个意义上，没有能力爱的妇女当她们的孩子幼小时，可以是一个很娇惯孩子的母亲，但永远成不了爱孩子的母亲。检验这一点的试金石是看一个母亲愿意不愿意忍受同孩子的分离，以及在分离后能不能继续爱孩子。","chapter":"第二章　爱情的理论","color":0},{"text":"在性爱中两个迄今为止分开的人结合在一起，而在母亲中过去是一体的两个人分开了。母爱不仅应该允许这一分离，而且还应该希望并促成这一分离。只有在这个阶段，母爱才成为一项艰巨的任务，因为这时就要求母亲无私并能贡献出一切，除了被爱者的幸福一无所求，但恰恰在这点上许多母亲都失败了。","chapter":"第二章　爱情的理论","color":0},{"text":"虽然对母亲的动机各有解释，但最重要的动机是我们称之为“超越自己”的追求。这一追求属于人的最基本要求，并以人的觉悟和下列事实为基础：即人对自己的纯生物作用不满，他不能忍受自己仅仅是被扔进这一世界的小卒。他一定要感到自己是创造者，是能超越处于被创造者消极地位的生命。满足这一要求有许多可能性，最自然和最基本的途径就是母亲对自己创造物的关怀和爱。在孩子身上母亲超越了自我，她对孩子的爱使她的生活产生新的意义。(正因为男子不能通过生育来满足超越自己的要求，所以他只能通过用双手创造物体和创造思想来证明他的创造能力。)","chapter":"第二章　爱情的理论","color":0},{"text":"爱首先不是同一个特殊的人的关系，而更多的是一种态度，性格上的一种倾向。这种态度决定一个人同整个世界，而不是同爱的唯一“对象”的关系。如果一个人只爱他的对象，而对其他的人无动于衷，他的爱就不是爱，而是一种共生有机体的联系或者是一种更高级意义上的自私。尽管如此大多数人都认为爱情取决于对象，而不是能力。他们甚至认为专爱一个人就是强烈爱情的证明。我们在上面已经提到过这一错误的结论。正因为人们不是把爱情看作是一种积极的行动，灵魂的一股力量，所以他们认为只要找到爱的对象就行，别的东西自然而然就会产生。可以把这一态度同想画一张画的人作一比较：这个人虽然想画画，但他不是去学绘画这门艺术，而是强调他首先要找到他愿意画的合适的对象。如果他找到了这么一样东西，他也就能画了。如果我确实爱一个人，那么我也爱其他的人，我就会爱世界，爱生活。如果我能对一个人说：“我爱你”，我也应该可以说：“我在你身上爱所有的人，爱世界，也爱我自己。”","chapter":"第二章　爱情的理论","color":0},{"text":"一个成熟的人最终能达到他既是自己的母亲，又是自己的父亲的高度。他发展了一个母亲的良知，又发展了一个父亲的良知。母亲的良知对他说：“你的任何罪孽，任何罪恶都不会使你失去我的爱和我对你的生命、你的幸福的祝福。”父亲的良知却说：“你做错了，你就不得不承担后果；最主要的是你必须改变自己，这样你才能得到我的爱。”成熟的人使自己同母亲和父亲的外部形象脱离，却在内心建立起这两个形象。","chapter":"第二章　爱情的理论","color":0},{"text":"给比得更能使自己满足，更能使自己快乐，爱要比被爱更重要。通过爱他就从他的由自恋引起的孤独中解脱出来，他开始体验关心他人以及同他人的统一，另外他还能感觉到爱唤起爱的力量。他不再依赖于接受爱以及为了赢得爱必须使自己弱孝孤立无援、生病或者听话。天真的、孩童式的爱情遵循下列原则：“我爱，因为我被人爱。”成熟的爱的原则是：“我被人爱，因为我爱人。”不成熟的、幼稚的爱是：“我爱你，因为我需要你”，而成熟的爱是：“我需要你，因为我爱你。”","chapter":"第二章　爱情的理论","color":0},{"text":"我被人爱是因为我是我。母爱的体验是一种消极的体验。我什么也不做就可以赢得母亲的爱，因为母亲是无条件的，我只需要是母亲的孩子。母爱是一种祝福，是和平，不需要去赢得它，也不用为此付出努力。但无条件的母爱有其缺陷的一面。这种爱不仅不需要用努力去换取，而且也根本无法赢得。如果有母爱，就有祝福；没有母爱，生活就会变得空虚——而我却没有能力去唤起这种母爱。","chapter":"第二章　爱情的理论","color":0},{"text":"通过创造性的劳动达到的统一不是人与人之间的统一。通过纵欲达到的统一是暂时的。通过同一组人同一和适应这一组人达到的统一仅仅是一种假统一。对人类存在问题的真正的和全面的回答是要在爱中实现人与人之间的统一。","chapter":"第二章　爱情的理论","color":0},{"text":"同性恋爱的变异是达不到两极结合所造成的，因此同性恋爱者永远不会脱离孤独的折磨。同性恋者同不能施爱的异性恋者，都实现不了两极的结合。","chapter":"第二章　爱情的理论","color":0},{"text":"只有爱情才能带给我知识，在结合的过程中回答我提出的问题。在爱情中，在献身中，在深入对方中，我找到了自己，发现了自己，发现了我们双方，发现了人。 　　","chapter":"第二章　爱情的理论","color":0},{"text":"通过他的给，他丰富了他人，同时在他提高自己生命感的同时，他也提高了对方的生命感。他给并不是为了得，但是通过他的给，不可避免地会在对方身上唤起某种有生命力的东西。因此他的给同时也包括了使接受者也成为一个给的人，而双方都会因为唤醒了内心的某种生命力而充满快乐。在给的行为中诞生了新的东西，给和得的人都会感谢这新的力量。这一点表现在爱情上就是：没有生命力就是没有创造爱情的能力。马克思极其优美地表达了上述思想。他说：“如果你以人就是人以及人同世界的关系是一种充满人性的关系为先决条件，那么你只能用爱去换爱，用信任换取信任。如果你想欣赏艺术，你必须是一个有艺术修养的人；如果你想对他人施加影响，你必须是一个有艺术修养的人；如果你想对他人施加影响，你必须是一个能促进和鼓舞他人的人。你同人及自然的每一种关系必须是你真正个人生活的一种特定的、符合你的意志对象的表现。如果你在爱别人，但却没有唤起他人的爱，也就是你的爱作为一种爱情不能使对方产生爱情，如果作为一个正在爱的人你不能把自己变成一个被人爱的人，那么你的爱情是软弱无力的，是一种不幸。”","chapter":"第二章　爱情的理论","color":0},{"text":"如果我们把这一原则用来解释各种特殊的现象，就不难认识这一原则的有效性。最基本的例子可以在性范畴里找到。男子性行为的最高峰就是一种给的行为：男子把自己的性器官交给女子，在达到性高潮的一刹那，他把精液给予对方。只要他不是阳痿，他就必须这么做。如果他不能给，他就是阳痿。女子也是如此，只不过表现形式复杂一点罢了。女子交出自己，她打开通向女性内部的大门，在接受的同时她也给予，如果她没有能力给，而只能得，她就是性冷淡。在女子身上给的行为还表现在她作为母亲的作用上。她把她的养料给予她肚中的胎儿，后来又给婴儿喂奶和给予母体的温暖。对女子来说不能给是极其痛苦的。","chapter":"第二章　爱情的理论","color":0},{"text":"同共生有机体结合相对立的是成熟的爱情，那就是在保留自己完整性和独立性的条件下，也就是保持自己个性的条件下与他人合二为一。人的爱情是一种积极的力量，这种力量可以冲破人与人之间的高墙并使人与人结合。爱情可以使人克服孤寂和与世隔绝感，但同时又使人保持对自己的忠诚，保持自己的完整性和本来的面貌。在爱情中出现了两个生命合为一体，却依然保持两体的怪现象。","chapter":"第二章　爱情的理论","color":0},{"text":"就象被他控制的人脱离不了他一样，施虐淫者也离不开他的崇拜者，双方都不能失去对方。区别只在于——施虐淫者命令、利用、损害和欺压对方，而对方则乐于被他左右。从现实的角度来看似乎他俩之间存在着很大的差别，但从更深的意义来看他俩的区别不比他俩的共同点重要，他俩的共同点是在结合的过程中双方都失去其独立性行完整性。如果我们理解这一点，就不难确定一般来说一个人会根据不同的对象作出施虐癖和被虐癖的反应。希特勒对其他人首先是施虐淫者，但面对他的命运、历史和自然的“威力”作出的却是被虐淫者的反应。","chapter":"第二章　爱情的理论","color":0},{"text":"达到统一和和谐的第三种可能性是创造性的劳动，无论是艺术家还是手工业者的劳动都属于此类劳动。","chapter":"第二章　爱情的理论","color":5},{"text":"一个被围困在这么一个\n　　罗网之中的人如何才能不忘记他是一个人，只存在一次的人，只有一次生存的机会，能经历希望、失望、担心和恐惧的人，渴望爱情和受到虚无和孤独威胁的人呢？","chapter":"第二章　爱情的理论","color":5},{"text":"启蒙运动的哲学论点——灵魂是不分性别的——被广泛使用。性别的两极消失了，以这两极为基础的性爱也随之而消失。男子和妇女完全相同，而不是作为对立的两极而平等。现代社会鼓吹实现非个性化的平等理想，因为这个社会需要“人——原子”，这些人原子相互之间没有区别，汇集起来也能毫无摩擦地顺利地发挥作用，他们都服从同一个命令，尽管如此，每个人却都确信他们是在按自己的意愿办事。就象现代化的大规模生产要求产品规格化，社会的发展也要求人的规格化，并把这称为“平等”。","chapter":"第二章　爱情的理论","color":5},{"text":"他们一方面想通过酗酒和吸毒去克服孤独感，但在纵欲以后他们的孤独感却加剧了，所以不得不更经常地，更强烈地去重复纵欲行为。在某种程度上性纵欲是克服孤独感的一种自然和正常的方式，并有部分效果。许多不能用其他的方式减轻孤独感的人很重视性纵欲的要求，实际上这和酗酒和吸毒并无多大区别。有些人拼命地想借性纵欲使自己克服由于孤独而产生的恐惧感，但其结果只能是越来越孤独，因为没有爱情的性交只能在一刹那间填补两个人之间的沟壑。","chapter":"第二章　爱情的理论","color":0},{"text":"亚当和夏娃之所以羞愧是因为他俩都看到了对方的性部位？这种解释肯定不对。如果我们这样理解这一故事，我们就忽视了主要的一点，那就是：男女在意识到自己和对方后，也就意识到了他俩之间的区别和距离，知道他俩属于不同性别。由于他们认识到他们之间的区别，所以他们就相互陌生起来，因为他们还没有学会去爱对方——亚当把责任推卸到夏娃身上，而不是试图为夏娃辩护这一事实就证明这一点。意识到人与人之间的距离，而又没有通过爱情去达到新的结合——这就是羞愧的根源，同时也是负罪和恐惧的根源。","chapter":"第二章　爱情的理论","color":0},{"text":"人拥有理智；人是生命，一种意识到自我存在的生命。人意识到自己，他人，人的过去和发展前途的可能性。人对他的单一存在的觉悟，对他短暂生命的觉悟，人意识到生不由己，死的必然，人知道自己的孤独和与世隔绝，意识到面对社会和自然的威力自己的无能为力——所有这一切都使他的特殊和孤寂的存在成为无法忍受的监禁。如果人不能从他的监狱中解放出来和打碎这一监狱，如果他不能以这种或那种方式，同他人或周围世界结合在一起，他就会疯狂。","chapter":"第二章　爱情的理论","color":0},{"text":"在一个商业化占统治地位以及把物质成功看得高于一切的文化中，事实上是没有理由对下列事实抱有吃惊的态度：人与人之间的爱情关系也遵循同控制商品和劳动力市场一样的基本原则。","chapter":"第一章　爱是一门艺术吗？","color":0},{"text":"十九世纪在许多传统的文化中爱情往往不是自发的、最后导致婚姻的个人经历。婚姻多半是通过男女双方的家庭、介绍人或者在没有撮合者的情况下以条约的方式确定下来并进行的。婚姻要门当户对。至于爱情，人们认为婚后自然而然就会产生。但最近几十年来，浪漫式的爱情这一概念在西方世界已被普遍承认。尽管传统形式在美国依然可见，但人们更多的是寻求“浪漫式的爱情”，寻求个人的会导致辩证法的爱情经历。这种自由恋爱的新方式必定会大大提高爱的对象的重要性，而不是爱情本身的作用意义。","chapter":"第一章　爱是一门艺术吗？","color":0}],"thoughts":[{"text":"爱，是快乐的给予","quote":"如果我们把这一原则用来解释各种特殊的现象，就不难认识这一原则的有效性。最基本的例子可以在性范畴里找到。男子性行为的最高峰就是一种给的行为：男子把自己的性器官交给女子，在达到性高潮的一刹那，他把精液给予对方。只要他不是阳痿，他就必须这么做。如果他不能给，他就是阳痿。女子也是如此，只不过表现形式复杂一点罢了。女子交出自己，她打开通向女性内部的大门，在接受的同时她也给予，如果她没有能力给，而只能得，她就是性冷淡。在女子身上给的行为还表现在她作为母亲的作用上。她把她的养料给予她肚中的胎儿，后来又给婴儿喂奶和给予母体的温暖。对女子来说不能给是极其痛苦的。","chapter":""},{"text":"第一种是药物、性，宗教仪式等带来的精神迷狂，第二种是被曲解的对平等的理解","quote":"达到统一和和谐的第三种可能性是创造性的劳动，无论是艺术家还是手工业者的劳动都属于此类劳动。","chapter":""}],"popularHighlights":[]},"CB_GskDcQDdg53k6eq6cN9uhAFt":{"rating":0,"ratingCount":0,"highlights":[{"text":"再没有比火车更能代表二十世纪文明的了。把几百个人圈在一个箱子里，轰轰隆隆拉着走。它毫不讲情面，闷在箱子里的人们都必须以同样速度前进，停在同一个车站，同样沐浴在蒸汽的恩泽里。人们说乘火车，我说是装进火车；人们说乘火车走，我说是用火车搬运。再没有比火车更加轻视个性的了。文明就是采取一切手段最大限度地发展个性，然后再采取一切手段最大限度地践踏个性。给予每人几平方的地面，让你自由地在这块地方起卧，这就是现今的文明。同时将这几平方的地面围上铁栅栏，威吓你不准越出一步，这也是现今的文明。","chapter":"十三","color":5},{"text":"他心地通达，像一个无底的布袋，毫无阻隔。他随处而动，任意而为，腹内没有沉积一点尘埃。如果他的脑里能体会出一点趣味，他就会立即与之同化。他在行屎走尿之际也完全是作为一个艺术家而存在。而在我，当被侦探计算放多少屁的时候，是无法成为画家的。我能面对画架，我能手握调色板，但是不能当画家。我来到无名的山乡，将五尺瘦躯埋藏在春意阑珊的景色里，我身上才会具有真正艺术家的气质。一旦进入此种境界，美的天下尽归我有。即使不染尺素，不涂寸缣，我也是第一流的大画家。","chapter":"十二","color":5},{"text":"旷达和天真显现出余裕，而余裕之于画，之于诗，乃至于文章，皆为必备的条件。当今艺术的一个弊端就是所谓文明的潮流一味驱使艺术之士，使他们拘束于一格，随处做龌龊的表演。裸体画就是一个好的例证。都市里有叫艺妓的女人，以出卖色相，向人献媚为职业。她们接待嫖客时，只专心考虑自己的姿色如何映入对方的眼睛，此外再也不能发挥任何表情。年年看到的美术沙龙的目录中，充满着类似艺妓的裸体美人。这些裸体美人不但一分一秒都没有忘记自己的裸体，并且全身绷紧一种力量，努力把自己的裸体向观众显露出来。","chapter":"七","color":5},{"text":"技巧达到极端的时候，强加于观者，人们就给予鄙视。这是例子，说明善的东西，倘若不择手段过分加以强调，反而会使美减弱。有一句处世的谚语，叫做“满招损”，说的就是这个道理。","chapter":"七","color":5},{"text":"旅行的时候，是一副常人的心境，讲述经历的时候，则已经是诗人的态度了。因而就产生了这样的矛盾。看来，在这个四角形的世界里，磨掉名为“常识”的这一角而居住在三角形里的人们，便可称为艺术家吧。","chapter":"三","color":5},{"text":"如果说睡眠是二十世纪所需要的，那么这种含有出世意味的诗作，对于二十世纪来说也是宝贵的。遗憾的是，如今写诗和读诗的人，全都受到西洋人的影响，没有人愿意驾起扁舟，悠悠然去追溯桃花源的所在了。","chapter":"一","color":5}],"thoughts":[],"popularHighlights":[]},"CB_7nGDr0Du8CFz6f96gWFtI3J9":{"rating":0,"ratingCount":0,"highlights":[{"text":"在行为设计领域，我们将动机短期激增的现象称为动机波浪。你以前一定有过这样的经历：你的动机冲到顶峰，随后急转直下。或许你会责备自己没能坚持下来，但这不怪你，这就是动机在生活中的运作方式。","chapter":"明明拥有动机却还是无法改变的5个原因","color":5},{"text":"动机的确是行为的驱动要素之一，但问题在于，动机往往是易变的，而本章将深入探讨它所带来的挑战。动机就像是一位酒肉朋友，你可以和它一起玩乐，却不能指望它会去机场接你。","chapter":"明明拥有动机却还是无法改变的5个原因","color":5}],"thoughts":[],"popularHighlights":[]},"CB_6nZBC5BEa9Gu6fs6gWE3T2ql":{"rating":0,"ratingCount":0,"highlights":[{"text":"希腊语中用以指代“墓丘”，即埃尔佩诺尔请求奥德修斯为自己“堆一座墓丘”时所用的词是sêma。这个单词可表示“墓”或“坟”，但仅作该词第二重释义：它最初指“记号”或“信号”，在英语单词semiotics（符号学）中仍可觅得这一释义的踪迹，符号学是一种研究符号与象征的学科，一种关于意义本身如何被生产的哲学理论。《奥德赛》中的坟墓或sêmata（sêma的复数形式）极为重要，由建造它们的希腊人看来，其作用在于为墓主传递信息，意在叙事。","chapter":"记号（标记）","color":5},{"text":"从弗雷德身上，我明白了美与愉悦才是教学的重中之重。最好的教师希望学生发现事物的意义，那些事物也曾带给他无限愉悦，如此一来，即使教师不在了，对美的理解与欣赏也会长存于学生心中。由此看来——因这结论的前提是人必有一死——教书育人与养儿育女亦有类似之处，优秀的教师就像称职的家长。","chapter":"还乡（回家）","color":5},{"text":"nostos在希腊语中意为“还乡”；该词复数形式nostoi实为一部失传史诗的标题，讲述了曾于特洛亚作战的希腊国王及首领的还乡之旅。《奥德赛》本就是一个nostos故事，且这部史诗常常为简述其他角色的nostoi故事而偏离奥德修斯回伊塔卡的曲折旅路，正如涅斯托尔在这里所做的——简直像担心这些还乡故事无法自行安然传世。随时光流逝，nostos这个深植于《奥德赛》故事主题中的伤感词语，最终与希腊语表疼痛的浩瀚词库中的一个词algos结合在一起，让我们得以用一种优雅而简洁的方式表述那种特殊、恼人的向往时而引发的悲喜交集之感。该词字面意思为“与思乡相系的苦楚”，但正如我们所知，“家乡”，尤其随着我们年岁渐长，可以是地点，还可以是时间。这个词是nostalgia(17)。","chapter":"1．教育（父与子）","color":5},{"text":"所以出现在《奥德赛》第一行的polytropos（“许多转折的”“盘旋数圈的”）一词，不仅暗指诗歌主人公的本性，也暗指诗歌的本质，它间接表明讲述这个故事的最好方式，并非平铺直叙，而是广布环套、满载前史。","chapter":"引子（敬祈神助）","color":5},{"text":"正如人们能看出拉丁语单词viaticum中的via一样（voiage与voyage亦然），通晓希腊语之人能从“奥德修斯”一名表象之下解出odynê一词来。你或许认为自己并不认得这个词，但再想想。好比，想想anodyne，在父亲给我的那本词典中，它被定义为“镇痛剂；不得罪人的”。anodyne实为两个希腊语单词组成的复合词，意即“没有痛苦”；其中an-表示“无”，故-odynê就只能表“痛苦”。这就是奥德修斯之名的词根，也是那部有关他的史诗之名的词根。这部描绘了旅行（voyage、journey、travel）的宏大史诗的主人公，从其名字面意义上来说，即“与痛苦相系之人”。旅行的是他，遭罪的也是他。","chapter":"引子（敬祈神助）","color":5},{"text":"英语中那个同时概括了voyage、journey与travel三个词各自带给我们的不同感受的单词——在距离之外亦囊括了时间，时间之外还顾及了情感层面那种艰巨与危险——源自希腊语而非拉丁语。那个单词是odyssey","chapter":"引子（敬祈神助）","color":5}],"thoughts":[{"text":"史诗运用一种在古希腊文学作品中常见的叙事技巧体现上述复杂的时空交错回旋，这种技巧被称作环套结构（ring composition）。在环套结构中，叙述者讲故事时，会出人意料地停顿、绕到较故事开篇稍早的某个时刻，以帮助阐释他正讲述的故事的某一层面——比如，一段个人史或家族史——这之后，叙事会再往后退几步，绕到一个更早的时刻或更早登场的人物、事件，这有助于说明稍早前发生的种种，此后叙事会逐渐往回走，回到先前叙述者为了道出这一系列背景而暂停的当下来。","quote":"所以出现在《奥德赛》第一行的polytropos（“许多转折的”“盘旋数圈的”）一词，不仅暗指诗歌主人公的本性，也暗指诗歌的本质，它间接表明讲述这个故事的最好方式，并非平铺直叙，而是广布环套、满载前史。","chapter":""}],"popularHighlights":[]},"CB_3kN7PT7QBCoh6gp6gW86RFbt":{"rating":0,"ratingCount":0,"highlights":[{"text":"到目前为止，这种对情势分析的观点还算正确。但这种观点显然也有些问题，其中一个就是因果关系的用语，如“大卫过分关心克劳迪娅，这是卡罗琳生气的原因”，意指大卫对克劳迪娅做了某些事。这种说法将大卫当成了罪魁祸首，而卡罗琳和克劳迪娅只不过是随之反应而已。这种旧式物理学的因果关系用语，即使在物理界都已过时，而用来分析家庭关系如蜂窝般的复杂性和合谋性，就更加不恰当了。","chapter":"第6章 基本的冲突——分离和亲密，能分也能合","color":5},{"text":"方法是表现父母人性的一面。你们只提到‘为人父母’的角色，但却不谈自己，不谈你们的感受。如果你想和长大成人的孩子有更人性化的关系，就该开始尝试将自我更充分地表露出来，而不再做只是好像掌握着所有正确答案的训导员。你们一样也有怀疑、恐惧和问题。如果克劳迪娅知道这些，她就更能在你们身上找到她可以认同的东西，而不仅是看到她一味反抗的东西。","chapter":"第5章 主动开始——家庭是否有奋斗和尝试的意愿","color":5},{"text":"心理分析最基本的假设是：在每个人对世界的理性认知之下，有一种非常强烈、原始的非理性成分存在，那就是人类远古祖先遗留下来的动物本能。弗洛伊德觉得这种非理性不仅为大部分人类活动提供动机，同时也在很大程度上主宰人类的行为和思想。这种被弗洛伊德称为“本我”（id）的原始功能，在意识的察觉范围之外诱使我们去执行它的意志。我们一直都觉得是理性在操控个人，但弗洛伊德认为理性受控于人类另一部分的动物本能，它驱使人设法满足各种基本需求：食物、水、睡眠、性欲和攻击。","chapter":"第3章 源 起——在家人之间流动的电流","color":5}],"thoughts":[],"popularHighlights":[]},"CB_EpFBMXBMs7FT6iR6gWEBX7vO":{"rating":0,"ratingCount":0,"highlights":[],"thoughts":[],"popularHighlights":[]},"CB_6bE1jo1jSGbO6gA6gW49p6l4":{"rating":0,"ratingCount":0,"highlights":[{"text":"And here’s the upshot: in an infinite universe, utilitarianism is completely indifferent to what we do. It doesn’t matter whether we hurt people or help them. The balance of pleasure over pain will stay the ﻿same. We can’t affect it at all. So we’re free, I suppose, to do whatever we like, no matter how dreadful.","chapter":"11. Infinity","color":5},{"text":"And as Berkeley philosopher Lara ﻿Buchak has pointed out, faith has more to do with action than belief.","chapter":"12. God","color":5},{"text":"But the fun is meant to make a serious point. Philosophy should address every aspect of our lives—﻿the sacred, the profane, and even the mundane. It’s partly out of that conviction that I came to write this book. I want you to see that philosophical questions are present in the most prosaic experiences. I want you to know that philosophy is too important to leave to philosophers. And I want you to think that philosophy is fun. Because it can be, and it should be, and it is, when done well.","chapter":"5. Language","color":5},{"text":"IT TOOK MODERN MATH to unravel the mystery—in particular the invention of calculus (by Newton and Gottfried Leibniz). There’s still some ﻿disagreement on the details. But the key insight is that the sum of an infinite set of finite distances is not always infinite. Indeed, the sum of the series that interests us (1/2, 1/4, 1/8, 1/16 . . .) is just 1. So all those little ﻿distances don’t pile up into a distance that’s too far to travel in a finite period of time.","chapter":"11. Infinity","color":5},{"text":"Roughly, Stine’s idea is this. The skeptic’s right—we don’t know anything—when we talk the skeptic’s way. But outside philosophy, we’ve got no reason to talk that way. Indeed, in everyday life, it would be silly to speak as the skeptic does. ﻿There’s lots we know by ordinary standards, and we need to be able to communicate that.","chapter":"8. Knowledge","color":5},{"text":"Indeed, the groups that stand out as scientifically significant ﻿don’t match up with our ordinary understandings of race. My crowd—Ashkenazi Jews—is well-known to genetic counselors, since certain diseases, like Tay-Sachs, occur at a higher rate within the community. But we don’t count as our own race for that reason. Most of us are White—a designation that also encompasses the Amish and the Irish, two groups that strike geneticists as distinct populations. So why do we group all those groups together? Science has no answer to that question. Racial designations don’t mark meaningful differences in biology.","chapter":"7. Race and Responsibility","color":5},{"text":"Adams wasn’t sure what the answer was, but she wasn’t worried about that either. We should accept, she said, that “there are reasons we are cognitively, emotionally, and/or spiritually too immature to fathom.” A two-year-old child, she explained, might not understand why his mother would permit him to have painful surgery. Nevertheless, he could be convinced of his “mother’s love, not by her cognitively inaccessible reasons, but by her intimate care and presence” through the painful experience.","chapter":"12. God","color":5},{"text":"In Raz’s view, the point of authority is to provide a service to its subjects. Indeed, he named his view the ﻿service conception of authority. An authority, he said, should consider all the reasons that its subjects have. And then it should issue orders that will help them do what those reasons require. If the subjects would do a better job by following the orders than by deciding what to do themselves, then the orders are binding, and the subjects are obligated to follow them.","chapter":"4. Authority","color":5},{"text":"Epistemic bubbles are bad. They screen out information that contradicts our views, leaving us overconfident. They convince us that everyone thinks the way we do, even when that’s far from true. And they can even hide entire issues from us. But for all that, Nguyen isn’t worked up about epistemic bubbles. They are “easily shattered,” he says; to pop one, all you have to do is expose people “to the information and arguments that they’ve missed.”Nguyen worries much more about echo chambers. The phrases sound similar. But there’s an important difference. An echo chamber is “a social structure from which other relevant voices have been actively discredited.” The problem with an echo chamber is not that it leaves information out; it’s that reliable sources of information have been undermined.","chapter":"9. Truth","color":5},{"text":"Regardless, our reality is not threatened by the simulation argument, and neither are most of our beliefs. The simulation argument is not a skeptical hypothesis. It’s a metaphysical one. It describes one way our world might work; it doesn’t say we could never know.","chapter":"8. Knowledge","color":5},{"text":"But Bostrom is best known for suggesting that we’re already in one. He thinks we might live in a simulation, sort of like The Matrix. Why? Here’s a rough version of his argument. If people are able to simulate worlds, they probably will. And if they do, they’ll probably do it more than once. Indeed, they might simulate many worlds—hundreds, thousands, even millions—if it’s enlightening (or entertaining) enough. In that case, there would be many more simulated worlds than actual worlds. So odds are, we’re in one.","chapter":"8. Knowledge","color":5},{"text":"And that’s not an accident, says Linda Zagzebski. She dashed many people’s hopes of finding a solution to the Gettier Problem. Zagzebski argues that so long as you start from the (sensible) premise that you can be justified in believing something false, you can always create Gettier cases, no matter how you supplement the JTB account. Indeed, she wrote a recipe for them.To start, you tell a story about a belief that’s justified. Then you add a bit of bad luck, so it turns out that the belief is false. But you don’t stop there! To wrap up, you add a bit of good luck, so the belief turns out true anyway.One of Zagzebski’s stories went like this. Mary believes her husband is in the living room. Why? She just walked past, and she saw him there. But, bad luck! Mary’s wrong. She didn’t actually see her husband. She saw his long-lost twin, who showed up unexpectedly. But, good luck! Her husband is also in the living room; he was sitting out of view as Mary walked past.","chapter":"8. Knowledge","color":5},{"text":"You have two parents, four grandparents, eight great-grandparents, and so on. You can keep going with that. But you’ll soon hit a problem. The number is growing exponentially. If you go back, say, thirty-three generations (roughly eight hundred to a thousand years), the math says you’ll have more than eight billion ancestors. But there weren’t eight billion people back then; there aren’t even eight billion people today.","chapter":"7. Race and Responsibility","color":5},{"text":"Swanson argues that slurs cue ideologies—they call them to mind, make them available to think about and act on. The difference between saying “A Jewish person wrote this book” and “A kike wrote this book” is that the second cues the ideology of anti-Semitism. It invites you to think in those terms—to entertain the idea that Jews are dirty, money-grubbing creatures out to control the world. Because that’s the ideology in which the word kike plays a part.","chapter":"5. Language","color":5},{"text":" An ideology is an interlocking set of ideas, concepts, and attitudes that inform the way we interact with the world, or some part of it.","chapter":"5. Language","color":5},{"text":"Why do we punish? We’ve seen lots of reasons: deterrence, rehabilitation, and incapacitation. But the primary reason is retribution.","chapter":"3. Punishment","color":5},{"text":"Some deny that there’s a difference here. David Hume, the leading philosopher of the Scottish Enlightenment, said that “reason is, and ought only to be the slave of the passions, and can never pretend to any other office than to serve and obey them.” ","chapter":"3. Punishment","color":5},{"text":"Strawson said that reactive attitudes are central to seeing each other as people rather than as objects. People are responsible for what they do, in a way that mere objects are not. I don’t get angry when my thermostat breaks. Or if I do, I don’t get angry at my thermostat. I might get angry at the people who made it, the person who installed it, or even at myself for failing to buy a better one. Anger makes sense only when directed at a person who is (or at least might be) responsible. That’s because anger conveys a judgment—that the person should have done better.","chapter":"3. Punishment","color":5},{"text":"Indeed, if I have any reservation about the slogan the second wrong can set things right, it’s that the second wrong really isn’t a wrong at all, so long as you don’t take it too far. The moral quality of an act is partly a function of what it communicates. There’s a world of difference between standing up for yourself and cutting others down, even if you say the same words.","chapter":"2. Revenge","color":5},{"text":"We like to think that we’re more refined than those for whom revenge was a regular part of life. We imagine that life was “cheap, nasty, and brutish among such violent souls.” But that’s a mistake, Miller says. Indeed, life was expensive in communities committed to the talion. Take one and pay with your own. We are the people who put little value on life and limb.[*]That said, there’s no chance I’d want to live by the talion. Much of modern life is possible only because we let juries sell bodies on the cheap. As Miller points out, we wouldn’t drive cars if “every road fatality gave the victim’s kin a right to kill.” And it’s not just cars that we’d have to give up. It’s all the machinery of modern life: planes, trains, trucks, power tools—more or less everything with a motor. All that is made possible by our willingness to abandon an eye for an eye and accept more meager compensation.","chapter":"2. Revenge","color":5},{"text":"Honor was what provided the basis for your counting for something, for your being listened to, for having people have second thoughts before taking your land or raping you or your daughter. It even governed how you spoke, how loudly, how often, and to whom and when, and whether you were attended to when you did; it governed how you held your shoulders, how tall you stood—literally, not figuratively—and how long you could look at someone or even dare to look at him at all.","chapter":"2. Revenge","color":5},{"text":"Actual trolley problems look nothing like the Trolley Problem! And yet philosophers have good reason to tell too simple stories. We’re trying to isolate one problem, when the real world has a nasty habit of throwing up several at the same time.","chapter":"1. Rights","color":5},{"text":"It’s important to say: Kant thought it was okay to use people as means to ends sometimes. When a student asks me to write her a recommendation, she’s using me as a means to her end. She hopes the letter I write will help her get a job. But she’s not just using me, in the way she might use her computer to send the application in. In asking me to write for her, she engages me as a person. She lets me choose whether to adopt her end as mine. The computer gets no say in the matter. I do.","chapter":"1. Rights","color":5},{"text":"As that last sentence indicates, when you have a right, someone else has an obligation. That’s why I said that rights are relationships. At least two people are party to every right: the right holder and the obligation bearer. Rights and responsibilities travel together. They are the same relationship described from different sides.","chapter":"1. Rights","color":5}],"thoughts":[{"text":"as opposed to objective","quote":"Strawson said that reactive attitudes are central to seeing each other as people rather than as objects. People are responsible for what they do, in a way that mere objects are not. I don’t get angry when my thermostat breaks. Or if I do, I don’t get angry at my thermostat. I might get angry at the people who made it, the person who installed it, or even at myself for failing to buy a better one. Anger makes sense only when directed at a person who is (or at least might be) responsible. That’s because anger conveys a judgment—that the person should have done better.","chapter":"3. Punishment"},{"text":"我们达成的是语言上的共识，而不是意识上的共识。","quote":"I might discover that everything is, from my perspective, topsy-turvy. Stop signs might look blue; the sky might look red. Or perhaps the differences would be more subtle—off by a shade, or a bit more vibrant. But since I can’t pop in, I can’t know what the world looks like to you. I can’t even know what it looks like to the people I know best: my wife and kids.","chapter":""}],"popularHighlights":[]},"CB_1UXAgLAhgFKz6kL6kf13xBry":{"rating":0,"ratingCount":0,"highlights":[],"thoughts":[],"popularHighlights":[]},"CB_6rg1ns1nbFTT6kZ6kf5k7C4N":{"rating":0,"ratingCount":0,"highlights":[{"text":"我们不需要法律的时候，恰是法律对我们的保障最为周全之际。那些不被质疑或界定的自由，正是最有保障的自由。","chapter":"第二十章 乐观主义者","color":0},{"text":"宪法保护的表达自由权利，在这个人口众多，日趋多元的社会里，无疑是一剂良药。创设这一权利，就是为了解除政府对公共讨论施加的种种限制，将讨论何种议题的决定权，最大限度交到我们每个人手中。我们希望，表达自由最终能够创造一个更有力的公民社会、更优良的政治制度。我们也相信，对言论自由的任何限制和约束，都与我们的政治体制所依赖的个体尊严和自由选择格格不入……从这个意义来说，允许这一自由的存在，或许会导致尘世喧嚣，杂音纷扰，各类不和谐之声不绝于耳，有时甚至会有一些冒犯性的言论。但是，在既定规范之下，这些仅是扩大公共讨论范围导致的一点点副作用罢了。容许空气中充满不和谐的声音，不是软弱的表现，而是力量的象征。","chapter":"第二十章 乐观主义者","color":0},{"text":"在一则未署名的判决意见中，最高法院决定不再以“明显而即刻的危险”标准认定鼓吹暴力的言论。这项标准当年由霍姆斯和布兰代斯提出。直到 1951 年，最高法院还延续该标准，维持了对几位共产党领导人的有罪判决。如今，最高法院却以新的标准取而代之：“宪法对言论、出版自由的保障，要求各州不得禁止或查禁公民鼓吹暴力或倡导不法，除非煽动行为直接激发或导致违法之举，或者类似的行为。”","chapter":"第二十章 乐观主义者","color":0},{"text":"第一修正案 1791 年并入宪法后，一百多年来，它对言论、出版自由的保护功能，完全处于休眠状态。第一次世界大战期间，各州与联邦纷纷出台立法，压制言论自由，最高法院对此亦麻木不仁，甚至容许追惩反战或激进言论。之后四十年间，最高法院才逐步适用言论、出版自由条款，保护某些异见或非主流言论。但是，对那些颠覆或挑战现行秩序的言论，大法官们仍刻意排斥，不愿将之纳入第一修正案的保护范围。","chapter":"第二十章 乐观主义者","color":0},{"text":"“《纽约时报》诉沙利文案”集中体现了美国宪政制度中一个根深蒂固的吊诡之处。我们拥有一部成文宪法，并仰赖其至始未变之本质，为这个瞬息万变的社会，注入安定之力。然而，宪法的生命力之所以能恒久延续，源自法官们在适用与解释上的不断创新，以适应制宪先贤们未能预测到的社会变迁。","chapter":"第十五章 “这是值得当街起舞的时刻”","color":0},{"text":"诉状还援引了麦迪逊 1794 年在众议院的演讲词，“如果有检查言论的权力，那也应当是人民检查政府的言论，而不是政府检查人民的言论”。","chapter":"第十二章 “永远都不是时候”","color":0},{"text":"评论界则在争论，事前限制与事后追惩，到底哪个对出版自由危害更大？如果编辑面临两个选择，一个是在文章发表前，自行清理掉政府介意的涉密内容，一个是曝光政府机密，之后面临 1000 万美元罚金，两害权其轻，选哪个更合适？严厉追惩的威胁，逼迫编辑、记者们不得不进行自我审查，这对表达自由的威慑程度，要远大于正式的法律限制。但是，多数人仍然认为，事前限制有时比事后追惩更具钳制力。对一个出版物申请事前禁令，法官一人即可作出决定，但若想对出版者进行刑事追诉，必领由陪审团定罪。况且，出版物出炉前，若想阻止其发行，申请人可以向法官渲染夸大出版后可能导致的严重后果。但是，当事人如果在出版后提起诉讼，相关言论是否确实引发严重后果，已是世人皆知之事。","chapter":"第十章 “三天过去了，共和国安然无恙！”","color":5},{"text":"“煽动诽谤政府罪”一词现在听起来仿佛过时。但对 20 世纪的人们来说，仍然并不陌生。许多专制政权用残酷刑罚令自己与异议绝缘。苏联解体前，刑法中即有“煽动颠覆苏联罪”，与“煽动诽谤政府罪”并无二致。著名言论自由与出版自由研究者，芝加哥大学法学院的小哈里·卡尔文教授曾指出，设置“煽动诽谤政府罪”，是“全世界封闭社会的共同特征，在这样的社会里，批评政府就是诽谤，并构成严重罪行。如果政府以强力逼迫批评者噤声，政治自由将荡然无存。在我看来，一个社会如果保留煽动诽谤政府罪，这个社会就算不上自由社会”。","chapter":"第六章 自由的含义","color":5},{"text":"随着先例逐步累计叠加，就会形成一套系统的法律规则，这就是普通法。普通法由法官逐案创制，完全来源于司法实践。因此，霍姆斯大法官才在名著《普通法》中写道，在益格鲁–美利坚社会，“法律的生命并非逻辑，而是经验”。","chapter":"第六章 自由的含义","color":5},{"text":"布伦南大法官执笔的判决意见气势恢宏，充分吸纳了米克尔约翰的观点，尤其是那句“对公共事务的讨论应当不受抑制（uninhibited）、充满活力（robusts）并广泛公开（wide-open），它很可能包含了对政府或官员的激烈、刻薄，甚至尖锐的攻击”，成为日后被频繁引用的经典判词。","chapter":"批评的限度就是民主的尺度","color":5}],"thoughts":[],"popularHighlights":[]},"CB_H0yAgiAhgFKz6kL6kf4561F5":{"rating":0,"ratingCount":0,"highlights":[{"text":"“人生难道不是和一个人乘坐革座飞机飞行一样吗？无论机体受什么伤害，既不能同他人换飞机。也不可能让他人代为驾驶。”","chapter":"第十二章 遥远山镇","color":5},{"text":"小山田在身体还健康的时候，总要在上班之前向妻子调情。早晨，他将积聚了一夜的精子射入妻子的身体之中，这样就好象是对其他男人们贴上了封条，他注入她体内的精子将成为他保护妻子、防范其他男人的“禁告牌”。由于体力不支而不能完成早晨的“工作”时，他也必定要与妻子进行“接触”。这样一来，当他想到今天妻子已经不是“处女”了，他就可以放心了。","chapter":"第四章 偷情疑踪","color":5},{"text":"她以前虽然有些土里土气，但却有着小山田所喜爱的美丽与温柔，她现在已经失去了家庭中所烹调出来的那种家常菜的独特味道，而变成了高级菜馆所加工出来的高档菜肴，这种味道无疑会使讲究吃喝的内行咂嘴称妙，但却不是为小山田自己一个人所设计、烹调的，是一种只要出钱，无论谁都可以品尝到的、进行了商业化华丽包装的味道。","chapter":"第四章 偷情疑踪","color":5}],"thoughts":[],"popularHighlights":[]}};

    // ===== 星星计算 =====

      let full, half;
      if (rating >= 9) { full = 5; half = 0; }
      else if (rating >= 8.5) { full = 4; half = 1; }
      else if (rating >= 8.0) { full = 4; half = 0; }
      else if (rating >= 7.5) { full = 3; half = 1; }
      else if (rating >= 7.0) { full = 3; half = 0; }
      else { full = 2; half = 0; }
      const empty = 5 - full - half;
      return '<span class="star-filled">★</span>'.repeat(full) +
             (half ? '<span class="star-half">★</span>' : '') +
             '<span class="star-empty">☆</span>'.repeat(empty);

      // Country badges
      const cc = {};
      list.forEach(b => { if (b.country) cc[b.country] = (cc[b.country] || 0) + 1; });
      const cg = document.getElementById('country-grid');
      cg.innerHTML = '';
      Object.entries(cc).sort((a, b) => b[1] - a[1]).forEach(([country, count]) => {
        const badge = document.createElement('div');
        badge.className = 'country-badge';
        badge.innerHTML = `<span class="country-flag">${COUNTRY_FLAGS[country] || ''}</span>${country}<span class="country-count">×${count}</span>`;
        cg.appendChild(badge);
      });
      updateFilterCounts(getSearchOnlyBooks());
    }

    function updateChart(list) {
      const counts = {};
      actualMonths.forEach(m => { counts[m] = 0; });
      list.forEach(b => { if (counts[b.month] !== undefined) counts[b.month]++; });
      monthChart.data.datasets[0].data = actualMonths.map(m => counts[m]);
      monthChart.options.scales.y.max = Math.max(Math.max(...actualMonths.map(m => counts[m])) + 1, 4);
      monthChart.update();
    }

    function applySearchAndFilter() {
      const filtered = getFilteredBooks();
      updateStats(filtered);
      updateChart(filtered);
      if (filtered.length > 0) {
        renderWall(filtered);
        renderBooklist(getSortedList(filtered));
        if (booklistOpen) {
          document.getElementById('booklist-content').classList.add('open');
          document.getElementById('booklist-toggle').classList.add('open');
        }
      } else {
        document.getElementById('cover-wall').innerHTML = '<div class="no-results">没有找到匹配的书籍</div>';
        document.getElementById('booklist-content').innerHTML = '<div class="no-results">没有找到匹配的书籍</div>';
        document.getElementById('wall-count').textContent = '0 本';
      }
    }

    // ===== 搜索框事件 =====
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');

    // 从 URL 预填
    const urlParams = new URLSearchParams(window.location.search);
    searchQuery = urlParams.get('search') || '';
    searchInput.value = searchQuery;
    if (searchQuery) searchClear.classList.add('visible');

    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        searchQuery = e.target.value.trim();
        const url = new URL(window.location);
        if (searchQuery) {
          url.searchParams.set('search', searchQuery);
        } else {
          url.searchParams.delete('search');
        }
        history.replaceState(null, '', url);
        searchClear.classList.toggle('visible', !!searchQuery);
        applySearchAndFilter();
      }, 150);
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      searchClear.classList.remove('visible');
      const url = new URL(window.location);
      url.searchParams.delete('search');
      history.replaceState(null, '', url);
      applySearchAndFilter();
      searchInput.focus();
    });

    // ===== 筛选按钮 =====
    const filtersEl = document.getElementById('filters');
    filterBtns.forEach(fb => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (fb.key === 'all' ? ' active' : '');
      btn.textContent = fb.label;
      btn.dataset.filterKey = fb.key;
      btn.dataset.baseLabel = fb.label.replace(/\s*\(\d+\)\s*$/, '');
      btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = fb.key;
        applySearchAndFilter();
      };
      filtersEl.appendChild(btn);
    });

    // ===== 渲染封面墙 =====
    function renderWall(list) {
      document.getElementById('wall-count').textContent = `${list.length} 本`;
      const wallEl = document.getElementById('cover-wall');
      wallEl.innerHTML = '';
      // 按 finish 时间升序排列
      const sorted = getSortedList(list);
      sorted.forEach(b => {
        const item = document.createElement('div');
        item.className = 'cover-item';
        item.innerHTML = `
          <div class="cover-link" onclick="openBookPanel(${allBooks.indexOf(b)})" title="${b.title}">
            <div class="cover-img-wrap">
              <img src="${b.cover}" alt="${b.title}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 150%22><rect fill=%22%23f6f5f4%22 width=%22100%22 height=%22150%22/><text x=%2250%22 y=%2280%22 text-anchor=%22middle%22 fill=%22%23a39e98%22 font-size=%2210%22>${b.title}</text></svg>'">
              <div class="cover-overlay">
                <div class="cover-title">${b.title}</div>
                <div class="cover-author">${b.author}</div>
                <div class="cover-rating">${stars(b.rating)} ${b.rating}</div>
              </div>
            </div>
          </div>`;
        wallEl.appendChild(item);
      });
    }

    // ===== 渲染书单列表 =====
    function renderBooklist(list) {
      const content = document.getElementById('booklist-content');
      content.innerHTML = list.map((b, idx) => {
        const m = monthMeta[b.month];
        let reviewSection = '';
        if (b.review) {
          const needsTruncation = b.review.length > 60;
          const truncatedText = needsTruncation ? b.review.substring(0, 60) + '...' : b.review;
          reviewSection = `
            <div class="book-review" id="review-${idx}" data-full="${encodeURIComponent(b.review)}" data-truncated="${needsTruncation}">
              ${truncatedText.replace(/\n/g, '<br>')}
            </div>
            ${needsTruncation ? `<button class="review-more-btn" onclick="toggleReview(${idx}, this)">展开</button>` : ''}
          `;
        }
        return `<div class="book-row">
          <div class="book-info">
            <div class="book-dates">${b.start}<br>${b.finish}</div>
            <div class="book-title"><a href="${b.doubanLink}" target="_blank" style="color:inherit;text-decoration:none;">${b.title}</a></div>
            <div class="book-author">${b.author}</div>
            <div class="book-meta">
              <span class="month-tag" style="background:${m.bg};color:${m.color}">${m.label}</span>
              <span class="star-rating">${stars(b.rating)}</span>
              <span class="rating-num">${b.rating}</span>
              ${b.pages ? `<span class="pages-tag">${b.pages}页</span>` : ''}
            </div>
            ${reviewSection}
          </div>
        </div>`;
      }).join('');
    }

    function toggleReview(idx, btn) {
      const review = document.getElementById(`review-${idx}`);
      const isCollapsed = btn.textContent === '展开';
      const fullText = decodeURIComponent(review.dataset.full);

      if (isCollapsed) {
        review.innerHTML = fullText.replace(/\n/g, '<br>');
        btn.textContent = '收起';
      } else {
        review.innerHTML = fullText.substring(0, 60) + '...';
        btn.textContent = '展开';
      }
    }

    // ===== 展开/收起书单 =====
    function toggleBooklist() {
      const toggle = document.getElementById('booklist-toggle');
      const content = document.getElementById('booklist-content');
      booklistOpen = !booklistOpen;
      toggle.classList.toggle('open', booklistOpen);
      content.classList.toggle('open', booklistOpen);
    }

    // ===== 排序函数 =====
    function getSortedList(list) {
      const sorted = [...list];
      const dir = currentSortDir === 'desc' ? -1 : 1;
      switch (currentSortField) {
        case 'finish': return sorted.sort((a, b) => a.finish.localeCompare(b.finish) * dir);
        case 'rating': return sorted.sort((a, b) => (a.rating - b.rating) * dir);
        case 'pages': return sorted.sort((a, b) => ((parseInt(a.pages) || 0) - (parseInt(b.pages) || 0)) * dir);
        default: return sorted;
      }
    }

    // ===== 排序按钮事件 =====
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const field = btn.dataset.sort;
        if (currentSortField === field) {
          // 同字段点击 → 切换方向
          currentSortDir = currentSortDir === 'desc' ? 'asc' : 'desc';
        } else {
          // 不同字段 → 切换到该字段，默认降序
          currentSortField = field;
          currentSortDir = 'desc';
        }
        // 更新按钮文字
        const fieldLabels = { finish: '时间', rating: '评分', pages: '页数' };
        document.querySelectorAll('.sort-btn').forEach(b => {
          const f = b.dataset.sort;
          const a = (currentSortField === f) ? currentSortDir : 'desc';
          b.textContent = fieldLabels[f] + (a === 'desc' ? ' ↓' : ' ↑');
          b.classList.toggle('active', currentSortField === f);
        });
        applySearchAndFilter();
      });
    });

    // ===== 图表 =====
    const maxMonthlyCount = Math.max(...actualMonths.map(m => monthCounts[m]));
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const chartTextColor = isDark ? '#9e9a96' : '#615d59';
    const chartGridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.05)';
    const monthChart = new Chart(document.getElementById('monthChart'), {
      type: 'bar',
      data: {
        labels: monthLabels,
        datasets: [{
          label: '本数',
          data: actualMonths.map(m => monthCounts[m]),
          backgroundColor: actualMonths.map(m => MONTH_COLORS[m - 1].bg),
          borderColor: actualMonths.map(m => MONTH_COLORS[m - 1].color),
          borderWidth: 1,
          borderRadius: 6,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
        },
        scales: {
          y: {
            beginAtZero: true,
            max: Math.max(maxMonthlyCount + 1, 4),
            ticks: { stepSize: 1, font: { family: 'Inter', size: 11 }, color: chartTextColor },
            grid: { color: chartGridColor },
            border: { display: false }
          },
          x: {
            ticks: { font: { family: 'Inter', size: 12 }, color: chartTextColor },
            grid: { display: false },
            border: { display: false }
          }
        }
      },
      plugins: [{
        id: 'monthDataLabels',
        afterDatasetsDraw(chart) {
          const { ctx, data, scales } = chart;
          ctx.save();
          ctx.font = '600 11px Inter';
          ctx.fillStyle = chartTextColor;
          ctx.textAlign = 'center';
          data.datasets[0].data.forEach((value, index) => {
            if (value > 0) {
              const x = scales.x.getPixelForValue(index);
              const y = scales.y.getPixelForValue(value) - 6;
              ctx.fillText(value, x, y);
            }
          });
          ctx.restore();
        }
      }]
    });

    // ===== Book Notes Panel =====
    const panelOverlay = document.getElementById('panelOverlay');
    const bookPanel = document.getElementById('bookPanel');
    const panelClose = document.getElementById('panelClose');
    const panelHeader = document.getElementById('panelHeader');
    const panelBody = document.getElementById('panelBody');
    const panelDragBar = document.getElementById('panelDragBar');

    function openBookPanel(bookIndex) {
      const b = allBooks[bookIndex];
      if (!b) return;
      const weread = b.wereadId ? wereadData[b.wereadId] : null;
      renderPanelContent(b, weread);
      // 补偿滚动条宽度，防止背景抖动
      const scrollbarW = window.innerWidth - document.documentElement.clientWidth;
      document.body.style.overflow = 'hidden';
      document.body.style.paddingRight = scrollbarW + 'px';
      panelOverlay.classList.add('active');
      bookPanel.classList.add('active');
    }

    function closeBookPanel() {
      panelOverlay.classList.remove('active');
      bookPanel.classList.remove('active');
      document.body.style.overflow = '';
      document.body.style.paddingRight = '';
    }

    panelOverlay.addEventListener('click', closeBookPanel);
    panelClose.addEventListener('click', closeBookPanel);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && bookPanel.classList.contains('active')) {
        closeBookPanel();
      }
    });

    // Mobile drag-to-close
    let dragStartY = 0;
    let dragging = false;
    panelDragBar.addEventListener('touchstart', (e) => {
      dragStartY = e.touches[0].clientY;
      dragging = true;
    });
    document.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      const dy = e.touches[0].clientY - dragStartY;
      if (dy > 0) {
        bookPanel.style.transform = 'translateY(' + dy + 'px)';
      }
    });
    document.addEventListener('touchend', (e) => {
      if (!dragging) return;
      dragging = false;
      const dy = e.changedTouches[0].clientY - dragStartY;
      bookPanel.style.transform = '';
      if (dy > 100) {
        closeBookPanel();
      }
    });

    function renderPanelContent(book, weread) {
      const coverHtml = book.doubanLink
        ? '<a href="' + book.doubanLink + '" target="_blank" style="display:block;flex-shrink:0;"><img class="panel-cover" src="' + book.cover + '" alt="' + book.title + '" onerror="this.style.display=\'none\'"></a>'
        : '<img class="panel-cover" src="' + book.cover + '" alt="' + book.title + '" onerror="this.style.display=\'none\'">';
      panelHeader.innerHTML =
        coverHtml +
        '<div class="panel-book-info">' +
          '<div class="panel-title">' + book.title + '</div>' +
          '<div class="panel-author">' + book.author + '</div>' +
          (weread && weread.rating
            ? '<div class="panel-rating">微信读书推荐值 <span class="panel-rating-score">' +
              (weread.rating / 10).toFixed(1) + '%</span> · ' +
              formatRatingCount(weread.ratingCount) + '人评价</div>'
            : '')
        + '</div>';

      let html = '';

      // 书籍简介（可折叠）
      if (book.summary) {
        const needsCollapse = book.summary.length > 150;
        html += '<div class="panel-section">';
        html += '<div class="panel-summary-toggle" onclick="togglePanelSummary(this)">';
        html += '<span class="panel-section-title" style="margin-bottom:0">书籍简介</span>';
        html += '<span class="panel-summary-arrow">▼</span>';
        html += '</div>';
        html += '<div class="panel-summary-text' + (needsCollapse ? ' collapsed' : '') + '" id="panelSummaryText">' +
          book.summary.replace(/\n/g, '<br>') + '</div>';
        html += '</div>';
      }

      // 全书点评
      if (book.review) {
        html += '<div class="panel-section">';
        html += '<div class="panel-section-title">全书点评</div>';
        html += '<div class="panel-review-card">';
        const needsCollapse = book.review.length > 200;
        html += '<div class="panel-review-text' + (needsCollapse ? ' collapsed' : '') + '" id="panelReviewText">' +
          book.review.replace(/\n/g, '<br>') + '</div>';
        if (needsCollapse) {
          html += '<button class="panel-review-toggle" onclick="togglePanelReview(this)">展开全文</button>';
        }
        html += '</div>';
        html += '</div>';
      }

      if (!weread) {
        if (!book.review && !book.summary) {
          html += '<div class="panel-empty">暂无微信读书笔记</div>';
        }
        panelBody.innerHTML = html;
        return;
      }

      // Tabs
      const hlCount = weread.highlights ? weread.highlights.length : 0;
      const thCount = weread.thoughts ? weread.thoughts.length : 0;
      const popCount = weread.popularHighlights ? weread.popularHighlights.length : 0;

      html += '<div class="panel-tabs">';
      html += '<button class="panel-tab active" data-tab="highlights">划线 (' + hlCount + ')</button>';
      html += '<button class="panel-tab" data-tab="thoughts">想法 (' + thCount + ')</button>';
      html += '<button class="panel-tab" data-tab="popular">热门划线 (' + popCount + ')</button>';
      html += '</div>';

      // Highlights tab
      html += '<div class="panel-tab-content active" data-tab-content="highlights">';
      if (hlCount > 0) {
        weread.highlights.forEach(function(h) {
          html += '<div class="panel-note-item">';
          html += '<div class="panel-note-text">' + escapeHtml(h.text) + '</div>';
          if (h.chapter) html += '<div class="panel-note-chapter">——' + escapeHtml(h.chapter) + '</div>';
          html += '</div>';
        });
      } else {
        html += '<div class="panel-empty">暂无划线</div>';
      }
      html += '</div>';

      // Thoughts tab
      html += '<div class="panel-tab-content" data-tab-content="thoughts">';
      if (thCount > 0) {
        weread.thoughts.forEach(function(t) {
          html += '<div class="panel-note-item">';
          if (t.quote) {
            html += '<div class="panel-quote">' + escapeHtml(t.quote) + '</div>';
          }
          html += '<div class="panel-thought-content">' + escapeHtml(t.text) + '</div>';
          if (t.chapter) html += '<div class="panel-note-chapter">——' + escapeHtml(t.chapter) + '</div>';
          html += '</div>';
        });
      } else {
        html += '<div class="panel-empty">暂无想法</div>';
      }
      html += '</div>';

      // Popular highlights tab
      html += '<div class="panel-tab-content" data-tab-content="popular">';
      if (popCount > 0) {
        weread.popularHighlights.forEach(function(p) {
          html += '<div class="panel-note-item">';
          html += '<div class="panel-note-text">' + escapeHtml(p.text) + '</div>';
          html += '<div class="panel-note-count">' + p.count + '人划线</div>';
          if (p.chapter) html += '<div class="panel-note-chapter">——' + escapeHtml(p.chapter) + '</div>';
          html += '</div>';
        });
      } else {
        html += '<div class="panel-empty">暂无热门划线</div>';
      }
      html += '</div>';

      panelBody.innerHTML = html;

      // Tab click handlers
      panelBody.querySelectorAll('.panel-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
          panelBody.querySelectorAll('.panel-tab').forEach(function(t) { t.classList.remove('active'); });
          panelBody.querySelectorAll('.panel-tab-content').forEach(function(c) { c.classList.remove('active'); });
          tab.classList.add('active');
          panelBody.querySelector('[data-tab-content="' + tab.dataset.tab + '"]').classList.add('active');
          // 切换 tab 后重置滚动位置，防止抖动
          panelBody.scrollTop = 0;
        });
      });
    }

    function togglePanelReview(btn) {
      var textEl = document.getElementById('panelReviewText');
      if (textEl.classList.contains('collapsed')) {
        textEl.classList.remove('collapsed');
        btn.textContent = '收起';
      } else {
        textEl.classList.add('collapsed');
        btn.textContent = '展开全文';
      }
    }

    function togglePanelSummary(toggleEl) {
      var textEl = document.getElementById('panelSummaryText');
      var arrow = toggleEl.querySelector('.panel-summary-arrow');
      if (textEl.classList.contains('collapsed')) {
        textEl.classList.remove('collapsed');
        arrow.textContent = '▲';
      } else {
        textEl.classList.add('collapsed');
        arrow.textContent = '▼';
      }
    }

    function formatRatingCount(count) {
      if (count >= 10000) return (count / 10000).toFixed(1) + '万';
      if (count >= 1000) return (count / 1000).toFixed(1) + 'k';
      return String(count);
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ===== 初始渲染 =====
    applySearchAndFilter();
  </script>
</body>
</html>
