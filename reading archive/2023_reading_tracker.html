生者和死者的身上。","count":936,"chapter":"前言"},{"text":"“他完全醒着，好像对自己发笑……那时，他们看见那种情形，当然会觉得他出了毛病……”","count":912,"chapter":"姊妹们"},{"text":"街灯像发光的珍珠，从高高的电杆的顶端照射着下面活动的群体图形，它们不断改变形状和颜色，将单调的、不绝于耳的低声细语抛向暖洋洋的灰色夜空。","count":816,"chapter":"两个浪汉"},{"text":"“恰恰是一切都过去了，你才会想念他，”","count":804,"chapter":"姊妹们"},{"text":"然后他以一种严肃的手势把手伸向灯光，微微地笑着，慢慢地把手打开，让他的门徒细看。一枚小小的金币在他的掌心里闪烁。","count":780,"chapter":"两个浪汉"},{"text":"虽然她知道他的才智有限，但她赞赏他那作为男性的抽象价值。","count":780,"chapter":"母亲"},{"text":"“天亮了，先生们！”","count":756,"chapter":"赛车以后"}]},"24240889":{"rating":809,"ratingCount":616,"highlights":[{"text":"根据这个观点，我们可以认为语言并不是交流系统，而是作为表征装置逐步进化形成的，这也和诺姆·乔姆斯基的观点一致。表征装置的主要优势在于它能够产生新的想法，这比能够与他人分享交流更为重要。我们的脑似乎具有给符号赋予任意心理表征的特殊本领，并且能将这些符号排列成全新的组合。","chapter":"人类意识是独一无二的吗","color":5},{"text":"尽管我们大部分的脑系统和其他物种相同，但是人脑的独特之处在于，人类能够使用复杂的“思维语言”来联合这些脑区。","chapter":"人类意识是独一无二的吗","color":5},{"text":"“脑死亡”是完全不同的另一种状态，它的特点是脑干反射完全丧失，并伴有平直单调的脑电图以及呼吸能力的丧失。在脑死亡患者中，正电子发射断层扫描技术和其他如多普勒超声检查等技术都显示不出大脑皮质有新陈代谢，或有血液注入其中。一旦排除了体温过低、药物作用和有毒物质产生的影响，脑死亡的诊断便可以在6小时到一天内做出。脑死亡会导致大脑皮质和丘脑的神经元快速退化消失，永久性地抹去定义患者身份的终身记忆。因此脑死亡是不可逆的，没有任何技术能恢复消失的细胞和分子。","chapter":"意识疾病的分类","color":5},{"text":"激活和未激活的神经元波形可以解释第二个意识标志，那就是第4章中提到的P3波，一个位于头顶的正电波峰。在意识知觉中，工作空间神经元中的一小部分被激活，并定义了我们当前的思维内容，其余部分均受到抑制。活跃的神经元沿着长长的轴突传递锋电位，以此将信息传播到整个皮质。但是在大多数情况下，这些信号到达的是抑制性神经元。它们作为消音器使整组的神经元沉默：“请保持沉默，你们的特征无关紧要。”一个意识想法是由一小丛激活并同步的神经细胞以及大量被抑制的神经元共同编码的。","chapter":"全脑神经工作空间","color":5},{"text":"从进化观点来看，这种安排的优势显而易见。模块化是非常有用的，因为不同领域的知识需要不同的脑皮质进行调制：在空间中起导航作用的回路和用来识别地形或者存储过去记忆的回路所进行的运算有所不同。但是每一个决定常常都需要基于大量多源信息的整合。我们可以想象大草原中一头饥渴的大象，它是否能够存活取决于能否找到下一个水源。它如果准备前往陌生而遥远的地方寻找水源，一定是在最大化利用了可以获得的信息的基础上——包括大脑中的一张地图，对于地貌、树木、道路等的视觉标识，以及过去寻找水源成功和失败经历的回忆。如此长远而重大的决定必须用上所有能用上的资源，才可以引导这头大象在非洲的烈日下踏上漫漫长路。为了帮助我们灵活地挖掘那些可能与当前需要相关的所有信息资源，意识可能已经进化了千万年之久14。\n","chapter":"超越模块化","color":5},{"text":"在本章中，我们至少发现了四种可靠的意识标志，它们是表明被试是否产生意识知觉的生理标志。第一，一个意识刺激可以触发强烈的神经活动，并突然激活顶叶和前额叶回路。第二，在脑电记录中，意识通达伴随着P3慢波，这个波在刺激出现后的1/3秒出现。第三，意识也会激发一个晚期突然爆发的高频振荡。最后，许多区域跨越长段距离交换双向同步信息，由此构建了一个全脑网络。","chapter":"“罐中之脑”","color":5},{"text":"现在让我来总结一下到目前为止得到的结论。一波神经活动促使皮质超过其激活阈限从而产生了意识知觉。一个有意识的刺激会引发神经活动雪崩式的自我增强，最终使许多区域都陷入纠缠复杂的状态。刺激发生后接近300毫秒时，开始产生意识，而在这个阶段，脑前区收到自下而上传来的感觉输入信息，与此同时，这些区域也会以一种自上而下的方式向许多分散区域传递大量的投射信息。最后一个结论是，脑网络的同步区域在各个方面给予了我们诸多关于脑意识的标志：分散式激活——尤其是在额叶和顶叶部分，γ波段放大后产生的P3波以及大量长距离的同步现象。","chapter":"引爆点","color":5},{"text":"因此，我们可以把阈下知觉比作海浪。海浪在地平线处赫然耸立，但是当它到达海岸时仅仅舔了一下你的双脚5。相比之下，意识知觉更像是一场海啸，或者用雪崩来比喻它更好。因为意识活动似乎在传播过程中积聚力量，就像一个小小的雪块不断聚集着雪，最终形成一场雪崩。","chapter":"意识——神经激活的雪崩","color":5},{"text":"弗拉基米尔·纳博科夫在他1980年出版的《文学讲稿》（Lectures on Literature）中道破了一切：\n \n文学不是在男孩一边大喊“狼来了，狼来了”一边从尼安德特山谷中跑出来，同时身后跟着只大灰狼时诞生的，文学是在男孩大喊“狼来了，狼来了”但身后却没有狼的时候诞生的。","chapter":"社会分享","color":5},{"text":"内省使我们可以看到自己的有意识动机和策略，但我们却没有办法解读他人的内心。然而，我们从来没有真正地了解过自己。我们还不是很了解决定我们行为的真正意义上的无意识，因此，我们不能准确地预测，在超出过去经验的安全区域之外我们的行为会是什么样的。希腊有句名言：“认识你自己。”但是要达到理解自己行为所有细节的程度，还是天方夜谭。“自己”只是一个由社会经验填充的数据库，它与我们尝试理解他人思想的数据库是同一种形式，正因为如此，它才可能包括明显的差距、误解和偏见。","chapter":"社会分享","color":5},{"text":"如果这种关于自我的观点是正确的，那么自我身份的神经基础就是以一种相当迂回的方式建立起来的。我们一生都在监控自己和他人的行为，我们的统计大脑不断对所观察的事物做出推论，可以说是随事情的发展不断“构成自己的想法”51。认识自我是一个从观察中得出统计推论的过程。我们的一生都与自我在一起，我们对于自己性格、知识和自信心的认识，只是比对于别人的认识要精确一点点。除此之外，我们的大脑很享受可以获得内部机制的特权52。","chapter":"社会分享","color":5},{"text":"总的来说，这些实验证明，意识发挥了至关重要的作用。我们需要意识来理性地思考问题。强有力的无意识会产生错综复杂的直觉，但是只有意识可以一步一步地进行一个理性的决策。通过扮演类似于路由器的角色，并将信息输送到任意一串连续的加工中，意识似乎让我们拥有了一个新的运行模式——人脑图灵机。","chapter":"人类图灵机","color":5},{"text":"我的同事利昂内尔·纳卡什总结了这些发现并得出一个与法国精神分析学家雅克·拉康（Jacques Lacan）相矛盾的结论：“无意识不是像一门语言那样构建的，而是在以指数形式衰减。”","chapter":"意识让思维延续","color":5},{"text":"有趣的是，整个加工过程与量子力学有相通之处，虽然加工的神经机制可能只涉及经典物理学。量子物理学家告诉我们，物理现实存在于波函数的叠加中，这种叠加决定了在某一状态下能够发现粒子的可能性。然而，当我们想要测量时，这些可能性就会塌缩至一个确定的全或无状态。我们从来观测不到一种陌生的混合状态","chapter":"无意识统计，有意识抽样","color":5},{"text":"由于我们一次只能意识到一张图片，因而当我们同时看到两张图片时，会把它们理解为是在不断变化的。然而，至关重要的是，当我们将注意转向别处时，这种竞争就会停止11。离散采样似乎只在有意识注意时才发生。因此，无意识的加工过程比有意识更为客观。大量无意识神经元估算着世界现状的真实概率分布，而意识却直接将其简化成全或无的样本。","chapter":"无意识统计，有意识抽样","color":5},{"text":"在雷韦朗·托马斯·贝叶斯（Reverend Thomas Bayes）首次探索数学领域之后，现代认知科学家所称的“贝叶斯推理”（Bayesian inference）又被皮尔斯称为“溯因推理”（abduction）。贝叶斯推理使用一种倒推的统计推理方式，推断出隐藏在观察结果背后的原因。在经典概率论中，我们通常只知道发生了什么，例如“某人从一副52张的牌中抽了3张”，这种描述使我们能够对特定的结果赋予概率值，例如“3张牌都是A的概率是多少”。然而，贝叶斯推理让我们从相反的方向进行推论，从已知的结果到未知的来源。例如：“如果某人从一副52张的牌中抽了3张A，那么这副牌被做了手脚，包含4张以上A的概率有多大？”这就是所谓的“反向推理”或“贝叶斯统计”。把大脑当作一名贝叶斯统计者是当代神经科学中最热门而且最富有争议的假说之一。","chapter":"无意识统计，有意识抽样","color":5},{"text":"查尔斯·达尔文彻底地改变了这一格局，他指出这是自然选择而非设计好的，自然选择作为一个间接的力量无意中塑造了生物圈。达尔文的观点认为，自然并不需要有神创的目的。进化的器官并不是“为”它们的功能设计的，而仅仅是给其拥有者提供了一个繁衍优势。","chapter":"3 意识有什么用","color":5},{"text":"阿达马将数学探索的过程拆析为四个连续阶段：启动、酝酿、启迪和核查。“启动”阶段包含了所有的准备工作，是对一个问题有意识的深入探索。这种正面攻击往往成效不大，但也并不是一无所获，因为它激发了无意识思维的探索过程。然后“酝酿”阶段开始了，这是一个无形的酿造期，在此期间，问题若有若无地抢先占据了思维，但并没有努力解决问题的意识迹象。如果不是因为产生了效果，酝酿阶段是不会被察觉到的。可能是在一夜美梦或是在放松的散步之后，“启迪”阶段突然出现了，解决方法闯入了数学家的意识思维中，令人豁然开朗。大多数情况下，答案都是正确的。然而，缓慢而又耗神的有意识“核查”过程仍然是需要的，以此来确定所有的细节。","chapter":"无意识与问题解决","color":5},{"text":"侯世达（Douglas Hofstadter）提出了一个古怪而且循环的编程定理：“一个任务花费的时间往往会比你预计的时间更长，即使你已经考虑到了侯世达定理。”","chapter":"无意识与问题解决","color":5},{"text":"有趣的是，相比干扰刺激可以被意识到时，干扰物处于无意识层面时产生的影响更为显著，一个有意识的干扰能被自主消除，而无意识却能保留所有烦人的内容，因为我们无法学会控制它66。","chapter":"无意识与注意","color":5},{"text":"然而，如果文字理解的初加工过程需要意识参与的话，语言又会是如何运作的呢？比如，在读一个句子时，你是有意识地弄懂每一个词的含义，然后再将这些词组合成连贯的信息吗？不，你的意识集中在总的要点上，也就是论点的逻辑上。只要瞥一眼每个单词就足以将它们放进总体论述的结构中了。我们没有关于符号是如何唤醒一个单词的含义的内省过程。","chapter":"无意识的语义启动","color":5},{"text":"麦格克效应证明：我们所听见的声音既来自视觉信息，也来自听觉信息，两者是等同的。","chapter":"声音和图像的自动联结","color":5},{"text":"我们所感受到的有意识的视觉景象是一个经过了高度加工的图像，远远不同于我们眼中所接收到的未加工的信息。","chapter":"自动视觉加工","color":5},{"text":"这一发现在神经科学和心理学中引起骚动，它清晰地展示了无意识的机制驱动着我们大部分的生活","chapter":"无意识研究的历史","color":5},{"text":"结果是，当大脑在忙碌时，我们对时间的主观感觉可能是错误的25。当我们专注于第一个任务并被要求估计第二个物体出现的时刻时，会认为它进入意识的时间就是出现的时间。即使两个输入在客观上是同时的，我们也没办法察觉到这点，而是感觉先关注的事物比另一个出现得早。事实上，主观的延迟完全是由意识的“迟缓”造成的。","chapter":"注意瞬脱","color":5},{"text":"科学经常通过提出新的分类来细化自然语言中的模糊分类，从而得到发展。科学史上的一个经典例子就是区别热量与温度的概念。在日常生活中，人们普遍将这两个概念归为一类。毕竟，将某样东西加热后就会提高它的温度，对吧？错了！一块冰被加热时，在融化的过程中，冰始终保持在0摄氏度。一种物质可以有很高的温度，却只有一点点热量，例如，火花可以达到几千摄氏度，但连皮肤都不能灼伤，因为它的质量非常小。","chapter":"意识面面观","color":5},{"text":"意识是全脑皮质内部的信息传递，即意识从神经网络中产生，而神经网络存在的原因就是脑中有大量分享相关信息的活动。","chapter":"寻找意识思维的标志","color":5},{"text":"当代意识科学区分了三个最小化概念：警觉——觉醒的状态，在清醒或睡着时发生变化；注意——将大脑的资源集中在特定信息上；意识通达——有一些受到关注的信息会最终进入意识，并且可以向他人传达。","chapter":"界定“意识通达”","color":5}],"thoughts":[{"text":"用如今大语言模型的时髦话讲，这叫思维链，chain of thought","quote":"总的来说，这些实验证明，意识发挥了至关重要的作用。我们需要意识来理性地思考问题。强有力的无意识会产生错综复杂的直觉，但是只有意识可以一步一步地进行一个理性的决策。通过扮演类似于路由器的角色，并将信息输送到任意一串连续的加工中，意识似乎让我们拥有了一个新的运行模式——人脑图灵机。","chapter":""},{"text":"说得冠冕堂皇，怎么不直接将参考文献放在一个网页链接中呢？要知道让每位读者只为看参考文献而去下载一个以后用不到的app，这本身就不环保，手机要进行大量不必要的网络请求、数据流量，其本身就是一种能源浪费。\n我能做的就是以后尽量不读、不借、不买湛庐出品的任何书，不得已，就去看电子版。从而助力它的环保倡议。","quote":"﻿参考文献\n考虑到环保的因素，也为了节省纸张、降低图书定价，本书编辑制作了电子版的参考文献。请扫描下方二维码，下载“湛庐阅读”APP，搜索“脑与意识”，即可获取参考文献列表。","chapter":""},{"text":"按此推论，先尽量让无意识的干扰变成有意识的干扰，再通过意识消除，才能更有利我们反应速度的提升。但问题是，一个干扰如果是无意识的，我们又怎么能发现它呢？","quote":"相比干扰刺激可以被意识到时，干扰物处于无意识层面时产生的影响更为显著，一个有意识的干扰能被自主消除，而无意识却能保留所有烦人的内容，因为我们无法学会控制它6","chapter":""},{"text":"可以反过来借助大语言模型的原理来理解人类如何理解文本，有没有可能我们大脑具备了一种语词预测模型？当我们看书时，看到一个词语大脑会自动的预测下一个词语，如果这个预测和实际相符我们便自然的进行了理解（这种理解源于前期漫长的语词训练），如果不相符则对我们的模型进行更新。因此对于一篇包含大量与我们模型不相符的文章，我们就会觉得特别难懂，需要反复阅读才能增进理解。","quote":"瞥一眼每个单词就足以将它们放进总体论述的结构中了","chapter":""},{"text":"学习和反复练习的目的就是将一项需要有意识参与的活动变成无意识的行为。","quote":"这些复杂的操作完全发生在意识知觉之外。","chapter":""},{"text":"不由联想到康德、休谟","quote":"我们所感受到的有意识的视觉景象是一个经过了高度加工的图像，远远不同于我们眼中所接收到的未加工的信息。","chapter":""},{"text":"这让我想到我们很多时候凭直觉做出的判断是正确的也有可能类似于这种「空间忽视」。我们眼睛或者有意识的思维并没有观察到那个能影响我们做出判断的因素，但在大脑中仍在加工这些没有被意识到的因素，从而在最终下判断时让我们产生某种直觉。","quote":"很显然，他的大脑依然对视觉信息进行了足够深入的加工，才能让他将着火列入应该避免的危险类别中。","chapter":""},{"text":"能否用对用准日常用语是对一个人理性的度量。许多知识、学科正是产生于两种模糊表达的间隙之中。","quote":"科学经常通过提出新的分类来细化自然语言中的模糊分类，从而得到发展。科学史上的一个经典例子就是区别热量与温度的概念。在日常生活中，人们普遍将这两个概念归为一类。毕竟，将某样东西加热后就会提高它的温度，对吧？错了！一块冰被加热时，在融化的过程中，冰始终保持在0摄氏度。一种物质可以有很高的温度，却只有一点点热量，例如，火花可以达到几千摄氏度，但连皮肤都不能灼伤，因为它的质量非常小。","chapter":""},{"text":"如果意识是从神经网络中产生，那么利用类似神经网络技术的人工智能便也可能产生意识。","quote":"意识是全脑皮质内部的信息传递，即意识从神经网络中产生，而神经网络存在的原因就是脑中有大量分享相关信息的活动。","chapter":""}],"popularHighlights":[{"text":"当代意识科学区分了三个最小化概念：警觉——觉醒的状态，在清醒或睡着时发生变化；注意——将大脑的资源集中在特定信息上；意识通达——有一些受到关注的信息会最终进入意识，并且可以向他人传达。","count":400,"chapter":"界定“意识通达”"},{"text":"大脑比天空更辽阔， 因为，把它们放在一起时， 前者能轻松地 包容后者， 还有你。","count":323,"chapter":"格言"},{"text":"弗洛伊德个人的贡献就显得颇为投机了。这样形容他的工作也毫不为过：他的观点中可靠的部分都不是他自己提出的，而他自己提出的部分都是不可靠的。","count":238,"chapter":"无意识研究的历史"},{"text":"法国哲学家勒内·笛卡尔（Rene Descartes）提出的二元论思想影响十分广泛，他认为：脑的意识活动并不遵循物理规律，意识不是由物质组成的。","count":234,"chapter":"推荐序 开启意识探索之门"},{"text":"意识是全脑皮质内部的信息传递，即意识从神经网络中产生，而神经网络存在的原因就是脑中有大量分享相关信息的活动。","count":220,"chapter":"寻找意识思维的标志"},{"text":"不关注可以让任何事物从意识中消失","count":208,"chapter":"注意瞬脱"},{"text":"意识是世界上唯一真实的东西，也是最神秘的东西。","count":195,"chapter":"格言"},{"text":"“就让这些轻信的粗俗之人继续相信每天将生殖器与希腊神话联系就可以治愈心灵的创伤吧，我一点也不介意。”8","count":180,"chapter":"无意识研究的历史"},{"text":"我们所感受到的有意识的视觉景象是一个经过了高度加工的图像，远远不同于我们眼中所接收到的未加工的信息。","count":180,"chapter":"自动视觉加工"},{"text":"无意识的脑提出建议，而有意识的脑做出选择。","count":180,"chapter":"无意识的语义启动"},{"text":"我们的“意识流”，也就是那些组成心理世界并在脑中不断出现的文字和图片，其实源自我们一生中受教育和成长过程中形成的数以万亿计的突触中的随机锋电位。","count":156,"chapter":"自发活动的进化"},{"text":"笛卡尔二元论的产生并不是一时兴起，而是根据一种逻辑论断——机器不可能模仿意识的自由。","count":153,"chapter":"从笛卡尔谈起"},{"text":"学习发生的过程是由大脑连接的变化决定的。“共同激活的神经元相互连接”便是学习的过程。","count":135,"chapter":"从笛卡尔谈起"},{"text":"无意识的加工过程比有意识更为客观。大量无意识神经元估算着世界现状的真实概率分布，而意识却直接将其简化成全或无的样本。","count":135,"chapter":"无意识统计，有意识抽样"},{"text":"我们并不知道大脑需要在暗中付出多少努力才能创造出这幅简单而完整的视觉世界。","count":126,"chapter":"自动视觉加工"},{"text":"相比冲动购买而没有太多有意识思考的买家，那些花了精力有意识决定买什么的购物者报告称对自己所买的东西更不满意。","count":126,"chapter":"无意识与问题解决"},{"text":"而法国哲学家勒内·笛卡尔明确地提出了现在所谓的二元论：脑的意识是由非物质组成的，并不遵循物理规律。","count":121,"chapter":"从笛卡尔谈起"},{"text":"那就是我们的大脑掌管着一系列机智的无意识装置，这些装置不断地监控着周围的世界并且赋予其价值，以此来引导我们的注意并且塑造我们的想法。","count":121,"chapter":"无意识与决策"},{"text":"“自己”只是一个由社会经验填充的数据库，它与我们尝试理解他人思想的数据库是同一种形式，正因为如此，它才可能包括明显的差距、误解和偏见。","count":119,"chapter":"社会分享"},{"text":"我们的全脑神经工作空间并不是以一种“输入-输出”的形式来运作的，在刺激的作用下才会产生结果。相反，即使在完全的黑暗中，大脑也在不断地传递全脑的神经活动模式，产生威廉·詹姆斯所说的“意识流”","count":117,"chapter":"寻找意识思维的标志"}]},"25803779":{"rating":847,"ratingCount":790,"highlights":[],"thoughts":[{"text":"贝雅特丽齐的存在为辛克莱提供了一个寻找自己的入口，颇有点「我爱你，与你无关」的意思。","quote":"你我二人紧密相连，但那不是你本人，而只是你的意象，你是我命运的一部分。","chapter":""}],"popularHighlights":[{"text":"世界上任何书籍都不能带给你 rating":883,"ratingCount":1342,"highlights":[{"text":"成为快乐者，必须知道自己是快乐的。一个人从一场无梦的好睡中得到的唯一快乐，是醒后知道自己无梦地睡过了。快乐存在于快乐之外。\n没有知觉，就没有快乐。但对快乐的知觉带来不快乐，因为知觉一个人的快乐，就是知觉这个人已经度过了快乐，随之而来的，必是无奈曲终人散。身处快乐之中，就如同身处任何事局当中，知觉毁灭一切。然而，没有知觉又不可能存在。","chapter":"动物的快乐","color":5},{"text":"我的怀旧总是指向往日特定的画面。这就是为什么我对自己的童年百般依恋，就像对待别人的童年一样：它们都失落在无边的过去，成为纯粹的视觉现象被我的文学思维所察觉。","chapter":"无善无恶","color":5},{"text":"我更愿意相信，帮助或者慈善，在某种情况下也是干涉他人生活的一种恶行。好心是一种心血来潮，我们没有权利让自己即便是人道的或者侠义心肠的一时兴起，使他人成为受害者。施惠总是强加于人的事，这就是我对此大为憎恶的原因。","chapter":"无善无恶","color":5},{"text":"压在我身上的，是突如其来的概念，反映出我个人存在的真正本性。这种本性一无所为，但是在我之所感和我之所见之间，造成了昏昏欲睡的旅行。压在我身上的，像是一道判决，不是判决我赴死，而是判决我明白一切。","chapter":"看自己","color":5},{"text":"有一种关于知识的学问，我们通常定义为“学问”。也有一种关于理解的学问，我们称其为“文化”。","chapter":"我游历第八大洲","color":5},{"text":"生活全看我们是如何把它造就。旅行者本身就是旅行。我们看到的，并不是我们所看到的，而是我们自己。","chapter":"旅行者本身就是旅行","color":5},{"text":"当你看到某个人在眼前沉睡，极其相同的感觉也会油然而生。人们睡着了，便成为孩子，也许这是因为沉睡者无法作恶，甚至无法感知自己的存在。依靠自然的魔法，最邪恶、最顽固的自大狂，也可以在睡眠中露出圣洁之容。杀死一个孩子，与杀死一个熟睡中的人，在我看来没有任何可以体察到的差别。","chapter":"运动是沉睡的形式","color":5},{"text":"聪明人把自己的生活变得单调，以便使最小的事故都富有伟大意义。","chapter":"单调产生的快乐","color":5},{"text":"我们中的每一个人都是若干人，是很多人，是丰富的自我，比我们自己每一个人的无限增殖更为丰富。这就是为什么一个无视周围一切的人，也可以因周围的一切或喜或悲，从而有别于自己。我们的存在是一片巨大的殖民地，有很多不同类型的人，各别相异的思想和感觉全都共处其中。","chapter":"一个人是群体","color":5},{"text":"也许，永远当一个会计就是我的命运，诗歌和文学纯粹是在我头上停落一时的蝴蝶，仅仅是用它们的非凡美丽来衬托我的荒谬可笑。","chapter":"会计的诗歌和文学","color":5},{"text":"我觉得，我爱这一切，也许这是因为我没有别的什么可爱，或者，即使世上没有什么真的值得任何心灵所爱，多愁善感的我，却必须爱有所及。我可以滥情于区区一个墨水瓶之微，就像滥情于星空中巨大无边的寂冷。","chapter":"被上帝剥削","color":5},{"text":"一些先知和圣徒行走于空空人世，他们被他们的上帝剥削。","chapter":"被上帝剥削","color":5}],"thoughts":[{"text":"从来不会存在一个人的「生活」，生活必定是在社会性的群体中产生的。但作为个体，其生活的范围又受制于他的视域。一个好的艺术表达，就是对群体中不同个体的生活进行转述，让那些只有单一生活视域的观察者体会到这样的感受，要么感受到与之截然不同的生活视域，要么感受到能产生共鸣的重叠视域。","quote":"事实上，它们像一些梦幻，使我们得以体验到生活中从来没有的感受，魔变出生活中从来没有的图景；但它们只是梦幻而已，一个人从中苏醒之后，不会有记忆或者怀旧的愿望，更不会奢望从今往后据此过上一种高级生活。","chapter":""},{"text":"禅宗有个概念叫Shoshin（日语：初心），意思是初学者的心态。它指的是在学习时保持开放、渴望和缺乏成见的态度，即使是在高级水平上，也像初学者那样的态度对待学习。与作者此处的心态有点类似。","quote":"我现在感到，如果我仅仅是一个能够看见这一切的人，除了观赏以外与周围的一切毫无关系，如果我细察这一切，恰如一个成年旅游者今天刚刚抵达生活的表层，那该多么好！如果一个人生来一直疏于学习，不曾把诸多学舌而得的意义强加万物，他只能看到各种事物内在的意义，不在乎人们凭空外加的意义，那该多么好。如果一个人仅仅能够知道卖鱼女人的人性现实，无须去给她一个卖鱼妇的标签，无须知道她的存在和卖鱼的事实，那该多么好。如果一个人仅仅能够以上帝之眼来打量眼前的警察，那该多么好。如果一个人能够弃绝神学式的深研细究，只是像初次相逢时那样来注意一切事物，把它们视为神秘的显现，而且视之为现实之花的直接开放，那该多么好。\n我听到钟楼或者时钟敲击钟点的声音——虽然我没有计数，但可以肯定是八点钟了。","chapter":""},{"text":"但现实情况刚好相反，我们大多数人是因为不够聪明才让生活显得单调。也许真正的聪明人，是阅尽千帆后仍能积极寻找单调生活的人。","quote":"聪明人把自己的生活变得单调，以便使最小的事故都富有伟大意义。","chapter":""},{"text":"这种好当然不是每时每刻的好，而只是某时某刻的好。他只是帝王在两难决断前的一种自嗔。","quote":"恺撒曾经对雄心作过恰当的定义，他说：“作一个农夫比在罗马当副官更好。”","chapter":""}],"popularHighlights":[{"text":"我觉得，我爱这一切，也许这是因为我没有别的什么可爱，或者，即使世上没有什么真的值得任何心灵所爱，多愁善感的我，却必须爱有所及。我可以滥情于区区一个墨水瓶之微，就像滥情于星空中巨大无边的寂冷。","count":7072,"chapter":"被上帝剥削"},{"text":"也许，永远当一个会计就是我的命运，诗歌和文学纯粹是在我头上停落一时的蝴蝶，仅仅是用它们的非凡美丽来衬托我的荒谬可笑。","count":3885,"chapter":"会计的诗歌和文学"},{"text":"有时候，我认为我永远不会离开道拉多雷斯大街了。一旦写下这句话，它对于我来说就如同永恒的谶言。","count":2898,"chapter":"写下就是永恒"},{"text":"我的内心是一支隐形的交响乐队。我不知道它由哪些乐器组成，不知道我内心中喧响和撞击是怎样的丝竹迸发，是怎样的鼓铎震天。我只知道，自己就是这一片声音的交响。","count":2688,"chapter":"内心的交响"},{"text":"黄昏降临的融融暮色里，我立于四楼的窗前，眺望无限远方，等待星星的绽放。我的梦幻是一些旅行，以视阈展开的步履，指向我未知的国度、想象的国度、或者说简直不可能存在的国度。","count":2465,"chapter":"头脑里的旅行"},{"text":"不管眼下的想法如何让人不快，我不可能对这一切无动于衷无泪而别，不可能不知道：我的某一部分将与他们共存，失去他们的我，将与死无异。","count":2394,"chapter":"被上帝剥削"},{"text":"给生活减压的艺术，实际上并没给生活减除任何东西，它同生活自身一样单调，只是表现为另一种不同的方式。","count":2178,"chapter":"艺术在另一间房里"},{"text":"他还有点腼腆地说，因为他没什么地方可去，没什么事情可干，没什么朋友可拜访，也没什么有趣的书可读，所以每天晚饭以后，他总是回到那间租来的房间，用写作打发漫漫长夜。","count":2112,"chapter":"关于伯纳多·索阿雷斯（原序）"},{"text":"我们所有人对自由怯懦的爱，是无可辩驳的证据，证明我们的奴隶生活是如何与我们般配——因为一旦自由降临我们，我们全会将其当作一件太新鲜、太奇怪的东西而避之不及。","count":1872,"chapter":"生活之奴"},{"text":"我眼下日复一日的单调生活，将会成为我从未体察过的爱之记忆，成为我从未有过的胜利。","count":1802,"chapter":"作为符号的V先生"},{"text":"像往常一样，我走进了理发店，体验到一种愉悦：我能够走进一些我熟知而没有丝毫烦恼加害于我的地方。对一切新东西的敏感，经常折磨我。只有在自己曾经去过的地方，我才感到安全。","count":1800,"chapter":"我也将要消失"},{"text":"我从来不求被他人理解。被理解类似于自我卖淫。我宁可被人们严重地误解成非我的面目，宁可作为一个人被其他人正派而自然地漠视。","count":1692,"chapter":"不求理解"},{"text":"我所做的一切，所感的一切，所体验的一切，都将比这个或那个城市大街上每天过往的行者更加微不足道。","count":1586,"chapter":"我也将要消失"},{"text":"但是，任何人在当前生活中的命运就是被剥削，那么我的问题只能是：被V先生及其纺织品公司剥削，是否就比被虚幻、荣耀、愤懑、嫉妒或者无望一类东西来剥削更糟糕？","count":1520,"chapter":"被上帝剥削"},{"text":"给每一种情绪赋予个性，给每一种思维状态赋予灵魂。","count":1488,"chapter":"个性与灵魂"},{"text":"一个人只能看见他已经看见过的东西。","count":1425,"chapter":"不视而见"},{"text":"平庸是智力的一种构造，而现实，特别是当它是野蛮和粗俗的时候，就形成了一种对心灵的自然填补。","count":1408,"chapter":"里斯本这个托盘"},{"text":"文学想象的核心错误，就是这样的观念：别人都像我们，并且必定像我们一样感受。人类的幸运在于，每一个人都是他们自己，只有天才才被赋予成为别人的能力。","count":1365,"chapter":"单调产生的快乐"},{"text":"我有足够的钱来购买食品和饮品。我有可供安身之处，并且有足够的闲暇来做梦、写作以及睡觉——我还能向神主要求什么？还能对命运抱何种期望？","count":1200,"chapter":"会计的诗歌和文学"},{"text":"我最快乐的时候，是我既不思想也不向往的时候，甚至没有梦的时候，我把自己失落在某种虚有所带来的麻木之中，生活的地表上青苔生长。我品尝自己什么也不是的荒诞感，预尝一种死亡和熄灭的滋味，却没有丝毫苦涩。","count":1122,"chapter":"自闭"}]},"29629921":{"rating":934,"ratingCount":4513,"highlights":[{"text":"有时候觉得这就是我感觉和思考的方式，只有农民对世界的贡献最多。而其他的人呢，只在有了所有必需品之后，他们才深感有画画、读书之类的必要。所以在我的想象中，我绝对比不上农民。不过，我还是孜孜不倦地在我的画布上耕耘，就像他们在自己的土地上耕耘一样。","chapter":"Part Six 1889","color":5},{"text":"我在世上唯一的顾虑，就只有对这世界未尽的义务和责任，活在世间三十载，我还亏欠它一些可以流传后世的素描和绘画作为纪念品，不是为了某些特定活动应景作乐，而是为了在画中表达纯真的人性。这就是我的目标，而专注于这个想法，就可以让判断什么该做什么不该做变得更简单，也能使我免入混沌的歧途，因为我的一切作为，都是出于这个愿望。","chapter":"Part Three 1883","color":5},{"text":"实际上，我只不过就是一个爱自然、爱学习、爱工作，特别是爱人类的人啊。","chapter":"Part Two 1882","color":5},{"text":"如果想要画一幅有三个裁缝的画，你得画过大约九十个裁缝，才能水到渠成。","chapter":"Part Two 1882","color":5}],"thoughts":[],"popularHighlights":[{"text":"所以你追求的是什么？人的外表是否能反映他的内涵？人的灵魂里都有一团火，却没有人去那儿取暖，路过的人只能看到烟囱上的淡淡青烟，然后继续赶他们的路。","count":7515,"chapter":"Part One 1875—1881"},{"text":"我常常觉得自己无比富有，当然不是指金钱方面（尽管我现在贫穷，但也许不会一直如此），而是我有幸找到了自己的事业，可以为之投入全部身心和灵魂，而这份职业又能给予我启发，赋予我生命的意义。","count":4539,"chapter":"Part Three 1883"},{"text":"正因为我有一双天生要画画的手，我绝不能放下画笔。我问你，自从我选择开始画画，我可曾有过半点疑惑、犹豫和彷徨？我想你是懂的，我犹如战场上的士兵一样斗志昂扬，当然，仗打得越来越激烈了。","count":3762,"chapter":"Part Two 1882"},{"text":"艺术真的是滋养现实生命的必需品。因为这是真正的艺术，是用心性和灵魂加上才智创造出来的作品，就像那些你知道或可能亲眼见过的艺术家，对他们来说，文字和作品就是他们的生命与灵魂。","count":3465,"chapter":"Part One 1875—1881"},{"text":"早晨去特楠格林的路上真是漂亮，栗树、晨曦和明亮的蓝天，映照在泰晤士河上，草格外地绿，周围回荡着教堂的钟声。","count":3075,"chapter":"Part One 1875—1881"},{"text":"我希望这些荆棘最终可以开出白色的花，那样的话，这些痛苦的挣扎就像是分娩中的阵痛，痛苦之后会有欢乐的结果。","count":2970,"chapter":"Part One 1875—1881"},{"text":"我真想一个冬天都跟他们待在这里，要是那样，我就能真正体会到他们的感受了。男孩们把油渍弄到了寄给你的画上，你要原谅他们啊。","count":2862,"chapter":"Part One 1875—1881"},{"text":"文森特·梵高直到二十五六岁时才找到他的人生使命——成为一名艺术家。","count":2736,"chapter":"Part One 1875—1881"},{"text":"幸运的是，我的心不再渴望任何丰功伟业，所有我在绘画中想得到的，只是熬过这一生的一种方式。","count":2562,"chapter":"Part Five 1888"},{"text":"这儿一周来阴雨连绵，特别是在黄昏时路灯亮起来，灯光在湿漉漉的路面上闪烁，你真该来看看。","count":2535,"chapter":"Part One 1875—1881"},{"text":"只要你带着爱与智慧工作，对自然和艺术真诚的热爱就会赋予你一副对抗世俗看法的铠甲。","count":2492,"chapter":"Part Two 1882"},{"text":"这独特的风景和环境意境深远，似乎在对我说 ：“打起精神，不要害怕。”","count":2448,"chapter":"Part One 1875—1881"},{"text":"任何说着“噢，任何事都应该顺其自然”的人，做出的努力都太少了。那也叫足够？根本不够，即使你天生就懂很多东西，也要至少付出三倍的努力，才能从本能的发挥到达理性的创造。","count":2448,"chapter":"Part Four 1884—1887"},{"text":"但只能通过辛勤的工作，正如加瓦尔尼所说：不可一日不画。","count":2415,"chapter":"Part One 1875—1881"},{"text":"你知道什么能让这无形的囚牢消失吗？是每一种深刻而真实的爱。是朋友之谊，是手足之义，是情人之爱，正是爱至高无上的力量才能打破这无形的囚牢。没有爱的人，毫无生活可言。","count":2380,"chapter":"Part One 1875—1881"},{"text":"我变得越丑、越老、越病态、越穷，就越想用安排巧妙、生动明艳的色彩来报复这一切。","count":2296,"chapter":"Part Five 1888"},{"text":"其中最突出的一点，是他总能在风景和自然中寻得心灵的慰藉和创作的灵感。","count":2224,"chapter":"Part One 1875—1881"},{"text":"最近常常画到深夜，画下了一些有纪念意义的人和物，我在初次看到他们时就很受触动，画下来更加深了印象。","count":2074,"chapter":"Part One 1875—1881"},{"text":"实际上，我只不过就是一个爱自然、爱学习、爱工作，特别是爱人类的人啊。","count":2028,"chapter":"Part Two 1882"},{"text":"眼下我似乎事事不顺，而且这样已经很长一段时间了，或许还会持续下去，但也有可能否极泰来。我并不指望这样，可如果真有转机，我会认为这是莫大的收获，我会很高兴，会说：“果然不出所料，这一天终于来了！”","count":2000,"chapter":"Part One 1875—1881"}]},"31808211":{"rating":878,"ratingCount":2298,"highlights":[{"text":"我并没有夸张。请想象一下吧，监狱、镣铐、奴役，前面是漫长的忧伤岁月，生活单调得就像暗淡秋日的雨滴，——突然，所有这些受迫害、被囚禁的人们获准在短短的一个小时里展现才华，娱乐一下，忘却噩梦，组织一场完整的演出，而且组织得多么好啊：使全城都为之骄傲和惊讶，——瞧咱们的，他们说，这些囚犯怎么样！","chapter":"第十一章 演出","color":5},{"text":"在我国民间的所有地方，不论在什么环境里，不论在什么条件下，现在和将来永远会有一些很奇怪的人，他们性情温顺，往往还很勤快，可他们就是命中注定要永生永世一贫如洗。他们永远孤苦伶仃，邋邋遢遢，他们看上去永远是受尽折磨、郁郁寡欢的样子，而且一辈子听别人使唤，给别人跑腿，通常是伺候浮浪子弟或突然发财和升迁的人家。任何创举，任何倡议，对他们都意味着痛苦和烦恼。他们连出生都似乎是有条件的，即不可主动地有所作为，只能当仆役，生活不可以自己做主，只能随着别人的笛声跳舞，他们的使命就是给别人效劳。而且任何情况，任何天翻地覆的巨变都不能让他富起来。他们永远是赤贫者。","chapter":"第四章 最初的印象","color":0},{"text":"再比如说，有一个受过良好教育、品德高尚、有责任感和良心的人。他自己内心的痛苦使他在受到任何惩罚之前就已经痛不欲生了。他对自己罪行的审判比任何威严的法律都更为冷酷无情。同时这里还有另一个人，他在服苦役期间连一次也不曾想到过他所犯下的杀人罪行。他甚至认为自己是无罪的。还有这样的一些人，他们故意犯罪，就是要被关进监狱，从而摆脱在外面的那种远不如服苦役的生活。","chapter":"第三章 最初的印象","color":0},{"text":"在陀氏本人，也许并不十分明确地意识到这一点，因为他本人从来也没有谈论过类似的概念。但读者如果没有先入之见，在读完他的小说后，常常会有一种感觉，似乎作者在小说里通过人物之口，讨论了许多问题，或者通过作家的描写涉及了种种情景，但读者在掩卷沉思时，又常常会觉得无所适从。因为作者最终也没有在他的书里投下一个十分明确的结论。但他促使你对书中的叙事进行思考，每一个人物的声音都可以在你耳边絮叨，都在表明自己存在的理由，作家本人到底站在哪一个人物的后面，反而很难让人捉摸。这就是所谓的“复调”。","chapter":"“描绘人内心的全部深度”","color":5},{"text":"陀氏一生，磨难不断，除了政治上的迫害，经济窘迫也是他和俄国其他大作家不一样的地方，往往预支计划中作品的稿费，以解眉急。这在某种程度上也影响着他的写作风格，而为有些评家所诟病。但陀氏的写作风格正是冲动型的，不加掩饰的内心激动，急于表达的思想观念，形成陀思妥耶夫斯基别具一格的文风。他不可能像托尔斯泰或屠格涅夫那样字斟句酌地反复修改文稿。感情的激流一路狂泻，有时甚至显得痉挛纠葛的文风，构成了陀氏小说的别样格调。","chapter":"“描绘人内心的全部深度”","color":5},{"text":"一八六六年长篇小说《罪与罚》出版，这部小说给作家带来了世界性的声誉，作品表面的谋杀情节遮掩着作家对社会和人性的深入探索。小说涉及的十分广泛的论题早已冲破故事框架，所以读者掩卷后存留在脑际的往往是各种论题，如涉及“超人与庸人”的超人哲学、有关“强者与弱者”的权力真理，更有人在言语行为里不自觉的“潜意识”泄漏，以及再一次回响起的“苦难救赎”等等。由于每个论题都有相当的雄辩性，小说作为一个体裁竟第一次彰显出某种互不相让的思想争论的品格。这被后来的文学评论家巴赫金称作为小说的“复调结构”，影响着此后一百多年长篇小说结构上的发展，且至今被认真地讨论和研究着。","chapter":"“描绘人内心的全部深度”","color":5}],"thoughts":[{"text":"这样的快乐岂不也是一种救赎？","quote":"我并没有夸张。请想象一下吧，监狱、镣铐、奴役，前面是漫长的忧伤岁月，生活单调得就像暗淡秋日的雨滴，——突然，所有这些受迫害、被囚禁的人们获准在短短的一个小时里展现才华，娱乐一下，忘却噩梦，组织一场完整的演出，而且组织得多么好啊：使全城都为之骄傲和惊讶，——瞧咱们的，他们说，这些囚犯怎么样！","chapter":""},{"text":"三言两语就立住了彼得罗夫的人设，总觉得这是一个熟悉的陌生人，也许在影视剧中有编剧借鉴过陀氏？","quote":"一刻钟后，他已经照旧在监狱里无所事事地闲逛，似乎在寻找哪里有人讲什么新奇事儿，好凑过去听听。他好像对什么都感兴趣，可是不知怎么，却发生了这样的情况，他对所见所闻大多抱着冷漠的态度，就那样在监狱里无事闲逛，跑来跑去。也可以把他比作劳动者，一个健壮的劳动者，他能把工作干得有声有色，可是在没有工作给他做的时候，他就等着，坐下来和孩子们玩耍。我也不明白，他为什么要蹲在大牢里，为什么不逃跑？他是不会想到逃跑的，如果他没有要逃跑的强烈愿望的话。像彼得罗夫这样的人，理智起作用只有在他们还没有什么强烈愿望的时候。世上没有什么能阻碍他们实现自己的愿望。我深信，他能利落地逃走，能瞒过所有的人，能整个星期不吃不喝躲在哪里的树林里或河边的芦苇里。","chapter":""},{"text":"这段翻译感觉有点糟糕，先不说这里莫名其妙的分号，这个他到底指代的是谁？A？M？","quote":"他非常苦闷；","chapter":""},{"text":"抹杀劳动的意义，即剥夺那段处于劳动的时间，即杀死那段经历的生命","quote":"有一天我忽然想到，如果要彻底制服、压垮一个人，要对他处以一种最可怕的刑罚，以致最可怕的杀人凶手也闻之胆寒，不敢以身试法，——那么只要使劳动具有毫无益处、毫无意义的特点即可。","chapter":""}],"popularHighlights":[{"text":"有一天我忽然想到，如果要彻底制服、压垮一个人，要对他处以一种最可怕的刑罚，以致最可怕的杀人凶手也闻之胆寒，不敢以身试法，——那么只要使劳动具有毫无益处、毫无意义的特点即可。","count":3289,"chapter":"第二章 最初的印象"},{"text":"后来我才懂得，除了自由被剥夺，除了强制劳动，在苦役生活中还有一种痛苦，比其余的一切都更为强烈的痛苦。这就是：强制的群居。","count":2592,"chapter":"第二章 最初的印象"},{"text":"他忧伤地忍受着沉痛的心情，当天就重新投入工作，又埋头苦干几个月，幻想着那逝去的幸福的尽情畅饮的日子，接着渐渐振作起来，等待着另一个同样的日子，这一天还远着呢，但它终究会自行到来的。","count":2448,"chapter":"第三章 最初的印象"},{"text":"一切——都是对人的侮辱与凌虐……是呀，人的生命力真强！人是能适应一切的生物，我想，这是对人的最佳定义。","count":1650,"chapter":"第一章 死屋"},{"text":"由于幻想和疏阔，我们在监狱里会觉得，自由比真实的自由更自由，就是说，比实际上的、现实中的自由更自由。囚犯们夸大了真实的自由的概念。就囚犯而言，这是很自然的，是其天性中的一个特点。","count":1422,"chapter":"第十章 出狱"},{"text":"浪子和醉汉挥金如土，而对自己的雇工却锱铢必较，我发现这种情况不只是在监狱里有，也不只是在赌场上有。","count":1260,"chapter":"第四章 最初的印象"},{"text":"一个前所未知的完全陌生的世界、一些奇怪的现象、对沉沦的人们的某些独特的观感使我为之入迷，因而我是怀着浓厚的兴趣看了某些章节的。不言而喻，我的看法可能有误。姑且挑选两三章付印，以供读者诸君评判……","count":1200,"chapter":"引言"},{"text":"是的，上帝保佑！自由、新的生活、死而复活啊……这是多么美好的时刻！","count":1010,"chapter":"第十章 出狱"},{"text":"最后，它在监狱外的土围子上被一群狗撕成了碎片。","count":962,"chapter":"第六章 监狱里的动物"},{"text":"有些人记得他初次步入牢房时，年纪很轻，无忧无虑，对自己的罪行和所受的惩罚一概不放在心上。他出狱时已是白发老者，满怀愁绪和悲伤。","count":944,"chapter":"第一章 死屋"},{"text":"期盼了很久的节日过去了。明天又是平常的日子，又要出去干活了……","count":936,"chapter":"第十章 圣诞节"},{"text":"总之，人们当初曾热烈地吹捧库利科夫和阿—夫，现在又同样热烈地贬损他们，甚至是乐此不疲地加以贬损。似乎他们有什么地方得罪了所有的人。","count":936,"chapter":"第九章 逃亡"},{"text":"意……有些人说（我听到也读到过这种说法），对别人的最崇高的爱同时也是最大的利己主义。可这里哪有什么利己主义呀——我实在无法理解。","count":924,"chapter":"第六章 第一个月"},{"text":"不过，对所有那些不愿参加请愿而留在伙房的人们，同样，对所有那些最先高喊满意的人们，他们也没有一点生气的表示。甚至谁也不再提及此事。尤其是最后这一点，我是无法理解的。","count":918,"chapter":"第七章 请愿"},{"text":"民众从来不因为囚犯的罪行而责备他，不管是多么骇人的罪行，而且因为他受到了惩罚乃至因为他的不幸而宽恕他的一切。难怪俄国的全体民众都把犯罪叫作不幸，而把罪犯叫作不幸的人。","count":912,"chapter":"第四章 最初的印象"},{"text":"记得，我甚至会愉快地想，仿佛在夸耀自己的苦涩：在人世间我现在只剩下这仅有的爱我、依恋我的生物了，只剩下我的朋友、我唯一的朋友——我的忠诚的狗沙里克了。","count":900,"chapter":"第六章 第一个月"},{"text":"“我毕竟不是一辈子在这里，不过就是那么几年！……”我想，又把头垂落在枕头上。","count":896,"chapter":"第十一章 演出"},{"text":"有些往事仿佛模糊了，混淆在一起，只留下了一个总的印象：沉重、单调、窒息。","count":880,"chapter":"第二章 最初的印象"},{"text":"成年之前她们通常是带着面包来的；她们把妈妈烤好的面包拿来卖。成年后她们还是来，不过不带面包了；几乎历来如此。","count":848,"chapter":"第二章 最初的印象"},{"text":"没有一个目的和对目的的追求，没有一个活人能真正地活着。失去目的和希望，人往往会苦闷得变成一个怪物……我们所有人的目的就是自由和出狱。","count":820,"chapter":"第七章 请愿"}]},"32072431":{"rating":914,"ratingCount":3640,"highlights":[{"text":"他想通过这部小说来宣扬自己的人道主义理想，对当权者和广大公众提出双重警告，用一个故事来对自己同时代的当权者和公众呼吁：暴政会引起暴力，危机近在旦夕，人人都应慈悲为怀，流血只能造成更多的流血，仇仇相报无有已时，只有仁爱之心才能挽救浩劫。","chapter":"译后记","color":0},{"text":"“你替他去死吗？”她轻声问道。“也为了他的妻子和孩子。嘘！是的。”“啊，能让我握着你勇敢的手吗，素不相识的人？”“嘘！好的，我可怜的小妹妹，直到最后。”","chapter":"第十三章 五十二个","color":0},{"text":"由于人的恶习和疏忽引起的生理上的疾病，会不分贫富贵贱地使所有人感染；而由难以名状的苦难、无法忍受的压迫和毫无心肝的冷漠产生的心理上的紊乱，同样也会不加区别地侵袭每一个人。","chapter":"第十三章 五十二个","color":0},{"text":"后来人们回忆说，当他俯下身去，用嘴唇碰了碰她的脸时，低声说了一句话。那孩子离他最近，据她事后告诉大家说，她当时听见他说的是：“你所爱的人的生命。”在她成了一位慈祥端庄的老太太时，她也是这样告诉她的孙子孙女们的。","chapter":"第十一章 暮色苍苍","color":0},{"text":"在这毫无公正可言的法庭上，很少或者根本没有任何法律程序，让被告能有合理的申诉机会。可要是当初不那么极度地滥用法律程序和形式，这场革命也就不会发生，也就不会用这种革命的自杀性报复行为，来把它们通通砸烂了。","chapter":"第九章 定局","color":0},{"text":"西德尼又转过头去望着炉火，沉默了一会儿后，又接着说道：“我想问问你——你是不是觉得你的童年好像已经很遥远了？你坐在母亲膝头的日子，是不是觉得好像是很久以前的事了？”洛里先生也和他一样态度温和地回答说：“二十年前是这样，可是到了我现在这个年纪，却不然了。因为，我就像在兜一个圆圈，越是临近终点，就越是靠近起点了。这似乎是人生旅途上一种慰藉，使人在行将就木时心中有个准备的仁慈安排。现在，我的心又常为久已忘怀的许多往事而激动，我想到了我年轻漂亮的母亲（我自己都这么把年纪了！），也回忆起我涉世未深、我的毛病也还没有这般根深蒂固时的那些岁月。”","chapter":"第九章 定局","color":0},{"text":"“这让我很高兴。她是那样依恋你、信赖你。她看上去怎么样？”“又焦虑又痛苦，可是仍非常美。”“啊！”这声音悠长而悲哀，像一声叹息——几乎像一声呜咽。这声音引得洛里先生不由得转过头去看卡顿的脸，可是那张脸却已转向炉火。只见一道光或者是一道阴影（老先生说不清到底是哪一种），在那张脸上一闪而过，就像万里晴空之下一阵疾风突然掠过山坡。","chapter":"第九章 定局","color":0},{"text":"在瘟疫流行时，我们中有些人就会暗暗被那种病吸引——有时会闪过一个想要死于那种病的可怕念头。我们每个人的心中都埋藏着类似的奇怪东西，只有在适当的环境中才会暴露出来。","chapter":"第六章 胜利","color":0},{"text":"没有停歇，没有怜悯，没有和平，没有片刻松弛与休息，没有时间的划分。虽然昼夜仍如混沌初开时一样，有规律地循环不已，元年的第一日也照样有晨昏，可是别的计时方法却没有了。一个民族在狂热的时候，也像一个发高烧的病人一样，失去了时间观念。","chapter":"第四章 在风暴中镇定自若","color":0},{"text":"德法尔热太太和她同伴黑乎乎的影子吓人地落到了孩子的身上，母亲本能地跪倒在她身旁的地上，把她紧紧地搂在怀中。于是德法尔热太太和她同伴的浓重阴影，便可怕地落到母女俩的身上。","chapter":"第三章 阴影","color":0},{"text":"处于逆境、逃亡国外的老爷和英国本地的正统派，在谈起这场可怕的革命时，总喜欢把它描绘成没有播过种子却收获了恶果的天字第一号怪事——仿佛什么也没做，或者从未做过什么，最后却得到了这么个结果——仿佛那些明眼人从未看到千百万 下。","chapter":""},{"text":"这可真是非常克制和斯文的爱意","quote":"她的容貌也显得更加美丽动人，这使得她的丈夫真恨不得一连朝她看上几个小时。","chapter":""},{"text":"我不知道医学或者心理学上是否有这样的理论主张，但是通过这种「代理」的方式，的确更容易让谈话对象开口。好比对那些难言之隐，在心理上设置了一道屏风，并不直接谈论它，而是间接的接近，却能产生真实的效果。","quote":"不过，我不赞成当着他的面把它搬走，要趁他不在的时候搬。等他外出时，再送走他的老伙伴。”\n洛里先生马上同意这样做，从而结束了这场谈话。他们到乡间去玩了一天，医生已完全恢复了健康。在随后的三天里，他的状况一直很好。到了第十四天，他就动身前去和露西及她的丈夫会合。洛里先生事先已告诉他，为了解释他为什么一直没给女儿去信，他已采取了什么措施，医生也按照这一口径给露西写了信，所以她没有起疑。\n医生离家的当天晚上，洛里先生拿着斧头、锯子、凿子和榔头，普罗斯小姐举着蜡烛，两人一起来到他的房间。洛里先生关上房门，带着神秘而又负疚的心情，把那张鞋匠板凳劈成了碎片。普罗斯小姐在一旁举着蜡烛，像个谋杀案里的帮凶——说实在的，她那副冷酷无情的模样，干这行倒是个颇为合适的人物。","chapter":""},{"text":"敬能生畏，反之不行","quote":"对权贵的憎恨，就是下等人对上等人不由自主的敬畏。","chapter":""},{"text":"法国大革命口号是：\"自由、平等、博爱\"","quote":"我们已经失去了很多特权，一种新的哲学已经在社���上流行，如今要想维护我们原先的地位，就有可能（我不说势必，而只说可能）给我们惹出真正的麻烦。一切都很糟，糟透了！”","chapter":""},{"text":"https://www.antidote.info/en/blog/reports/bc-and-ad-bce-and-ce-whats-difference\n这篇文章有关于公元纪年中 BC 和 AD 以及 BCE 和 CE 的由来和区别以及用法的解释","quote":"事情发生在白衣修士区[45]悬剑巷克伦彻先生的寓所，时间是安诺·多米尼[46]一千七百八十年三月里一个刮风天的早上七点半钟——克伦彻先生总是把我主诞生后多少年说成安娜·多米诺[47]多少年，显然，他以为基督纪元是从一位女士发明一种大众化的牌戏算起，并以她的名字命名的。","chapter":""}],"popularHighlights":[{"text":"那是最美好的时代，那是最糟糕的时代；","count":4635,"chapter":"第一部 复活"},{"text":"公元一千七百七十五年就这样引领着这些赫赫人主和芸芸小民——其中包括本书所要记述的人物——沿着展现在他们面前的条条道路，向前走去。","count":4518,"chapter":"第一部 复活"},{"text":"“我现在做的，是我一生中做过的最好、最最好的事情；我即将得到的，是我一生中得到过的最安宁、最最安宁的休息。”","count":3487,"chapter":"第十五章 足音永逝"},{"text":"在这个方面，这家银行和这个国家极其相似，子民们只要一提出建议，想改进一下那些早就不得人心却偏受尊重的法律和陈规陋习，就会被剥夺继承权。","count":2160,"chapter":"第二部 金线"},{"text":"他说这番话时那种救世主的态度，使他的个子仿佛翻了一番，而那让人讨厌的程度，则翻了两番。","count":2070,"chapter":"第十一章 一幅伙伴图"},{"text":"他走进院子，独自在那儿逗留了一会儿，仰望着她房间窗口的灯光。他轻声对着窗口做了祝福，说了声“永别了”，便出门离去了。","count":2044,"chapter":"第十二章 夜色茫茫"},{"text":"虽然尚不能证明上述资料表册为该犯手迹，但无关紧要，这确实反倒更有利于起诉，证明该犯精于防范之术。","count":1989,"chapter":"第三章 失望"},{"text":"幸而缰绳、皮鞭、车夫和警卫联合作战，用实际行动驳斥了那种认为牲畜也有理性的论点，使马儿降服，重新执行自己的任务。","count":1965,"chapter":"第二章 邮车"},{"text":"许多好心肠的人，往往会一厢情愿地过分夸大自己所做的好事，从而产生了过分乐观的幻想。达尔奈先生也是这样，他甚至幻想自己可以运用某种影响，去左右这场凶猛可怕、失去控制的大革命。","count":1908,"chapter":"第二十四章 吸往磁礁[108]"},{"text":"他深知自己的症结所在，却听天由命，任凭自己年复一年地虚度光阴，消耗殆尽。","count":1872,"chapter":"第五章 胡狼"},{"text":"他听说她每天都去监狱附近。“她从这儿出来，”说着他朝四下里打量了一下，“朝这边拐，一定老在这些石头上走来走去。让我也沿着她的足迹走一趟吧。","count":1818,"chapter":"第九章 定局"},{"text":"“十八年！”旅客望着太阳说道，“慈悲的造物主啊！被整整活埋了十八年啊！”","count":1746,"chapter":"第三章 夜影"},{"text":"嗡嗡的人声，无数张仰望的脸，外围人群向前挤的脚步声一齐向前涌来，犹如卷来一股巨浪。刹那间，一切都逝去了。二十三。","count":1644,"chapter":"第十五章 足音永逝"},{"text":"他根本没有想到卡顿。他脑子里想到的全是别的人，一次也没有想到卡顿。","count":1605,"chapter":"第十三章 五十二个"},{"text":"这种酒洒满街心的石头，许多人被它染得血红的时日，快要到来了。","count":1554,"chapter":"第五章 酒店"},{"text":"人人都裹得这般严实，不仅躲开了同伴的肉眼，也躲开了他们的心眼。那年月，行路人萍水相逢，全都互存戒心，不轻易相信人，因为路上遇到的人，说不定就是一个强盗，或者是和强盗有勾结的人。","count":1496,"chapter":"第二章 邮车"},{"text":"“要知道，”太太说，“我对这个医生可一点儿也不在乎。不管他长着脑袋还是掉了脑袋，都跟我没有关系，对我全一个样。只是埃弗瑞蒙德家的人必须斩尽杀绝。他的老婆、孩子都得跟他一样，不能放过。”","count":1479,"chapter":"第十四章 编织到头"},{"text":"我们面前无所不有，我们面前一无所有","count":1440,"chapter":"第一部 复活"},{"text":"现在，她用自己创造的针法和符号，把要记的事全都编织下来了，这就像青天白日般一清二楚。相信她吧，要想从德法尔热太太的记事织物上抹去名字和罪行，比一个最胆小的懦夫想要自杀还难哩。”","count":1344,"chapter":"第十五章 编织"},{"text":"每当雇用一个年轻人进伦敦台尔森银行，他们总要把他藏起来一直放到老，把他像块干酪似的藏在一个阴暗的角落里，直到他浑身有了十足的台尔森味，长满斑斑青霉。","count":1326,"chapter":"第二部 金线"}]},"32282916":{"rating":758,"ratingCount":874,"highlights":[{"text":"然而，无视于当前的死亡率，民族的传记从布劳岱尔那冷酷地持续累积的墓园中攫取了堪为典范的自杀、令人悲痛的殉难、暗杀、处决、战争以及大屠杀。只是，为了要配合叙述的目的，这些激烈的死亡必须被记忆/遗忘成“我们自己的”。","chapter":"第十一章 记忆与遗忘","color":5},{"text":"上面所勾勒出来的美洲的双重性 ( doubleness ) 以及导致这种双重性产生的因素有助于解释为何民族主义会先出现在新世界，而不是旧世界。","chapter":"第十一章 记忆与遗忘","color":5},{"text":"地图先于空间现实而存在，而非空间现实先于地图存在。换言之，地图是为它声称要代表的事物提供了模型，而非那些事物本身的模型……它已经变成将地球表面的投影图具体化的真实工具了。","chapter":"第十章 人口调查、地图、博物馆","color":5},{"text":"这三种制度是人口调查、地图和博物馆这三者一起深刻地形塑了殖民地政府想象其领地的方式——在其统治下人类的性质、领地的地理、殖民地政府的家世 ( ancestry ) 的正当性。","chapter":"第十章 人口调查、地图、博物馆","color":5},{"text":"“官方民族主义”以一种远较此更微妙的方式进入了后革命时期的领导风格之中。我的意思是，这类领导阶层很容易就开始借用旧王朝和王朝制国家推定的民族属性 ( nationalnost ) 。透过一种惊人的回溯运动，他们把那些不知道什么是“中国”、“南斯拉夫”、“越南”或“柬埔寨”的帝王们全都变成了民族的同胞（即使并非总是“值得赞许的”同胞）。从这个“对过去的”包容顺应之中总是会产生那种“国家的”马基雅维利主义，这种马基雅维利主义是后革命政权的一个鲜明特征，和革命民族主义运动形成了对比。只要旧王朝国家归化程度越深，它那古老的华服就越能被裹在革命家的肩上。","chapter":"第九章 历史的天使","color":5},{"text":"官方民族主义通常是受到威胁的王朝和贵族集团——上层阶级——对群众性方言民族主义所产生的反应。殖民地的种族主义是试图结合王朝的合法性与民族共同体的那个“帝国”的概念的主要成分。","chapter":"第八章 爱国主义和种族主义","color":5},{"text":"事实上，民族主义乃是从历史宿命的角度思考的，而种族主义所梦想的却是从时间开始经由一系列永无止境而令人作呕的交配传递下来的永恒的污染——这是发生在历史之外的。","chapter":"第八章 爱国主义和种族主义","color":5},{"text":"在其内在形式中，这些绰号有着种族主义的特性。一旦解读了这个内在形式，我们就会明白为什么奈伦关于种族主义和反犹主义是衍生自民族主义——以及因此“从充分的历史纵深来看，法西斯主义比任何其他（历史的）插曲更能说明民族主义的特质”——的主张基本上是错的。","chapter":"第八章 爱国主义和种族主义","color":5},{"text":"民族就是用语言——而非血缘——构想出来的，而且人们可以被“请进”想象的共同体之中。所以今天就算是最独立的国家，不管它们在实际上把手续弄得有多困难，也还是接受了归化 ( naturalization ) （多么美好的字眼！）的原则。","chapter":"第八章 爱国主义和种族主义","color":5},{"text":"欧裔海外移民的民族主义、方言民族主义和官方民族主义的教训，以不同的组合形态被仿造、改编和改进。最后，正如资本主义以渐增的速度改造了物理的和知识的传播工具一样，知识分子们也找到了不经由出版印刷就能宣传想象的共同体的方法，而且他们不只向不识字的群众宣传，甚至也向阅读不同语言的识字群众宣传。","chapter":"第七章 最后一波","color":5},{"text":"作为结语，我们也许值得在此把本章的一般论证再复述一遍。“最后一波”的民族主义——大多发生在亚洲和非洲的殖民地——就起源而论乃是对工业资本主义所造就的新式全球帝国主义的一个反应。正如马克思以其难以模仿的风格所言：“一个持续扩张的市场对产品的需求把资产阶级赶到了地球表面的每个角落。”￼然而经由印刷品的散布，资本主义协助在欧洲创造出群众性的、以方言为基础的民族主义，而这个民族主义则从根本上腐蚀了历史悠久的王朝原则，并且煽动了每一个力有所及的王朝去进行自我归化。官方民族主义——新的民族原则和旧的王朝原则的融合（大英帝国）——再反过来导致我们为了方便起见称之为“俄罗斯化”的政策出现在欧洲以外的殖民地。这个意识形态倾向干净利落地调和了实际的迫切需要。","chapter":"第七章 最后一波","color":5},{"text":"语言不是排除的工具 ( instrument of exclusion ) ：原则上，任何人都可以学习任何一种语言。恰好相反的是，它根本上是具有包容性的 ( inclusive ) 。它所受到的唯一限制是巴别塔 ( Babel ) 的宿命：没有人的生命长到足以学会所有语言。发明民族主义的是印刷的语言，而不是任何一个特定的语言本身。","chapter":"第七章 最后一波","color":5},{"text":"对这些“官方民族主义”最好的诠释是，将之理解为一种同时结合归化与保存王朝的权力，特别是它们对从中世纪开始累积起来的广大的多语领土的统治权的手段，或者，换个表达方式来说，是一种把民族那既短又紧的皮肤撑大到足以覆盖帝国庞大的身躯的手段。","chapter":"第六章 官方民族主义和帝国主义","color":5},{"text":"当德皇威廉二世派给自己“头号的德国人”角色时，他暗暗承认了他是很多和他同类的人当中的一个，他具有代表的功能，以及因此在原则上他有可能变成他德国同胞的叛徒。（这在王朝的全盛时期是无法想象的。要背叛谁，或者背叛什么事情？）","chapter":"第六章 官方民族主义和帝国主义","color":5},{"text":"我所主张的是，我们应该将民族主义和一些大的文化体系，而不是被有意识信奉的各种政治意识形态，联系在一起来加以理解。这些先于民族主义出现的文化体系，在日后既孕育了民族主义，同时也变成民族主义形成的背景。只有将民族主义和这些文化体系联系在一起，才能真正理解民族主义。","chapter":"第二章 文化根源","color":5},{"text":"资本主义的这种朝向方言化的革命性冲刺还受到了三个外部因素的进一步推动，而这其中的两个因素更直接导致了民族意识的兴起。","chapter":"第三章 民族意识的起源","color":5},{"text":"霍布斯鲍姆观察到：“法国大革命既不是由一个现代意义的政党或运动，也不是由想要实践一个有系统的纲领的人所创造或领导的。直到拿破仑这个后革命时期的人物出现以前，它根本没有产生过我们在 20 世纪的革命中所常见的那种‘领袖’。”￼然而一旦它发生了，它就进入了印刷品那具有累积性的记忆中。那被它的创造者与受害者所经历的、席卷一切的魅惑的事件，连锁变成一个有它自己名字的“东西”：法国大革命。如同一块庞大而无形状的巨石被无数水滴磨蚀成圆形的大岩块一般，法国大革命的经历被数以百万计印刷出来的字塑造成一个印在纸页上的“概念” ( concept ) ，而且，当时机一到，再变成了一个模式。为什么“它”爆发，“它”的目标是什么，为什么“它”会成功或失败——这些都变成了朋友和敌人之间无休止的争论的主题：然而，此后就再没有人对所谓“它的实存性” ( it-ness ) 有过什么怀疑。￼","chapter":"第五章 旧语言，新模型","color":5},{"text":"在积极的意义上促使新的共同体成为可想象的，是生产体系和生产关系（资本主义）、传播科技（印刷品）和人类语言宿命的多样性这三个因素之间半偶然的，但又富有爆炸性的相互作用。","chapter":"第三章 民族意识的起源","color":5},{"text":"在此我们必须记得，在中世纪的西欧，拉丁文的普遍性从未与一个普遍的政治体系相重合。这点和帝制时期的中国那种文人官僚系统与汉字圈的延伸范围大致吻合的情形形成对比，而这个对比则颇富教育意义。","chapter":"第三章 民族意识的起源","color":5},{"text":"我主张在历史上直到三个根本的、都非常古老的文化概念丧失了对人的心灵如公理般的控制力之后，并且唯有在这个情况发生的地方，想象民族的可能性才终于出现。第一个概念认为特定的手抄本（经典）语言之所以提供了通往本体论真理的特权途径，恰恰因为它本身就是那个真理的一部分。正是这个理念孕育了基督教世界、伊斯兰教世界和其他跨越各大洲的信仰集团 ( sodalities ) 。第二个概念则相信社会是自然而然地在至高的中心——和其他人类隔绝，并依某种宇宙论的（神意的）律则施行统治的君王——的四周与下方组织起来的。人的效忠必然是层级而向心的，因为统治者和神圣经典一样，既是通往存有之路，同时也内在于存有之中。第三是一个时间性的概念，在这个概念中，宇宙论与历史无法区分，而世界和人类的起源在本质上是相同的。合在一起，这些观念遂将人类的生命深植于事物本然的性质之中，对存有的日常宿命性（最重要的是死亡、损失和奴役）赋予某种意义，并且以各种不同的方式提供从这些宿命中获得救赎之道。","chapter":"第二章 文化根源","color":5},{"text":"这个概念把时间看成很接近本雅明所说的“弥赛亚时间”，一种过去和未来汇聚于瞬息即逝的现在的同时性。￼在这种看待事物的观点中，“其时” ( meanwhile ) 一词是不可能具有真正的意义的。","chapter":"第二章 文化根源","color":5},{"text":"它的合法性源于神授，而非民众——毕竟，民众只是臣民 ( subjects ) ，不是公民 ( citizens ) 。在现代概念中，国家主权在一个法定疆域内的每平方厘米的土地上所发生的效力，是完全、平整而且均匀的。","chapter":"第二章 文化根源","color":5},{"text":"但是，尽管伟大的宗教的想象共同体曾享有崇高的威望，他们的不自觉的整合性，却从中世纪后期开始稳定地衰退。有种种理由导致了这样的衰退，然而我在此仅欲强调和这些共同体独特的神圣性有直接关联的两项因素。","chapter":"第二章 文化根源","color":5},{"text":"所有伟大而具有古典传统的共同体，都借助某种和超越尘世的权力秩序相联结的神圣语言为中介，把自己设想为位居宇宙的中心。因此，拉丁文、巴利文、阿拉伯文或中文的扩张范围在理论上是没有限制的。（事实上，书写文字越死——离口语越远——越好：原则上人人皆可进入纯粹符号的世界。）","chapter":"第二章 文化根源","color":5},{"text":"最后，民族被想象为一个共同体，因为尽管在每个民族内部可能存在普遍的不平等与剥削，民族总是被设想为一种深刻的，平等的同志爱。最终，正是这种友爱关系在过去两个世纪中，驱使数以百万计的人们甘愿为民族——这个有限的想象——去屠杀或从容赴死。","chapter":"第一章 导论","color":5},{"text":"本书的目的在于尝试对民族主义这个“异常现象”提出一个比较令人满意的诠释。我觉得，在这个问题的处理上，马克思主义和自由主义的理论都因为陷入一种“晚期托勒密式”的“挽救这个现象”的努力，而变得苍白无力；我们亟需将理解这个问题的角度，调整到一种富有“哥白尼精神”的方向上。","chapter":"第一章 导论","color":5},{"text":"埃里克·霍布斯鲍姆说过：“马克思主义运动和尊奉马克思主义的国家，不论在形式还是实质上都有变成民族运动和民族政权——也就是转化成民族主义——的倾向。没有任何事实显示这个趋势不会持续下去。”","chapter":"第一章 导论","color":5},{"text":"安德森虽然认为“民族”是一种现代的“文化的人造物”，但他并不认为这个“人造物”是“虚假意识”的产物。“想象的共同体”不是虚构的共同体，不是政客操纵人民的幻影，而是一种与历史文化变迁相关，根植于人类深层意识的心理的建构。","chapter":"认同的重量：《想象的共同体》导读","color":5},{"text":"《想象的共同体》对民族主义研究的贡献或许可以被归纳为如下几点：首先，它不是用族群、宗教、语言等社会要素解释民族形成，也不是用工业化或一般意义的资本主义说明民族主义的兴起，而是别有新意地提出印刷资本主义与新的政治共同体形成之间的伴生关系。这为民族形成是一种现代创造过程或想象过程的论点提供了前提，也为颠倒传统观念中民族与民族主义的衍生关系铺平了道路，即不是民族产生了民族主义，而是民族主义创造了民族。其次，历来的民族主义研究都将法国大革命的政治原则和欧洲民族国家的诞生视为一种向全球扩展的体系，并以此为主要视角分析非西方地区的民族主义，而安德森却倒置了民族主义的历史，即民族主义并不是一种欧洲的产物，恰恰相反，最早的民族主义是发生在北美的“克里奥尔”民族主义，即一种远程的民族主义。或者说，最早的民族主义是殖民主义全球关系的产物。","chapter":"民族主义研究中的老问题与新困惑","color":5},{"text":"安德森对民族主义现象进行了重新叙述，即有关民族主义的三重分类。不同于那些认为民族主义是从欧洲漫延至世界其他地区的传统观点，他认为民族主义的第一波是发生在北美殖民地的“克里奥尔民族主义”，或称远程民族主义。这一民族主义综合了殖民地各阶层的诉求，反抗宗主国的压迫和不平等对待，但在价值上同时汲取了欧洲启蒙思想。这种对于新的政治共同体的想象是那些去往宗主国的“克里奥尔”官员和当地“克里奥尔”印刷工的创造物。南北美洲在 19 世纪兴起的新一波大众性民族主义正是对于这一民族主义版本的回应。第二种民族主义模式，也是被其他地区民族主义最常复制的模式，是欧洲的语言民族主义，正是通过这语言民族主义的创造，一种取代帝国的、奴隶制和封建等级制的，即主权的政治共同体诞生了。第三种民族主义即官方民族主义，即由国家由上至下推进的文化统一与政治统一的进程，通过在交流工具（印刷术）、普及教育和内政构造等各方面的强制推行，上层统治最终促使包含多样性的和地方性的文化趋于同质化。","chapter":"民族主义研究中的老问题与新困惑","color":5},{"text":"拉康的现实的、想象的和象征的三界说","chapter":"民族主义研究中的老问题与新困惑","color":0},{"text":"《想象的共同体》最著名的观点是：民族是一个想象出来的政治意义上的共同体，即它不是许多客观社会现实的集合，而是一种被想象的创造物。","chapter":"民族主义研究中的老问题与新困惑","color":5}],"thoughts":[{"text":"\t•\t该书以对抗欧洲中心主义、运用非欧洲语言材料的民族主义历史比较研究为目的。\n\t•\t该书偏好探讨小国民族主义，并对英美帝国主义持批评态度。\n\t•\t通过提出”想象的共同体”概念，将吸引力的有机社会连带和令人不安的事物相结合。\n\t•\t该书对被广为宣传的”自古以来的”民族主义做出批判性评价。\n\t•\t该书结合历史唯物论和论述分析方法，是马克思主义的现代主义与后现代主义的结合。","quote":"在试图找出为何《想象的共同体》结果会那么广泛地，而且相当迅速地以“教科书”的姿态被翻译出来的原因时，我发现了以下几个最可能的答案。","chapter":""},{"text":"一、大西洋的漫无际涯与大西洋两岸迥异的地理条件，那种将人口逐步吸纳到较大的政治文化单元的过程不可能在此发生。\n第二，欧洲移民社群的规模，就在维持其自身文化的完整性以及在当地的政治优势地位上，扮演了重要角色。￼\n第三，殖民帝国的母国部署了使其在几世纪以来都能有效支配欧裔移民的强大官僚和意识形态机构。\n从而导致\n一、革命家们梦想要重新安排帝国内部的权力分配——通过将母国从欧洲转移到美洲来逆转先前的支配关系。￼从而让让新伦敦守护新旧伦敦之间持续的平行存在关系。\n二、欧洲海外移民是一个受制于欧洲，但同时却又不必过度畏惧欧洲的重要集团。革命战争尽管惨烈，却仍然只是亲戚之间的战争。￼这个家族的联系确保在某个尖锐的时期过去以后，前母国和新民族之间还是可以重新建立起文化的——而且有时候也有政治和经济的——密切关系。","quote":"上面所勾勒出来的美洲的双重性 ( doubleness ) 以及导致这种双重性产生的因素有助于解释为何民族主义会先出现在新世界，而不是旧世界。","chapter":""},{"text":"The map is not the territory. 这句话可能语出 Alfred Korzybski. 地图不是地域，它只是对地域的抽象表达， 但人们很容易错误的认为地图就代表了地域，这一隐喻可以推广到很多方面：the word is not the thing, the model is not the data","quote":"地图先于空间现实而存在，而非空间现实先于地图存在。换言之，地图是为它声称要代表的事物提供了模型，而非那些事物本身的模型……它已经变成将地球表面的投影图具体化的真实工具了。","chapter":""},{"text":"从时间线上看第一波民族主义的诞生在北美殖民地，又称远程民族主义，是早期殖民地区欧洲移民所推动的，在当地的欧洲海外移民由于政治上的朝圣之旅受到了本土化的限制，发展出了独立意识；第二波民族主义则发生在欧洲本土，又可分为两种民族主义模式，其一是通过语言和印刷资本主义创造的语言民族主义，也是最常被复制的民族主义形式，其二是有国家之上而下推动的官方民族主义；第三波也是作者所说的最后一波民族主义诞生于第二次世界大战之后，它既是对官方民族主义的反应（reaction）也是对前述另外两种民族主义的模仿。在这样的论述背景下，作者认为自己以“哥白尼精神”的方向，提出共同体是想象的产物，亦即是民族主义产生了民族，而非相反。","quote":"欧裔海外移民的民族主义、方言民族主义和官方民族主义的教训，以不同的组合形态被仿造、改编和改进。最后，正如资本主义以渐增的速度改造了物理的和知识的传播工具一样，知识分子们也找到了不经由出版印刷就能宣传想象的共同体的方法，而且他们不只向不识字的群众宣传，甚至也向阅读不同语言的识字群众宣传。","chapter":""},{"text":"两个原因导致宗教共同体的影响力式微: 1. 对新世界的探索，扩充了人类对生活形成的概念认识；2. 印刷术的发明，让宗教的「神圣语言」不再成为唯一的主流。","quote":"但是，尽管伟大的宗教的想象共同体曾享有崇高的威望，他们的不自觉的整合性，却从中世纪后期开始稳定地衰退。有种种理由导致了这样的衰退，然而我在此仅欲强调和这些共同体独特的神圣性有直接关联的两项因素。","chapter":""},{"text":"官方民族主义，将民族与王朝刻意的融合，让改装的成民族的帝国看起来更有吸引力，它是对群众性民族运动的反应(reaction)与模仿过程。","quote":"对这些“官方民族主义”最好的诠释是，将之理解为一种同时结合归化与保存王朝的权力，特别是它们对从中世纪开始累积起来的广大的多语领土的统治权的手段，或者，换个表达方式来说，是一种把民族那既短又紧的皮肤撑大到足以覆盖帝国庞大的身躯的手段。","chapter":""},{"text":"来自ChatGPT：\n作者使用象皮病这个比喻来说明，语言学和辞典编纂学的革命以及民族主义运动作为资本主义和君主制国家的产物，给君主制国家带来了越来越多的文化和政治上的困难。这种困难可能是因为在这个时期，社会变革和民族主义意识的兴起使得旧有的统治秩序和文化传统变得越来越难以维持，类似于象皮病导致皮肤异常增厚的状况。因此，这个比喻强调了在19世纪中期后半期发生的社会和政治变革对君主制国家产生的挑战和困难。","quote":"象皮病","chapter":""},{"text":"宗教共同体、王朝、时间并进的同时性这些概念逐渐被取代的过程，即是民族意识觉醒的工程","quote":"我所主张的是，我们应该将民族主义和一些大的文化体系，而不是被有意识信奉的各种政治意识形态，联系在一起来加以理解。这些先于民族主义出现的文化体系，在日后既孕育了民族主义，同时也变成民族主义形成的背景。只有将民族主义和这些文化体系联系在一起，才能真正理解民族主义。","chapter":""},{"text":"第一个，也是最不重要的因素，是拉丁文自身的改变。由于人文主义者不辞辛劳地复兴了涵盖范围甚广的前基督教时期的古代文学作品，并且通过出版市场加以传播，一种对古代人繁复的文体成就的新理解在全欧洲的知识阶层当中已经明显可见。\n第二个因素，是其本身之成功同样受惠于印刷资本主义的宗教改革的影响。\n第三个因素是，被若干居于有利地位并有志成为专制君王的统治者用作行政集权工具的特定方言缓慢地，地理上分布不均地扩散。","quote":"资本主义的这种朝向方言化的革命性冲刺还受到了三个外部因素的进一步推动，而这其中的两个因素更直接导致了民族意识的兴起。","chapter":""},{"text":"资本主义、印刷品、语言多样性，造成旧的想象共同体的瓦解，诞生新的想象共同体，我想，这将是一个周期性的事件。","quote":"在积极的意义上促使新的共同体成为可想象的，是生产体系和生产关系（资本主义）、传播科技（印刷品）和人类语言宿命的多样性这三个因素之间半偶然的，但又富有爆炸性的相互作用。","chapter":""},{"text":"在印刷术发明前，书本是稀罕之物，知识的传播缺少物理载体，口口相传则更多的是经验之谈，因此知识，更多的是被土豪和贵族垄断，无形中也形成了知识的垄断，从而让知识得到世袭。印刷术之后，一般家庭也能接触到一手的知识，这无疑极大的改变了社会整体的文化水平。这点在欧洲尤其突出，因为印刷术还有个让人忽视的功能在于能精确的复制图表，为大航海时代的航海家们提供了更为精确的地图。","quote":"第一个，也是最不重要的因素，是拉丁文自身的改变。由于人文主义者不辞辛劳地复兴了涵盖范围甚广的前基督教时期的古代文学作品，并且通过出版市场加以传播，一种对古代人繁复的文体成就的新理解在全欧洲的知识阶层当中已经明显可见","chapter":""},{"text":"来自ChatGPT:\n本雅明的《弥赛亚时间》（Messianic Time）是一篇哲学随笔，探讨了时间、历史和救赎的概念。在这篇文章中，本雅明提出了“弥赛亚时间”的概念，认为这是一种超越了线性时间和历史进程的时间感受和存在方式。\n弥赛亚是犹太教中的救世主，代表着救赎和拯救的力量。在本雅明的理论中，“弥赛亚时间”指的是一种超越了历史进程和线性时间的存在方式，它不是过去、现在和未来的顺序，而是所有时间的永恒现在。在这种时间感受中，过去和未来的时刻都可以被当做同时发生的，因为弥赛亚时间是一种永恒的、全面的存在状态。\n本雅明认为，当我们意识到“弥赛亚时间”的存在，我们可以更好地理解历史和时间的本质。这种超越了线性时间的时间感受也代表着一种拯救的力量，可以帮助我们摆脱被历史所束缚的束缚和限制。因此，本雅明将弥赛亚时间视为一种解放和救赎的力量，是一种人类可以寻求的精神层面的自由。","quote":"这个概念把时间看成很接近本雅明所说的“弥赛亚时间”，一种过去和未来汇聚于瞬息即逝的现在的同时性。在这种看待事物的观点中，“其时” ( meanwhile ) 一词是不可能具有真正的意义的。","chapter":""},{"text":"一个题外话：为什么中国的印刷术（1040）比欧洲古腾堡印刷术（1450）的发明早了400年，世界将印刷出版的功劳给了古腾堡？这篇文章https://erikexamines.substack.com/p/why-was-western-printing-superior试图回答这个问题。尽管古腾堡的印刷术发明时间比中国毕升晚了四个世纪，但他发明的是一个印刷的“机器”，相较而言，我们还停留在“术”上。1600年左右，欧洲出版社日印刷量可达1500-3600页，而中国仅约40页，在字模制造方面，利用使用铅、锡和锑合金配合手工磨具，一个有经验的师傅可以用古腾堡的技术每天制作4000-5000个字模，而使用中国木刻技术的同行仅能制作最多70个。利用机器进行可靠的快速印刷，也让欧洲的出版物价格急剧下降，仅发明50年，欧洲书本的价格下降了约60倍，到1600年，书本的价格是更是下降了300-1000倍。价格的下降也让知识迅速的普及，欧洲的识字率很快就追上了中国。实际上，欧洲早前的低识字率要归因于其昂贵的书写载体——羊皮纸、牛皮纸。直到1390年，才有证据显示德国能够造纸，而仅仅50年后，古腾堡就发明了印刷机器，从而让欧洲的印刷出版起飞。\n我想除了作者提到工程方面的原因，盲猜还有文化（如中文字与西文字不同语系导致的字模机器制作单独的区别）以及政治（出版物管控、文字狱）上等的原因。","quote":"在后文中我们自会讨论印刷资本主义 ( print-capitalism ) 的无比重要性。","chapter":""},{"text":"来自ChatGPT:\n布迪厄（Pierre Bourdieu）是一位法国社会学家和思想家，他的理论和方法被称为布迪厄学派，其中包括一种被称为布迪厄式论证的方法。布迪厄式论证是一种基于社会学、人类学和哲学的批判性理论方法，旨在揭示社会现象的深层结构和力量关系。\n布迪厄式论证的核心概念包括“资本”、“场域”、“惯性”和“符号暴力”。在这种方法中，社会被视为一个由不同形式的资本（如经济、文化和社会资本）和场域（如教育、政治和文化领域）组成的复杂网络。惯性指的是社会结构和关系的稳定性和持久性，而符号暴力则指社会中文化和语言等符号系统对于个体和群体的压迫和影响。\n布迪厄式论证的方法包括深入的实地调查、批判性分析和构建理论模型。它的目标是揭示社会现实的深层结构和力量关系，以及这些结构和关系如何影响个体和群体的行动、想法和价值观。这种方法已经被广泛应用于研究社会不平等、文化生产、教育、政治和其他社会领域，并对社会科学和人文学科的发展产生了深远影响。","quote":"他在“人口调查、地图、博物馆”一章中提出了一个布迪厄式 ( Bourdieuian ) 论证","chapter":""},{"text":"来自 Claude+:\n拉康提出的现实的、想象的、象征的三界说是理解人的精神结构的重要理论。\n现实的界指的是客观存在的、不依赖主观的物质世界。这是最基本的界,包括人的生理结构、环境等。\n想象的界是主观的、依赖个人经验和心理活动的界。它由个人的想象、梦、幻觉等组成。这个界不像现实的界那样客观存在,但对个人来说却是真实的和有效的。\n象征的界处在想象的界和现实的界之间。它由语言、习俗、文化等共同体所有的象征系统组成。象征的界既不完全主观,也不完全客观,但却是人们互相理解和交流的基础。\n这三个界相互作用和渗透,共同构成人的精神生活。拉康强调,要理解人性,必须考虑到这三个界的复杂相互作用,而不应过分强调任何一个界。这一理论为理解人的心理和行为提供了一个多维和综合的视角。\n所以,拉康的三界说从结构上描绘了人类精神世界的构成,并对人性的解释提供了一个整体和动态的框架。这是一个非常富有洞察力的理论,对后来的心理学和人类学产生了很大影响。","quote":"拉康的现实的、想象的和象征的三界说","chapter":""},{"text":"即使是想象的，也不能在心里贬低他的力量，人类发展至今，想象力起着至关重要的作用。","quote":"《想象的共同体》最著名的���点是：民族是一个想象出来的政治意义上的共同体，即它不是许多客观社会现实的集合，而是一种被想象的创造物。","chapter":""}],"popularHighlights":[{"text":"遵循着人类学的精神，我主张对民族作如下的界定：它是一种想象的政治共同体——并且，它是被想象为本质上有限的 ( limited ) ，同时也享有主权的共同体。","count":935,"chapter":"第一章 导论"},{"text":"这个时代所亟需的是，通过世俗的形式，重新将宿命转化为连续，将偶然转化为意义。","count":848,"chapter":"第二章 文化根源"},{"text":"《想象的共同体》最著名的观点是：民族是一个想象出来的政治意义上的共同体，即它不是许多客观社会现实的集合，而是一种被想象的创造物。","count":840,"chapter":"民族主义研究中的老问题与新困惑"},{"text":"没有什么比无名战士的纪念碑和墓园，更能鲜明地表现现代民族主义文化了。这些纪念物之所以被赋予公开的、仪式性的敬意，恰好是因为它们本来就是被刻意塑造的，或者是根本没人知道到底是哪些人长眠于其下。","count":546,"chapter":"第二章 文化根源"},{"text":"西方基督教文明是一种罪感的文化，而日本或东亚是耻感的文化，前者源自超越的视角，是真正个人主义的，而后者却是在他者注视下的情感方式，是共同体伦理的产物。","count":450,"chapter":"民族主义研究中的老问题与新困惑"},{"text":"事实上，书写文字越死——离口语越远——越好：原则上人人皆可进入纯粹符号的世界。","count":414,"chapter":"第二章 文化根源"},{"text":"新教和印刷资本主义的结盟，通过廉价的普及版书籍，迅速地创造出为数众多的新的阅读群众——不仅只限于一般只懂得一点点、或完全不懂拉丁文的商人和妇女——并且同时对他们进行政治或宗教目的的动员。","count":396,"chapter":"第三章 民族意识的起源"},{"text":"拉丁文的衰亡，其实是一个更大的过程，也就是被古老的神圣语言所整合起来的神圣的共同体逐步分裂、多元化以及领土化的过程的一个例证。","count":391,"chapter":"第二章 文化根源"},{"text":"事实上，所有比成员之间有着面对面接触的原始村落更大（或许连这种村落也包括在内）的一切共同体都是想象的。区别不同的共同体的基础，并非他们的虚假/真实性，而是他们被想象的方式。","count":348,"chapter":"第一章 导论"},{"text":"早在旧的正当性原则无声无息地消亡之际，很多君主早已在探求“民族的”标志了。","count":340,"chapter":"第二章 文化根源"},{"text":"民族的本质是每个人都会拥有许多共同的事物，而且同时每个人也都遗忘了许多事情","count":324,"chapter":"第一章 导论"},{"text":"“是的，我生而为法国人是相当偶然的；然而，毕竟法兰西是永恒的。”","count":323,"chapter":"第二章 文化根源"},{"text":"不是民族产生了民族主义，而是民族主义创造了民族。","count":306,"chapter":"民族主义研究中的老问题与新困惑"},{"text":"这些古典的共同体从未设想过一个和语言高度分离，而所有语言都只是和它保持等距关系（所以是可以互换的）符号的世界。","count":306,"chapter":"第二章 文化根源"},{"text":"关于语言，最重要之处在于它能够产生想象的共同体，能够建造事实上的特殊的连带 ( particular solidarities ) 。","count":306,"chapter":"第七章 最后一波"},{"text":"证明了这些宗教对于人类苦难的重荷，如疾病、肢体残废、悲伤、衰老和死亡，具有充满想象力的回应能力。","count":304,"chapter":"第二章 文化根源"},{"text":"印刷资本主义使得迅速增加的越来越多的人得以用深刻的新方式对他们自身进行思考，并将他们自身与他人关联起来。","count":304,"chapter":"第二章 文化根源"},{"text":"马克思主义和自由主义都不怎么关心死亡和不朽。然而，民族主义的想象却如此关切死亡与不朽，这正暗示了它和宗教的想象之间有着密不可分的关系。","count":299,"chapter":"第二章 文化根源"},{"text":"如果神圣而沉默的语言是人们想象昔日那些伟大的世界的共同体的媒介的话，这种幻想的现实性则系于一个对于当代西方思维而言颇为陌生的理念——符号的非任意性。","count":297,"chapter":"第二章 文化根源"},{"text":"那些强迫约翰王接受大宪章的男爵们根本不说“英语”，而且他们也没有什么自己是“英国人”的概念，可是他们还是在 700 年后的联合王国的课堂内被扎扎实实地界定为早期的爱国者。","count":294,"chapter":"第七章 最后一波"}]},"32511375":{"rating":831,"ratingCount":289,"highlights":[{"text":"严复的译文充满破绽，但是没有人仔细读出其中层出不穷的矛盾之处。从此书起，“物竞天择，适者生存”成了现代中国思想的主调，胡适据此改名，鲁迅也只迷上进化论部分。","chapter":"3．“中体西学”没有错","color":5},{"text":"马克思在《1844年经济学哲学手稿》中，借用德国哲学的观念，提出“异化劳动”（alienated labour）观念：“工人把自己的生命投入对象，但现在这个生命已经不再属于他，而属于对象了。因此，这种活动越多，工人就越丧失对象。凡是成为劳动产品的东西，就不再是他自身的东西。因此，这个产品越多，他自身的东西就越少。”(11)工人在劳动中不是肯定自己，而是否定自己。劳动强加于工人，使他们丧失自我，这是劳动的异化。","chapter":"3．从异化劳动，异化消费，到异化符号消费","color":5},{"text":"我们看待他人，往往陷于本质主义：总认为某某性别，某某年龄，某某民族，不应当会做某某事，但是对自己却往往以反本质主义之名，给自己机动的理由。由此，反本质主义往往出现于意图意义，本质主义往往出现于解释意义。","chapter":"3．从自我到身份","color":5},{"text":"戈夫曼的“表演论”（dramaturgy）与此类似，他认为人的社会行为本质上是演戏。戈夫曼提出人在社会上有四种表演方式：自我理想化表演（把自己表演得比实际的强）；误解表演（有意错误的表现、欺骗、谎言）；神秘化表演（保持距离，让对方猜不到自己的底细）；补救表演（尽快变化以纠正某个印象）。我们在生活中无时无刻不在展示一个身份，甚至独处时也向自己展示一个身份，而每次展示的身份可以完全不同。","chapter":"第十二章 谎言与虚构","color":5},{"text":"把巴尔特的分析再推进一步，我们可以看到，在舞台上，就至少有六种身份。为了方便讨论，括弧里列出解释，以及笔者建议的英文对应词：我认为我是的那个人（可以称为“自我”self）。我希望人家以为我是的那个人（可以称为“面具”persona）。导演以为我是的那个人（可以称为“演员”actor）。导演要用以展示符号文本的那个人（可以称为“角色”character）。观众明明知道我是某个人（我的名字代表的人person）。但是被我的表演所催动相信我是的人（进入角色的人格personality）。上面六种身份，分成三对。自我处于三个平面上：前演出、演出、被演出；接收者也有三个平面：自己、戏剧的叙述框架（演出的安排）、观众。如果我们同意本书第十二章中提到的戈夫曼关于人生“演剧化”的观念，那么这六层身份实际上普遍存在于每个人的生活中。作为一位教师，我一样要面对自己、领导、学生，一样有演出与被演出的六层身份。","chapter":"3．从自我到身份","color":5},{"text":"自我必须在与他人，与社会的符号交流中确定自身，它是一个社会构成，人际构成，在表意活动中确定自身。而确定自我的途径，是通过身份。在具体表意中，自我只能以表意身份或解释身份出现，因此，在符号活动中，身份暂时替代了自我。","chapter":"3．从自我到身份","color":5},{"text":"因此，中文的主体包括心灵与实践，而西文的subjectivity只是心灵的，不是行动的，行动的“主体性”在西语中应当是agency。这种差别引出中西方“主体性”观念的巨大差别：中国哲人在不断讨论“知与行”关系问题，在西方哲学中几乎不存在主体如何实践这个题目。","chapter":"第十六章 身份与文本身份，自我与符号自我","color":5},{"text":"西文subject，并没有像中文那样强烈的作“主”色彩。语法上的subject译成“主语”，就已经不尽合适。从米德（George Herbert Mead）1934年的著名遗作《心灵，自我，社会》提出主体互动论开始(4)，西方学者不断讨论“主我”（I）与“宾我”（me）之间的复杂关系，me依然是“自我”，却不是主语，宾我从主我分裂出来，是一个不完整的主体。(5)\n班维尼斯特否定subject（主语）有稳定的subjectivity（主语性），他认为每次说话都有不同的subject，离开具体的话语，具体的符号表意行为，就没有subject。格雷马斯则在元讲述层次上讨论这个问题。他指出所有的“陈述”都是subject的“知识”以及“意愿”，所有的话语，都是“我说”的产物，都隐含着“我说”。例如“我走了”，实际上是“我说‘我走了’”。因此“我走了”这句子里的“我”，实际上“主语性”不足，因为是“我说”的宾我。他们这些论辩，在中国人看来，是过分复杂的纠缠，实际上都是在说subject作为主语很不稳定，中文几乎无法传达代词格变格给这些西方论者的焦虑。\n更重要的是，在西文中，subject的另一个意义是“臣民”（君主之外所有其他人），作为动词，是“臣服”、“顺从”。中文中“主体”意思相反，是“帝王的统治地位”（“上以安主体，下以便万民”，《汉书·东方朔传》）。这样的意思只有中文才可能有。(6)","chapter":"第十六章 身份与文本身份，自我与符号自我","color":5},{"text":"其结果是，不仅行为艺术大行其道，而且所有的艺术都带上行为艺术的味道，越来越走偏锋，行险路，直到成为玩命表演。艺术被泛艺术化淹没，只有靠出奇制胜勉强在越来越高的水位上探出头来，艺术界终究会疲惫地放弃这种努力，让艺术消失于实用符号之中。从历史的维度来看，泛艺术化潮流已经让艺术走向衰亡","chapter":"8．泛艺术化","color":5},{"text":"反讽彻底瓦解了以隐喻为基础的传统修辞学：隐喻以合为目的，而反讽以分为目的。所以反讽否定一切修辞格，是一种逆向修辞。这样就形成了从隐喻开始，文本体裁两层意义关系逐步分解的过程，四个修辞格互相都是否定关系：隐喻（异之同）转喻（同之异）提喻（分之合）反讽（合之分）。","chapter":"10．四体演进","color":5},{"text":"在中国古代，因为相似而象征长寿，为中国寿文化的主要符号，成为重要礼仪元素。元代之后，俗文化兴起，龟与蛇等都是爬行动物（邻接），而被喻为通奸男子，从而延伸出“龟儿子”、“王八蛋”等侮辱用语。这两种象征根据不同，意义相反，在同一文化中似乎也并不冲突，因为使用语境有文化等级差。","chapter":"6．生成象征的方法","color":5},{"text":"博德利亚在《消费社会》一书结尾，曾用“橱窗映像”推进拉康的镜像概念；而贾平凹《废都》的开头，也有一个关于影子消失的情节。镜像式拉康意义上主体生成的工具，主体通过镜像来确认自身。而博德利亚说：“在当代秩序中，不再存在使人可以遭遇自己或好或坏影像的镜子或镜面，存在的只是玻璃橱窗——消费的几何场所，在那里个体不再反思自己，而是沉浸到对不断增多的物品／符号的凝视中去，沉浸到社会地位能指秩序中去。”我们在玻璃橱窗中看到的不是自己完整的影像，而是商品和叠加在商品上、被切割得支离破碎的模模糊糊的自己。这是一个被“物化”的人。前商品社会的个人，对自己的看法类似镜子，基本上看到一个完整的自我，而商品社会的个人，是玻璃橱窗中碎片状的个体。“再也没有存在之矛盾，也没有存在和表象的或然判断。只有符号的发送和接收，而个体的存在在符号的这种组合和计算之中被取消了……消费者从未面对过他自身的需要。”","chapter":"2．概念比喻","color":5},{"text":"艺术家有意不暴露意图，有意“不按常理出牌”，给接收者一个有趣的谜。越是“小众性”的体裁，在这一点上越是自由。越是出色的现代诗，越像个没有谜底的谜语，甚至诗人自己都无从索解。这个时候，一首诗可以让敏感而耐心的读诗者把衍义延伸得很远，最后几乎企及意义的极限。皮尔斯的“符号本身”，艾柯的“终极语义场”，或是海德格尔在里尔克的诗中读出的“存在物的存在被形而上学地规定为世界性现身”。","chapter":"6．“意图定点”","color":5},{"text":"诗的文本与意义之间缺乏距离，是浅薄的诗。艺术是理解的缓刑，是从感知中艰难地寻找识别，从识别中寻找理解，这个过程越费力越让人满意，哪怕最后找不到理解，这个寻找过程本身，而不是理解的结果，让人乐在其中。甚至可以说，理解艺术作品，只是一个必要的借口闪避理解，尽量长时间地停留在感知和识别上。","chapter":"2．符义学","color":5},{"text":"雅柯布森在二十世纪五十年代提出，聚合轴可称为“选择轴”（axis of selection），功能是比较与选择；组合轴可称为“结合轴”（axis of combination），功能是邻接黏合。雅柯布森认为比较与连接，是人的思考方式与行为方式的最基本的二个维度，也是任何文化得以维持并延续的二元。(2)雅柯布森的术语非常清晰明白，可惜未能在符号学界通用。","chapter":"第七章 双轴关系","color":5},{"text":"任何符号文本都会有这些伴随文本类型，一场体育比赛也有着六种伴随文本。例如一场足球赛，必然有场地馆所、观众气氛等副文本，有这项运动发展历史的型文本，有两支球队先前多年的交锋史等前文本，有传媒评论预测等元文本，有正在同时进行的其他赛事影响目前排名出线希望等链文本，有“联赛”中客场主场积分累加的先后文本。没有这些伴随文本，球赛只是22人踢着玩而已。","chapter":"5．普遍伴随文本与文本间性","color":5},{"text":"渠道与媒介这些元素，影响文本的品质和意义，但是决定一个文本应当如何解释，最重要的因素，却是该文本所属的体裁。体裁是文本与文化之间的“写法与读法契约”。","chapter":"6．体裁与期待","color":5},{"text":"1964年，麦克卢汉在《理解媒介：论人的延伸》一书中提出名言“媒介即信息”(12)。这句话的意思是：对一种文化而言，媒介形式的改变，不是信息传递方式的变化，而是整个文化模式的变化：媒介才是文化的真正“内容”。","chapter":"2．“媒介即信息”","color":5},{"text":"由此可以总结出以下几条：1．任何符号都有载体。2．当符号表意有时空距离时，需要异物质媒介。3．当代媒介学，研究的对象事实上是载体以及／或者媒介。","chapter":"第五章 媒介与渠道","color":5},{"text":"无限衍义一直发展下去，最后会达到怎样一种境地呢？皮尔斯认为：“正由于解释会成为一种符号，所以可能需要一种补充性解释，它和已经扩充过的符号一起，构成更大的符号；按照这个方式进行下去，我们将会，或者说应当会最终触及符号本身。”(40)这种最后的“符号本身”究竟是什么？艾柯解释说这个“最终符号实际上不是符号，而是结构那样的把混合性衔接并联系起来的整体语意场”(41)。 所谓“整体语意场”就是文化。一个符号的无限衍义，最后可能延及整个文化。","chapter":"4．无限衍义，分岔衍义","color":5},{"text":"“每个思想必须与其他思想说话”。“思想永远用对话的形式进展——自我的不同阶段之间的对话——这样，对话性（dialogical）本质上就是由符号组成。”(30)不管是与他人思想对话，还是与自己的思想对话，符号意义只有在对抗与衍生中才真正成为意义。","chapter":"4．无限衍义，分岔衍义","color":5},{"text":"让我试用平易的语言来解释一遍皮尔斯这个重要概念：1．符号指向两个不同的东西，一个是对象，另一个是解释项。2．解释项是“指涉同一对象的另一个表现形式”。也就是说，解释项要用另一个符号才能表达。3．而这个新的符号表意又会产生另一个解释项，如此绵延以至无穷，因此我们永远无法穷尽一个符号的意义。","chapter":"4．无限衍义，分岔衍义","color":5},{"text":"符号过程，定义上不可能终结，因为解释符号的符号依然需要另一个符号来解释。皮尔斯理论比索绪尔的开阔，正是由于从解释项推出的这个“无限衍义”（infinite semiosis，艾柯称为unlimited semiosis）概念令人惊奇地预示了后结构主义的开放姿态：符号表意，必然是无限衍义。","chapter":"4．无限衍义，分岔衍义","color":5},{"text":"皮尔斯把符号的可感知部分，称为“再现体”（representamen），这相当于索绪尔所说的能指；但是索绪尔的所指，在皮尔斯那里分成了两个部分：“符号所代替的，是对象（object）”，而“符号引发的思想”称为符号的“解释项（interpretant）”。(14)","chapter":"3．符号意指三分式","color":5},{"text":"福柯对能指的这种自行创造意义的力量，颇感悲哀。在《词与物》一书中，他认为人类最初使用符号时，语言符号是物的完全确实并且透明的符号。但是文化让符号有可能超越与具体物的对应，而指向自身。词语—物关系的逆转，是现代社会知识型上的根本断裂。最终，符号作为传播媒介，就像货币作为流通媒介一样，只关心自身的增值潜能，而将其与物的关系通道全部切断。福柯的这个看法非常尖锐正确：当代文化中符号泛滥，是因为能指优势几乎吞没了全部文化。","chapter":"第四章 符号表意","color":5},{"text":"索绪尔认为能指是“声音-形象”，而所指是“概念”，两者都不是客观的物理实体(1)，甚至都不是个人心理中的。能指“是声音留下的印迹，是声音给我们的印象”，而所指是社会性的“集体概念”（collective concepts）。两者都是“独立于外界客体的心智体”（mental entities），不管能指还是所指，都是只在“符号结构”（sign structure）内部的存在。","chapter":"第四章 符号表意","color":5},{"text":"所以中文语言实际上沿着皮尔斯的符号三分法，从相似符号，演变成指示符号，再演变成规约符号。或许其他书面语言也是从这条路上走过来的，只有中文保持了三种成分并列，因此，可能接近上面说的皮尔斯的理想，成为“最美的文字”。","chapter":"8．中文的理据性与规约性","color":5},{"text":"斯瓦西里语把周围所有的人分成“活人”、“撒哈”（sasha）、“扎马尼”（zamani）三种。活人是在世的人；撒哈是人已去世，但是在世的有与他相识的人；扎马尼是已经死去，并且所有认识他的人也都已经死去的人。(16)这是一个非常典型的系统。原先是历时的关系，在意义关系中变成了一个共时系统，三种“人”互相区别，必须用不同方式处理，谈论扎马尼已经无人对证。其他语言对历时的两种死者不加区别，是因为更多地凭借共时的书面记载谈论他们。","chapter":"3．共时性","color":5},{"text":"这个定义听起来复杂，实际上是强调符号表意必须依靠系统。不能纳入系统的东西，无法存储，无法传送，也无法解释，而符号恰恰需要这些功能。因此，一旦承认索绪尔的“任意性”原则，符号与意义就无自然联系，符号就不得不依靠系统才能表意。","chapter":"2．系统性","color":5},{"text":"符号过程到底凭借什么力量，把表意引向某种特定对象和特定意义上去呢？符号与意义究竟靠什么互相连接？索绪尔把这种连接关系称为“任意性”（arbitrariness），他说任意性是“语言符号本质的第一原则”","chapter":"第三章 任意性与理据性","color":5},{"text":"在文学理论中，有些学派认为文本意义比发出者意图意义重要得多，批评者不用追溯发送者意图，只需在文本中寻找意义构筑。持如此观点的大多为形式论学派，他们把文学艺术视为无发送符号。福柯认为“作者”这概念只是现代思想。现代之前没有“作者”这概念，《荷马史诗》或《水浒传》，多半是在相当长历史中许多作者的集体创作。","chapter":"5．无发送符号","color":5},{"text":"任何符号的载体，必须被感知，没有感知就不可能是符号，这点必须坚持。但是感知符号载体者，不一定必须是一个人，可以是动物、植物、有机体，如果是人类设置的机械（例如闭路电视、无人侦察机），就必须要有人作检查。","chapter":"4．信号","color":5},{"text":"符号学之复杂，是因为绝大部分符号没有达到这个起码的标准，只能称为“不完整符号”，就是缺失了三个环节中的任何一环的符号。意图意义、文本意义、解释意义，三者都只是符号过程的必要工作假定。意图意义是“可能有”的意义，文本意义是“应当有”的意义，接收者提供的解释意义是“被实现”的意义，但是三个环节中没有一个是不可或缺的，大量符号行为实际上没有完成这三个环节，有一个甚至两个环节缺失，也已经是符号，因为这个感知已经携带意义。","chapter":"3．任何解释都是解释","color":5},{"text":"一旦某种符号不断出现，就可以证明它的意义缺场相当严重，只能用符号敦请接收者把它解释出来。","chapter":"2．符号必有意义","color":5},{"text":"从这个意义上说，符号表意，只是一个“待在”（becoming）。(5)一旦意义实现，符号过程就结束了，甚至意义也就消失了。符号的作用，正在于让我们寻找尚懵懂无所知的意义。","chapter":"第二章 符号过程，不完整符号","color":5},{"text":"如果信仰缺失，符号不能创造信仰，只能更加暴露其无；无神迹，才是信仰确立的地方。耶稣与孔子，看来都很明白符号起作用的机制。列维纳斯说：上帝与一般“他者”之不同，在于它不仅是超越的，而且“超越到不在场”。也就是说，没有符号能替代上帝，是上帝存在的前提。","chapter":"第二章 符号过程，不完整符号","color":5},{"text":"符号表意，有三条悖论，听起来可能奇怪，实为符号的题中应有之义：第一，意义不在场，才需要符号；第二，不存在没有意义的符号；第三，任何理解都是理解。","chapter":"第二章 符号过程，不完整符号","color":5},{"text":"符号化是给某种载体以意义。意义有很多种，基本上可以分成两大类：一类是“实用符号意义”，可以取得具体的效果的意义；另一类是“非实用符号意义”，没有实际目的的意义，即艺术意义，或称“诗意”。","chapter":"6．符号的实用意义及其度量","color":5},{"text":"符号化的过程，即赋予感知以意义的过程，经常称为“再现”（representation，有些论者译为“表征”，此译法容易与“症状”相混）","chapter":"4．符号化","color":5},{"text":"符号远不是“一物代一物”那么简单。皮尔斯指出，符号是“一物在某个方面（in some respect or capacity）代替另一物或另一人”(22)。莫里斯指出：“符号学研究普通物，只要他们参与符号行为，但也只在它们参与的程度上（only in so far）。”(23)他们所说的“某方面”与“参与的程度”这两个限定语非常重要，否则我们就没有明白：符号不等于符号载体，也不等于感知，符号是感知与意义之间的关系。","chapter":"5．片面化","color":5},{"text":"符号在传送与解释的过程中片面化，最后只剩下与意义相关的品质，这是感知成为符号载体的保证。一件物成为符号载体，不是因为它作为物的存在，恰恰相反，符号载体只是与接收相关的可感知品质之片面化集合。","chapter":"5．片面化","color":5},{"text":"在符号化问题上，艾柯的讨论比较清晰。他认为符号化有三步：一是思维主体确定某物“有某功能”，二是归类为“用于什么目的的石头”，三是由此命名为“叫做什么”(18)。具体到石头的例子，符号化的三步就是：发现一块石头可用来打人，归类为“一种武器”，称之为“战斧”。第一步已经是符号化的门槛：在人意识到一块尖石可以伤害别人之时，石头成为服务于他的目的之物，他就对此种石头另眼看待，赋予它意义。远在命名之前，就出现了符号化。","chapter":"4．符号化","color":5},{"text":"从历史规律来看，符号表意性，随着文明的进程而增加。当代文化的一个重要特点是“符号泛滥”。具体表现为，上面说的各种符号-物，现在都剧烈地朝符号化方向滑动。","chapter":"3．符号的降解：物化","color":5},{"text":"上一节石子的例子，是物的“符号化”（意义生成、增加）；反过来的变化，则是“去符号化”（desemiotization）或称“物化”，即让符号载体失去意义，降解为使用物。","chapter":"3．符号的降解：物化","color":5},{"text":"每一件“物-符号”在具体场合的功能变换，是使用性与各种符号意义的比例分配变化造成的。物（自然事物、人造使用物）可能带上意义而变成符号，使用性与意义性共存于一事物之中。后一种（人造纯符号）原来就是作为符号生产出来的，却也有可能失去意义，“物化”成为使用物。在人化的世界中，一切都是意义可变的“物-符号”。","chapter":"2．物、符号、物-符号","color":5},{"text":"物构成了世界的全域：物分成自然物（1-1）与人工制造物（2-1），这两者都是物，因此都有使用性，所有的符号都是物，也都能降解为物，即回归使用性；经过符号化，无论是自然物（1-2）或人工物（2-2-1）都可以带上意义，变成实用意义符号；但是只有人造制造物才能带上非实用意义（2-2-2）变成艺术符号。自然物（例如石子）先要人工化（例如装盒示人）变成人工制品，才能成为艺术意义符号。","chapter":"2．物、符号、物-符号","color":5},{"text":"符号甚至可以非“事物”。符号需要的是一个“感知”作为符号载体（sign vehicle），感知本身却不是符号。严格来说，符号是载体的感知与这个感知携带的意义之间的关系。“符号载体”这个术语过于累赘，在一般讨论中，甚至在符号学的论述中，为了简便，常常把“符号载体”直接称作“符号”。","chapter":"上编 原理","color":5},{"text":"符号学自身发展过程中经历过几种模式，今日符号学不可能完全抹除这几种模式留下的印痕。","chapter":"引论","color":5},{"text":"笔者还进一步认为：意义必须用符号才能表达，符号的用途是表达意义。反过来说，没有意义可以不用符号表达，也没有不表达意义的符号。","chapter":"引论","color":5},{"text":"笔者愿意冒简单化的风险，给符号一个清晰的定义：符号是被认为携带意义的感知。","chapter":"引论","color":5},{"text":"但是很多符号学家认为，符号无法定义。有位符号学家写了几千字后，干脆说：“符号学有必要给‘符号’一个定义吗？众所周知，科学不必定义它们的基本术语：物理学不必定义‘物质’，生物学不必定义‘生命’，心理学不必定义‘精神’。","chapter":"引论","color":5}],"thoughts":[{"text":"“To live is the rarest thing in the world. Most people exist, that is all.\"—Oscar Wilde","quote":"塔拉斯蒂引用克尔凯郭尔的话，“对于一个主体，没有比存在着（existing）更难的事了，他不可能完全存在，他只能以存在为目标”","chapter":"5．自我的纵横移动"},{"text":"严以律人，宽以待己","quote":"我们看待他人，往往陷于本质主义：总认为某某性别，某某年龄，某某民族，不应当会做某某事，但是对自己却往往以反本质主义之名，给自己机动的理由。由此，反本质主义往往出现于意图意义，本质主义往往出现于解释意义。","chapter":"3．从自我到身份"},{"text":"摘自《浪漫主义的根源》：休谟说过，当他像大多数人那样审视自己的时候，当他自省其身的时候，他发现了许多感受、情感，以及记忆、希望和恐惧的碎片——所有细微的心理单元，却不能发现任何一个可以被称为“自我”的实体。他由此得出结论：自我不是一种东西，不是能被直接感知的对象，也许只是一种称谓，用来表达人类个体以及人类历史赖以形成的经验的串联，只是一种可使洋葱头瓣瓣相连的细绳，只不过并没有这种细绳。","quote":"自我必须在与他人，与社会的符号交流中确定自身，它是一个社会构成，人际构成，在表意活动中确定自身。而确定自我的途径，是通过身份。在具体表意中，自我只能以表意身份或解释身份出现，因此，在符号活动中，身份暂时替代了自我。","chapter":"3．从自我到身份"},{"text":"引自《魔术师时代》：顺着这样的基础思路，本雅明在他的博士论文中推导出结论，这些结论从根本上改变了他自己作为批评家的形象，随之也改变了20世纪和21世纪艺术批评的自我认知。首先，本雅明认为，艺术批评的功能“并不在于评价，而是一方面在于终结、补充和系统化”。[23]其次，艺术批评家多了一重身份，他成了艺术作品的共同缔造者。第三，一个艺术作品在本质上不是静止不动的，而是会在历史发展的过程中发生变化，艺术作品可能包含的含义也会发生变化，也就是说，艺术作品的本质和含义是一种动态的存在形式。理解这种动态性，才能理解批评。最后，第四，对某个艺术作品的每种批评——根据之前讲到的关于事物自我关联的论点——也可以看成是这件艺术作品针对自身的自我批评。","quote":"“评论文本”（meta-text）是“关于文本的评论”，是此文本生成后被接收之前，所出现的评价，包括有关此作品及其作者的新闻、评论、八卦、传闻、指责、道德或政治标签等等。","chapter":""},{"text":"来自 ChatGPT：\n索绪尔的理论中，他提出了一些重要的二元对立概念，这些概念有助于我们理解语言和符号系统的本质。\n1. 语言/言语：\n语言（langue）指的是一种抽象的系统，是社会共同遵守的语言规范和结构，它包括词汇、语法和语音等。语言是一种固定的、结构化的系统，用于表达思想和交流信息。\n\n言语（parole）则是指具体的语言行为，是个体在特定时间和场景中使用语言的实际表现。言语是根据语言系统进行个体的实际语言使用。每个人的言语都是独特的，受到个人经验和情境的影响。\n\n2. 共时/历时：\n共时（synchrony）指的是对系统的研究，关注的是在某个特定时间点上系统内部的结构和相互关系。在语言学中，共时研究语言的静态状态，例如语言的语音、词汇和语法规则等。\n\n历时（diachrony）则关注的是系统随时间的演变和变化。它研究的是语言的历史发展、语音、词汇和语法等方面的变化。历时研究语言的动态演化和变化趋势。\n\n3. 组合/聚合：\n组合（syntagmatic）指的是语言单位按照一定的顺序和规则组合在一起形成句子或短语。语言单位之间的组合关系决定了句子或短语的意义和结构。\n\n聚合（paradigmatic）则指的是在某个语言单位的位置上可以选择不同的替代项。例如，一个词可以在特定语境下被替换为另一个具有相似意义的词。聚合关系涉及到选择关系和语言单位之间的意义关联。\n\n4. 能指/所指：\n能指（signifier）是指语言中的具体形式，即符号的物质表现。它可以是声音、字母、图像等等。能指是我们通过感觉器官接收到的具体感知。\n\n所指（signified）是指符号所代表的概念、意义或思想。所指是通过与能指相关联的语言社会约定来确定的。它是符号所传递的抽象概念或概念。","quote":"在索绪尔理论的四个二元对立（能指／所指，语言／言语，共时／历时，组合／聚合）中","chapter":"3．共时性"},{"text":"摘自伯林《浪漫主义的根源》：费希特的观点是作为“自我”理解的主格的“我”（I）并不同于宾格的“我”（me）。这不仅成为浪漫主义运动的权威观点，也成为心理学的权威观点。毫无疑问，宾格的“我”是可以被反思的：心理学家谈论“我”，科学论文以“我”为写作对象。这里，宾格的“我”是观察的对象、学习的对象，是心理学、社会学以及相关学科的研究对象。但是，还有一种非宾格的“我”，即最重要的主格，从来都不是在认知的过程中，而仅仅是在受到什么碰撞之后被你意识到的。","quote":"，就像写作的初稿，总是只给自己看的。任何思索都是在自己头脑中打草稿，然后才有可能找到合适载体，以文本形式发送出去。\n\n自我符号表意有没有跨过一个时间-空间距离？笔者认为还是有，虽然发送者与接收者是同一个人，发送主体与接收主体依然处于有间隔的不同时空中。\n\n有不少学者（例如米德和西比奥克），认为自我实际上可能分成不同的“我”，尤其是“主我”（I）与“宾我”（me）。主我是自我意识（愿望、决策等），“宾我”可以是他人或社会对“我”的期待或评价，也可以是自我思索的对象。现在之我、过去之我、未来之我三者之间，显然现在之我是主我。任何思想、判断、推理、想象、感悟等心智活动，实际上都是两个自我之间的协调，而不是纯然的“自我意志”。(29)也就是说，自我符号不纯粹是我个人的表意活动，它也是一个意义过程。我，通过被符号解释对象化的我，来理解我自己。","chapter":"7．自我符号"},{"text":"这句话也是同语反复吧？符号化，就是带上意义，带上意义就是符号化。","quote":"只要符号化，哪怕看来完全没有意义的，也可能被解释出意义。","chapter":"4．符号化"},{"text":"一、索绪尔的语言学模式，难免落入结构主义封闭的格局。\n二、皮尔斯的逻辑-修辞学模式，当代符合学的基础理论，最终要的模式，他提出符号意指的一系列三分式。\n三、卡西尔的文化符号论，他建立一种象征哲学，重视文化，不太关注符号作为方法论的可操作性。\n四、巴赫金的从形式研究文化的传统，语言中心马克思主义，借鉴了信息论和控制论，提出符号汤理论，研究社会和文化。","quote":"符号学自身发展过程中经历过几种模式，今日符号学不可能完全抹除这几种模式留下的印痕。","chapter":"引论"},{"text":"来自Bard：\n符号学中，符号消费者是指在消费过程中，将消费品作为符号表达的内涵和意义本身作为消费的对象的人。符号消费是一种理念的实践，也就是说被消费的是理念，而不是物体，消费所涉及的乃是文化符号及符号间的交互关系。在这种情况下，消费者不再将消费性物品视为纯粹的物品，而是将其视为具有象征意义的物品，消费也不再是纯粹的经济行为，而是转化为在某种符码之下，以差异化的符码作为媒介所进行的文化行为。\n符号消费者的特点主要有以下几点：\n* 他们在消费过程中，不仅关注商品的实用价值，更注重商品的符号价值。\n* 他们会根据自己的社会地位、身份、品位等因素，选择符合自身需求的消费品。\n* 他们会通过消费来表达自己的身份认同、阶层地位、生活方式等。\n符号消费者的行为，反映了现代消费社会中消费的符号化趋势。在这种趋势下，消费不仅仅是一种经济行为，更是一种社会行为和文化行为。\n以下是一些符号消费者的典型例子：\n* 购买名牌服装和饰品，以彰显自己的身份和地位。\n* 参加高档消费场所，以展示自己的生活品位。\n* 收藏艺术品和古董，以体现自己的审美情趣。\n* 购买绿色食品和有机产品，以表达自己的环保理念。\n这些行为，都体现了符号消费者在消费过程中，将消费品作为符号表达内涵和意义本身进行消费的特点。","quote":"符号消费已经远远超过物质消费，相应地，符号生产也不得不超过物质生产。在当代，个人不是作为生产者实现人生价值，而是作为消费者，尤其是作为一个符号消费者存在。","chapter":""},{"text":"A sign is a perception with meaning.","quote":"笔者愿意冒简单化的风险，给符号一个清晰的定义：符号是被认为携带意义的感知。","chapter":"引论"}],"popularHighlights":[{"text":"意义必须用符号才能表达，符号的用途是表达意义。反过来说，没有意义可以不用符号表达，也没有不表达意义的符号。","count":1445,"chapter":"引论"},{"text":"符号是被认为携带意义的感知。","count":1152,"chapter":"引论"},{"text":"人的精神，人的社会，整个人类世界，浸泡在一种很少有人感觉到其存在却没有一刻能摆脱的东西里，这种东西叫符号。","count":570,"chapter":"引论"},{"text":"意义就是一个符号可以被另外的符号解释的潜力，解释就是意义的实现。","count":550,"chapter":"引论"},{"text":"符号消费已经远远超过物质消费，相应地，符号生产也不得不超过物质生产。在当代，个人不是作为生产者实现人生价值，而是作为消费者，尤其是作为一个符号消费者存在。","count":342,"chapter":"引论"},{"text":"连小县城里的新娘，都对实用意义非常敏感，知道新郎派来接她的车如果不是宝马，就应当哭闹着拒绝上车，不然一辈子在娘家亲友小姐妹中抬不起头来。","count":312,"chapter":"2．物、符号、物-符号"},{"text":"我们的思想，无论是社群性的社会意识和文化生活，或是个人思想、意志、欲望，还是拒绝被表现的潜意识，都是以符号方式运作的。","count":308,"chapter":"引论"},{"text":"笔者认为，从对符号的理解出发，我们可以说符号学是研究意义活动的学说。","count":306,"chapter":"引论"},{"text":"皮尔斯认为人自身是人使用的一个符号：“每一个思想是一个符号，而生命是思想的系列，把这两个事实联系起来，人用的词或符号就是人自身。”(12)","count":275,"chapter":"引论"},{"text":"人类为了肯定自身的存在，必须寻找存在的意义，因此符号是人存在的本质条件。","count":270,"chapter":"引论"},{"text":"从符号学角度扩大言之，不是我们表达思想需要符号，而是我们的思想本来就是符号：与其说自我表意需要符号，不如说符号让自我有意义。人的所谓自我，只能是符号自我。","count":266,"chapter":"引论"},{"text":"实际上，一个人可以停止说话，停止做表情，但不可能停止表达意思，因为不说话无表情也表达意义。","count":256,"chapter":"上编 原理"},{"text":"从这个意义上说，符号表意，只是一个“待在”（becoming）。(5)一旦意义实现，符号过程就结束了，甚至意义也就消失了。符号的作用，正在于让我们寻找尚懵懂无所知的意义。","count":256,"chapter":"第二章 符号过程，不完整符号"},{"text":"意义必用符号才能解释，符号用来解释意义。反过来，没有意义可以不用符号解释，也没有不解释意义的符号。","count":252,"chapter":"引论"},{"text":"符号化的过程，即赋予感知以意义的过程，经常称为“再现”（representation，有些论者译为“表征”，此译法容易与“症状”相混）","count":234,"chapter":"4．符号化"},{"text":"符号是载体的感知与这个感知携带的意义之间的关系。","count":231,"chapter":"上编 原理"},{"text":"众所周知，科学不必定义它们的基本术语：物理学不必定义‘物质’，生物学不必定义‘生命’，心理学不必定义‘精神’。","count":221,"chapter":"引论"},{"text":"从历史规律来看，符号表意性，随着文明的进程而增加。当代文化的一个重要特点是“符号泛滥”。具体表现为，上面说的各种符号-物，现在都剧烈地朝符号化方向滑动。","count":216,"chapter":"3．符号的降解：物化"},{"text":"符号表意片面化实际上是广告成功的秘诀。","count":208,"chapter":"5．片面化"},{"text":"符号表达释放意义以吸引符号解释，符号解释通过追求意义接近符号表达","count":187,"chapter":"引论"}]},"33617657":{"rating":936,"ratingCount":26197,"highlights":[],"thoughts":[],"popularHighlights":[{"text":"在这种恩赐的保护下，女性虽然没有任何希望，却也没有记忆和期望，因此她们既不会回忆过去的痛苦和羞辱，也不会对未来有什么盼望。女性生活的痛苦和羞辱不仅是女人存在的必然，也是我们平面国的制度基础。","count":12698,"chapter":"04 平面国的女性"},{"text":"底层女性的屠杀行为能够消除多余的人口，将革命扼杀在萌芽状态中，因此对于圆形阶级的许多成员而言，弱势性别的破坏能力反而是一种天赐的礼物。","count":12070,"chapter":"04 平面国的女性"},{"text":"事实上，平面国的居民不可能凭视觉区分不同的形状，因为除了线段以外，我们看不见、也不可能看见任何其他东西。","count":11754,"chapter":"01 平面国的性质"},{"text":"人们往往不自觉地相信，人的行为取决于决心、努力、训练、鼓励、赞扬，或者其他一些东西。事实上，这只是一种古老的迷信，因为人的一切行为无疑只取决于形状。","count":11396,"chapter":"12 僧侣阶级的教义"},{"text":"一言以蔽之，不规则图形会令我们的文明全盘崩溃，社会会因这类图形的存在而倒退入野蛮时代。","count":10965,"chapter":"07 不规则的形状"},{"text":"大部分贵族阶级也很欢迎这样的事情，因为他们十分明白，这种罕见的现象不仅几乎不影响他们的特权，还能有效防止下层阶级革命。","count":10755,"chapter":"03 平面国的居民"},{"text":"网络真的让我们接触更多信息、鼓励我们思考了吗？还是恰恰相反，科技允许我们制作出巨大的泡泡，每天生活于其中，只与和自己观点相近的人交流？若是后者，这种所谓的“交流”与点国国王的自言自语有何不同？","count":10744,"chapter":"译后记"},{"text":"探究这个问题的人都快把平面国的疯人院挤满了。过去，为了阻止人们做这种研究，立法机构向所有探索光源问题的人征收重税。然而人们依然前赴后继地研究光源问题，所以最近立法机构干脆将光源研究列为严格禁止的行为。","count":9324,"chapter":"02 平面国的气候和房屋"},{"text":"平面国的自然规律让所有男孩都比父亲多一条边，这样每一代人的阶级地位都比上一代人高一点（这是平面国的社会规则）。因此，正方形的儿子是五边形，五边形的儿子是六边形，以此类推。","count":8764,"chapter":"03 平面国的居民"},{"text":"平面国的所有女性都是线段。","count":8298,"chapter":"03 平面国的居民"},{"text":"这些底层的士兵往往用尖锐的角作为武器去冒犯妻子，而不是靠理智及适当的哄骗来保护自己；由于生性鲁莽，他们常常不懂利用房间去限制女性的转身能力，而是在室外用不当的言辞激怒
