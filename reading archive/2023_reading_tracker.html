    // 书籍数据（由生成脚本注入）
    const books = [{"title":"双城记","author":"[英] 查尔斯·狄更斯","start":"2022-12-23","finish":"2023-01-19","rating":8.5,"pages":"432","doubanLink":"https://book.douban.com/subject/35014816/","cover":"https://neodb.social/m/book/2022/04/3047274a12-bd19-4551-8e62-de2678069760.jpg","review":"尽管这段特殊时期没能连贯的看完此书，但名著名不虚传。狄更斯的人物刻画非常生动，对法国大革命的描写虽然过于主观，但也让我有了新的认识。虽然中文翻译已恰到好处，但其语言魅力我想以后还是要找原著再领略一番。","summary":"《双城记》是一部以18世纪法国大革命为背景的长篇历史小说，“双城”指的是伦敦和巴黎。故事围绕着马奈特医生一家和以德法尔热夫妇为首的圣安托万区展开故事。正直善良的马奈特医生因为揭露贵族的恶行而被秘密关押在巴士底狱，十八年后，他的孤女露西从伦敦赶赴巴黎，终于与父亲团聚。在与父亲一起返回伦敦的路途中，露西结识了贵族青年达尔奈，并与他相爱。身为马奈特医生仇人之子的达尔奈，虽然得到了医生的原谅和认可，与露西喜结连理，却要被与他的家族有不共戴天之仇的德法尔热夫人送上断头台……《双城记》不仅是一部令人动容、唏嘘感慨的爱情小说，还是一部构思精巧的悬念小说，更是一部恢弘壮阔的社会小说、历史小说。\n乱世中，为心爱的人甘愿牺牲自己的生命，这才是狄更斯眼中的典范和楷模。动荡不安的时代，扣人心弦的情节，丰满立体的人物，作者层层铺垫、厚积薄发，用细腻的文字、高超的技巧再现了那个波澜壮阔的时代。他不只是在讲故事，他在还原那个时代。","month":1,"country":"英国","wereadId":"32072431"},{"title":"置身事内","author":"兰小欢","start":"2022-12-08","finish":"2023-02-06","rating":8.3,"pages":"340","doubanLink":"https://book.douban.com/subject/35546622/","cover":"https://neodb.social/m/book/2021/09/157839fbbf-3454-4b26-bebf-7aed668ab35f.jpg","review":"没有接触过经济学，读本书毫无艰涩。内容通俗，我读到了很多关于政府经济职能方面的 facts，而这些 facts 时我认为本该知道的，作者很贴心的提供了延伸阅读，引用文献也很详尽，是本值得看的好书。","summary":"“在成功的经济体中，经济政策一定是务实的，不是意识形态化的。是具体的，不是抽象的。”\n直面真问题、深究真逻辑的复旦大学经济学“毕业课”\n☆ 连接抽象经济学理论与中国发展实际\n在市场机制不完善的情况下，如何实现可行的动员与资源调配，推动经济增长？\n在确保增长的过程中，如 何获得更多资源和时间去建设和完善市场经济？\n☆ 结合学界前沿研究与一线调研经历\n扼要论述+延伸阅读指引，满足弹性认知需求\n生动解说光伏、面板等行业案例，清晰复盘宽窄巷子、华夏幸福等建设经验\n☆ 微观机制+宏观现象 双重维度串联中国经济生活中中知识与现象的碎片\n理解地方政府经济治理的决策与行动逻辑\n解读城市化、房价、贫富差距、债务、国内外贸易生态等现象背后各种要素的联动\n☆ 从热闹的政经新闻中看出门道，从枯燥的政府文件中觉察到机会。\n“了解政府认为应该怎么办，比了解‘我’认为应该怎么办，重要得多。”\n------------------------------------------------------------------------------------------------------\n本书是是兰小欢多年教学、调研与研究内容的凝练，将经济学原理与中国经济发展的实践有机融合，以地方政府投融资为主线，深入浅出地论述了中国经济的发展，笔触简练客观，并广泛采纳了各领域学者的最新研究成果。全书分上下两篇。上篇解释微观机制，包括地方政府的基本事务、收支、土地融资和开发、投资和债务等；下篇解释这些微观行为与宏观现象的联系，包括城市化和工业化、房价、地区差异、债务风险、国内经济结构失衡、国际贸易冲突等。最后一章提炼和总结全书内容。\n\n通过对中国政治经济体系的论述，作者简明地刻画了地方政府进行经济治理的基本方式，并指出，中国政府通过深度介入工业化和城市化的进程，在发展经济的同时逐步推动了市场机制的建立和完善，以一种有别于所谓发达国家经验的方式实现了经济奇迹。基于对改革历程与社会矛盾的回顾与分析，作者也在书中对当前推进的市场化改革与政府转型进行了解读，帮助读者增进对中国发展现实的把握。","month":2,"country":"中国","wereadId":"CB_1cl3t93s67Nh6eH6cNGu2Dcm"},{"title":"美国宪政历程","author":"任东来, 陈伟, 白雪峰","start":"2023-01-28","finish":"2023-02-14","rating":8.8,"pages":"558","doubanLink":"https://book.douban.com/subject/26430184/","cover":"https://neodb.social/m/book/2021/11/28af402e67-f462-47f1-bf26-ec45e6d4ed61.jpg","review":"美国宪政历程\n非常精彩的一本美国宪政入门读物，作者虽然没有专业的法律背景，但也许正因为如此，以我这个更加门外汉的业余读者看来，有更强的可读性。书中注释详尽，作者甚至在文末不仅给出参考书目，还附上了个人点评介绍，极大的方便了读者取阅。本书罗列和详述的二十五个判例，既可以将每一个单独拎出来作为观察美国社会状态的一个切面，又可以按时间顺序串联，从整体上了解美国社会的变迁，它们涵盖了言论自由、种族歧视、反垄断、爱国主义、总统权力、新闻自由等诸多议题。作为世界头号大国，这些判案每一个不仅影响着美国自身也影响着世界。而身处与其体制迥异的中国，除了带着猎奇的心理去考察，我也试图去了解、比较，去师夷之长技。\n\n在著名评论家汤姆斯·弗雷德曼（Thomas Friedman）看来，美国成功的秘密不在于华尔街，也不在于硅谷，不在于空军，也不在于海军，不在于言论自由，也不在于自由市场——秘密在于长盛不衰的法治及其背后的制度。美国强大的真正力量在于“我们所继承的良好的法律与制度体系。有人说，这是一种由天才们设计并可由蠢才们运作的体系”。\n\n毫无疑问，美国的建国先贤们拥有长远的目光，他们设计的这套宪法，在通观这二十五个案例后，个人认为最重要的就是三权分立的分权意识。同时，有限政府的概念，保护公民权利的制度也正是这套宪法能平稳运行至今且长盛不衰的秘诀。\n\n本书侧重描写了三权分立中的司法这一环节，详述了联邦最高法院做的那些精彩以及糟糕的判例，每一个判例都给出了详尽的历史背景和前因后果，了解一个判例就是了解美国社会的整体运作的一个侧面。而最高法院的大法官正是给每一个判例进行判决的人，他们深刻的影响了美国社会的走向。这一职务，在我国的司法框架里找不到与之匹配的对应，却值得我们好好的研究。\n\n在我看来大法官有两个显而易见的特点，使其能成为承担其职务使命的最佳人选：\n\n一、大法官的非凡。联邦最高大法官都不是民选的，且大法官都是终身、高薪制的，这一制度保障大法官们能将执念聚焦于法律与正义本身。也因此大法官们不容易被民意左右，在一定程度上与提拔他们的总统保持独立，以至于总统提拔大法官时也有「走眼」的时候（艾森豪威尔提拔厄尔·沃伦）。为了维护司法独立和正当程序原则，法院和法官历来都对新闻媒体抱有极大的警惕和戒备心理。著名的的霍姆斯大法官就以不读报纸而著称。\n\n二、大法官的平凡。每一个大法官都是从人民中来的，他们也许来自各行各业，有与普通人类似的经历，因此也更能在限制政府，保护公民权利的角度出发来看待问题。他们也来自不同的党派，有保守的也有激进，因此在很多判例上并没有形成完全的统一，却也给讨论空间带来活力。这种平凡性，也体现在法官的个人魅力上，以至于美国历次民意测验中，法官的可信度和受尊敬程度几乎总是高踞榜首，远在总统和国会议员之上。\n\n联邦最高法院的法官是维护美国宪政体制和谐发展的最后一道屏障，他们的每一项判决都直接或间接地影响着美国社会的顺利运作。他们是这个号称民主的社会中的非民主角色，却带着极大的使命去维护这个民主。\n\n马克思说过一句话：\n> 哲学家们只是用不同的方式解释世界，而问题在于改变世界。\n\n而有意思的是，联邦最高法院的法官们就是用不同的方式解释宪法，来改变美国。\n\n没有完美的当事人，没有完美的律师，没有完美的法官，没有完美的法律，没有完美的立法者，也没有完美的执法者，有的只是最不坏的制度","summary":"本书并没有就法律谈法律，而是用生动的笔触，翔实的资料，描述了法治在美国社会的各个方面从生根到开花的历程。联邦最高法院的25个故事所提示的，是一以贯之而又不断发展的一种观念，一种精神。美国宪政的酸甜苦辣尽在其中，让读者去细细回味。","month":2,"country":"中国","wereadId":"3000950780"},{"title":"都柏林人","author":"[爱尔兰] 詹姆斯·乔伊斯","start":"2023-02-15","finish":"2023-02-21","rating":8.3,"pages":"262","doubanLink":"https://book.douban.com/subject/4908872/","cover":"https://neodb.social/m/book/2021/09/16faec47d0-c4c4-4c4e-a81e-965fd44544f0.jpg","review":"十五个短片，不能说都看懂了，或者可以说大部分只是看明白了内容，却不明白隐喻，也许压根也没隐喻，长时间的带着目的去阅读久了，读这样的短片反而不知所措。乔伊斯、都柏林都只闻其音，未见其意，这次算初探吧。比较喜欢《泥土》、《死亡》这两篇。","summary":"詹姆斯·乔伊斯(James Joyce，1882—1941)，爱尔兰作家、诗人。1882年2月2日出生于都柏林，1941年1月13日卒于瑞士苏黎世。他是意识流文学的开山鼻祖，其长篇小说《尤利西斯》成为意识流文学的代表作，是二十世纪最伟大的小说之一。他一生颠沛流离，辗转于的里雅斯特、罗马、巴黎等地，多以教授英语和为报刊撰稿糊口，又饱受眼疾折磨，到晚年几乎完全失明。但他对文学矢志不渝，勤奋写作，终成一代巨匠。《都柏林人》是詹姆斯·乔伊斯久负盛名的短篇小说集，称得上20世纪整个西方最著名的短篇小说集了。1914年出版，置景于二三十年代的都柏林，截取中下层人民生活的横断面，一个片刻一群人，十五个故事汇集起来，宛若一幅印象主义的绘画，笔触简练，错落成篇，浮现出苍凉世态，遥远、清冷，然而精致，是上上之品。","month":2,"country":"爱尔兰","wereadId":"24147316"},{"title":"冬牧场","author":"李娟","start":"2023-02-07","finish":"2023-02-26","rating":8.3,"pages":"320","doubanLink":"https://book.douban.com/subject/10522856/","cover":"https://neodb.social/m/book/2021/09/15e5401c4e-7116-4b93-a565-0a6531fd74f7.jpg","review":"豁切，仿佛来到了异世界，游牧民族的生活让我惊讶于世界上还有这种生存状态。作者看似简单的文字，拼凑在一起却有一种独特的韵味。","summary":"文坛清新之风，阿勒泰的精灵\n李娟首部长篇纪实散文力作\n四个月、零距离、全程记述哈萨克民族冬牧场的点点滴滴！\n春天接羔，夏天催膘，秋天配种，冬天孕育。羊的一生是牧人的一年，牧人的一生呢？这绵延千里的家园，这些大地最隐秘微小的褶皱，这每一处最狭小脆弱的栖身之地……青春啊，财富啊，爱情啊，希望啊，全都默默无声。 ——李娟\n2010年冬天，李娟跟随一家熟识的哈萨克牧民深入阿勒泰南部的冬季牧场、沙漠，度过了一段艰辛迥异的荒野生活。李娟是第一位描写哈萨克民族冬牧生活的汉族作家，她以饱含深情又不失节制的文字，呈现出阿尔泰最后一批“荒野主人”冬季转场时的独特生存景观。","month":2,"country":"中国","wereadId":"244004"},{"title":"爱的艺术","author":"[美] 艾里希·弗洛姆","start":"2023-02-22","finish":"2023-03-03","rating":8.4,"pages":"135","doubanLink":"https://book.douban.com/subject/30395243/","cover":"https://neodb.social/m/book/2021/09/283538e4bc-a22d-4a5f-b07a-6d7e0d230fe7.jpg","review":"一本关于爱的艺术的小书，以爱之名，作者也在书中贯穿了他关于人际关系、教育理念、社会结构、心理学等议题。\n\n我买的是刘福堂的译本，看豆瓣评论对其翻译颇有微词，我在实际阅读时也的确碰到不少诘屈聱牙之处，对照着李健鸣版本一起阅读，会有更好的理解。但同时我也推测这两位译者所依据的原书似乎并不相同，且刘的译本在个别翻译上也有可圈点之处。\n\n下面是我对本书阅读后做的一点总结，结合了两个译本。不能代替阅读原文，权当回忆入口。\n\n## 爱的由来\n人是具有天赋理性的存在，他来自于自然却又超出自然。他凭借理性来认识自身，了解四周，也因此带来了天生的分离感与孤独感。克服分离感与孤独感是人一生的使命，因为它们是导致人恐惧与焦虑的来源。\n\n人在迷狂状态中找到暂时的躲避方法，它们是药物、性、宗教仪式，这种迷狂状态是强烈的却也是暂时的。\n\n人在平等的制度种找寻抵御孤独的统一感。但资本主义原子化的社会的篡改了这一平等的定义。人们的平等已不再是有机的统一，而是呆板的一致模式。人不再作为目的，而沦为工具。\n\n人在创造性活动中找寻结合感。在任何创造性工作中，有创造性的人把自己同外部世界结合起来以克服孤独，但在当代工人流水线的劳作中，人已沦为机器或官僚主义的附庸，已不再是过去的工人。\n\n通过迷狂状态和假平等达到的统一仅仅是一种假统一。通过创造性的劳动达到的统一不是人与人之间的统一。对人类存在问题的真正的和全面的回答是要在爱中实现人与人之间的统一。\n\n而爱是人战胜孤独感的归宿。爱是人的一种主动的能力，在保持自己的尊严和个性条件下的结合。爱，主要是给予，而不是接受。爱，是一种快乐的给予。爱常常包含着共同的基本要素：关心、责任、尊重了解。\n\n##  父母之爱、博爱、性爱、自爱、上帝之爱\n\n母爱是无条件的，是被动之爱，母爱给孩子提供了自然之源，父爱是有条件的，他代表的是思想的世界，是法律与秩序以及原则的世界。人之成熟，便是成为自己的父母，使自己和父母的外部形象脱离，而在内心建立起两者的形象。精神病的一个产生原因可能便在于母亲或父亲有一方没能为孩子建立起该有的形象。\n\n只爱一个对象的爱不是真正的爱，是共生关系的依附，是扩大的自我主义。如画师无需等待那个最合适的风景才能作画，爱一人便能通过他而爱这个世界。\n\n兄弟之爱（博爱）是相互间平等的爱。母爱是对无助者的爱。母爱不仅让孩子活着，也要让孩子感到对生活的渴望。与性爱中两个人结合不同，随着孩子长大，母亲却要促成自己与孩子的分离，这是母爱中最艰巨的部分，她要求母亲做到毫无私心，给予一切，除了被爱者的幸福外一无所求的精神。\n\n性爱，是对与另一异性的完全融合，结为一体的渴望。对多数人而言，亲密的关系主要通过性关系建立，他们感到与另一个人的分离主要是肉体的分离，那么肉体的结合便意味着克服分离（孤单感带来的焦虑与恐惧）。但如果肉体结合的性欲望不由爱激起，不包含兄弟之爱那种博爱，便不会是稳定的结合，此时的性爱产生的只是「幻爱」。性爱不同其他爱的点在于其排他性，但这种排他性只在于性结合这点上，在生活的全部范围彻底献身这点上排斥他人，而不是更深的博爱意义上，故可通过爱一个人，进而爱全人类，爱一切生命。就这点而言，它为传统的「先结婚，后恋爱」的婚姻观找到了合法性。现代观念认为爱仅是一种强烈的感情。但它同时也是一项决定，一种判断，一个诺言。\n\n自爱不同于自私，甚至对立。因为对他人的态度和对自己的态度非但不互相矛盾，还是连在一起的。就对象与我们自身而言，爱在原则上是不可分割的。自私者实际上却少自爱，是恨自己。从现象上看，自私者似乎过于关心自己，而实际上不过是枉费心机地试图掩盖关心真实自我的失败，他不能爱他人，因而也不能爱他自己。另一种不自爱但与自私不同的表现是「无私」，它不仅不被认作为「病状」，还常是人引以为荣的特征，并且具有救赎作用。在「无私」的外壳下，其实隐藏着难以捉摸而且特别强烈的自我为中心的实质。「无私的母亲」与「自私的母亲」对孩子的影响没有多大不同，甚至借由道德绑架，「无私」蒙蔽了孩子的宣泄出口，产生更坏的后果。\n\n对上帝之类爱的特点，取决于一、宗教中母性成分和父性成分的不同分量；二、个人在关于上帝的概念中达到的成熟度。人类的进化经历了从母亲为中心，到以父亲为中心的社会结构和宗教结构的变化。因此，我们能主要在父性宗教发展过程中追溯人类成熟的爱的发展过程（从拟人神到一神论的演变）。西方宗教脱胎于亚里士多德的逻辑学（同一律、矛盾律、排中律）。而东方哲学包含悖论逻辑（假定A和非A作为X的谓语并不相互排斥），最后演化成黑格尔和马克思的逻辑——辩证法。悖论哲学与上帝的观念密切相关，人类头脑感知的是矛盾中的真实，无法称什么是上帝，而只能说上帝不是什么，因此上帝成了「绝对的虚无」。也因此，人们只能在矛盾中理解真实，而不可能通过思维理解最终的真实的统一，把握世界的唯一途径不在于思维，而在于行动。从而导致如下结论：对上帝的爱既不是思维上认识上帝，也不是爱上帝的思想，而是在爱的体验中体验自己同上帝的一致。书中涉及的例子包括佛教、道教、老庄、斯宾诺莎、马克思等。据此，作者认为东方的悖论逻辑导致宽容和改造人自身（但不导致技术），而西方的立场导致不宽容、教义和科学、天主教和原子能的发现。在西方宗教体系中，对上帝之爱本质上是一场思想实验，而东方宗教和神秘主义中，对上帝的爱是一种强烈的感情体验。人类对上帝之爱的发展过程可以类比其对父母之爱的成熟过程。\n\n## 当代西方社会的爱及其瓦解\n\n每一个特定社会结构都会影响生活在其中的人的爱的能力。当代的西方社会建基在资本主义之上。资本主义社会一方面以政治上的自由为原则，另一方面以市场作为原则调整一切经济活动。资本主义发展的结果是资本的不断集中，越来越多的人失去独立性，依附于庞大的经济帝国的官僚阶层。高度集中、分工细致的企业导致个人失去个性，蜕变为机器的齿轮。现代资本主义中人的问题可概括如下：\n1. 需要大批能协调工作的人；\n2. 这批人的消费欲望持续增长，但口味是标准化且易于预测的；\n3. 一方面让人以为自己是自由的不屈从人换权威，另一方面又准备执行命令、完成任务、服从社会机器。\n而这带来的问题是：人疏远自己，疏远他人，异化成为商品。人与人的关系是陌生的，是自动机器之间的关系，人感到孤独、恐惧，想法设法去靠拢一群人，在思想、行为上与他们保持一致以寻求安全感。社会提供的解决方案是：\n1. 让人们每天重复千篇一律僵��的机械性工作，这种秩序感让他们散失追求超越与统一的欲望；\n2. 通过享乐主义、消费主义的鼓吹麻痹人的追求。\n至于爱的状况在于上述现代人的社会特性相符，它强调找到一个躲避孤独的港湾，结成二人联盟以对抗这个孤独的世界，却永远达不到「中心关系」（核心感受的互动）。\n\n作为「协作」和逃避孤寂港湾的爱，是当代西方社会爱情瓦解的一种形式，另一种，则是作者着力批判的弗洛伊德的性满足之爱。\n\n在弗洛伊德看来，爱来自于充分性满足的结果，其所谓爱的本质是非理性的，他不认为存在理性的爱。作者认为弗洛伊德关于爱是性吸引的理论主要受三方面影响：\n1. 十九世纪的时代精神，对维多利亚女王时代严格的伦理道德的反思\n2. 当时占主导地位的人类学思想，其要求资本主义与人类的自然需要相统一，人在本质来看是一个竞争者，是他人的敌人\n3. 十九世纪占统治地位的唯物论影响，人们相信生理学现象中可以找到一切精神现象的基质\n对于非理性的爱，作者例举了恋母、恋父、偶像崇拜、多愁善感指爱、投射机制（文饰作用）。这些爱都非来自两个人的核心感受的交流。爱是双方从生存的本质感到了自身的存在，他们成为自己，而不是逃离自己，并在这个基础上，与对方合一。\n\n## 爱的实践\n\n爱的是个人的体验，每个人只能通过自身的体验获得。因此本章讨论的爱的实践问题只是讨论进行实践的先决条件。\n\n爱的艺术与其他艺术类似需要的品质包括一下四点：\n1. 纪律性：这里的纪律并不是强加于自身的，必须将纪律内化符合人性，一开始也许要克服一定阻力，但长远看必不是带来痛苦的\n2. 集中：现代文化中，集中专心是一项不容易的事情，物质、技术、文化的发展使我们的头脑和身体总处于多任务的状态中。可以做一些简单的练习排除杂念，如正念冥想，感受呼吸等，这里作者推荐了《箭术与禅心》一书，刚好我去年也看过，一本薄薄的小书，值得一看。\n3. 耐心：要做到精通任何艺术，耐心必不可少。但现代工业系统却促成了其反面——急躁。\n4. 兴趣：要从浅薄的涉猎者达致大师，没有兴趣绝无可能。\n\n爱的艺术需要的独特品质有如下几点：\n1. 克服自恋：这种自恋方式包括主观的看待事物、自私的考虑自己、双重标准对待他人。爱依赖于排除自恋，它要求谦恭、客观和理智的发展。按本来面目去认识人和事物。\n2. 信仰：实践爱的艺术需要信仰，但也要区分理性和非理性的信仰。理性的信仰根植于创造性的理智和情感的活动，作者以科学史实为例论证这种信念来源于对自己的思维能力、观察能力和判断力的信任。同时理性的信念也存在于人际关系中。而非理性的信仰在来自于对权威的服从，它忽视人类的潜力和人类的成长。此外，爱的信仰还需勇气和冒险精神加持。\n3. 积极的活动：人的内在的积极性，创造性地运用自己的力量，避免思想上的懒惰。爱的能力需要一种感情强烈、头脑清醒、充满活力的状态。\n\n最后，作者还不忘再次批判一下资本主义社会对爱的艺术实践的压制。资本主义社会中基于商品交换的原则二发展出的公平理论观将爱的实践也公式化、机械化了。在资本主义社会中，真爱是罕有的。如果要使爱变成一种社会现象，而非极个别的罕见现象，那么，我们的社会结构就需要重大而合理的变革。要以人为目的，让爱与社会存在方式相统一。相信有一种作为社会现象而不仅仅是个别现象的爱的可能性，正是对人的本性的洞察之上的理性的信仰。","summary":"爱是一门艺术吗？回答是肯定的。因此，它需要知识和努力。——艾里希·弗洛姆\n在《爱的艺术》这本书中，弗洛姆认为，爱情不是一种与人的成熟程度无关，只需要投入身心的感情。如果不努力发展自己的全部人格并以此达到一种创造倾向性，那么每种爱的试图都会失败，如果没有爱他人的能力，如果不能真正谦恭地、勇敢地、真诚地和有纪律地爱他人，那么人们在自己的爱情生活中也永远得不到满足。\n弗洛姆进而提出，爱是一门艺术，要求想要掌握这门艺术的人有这方面的知识并付出努力。在这里，爱不仅仅是狭隘的男女爱情，也并非通过磨练增进技巧即可获得。爱是人格整体的展现，要发展爱的能力，就需要努力发展自己的人格，并朝着有益的目标迈进。\n★此版特别收录弗洛姆学术助手纪念文章《弗洛姆生命中的爱》。","month":3,"country":"美国","wereadId":"CB_3Ha8Te8Tz4ST6ej6cN9qK7X3"},{"title":"草枕","author":"[日]夏目漱石","start":"2023-02-27","finish":"2023-03-08","rating":8.3,"pages":"142","doubanLink":"https://book.douban.com/subject/26858848/","cover":"https://neodb.social/m/book/2021/11/290f68e69d-a6cc-4209-98b2-ac806e92428f.jpg","review":"没有文学背景知识，只觉很散的、挺美的","summary":"【内容简介】《草枕》的主要舞台在山中温泉地，作者把它描绘成脱离尘俗的“非人情”的天地。这样的外部格局的设定，如同桃花源与世隔绝的世界，即夏目漱石的“非人情”天地。同时，作者还把“非人情”天地中所有登场人物都塑造成近似于“非人情”的人物形象。譬如，山崖茶馆的老太太、女主人公那美、观海寺的大辙法师、理发馆的师傅。作者意在把主人公画家的“非人情”之旅描绘成“脱离世俗烦恼的超然心境”的旅行。画家为了忘却世俗的烦恼来到山中温泉旅行，他的旅途就像陶渊明和王维的诗歌里所描绘出来的诗境一样，切实体现了作者“直接从大自然中吸收，即使是短暂的也要尽情地徘徊在非人情天地的真挚的愿望”。\n书中曾多次引用到汉文典籍中的诗词语句，尤其以对陶渊明诗歌的引用最为直接和精彩。除了山水田园诗外，《草枕》中还包含着许多显而易见的中国元素。作为反对日本明治时代的工业文明以及自然主义文学理念的实践之作，作者在这部著作中宣扬的是一种回归自然、回归传统美的“东洋趣味”，将大量的笔墨用于感受性的渲染。\n【编辑推荐】《草枕》是夏目漱石的前期的重要代表作之一。小说写“我”——一个青年画家为了躲避俗世的忧烦，寻求\"非人情\"的美的世界，来到了一个偏远的山村，以及在那里的所见所思所闻。作品着重描写了山村中的人和景物，其间穿插着大量\"我\"关于艺术论和美学观的独白，并比较了东西方艺术的差异。这些独白中最为核心的观点即\"非人情\"。所谓\"非人情\"是一种超越道德或人情的境界，是超脱世俗的出世境地，也是一种艺术审美观。比如作品中的\"我\"认为陶渊明的诗中所传达出来的意境便深得\"非人情\"三昧。因此，《草枕》与其说是一篇小说，更像是一部夏目漱石关于艺术的论著；而对山村风情的描写以及不时出现的俳句和诗词又让这部作品像是一篇优美的游记散文。总之，《草枕》是一部别具特色的作品，非常值得一读。","month":3,"country":"日本","wereadId":"CB_GskDcQDdg53k6eq6cN9uhAFt"},{"title":"第二十二条军规","author":"[美] 约瑟夫·海勒","start":"2023-03-09","finish":"2023-03-21","rating":8.1,"pages":"550","doubanLink":"https://book.douban.com/subject/34434957/","cover":"https://neodb.social/m/book/2021/09/1681a77b40-e20f-4316-9f43-1a234a07ac42.jpg","review":"80页的那段对话让我又坚持到160多页，差不多33%，还是弃读了。","summary":"根据第二十二条军规，只有疯子才能免除飞行任务，但必须由本人提出申请；而能提出此申请的人必然没疯，所以他还是得飞。《第二十二条军规》主人公约塞连是二战中一名美国轰炸兵，第二十二条军规使他不得不在生死线上苟且偷生，同时他也发现原来世界到处暗藏着这种荒唐的圈套。如今，第二十二条军规已经称为了英语中的一个惯用语，指的是看起来很有道理，实际上很疯狂、很荒唐的逻辑。第二十二条军规便是制度化疯狂的代名词，这是人类社会永恒的问题：在一个疯狂的世界中，到底谁是疯子？","month":3,"country":"美国","wereadId":"26991897"},{"title":"福格行为模型","author":"［美］B.J.福格（BJ Fogg,PhD）, B.J.福格","start":"2023-03-06","finish":"2023-03-27","rating":8.3,"pages":"336","doubanLink":"https://book.douban.com/subject/35594496/","cover":"https://neodb.social/m/book/2022/01/23f62a9e6c-e159-4547-9d58-a5c6c725519d.jpg","review":"本书可以算得上是《原子习惯》（Atomic Habits）的姐妹篇，根据作者在前言里的介绍，《原子习惯》还是得益于他的教学，因此本书可以称为微习惯之姐姐篇。实际上两本书的理论方法在我看来也是大同小异，有一些侧重点不同的论述。相较而言，本书会有更多实操方面的例子和建议，以及有更好的图标总结示范，而《原》书我认为在文字上会更优美一些。\n\n虽然主题类似，但无论如何，两本都值得一读，因为试图通过一本书就改变一个人在我看来是一种奢望，只有不断的阅读，让思想的烙印越发深刻，才能重现一个人的精神面貌。而阅读本身，也可以作为书中培养微习惯的一个亲身事项作为实践。\n\n以下是本书的微总结：\n\n## 行为设计的步骤\n1. 明确愿望：分清出愿望（aspiration）、成果（outcome）、行为（behavior）的区别\n2. 探索行为选项：头脑风暴、异想天开的罗列行为选项\n3. 为自己匹配具体行为：用焦点地图匹配��有影响、动机、能力的行为（行为集群）。要形成复利效应，在于能持久的改变，而持久的关键在于匹配自己真心想做的行为，福格原则1，帮助人们做他们想做的事情。\n4. 从微习惯开始：提升技能、获取工具和资源、让行为变得微小（福格行为模型图可以参考学习，横轴能力从弱到强，纵轴动机从弱到强，图上是行为线，落在线上方则能成为习惯）\n5. 找到「对」对提示：人物提示（不可靠）、情景提示（多干扰）、行动提示（效果好）。行动提示也被作者成为锚点（为行为排序再连接：上完厕所做两个俯卧撑）。锚点要具体而微小，考虑地理、频率主题的匹配（最后动作）。\n6. 庆祝成功：日常言语中的奖励意义已经变得模糊，真正的奖励讲求时机与实质。作者的庆祝就是从奖励原理中抽象出来的一种行为，它讲求及时又简单，让人**感受**到成功。演练7～10次，将行为固化进大脑。\n7. 排除障碍、重复和扩展：行为加工（选择、匹配、连接微习惯）、自我洞察（明确目标、理解动机，分清自己的应然和实然）、循序渐进（找准基线、克制加量、允许后退、及时庆祝）、情景设计（让环境成为助力而不是借口）、心态调整（构建身份认知、自我催眠）。\n\n## 行为改变三阶段\n1. 创建新习惯：从擅长而微小的好习惯开始，配合身份认知的转变。\n2. 终止旧习惯：确定**具体**的习惯清单，选择最容易做到的，通过提示（移除、规避、忽略），增加习惯执行的难度、调整动机，，从微小的改变开始。\n3. 新习惯代替旧习惯：先在行为集群里匹配黄金行为（具体的），同时重新映射提示、调整能力和动机以替换旧行为，反复尝试演练，并不忘庆祝。","summary":"在这本书中，福格博士亲自拆解了他提出的福格行为模型，揭示了驱动人类所有行为的3个关键要素，解析了每一个要素在驱动人类行为中的重要作用，提供了激发每一个要素以更好地推动行为改变的有效方法。此外，福格博士还给出了让福格行为模型更好地发挥作用的两个方法，通过设计情绪来设计行为，通过打造高频率小成功让小改变自然生长。\n本书不仅能够帮助人们毫不费力地养成好习惯，也能够指导人们成功对抗坏习惯；不仅能够帮助个人实现改变，也能够帮助群体直面挑战。只要掌握福格行为模型的精髓并加以灵活运用，每个人都能够轻松改变自己的工作与生活，成为自己想要成为的那个人。\n本书给出了福格行为设计工具箱，包含15种人生情景与挑战、300个微习惯配方、100种庆祝方式，手把手地教你减重、减压、改善睡眠质量、摆脱坏习惯、提升效率……","month":3,"country":"中国","wereadId":"CB_7nGDr0Du8CFz6f96gWFtI3J9"},{"title":"一朵桔梗花","author":"[日] 连城三纪彦","start":"2023-03-27","finish":"2023-04-14","rating":8.3,"pages":"556","doubanLink":"https://book.douban.com/subject/27001114/","cover":"https://neodb.social/m/book/2021/09/15a1e70726-cc69-4c98-8391-bca17d7f35ef.jpg","review":"最后一篇似乎与其他几篇不太搭。没有太多的诡计，却有奇诡的动机，文字优美，感情细腻。","summary":"直木奖、推理作家协会奖得主连城三纪彦经典畅销作\n旧时代底层女人的浮世绘\n========================================\n女人如花，\n拥有最动人的美丽，\n却无法掌控短暂而脆弱的生命。\n一切美好都将如花朵凋零，\n但 ，那一缕永远无法抹去的幽香，\n却是渺小生灵存在与尊严的完美诠释。","month":4,"country":"日本","wereadId":"3300053010"},{"title":"哲学的故事","author":"[美] 威尔·杜兰特","start":"2023-03-21","finish":"2023-04-22","rating":7.9,"pages":"432","doubanLink":"https://book.douban.com/subject/14439405/","cover":"https://neodb.social/m/book/2021/10/040173c72b-77cd-40dc-8c4a-2dc6e6982304.jpg","review":"引文很多，选取的哲学家（思想家）与一般的哲学史入门书籍有所不同。总体低于预期，看得昏昏欲睡（也许是半夜看书的关系），最有印象的当属斯宾诺莎那一章。","summary":"哲学不会使我们富有，却会使我们自由\n最经典的哲学入门读物，让深奥的哲学立刻生动起来\n出版第一年连续再版22次，迅速译成18种语言，掀起全球哲学热潮\n杜兰特首先是一个历史学家，他博闻强识，能将过去与当下融会贯通。也因此，他又被誉为20世纪最重要的哲学家之一。                  ——杜威\n《哲学的故事》在普及哲学上做了一项开创性的工作。有的地方朗朗上口，令人想大声读出来！                         ——威尔•罗杰斯（美国作家，社会评论家）\n《哲学的故事》或许还可以叫“哲学之美”，因为威尔•杜兰特对所有的思想赋予一种同等的爱和理解、批评和吸收。他的目的不仅仅是写哲学史，而且让我们随同这些伟大的哲学家们在思想领域一起探索进步。                            —— 《星期六评论》\n苏格拉底服毒、柏拉图逃亡、亚里士多德被流放，为了真理师徒三人前仆后继；培根立遗嘱托付“把灵魂送给上帝；把躯体留给泥土；把名字留给后世”； 伏尔泰和卢梭两人合伙“击垮了法国”……\n威尔•杜兰特以苏格拉底的谦逊、伏尔泰的洞察力和恒心、罗素的冷静，用生动幽默的文笔，将哲学思想融合于血肉之躯，记述了从苏格拉底到约翰•杜威等有史以来的主要哲学家，让读者在最短的时间内、用最有趣的方法读懂漫长的哲学发展和艰深的哲学精髓。","month":4,"country":"美国","wereadId":"23783430"},{"title":"与父亲的奥德赛","author":"[美]丹尼尔·门德尔松","start":"2023-04-17","finish":"2023-04-28","rating":8.6,"pages":"376","doubanLink":"https://book.douban.com/subject/35778225/","cover":"https://neodb.social/m/book/2022/10/021504f9dc-9ec0-4a0b-816c-58ed00ee08ed.jpg","review":"一本好书。古典文学教授带我领读了荷马史诗《奥德赛》，研读课上的讨论非常有意思，也让我学到一些观察阅读经典文本的角度，更有意思的是父亲参与到了作者教授的研读课中来，这段父与子的关系又暗合着奥德赛的故事。作者在书中也用他提到的环套结构对奥德赛进行了致敬。最重要的是他深刻生动的刻画了父亲的形象，虽然作者是从儿子的角度去描写，却同时让我思考我自己作为一个儿子和父亲在生活中的样子。感谢两位门德尔松教授。","summary":"★ 古希腊英雄父子的传奇史诗，交叠当代父子的平凡人生\n★ 当古典学教授的文学课堂，迎来数学家父亲，细读关于漂泊与回家的12110行史诗\n★ 他对父亲迟来的认识，也是我们所有人对父亲的理解与误解\n★ 那漫长而曲折的旅程，终将抵达所有故事的终点\n诺娜·巴拉基安优秀评论奖获得者、美国当代古典学家丹尼尔·门德尔松的文学与人生\n△贝利·吉福德非虚构奖短名单\n△《科克斯书评》年度最佳回忆录\n△《新闻日报》年度图书\n〰〰〰    〰〰〰    〰〰〰    〰〰〰\n哪一面才算真正的自己？\n《奥德赛》如此设问，且一个人可能有几重面貌呢？\n那一年，父亲旁听我的《奥德赛》研读课，之后我们跟随奥德修斯的脚步巡游观光。\n由此我明白，答案可能出人意料。\n〰〰〰    〰〰〰    〰〰〰    〰〰〰\n门德尔松81岁的数学家父亲去旁听儿子给本科生开设的《奥德赛》研读课，细读关于“漂泊与回家”的12110行史诗，之后父子二人又一起参加《奥德赛》主题游轮旅行。在文本与空间的“奥德赛之旅”中，他得以一次又一次重新理解父亲。\n《奥德赛》是英雄漂泊多年，历尽千辛万苦得以归乡的故事；也是稚子长大成人，在寻父过程中逐渐了解父亲的故事。\n《与父亲的奥德赛》则将《奥德赛》中古希腊英雄父子的传奇史诗与当代父子的普通人生并置，在文本与现实的交叠中，两对父子相互映照。\n时空交错的回旋里，父、子与史诗的故事缓缓展开。","month":4,"country":"美国","wereadId":"CB_6nZBC5BEa9Gu6fs6gWE3T2ql"},{"title":"飞魂","author":"[日]多和田叶子","start":"2023-04-23","finish":"2023-05-04","rating":7.8,"pages":"240","doubanLink":"https://book.douban.com/subject/27661601/","cover":"https://neodb.social/m/book/2021/09/17e339cf20-e3cc-4d84-afac-4224643e5f1e.jpg","review":"不太能欣赏，语言先于世界存在的表达还是挺新颖的","summary":"《飞魂》是重新收录的多和田叶子作品集。有长篇小说《飞魂》，还包括单行本《光与明胶的莱比锡》中的同名作以及《盗读》《孢子》《裸足的拜观者》四部短篇小说，另附有《作者致读者的话》《解说》《年谱》三篇后记。这几部小说都强烈体现了多和田创作初期激进的语言意识和实验性的笔法。尤其是《飞魂》，作为一部作品的强度，是压倒性的。它可以作为一块试金石，试验是否对多和田的语言才能有所感受。","month":5,"country":"日本","wereadId":"3001182842"},{"title":"脑与意识","author":"[法] 斯坦尼斯拉斯·迪昂","start":"2023-05-03","finish":"2023-05-12","rating":8.5,"pages":"319","doubanLink":"https://book.douban.com/subject/30367215/","cover":"https://neodb.social/m/book/2021/09/154c78bd7f-62d0-498e-85a9-4ee877cfeddd.jpg","review":"从相对实证的角度去阐释意识，相比哲学中虚无缥缈的自由意志，这无疑给了我更多的实在感和切身体会。精巧设置的「最小改变」的各种迷人实验，令人印象深刻，尤其是「无意识启动」这个发现的得出，让我对意识又有了新的认识。一星扣在湛庐将参考文献放在了只能下载App才能看的地方。\n","summary":"除宇宙外，大脑是目前人类的头号未解之谜，宛若科学领域闪耀的王冠，而王冠上璀璨的明珠，要属人的意识，它令人着迷又深不可测。意识吸引了全世界科学领域的巨擘的目光，而脑科学家斯坦尼斯拉斯·迪昂从这些人里脱颖而出，他让意识探索从空想走向实践。如诺贝尔生理学或医学奖获得者埃里克·坎德尔所说，迪昂开创的一系列意识实验，彻底改变了脑科学领域。\n在《脑与意识》中，迪昂集结了意识与思维近20年来的前沿研究成果，用丰富、富有创新性的实验，将深奥难懂的脑科学知识，以大众看得懂的方式娓娓道来，发现了人类主观意识的客观标志，原来意识是“可见的”，掀起了脑科学的新篇章。\n从我们感觉不到无意识讲到人人可察觉的主观思想，从意识的功能讲到意识的测量方法，从与植物人沟通讲到创造有意识的AI。本书对意识与思维背后的脑活动进行了重新定义、检验和阐释，探讨了意识在临床医疗和未来科技方面的潜在用途和进展，为读者打开了新思路。迪昂与同事提出的突破性理论“全脑神经工作空间”书中也进行了详细解释。\n让我们跟随迪昂一同踏上旅程，探索人类思想、情感与意志背后那复杂而令人兴奋的真相。","month":5,"country":"法国","wereadId":"24240889"},{"title":"数学女孩3","author":"[日] 结城浩","start":"2023-05-08","finish":"2023-05-25","rating":8.4,"pages":"406","doubanLink":"https://book.douban.com/subject/27193490/","cover":"https://neodb.social/m/book/2021/09/17508b2b63-6e43-4840-904d-bd5eb4b38e40.jpg","review":"「不，我还不明白」\n算起来这是我看过的第三本有关哥德尔不完备定理的书籍了，前两本是侯士达的《G.E.B》和他编写的《哥德尔证明》。其中给我最多我好像有点懂了的幻觉的是《哥德尔证明》，《G.E.B》则多数时候觉得在看天书，而本书，则在前九章看得我信心满满，直到翻开第十章直接瞌睡连连。\n撇开证明本身，对于一本以数学主题内容而言的书，本书从高中生学园生活角度切入，带上一点青涩文学，的确给冰冷严谨的证明敷上了层浪漫的光晕。以对话形式构建数学证明也有助于降低理解的难度。前九章选的数学证明内容也颇具启发性。尽管在临门一脚的不完备定理证明上让人有点摸不着头脑，但对于不完备的数学意义的反复强调仍另外印象深刻。","summary":"《数学女孩》系列以小说的形式展开，重点描述一群年轻人探寻数学中的美。内容由浅入深，数学讲解部分十分精妙，被称为“绝赞的数学科普书”。\n《数学女孩3：哥德尔不完备定理》有许多巧思。每一章针对不同议题进行解说，再于最后一章切入正题——哥德尔不完备定理。作者巧妙地以每一章的概念作为拼图，拼出与塔斯基的形式语言的真理论、图灵机和判定问题一道被誉为“现代逻辑科学在哲学方面的三大成果”的哥德尔不完备定理的大概证明。整本书一气呵成，非常适合对数学感兴趣的初高中生以及成人阅读。","month":5,"country":"日本","wereadId":"22806897"},{"title":"西方科学的起源","author":"[美] 戴维·林德伯格","start":"2023-05-15","finish":"2023-05-30","rating":8.3,"pages":"607","doubanLink":"https://book.douban.com/subject/30354892/","cover":"https://neodb.social/m/book/2021/12/044c6f0bbc-0e16-4f6b-8e8f-1714991ae190.jpg","review":"本以为这会是一部比较艰涩难读的理论书籍，没想到里面包含了众多古代西方的奇闻轶事，走马观花般的读完。为50多页的参考书目点个赞。","summary":"本书是论述近代以前西方科学的权威教材，也是一部非常优秀的科学史读物。它结合欧洲科学传统的哲学、宗教和体制背景，深入浅出地介绍了从古希腊到中世纪晚期各个方面的科学成就，竭力避免从今天的科学观点出发来理解古代成就。1992年本书第一版问世后好评如潮。2007年，作者对该书做了重要修订扩充了大量内容。本书根据新版译出。","month":5,"country":"美国","wereadId":"3000101223"},{"title":"桶川跟踪狂杀人事件","author":"[日] 清水洁","start":"2023-06-01","finish":"2023-06-08","rating":8.4,"pages":"328","doubanLink":"https://book.douban.com/subject/35094680/","cover":"https://neodb.social/m/book/2021/09/153e5599f3-2aef-418c-ae8b-c79057dbd6f3.jpg","review":"日本竟然有这么狗的警察","summary":"推动反跟踪骚扰法案出台的凶杀案件！\n是谁杀害了一个女孩三次？\n调查记者全程追踪，直击日本官僚体制的结构性罪恶\n日本纪实文学金字塔尖之作，日本记者会议大奖作品\n◎编辑推荐\n“我的女儿被杀害了三次。”\n第一次是罪犯，\n第二次是怠于调查的警方，\n第三次是伤害她名誉的媒体。\n前男友跟踪骚扰、买凶杀害 + 警方坐视不理 + 媒体污名化报道，无辜的受害人被一次次推向深渊。\n遭遇骚扰和暴力、受到死亡威胁的女性，保留证据，奋力求救，为何无人听见？\n饱受白眼的“三流”记者，为何挺身而出，站在公权力的对立面，揭露警方的一个又一个谎言？\n■\t调查记者清水洁全程追踪，秉持“人”的良心而报道，传递受害人的真实声音。先于警方找到实行犯，揭露警察与官方媒体的罔顾事实、操纵舆论的“共犯”结构。\n■\t十幅照片还原侦破过程，直击逮捕现场。\n■\t本作“日本记者会议（JCJ）大奖”“编辑选择杂志报道奖”，被誉为  “记者的教科书”“日本纪实文学的金字塔”。\n■\t此案推动了日本《跟踪骚扰行为规范法》出台。\n◎内容简介\n一九九九年十月二十六日，年轻女子猪野诗织在日本埼玉县JR桶川站前遭人持刀刺死。\n受害者生前因长期受到跟踪骚扰而多次向警方报案，警方却未予重视，最终没能阻止悲剧的发生。记者清水洁在调查这一事件的过程中，依从受害者生前留下的“遗言”的引导，多方走访查证，在警方轻视线索、调查不力的情况下，以记者的身份找到了实行犯，进而揭露了警方对受害者生前报案的漠视、敷衍，以及案发后试图抹黑受害者、掩盖渎职事实的行为。\n此案引发强烈的社会反响，推动了日本《跟踪骚扰行为规范法》的出台。\n本书是该事件的全记录。\n◎媒体评论\n此书除了让我们重新审视公权力的体制内在、媒体载舟覆舟的能力，也揭示了这样的意义：每个人都可能是促成社会之恶的原因，但每个人也都可以有所选择、选择自己不去构成社会之恶，甚至可以交付一己之力成就善的一部分。\n——2019台湾OPENBOOK年度好书推荐语\n清水先生是一位著名的记者，曾采访报道过“桶川跟踪狂杀人事件”“足利事件”等大案，放出过许多推翻警方与检方调查结论的独家特写。\n——伊藤诗织在《黑箱》中评价清水洁\n用这种方式，清水洁在调查上面把警方绝对不愿意别人知道的内幕给揭露出来，当然他绝对来不及救回被害者，但他尽到了作为一个调查记者最重要的责任，他不放弃把警方不愿意被大众知道的事实给揭露出来。这本书值得大家看一下，想一下。\n——《杨照读书》\n为了回应被害者的「遗言」而开始活动的清水记者，带着甚至是「愚直」的执念，最终将犯人和警察双方逼迫得走投无路，真的很精彩。我认为这才是记者的精神，这就是正义。我不常使用“感动”、“正义”等词语（而我这次使用了），所以我关于这部著作的感想，应该可以得到大家的信任。\n——明治大学法科大学院教授 瀬木比吕志","month":6,"country":"日本","wereadId":"38585704"},{"title":"热锅上的家庭","author":"[美] 奥古斯都·纳皮尔, 卡尔·惠特克","start":"2023-05-28","finish":"2023-06-15","rating":8.3,"pages":"432","doubanLink":"https://book.douban.com/subject/26257557/","cover":"https://neodb.social/m/book/2021/09/162a1a598e-4d11-4de3-ae60-200fffd745c3.jpg","review":"孩子老师推荐阅读的书。作为一个非相关领域的读者，我倾向性地认为家庭治疗有其作用和道理，尽管书中所涉例子与我们所处的中国式家庭颇有些差别。作为家庭中的一员，即使有一些相关知识，在遇到家庭问题时，也很难客观介入去解决，因为仍然缺少一个家庭治疗师那样的第三者的身份。而国内目前的现状，拖家带口的进行家庭治疗估计还不现实。因此，阅读此书，更多的可能是带给我自己作为家庭成语身份的一种反思，以及原生家庭对自身影响的一个参考。","summary":"知名心理学家李松蔚倾情作序推荐\n樊登读书会收听收看量破1300万\n40年长销不衰的原生家庭经典著作\n一个人或许无法突破“原生家庭”，但一家人可以\n重新定义心理治疗，颠覆对家庭的认识\n家人不必孤军奋战，家庭可以有难同当\n\n◎ 编辑推荐\n☆ 李松蔚重磅推荐，40周年经典再临\n北京大学临床心理学博士、清华大学心理发展指导中心讲师、知乎大V李松蔚老师重磅推荐，樊登读书会收听收看量破1300万，40年长销不衰，原生家庭经典著作蕞新纪念版。\n☆ 汇聚绝大部分家庭问题，完整案例铺排让读者“亲历”变化\n封锁内心、不擅表达情感、一心扑在事业上的丈夫，经历丧偶式育儿、怀疑人生价值的家庭主妇妻子，夹在父母中间左右为难、时不时上演离家出走戏码的替罪羊女儿，因父亲缺位而迷惑自大的儿子，一心想让家人别再吵架的小女儿……这一连串看似无解又牵一发动全身的问题竟在两位治疗师的调停运作下逐渐脱解，而经由对来龙去脉的细致记叙，读者当然能够亲眼见证其间的种种曲折和转机，不错过值得玩味的细节。\n☆ 小说式行文，情节跌宕起伏、紧凑吸睛、反转连连\n从离家出走闹自杀的女儿，到貌合神离的夫妻，再到父母双方的原生家庭……你以为问题基本解决了，却发现那不过是暴风雨前的喘息；你以为这个家难逃分崩离析的命运，黎明前的曙光却不期而至。\n☆ 重新定义心理治疗，颠覆对家庭的认识\n传统个体心理治疗从“有问题”的人入手，头痛医头、脚痛医脚，这也是很多原生家庭问题无法很好解决的原因，而本书从家庭系统出发，不放过每一个家庭成员，站在整体的高度解决问题。\n☆ 通俗之外的严肃——家庭治疗入门书\n卡尔·惠特克是家庭治疗领域大名鼎鼎的先驱，从20世纪40年代开始探索家庭治疗。本书既能引发普通读者对家庭的思考，也提供了必要的理论知识和对家庭治疗技巧的探讨，相信也会让对家庭治疗感兴趣的专业读者收获不小。\n\n◎ 内容简介\n以往，我们把心理问题归咎于个人、创伤和原生家庭，试图站在个人的角度突破创伤性经历和童年问题。\n可这本书告诉我们，家庭就像一个小宇宙，自有一股强大的力量。当心理问题、家庭问题出现时，人不必也不应孤军奋战，要和每一位家人一起解决问题。\n作者用生动细腻的语言为我们讲述了布莱斯一家是如何在治疗师的引导下找对方向，化解家庭危机的。借由书中家庭所面临的危机，作者带我们揭开了家庭治疗的面纱，也向我们解释了家庭中存在已久的制衡力量、三角关系以及原生家庭的影响等诸多问题。\n本书自1978年成书以来，在全美掀起了广泛讨论的热潮，是家庭心理治疗领域极具影响力的作品。\n\n◎ 媒体推荐\n这本书为我们提供了一个了解家庭互动、婚姻对家庭影响以及家庭治疗对人际关系有何助益的新视角。\n—— 美国权威心理学杂志《今日心理学》\n如果你备受婚姻、孩子和自身问题的困扰，如果你在接受心理治疗或觉得孤立无援、烦恼无处诉说，那这本书将为你提供一个全新的、很有价值的参考。\n——《纽约时报》\n这本书展示了整个心理成长的过程，开拓了一条改变日常生活方式的新道路。\n——《洛杉矶时报》\n引人入胜，极具可读性。\n——《美国精神病学杂志》\n◎ 名人推荐\n惠特克是一个梦幻般的大师。而你拿在手里的这本《热锅上的家庭》，是他最负盛名的精神遗产。\n—— 知乎大V、知名心理学家李松蔚","month":6,"country":"美国","wereadId":"CB_3kN7PT7QBCoh6gp6gW86RFbt"},{"title":"想象的共同体","author":"[美] 本尼迪克特·安德森","start":"2023-06-09","finish":"2023-06-25","rating":8.4,"pages":"263","doubanLink":"https://book.douban.com/subject/26810557/","cover":"https://neodb.social/m/book/2021/09/1682cf3517-4bac-490c-880b-6d8a3526fdc9.jpg","review":"本书以对抗欧洲中心主义、运用非欧洲语言材料的民族主义历史比较研究为目的。偏好探讨小国民族主义，通过提出「想象的共同体」的概念，对被广为宣传的「自古以来的」民族主义做出批判性评价。于我而言，作为非相关领域读者，阅读本书最大的障碍在于作者对东南亚材料的引用，虽本是东南亚人，但在欧洲中心（文化、科技）的视角下，很难产生代入感。好在可以配合微信读书一些书友的想法和豆瓣上的书评，能理清一些思路。\n\n从时间线上看第一波民族主义的诞生在北美殖民地，又称远程民族主义，是早期殖民地区欧洲移民所推动的，在当地的欧洲海外移民由于政治上的朝圣之旅受到了本土化的限制，发展出了独立意识；第二波民族主义则发生在欧洲本土，又可分为两种民族主义模式，其一是通过语言和印刷资本主义创造的语言民族主义，也是最常被复制的民族主义形式，其二是有国家之上而下推动的官方民族主义；第三波也是作者所说的最后一波民族主义诞生于第二次世界大战之后，它既是对官方民族主义的反应（reaction）也是对前述另外两种民族主义的模仿。在这样的论述背景下，作者认为自己以「哥白尼精神」的方向，提出共同体是想象的产物，亦即是民族主义产生了民族，而非相反。","summary":"本书作者将比较史、历史社会学、文本分析与人类学融于一体，提出一个解释民族与民族主义问题的具有哥白尼革命特质的新理论典范，把民族、民族属性与民族主义视为一种“特殊的文化的人造物”作为研究起点，而民族这种特殊的人造物就是“想象的共同体”。接着论证了民族主义是如何从美洲最先发生，然后再向欧洲、亚非等地逐步扩散的历史过程。","month":6,"country":"美国","wereadId":"32282916"},{"title":"平面国","author":"[英] 埃德温·A. 艾勃特（Edwin A. Abbott）, 插   图：张志涛 樊忠浩","start":"2023-06-19","finish":"2023-06-26","rating":8.5,"pages":"168","doubanLink":"https://book.douban.com/subject/35549508/","cover":"https://neodb.social/m/book/2021/12/06715e7683-3dde-4566-9bfb-49744c9a27b2.jpg","review":"超越时代的「真理」，总是危险的","summary":"百年传世科幻经典×堪称“空间”启蒙书\n搭配15幅全新插图，附插画师创作谈，讲述插画诞生背后的故事\n维度概念的先驱，深刻影响霍金、阿西莫夫、诺兰等众多科学、科幻界大师\n🔷编辑推荐\n◎世界经典名著，百年传世科幻经典，维度概念的先驱，堪称“空间”启蒙书。\n◆“科幻大师”阿西莫夫盛赞：\n“《平面国》是人们认知维度概念的最佳途径，它让我们深刻思考宇宙与自我。”\n◆《星际穿越》的隐秘彩蛋：\n“墨菲书架上的书”之一，同《万有引力之虹》、T.S 艾略特的 《荒原》、马尔克斯的《百年孤独》等一起，成为启示剧情发展的重要线索。\n◆《生活大爆炸》中谢尔顿心中的最佳旅行地：\n“如果可以造访一个幻想中的国度，我最想去的地方就是平面国。”\n◎搭配15幅全新插图，生动还原「平面国」世界设定；另附插画师创作谈，讲述插画诞生背后的故事。\n平面国的居民到底长什么样子？他们的日常画风怎样？当他们遇到圆点国、直线国和空间国的人时，又会是何种场景？\n——丰富的细节，生动的想象，全新插画带你深入“降维”的世界。\n◎辛辣扎心的社会讽刺，振聋发聩的科学启示，发人深省的人生哲理。\n◆“在这个一百多年前的古老科幻小说里，我们能看见站在二维世界向往三维世界的正方形，也能看见离开桃花源后的武陵人、被烧死在鲜花广场上的布鲁诺、喟叹‘如果我不曾见过太阳’的艾米丽·狄金森，以及站在西方现代艺术开端上的马塞尔·杜尚。”\n——译者 蒋慧\n◎匠心独运的装帧工艺：裸脊精装，荧光绿色锁线，内文做旧处理。\n★裸脊精装，可180°平摊，更好呈现“平面”世界；\n★雅致灰+荧光绿，尽显古朴与现代、典雅与科幻的绝妙结合。\n🔷内容简介\n《平面国》是一部创作于19世纪的经典科幻小说，它借由小说形式阐释了维度概念，想象出一个二维空间的故事，同时对维多利亚时期的社会和人性进行了深刻讽刺，是文学与科学、古典与科幻的绝妙结合。另外，书中提到的维度、几何等突破性视角，对后世科学、科幻、设计等诸多领域都产生了深远影响。\n媒体推荐\n★《平面国》是人们认知维度概念的绝好途径，它让我们深刻思考宇宙与自我。\n——艾萨克·阿西莫夫\n★《平面国》是极有想象力、极让人愉快并感人的数学读物之一。\n——《华盛顿邮报》\n★人们对《平面国》的兴趣持续了一个多世纪，因为它的魅力是多层面的。\n——《维多利亚研究》\n★爱因斯坦彻底改变了人类对空间的了解，但他的书连科学家都很难读懂，幸亏我们还可以通过阅读小说《平面国》来想象。\n——亚马逊网站","month":6,"country":"英国","wereadId":"33617657"},{"title":"山茶文具店","author":"[日] 小川糸","start":"2023-06-26","finish":"2023-07-04","rating":8.4,"pages":"320","doubanLink":"https://book.douban.com/subject/28656614/","cover":"https://neodb.social/m/book/2021/09/15618fa90c-c989-4d21-9511-c057e30849be.jpg","review":"这几年每年都要读上几十本书，有历史的、推理的、哲学的、社会学的、心理学的，其中自然会有诘屈聱牙的作品。但是每过一段时间，每当遇到阅读情绪低落时，我总要找一部日本作者的书来读一读。题材不重要，虽然读不了原文，但无一例外，即使翻译版，日本作者的书总是能带给我清晰、易懂、细腻、真诚的感觉。也许这是我的某种认知偏见，但毫无疑问，这本日文原著书也属于这一行列。","summary":"★日本全国700多家书店店员投票选出的最想卖的书！ 2016、2017连续两年获日本“书店大奖”重推！\n★日本畅销作家小川糸备受好评暖心之作。16封手写书信，掀起“书信时代”怀旧风潮。\n★一封封有温度的信，一个个有故事的人生。执笔写下说不出的话，与思念之人见字如面\n★随书附带精美手绘镰仓游览导图\n…………\n在镰仓，有一家帮人代笔的文具店，每代店主均由女性担任，只要有委托便会接受，即使是餐厅的菜单也会帮忙。\n不知不觉间，雨宫鸠子成为了第11代传人，而与外祖母之间的误会，以及开始独自一人活在世上的恐惧，使她充满迷茫。给死去宠物的吊唁信、宣布离婚的公告信、拒绝借钱的回绝信、写给挚友的分手信……\n一封封代笔信是客人们的写实生活，也是一节节人生的课堂。","month":7,"country":"日本","wereadId":"22523966"},{"title":"索拉里斯星","author":"[波] 斯坦尼斯拉夫·莱姆","start":"2023-06-29","finish":"2023-07-06","rating":8.4,"pages":"254","doubanLink":"https://book.douban.com/subject/35049755/","cover":"https://neodb.social/m/book/2021/09/160c5866ec-9627-4ee5-b92d-093843e10dbf.jpg","review":"不少好评的重点都说这本科幻富有哲学意涵，那为何不直接去读哲学呢？在我看来本书的亮点本身还是作者构建的各色索拉里斯星学说，尤其是最后提出的「缺陷的上帝」。","summary":"🌌这颗星球，知道你内心深处的秘密。\n🌌波兰科幻大师莱姆代表作，塔可夫斯基《飞向太空》原著小说。\n🌌刘慈欣、梁文道、戴锦华、吴岩、江晓原诚意推荐\n【编辑推荐】\n🌟波兰科幻大师斯坦尼斯瓦夫•莱姆代表作，以诗意笔触和深邃哲思触探人类认知边界。人类追寻着地外文明的蛛丝马迹，遇见了索拉里斯星的蓝色大洋。它像一面镜子，反映出人类的忧伤与迷惘，恐惧与执念。而它本身是什么，人类却永远也无法知道。\n🌟安德烈•塔可夫斯基据此改编《 飞向太空》，铸就电影史上的经典。\n🌟被无数人誉为无法超越的科幻神作，设立太空想象天花板，刘慈欣、梁文道、戴锦华、吴岩、江晓原诚意推荐。\n🌟莱姆是波兰科幻作家、哲学家，被译成52种语言，全球畅销4000余万册，以一己之力将波兰科幻提升到世界水平。早在70年前就预言了互联网、搜索引擎、虚拟现实和3D打印的出现，直言人类将遭遇人工智能和信息爆炸的挑战。\n🌟莱姆100周年诞辰纪念版，波兰驻华大使亲自撰写序言。\n【内容简介】\n索拉里斯星是一颗围绕双星运转的星球，表面被胶质海洋覆盖。根据人类既有的认知，这样的星球的运转轨道应该是不稳定的。但仅仅过了十几年，人们就发现，索拉里斯星的轨道并没有显示出预期的变化。这激发了人类对这颗星球无限的兴趣。\n心理学家凯尔文降落到索拉里斯星，迎接他的不是同伴们的热烈欢迎，而是杂乱的太空站、疯癫的科研人员和凝重的暗黑气氛，他试图弄清楚到底发生了什么，直到在一片扑朔迷离中撞见自己已经过世十年的妻子……\n【媒体推荐】\n莱姆有非常了不起的想象力，是真正独一无二的。莱姆的作品对人和宇宙的关系有着更深刻的描述，与美国的科幻小说相比，在文学上也更为精致，有着更为深远的意境，也给人带来更多的回味和思考。\n——刘慈欣\n如果我们找不到外星人，可能是因为我们对外星生命的理解，都以为他们是人。\n——梁文道\n《索拉里斯星》不仅是一部重要的科幻作品，也是一部伟大的文学作品，甚至是一部现代哲学读本。\n——戴锦华\n莱姆总是能从核心处嘲弄我们的生活，他能把科技论文、民间故事、寓言、神话传说等都烹调在一起，并用幽默而力透纸背的荒诞语言和荒诞情节，返照我们的世界。\n——吴岩\n他是当今活跃的作家中最智慧、最博学、最幽默的一位。\n——安东尼•伯吉斯\n无论是语言的驾驭、想象力还是塑造悲剧角色的手法，都非常优秀，无人能出其右。\n——库尔特•冯内古特\n相比之下，我们疲惫的宇宙显得苍白无力。\n——《华盛顿邮报》\n与阿瑟•克拉克、艾萨克•阿西莫夫和菲利普•迪克比肩的科幻小说巨人。\n——《纽约时报》","month":7,"country":"波兰"},{"title":"惶然录","author":"（葡萄牙）费尔南多·佩索阿","start":"2023-07-05","finish":"2023-07-18","rating":8.5,"pages":"374","doubanLink":"https://book.douban.com/subject/1015864/","cover":"https://neodb.social/m/book/2021/09/16d793f2d7-9764-4f88-8374-5d9b0bcb173f.jpg","review":"非常适合碎片化阅读的一本书，读他的时候，时而会觉得这是痴人的呓语，时而却又觉得像是智者的警言。我多少在书中找到了点自己的影子，我想，来日方长，说不定还会时不时的翻起它。","summary":"这是葡萄牙作家费尔南多·佩索阿晚期随笔结集，都是“仿日记”片断体。它是作者的代表之一，是一部曾经长期散佚的作品，后来由众多佩索阿的研究专家们搜集整理而成。\n作者在随笔中的立场时有变化，有时是个精神化的人，有时则成了物质化的人；有时是个个人化的人，有时则成了社会化的人；有时是个贵族化的人，有时则成了平民化的人；有时是个科学化的人，有时则成了信仰化的人……这是变中有恒，异中有同，是自相矛盾中的坚定，是不如所云中的明确。正是这种精神气质、这种独自面向全世界的突围，使佩索阿被当代评论家誉为“欧洲现代主义的核心人物”、“杰出的经典作家”、“最能深化人们心灵”的作家。\n我国当代著名作家韩少功拾译家遗漏，精选出原作的五分之四，译成中文，文笔优美，读来赏心悦目。","month":7,"country":"葡萄牙","wereadId":"27325783"},{"title":"狂骨之梦","author":"[日] 京极夏彦","start":"2023-07-18","finish":"2023-07-28","rating":8.3,"pages":"599","doubanLink":"https://book.douban.com/subject/3316174/","cover":"https://neodb.social/m/book/2021/09/160b86a0bb-7da4-4b4e-b09a-dfcea10898be.jpg","review":"宗教、神话、精神分析、砍头、失忆、推理、齐活","summary":"继《姑获鸟之夏》、《魍魉之匣》后，京极堂系列第三部。\n连续杀死丈夫四次的女人朱美，一个有强迫症的精神科医生，一个不信神的牧师。梦境与现实纠缠在三个人之间，奇怪的事情一再发生。\n在海上漂流的黄金骷髅头，深山中发生的集体自杀事件。这些看似毫不相关的人各自被怪异的梦境所苦…接二连三发生的诡异事件却将他们一一串连起来……到底什么是梦境、什么又是真实？错综复杂的谜团，却在书末有最干净明快的答案。\n“狂骨”即为「发狂的骸骨」，论者认为，由于过去典籍并无「狂骨」此类怪物，因此应为热爱创造妖怪的鸟山石燕所创造，他在《今昔画图百鬼拾遗》中这么形容：骷髅头下挂着单薄的骨架，尽管披挂的长白发看似女性，身体轮廓却隐约不可辨识，总在井中的汲水桶中以双手垂放、身下无脚的幽灵姿态现身。\n后来在江户时期变成固定的怪物，相传为被弃尸在井中的冤死者，化为妖怪后总在井边出现，遇到人便会叫他「喝水吧」，路人若依言喝水，便可无事离去；若不听，则狂骨会舞动全身骨骸以示人，据闻听到其骨节撞击声者便会发狂投井身亡。","month":7,"country":"日本","wereadId":"25912953"},{"title":"死屋手记","author":"[俄] 费奥多尔·陀思妥耶夫斯基","start":"2023-07-09","finish":"2023-08-02","rating":8.4,"pages":"395","doubanLink":"https://book.douban.com/subject/25887915/","cover":"https://neodb.social/m/book/2021/09/15e6dd7b32-88bd-46cb-b4bd-cf69a8ffb72d.jpg","review":"每年读一本陀思妥耶夫斯基，感受他笔下「人内心的全部深度」。死屋让我看到这世界曾在某个角落存在过的陌生生活。一方面它不禁让我设想如果身在其中我会是怎样的一个人，另一方面它又让我不禁将出现过的人物与现实生活进行比对。这一笔笔对囚徒的刻画仿佛也落在我的心上，当日复一日的单调生活另我愈发远离人群时，读陀氏的书又让我重新感受到具体的人。","summary":"《死屋手记》系19世纪俄国大文豪陀思妥耶夫斯基在俄国农奴制改革时期发表的一部最重要、最有影响的作品，作者以自己的亲身经历为基础，以冷静、客观的笔调记述了他在苦役期间的见闻。全书由回忆、随笔、特写、故事等独立成篇的章节组成，淋漓尽致地展示了各类苦役犯的可怕处境和精神状态，勾画出各种人物的独特个性。","month":8,"country":"俄罗斯","wereadId":"31808211"},{"title":"浪漫主义的根源","author":"[英]以赛亚·伯林 著, [英]亨利·哈代 编","start":"2023-07-31","finish":"2023-08-11","rating":8.6,"pages":"280","doubanLink":"https://book.douban.com/subject/34449286/","cover":"https://neodb.social/m/book/2021/10/239f1b33e9-c259-4d7e-ad36-a8df33ba4d2f.jpg","review":"在看本书之前，我以为自己是一个理性主义者，尽管我对理性主义的定义可能没那么清晰。但经过伯林对浪漫主义酣畅的演讲稿熏陶后，不得不说，我觉得浪漫主义虽然没有一个统一的定义，但有相当多的思考值得品味。\n伯林的这两本自由主义与浪漫主义，都值得多看几次。","summary":"浪漫主义之后，世界不再一样，\n伯林之后，浪漫主义不再一样。\n本书根据1965年伯林所做的“浪漫主义”梅隆讲座录音整理而成。自浪漫主义的定义始，历陈其滥觞、生长和壮大，抉发其巨大而持久的影响力，伯林借前人所未发的观念史视角，展现出浪漫主义革命作为认知方式和思想意识的无比力 量。伯林的演讲结构了然，思维缜密，典故如排山倒海，排比如山洪倾泻，是豪宕的思想音乐，是天神眷顾的天才时刻。\n“伯林在这部作品中淋漓尽致地展现了他的学术天分：思维敏捷、博学机智、深刻且令人振奋。阅读本书，犹如目睹鲜活的思想从天才头脑的熔炉中锻造而出。”\n——约翰·班维尔\n“无论是对首相、总统来说，还是对文化批评家而言，本书都是一部开卷有益的作品。伯林的写作为我们展现出，当我们面对人类需求和渴望的多样性，以及不同理想之间互不兼容的态势时，我们需要具备怎样的宽容和理解力。”\n——彼得·马德福德，《泰晤士报文学增刊》\n“你能听到语言的洪流不断膨胀，互相撞击，一次次地汹涌澎湃……发人深省，激荡人心，充满自然的原始张力。这也正是浪漫主义的核心所在。”\n——《关键报道者》","month":8,"country":"英国","wereadId":"856157"},{"title":"Animal Farm 动物农场","author":"[英]George Orwell","start":"2023-08-07","finish":"2023-08-21","rating":8.5,"pages":"120","doubanLink":"https://book.douban.com/subject/4045275/","cover":"https://neodb.social/m/book/2021/12/2259a2c33e-dea1-41d8-9ff2-b93a025b80a7.jpg","review":"多年前看过中文版，今次读了英文原版，虽然较之中文版读得并没有那么流畅，但讽刺的是与彼时不同，如今更有代入感。","summary":"","month":8,"country":"英国"},{"title":"气球人","author":"陈浩基","start":"2023-08-22","finish":"2023-08-29","rating":7.8,"pages":"342","doubanLink":"https://book.douban.com/subject/35451204/","cover":"https://neodb.social/m/book/2021/09/17987a5882-4e93-4601-a9ff-1a4ccf4e4632.jpg","review":"读的第三本作者的推理小说，个人感觉和前两本比还是差一些。","summary":"本书是华文推理鬼才陈浩基耗时9年完成的超越自我的科幻推理短篇连作。主人公“气球人”无意中发现自己身怀异能，只要是有生命的东西，一接触目标的皮肤，他就可以输入指令，让目标在指定时间内像气球一样充气、膨胀、扭曲，最后“意外”死亡。从此，“气球人”成为了一名职业杀手，专门为要求各异的顾客提供收费不菲的杀人服务。这些顾客中有为夺取遗产继承权的，有为杀掉丈夫第一任妻子的女儿的，有为了打击敌对企业的，还有为确保在选举中获胜的……尽管身怀异能，“气球人”也免不了麻烦缠身，黑白两道站在各自的立场都想除掉这个异类，但在被追杀的同时他却帮助警察解开了警局疑云。在“气球人”金盆洗手前最后一单委托，他却发现目标是跟他一样身怀异能的同类……这能力到底是礼物还是诅咒？世界上还有多少异能人？这世间，有善便有恶，善不是真善，恶也不是纯恶，亦正亦邪的“气球人”如何在荒诞不经的现实中游走，最终他能否如愿退休，隐姓埋名，安度晚年？","month":8,"country":"中国","wereadId":"40405114"},{"title":"万历十五年","author":"[美] 黄仁宇","start":"2023-08-15","finish":"2023-09-05","rating":8.7,"pages":"320","doubanLink":"https://book.douban.com/subject/1041482/","cover":"https://neodb.social/m/book/2021/09/1535080f33-7dd8-465f-b924-ace42d2978e0.jpg","review":"万历十五年\n一本非常好读的历史书，没有很高阅读门槛，读来津津有味。作者的大历史观下，既能看到历史的框架，又能看到历史的细节。作者通过历史通过人物写出了明朝的司法、财政、儒教、文官问题。在书中我看到了身处历史洪流中的人的无奈，即使是万人之上，也有万人之上的困难。无论在万历、张居正、申时行、海瑞、戚继光还是李贽我都看到了时代压在他们身上所造成的孤独。颇为令人感慨，历史中的人物无法预知同个时空下发生的其他事件，更无法欲知自己的未来，他们身处在历史事件中，任由时空局限于他们身上的力量做着无谓的挣扎。我们这些生于将来而读历史的人，不免为其感到悲凉的同时，却又无处可觅加诸在我们自己身上的现实。\n\n下面是读书时做的一点摘要：\n1. 皇帝虽万人之上一言九鼎，但他仍然是制度的产物，但他的权威产生于百官的俯伏跪拜之中。他的全部言行要符合道德规范，他不能有太多个性，他拥有的更多的是被动的权力，在国家命运的决定上，他不是唯一的变量，还有一个是文官集团。\n2. 本朝制度的维护靠礼仪的宣讲，而施政的要诀，则以伦理道德为一切事业的根基。无论是礼仪还是伦理道德都要靠文官集团的执行。\n3. 科举制度、诰命制度等让文官形成集团与派别，文官又以私欲程度不同大致分为三类：以灰色收入补官俸不足者；无所不贪者；清如雪者。\n4. 本朝的司法制度缺乏判决争端的根据。即使是技术上的问题送交御前请求决定，也要翻译成为道德问题，以至善或极恶的名义作出断语。在道德的掩盖下夺利争权，就是把原则颠倒。这种做法会导致文官集团的涣散，帝国无法治理。\n5. 军事机构间接受文官控制，原因在于皇帝的抽象性领导在战争与否时起决定性作用，而皇帝本身又深陷在文官集团中，且依据传统，太子受傅与翰林学士，自太子登基、翰林学士擢升，这层师生关系的影响具有连续性。\n6. 熟读诗书的文官治国，无法改进司法制度，保障不了人权，个人道德和组织制度相矛盾。\n7. 本朝的法律更多是一种行政工具而非统治者的保障，仲裁的权利被“四书”等文化经典稀释成一种道德上的决断，日常生活的纠纷处置更多侧重在乡村中土绅耆老，组织系统难以集中处理文官集团两万人的意见，却须假借谐音讽喻等方法，造成了法律与道德的进一步脱节。\n8. 孔孟之道形成的一元化组织的思想基础，使得本朝重文轻武，造成世所罕见的军事窳败，帝国本质上更像是无数农村合并成的集合体，礼仪代替了法律，而机构间又缺乏可资遵守的成文条例。\n9. 古人有对宗族的照顾义务，不是暂时性的责任，也不仅是道德上的义务，而有其深刻的社会经济和历史的背景，一人得道鸡犬升天概括下得道者的现实处境。\n10. 儒家之仁，扮演着类似本朝宪法的理论智能，然则《论语》一书中，仁字凡六十六见，但从来没有两处的解释相同。一般来说，仁与慈爱、温和、侧隐、以天下为己任等等观念相通。仁是最容易获得的品质，任何人有志于仁，就可以得到仁。但是仁也是最难保持的品质，即在圣贤，例如孔子自己，也难能始终不断地不违反仁。","summary":"万历十五年，亦即公元1587年，在西欧历史上为西班牙舰队全部出动征英的前一年；而在中国，这平平淡淡的一年中，发生了若干为历史学家所易于忽视的事件。这些事件，表面看来虽似末端小节，但实质上却是以前发生大事的症结，也是将在以后掀起波澜的机缘。在历史学家黄仁宇的眼中，其间的关系因果，恰为历史的重点，而我们的大历史之旅，也自此开始……\n《万历十五年》是黄仁宇的成名之作，也是他的代表作之一。这本书融会了他数十年人生经历与治学体会，首次以“大历史观”分析明代社会之症结，观察现代中国之来路，给人启发良多。英文原本推出后，被美国多所大学采用为教科书，并两次获得美国书卷奖历史类好书的提名。","month":9,"country":"美国","wereadId":"CB_EpFBMXBMs7FT6iR6gWEBX7vO"},{"title":"沉默","author":"[日]远藤周作","start":"2023-08-30","finish":"2023-09-07","rating":8.1,"pages":"234","doubanLink":"https://book.douban.com/subject/21712307/","cover":"https://neodb.social/m/book/2021/09/166fb8f1a9-3dff-4126-9ac4-5da9b50ea6b5.jpg","review":"虽非信徒，值得一读","summary":"《沉默》是日本文学大师远藤周作的经典杰作，被誉为“20世纪日本文学的高峰”。此版《沉默》为精装典藏版。\n远藤周作是20世纪最优秀的作家之一，20世纪天主教文学中最重要的作家，《沉默》堪称战后日本文学代表作。（格雷厄姆·格林）\n《沉默》这部非同凡响的杰作，忧郁、冷峻、深沉、雅致，引起心灵深处的共鸣。（约翰·厄普代克）\n著名导演马丁•斯科塞斯筹划23年，投入350万美金，至今仍没找到完美呈现《沉默》的方式！\n-----------------------------------------------------------------------------------------------------------------\n《沉默》内容简介：德川幕府时代，禁教令下长崎海边的村庄，葡萄牙耶稣会教士洛特里哥偷渡日本，暗查恩师因遭受“穴吊”而宣誓弃教一事，因为这事在当时欧洲人的眼中，不只是个人的挫折，同时也是整个欧洲信仰、思想的耻辱和失败。\n在传教与寻访的艰难过程中，信仰与反叛、圣洁与背德、强权与卑微、受难与恐惧、坚贞与隐忍、挣扎与超脱……所有的两难情境都逼迫着他对基督的信仰进行更深层且更现实的思索，最终，他仿佛也走过一趟恩师的心路历程，获得对信仰的诠释与实践，向无边苍穹敞开了心扉……","month":9,"country":"日本","wereadId":"3300076365"},{"title":"为什么学生不喜欢上学?（第2版）","author":"[美] Daniel T. Willingham","start":"2023-08-16","finish":"2023-09-27","rating":8.5,"pages":"296","doubanLink":"https://book.douban.com/subject/36211119/","cover":"https://neodb.social/m/item/doubanbook/2023/06/02/c34ad689-23c4-4eaa-833a-e7a1f44a3e25.jpg","review":"在多个关注的作者写作中看到对这本书的推荐，这次得幸在图书馆借到。虽然是今年四月才上架的新版，其被翻阅的痕迹、笔记都异常明显，可见本书的受众之大。本书是关于认知心理学和教育心理学的入门读物，尽管作者的书写以教师在课堂上的注意点为线索，但我认为学生乃至家长都值得一读。以下仅是对书本内容的一个整理缩写，只适合读过书本后的复习。其中去掉了众多有意思的案例和有用的研究。如书本所言，直接观看抽象知识是无法领会要点的，必须结合背景知识，构建知识体系，才能把握深层结构，做到知识的进一步迁移。\n1. 人们天生好奇，但我们并非天生善于思考；除非认知条件刚好合适，否则我们会避免思考。（未经训练，人们倾向于使用系统1来思考，因为它是经验直觉、省力，更易保持人类的延续）学生不喜欢上学也是如此，他们觉得上学无聊，这种无聊有两个含意，一是所学的知识太容易，带来不了成就感，二是所学的知识太难，而无法解答。所以教师应该重新考虑如何鼓励学生去思考，以便最大限度地让学生从成功的思考中获得愉悦感。对于要解决的问题，思考者需要从环境、工作记忆空间以及长期记忆中所需的事实和过程中获得足够的信息。\n2. 知识积累的重要性。过分强调批判性思维的建立而忽略事实性（背景）知识的积累是错误的。应该先构造知识体系，后掌握批判性思维。作者列出了背景知识对于阅读理解起重要作用的四种方式：(1)它提供词汇；(2)它允许你弥合作者留下的逻辑鸿沟；(3)它允许分块，这增加了工作记忆的空间，从而更容易将想法联系在一起；(4)它指导歧义句的解释。（书中有很多精彩的例子，卡片游戏、象棋例子、文章理解）知识的积累还有复利效应（越多积累越快越容易）。\n3. 那么如何记忆更多的知识？记忆是思考的残留物。要认真考虑布置的每一项作业会让学生实际思考什么（而不是你希望他们思考的），因为那才是他们会记住的。事物要进入长期记忆必先经过工作记忆，四种遗忘方式：a.事物没有进入工作记忆中b.事物没有进入长期记忆中c.从长期记忆中提取到工作记忆的过程出错d.事物已经从长期记忆中遗失。对于要学习的内容（即最终进入长期记忆），它必须在工作记忆中停留一段时间，也就是说，学生必须注意它。此外，学生对学习经历的思考方式将彻底决定了最终会进入长期记忆的内容是什么（不是仅靠情绪事件、重复、记忆动机）。教师的目标应该始终是让学生思考意义。要调动学生注意力，优秀教师具备这两种品质：a.学生建立个人联系b.以有趣且易于理解的方式组织课堂材料。重视故事的力量（4C原则），学会助记法。\n4. 如何理解抽象概念？理解是伪装的记忆，没有人能直接向学生灌输新思想，每一个新观点，都必须建立在学生已知的观点之上。但学生获取的可能只是浅表知识，它不能建立知识之间的联系，只是对例子的死板记忆。知识迁移的难点在于大脑的思考方式更难看到深层结构，我们的认知系统总是在努力理解我们正在阅读和听到的东西，寻找相关的背景知识，但似乎适用的背景知识几乎总是与表层结构有关。\n5. 反复练习值得吗？如果没有长期的练习，几乎不可能精通任何脑力工作。练习的三个好处：强化基本技能、防止遗忘、改善知识迁移。工作记忆空间有限是人类认知的一个基本瓶颈。虽然你无法增加工作记忆容量，但你可以使工作记忆的内容变小。第一种方法是借助事实性知识，这使得分块记忆成为可能。第二种方法是你可以让处理工作记忆中信息的过程变得更有效率。以上方法需要做的就是重复练习。两个防止遗忘的方法：超量学习(overlearning)、间隔效应(spacing effect)。除此之外，发挥练习最大化优势的几个点：练习高频词出现的事情或领域内的关键技能、进行分散练习、将练习融入更高级的技能中、确保练习的多样性。\n6. 让学生像专家一样思考？训练早起的认知与训练晚期的认知有本质的不同。克服工作记忆局限性的方法：背景知识和练习。专家们关于他们的领域有很多背景知识。但成为一名专家需要的不仅仅是知识，接受培训的专家通常与专家知道的一样多（或几乎一样多）但与新手相比，专家能够更关注深层结构和抽象思考，并将他们的知识迁移到类似的领域。专家通过反复练习使其思考和操作成为一种自动化过程从而腾出更多工作记忆空间进行深层次的自我对话。\n7. 如何因材施教？没有绝对不同的学习者类型。孩子在思考和学习方面的相似之处多于不同之处。作者通过认知风格和学习能力展开论述。风格只代表了我们在思考上的个人偏好，而不应该是衡量我们思考能力的标准。大多数时候，学生学习的目的是记住事物的意义，而非声音或外观，因此视觉/听觉/动觉理论是错误的。产生这种错误的原因有社会认同、理所当然、确认偏差等。试图利用差异来改进教学从基于认知风格的差异，a.将教学方法与孩子喜欢的认知风格相匹配，还没有人描述过一套有充分证据支持的风格体系。b.是基于学生能力的差异，希望能取长补短，弥补认知能力的不足，但有充分的证据揭示这种能力的替代是不可能的。但作者仍然相信，在因材施教上实践知识胜过科学知识。各种风格教学也许可以不用来匹配学生的认知风格，却能调节课堂气氛，提高学生们的整体注意力。\n8. 如何帮助慢热型的学生？孩子们的智能确实不同，但智能可以通过持续的努力来改变。基因与环境对智能都有影响，但如何确定出它们影响的程度并不容易，而且基因的因素也会让人寻找或选择不同的环境。多年来，研究人员认为，你的智能大约有一半来自基因，一半来自环境。最近的研究表明，环境因素的影响程度比人们之前预估的更为重要。因此相信智能是可塑的，是可以被提高，这一成长型思维很重要。成长型思维的干预集中在三种想法上：(1)努力尝试或寻求帮助并不意味着你很笨。(2)失败并不是因为能力低下，而是因为缺乏经验。(3)没有必要担心因为失败和暴露你不知道的东西而使你“看起来很笨”。具体教学建议：布置挑战性任务、告诉他们失败是成功之母、将失败视作学习中的自然部分、培养学习技能（任务计划、科目安排）\n9. 新技术能否改善学生的学习？技术改变了一切，但没有改变你的思维方式。你不能真正地在不同任务之间分散注意力，你只是在各项任务之间转换注意力，而切换任务需要付出额外的心理步骤（重设目标、记住规则）。技术变化对认知的细微改变是很难预测的，必须谨慎选择。沉浸在技术中会对学生的生活产生显著影响的更普遍的想法似乎没有成真，无论是好的方面（孩子们经常使用互联网进行自我教育）还是坏的方面（焦虑和抑郁症的发病率增加）相比成年人，儿童对奖励失去价值的速度更快。本章内容例子居多，作者举了笔记本、手机等新技术在学习上的应用以及他们带来的影响。很多时候我们认为一项新技术的引入可以解决某个既有的需求问题，但却无法预料它会带来新的其他问题。\n10. 教师的大脑如何运作？其实类似于学生，要想提高教学水平，也要扩展工作记忆空间、相关事实性知识、相关过程性知识。以上也需要长期的练习。但如果不是「刻意练习」，水平并不能精进。作者提供了一种基于反馈的练习方法。","summary":"本书以“人类是如何思考和学习的”为线索，按章节依次阐述了大脑关于学习的10项基本运作原理，回答了诸如为何我们无须费力就能记住热播剧剧情却记不住知识等普遍学习困惑，揭示了故事、情感、记忆、背景知识、练习在构建知识和创造持久学习经验中的重要性，据此给出教育工作者提高学生的学习能力及精进教学技艺的方法建议。\n作者的多个观点会颠覆你的固有认知，你将会重新认识并思考以下主题：“事实性知识优先于技能知识”、“反复练习是精通任何脑力工作的开始”、“因材施教是否有科学性证据支持”、“对于学生不同的学习方式，我是否应该调整我的教学”、“学生真能像科学家、数学家、史学家那样思考吗”、“技术革新的速度再快，也没有改变人类的思考方式”等。","month":9,"country":"美国"},{"title":"语言迷宫","author":"[美]约翰·H.麦克沃特","start":"2023-09-17","finish":"2023-09-27","rating":8.3,"pages":"200","doubanLink":"https://book.douban.com/subject/36234508/","cover":"https://neodb.social/m/item/doubanbook/2023/05/23/dcda8655-ff63-4b20-bc85-eec3eba9a3c8.jpg","review":"本书驳斥了沃尔夫主义——语言的结构，就其对词的作用以及它如何将词组合在一起而言，会共同促成对思想的塑造，达到我们可以称为\"世界观\"的程度。在读本书之前，我认为自己或多或少也是一个沃尔夫主义者，深为认同奥威尔《1984》以及莱考夫《我们赖以生存的隐喻》中的观点，觉得如维特根斯坦所言语言即生活形式。但作者通过大量例证向我们表明语言不像油画，它们并不因人们用其才智或创造力而发展。语言是在意识水平以下逐步漂移而发展起来的。即大多数语言的运作不是出于需要，而是偶然。我不能说完全信服作者的论证，但的确给我提供了一个很好反思机会。另，就一本讲语言的书而言，本书的翻译却不太好。","summary":"一本诙谐、睿智、让人大开眼界的语言学通俗读本。\n趣味讲述世界各地千奇百怪的语言！\n《语言本能》作者史蒂芬·平克、《自然》、《美国心理学杂志》、《纽约客》 推荐！\n------------------------------------------------\n★内 容介绍\n日语中有一个词同时表示绿色和蓝色；俄语中对深蓝色和浅蓝色用不同的基础词来表示。这是否意味着俄罗斯人对这些颜色的感知比日本人更敏锐？语言是否控制和限制了我们的思维方式？萨丕尔-沃尔夫假说认为我们所说的语言塑造了我们感知世界的方式。语言学家约翰·麦克沃特认为，虽然这一观点令人着迷，但显然是错误的。事实上，即便某种语言只用一个词来同时表示吃、喝和抽烟，但这并不意味着该语言使用者分不清食物和饮料，而那些用同一个词来表示蓝色和绿色的人，对这两种不同颜色的感知和说其他语言的人一样生动。\n我们渴望通过承认那些与我们思维方式不同的族群的智慧，来庆祝人类族群的多样性。尽管我们的初衷是好的，但我们的想法存在着对其他族群语言与思维方式的误解，本书为我们提供了另一种更好的理解语言的方式，来看待所有不同种族人类的智慧。\n------------------------------------------------\n★编辑推荐\n◎约翰·麦克沃特是《语言本能》作者史蒂芬·平克极为推崇的语言学家，他曾在TED发表题为《短信是语言杀手吗?开玩笑吧！》的经典演讲。\n◎颠覆了萨丕尔-沃尔夫假说的语言决定论，并运用全球大量语言族群的事例来证明并非“语言塑造思想”，思想远比语言更丰富。\n◎作者以诙谐、调侃的语调讲述了俄语、日语、汉语、英语、法语及很多你没有听过的小语种的语法趣事及各族群令人啼笑皆非的语言文化，如有的语言只用一个词来同时表示吃、喝和抽烟。本书适合任何对语言和思想感兴趣的读者阅读。\n------------------------------------------------\n★名人推荐\n一些流行的观点比错误更糟糕——它们在小事上有一点道理，却助长了对大事的误解。约翰·麦克沃特是我们最敏锐的语言学解释者之一，他表明语言塑造思想的例子也是如此。尽管其表面复杂的假设掩盖了深刻的真理：思想远比语言丰富；语言是反复无常的模因的产物，而不是文化迷恋的反映；人与人之间的认知相似性比差异更深刻。\n——史蒂芬·平克，哈佛大学心理学教授，畅销书《语言本能》《思想本质》的作者\n------------------------------------------------\n★媒体评论\n直面语言决定论——萨皮尔·沃尔夫假说，认为世界观是人性的，而不是局限于一种文化。\n——《自然》杂志\n我们赞扬作者的宣言在广泛的文学覆盖面、历史发展和对社会科学的影响方面的深度。我们向任何对语言和思想感兴趣并且喜欢阅读的人推荐它。\n——《美国心理学杂志》\n一本简洁、犀利、精彩的小书……麦克沃特提出了所有正确的论点，而且他把它们说得很清楚。\n——《纽约客》杂志","month":9,"country":"美国","wereadId":"3004119392"},{"title":"Nasty, Brutish, and Short: Adventures in Philosophy with My Kids","author":"Scott Hershovitz","start":"2023-09-28","finish":"2023-10-23","rating":8.5,"pages":"384","doubanLink":"https://book.douban.com/subject/35593837/","cover":"https://neodb.social/m/item/doubanbook/2023/07/08/42042d12-eae7-4d0f-9f2f-8743265c6c32.jpg","review":"As an avid philosophy enthusiast and a proud father of two, reading this book has been an absolute delight. The chapter on morality and the world has provided me with valuable insights, further enriching my understanding of philosophical concepts that I was already familiar with. What truly struck me, though, was the profound impact of the writer's dialogues with his sons, which prompted me to reflect upon my own relationship with my children.\n\nChildren, in their purest form, possess an innate sense of philosophy. They effortlessly grasp the essence of things and pose thought-provoking questions that often elude busy adults. It's remarkable how their unfiltered perspective can lead to such profound insights. This book has reminded me of the importance of engaging with my kids on a philosophical level, encouraging them to explore and question the world around them.\n\nThe book has been an invaluable source of learning for me, and I am genuinely inspired to actively incorporate philosophy into my interactions with my children. By doing so, I hope to foster their natural curiosity and encourage them to think critically about life's fundamental aspects.\n\n* I'm a reader from China, and the English review above is a modified translation I had ChatGPT help with. It conveys my genuine thoughts and opinions.","summary":"From a University of Michigan professor of law and philosophy, a delightfully funny and thought-provoking investigation into life’s biggest questions with the help of fantastic philosophers old and new—including his two young children\n \n\nLike any new parent, Scott Hershovitz closely observed his two young sons, Rex and Hank. From the time they could talk, he noticed that they raised philosophical questions and were determined to answer them. Children find the world a puzzling place, so they try to puzzle it out. Often, that leads to profound insight. Sometimes, his kids recreated ancient arguments. Sometimes, they advanced novel views. Kids are natural philosophers, Hershovitz realized. Indeed, they are some of the best around.\n \nWith great humor and storytelling, Hershovitz follows an agenda set by Rex and Hank. To start, they try to make sense of morality, asking questions about rights, revenge, and authority. Then they try to make sense of themselves, inquiring into sex, gender, and race. Finally, they try to make sense of the world, exploring the nature of truth, the existence of God, and other daunting mysteries that most grown-ups have learned to look past. Through the lens of his sons’ curiosity, Hershovitz takes us on an engaging tour through contemporary and classic philosophy. It’s a fun romp through the field—the class you wish you took in college.\n \nWe want our children to think deeply about themselves, the world around them, and their place within it. Hershovitz calls on us to support kids in their philosophical adventures. But more than that, he challenges us to join them so that we can become better, more discerning thinkers and recapture some of the wonder kids have at the world.","month":10,"country":"美国","wereadId":"CB_6bE1jo1jSGbO6gA6gW49p6l4"},{"title":"挽救计划","author":"[美] 安迪·威尔","start":"2023-10-06","finish":"2023-10-25","rating":8.3,"pages":"493","doubanLink":"https://book.douban.com/subject/35494160/","cover":"https://neodb.social/m/item/goodreads/2026/04/18/72dc1462-36b5-48f4-8007-1f898ec6885b.jpg","review":"他们手拉手，一起走过了黑暗森林","summary":"科技宅男+跨星系好（基）友联袂上演太空大救援\n硬核工程风+幽默碎碎念打造年度科幻\n奥巴马、乔治•R. R. 马丁力荐\n高司令主演同名电影即将上映\n👾出版后连续16周雄踞亚马逊科幻畅销榜\n《挽救计划》英文版于2021年5月4日正式出版，迅疾登陆《纽约时报》《华尔街日报》《洛杉矶时报》等各大畅销书排行榜，至今仍盘踞高位。\n👾万人五星好评，读者直呼比《火星救援》更燃、更爆；\n译者坦言阅读体验像是在大脑里进行了“一场烟花表演”\n👾入选奥巴马2021夏日书单；\n《冰与火之歌》作者乔治•R. R. 马丁力荐\n两个世界处于危险之中，一个有能力但有缺陷的人类，一个有能力的外星人，无休止的科学谜题有待解开，人类自身处于危险之中，这本书拥有老科幻迷所喜爱的一切。如果你喜欢满是科学的科幻小说，安迪•威尔就是最适合你的作家。\n——乔治•R. R. 马丁，《冰与火之歌》作者\n👾小说正式出版前，电影版权已高价售出；\n同名电影正在拍摄中，瑞恩•高斯林担纲男主\n【内容简介】\n一趟孤注一掷的太空远征\n一座没有尽头的科学迷宫\n一次争分夺秒的冒险营救\n一段跨越星际的真挚友谊\n浩瀚宇宙中，瑞恩•格雷斯是整个人类文明仅存的希望。但在醒来的那一刻，他连自己的名字都不记得。他在未知的恐惧中寻找身份，从记忆的碎片中获取线索。这个肩负拯救地球重任的关键人物，现已命悬一线！人类文明究竟能否存续？在这场“挽救计划”里，一切都充满了挑战……\n【媒体与读者评论】\n读者可能会坐上一个通宵，双眼充血地看完这部情感强烈、主题深刻的小说。这是一个有关生存的故事，一部关乎友谊力量的科幻杰作！\n——《科克斯书评》\n年度最佳预定！让人手不释卷的科幻小说。\n——豆瓣读者\n细节硬核、剧情紧凑、节奏完美，而且《火星救援》曾经带来的趣味与感动全都回来了。\n——豆瓣读者","month":10,"country":"美国","wereadId":"41100356"},{"title":"梵高手稿（典藏修订版）","author":"[荷] 文森特·梵高 著, [美] H. 安娜•苏","start":"2023-10-26","finish":"2023-11-06","rating":8.3,"pages":"400","doubanLink":"https://book.douban.com/subject/30137430/","cover":"https://neodb.social/m/book/2021/10/162923e153-7da3-434a-b922-3a22f13b3c6c.jpg","review":"「实际上，我只不过就是一个爱自然、爱学习、爱工作，特别是爱人类的人啊。」","summary":"【全新修订、装帧升级、纪念珍藏】\n梵高一生中写过很多信，大多数都是寄给弟弟提奥的，也有不少是写给家人和其他艺术家的。梵高一生中也画了很多画，而基本上每一幅都被他在信中用如诗般优美的语言细细描述过。\n在这本全新翻译的梵高书信集中，纽约大都会艺术博物馆的安娜·苏，从近千封书信中精心挑选了150多封，撷取了梵高在其中描写这些作品创作、构思过程的片段，以及他对艺术、艺术家、文学、宗教、景观等众多话题的独特见解，配以信中提到的画作以及书信原稿作为参照，向所有热爱梵高的人展示出了一个不一样的梵高。\n在这本书里，梵高没有被生活琐事所侵扰，没有精神的痛苦与压力。在这里，梵高只属于绘画，属于艺术，属于那片金黄的麦田与飞过群鸦的天空。","month":11,"country":"美国","wereadId":"29629921"},{"title":"符号学","author":"赵毅衡","start":"2023-10-25","finish":"2023-11-17","rating":8.4,"pages":"424","doubanLink":"https://book.douban.com/subject/26657202/","cover":"https://neodb.social/m/book/2021/09/15ee5b1cc8-1355-4e3f-82fb-b25a3eb82a7a.jpg","review":"作为一个门外汉首次首次阅读符号学相关书籍。本书的理论部分相当驳杂，门外汉只能走马观花，但好在是中国作者的书，能有不少「中国特色」的案例在阅读疲惫之余用于「消遣」。全书也有不少值得反复阅读的段落，划线丢进 Anki ，来日重逢。","summary":"本书分为上下两编，原理编扩展了一百年来符号学发展的理论基础，融合中西方符号学理论，建立一个可用于分析人类意义活动的符号学体系；推演编具体讨论了符号在人类文化中扮演的复杂作用，让读者理论与应用兼得。该著作是应有符号学理论分析文化的典范。符号学作为文���公分母，必须应用于更为广大的文化及多媒介文本。这本著作强调创新，也强调符号学理论的分析应用，将独创的符号学理论系统地应用到文化研究。","month":11,"country":"中国","wereadId":"32511375"},{"title":"德米安","author":"[德]赫尔曼·黑塞","start":"2023-11-07","finish":"2023-11-19","rating":8.2,"pages":"272","doubanLink":"https://book.douban.com/subject/30592698/","cover":"https://neodb.social/m/book/2022/01/152e38173b-e49e-4941-8051-300f1a5ea3d0.jpg","review":"去感受，不要去理解","summary":"◆诺贝尔文学奖得主赫尔曼·黑塞代表作。\n◆德文直译，无删减完整版！\n◆出版时引发巨大反响，媲美《少年维特之烦恼》。你我之辈着实是孤独的，但我们还有彼此。\n◆在黑塞的作品中找回自己。一旦我们接触了事物的另一面，我们就注定会走上一条不再平凡的道路。\n◆每个人都从谷底奋力尝试追寻着各自的目标。我们可能做到相互理解，但真正了解自身的只有我们自己。\n埃米尔·辛克莱从小生活在温暖而美好的光明世界，一个谎言让他陷入黑暗的世界。深感绝望与无助的辛克莱渴望解脱，却无法向任何人开口。德米安的出现，帮助他克服了内心的恐惧。之后辛克莱每每感到不安、遭遇困惑之时，德米安总会及时出现，帮他走出困境。德米安不仅是辛克莱的朋友，也是他的引路人，带领他克服恐惧，找到真正的自己。辛克莱从此不再彷徨，越来越坚定地朝着自己的内心前行……","month":11,"country":"德国","wereadId":"25803779"},{"title":"刺青杀人事件","author":"[日] 高木彬光","start":"2023-11-14","finish":"2023-11-23","rating":8.2,"pages":"313","doubanLink":"https://book.douban.com/subject/10518843/","cover":"https://neodb.social/m/book/2021/09/167e01ef84-c983-4a59-a71e-da0ae462aa83.jpg","review":"没有太大的惊喜和意外","summary":"金针刺玉体，雕刻在身体的痛苦挣扎之中的刺青艺术，其短暂的艺术生命与爱恨纠葛的情感因素，使其一直以来都不乏追求者与献身者。\n战后的东京百废待兴，身上雕刻着“大蛇丸”、“自雷也”及“纲手姬”华丽刺青图案的三兄妹，各自生活在战争的废墟间。然而一场完美的密室杀人事件，却将三个人的命运无情地与他们身上的刺青诅咒联系在一起。传说中争斗不休的禁忌图案，与现实的罪恶究竟有何等关联？\n面对复杂难解的命案，天才侦探神津恭介又将如何抽丝剥茧，揭示真相？","month":11,"country":"日本","wereadId":"CB_1UXAgLAhgFKz6kL6kf13xBry"},{"title":"东京八平米","author":"[日]吉井忍","start":"2023-11-21","finish":"2023-11-29","rating":8.4,"pages":"328","doubanLink":"https://book.douban.com/subject/36096287/","cover":"https://neodb.social/m/item/book/2024/12/16/f872ac40-7751-477f-b05a-aa9021690a83.webp","review":"读的作者的第二本书，上一本是介绍书店的《东京本屋》，两本书虽非同一主题，但却都让我看了新的生活形式。作者的文字依旧平静，如老友般娓娓道来，却每每在读完一段或一篇后令人反思。书中的提及的人物包括作者自己都没有在生活中遵循商业世界的效率逻辑，他们仿佛都戴着观察者的眼镜在观察生活、体味生活。他们看似躺平，却在真多生活。住进八平米，进入全世界。","summary":"身居八平米，坐拥全世界\n《东京八平米》是日籍华语作家吉井忍的全新散文集。八平米在日本被称为“四畳半”，即只有四个半榻榻米大小的房间，租金便宜。\n因为八平米房间没有厨房和冰箱，也没有洗澡间和洗衣机，她兴致勃勃地写起如何饮食起居，以及亲历的日本庶民生活日常。居住空间逼仄，她 把生活延伸到城市的街头和公共空间，写东京的洗衣店、钱汤、咖啡馆、24小时漫咖店、独立电影院、小餐厅等等，同时写下她遇见的东京平民的故事，这些人物是“看不见的、真正的东京人”，他们的故事为我们铺陈日本的世情百态，亦照见自身。\n孤独的城市里，人如何找到属于自己的地方和存在意义？吉井忍的“八平米”经济学让人看到一种充满新鲜活力的生活的可能：省下昂贵房租，物质诉求简单，在都市中享受丰富的精神文化生活。城市也可以是一个流动的家，一个人也可以快乐自足。\n*\n【特别推荐】\n*\n孤独的城市里，人如何找到属于自己的地方和存在意义？吉井忍的“八平米”经济学让人看到一种充满新鲜活力的生活的可能：省下昂贵房租，物质诉求简单，在都市中享受丰富的精神文化生活，用自己的方式找到舒适感和归属感。城市也可以是一个流动的家，一个人也可以快乐自足。\n东京曾经是“全球物价最贵城市”排名前列的常客，但这只不过是学到东京一些皮毛的外国记者们的偏见。东京其实是个适合居住的地方呢，我在心中长年抱有这样的不平，这也成为了我过去写了不少文章、做了好几本与东京相关的书的基本动力。\n东京、京都、上海、北京……不管是在什么城市，吉井很擅长找出价格合理的房子。有时候她的居所只够睡觉，但在房子的外面，无论什么时候都有便捷的城市设施。你心爱的餐厅可以当作自家的餐室，喫茶店成为你的客厅，书店和图书馆是书房，健身房则是带有三温暖的浴室。\n把城市当作自己的房间的延伸，并将其运用自如。吉井非常明白这个“城市生存技巧”的秘诀。这就像动物可以本能地找到最舒适的地方筑巢，也又像它们时机一到，干脆离巢飞走。\n——都筑响一（独立编辑、摄影师）\n*\n【编辑推荐】\n*\n★\t身居八平米，坐拥全世界。吉井忍“八平米”经济学，展现都市生活的另一种可能。日籍华语作家吉井忍的全新散文集，献给将要创建新生活的人。——离开日本二十年后，吉井忍回到东京，租住东京中心地带的八平米房间，重建在地的生活。八平米是生活的原点，东京整个城市则是生活的延长线。物质与精神的断舍离，带来经济空间和身心自由。吉井忍的“八平米”经济学，为每一个身心俱疲的现代人提供生活的另一种可能：珍惜此时此刻，用自己的方式，找到你所需要的舒适感和归属感，赋予明天继续生活的活力。\n★\t没有厨房、冰箱、洗澡间、洗衣机，如何在八平米房间自在过活？都市新型“蜗居”生活，东京深度探索指南。城市也可以是一个流动的家，一个人也可以快乐自足。——因为八平米房间空间局促，日常生活延伸到东京的街头和公共空间：洗衣店、钱汤、漫咖、小餐厅、咖啡馆，此外还有每周的独立电影院巡礼、听落语、学三味线、看展览等。便捷舒适的公共空间、生机勃勃的多元文化、热情活力的市井生活，你的“小”不成问题，因为外面的世界足够大。\n★\t每个人都有自己的“八平米”。深入城市细部拜访“附近”，讲述东京平民故事，看见真正的普通人。孤独的城市里，人如何找到属于自己的地方和存在意义？——人来人往的都市中，偶尔的相遇带来宝石一般的回忆：被称为“活字典”的金星堂咖啡馆主人大泽先生、快九十岁的犀利幽默的Mako咖啡老铺女主人、热情善良勤劳的荞麦面店女店主……朴实真诚的东京人，流动隽永的东京风景，呈现生活的本真面貌。“我相信，每个人都有自己的八平米，以及对其的定义，它不指实际面积，而是指心中的某一块地方。也许八平米在别人眼里是畸形状态，但它能够让你活在自己的世界里。它也许是某个地方或某个人，在那里你不用伪装，可以好好地面对自我，尽可能地去享受当下。”\n★\t著名书装设计师陆智昌操刀设计，清新典雅，质感舒适，巧妙呼应“四畳半”的布局。——著名摄影师都筑响一和作家吉井忍摄影，百余幅彩色图片呈现“八平米”和东京这座城市流动的风景。全书使用雅致书纸印刷，触感柔软，轻盈便携，适于在日常与旅途中阅读。","month":11,"country":"日本","wereadId":"3300063647"},{"title":"批评官员的尺度","author":"[美] 安东尼·刘易斯","start":"2023-11-23","finish":"2023-12-11","rating":8.5,"pages":"356","doubanLink":"https://book.douban.com/subject/6401128/","cover":"https://neodb.social/m/book/2021/09/15c8217bd3-93a4-4529-bf4e-4626d6a9ff1a.jpg","review":"本书中译本虽名为批判官员的尺度，但实际上探讨的是美国宪法第一修正案有关言论自由在美国司法历程上的发展。第一修正案虽于1791 年并入宪法，但一百多年来，完全处于休眠状态。第一次世界大战期间，压制言论自由现象严重。之后四十年间，最高法院才逐步适用言论、出版自由条款，保护某些异见或非主流言论。1964年想纽约时报诉沙利文案后，最高法院开始彻底践行第一修正案的承诺：在美国，「不得立法侵犯……言论自由或出版自由。」\n\n读本书之前，我对沙利文案也早有耳闻，其判断媒体诽谤成立的「确有恶意」的准则也是如雷贯耳，但读过此书才会对此案之前的诽谤案历史以及该案判决后媒体的境遇有更全面的了解。作者更是通过一个个法律故事，逸闻趣事将言论自由发展的历史脉络串联，用通俗易懂语言娓娓道来。\n\n虽然我并非法律专业爱好者，但因言论自由的兴趣也前后读过《表达自由的法律限度》、《言论的边界》、《美国宪政历程》等书，最令我印象深刻的是美国宪法的生命力，它之所以能恒久延续，源自法官们在适用与解释上的不断创新，以适应制宪先贤们未能预测到的社会变迁，使之真正成为一部「活着的宪法」（the living constitution）。期待麦迪逊式里理想也能照进这片土地。","summary":"1960年，因为一则批评性广告，警察局长沙利文以诽谤为由，将《纽约时报》告上法庭，并申请巨额赔偿。两审失利后，几乎被各地政府官员相继提起的索赔逼至绝境的《纽约时报》，奋起上诉至联邦最高法院。九位大法官在“《纽约时报》诉沙利文案”中力挽狂澜，宣布“对公共事务的讨论应当不受抑制、充满活力并广泛公开”，维护了媒体、公民批评官员的自由。《纽约时报》资深记者、两度普利策奖得主安东尼•刘易斯，以翔实史料、生动笔触，系统回顾了这起新闻自由史上的里程碑案件，并循此为线，串接起美国人民争取言论自由的司法抗争历史，完美展现了霍姆斯、布兰代斯、汉德、沃伦、布伦南、布莱克、韦克斯勒等伟大法官和律师的形象。","month":12,"country":"美国","wereadId":"CB_6rg1ns1nbFTT6kZ6kf5k7C4N"},{"title":"惊呆了！哲学这么好","author":"[日]田中正人/著, [日]斋藤哲也/编","start":"2023-11-30","finish":"2023-12-18","rating":8.3,"pages":"352","doubanLink":"https://book.douban.com/subject/27605891/","cover":"https://neodb.social/m/book/2021/10/01276b9a91-001b-445a-b9a4-ee53427fc1de.jpg","review":"惊呆了！哲学这么好\n翻开书看了几页，直呼这就是一本哲学字典呀，直到再看一眼封面，上面有一圈字写着 VISUAL DICTIONARY。\n它的优点是用生动的漫画解释哲学名人和核心概念，会让读者没有阅读压力，同时在名词旁都带上了页码，起到了「字典」的索引作用。\n它的缺点是漫画本身将严肃的哲学话题「祛魅」，会让读者产生幻懂的错觉。以点带面的论述，难免遗漏很多。","summary":"★一本超萌的西方哲学入门书，帮你用看漫画的方式秒懂哲学，让灵魂变得更出色！\n★500幅粉红小插图，说透72位哲学家、210个哲学概念、2600年西方哲学史\n★只要3分钟，就能认识一位哲学家、懂得一种哲学思想；随手翻到一页，就可以快速进入哲学世界\n★阅读本书，可以变得更有智慧、成为更好的人、过更好的生活！\n★日本上市后，迅速登顶人文思想类图书排行榜\n为什么要读哲学？因为人生中的一切疑惑，哲学都能给出解答。哲学跟每个人都息息相关，能帮助我们过好这一生。苏格拉底说：“未经审视的人生不值得一过。只有正确了解真、善、美，灵魂才能变得出色。”\n《惊呆了！哲学这么好》用生动可爱的插图，按照古希腊、中世纪、近代、现代的时间脉络，梳理了西方哲学的发展历程，并根据时代划分，介绍了每个时期具有代表性的哲学家及其思想。在哲学家介绍页面，了解每位哲学家的生平、名言、著作等；在哲学概念解说页面，轻松理解哲人的大智慧。看完这本书，你会发现，原来哲学这么有用、这么好玩，还能这么萌！\n★这是一部人类智慧的集大成之书：从万物的本原到解构主义，千百年来，那些聪明的人和了不起的思想都在这里；\n★这是一部纵贯2600年的西方哲学史： 从公元前600年的泰勒斯到21世纪的德里达，从头阅读，便可把握西方哲学的发展脉络；\n★这是一本与众不同的哲学读物：在人物介绍页，了解哲学家的生平、名言、著作；在概念解说页，通过超萌的图画，理解哲学家的思想；\n★这是一本方便实用好玩的知识手册：采用进口纯木浆书纸，轻便易携，通勤路上也可以看；专色印刷，色彩生动，心情也跟着明快起来；附400多条索引，不清楚的概念一查便知。\n★中文版由中国社会科学院哲学研究所学者特别审定","month":12,"country":"日本","wereadId":"3300108056"},{"title":"人性的证明","author":"(日)森村诚一","start":"2023-12-11","finish":"2023-12-21","rating":8.1,"pages":"231","doubanLink":"https://book.douban.com/subject/7153424/","cover":"https://neodb.social/m/book/2021/10/2421af1be0-38e8-4fb9-9b2b-39e2dcf650e5.jpg","review":"人性的证明\n评论大骂前言泄底的，虽此行为不该，但在我看来本书的推理性并不强，基本没有在推理上进行悬疑设置，阅读过程中很轻易能猜到凶手。作者文笔挺好，尤其在描写男女关系的那几段。但在线索收集的过程有太多匪夷所思的巧合和妙想以及对美国的刻板印象并反复不断的唾骂描写令人出戏。","summary":"森村诚一曾获江户川乱步奖、日本推理作家协会奖、吉川英治文学奖，是开创日本推理小说新纪元的标志性人物！\n“证明”三部曲是森村诚一本人和读者公认的“全部作品的顶峰”，是社会派推理小说的最高峰，堪称侦探史上不朽的经典！\n在日本累计发行量超过1亿册，创下了文坛奇迹，由此改编的电影被译成多国语言，在海内外享有盛誉。\n森村诚一的小说格局宏大，技巧纯熟。众多的出场人物，繁多的故事线索，在他的笔下左右逢源，张弛有度。如果说一开始，读者会对层层的悬念而感到费解的话，那么读到后面，便不免会时时发出“居然是他”的惊叹，从而使开篇的毫不相关的谜团聚合在一起，如同无数条小小的河流，最终融入同一条大江之中。\n小说《人性的证明》被拍成电影《人证》之后，迅速风靡全世界，主题曲《草帽歌》被广为传唱。《人性的证明》所叙述的那一段段哀婉动人的故事，让人感伤不已……\n红极一时的家庭问题专家八杉恭子为了掩盖自己早年和一个美国黑人同居的经历，保住自己和丈夫的地位及名誉，竟然向千里迢迢从美国来寻母的混血儿子约翰尼下了毒手。儿子对母亲的眷恋与失去母爱之后的悲哀交织在一起，使得约翰尼将母亲刺向自己的尖刀深深地插入了自己的胸膛。“妈妈，我是你的累赘吧……”“妈妈，在你逃到安全地方前，我是绝对不会死去的……”在最后的时刻，约翰尼还试图用濒于死亡的躯体去保护杀害自己的母亲……\n八杉恭子这个所谓的“家庭问题专家”，还有一个日本儿子叫恭平。她以恭平为“道具”，大演“母子通信”、“模范母子”的双簧戏。而实际上，她为了名誉和地位，完全忽视了对儿子的爱，使得恭平逐渐堕落，走上了犯罪的道路。恭平及其女友在夜间开车，无意中撞死了人之后，将尸体掩埋并逃到了国外，但最终还是没有逃脱法律的制裁。","month":12,"country":"日本","wereadId":"CB_H0yAgiAhgFKz6kL6kf4561F5"}];
    const wereadData = {"244004":{"rating":902,"ratingCount":18846,"highlights":[],"thoughts":[],"popularHighlights":[{"text":"太阳未出时，全世界都像一个梦，唯有月亮是真实的；太阳出来后，全世界都真实了，唯有月亮像一个梦。","count":18256,"chapter":"二 三天的行程"},{"text":"人之所以能够感到“幸福”，不是因为生活得舒适，而是因为生活得有希望。","count":12240,"chapter":"八 冷"},{"text":"这是荒野，什么样的挫折都得接受，什么样的灾难都得吞咽。","count":8944,"chapter":"四 冬牧场"},{"text":"有趣的是，兽医来时，那边托他捎来的东西是一大包油饼。兽医走时，这边托他送过去的东西，仍是一大包刚炸好的油饼……何必呢……","count":8925,"chapter":"五 地下的家"},{"text":"总之，在阿克哈拉村，我实在是个扑朔迷离的人物。主要有四大疑点：一、不结婚；二、不工作；三、不串门；四、不体面。","count":8463,"chapter":"一 最开始"},{"text":"我希望人长久，希望大家渐离贫苦，希望大地上一切生命安度冬夏，希望自己变得强大有力——贪得无厌地希望着。并且一直希望到了现在。","count":7684,"chapter":"三版自序"},{"text":"大家都愿意盲从，好像世上最安全的事就是让自己消失在“多数”之中。","count":7098,"chapter":"十五 大家"},{"text":"如果因为“不认识”而拒绝一份人情，就意味着已打定了主意日后不愿回报……这就是自私。而在荒野里，接受别人的帮助与款待，同帮助和款待别人一样重要。","count":6624,"chapter":"三十五 回家的路"},{"text":"居麻感叹道：“明天让他入党吧！”","count":6462,"chapter":"三十一 迅速消失的一切"},{"text":"大约生命的事情就是这样的吧：终究各归其途，只要安心就好。","count":6345,"chapter":"六 冬宰"},{"text":"有一天我的手机从挂在墙上的背包里掉到地上，小牛默默啃了一夜。本来一直关机的，硬是被啃得开了机。居麻说：小牛想妈妈了，想给妈妈打电话了。","count":6307,"chapter":"五 地下的家"},{"text":"一般牧民在买鞋时会选择大两个码的，可多穿两双厚袜子。我思前想后，穿了双大八个码的……于是，我的袜子穿得比谁都多。只是矮个儿穿大鞋相当招眼，像踩着两只船一样，划过来，划过去。","count":5904,"chapter":"一 最开始"},{"text":"其实，最主要的原因是：这些年居麻欠了我家好多钱。他家又太穷，看情形是还不起了，也不指望了。不如到他家住几个月，把钱全吃回来——这是我妈的主意。","count":5856,"chapter":"一 最开始"},{"text":"但是，虽说太敏感的人会受苦，我却情愿受这敏感的苦，也不愿成为另外情形的人。","count":5590,"chapter":"三十 我在体验什么"},{"text":"加玛走后我们都备感寂寞。一月初，她托兽医捎来一封信。这回居麻认真地翻译给我听了，开头第一句是：“冬窝子里的爸爸妈妈，还有李娟，你们好吗？身体好吗？”只这一句，就让人想要流泪。","count":5418,"chapter":"十 加玛苏鲁"},{"text":"万一人家晚上要过夫妻生活，岂不……岂不影响我休息？","count":5280,"chapter":"一 最开始"},{"text":"眼下的世界仍被大雪严密地封堵着，白茫茫直到天边，但对我来说，这个冬天已经结束了。之前觉得漫长难捱，如今猛然觉得，竟是那么地匆忙、草率、不知所措。","count":5280,"chapter":"三十五 回家的路"},{"text":"你不因有罪而死，我们不为挨饿而生。","count":5151,"chapter":"六 冬宰"},{"text":"而且雪停后的晴空，明朗灿烂得无从形容，似乎天上真的全都空了，真的把雪全都交给了大地。从此天空不再沉重了，不再那么辛苦了。","count":5100,"chapter":"七 唯一的水"},{"text":"于是很多读者说它是避暑神器，夏天读最合适。","count":4878,"chapter":"再版序"}]},"856157":{"rating":905,"ratingCount":1630,"highlights":[{"text":"所以，我们是两个世界的后代。一方面，我们是浪漫主义的继承人，因为浪漫主义打破了迄今为止人类以各种方式奉行的那个单一模式，即永恒的爱智慧（philosophia perennis）。我们是某种疑虑的产物——我们无法说得清楚。我们重视结果，也重视动机，在这两者之间犹豫不决。","chapter":"六 持久的影响","color":5},{"text":"它都会不断地促使你前进，永不知足，它的本质和意义在于它绝对无法实现，所以，一旦实现，它将毫无价值。就我所见而言，这就是浪漫主义的本质：意志，以及作为行动的同义词、作为因其永远在创造而无法被描述的人；你甚至不能说它在创造自己，因为没有自我，只有运动。这是浪漫主义的关键所在。","chapter":"六 持久的影响","color":5},{"text":"我想说的是，就表面而言，浪漫主义似乎表达了一切事物以及它们的对立面。如果我是对的，那么也许可以如此断言，意志之必然性和事物结构的缺失这两个原则可以满足我所提及的标准中的大部分，并且，看起来不可通融的矛盾之处可能也不会那么激烈了。","chapter":"六 持久的影响","color":5},{"text":"这些是浪漫主义最基本的要点：（承认）意志以及这个事实：世上并不存在事物的结构，人能够随意塑造事物——事物的存在仅仅是人的塑造活动的结果。由此，浪漫主义反对任何把现实再现为某种可供研究、描写、学习、与他人交流的形式，换言之，就是那些以科学方式再现现实的企图。","chapter":"六 持久的影响","color":5},{"text":"浪漫派既可能是进步的，也可能是反动的。在那些堪称革命的国家，那些法国大革命后建立的激进国家，浪漫派是保守的，他们要求回归到某种中世纪黑暗之中；在那些反动的国家，例如1812年后的普鲁士，浪漫派变得进步了，因为他们把普鲁士国王视为一个令人窒息的、人为构造的机制，它的存在囚禁了人们，窒息了他们自然的有机的进取力。浪漫派可以表现为上述二者之一。这就是为什么我们遭遇了革命的浪漫主义和反动的浪漫主义。这就是为什么无论人们怎样尝试都无法把浪漫主义划入任何特定的政治观点。","chapter":"六 持久的影响","color":5},{"text":"认识到主宰着人们的伟大意象——认识到黑暗力量、无意识、不可言说之物的重要性以及忽视它和顾及它的必然性，这个认识，在人类活动的各个领域传播，并不局限于艺术","chapter":"六 持久的影响","color":5},{"text":"在伯克的德国信徒之一亚当·缪勒那里，这个观点得到了最为雄辩的说明。他说，科学只能再造一个死气沉沉的政治国家；死亡不能再现生命，停滞（就是说，社会契约、自由主义国家、尤其是英国那一套国家制度）不能再现运动。科学、功利主义、机器的使用并不能传达国家的意义，国家“不只是一个工厂、农场、保险公司或商业社会；它是把一个民族的全部的物质和精神需要、全部的物质和精神财富、全部内在和外在生命紧紧捆绑在一起，维系成一个能量惊人、极度活跃、生机无限的整体”。","chapter":"六 持久的影响","color":5},{"text":"一切艺术都在试图通过象征激发对永恒运动（即生命）的无以言传的愿景","chapter":"六 持久的影响","color":5},{"text":"在浪漫主义眼里，科学是对最外在、最空洞的事物做最严谨的概括；而且同样符合那些谨慎的作家、谨慎的经验描述者——那些现实主义者、自然主义者，那些归入意识流流派的作家们：普鲁斯特，托尔斯泰，对人类灵魂各种运动的最具天赋的占卜者；甚至也符合那些一定程度上唯客观描述是求的人，不管他们是通过外部审视还是通过最幽微的内省对精神深处做最幽微的洞察。他们都在这种幻觉支配下工作，幻想他们绝对能够记录、描写和总结他们试图捕捉和确定的某个过程。如此一来，就产生了非现实和幻想——也就是一种企图：总是要罩住不可限制之物、追求真理于无真理之处、阻断不歇的涌流、使运动静止、以空间捕捉时间、以黑暗捕捉光线。这就是浪漫主义的布道。","chapter":"六 持久的影响","color":5},{"text":"忽略这点，避开它，试图把事物看做对某种理智和计划的顺从，试图制定一系列标准、规律或公式，是一种自我的放任，最终也是自杀性的愚蠢。说来说去，浪漫主义的布道就是这些。","chapter":"六 持久的影响","color":5},{"text":"这个观点的实质在于，世上存在着种种我们必须服从的事实。科学即服从，顺应事物的本性，慎对存在之物，恪守事实，科学就是理解、知识及顺应。浪漫主义运动的主张与此相反，它可以被归纳为主要的两点。","chapter":"六 持久的影响","color":5},{"text":"亚当·米勒就说，基督不仅只为众生而死，他也为国家而死。这是神学政治学的一种极端表述，而后他又解释道：国家是一种神秘的制度，深深植根于人类存在中那些最深奥、最难测度、最难理解的部分。就其本质来讲，国家永远处于杂乱无章的运动之中。任何要把国家简化为某些宪法、法律的尝试注定会失败，因为任何书写的东西都不具有生命力，没有哪部文字写就的宪法能够存活下来，因为写作是死的，而宪法必须是鲜活的火焰，跳动、生活在一个神秘大家庭里人类的心中。诸如此类的观点开始扩散到其他领域（也许最初它并没有这个意图），很自然，它开始产生非常严重的后果。","chapter":"五 奔放的浪漫主义","color":5},{"text":"席勒认为这是自然的典型特征，它提醒、强调并引出这样一个事实：这是自然而非艺术，这是自然而非人，这是自然而非道德。由此，他认为自然与人之间存在着一个巨大的对比：自然是一个本质性的、反复无常的、或许有因果联系的、或许是偶然为之的实体，而人，具有道德，能够辨别欲望与意志、责任与利益、正当与错误，能够采取相应的行动，即便因此触犯自然。","chapter":"四 拘谨的浪漫主义者","color":5},{"text":"弗里德里希·施莱格尔就这一运动作过最权威性的论述，事实上，他本人也是浪漫主义运动一份子。根据他的看法，三个因素从美学、道德和政治方面深刻影响了浪漫主义，它们依次是：费希特的知识学、法国大革命，以及歌德的著名小说《威廉·迈斯特》。","chapter":"五 奔放的浪漫主义","color":5},{"text":"放弃尝试就是停止表达，停止表达就是停止活着。对于浪漫主义者而言，活着就是要有所为，而有所为就是表达自己的天性。表达人的天性就是表达人与世界的关系。虽然人与世界的关系是不可表达的，但必须尝试着去表达。这就是苦恼，这就是难题。这是无止境的向往。这是一种渴望。因此人们不得不远走他乡，寻求异国情调，游历遥远的东方、创作追忆过去的小说，这也是我们沉溺于各种幻想的原因。这是典型的浪漫主义的思乡情结。","chapter":"五 奔放的浪漫主义","color":5},{"text":"就是浪漫主义者关于深度的基本观点。很大程度上他们由此作出如下的论断：用有限表示无限，用有形表示无形，用死亡表示生命，用空间表示时间，用言说表示那些无以言表的东西。","chapter":"五 奔放的浪漫主义","color":5},{"text":"我的任何描述总是打开通往更深远处之门，那里也许更加黑暗，无法还原成精确的、明晰的、可验证的客观的描述。这就是“有深度”的一个功用——唤起“不可化约性”（irreducibility）的观念，这也是我极力阐明的观念，本质上来说，语言永远不足以达成阐明事物的目的。","chapter":"五 奔放的浪漫主义","color":5},{"text":"费希特的意志理论和谢林的无意识理论的结合产生出的第一个伟大的理念是象征主义。意志和无意识构成了浪漫主义美学的基本要素，进而成为它的政治学和伦理学的基本要素。象征主义是所有浪漫主义思想的核心，是批评浪漫主义的学者一直关注的现象。","chapter":"五 奔放的浪漫主义","color":5},{"text":"谢林则持一种神秘主义的活力论。对他而言，自然本身是有生命的，是一种精神性的自我展开。他认为世界起初处于一种野蛮的无意识状态，逐渐发展出它对自己的意识。这种意识肇始于最神秘的原初阶段，起源于黑暗而不断发展的无意识意志，逐渐获得自我意识。","chapter":"五 奔放的浪漫主义","color":5},{"text":"因此，费希特的观点是作为“自我”理解的主格的“我”（I）并不同于宾格的“我”（me）。这不仅成为浪漫主义运动的权威观点，也成为心理学的权威观点。毫无疑问，宾格的“我”是可以被反思的：心理学家谈论“我”，科学论文以“我”为写作对象。这里，宾格的“我”是观察的对象、学习的对象，是心理学、社会学以及相关学科的研究对象。但是，还有一种非宾格的“我”，即最重要的主格，从来都不是在认知的过程中，而仅仅是在受到什么碰撞之后被你意识到的。","chapter":"五 奔放的浪漫主义","color":5},{"text":"休谟说过，当他像大多数人那样审视自己的时候，当他自省其身的时候，他发现了许多感受、情感，以及记忆、希望和恐惧的碎片——所有细微的心理单元，却不能发现任何一个可以被称为“自我”的实体。他由此得出结论：自我不是一种东西，不是能被直接感知的对象，也许只是一种称谓，用来表达人类个体以及人类历史赖以形成的经验的串联，只是一种可使洋葱头瓣瓣相连的细绳，只不过并没有这种细绳。","chapter":"五 奔放的浪漫主义","color":5},{"text":"拿破仑入侵德国和德国民族主义情绪兴起之后，费希特逐渐开始思考赫尔德关于人类的看法，他觉得赫尔德的看法也许是对的——人倚仗他人而成为人，人倚仗教育、倚仗语言成为人。语言不是我发明的，它是别人发明的，我是川流中的一部分，是其中的一分子。我的传统、我的习惯、我的视野、我的一切在某种程度上是其他人的创造，我与他们组成一个有机体。由此，他渐渐放弃了个体是存在于空间里的一个经验人的观点，转而认为个体是某种大于个体的东西，比如说一个国家、比如说一个阶级，比如说一个宗派。一旦意识到这点，行动就成了它的事情、自由就成了它的事情，一个民族的自由意味着摆脱其他民族的统治，如果其他民族妨碍了它，那就只能开战了。","chapter":"四 拘谨的浪漫主义者","color":5},{"text":"费希特的整个观点是：人是一种持续进行的行动——连行动者都称不上。人必须坚持不懈地生产和创造才能臻于完满。一个不再创造的人，一个只是单纯接受生活和自然所赐的人，其实已经死了。这个道理不仅适用于人类，也适用于民族（这里，我无意涉及费希特的政治暗示）","chapter":"四 拘谨的浪漫主义者","color":5},{"text":"对世界某些事物的接受，之所以接受是因为不管我们乐意与否，我们都得接受，是因为它是建立在生物学意义的冲动和生存必然性的前提之上，这样的知识对费希特而言是一种信念的行为。“我们不是因为了解才行动，”他说，“我们因为需要行动起来才了解。”知识不是一种被动的东西。外在的自然撞击我们，阻拦我们，但它是供我们创造之用的黏土；只要我们创造，我们就能重获自由。由此他得出一个重要命题：事物之所以是这副模样，不是因为它们外在于我而独立存在，而是因为我让它们变成那样；事物存在的形式取决于我如何对待它们，我需要它们做什么。这是出现较早却影响深远的实用主义。食物不是先于我的饥饿存在的，而是因为我的饥饿它才变成了食物。他说道：“不是因为食物摆在手边我才想到吃它；而是因为我饿了，那样东西才变成了食物。”","chapter":"四 拘谨的浪漫主义者","color":5},{"text":"费希特说。我们的生命并不倚仗冥想所得的认识。生命不是源于我们对自然或对事物无功利性的冥想。生命始于行动。知识只是工具","chapter":"四 拘谨的浪漫主义者","color":5},{"text":"这种论调第一次引发了我所认为的人类思想史上至关重要的一个音符：即理想、目的、目标并非通过直觉、科学的手段，通过对神圣文本的阅读，通过听取专家或权威人士的意见而被发现；理想根本不是被发现的，理想是被发明的；理想不是被找到的，理想是生成的——它是生成的，犹如艺术是生成的。","chapter":"四 拘谨的浪漫主义者","color":5},{"text":"在康德看来，这简直是一派胡言。自然女主人，自然夫人，自然是仁慈的，是你所崇拜的，是艺术应当模仿的对象，是道德的源起，是政治的基础，像孟德斯鸠所说的那样——这种自然观贬损了人与生俱来的选择的自由，因为（它相信）自然是机械的，即便不是机械的，就算它是有机的，自然中每个事件还是得严格遵循所有事物概莫能外的必然性。所以，如果人也是自然的一部分，那他就会受到限定，道德只是一个可怕的幻象。因此，在康德那里，往最坏处说，自然是人的敌人，往最好处说，自然不过是可塑造的中性材料。他认为人部分地是自然性物体：明摆着，他的身体存在于自然之中；他的情感存在于自然之中；所有能够使他受外在规律支配的那些东西，或取决于他真实自我之外的那些东西是自然的；然而，当他处于最自由的状态时，当人性在他身上得到最大程度的张扬时，当他登峰造极时，他就能统治自然，也就是说，他能模塑自然，压倒自然，把自己的个性施与自然，我行我素，因为他要追求某些理想，通过追求理想，他在自然身上盖下自己的印章，因此自然就成了可塑的东西。","chapter":"四 拘谨的浪漫主义者","color":5},{"text":"在康德眼里，同情是一种可憎的品性。人宁愿被忽视，宁愿被侮辱，宁愿被虐待，也不要被同情，因为同情导致了同情者对被同情者的一种优越感，这种优越感，康德是坚决抵制的。所有人都是平等的，所有人都能够自己做主，如果有人同情别人，他就是把对方降格为一种动物或一样东西，或只是一个让人怜悯的对象。对康德来说，这是一种最可怖的对人的尊严和人的道德的侮辱。","chapter":"四 拘谨的浪漫主义者","color":5},{"text":"价值之所以是价值——或者再往小一点说，之所以是责任，之所以是一种超越了欲望和情感偏向的目标——是由人的选择而非它自身的某种客观的固有性质所决定的。价值不是道德天宇里的星星，它们存在于人的内心，它们是人愿意自由选择并愿意为之生、为之奋斗、为之死的东西。这就是康德宣扬的基本理论。","chapter":"四 拘谨的浪漫主义者","color":5},{"text":"在一篇《回答这个问题：“什么是启蒙”》的短文中，康德下了这样一个定义：启蒙不过是指人们自主决定自己的生活，摆脱别人管教的能力，以及自己变得成熟，能够决断该做什么，无论这决定是善还是恶，无须过分倚赖权威、这样那样的家庭教师、国家、父母、保姆、传统或任何既有的负荷所有道义责任的价值观就能做出决定，个人对自己的行为负责。如果他放弃这种责任，或如果他因太不成熟而无法意识到自己的责任，那么，他就依然是一个野蛮人，尚未开化——或者说，还是个孩子。文明就是成熟，成熟就是指自我决断——通过理性思考作出决断，不受某些我们自己无法控制的东西，特别是别人，即康德谓之的“一个家长式政府”的驱迫或摆布。","chapter":"四 拘谨的浪漫主义者","color":5},{"text":"康德推想，道德优点的观念，道德缺失的观念，哪些该得到我们的赞扬，哪些该受到我们的谴责，哪些行为方式该受到鼓励或指责，所有这些都基于这个前提：即人们能够自由选择。出于这个原因，家长式统治，至少是政治意义上的家长式统治，成为他强烈憎厌的东西之一。","chapter":"四 拘谨的浪漫主义者","color":5},{"text":"这就是赫尔德的最终结论：也就是说每个人类群体都应该为自己与生俱来的东西而奋斗，或者说，为了他们的传统而奋斗。每个人都属于他所在的群体。作为一个人，他应该说出他认为是真的真理。对每个人而言，他所相信的真理与别人心目中的真理一样正当有效。多样的色彩构成了万花筒般的世界，但没有人能够看到全部的世界，没有人能看到全部的森林，只有上帝能够看到整个宇宙。人，由于属于特定的群体，生活在特定的区域，他们不可能看到整个宇宙。每个时代都有它自己内在的理想。","chapter":"三 浪漫主义的真正父辈","color":5},{"text":"我想重点谈谈赫尔德的三个观点。这三个观点对浪漫主义运动贡献巨大，它们很自然地产生于我上面所描述的那种社会氛围。其一，我称之为表白主义（expressionism）的观点；其二是归属的观点（notion of belonging），意即归属于某一个群体；其三，真正的理想之间经常互不相容，甚至不能够调和。","chapter":"三 浪漫主义的真正父辈","color":5},{"text":"但在我看来，真正称得上浪漫主义之父的就有两个人。他们比我迄今为止提到的与浪漫主义有瓜葛的所有人物更为重要。因此我的话题就转向他们。他们在这场运动中崭露头角。一个把这场运动引为同调，一个则大唱反调。不过，唱反调的作者却成为这场运动的理念的更大推行者。物极必反吧，说起来，这也是一种讽刺。我说的这两个人，一个是赫尔德，一个是康德。","chapter":"三 浪漫主义的真正父辈","color":5},{"text":"卢梭之所以还是一个诡辩家是因为他的学说依旧维系在理性上，依然寄希望于这样一点，即世上存在着一些规则、好的人类生活、好的人。只要这些人能够清除多少个世纪以来累加在他们身上的谬误，只要他们能够清理败坏了他们的不良社会，他们从此以后就能够永远过上幸福的生活，应和永恒的法则，而这些正是德国人不相信的，也是德国人指责卢梭的原因。卢梭与其他巴黎百科全书派的唯一区别是，后者相信卢梭的梦想可以实现，只要通过循序渐进的改革，通过使统治者转而接受他们的观点，只要接受启蒙的专制君主足够开明，就可以借助他，在地球上建立更好的生活。卢梭却认为整个可恶的上层建筑应该连根拔起，所有罪恶的人类社会应该被烧成灰烬；然后靠他本人及其信徒，一只新的凤凰将从灰烬中重生。不过，总的来说，卢梭和百科全书派的愿望是一致的，尽管他们可能对于具体采用什么样的方法达成这个愿望各执己见。","chapter":"三 浪漫主义的真正父辈","color":5},{"text":"卢梭说的不外乎是这些：我们生活在一个堕落的社会；我们生活在一个虚伪的坏社会，人们互相欺骗，互相谋杀，互相撒谎；我们可能发现真理。真理不是通过深思熟虑或笛卡尔式的逻辑获得的，而是通过洞察人类之中那些单纯而未受腐蚀之人、高贵的野蛮人或者说孩子，反正就是这类人吧，他们的心灵获得的。一旦真理被发现，那就是永恒的真理，适用于所有人，所有场合，所有气候和季节。当我们发现了真理，我们就要按照真理生活，这一点十分重要。他的话与希伯来先知们的话并无二致，与基督教传教士抨击大城市工于心计背离上帝种种堕落的话如出一辙。","chapter":"三 浪漫主义的真正父辈","color":5},{"text":"歌德说哈曼：“为了达到某种不可能达到的目的，他穷尽一切方式。”他将哈曼的观点概括为：“人所采取的一切行动源于他自身力量的联合，所有的分离都应该被否定。”","chapter":"二 对启蒙运动的首次攻击","color":5},{"text":"因此，在他看来，启蒙的整套学说正在扼杀人们的活力，以一种苍白的东西替代了人们创造的热情，替代了整个丰富的感官世界。没有了感觉，人们便无法生活，无法食饮，无法快乐，无法交际，无法沉醉于一千零一种的行动之中，没有它们，人们会枯萎死亡。在他看来，启蒙并未强调过这点。在启蒙运动思想家的想象中，人，即便不是“经济人”，至少也是某种人造的玩偶，某种无生命的模型，这样的人与哈曼在他日常生活中所见到并希望交往的人一点关联都没有。","chapter":"二 对启蒙运动的首次攻击","color":5},{"text":"有一个很特殊的社会事实能够支持我所提出的观点。即这个问题整个就是受伤的民族情感和可怕的民族屈辱的产物，这便是德国浪漫主义运动的根源所在。如果你问起那些思想家都是哪些人，你会发现，他们来自完全不同的社会阶层，恰与法国思想家形成一个对照。","chapter":"二 对启蒙运动的首次攻击","color":5},{"text":"亲岑多夫是摩拉维亚兄弟会一个支派的领袖，而摩拉维亚兄弟会本身则是虔敬派一大分支。他说：“谁想用智慧领悟上帝，谁便成了无神论者。”这简直就是路德观点的一个回声。路德说过理性是一个娼妓，我们要避而远之。","chapter":"二 对启蒙运动的首次攻击","color":5},{"text":"基于这个背景，虔敬运动，这一真正的浪漫主义之源，得以渗透德国。虔敬派是路德教的一支，它主张认真研习《圣经》，推崇人和上帝之间的个别关系。由此，它特别强调精神生活，蔑视求知，蔑视庆典和一切形式的东西，蔑视排场和仪式，特别强调受苦的人类个体灵魂与造物主之间的个别关系。","chapter":"二 对启蒙运动的首次攻击","color":5},{"text":"休谟揭示出哲学家所相信的那种必然性，那种维系宇宙的严格的逻辑网络，那种人类理性能够掌握、人类必须遵循的逻辑网络实际上并不存在。如此一来，他瓦解了启蒙主义所倚仗的那层无懈可击的铠甲，那种必然关系的统一体；自然而然，他颠覆了启蒙的基本主张。","chapter":"二 对启蒙运动的首次攻击","color":5},{"text":"历史的目的不只是对过去事情的好奇，或出于复活历史的欲望；不只是因为我们对祖先是什么样子很感兴趣，或因为我们想以某种方式与过去连接以便追溯我们的渊源。这些都不是这些人的主要兴趣。他们最主要的目的在于搜集那些使普遍的观点得以建立的数据，告诉人们应该做什么，如何生活，成为什么样的人。这种可能是最不历史的历史观，恰好就是十八世纪最有代表性的历史观。","chapter":"二 对启蒙运动的首次攻击","color":5},{"text":"不过在十八世纪，他们还是形成了一个普遍共识，即牛顿在物理学领域取得的成就可以很可靠地同样用于伦理学和政治学领域。","chapter":"二 对启蒙运动的首次攻击","color":5},{"text":"十七世纪末十八世纪初的启蒙运动需要我们定义一番。现有三个命题，或许我们可以将它们归结为撑起整个西方传统的三个支柱，它们的确曾是西方传统的支柱。这些命题并不仅限于启蒙运动，尽管启蒙运动提供了三个命题的特殊文本，把它们转换成一种特殊的形式。","chapter":"二 对启蒙运动的首次攻击","color":5},{"text":"法国大革命的重要性在于它撞击了人类的思想意识并留下深刻的印记，在于革命发动者们绝对真诚，而不是微笑的伪君子（卡莱尔就认为伏尔泰是个微笑的伪君子）。这种态度，我不会说它是崭新的，无论如何不能说它是崭新的，但无论如何，这种态度也够新的了，足以值得重视。不管原因何在，它毕竟发生了，在我看来，它产生于1760年和1830年之间。首先始于德国，之后扩展开去。","chapter":"一 寻找一个定义","color":5},{"text":"卢梭被称为浪漫主义之父，某种意义上说，这是很正确的称谓。但导致了罗伯斯庇尔思想形成的卢梭，导致了雅各宾派思想形成的卢梭，在我看来，并不是那个与浪漫主义有明显联系的卢梭。这个卢梭是写出《社会契约论》的卢梭，这部经典著作谈到了回归人类共有的原初法则；谈到了施行普遍理性的统治而不是情感的统治——普遍的理性能将人们联合在一起，而情感却会使人们分裂；谈到了普遍公正与和平的统治——普遍公正与和平能消弭那些使人情智分裂、人与人之间紧张对立的冲突、骚乱和动荡。","chapter":"一 寻找一个定义","color":5},{"text":"可以肯定，法国大革命为之而战的原则即普遍理性、秩序和公正的原则，而浪漫主义通常与之关联的理念是独特性意识、深刻的情感内省和事物之间的差异性意识（而非相似性意识），它们之间完全没有联系。","chapter":"一 寻找一个定义","color":5},{"text":"十八世纪的思想家、甚至十九世纪思想家，他们认为有可能——如果不是绝对的话——达到某种近乎绝对的知识来整饬世界，创造某种理性秩序，由此，悲剧、罪恶、愚蠢，这些在过去造成巨大破坏的事物，最终可以通过应用谨慎获得的知识和普遍理性得到避免。","chapter":"一 寻找一个定义","color":5}],"thoughts":[{"text":"两者都试图打破事物的固定本质。","quote":"我想说的是，就表面而言，浪漫主义似乎表达了一切事物以及它们的对立面。如果我是对的，那么也许可以如此断言，意志之必然性和事物结构的缺失这两个原则可以满足我所提及的标准中的大部分，并且，看起来不可通融的矛盾之处可能也不会那么激烈了。","chapter":""},{"text":"十八世纪中期前流传的古老传统是「知识即美德」，主要的争议在于不同立场定义的真知识不同。此后，浪漫主义运动与此相反，提出了两个主张（归纳）：1.「不屈的意志」的观念，人们所要获得的不是价值的知识而是价值的创造。世界出自你的选择、你的创造（费希特、谢林）；2.世界上不存在事物的结构，不存在你必须适应的模式，世界是永无止境的自我创新。通过把整体视为一个巨大的自我组织盒自我创造的过程，最终你将得到自由（叔本华、尼采）。","quote":"这个观点的实质在于，世上存在着种种我们必须服从的事实。科学即服从，顺应事物的本性，慎对存在之物，恪守事实，科学就是理解、知识及顺应。浪漫主义运动的主张与此相反，它可以被归纳为主要的两点。","chapter":""},{"text":"任何表达都是对其描摹对象的一种抽象，任何一种抽象必将丢失部分它欲描摹对象的成分，否则，它也便不会被称为抽象。\n因此才会有那句「被误解是表达者的宿命」。但我觉得这句话没说完，还有后半句，「但确存在有用的好表达」。\n这后半句源于 George Box 说的 \"All models are wrong, but some are useful\"(https://en.wikipedia.org/wiki/All_models_are_wrong)","quote":"我的任何描述总是打开通往更深远处之门，那里也许更加黑暗，无法还原成精确的、明晰的、可验证的客观的描述。这就是“有深度”的一个功用——唤起“不可化约性”（irreducibility）的观念，这也是我极力阐明的观念，本质上来说，语言永远不足以达成阐明事物的目的。","chapter":""},{"text":"象征就是用有限性表达无限性，用修辞艺术表达不可言说之物。既然是不可言说之物，那么这种有限的表达自然无法穷尽物理。浪漫主义在此的贡献便是尽可能多的去逼近不可言说之物。\n换个角度讲，任何表达都是对其描摹对象的一种抽象，任何一种抽象必将丢失部分它欲描摹对象的成分，否则，它也便不会被称为抽象。","quote":"费希特的意志理论和谢林的无意识理论的结合产生出的第一个伟大的理念是象征主义。意志和无意识构成了浪漫主义美学的基本要素，进而成为它的政治学和伦理学的基本要素。象征主义是所有浪漫主义思想的核心，是批评浪漫主义的学者一直关注的现象。","chapter":""},{"text":"他认为上帝就是开始和结束。开始是无意识的，而结束则是对于自我的完满意识。上帝是一个不断进步的现象，是创造性进化的一种方式。因此，如同自然，艺术家的职责就是挖掘自己，通过内部斗争把无意识提升到意识层面。任何艺术作品，如果只是一种复制、知识、或类科学的东西，它就是死的。艺术作品的生命力与自然中令人仰慕的东西相似，是某种喷薄而出的力量、能量、生命，且可能是艺术家本人并未意识到的。","quote":"谢林则持一种神秘主义的活力论。对他而言，自然本身是有生命的，是一种精神性的自我展开。他认为世界起初处于一种野蛮的无意识状态，逐渐发展出它对自己的意识。这种意识肇始于最神秘的原初阶段，起源于黑暗而不断发展的无意识意志，逐渐获得自我意识。","chapter":""},{"text":"有点存在主义的意思","quote":"我不为目的所左右，目的是由我来决定的。”“世界，”一个评论家这样说过，“是内心生活梦想出来的一首诗。”","chapter":""},{"text":"这一论调源于席勒向往的人类第三阶段——Spieltrieb，“游戏的驱动”。他说人们解放自身的唯一途径就是保持游戏玩家的心态。艺术是一种游戏的形式，艺术家发明规则，遵守自己制定的规则，这种遵守源于我们是自己的创造物，而非恐惧，它是一种自由的选择。","quote":"这种论调第一次引发了我所认为的人类思想史上至关重要的一个音符：即理想、目的、目标并非通过直觉、科学的手段，通过对神圣文本的阅读，通过听取专家或权威人士的意见而被发现；理想根本不是被发现的，理想是被发明的；理想不是被找到的，理想是生成的——它是生成的，犹如艺术是生成的。","chapter":""},{"text":"席勒的这套理论有点尼采的超人哲学的意味","quote":"美狄亚至少是个人物，她能轻易地攀升到道德宏伟的高度：伊阿宋什么也不是。\n这便是他使用的一个范畴，他同样用之于其他戏剧。在他早期的一部剧作《菲耶斯科》中，与剧名同名的主人公是热那亚的暴君。毫无疑问，他的所作所为是错的。他压迫热那亚人。虽然他行迹恶劣，他还是胜过那些流氓和蠢人，那群热那亚的乌合之众，他们需要一位统治者，而他恰巧能够统治他们。最后，共和党人的领袖韦里纳把他淹死，毫无疑问，这没错，然而，我们却失去菲耶斯科身上的某些东西。他是一个人，就其人性质量而言，他远远优于那些名正言顺谋杀了他的人。大致说来，这便是席勒的理论，著名的伟大罪人和多余人的理论就滥觞于此，该理论注定要在十九世纪艺术中占据一席之地。","chapter":""},{"text":"按此理解康德，正因为价值之间没有显现自身的固有性质，它才是被人自由选择的，如此道德才有意义。但我不太理解的是，与此同时，他又认为所有人都是能被启蒙的，从而能给出统一的正确答案。","quote":"价值之所以是价值——或者再往小一点说，之所以是责任，之所以是一种超越了欲望和情感偏向的目标——是由人的选择而非它自身的某种客观的固有性质所决定的。价值不是道德天宇里的星星，它们存在于人的内心，它们是人愿意自由选择并愿意为之生、为之奋斗、为之死的东西。这就是康德宣扬的基本理论。","chapter":""},{"text":"当人不被作为目的而是作为工具对待时其人便丧失了自由的选择权，也便没有了责任，他就成为了价值的奴隶。","quote":"这就是康德说到“人是目的本身”时要表达的意思。","chapter":""},{"text":"赫尔德认为艺术是对生活的表白，离开创作者的目的，作品也就无从谈起，他强调了所有表达的「作者性」；艺术作品是一种交流形式，它不具备非个人的或恒定的价值，要想了解他人，就得进入他人的生活形式。由此他发展出归属感观点的根基，他抵制世界主义的观念。他认为每种文化都有其文化重心。所以他拒绝用一种文化消灭另一种文化，他是希望所有文化保留其本土状态的尚古主义者。所以不存在十八世纪的人认为的，世上存在着全人类都会为之奋斗的共同理想，世上存在着解答人类难题的终极答案。他认为每个人都属于他所在的群体，他有他的真理，为他的传统奋斗。","quote":"我想重点谈谈赫尔德的三个观点。这三个观点对浪漫主义运动贡献巨大，它们很自然地产生于我上面所描述的那种社会氛围。其一，我称之为表白主义（expressionism）的观点；其二是归属的观点（notion of belonging），意即归属于某一个群体；其三，真正的理想之间经常互不相容，甚至不能够调和。","chapter":""},{"text":"All translations are wrong, but some of them are useful.","quote":"我们思考时，我们是在用符号思考，我们是在用词语思考，因此，原则上来说，一切翻译都是不可能的。","chapter":""},{"text":"哈曼觉得，科学总是带着目的的，理性提取的知识一般性的概念，它不是具体的，有创造性的人或事。而人们真正想要的是创造，而部署做一个科学定义下的活死人。","quote":"因此，在他看来，启蒙的整套学说正在扼杀人们的活力，以一种苍白的东西替代了人们创造的热情，替代了整个丰富的感官世界。没有了感觉，人们便无法生活，无法食饮，无法快乐，无法交际，无法沉醉于一千零一种的行动之中，没有它们，人们会枯萎死亡。在他看来，启蒙并未强调过这点。在启蒙运动思想家的想象中，人，即便不是“经济人”，至少也是某种人造的玩偶，某种无生命的模型，这样的人与哈曼在他日常生活中所见到并希望交往的人一点关联都没有。","chapter":""},{"text":"酸葡萄心理的宏大表述😊","quote":"基于这个背景，虔敬运动，这一真正的浪漫主义之源，得以渗透德国。虔敬派是路德教的一支，它主张认真研习《圣经》，推崇人和上帝之间的个别关系。由此，它特别强调精神生活，蔑视求知，蔑视庆典和一切形式的东西，蔑视排场和仪式，特别强调受苦的人类个体灵魂与造物主之间的个别关系。","chapter":""},{"text":"他提出两个命题：\n1.因果关系是否能被直接感知\n2.外在的客观世界的存在无法用逻辑推导\n从而打破了唯理主义的伟大预想：将宇宙所有事物都还原到数学层面","quote":"休谟揭示出哲学家所相信的那种必然性，那种维系宇宙的严格的逻辑网络，那种人类理性能够掌握、人类必须遵循的逻辑网络实际上并不存在。如此一来，他瓦解了启蒙主义所倚仗的那层无懈可击的铠甲，那种必然关系的统一体；自然而然，他颠覆了启蒙的基本主张。","chapter":""},{"text":"1.所有真问题都能得到解答，不在当下便在将来，不对凡人也对上帝。\n2.所有答案都是可知的，通过学习方法便能获得。\n3.所有答案必须是兼容的。","quote":"十七世纪末十八世纪初的启蒙运动需要我们定义一番。现有三个命题，或许我们可以将它们归结为撑起整个西方传统的三个支柱，它们的确曾是西方传统的支柱。这些命题并不仅限于启蒙运动，尽管启蒙运动提供了三个命题的特殊文本，把它们转换成一种特殊的形式。","chapter":""},{"text":"价值观的二元论转变为多元？","quote":"法国大革命的重要性在于它撞击了人类的思想意识并留下深刻的印记，在于革命发动者们绝对真诚，而不是微笑的伪君子（卡莱尔就认为伏尔泰是个微笑的伪君子）。这种态度，我不会说它是崭新的，无论如何不能说它是崭新的，但无论如何，这种态度也够新的了，足以值得重视。不管原因何在，它毕竟发生了，在我看来，它产生于1760年和1830年之间。首先始于德国，之后扩展开去。","chapter":""}],"popularHighlights":[{"text":"美德最终在于知识；只有知道自己是谁，知道我们需要什么，知道从哪里获得所需和如何利用所掌握的最佳手段达到目的，我们才能过上幸福的、高尚的、公正的、自由的和满意的生活；所有的美德是互相兼容的。","count":1062,"chapter":"二 对启蒙运动的首次攻击"},{"text":"万物有本然，终不为他者。 约瑟夫·巴特勒","count":976,"chapter":"编者序"},{"text":"艺术的目的是生产美，只要艺术家自己感到他的作品是美的，就足够了。","count":832,"chapter":"一 寻找一个定义"},{"text":"悲剧是建立在人的某些可避免的或无从避免的缺失——知识、技能、道德勇气、生存能力以及正确行事的能力的缺失，或者别的什么缺失之上的。","count":697,"chapter":"一 寻找一个定义"},{"text":"我们完全可以肯定浪漫主义运动不仅是一个有关艺术的运动，或一次艺术运动，而且是西方历史上的第一个艺术支配生活其他方面的运动，艺术君临一切的运动。在某种意义上，这就是浪漫主义运动的本质。","count":666,"chapter":"编者序"},{"text":"可以肯定，法国大革命为之而战的原则即普遍理性、秩序和公正的原则，而浪漫主义通常与之关联的理念是独特性意识、深刻的情感内省和事物之间的差异性意识（而非相似性意识），它们之间完全没有联系。","count":561,"chapter":"一 寻找一个定义"},{"text":"人们所钦佩的是全心全意的投入、真诚、灵魂的纯净，以及献身于理想的能力和坚定性，不管他信仰的是何种理想。","count":560,"chapter":"一 寻找一个定义"},{"text":"他们认为有可能——如果不是绝对的话——达到某种近乎绝对的知识来整饬世界，创造某种理性秩序，由此，悲剧、罪恶、愚蠢，这些在过去造成巨大破坏的事物，最终可以通过应用谨慎获得的知识和普遍理性得到避免。","count":558,"chapter":"一 寻找一个定义"},{"text":"因此，浪漫主义的结局是自由主义，是宽容，是行为得体以及对于不完美的生活的体谅；是理性的自我理解的一定程度的增强。","count":539,"chapter":"六 持久的影响"},{"text":"当通往人类自我完善的自然之径被堵塞时，人们便会逃向自我、沉溺于自我，建立一个外在厄运无法侵入的内心世界。","count":528,"chapter":"二 对启蒙运动的首次攻击"},{"text":"弗里德里希·施莱格尔，浪漫主义有史以来最伟大的先驱，最伟大的鼓吹者和预言家，他认为人有一种可怕的不可满足的欲望，总想遨游于无限；一种狂热的渴望，总想摆脱个体狭窄的束缚。","count":486,"chapter":"一 寻找一个定义"},{"text":"但是，毫无例外，这些模式的结果就是重新奴役了解放过的人类。这些模式不能解释人类全部经验。于是，最初的解放者最终成为另一种意义的专制。","count":480,"chapter":"一 寻找一个定义"},{"text":"也许你们期待我的演讲一开始就给浪漫主义做些定义，或者试图做些定义，或者至少给些归纳概括什么的，以便阐明我所说的浪漫主义到底是什么。但我不想进入这个陷阱。","count":465,"chapter":"一 寻找一个定义"},{"text":"费希特的整个观点是：人是一种持续进行的行动——连行动者都称不上。人必须坚持不懈地生产和创造才能臻于完满。一个不再创造的人，一个只是单纯接受生活和自然所赐的人，其实已经死了。","count":450,"chapter":"四 拘谨的浪漫主义者"},{"text":"自然本身对人是冷漠的，自然本身是非道德的，自然她会以最残忍、最阴险的方式毁灭我们，这个事实使我们特别清楚地认识到我们不是自然的一部分。","count":448,"chapter":"四 拘谨的浪漫主义者"},{"text":"本质上，现实是混乱无序的，是飞腾的川流，是自我实现的意志的巨流，任何禁锢它的想法都是荒谬的、大不敬的。这就是浪漫主义信仰滚烫的中心。","count":435,"chapter":"五 奔放的浪漫主义"},{"text":"但是到了十九世纪二十年代，你会发现这样一种价值观：人们的精神状态和动机比结果更为重要。情感的纯洁、完整、投入、奉献——这些精神气质，比较容易得到人们的敬佩，成为一般的道德态度。","count":432,"chapter":"一 寻找一个定义"},{"text":"这是酸葡萄心理的宏大表述。如果你无法从这世上得到你渴望的东西，你就必须教会自己如何不想得到它。如果无法得到你想要的，你就必须教会自己只想那些你能得到的。","count":432,"chapter":"二 对启蒙运动的首次攻击"},{"text":"任何时候观察一种独特文明，你都会发现这种文明最有特色的写作以及其他文化产品都反映出一种独特的生活方式，而这种生活方式支配着写出这些东西的作家、画出这些东西的画家、谱出这些音乐的作曲家。","count":392,"chapter":"一 寻找一个定义"},{"text":"理想根本不是被发现的，理想是被发明的；理想不是被找到的，理想是生成的——它是生成的，犹如艺术是生成的。","count":392,"chapter":"四 拘谨的浪漫主义者"}]},"22523966":{"rating":814,"ratingCount":41742,"highlights":[{"text":"信封上的邮票使用了金刚力士像的图案，代表严正拒绝之意。虽然金刚力士像的邮票一张就要五百元，但为了表达男爵绝对不愿借钱的坚强意志，花这点钱应该值得。如果贴一张印象柔和的邮票，对方搞不好会再度上门借钱。","chapter":"秋","color":5},{"text":"因为手上没有满意的邮票，最后上网订购了十五年前推出的邮票。\n十五年前，刚好是这对夫妻结婚那一年。\n贴上累积了相同岁月的邮票，似乎可以象征某种意义。","chapter":"夏","color":5}],"thoughts":[{"text":"两封绝交信，一封表达感激，一封表达歉意。绝交之意，看来只能通过推断了。","quote":"[插图]\n在那一刻，我就是小野寺舞。\n写完的瞬间，我重重吐了一口气。\n我似乎可以听到小舞拍翅飞离茶道老师的声音。虽然无法保证，但总觉得茶道老师收到这封信之后，应该不会再执拗地欺负小舞了。","chapter":""},{"text":"中文版的这封信的字体应该和写给樱的那封对调一下才是","quote":"只不过他潦草的字迹实在让人忍不住喷饭。","chapter":""},{"text":"有意思，为了不借钱，宁可多花点钱 🌝","quote":"信封上的邮票使用了金刚力士像的图案，代表严正拒绝之意。虽然金刚力士像的邮票一张就要五百元，但为了表达男爵绝对不愿借钱的坚强意志，花这点钱应该值得。如果贴一张印象柔和的邮票，对方搞不好会再度上门借钱。","chapter":""},{"text":"这封中文手写译作的确令人出戏，不少书友以为这是原书内容，只要稍微推理便知不可能。我在网上搜到了一篇日文原文，不知是否为书中原作，但比之这篇中文译作也会好上很多，地址如下：https://plaza.rakuten.co.jp/happysunsun/diary/201705110000/","quote":"[插图]\n我也实际把“佐仓さま”“樱さま”“佐仓樱さま”几种写法写在纸上研究，但使用汉字的“样”，似乎更能表达园田先生端正的态度；同时 流动，到处传来人们说话的声音。","count":6864,"chapter":"夏"},{"text":"因为四下无人，我小声地说了声：“新年快乐。”不知道是否听到了我说话的声音，一阵南风吹来，轻轻吹动了水蓝色的纸带。","count":6812,"chapter":"夏"}]},"22806897":{"rating":793,"ratingCount":95,"highlights":[{"text":"形式化也是对象化，也就是把自己想要讨论的东西明确为‘对象’。我们把以数学为对象的数学称为元数学。意思是‘关于数学的数学’，懂吧？也就是以形式系统来表示数学，再从数学角度去研究‘数学’这个表示结果。","chapter":"10.5 午饭时间","color":5},{"text":"“这么说来，不完备定理的‘某个条件’是什么来着？”我问道。\n“相容，蕴含皮亚诺算术公理，还要是递归的。”米尔嘉说道，“换言之，就是相容、能研究自然数、能够机械性地判断逻辑公式的序列是正确的形式证明。虽然哥德尔的论文中使用了比‘相容性’更强的‘ω相容性’这一条件，但是罗赛尔￼证明了可以弱化这一条件，只取相容性。”","chapter":"10.3 哥德尔不完备定理","color":5},{"text":"“哥德尔第二不完备定理不是关于‘数学本身’的定理，充其量只是一个关于‘满足某个条件的形式系统’的定理。”\n“看来不能随随便便就把‘数学’和‘形式系统’划等号啊。”\n“而且，”米尔嘉继续说道，“无法从形式上证明的是‘自身的相容性’。也就是说，满足某个条件的形式系统无法从形式上证明该系统本身的相容性。但是，在某些情况下还是能够从形式上证明其他系统的相容性的。”","chapter":"10.3 哥德尔不完备定理","color":5},{"text":"哥德尔第二不完备定理\n在满足某个条件的形式系统中，不存在“表示该形式系统自身相容性的语句”的形式证明。","chapter":"10.3 哥德尔不完备定理","color":5},{"text":"希尔伯特想通过“导入形式系统”来表示数学，再通过“证明相容性”来表示无法从形式上证明A和¬A两者都成立，然后通过“证明完备性”来表示能从形式上证明A和¬A至少有一方成立。可以说，他想向我们展示的就是“不存在形式证明的光芒照射不到的黑暗角落”。","chapter":"10.2 希尔伯特计划","color":5},{"text":"“如果你还没有明白，那么就算全世界的人都说‘明白了，很简单啊’，你仍然要鼓起勇气说‘不，我还不明白’。这一点很重要。就算别人再怎么明白，如果自己不明白，那也没有意义。要花时间来思考，思考到理解为止。这样得到的东西就一辈子都属于自己。谁也抢不走，认真学习，细心积累，会带给你自信。那种‘就算考试也不会焦虑’的自信。”","chapter":"5.2 若泰朵拉，则非尤里","color":5},{"text":"自反律、对称律、传递律合起来叫作等价律。此外，满足等价律的关系叫作等价关系。","chapter":"8.3 等价关系","color":5},{"text":"高一的春天，村木老师建议我“每天研究自己的数学”。那时候我认为，每天研究数学是理所当然的事儿。因为我喜欢数学。但是，高中生活是很忙碌的。有很多课程，每天都要预习、复习，还有考试。当然，还有学校的活动。在这种情况下，必须有一种“每天去研究自己的数学”的意识，才能坚持到底。因此，村木老师给我的意见很宝贵。","chapter":"8.2 家中","color":5},{"text":"哥德尔具体地构建了形式系统的形式系统，从数学角度证明了第一不完备定理。在该证明中，他把“把x对角化的语句中不存在形式证明”进行了对角化。也就是说，他构建了“把‘把x对角化的语句中不存在形式证明’对角化的语句中不存在形式证明”这个语句。然后，他通过调查这个语句本身是否存在形式证明，证明了第一不完备定理。","chapter":"7.2 形式系统的形式系统","color":5},{"text":"这就是“形式系统的形式系统”。\n形式系统\n（逻辑公式、证明……）↓\n算术↓\n（逻辑公式测定仪、证明测定仪……）↓\n形式系统\n（表示逻辑公式测定仪的逻辑公式、表示证明测定仪的逻辑公式……）","chapter":"7.2 形式系统的形式系统","color":5},{"text":"我们正在通过构建“逻辑公式测定仪”和“证明测定仪”等，来实现用“算术”表示“形式系统”。\n用“算术”表示“形式系统”。\n \n话说回来，我们一开始就提到过构建“算术的形式系统”。这指的就是，把“算术”通过“形式系统”来从形式上表示出来。\n用“形式系统”表示“算术”。\n \n把上述两项组合在一起，就能想到如下内容。\n用“算术”表示“形式系统”，再用“形式系统”表示这里的“算术”。","chapter":"7.2 形式系统的形式系统","color":5},{"text":"跟逻辑公式一样，形式证明也能定义哥德尔数。形式证明是“逻辑公式的有限序列”。因为用“自然数的有限序列”能表示逻辑公式，所以用“‘自然数的有限序列’的有限序列”就能表示形式证明。把上面那种将自然数的有限序列统合成一个自然数的方法连续用两次，就能像下面这样转换。因此，形式证明也能用“一个自然数”来表示。\n“自然数的有限序列”的有限序列→自然数的有限序列→自然数","chapter":"7.2 形式系统的形式系统","color":5},{"text":"形式系统\n——能用符号来写；\n符号\n——能用自然数来表示；\n自然数\n——能用算术来处理。\n \n“把这三个条件合起来，自然而然就能想到用‘算术’来处理‘形式系统’了。不过，我们能自然而然就想到，可能是因为我们身处于哥德尔之后的时代。”","chapter":"7.2 形式系统的形式系统","color":5},{"text":"哥德尔第一不完备定理（再换言之）\n在满足某个条件的形式系统中，存在满足以下两个条件的语句A。\n \n·该形式系统中不存在A的形式证明。\n·该形式系统中不存在¬A的形式证明。","chapter":"7.2 形式系统的形式系统","color":5},{"text":"哥德尔第一不完备定理（换言之）\n在满足某个条件的形式系统中，存在满足以下两个条件的语句A。\n \n·无法证明A成立。\n·无法证明¬A成立。","chapter":"7.2 形式系统的形式系统","color":5},{"text":"不完备的形式系统\n对于形式系统中的某个语句A，\nA和¬A两者在该形式系统中都无法证明成立时，我们就说，这个形式系统不完备。","chapter":"7.2 形式系统的形式系统","color":5},{"text":"相容的形式系统\n对于形式系统中的任意逻辑公式A，\n无法证明A和¬A两者在该形式系统中都成立时，\n我们就说，这个形式系统相容。","chapter":"7.2 形式系统的形式系统","color":5},{"text":"“我们需要注意泰朵拉刚才所说的‘正确的解释’。对解释进行思考是归在数理逻辑里的模型论这个范畴里的。确实，一旦我们定义了解释，也就给形式系统赋予了含义。但是，正确的解释不单单只有一个。对于一个形式系统，我们可以想到很多解释。解释不同，形式系统的含义也会发生变化。然而，还是存在常用的标准解释的。”","chapter":"7.2 形式系统的形式系统","color":5},{"text":"“不管看多少次‘无限接近’这个词，我们也回答不了这些问题。或者说，答案可能会因人而异。这是因为，‘无限接近’这个词的含义一开始就很不明确。因此，我们要做的是，用式子来准确定义‘无限接近’这个词的含义。这是∈-N和∈-δ的目的。”","chapter":"6.1 数列的极限","color":5},{"text":"说到“语义学”时，她在黑板上写了个Semantics；说到“句法学”时则写了个Syntax。\n“简单来说，语义学就是使用真假值的方法。把真值或假值分配给命题，研究命题的关系。不过我们下面要用的是句法学。不用真假值，而是通过关注逻辑公式的形式来往下研究。总之，就是不思考含义，只思考形式。”","chapter":"5.3 若米尔嘉，则米尔嘉","color":5},{"text":"“负数？”米尔嘉问道。\n“Negative Number。”泰朵拉回答。\n“无理数？”\n“Irrational Number。”\n“虚数？”\n“Imaginary Number。”\n \n“否定的、不合理的、想象中的……”米尔嘉从座位上站起来，“这些英语单词充分体现了人类面对全新概念时产生的犹豫。”","chapter":"3.3 无限","color":5},{"text":"出错了、不合逻辑——之所以会陷入这种泥潭，是因为碰上了前所未有的概念。我们可以认为自己失败了，然后折返。不过，我们也可以认为这是一个新的发现，然后继续前进。\n在扩展概念时，人们经常会碰到这种情况。\n \n· 不存在加1后等于0的自然数。\n——那就将其作为负数-1的定义。\n· 不存在平方后等于2的有理数。\n——那就将其作为无理数￼的定义。\n· 不存在平方后等于-1的实数。\n——那就将其作为虚数单位i的定义。\n· 在整体跟部分之间存在双射。\n——那就将其作为无限集合的定义。\n \n扩展概念时的困难之处就在于“飞跃前的停滞”。","chapter":"3.3 无限","color":5},{"text":"集合￼逻辑\n集合A={x|P}￼命题P\n集合B={x|Q}￼命题Q\n公共部分A∩B￼逻辑与￼P∧Q（P且Q）\n并集A∪B￼逻辑或￼P∨Q（P或Q）\n全集U￼真\n空集￼假\n补集￼否定¬P（非P）\n","chapter":"3.2 逻辑","color":5},{"text":"集合以‘属于或不属于’为基础，逻辑则以二选一式的‘真或假’为基础。如果抛开集合的外延表示法，从内涵表示法来考虑，集合跟逻辑的关系就很清楚了。在集合的外延表示法中……","chapter":"3.2 逻辑","color":5},{"text":"用皮亚诺公理可以定义自然数集。定义自然数用到的是‘集合跟逻辑’。皮亚诺是想用集合跟逻辑来建立数学的基础。","chapter":"2.3 在无数脚步之中","color":5}],"thoughts":[{"text":"因为 The map is not the territory. All models are wrong.","quote":"如果人们在思考了含义的基础上进行论证，根据就会变得不明确。","chapter":""},{"text":"来自ChatGPT:\n皮亚诺提出这些公理的主要目的是为了建立一套完备、一致、无矛盾的数学基础。在19世纪末，随着数学的发展，人们意识到需要一个更加精确、严密的数学基础来支撑数学研究。然而，在当时的数学中存在一些悖论和矛盾，例如狄利克雷函数、罗素悖论等，这些问题使得数学基础面临巨大的危机。\n为了解决这些问题，皮亚诺提出了一套基于逻辑和集合论的公理系统，用于定义自然数和基本运算。这些公理建立了自然数的基本性质和运算规则，从而使得数学研究变得更加系统化和精确化。此外，皮亚诺公理系统还包括了归纳原理，这一原理使得我们可以从简单的数学事实出发，推导出更加复杂的数学结论，从而建立了完整的自然数系统。\n皮亚诺公理系统的提出对于数学的发展产生了深远的影响，它奠定了现代数学的基础，为数学家们提供了一种通用的、精确的符号语言，使得数学研究变得更加系统化和精确化。","quote":"用皮亚诺公理可以定义自然数集。定义自然数用到的是‘集合跟逻辑’。皮亚诺是想用集合跟逻辑来建立数学的基础。","chapter":""}],"popularHighlights":[{"text":"“学习啊，最基本的就是要问自己‘我都不明白哪些地方呢？'”","count":64,"chapter":"3.4 表示"},{"text":"如果2的个数是奇数，就是符号序列；如果是偶数就是符号序列的序列","count":54,"chapter":"10.6 夏天——哥德尔数"},{"text":"19世纪，康托尔和戴德金也发现了这个数学事实，但他们没有像伽利略那么想。戴德金认为，整体和部分之间存在双射正是无限的定义。这是一场惊人的思维大颠覆。","count":51,"chapter":"3.3 无限"},{"text":"如果人们在思考了含义的基础上进行论证，根据就会变得不明确。","count":48,"chapter":"5.3 若米尔嘉，则米尔嘉"},{"text":"本来就是人为决定的事儿。","count":44,"chapter":"5.1 若尤里，则非泰朵拉"},{"text":"如果答了‘否’，那么因为他答了‘否’，所以他还在撒谎。","count":42,"chapter":"1.1 谁是老实人"},{"text":"米尔嘉用中指向上推了一下眼镜。","count":36,"chapter":"2.2 米尔嘉"},{"text":"句法学是基于与‘证明’的关系来思考公理的。公理指的是能在证明时无条件地使用的逻辑公式。也可以说，公理就是‘即使没有证明，也可以视为定理’的逻辑公式。","count":36,"chapter":"5.3 若米尔嘉，则米尔嘉"},{"text":"所以我们不能用自然数给0.333. . ．编号","count":36,"chapter":"7.1 数列的数列"},{"text":"谁是老实人？（当n＝1时） C1：“这里有1个人在说谎。”","count":34,"chapter":"1.1 谁是老实人"},{"text":"回答‘不知道’的那个人看到的2个人里，至少有1人的帽子是红色——这就像‘定理’一样呢。”","count":34,"chapter":"1.3 帽子是什么颜色"},{"text":"柔和的甜香——女生为什么会这么好闻啊。","count":34,"chapter":"2.1 泰朵拉"},{"text":"“因此，
