先生从Y市的旧货店买下我的椅子后，可悲的我便一直对您仰慕不已，奉献出无尽的爱。","count":850,"chapter":"第3章 人间椅子"},{"text":"后来他便癫狂地离世，因此我无法确定事实的真相。然而，他就是侵犯了镜球内部，才会自取灭亡。至少，直至今日我都无法放弃这样的结论。","count":850,"chapter":"第13章 镜地狱"},{"text":"除用餐和就寝外，女主人柔软的身体总是坐在我上方。因为这段时日，女主人总是关在书房里埋头写作。","count":825,"chapter":"第3章 人间椅子"},{"text":"形同小山包的青春痘顶端红得透亮，如一颗熟透即将爆裂的石榴，里面的脓水好像要争先恐后往外冲似的，漆黑的血糊恶心地往外渗漏。","count":792,"chapter":"第13章 镜地狱"},{"text":"庄太郎不折不扣地上演了一出“罪犯的愚行”。","count":735,"chapter":"第8章 飞灰四起"},{"text":"仔细想想，这确实是座坟墓，爬进椅子的同时，犹如披上隐身衣，从这人世间消失。","count":720,"chapter":"第3章 人间椅子"},{"text":"唐突去信，还望海涵。我平素即十分喜爱老师的作品，之前附寄的稿件是我生涩的创作，若老师能够一读，予以指教批评，实是不胜荣幸之至。","count":702,"chapter":"第3章 人间椅子"},{"text":"发生如此严重的大事，世界却满不在乎，兀自静寂，突如其来的悲伤，让他莫名地难以忍受。","count":689,"chapter":"第8章 飞灰四起"}]},"846500":{"rating":735,"ratingCount":240,"highlights":[{"text":"由于放弃了意义和目的问题，缩小了视野和目标，拘泥于字面意义因而无法理解对于近代早期思想来说如此根本的类比和隐喻，那种内在紧密关联的宇宙图景已经彻底瓦解。具有宽广的思想、活动、经验和专门技能的自然哲学家已经被专业化、专门化的技术科学家所取代。结果导致了一个与更广阔的人类文化和生存视野分离的科学领域。","chapter":"尾声","color":0},{"text":"促使近代早期自然哲学家研究自然之书—寻找造物主在受造世界中的反映—的深刻的宗教信仰动机，不再是科学研究的主要驱动力。那种恒常不变的历史认识，即认为自己属于一种长期累积的探究自然的传统，已经在很大程度上不复存在了。","chapter":"尾声","color":0},{"text":"由于科学院的建立以及技术应用在17世纪的重要性日益增加，在接下来几个世纪，科学工作逐渐专业化，“业余的”自然哲学家渐渐消失。由于日益需要一些知识渊博、值得信赖的人用科学知识和方法来解决实际问题，大学必须用更加正式和严格的训练来培养这些人，这又导致了思想和进路的进一步标准化。由此累积的结果便是19世纪出现了作为一种职业的“科学”，作为一个独特的社会和职业阶层的“科学家”","chapter":"科学院以外的科学群体","color":0},{"text":"这个无形的“书信共和国”（文艺复兴时期人文主义者的一则习语）将跨越国界、语言和信仰的志同道合的思想家团结在一起，拉近了他们之间的距离。","chapter":"科学院以外的科学群体","color":0},{"text":"并于1662年获得皇家特许状，成为改进自然认识的伦敦皇家学会","chapter":"科学社团的兴起","color":0},{"text":"而到了16世纪末，自然哲学家将模式扩大，由此兴起了第一批科学社团。最早的科学社团创立于意大利，17世纪成立了数十个，数量多于欧洲所有其他地方。","chapter":"科学社团的兴起","color":0},{"text":"三个特征对于现代科学的运作必不可少。这些特征在科学革命时期的确立对于构建我们今天所知的科学世界至关重要。从整个17世纪一直到18世纪，自然哲学家的工作变得越来越正式化。个人结合成私人协会，私人协会又逐渐演变成国家科学院。个人的通信交流发展成为出版的期刊。自费的业余研究者和以大学为基础的自然哲学家结合成第一批拿薪水的专业人士。","chapter":"科学社团的兴起","color":0},{"text":"至关重要的是，培根思索的不仅是自然哲学的方法和目标，还有其体制结构和社会结构。他坚持认为，必须用合作的集体活动取代独自做学术研究的过时理想。","chapter":"人工世界","color":0},{"text":"充分收集原始材料之后，自然哲学家就可以将其结合在一起，通过归纳过程提出越来越普遍的原理。","chapter":"人工世界","color":0},{"text":"自然哲学应当具备操作性而非思辨性—应当做事情，制造东西，赋予人类以力量。他认为，印刷术、指南针和火药等所有技术成果构成了人类历史中最具变革性的力量。因此，培根呼吁“彻底重建科学、艺术和所有人类知识”。","chapter":"人工世界","color":0},{"text":"这寥寥几个例子表明，技术应用与科学发现有着千丝万缕的联系，两者相互驱动和促进。“纯粹”科学与“应用”科学的对立并不适用于17世纪。如果贬低实际需要—无论是军事、经济、工业、医疗还是社会政治方面的需要—对于促进科学革命发展的重要性，将会与真实的历史情形背道而驰。","chapter":"人工世界","color":0},{"text":"事实上，虽然培根对自然魔法的形而上学基础表示了怀疑，但他称赞了魔法，因为魔法“主张要把自然哲学从各种思辨召回到重要的具体工作”。自然哲学应当具备操作性而非思辨性—应当做事情，制造东西，赋予人类以力量。他认为，印刷术、指南针和火药等所有技术成果构成了人类历史中最具变革性的力量。因此，培根呼吁“彻底重建科学、艺术和所有人类知识”。","chapter":"人工世界","color":0},{"text":"对新世界的期待促进了制图学和航海的发展。","chapter":"人工世界","color":0},{"text":"科学革命的一个基本特征是越来越多地利用数学来研究世界","chapter":"人工世界","color":0},{"text":"军事技术在15世纪发生了转变，火药的使用日益增多，轻便的青铜大炮也被制造出来，这一切都使中世纪的防御工事变得过时—其屹立的城垛正是火炮的极好目标。","chapter":"人工世界","color":0},{"text":"在文艺复兴时期的意大利，新的宏伟工程改变了自然和城市的面貌。运河和供水系统占用了新的土地，提供了饮用水和运输路线。","chapter":"人工世界","color":0},{"text":"16、17世纪发生了一次特殊的转向，即用科学研究和科学知识来解决当时的问题，满足当时的需求。","chapter":"第六章 科学世界的建立","color":0},{"text":"科学不只是关于自然界的研究和知识积累。从中世纪晚期至今，科学知识被越来越多地用于改变这个世界，赋予人类更大的能力控制世界，并且创造出新的世界让我们居住，我们似乎与自然界渐趋疏离。","chapter":"第六章 科学世界的建立","color":0},{"text":"对新药物的寻求促进了对新植物的研究，也因此促进了植物园的建立，它们通常附属于大学的医学院。在整个中世纪，药用植物园一直是修道院的一部分，新的植物园在此基础上建立起来，并且为了教学和研究的目的而扩展。","chapter":"植物和动物","color":0},{"text":"动植物既是自然物又是象征，后者依赖于对世界的想象，这个世界有多层意义，既是由字面意义又是由隐喻意义构成的，充满了有待解读的象征性寓意。","chapter":"植物和动物","color":0},{"text":"17世纪出现的最全面的新医学体系也许是佛兰德斯的贵族、医生、化学家和自然哲学家海尔蒙特（1579—1644）的学说。海尔蒙特将化学、医学、神学、实验和实践经验结合成一个连贯的、极有影响的体系。他的自述表达了对传统学问的不满和对追求新知的渴望，这是科学革命时期思想家的典型态度。","chapter":"海尔蒙特的学说","color":0},{"text":"对植物和动物的研究—我们今天所谓的植物学和动物学—在16、17世纪大大扩展。","chapter":"植物和动物","color":0},{"text":"现代读者也许会认为这些文本“离奇”、轻信或充斥着“非科学的琐事”，但当初的读者很可能会认为现代植物学和动物学的描述性文本枯燥乏味，而且古怪地脱离了与人类的关系。","chapter":"植物和动物","color":0},{"text":"然而，现代读者会觉得这类著作很怪异，因为它们将关于各物种的自然主义细节描述，与自古以来针对每一种动植物累积起来的大量文学、词源学、圣经、道德、神话学和隐喻含义混杂在一起。","chapter":"植物和动物","color":0},{"text":"17世纪出现的最全面的新医学体系也许是佛兰德斯的贵族、医生、化学家和自然哲学家海尔蒙特（1579—1644）的学说。海尔蒙特将化学、医学、神学、实验和实践经验结合成一个连贯的、极有影响的体系。他的自述表达了对传统学问的不满和对追求新知的渴望，这是科学革命时期思想家的典型态度","chapter":"海尔蒙特的学说","color":0},{"text":"现代人常常嘲笑自然生成说，但需要指出的是，当时任何近代科学家只要不相信第一个生命形式是通过上帝的奇迹介入而特创的，就只能相信生命是从非生命物质中自然生成的。","chapter":"显微镜、机械论和生成","color":0},{"text":"列文虎克本人支持预成论，主张新生后代的微小版本存在于各自的精子中，或者根据一些同时代人的说法，存在于各自的卵中。与此相反的渐成论则主张，胚胎结构是在妊娠期间的各个阶段重新产生的。","chapter":"显微镜、机械论和生成","color":0},{"text":"安东尼·范·列文虎克（1632—1723）是荷兰代尔夫特的一名布商和测绘员，他设计了当时最简单且最强大的放大镜。","chapter":"显微镜、机械论和生成","color":0},{"text":"到了1300年左右，作为教学的一部分，医科学生必须观察人体解剖。认为天主教会禁止人体解剖不过是19世纪的一则毫无依据的谎言。当时人体解剖的主要限制因素是尸体短缺。由于体面的人不允许自己或其亲属的尸体在观众面前被陈列和切割，解剖用的尸体主要来自于死刑犯，特别是外国死刑犯。","chapter":"解剖学","color":0},{"text":"与现代医疗迥异的是，有些治疗需要签订合同，换言之，医生的报酬依赖于治疗效果。","chapter":"医学","color":0},{"text":"大脑是一个冷而湿的器官，它受月亮—一颗冷而湿的行星—的影响最大。[因此，大脑失常的人今天依然被称为lunatic（精神失常）—来自拉丁词luna（月亮）—或者更通俗地说是moony（发狂的）]。","chapter":"医学","color":0},{"text":"从我们现代的角度来看，很难想象近代早期会发展出如此众多关于基本问题和方法的不同观点和进路，也很难想象越来越多的自然哲学家会以如此的热忱富有成果地探索他们的世界，并且设计出大大小小的体系来尝试理解所有这一切。16、17世纪之所以的确是“革命性的”，这是一个重要原因。","chapter":"不断演进的亚里士多德主义","color":0},{"text":"在其支持者看来，经院哲学仍然是一种有用而灵活的自然研究方法。他们虽然对17世纪的许多创新持保守态度，但仍然是科学革命的积极参与者和贡献者。","chapter":"不断演进的亚里士多德主义","color":0},{"text":"17世纪各种“新”哲学的支持者经常用严厉的措辞讽刺和批判亚里士多德主义，但其他自然哲学家始终处于“亚里士多德主义”框架内，继续更新着系统，做着卓有成效的工作。","chapter":"不断演进的亚里士多德主义","color":0},{"text":"有一种关于科学革命的解释是，科学革命完全是对一种垂死的经院亚里士多德主义的拒斥。","chapter":"不断演进的亚里士多德主义","color":0},{"text":"牛顿主义的胜利其实意味着严格机械论的失败。","chapter":"原子论和机械论","color":0},{"text":"机械论哲学在17世纪末逐渐衰落。玻意耳变得不那么热衷于它，因为他意识到这一哲学的过度扩展可能会导致决定论、唯物论和无神论。假如世界仅仅是一些相互碰撞的微粒，那么自由意志或神意将没有位置。","chapter":"原子论和机械论","color":0},{"text":"机械论观点反映了当时日益增长的技术能力，对世界的理解渐渐从活的生物模型变成了无生命的机器。这种观点甚至导致了对上帝本身的重新理解。上帝不再是一个几何学家、化学家或建筑师，而是越来越被看成一位机械师或钟表匠，一个对世界机器进行设计和组装的技师。","chapter":"原子论和机械论","color":0},{"text":"这种观点从根本上反对亚里士多德看待世界的方式，在亚里士多德的世界观中，可感性质实际存在于物体之中，对于解释物体的性质和效应起着至关重要的作用。","chapter":"原子论和机械论","color":0},{"text":"机械论哲学认为，所有可感的性质和现象都源于不可见的物质微粒（有时也被称为原子、微粒，或径直称为粒子）的大小、形状和运动。","chapter":"原子论和机械论","color":0},{"text":"制金是化学的一个关键要素，但并不涉及（现代意义上的）“魔法”，而是一种理论基础与我们不同的活动。流传下来的一些笔记记录了“炼金术士”的日常操作，往往显示出关于实验操作、文本解释、观察和理论表述方面的细致方法论。","chapter":"火：化学家的工具","color":0},{"text":"化学操作为这些“原子”提供了最好证据。","chapter":"火：化学家的工具","color":0},{"text":"事实上，整个化学在大多数时间都存在于传统的学术机构之外，地位很是尴尬。物理学和天文学从中世纪以降就是大学必须研究的科目，但化学直到18世纪才获得了学术地位。其中一个原因是，它无法夸耀其古典根源，无论是亚里士多德还是任何其他古代权威都没有写过化学论著，这一点不同于天文学、物理学、医学和生命科学。化学与商业和人工制品有密切关联，具有实用性，而且往往混乱不堪、艰苦费力、气味难闻，这些都使化学无法令人尊敬。然而，注重实用性的实验也意味着化学能够收集大量材料，认识它们的属性，掌握处理它们的能力。","chapter":"火：化学家的工具","color":0},{"text":"人们观察到，银矿石中含有一些金，铅矿石中含有一些银，这暗示嬗变是在地下自然发生的，成分不佳的复合金属被净化或“催熟”为更加稳定、成分更好的金属。问题是如何通过人工手段更快地实现这种转变。于是，制金者试图制备他们所谓的“哲人石”，这是一种引发嬗变的物质动因。","chapter":"火：化学家的工具","color":0},{"text":"实验，尤其是对结果的解释，是一件复杂而可能引起争议的事情，过去是如此，将来也是如此。","chapter":"水和空气","color":0},{"text":"值得注意的是，伽利略只满足于用数学来描述运动，而不关心运动的原因。伽利略工作的这个特征与亚里士多德科学有根本不同，对于后者而言，真正的知识是关于原因的知识。","chapter":"地球上的运动","color":0},{"text":"伽利略主张把物理世界还原为数学抽象，并最终还原为公式和算法，这一技巧对新物理学的产生发挥了关键作用，是科学革命的一个显著特征。","chapter":"地球上的运动","color":0},{"text":"伽利略要走得更远，他将数学抽象与实验观察紧密联系了起来。","chapter":"地球上的运动","color":0},{"text":"从方法论上讲，伽利略忽略的东西与他关注的东西同样重要。他描述运动时从来也不关注什么东西在运动，无论是一个球、一块铁还是一头牛。简而言之，他忽略了亚里士多德物理学所强调的物体的质。伽利略注重的是它们的量，它们在数学上可抽象的性质。通过剥离物体的形状、颜色、构成等特征，伽利略对物体的行为作了理想化的数学描述。","chapter":"地球上的运动","color":0},{"text":"哥白尼学说的支持者必须找到一种新物理学，从混乱中整理出秩序。一旦声称地球有磁极，吉尔伯特便强调这些磁极定义了一个真实的物理轴。既然自然中的一切事物都有目的，吉尔伯特认为这个轴的目的是为地球的自转作准备。","chapter":"地球","color":0},{"text":"牛顿的万有引力定律最终消除了以往关于地界物理学与天界物理学之区分的最后一抹痕迹—行星运转与苹果下落服从的是同一个定律。","chapter":"望远镜和地球的运动","color":0},{"text":"同样，牛顿之所以钻研古代年代学，部分程度上也是为了获得可靠年代以解释《圣经》关于世界末日的预言。这里我们再一次回到了自然哲学（与现代科学相比）更加宽泛和全面的看法。牛顿认为“自然哲学的任务是恢复关于整个宇宙体系的知识，包括作为造物主和永恒动因的上帝”。","chapter":"望远镜和地球的运动","color":0},{"text":"牛顿或许以不同于往常的谦逊认为自己仅仅是重新发现了万有引力定律，古代人对此早已知晓。这是因为牛顿信奉古代智慧（priscasapientia），文艺复兴时期的许多人文主义者都持有这种看法，认为神在太古时期揭示了一种“原初智慧”，之后随时间而逐渐败坏。牛顿试图阐释希腊神话、《圣经》段落和赫尔墨斯著作，以表明其中蕴藏着关于世界隐秘结构的思想，包括他本人的平方反比引力定律。","chapter":"望远镜和地球的运动","color":0},{"text":"并非所有人都为此欢欣。通过复兴引力的观念，牛顿似乎使一种沉寂了约70年的想法死灰复燃。一种不可见、非物质的力可以在一切物体之间发生作用而没有任何机制或明显原因，这不仅比物质性的笛卡尔涡旋更难以理解，而且在许多人看来是又回到了亚里士多德主义者所说的“隐秘性质”或自然魔法中的共感。","chapter":"望远镜和地球的运动","color":0},{"text":"究竟哪一个体系是正确的，与教会本无直接利害关系；地心说和亚里士多德主义都不是教会的教条。然而，《圣经》解释的确与教会休戚相关，不仅地球运动对解释《圣经》有所暗示，而且伽利略在17世纪10年代初为了支持自己的观点更是莽撞地涉足其中。这种对《圣经》的随意解读就像是当时的新教为了拒斥传统解释而许可教徒作出对自己有利的解读。结果，1616年教会要求伽利略把日心说和地球运动的观点当作假说，在找到强有力的证据之前不得认为它们真正正确；","chapter":"望远镜和地球的运动","color":0},{"text":"在科学史上，“伽利略与教会”这一情节变成了最大的神话，遭到了最严重的误解。这些事件缘于一系列纠缠不清的思想、政治和私人因素，它们极为错综复杂，历史学家至今仍在试图厘清。这并不单单是“科学与宗教的冲突”问题。教会内外兼有伽利略的支持者和反对者。与事件有密切关系的因素包括：情感受到冒犯、政治上的阴谋、解释《圣经》的资格、未占天时地利以及被不同教派裹挟。","chapter":"望远镜和地球的运动","color":0},{"text":"伽利略观测到了新月形的金星和满的金星，这表明金星必定时而处于我们和太阳之间，时而远在太阳的另一侧，简而言之，金星围绕太阳运转。从此以后，天文学家只能在第谷体系与哥白尼体系之间进行选择（图7）。于是，这两个体系之间唯一的分歧，即地球是否运动，就成了天文学家最为关切的问题。","chapter":"望远镜和地球的运动","color":0},{"text":"开普勒及其同时代人援引自然之书和《圣经》这两本大书的观念，确信上帝在创造的世界中植入了有待人们发现的讯息。于是，在自然之书中解读出讯息这一神学动机为整个近代早期的科学研究提供了最大的驱动力。","chapter":"天界变化与神圣和谐","color":0},{"text":"占星学是一项严肃而精深的活动，其基本想法是天体会对地界产生某些影响—这是关联世界观的关键一环。","chapter":"实践天文学，或占星学","color":0},{"text":"天文学（字面意思是“星体的法则”）测量和计算天体的位置，并提出假说性的宇宙论体系；而占星学（字面意思是“对星体的研究”，与地质学、生物学等类似）则致力于解释和预言天体对地界的影响。","chapter":"实践天文学，或占星学","color":0},{"text":"对于大多数人而言，实际结果比理论更重要。要想理解这一点，我们需要意识到，早在托勒密时代之前，天文学研究背后的主要驱动力就一直是占星学，而占星学是很实际的，需要计算出行星在多年以前或多年以后精确到分的位置。","chapter":"近代早期的天文学模型","color":0},{"text":"负责。奥西安德尔完成了出版工作，《天球运行论》终于在1543年问世—哥白尼在临终前看到了这本书。该书的问世并没有招来哥白尼担心的那种批评。不少人读了它，但几乎没有人真正相信。直到16世纪末，坚定的哥白尼主义者可能不过十几人。这是为什么？因为哥白尼的日心体系并不比地心体系更好地符合观测数据，在物理上也没有更简单。","chapter":"近代早期的天文学模型","color":0},{"text":"事实上，在很长一段时间里，天文学的发展代表着科学革命时期的唯一叙事，并且是这一时期被称为“革命”的主要原因。","chapter":"第三章 月上世界","color":0},{"text":"在16、17世纪和中世纪，并没有一个“科学家”阵营在奋力摆脱“宗教人士”的镇压，这些不同阵营根本就不存在。","chapter":"科学研究的宗教动机","color":0},{"text":"圣奥古斯丁和其他早期基督教作家阐述了这种想法，认为上帝以两种不同方式向人类显示自己—一是启示人写出《圣经》，二是创造这个世界即“自然之书”。和《圣经》一样，我们周围的世界是需要进行解读的神圣讯息，敏锐的读者通过研究受造世界可以远为深入地了解造物主。","chapter":"科学研究的宗教动机","color":0},{"text":"我们的前人所做的，是对看起来类似的各种神秘自然现象作出观察，并由此将世界中的各种关联和作用传递推广为一种更普遍的说法—一种自然法则。这种推广导出了他们坚持而我们不认同的一个信条，即那些相似或类似的物体正在静静地彼此施加影响。","chapter":"从厨房到书房的实践“控制”","color":0},{"text":"因此，类比论证所具有的特殊力量和明证性超出了我们今天的习惯看法。这种联系的确实性乃是基于一种不可动摇的信念，即相信宇宙不是随机或偶然的，而是充满着意义和目的，它由神的智慧和意志以多种方式引导，最终是为了人类的利益。这种确定性以及随之而来的对类比推理的运用并非为那些对自然魔法感兴趣的人所独有，而是属于这一时期几乎每一位严肃的思想家。","chapter":"自然“魔法”","color":0},{"text":"到了19世纪，自然哲学观念逐渐让位于更加专业化的狭窄“科学”视角，“科学家”一词正是在此时期被创造出来。如果不时刻牢记自然哲学的独特性，就不可能正确理解或欣赏近代早期自然哲学家的工作和动机。他们的问题和目标并不一定是我们的问题和目标，即使研究的是同样的自然对象。因此，我们撰写科学史时绝不能把那些科学上的“第一次”从历史背景中抽离出来，而只能通过历史人物的眼睛和心灵去审视它们。","chapter":"第二章 关联的世界","color":0},{"text":"关键的一点是，亚里士多德意义上的知识，特别是关于动力因和目的因的知识，在物体相对于其他物体的关系背景下对物体作出了定义。","chapter":"第二章 关联的世界","color":0},{"text":"对于柏拉图而言，将人的小宇宙与行星的大宇宙联系起来有一种实际的道德意义—我们应把天界有序而合理的运作视为指导，以一种有序、合理的方式来支配自己。对于近代早期的欧洲人而言，小宇宙—大宇宙的联系首先有一种医学意义—它是医学占星术的基础。","chapter":"第二章 关联的世界","color":0},{"text":"近代早期思想家看到的世界是真正希腊意义上的宇宙（cosmos），即一个秩序井然、恰当安排的整体。在他们眼中，物理宇宙的各个组成部分彼此密切交织在一起，并且与人和神紧密相关。他们的世界织成了一张关联和相互依存的复杂网络，它的每一个角落都充满了目的、密布着意义。因此对他们而言，研究世界不仅意味着揭示其内容事实并加以分类，而且意味着揭示其隐秘设计和无声的寓意。这种看法与现代科学家形成了鲜明的对比，日益专业化使现代科学家只关注那些狭窄的研究主题和孤立的对象，其方法强调切割而不是综合，其态度主动排除了意义和目的问题。现代研究方法成功地揭示了关于物理世界的大量知识，但也造就了一个脱节的、支离破碎的世界，使人类感到疏离和孤立于宇宙。几乎所有近代早期自然哲学家都持有一种更为广泛和无所不包的世界观，他们的动机、问题和做法正是源于这种视野。因此，要想理解他们研究世界的动机和方法，就必须理解他们的世界观。","chapter":"第二章 关联的世界","color":0},{"text":"1540年，圣依纳爵·罗耀拉在教皇的授权下建立了耶稣会，耶稣会士们尤其致力于教育和学术，在科学、数学和技术等领域做出了重要贡献。","chapter":"基督教改革","color":0},{"text":"1507年，一位德国制图师根据意大利探险家亚美利哥·韦斯普奇的名字给这块新大陆命名为亚美利加。","chapter":"航海大发现","color":0},{"text":"没有人认为哥伦布会“航行到地球边缘掉下去”，因为早在哥伦布之前1500多年，地球的球形观念已在欧洲牢固确立。说哥伦布之前的人都认为地球是平的，这是19世纪的发明。中世纪的人会对这种想法捧腹大笑！","chapter":"航海大发现","color":0},{"text":"印刷的一个容易被忽视的特点是它能够复制图像和图表。","chapter":"印刷术的发明","color":0},{"text":"从抄写到印刷的过渡并非一蹴而就。手稿仍然和书籍并存，虽然手稿的使用越来越多地局限于私人的、稀有的或特许的材料。印刷字体模仿手稿书写；在北欧，这意味着用哥特字体印刷书籍，但意大利（特别是威尼斯）很快就成了印刷业的中心。意大利印刷工泰奥巴尔多·曼努奇[其拉丁化的人文主义名字马努提乌斯（1449—1515）更为人所知]采用了意大利人文主义者发明的更为干净清晰的字母形状（他们认为模仿了罗马人的书写方式），由此创造的字体不仅取代了旧字体，而且也是今天使用的大多数字体的基础；因此，我们优雅的斜体仍然被称为“意大利体”（Italic）。","chapter":"印刷术的发明","color":0},{"text":"人文主义的兴起。由于难以对人文主义作出简洁而严格的定义，我们最好谈及复数的人文主义（humanisms）—思想、文学、社会政治、艺术和科学上的一些彼此相关的潮流。人文主义者持有一种非常普遍的信念，认为自己生活在一个兼具现代性和新颖性的新时代，这个新时代应当结合古代人的成就加以衡量","chapter":"人文主义","color":0},{"text":"拉丁欧洲的第二次“重生”范围更广，持续时间更长。尽管强度逐步减弱，但其势头一直持续到意大利文艺复兴开始。这次“重生”即所谓的“12世纪文艺复兴”，科学、技术、神学、音乐、艺术、教育、建筑、法律和文学中的创造力喷薄而出","chapter":"文艺复兴及其中世纪起源","color":0},{"text":"第一次是加洛林文艺复兴，发生在公元8世纪末查理曼的军事征服之后，它使中欧在公元9世纪的大部分时间里更为稳定。","chapter":"文艺复兴及其中世纪起源","color":0},{"text":"我们不应低估15世纪意大利文艺复兴时期的辉煌及其对历史和现代文化的重要性。但也应该记住，这并非公元5世纪罗马帝国陷落、古典文明灭亡之后欧洲文化的第一次重要繁荣。至少有两次更早的“复兴”或“重生”。","chapter":"文艺复兴及其中世纪起源","color":0},{"text":"理解科学革命首先要知道它在中世纪和文艺复兴时期的背景。特别是在15世纪，欧洲社会发生了重大变化，欧洲的眼界无论在字面意义上还是比喻意义上都大为拓宽。四个关键事件或运动从根本上重新塑造了16、17世纪的人所生活的世界：人文主义的兴起、活字印刷术的发明、地理大发现和基督教改革。虽然不是严格意义上的科学发展，但这些变化为这一时期的思想家重新塑造了世界。","chapter":"第一章 新世界和旧世界","color":0}],"thoughts":[{"text":"毕生心血被冠之以这样一篇序言，还未署名，的确会气得吐血。","quote":"即使哥白尼当时没有中风，他读到奥西安德尔的序言时多半也会。","chapter":""},{"text":"科学从哲学发展中分化出来，逐渐建立起各门学科，而关于宇宙的目的、意义等形而上学之事仍留待哲学来思考和解答。","quote":"此对他们而言，研究世界不仅意味着揭示其内容事实并加以分类，而且意味着揭示其隐秘设计和无声的寓意。这种看法与现代科学家形成了鲜明的对比，日益专业化使现代科学家只关注那些狭窄的研究主题和孤立的对象，其方法强调切割而不是综合，其态度主动排除了意义和目的问题。现代研究方法成功地揭示了关于物理世界的大量知识，但也造就了一个脱节的、支离破碎的世界，使人类感到疏离和孤立于宇宙。几","chapter":""},{"text":"正因为有这样的对古典学术的膜拜之情，珍惜之情，才能造就这样的文艺复兴。","quote":"据说曾有一箱手稿在运输过程中丢失，瓜里诺达因此过于悲伤而一夜白头。","chapter":""},{"text":"原文：The intellectual appetite of a reawakened Europe found rich fare on which to feed in the Muslim world. 这一比喻表达显然更优美。","quote":"觉醒的欧洲在穆斯林世界找到了丰富的思想资源。","chapter":""}],"popularHighlights":[{"text":"没有人认为哥伦布会“航行到地球边缘掉下去”，因为早在哥伦布之前1500多年，地球的球形观念已在欧洲牢固确立。说哥伦布之前的人都认为地球是平的，这是19世纪的发明。中世纪的人会对这种想法捧腹大笑！","count":104,"chapter":"航海大发现"},{"text":"耶稣会对于研究科学和数学的态度表达了它的座右铭：“在万事万物中找到神。”","count":98,"chapter":"基督教改革"},{"text":"对于现代人来说，magia（魔法）最好的译法也许是“控制”（mastery）。践行魔法者被称为魔法师（magus），其目标是学习和控制内嵌于世界中的各种关联，以便出于实际目的对其进行操纵。","count":90,"chapter":"自然“魔法”"},{"text":"对于近代早期的人而言，并没有什么严格的壁垒使科学、人文学科和神学彼此隔绝，它们形成了探索和理解世界的环环相扣的方法。","count":75,"chapter":"第二章 关联的世界"},{"text":"事实上，在很长一段时间里，天文学的发展代表着科学革命时期的唯一叙事，并且是这一时期被称为“革命”的主要原因。","count":75,"chapter":"第三章 月上世界"},{"text":"我们很容易使科学发展变得过于抽象和理性，而忘记了科学往往由紧迫的实际问题所驱动。","count":75,"chapter":"地球上的运动"},{"text":"但每隔一段时间，行星就会慢下来，停住不动，转而朝相反方向自东向西运行。这种现象被称为逆行。再过一段时间，行星再度停下来，掉转方向继续常规的运动。","count":72,"chapter":"观测背景"},{"text":"科学革命—大约从1500年到1700年—是科学史上讨论最多的、最重要的时期。","count":65,"chapter":"引言"},{"text":"事实上，关于公元500年到1300年这一时期的所有名称无不充斥着意大利人文主义者对它的鄙视，就此而言，文艺复兴时期最为持久的发明也许就是“中世纪”这一概念。","count":56,"chapter":"人文主义"},{"text":"（1455年印出的古腾堡《圣经》价格为30弗罗林，比一个熟练工匠一年的工资还要多。）","count":56,"chapter":"印刷术的发明"},{"text":"1200年左右，这些激增的知识变成了大学中的课程，而大学也许是中世纪为科学和学术所留下的最为持久的遗产。","count":54,"chapter":"文艺复兴及其中世纪起源"},{"text":"近代早期的世界中充满了意义与目的，其中一切事物都有某种讯息需要解读。","count":54,"chapter":"天界变化与神圣和谐"},{"text":"即使是看到血腥场面时不自觉地转头这一反射动作，也要通过尖的微粒流会伤害眼睛来解释。","count":54,"chapter":"原子论和机械论"},{"text":"具有特殊意义的是，他们选择翻译的文本几乎都是科学、数学、医学和哲学领域的文本。","count":51,"chapter":"文艺复兴及其中世纪起源"},{"text":"他建议读者“大力对事物进行探究；既要积极认真研究，又必须耐心等待。……必须不遗余力地做事，因为自然的奥秘不可能透露给懒惰的闲人”。","count":51,"chapter":"从厨房到书房的实践“控制”"},{"text":"诊断也依赖于尿液检查，便携的参考图列出了一览表，显示了病人尿液的颜色、气味、浓度甚至是味道以及这些指标与不同疾病的关系。脉搏的快慢、节奏和强度也是如此。","count":51,"chapter":"医学"},{"text":"现代研究方法成功地揭示了关于物理世界的大量知识，但也造就了一个脱节的、支离破碎的世界，使人类感到疏离和孤立于宇宙。","count":48,"chapter":"第二章 关联的世界"},{"text":"外壳中的核桃仁看起来很像颅骨中的大脑。这是否暗示着核桃补脑呢","count":48,"chapter":"自然“魔法”"},{"text":"丹麦自然哲学家奥勒·罗默（1644—1710）注意到，当木星距离地球最远时，这一误差达到最大，遂于1676年提出光速是有限的（食的表观延迟缘于光在空间中的传播时间），从而使粗略测量光速成为可能。","count":48,"chapter":"人工世界"},{"text":"自然哲学应当具备操作性而非思辨性—应当做事情，制造东西，赋予人类以力量。他认为，印刷术、指南针和火药等所有技术成果构成了人类历史中最具变革性的力量。因此，培根呼吁“彻底重建科学、艺术和所有人类知识”。","count":48,"chapter":"人工世界"}]},"857735":{"rating":822,"ratingCount":931,"highlights":[{"text":"我记得爱默生说过，语言就是诗歌化石（fossil poetry）。他说过每一个词都是一个隐喻。这一点你只要在词典中查一下某个词就能核实。所有的词汇都是隐喻——或诗歌化石。这本身就是一个出色的隐喻。","chapter":"11 面对镜子我始终心怀恐惧","color":0},{"text":"每个诗人都要适用他自己的音乐，也几乎要运用一种他个人的语言。在一位伟大的诗人穿越过一种语言之后，这种语言就再也不同于从前了。有些东西发生了变化。","chapter":"10 噩梦，这梦之虎","color":0},{"text":"事实上美国至少向世界贡献了三个人，没有他们，今天的一切都不会是这个样子。这几个人中首推惠特曼，其次是坡，至于第三位，我要推罗伯特·弗罗斯特。","chapter":"10 噩梦，这梦之虎","color":0},{"text":"我个人认为，所有的作家都是在一遍一遍地写着同一本书。我猜想每一代作家所写的，也正是其他世代的作家所写的，只是稍有不同。我觉得一个人仅凭他自己不可能改天换地，另起炉灶，因为他毕竟要使用一种语言，而这语言就是传统。","chapter":"10 噩梦，这梦之虎","color":0},{"text":"这真是各个时代各个地方所有人的思想，它们并非源于我，\n如果这些思想不是像属于我一样属于你们，那么它们就一钱不值或几乎如此，\n如果它们不是谜语或谜底的揭示，那么它们就一钱不值，\n如果它们不是像近在咫尺一样又远在天边，那么它们就一钱不值。\n这便是凡有陆地和水的地方皆有青草生长，\n这便是浸浴着地球的普遍存在的大气。","chapter":"10 噩梦，这梦之虎","color":0},{"text":"当今作家管这叫“呕吐”。","chapter":"9 我总是把乐园想象为一座图书馆","color":0},{"text":"在长期的生活中也许友谊比爱情更重要。或者说，也许爱情的职责、爱情的义务就是变成友谊。如果不是这样，它就会让我们的关系半途而废。","chapter":"8 时间是根本之谜","color":0},{"text":"据我个人的看法，自由意志是一种幻觉，但却是一种必需的幻觉。","chapter":"6 但我更偏爱做梦","color":0},{"text":"是的，我按照斯宾格勒￼的观点来思考西方的衰落。但就我所知，我们也许能为远东所救，比如为日本所救。我们更应该努力自救，这样更好。","chapter":"5 人群是一个幻觉","color":0},{"text":"我不是在对他们说话。我是在同你们每一个人说话。说到底，人群是一个幻觉。它并不存在。我是在与你们个别交谈。","chapter":"5 人群是一个幻觉","color":0},{"text":"我要说的是，想到自杀只是希望活下去的标志，甚至我经常想到的错误的自杀，正是一种对于更充实、更美好的生活的极度渴求。","chapter":"2 当我醒来","color":0},{"text":"我读过一本书，是约翰·威廉·邓恩￼的《体验时间》。他在这本书里说，如果你知道某事，你就知道你知道它，你就知道你知道你知道，你就知道你知道你知道你知道它。于是每个人心中都存在着一个无限的自我。但我想这是无法证实的。","chapter":"2 当我醒来","color":0},{"text":"我想天底下只有一种正义，那就是个人的正义，因为说到公众的正义，我不知道它是否真的存在。","chapter":"2 当我醒来","color":0},{"text":"在哲学中，答案的得出具有逻辑性，而在诗歌里，你运用的是隐喻。","chapter":"2 当我醒来","color":0},{"text":"死亡是时间的标志。我们有两种死亡：出生之前和生命结束以后。这两种死亡人人有份，但也许个人真正的死亡是我们每日不断经历的，我们想象它……","chapter":"1 神秘的岛屿","color":0},{"text":"在我一生中，我只有过两次神秘的体验，但我讲不出来，因为这些体验无法诉诸语言，因为语言毕竟只能描述人所共有的体验。如果你不曾有过这种体验，你就不能产生共鸣——这就像你要谈咖啡的味道，而又从未喝过咖啡一样。","chapter":"1 神秘的岛屿","color":0},{"text":"我记得我的英雄之一爱默生，曾经就此警告过我们。他说：“让我们当心吧，生活本身也许会变成一段长长的引文。”","chapter":"1 神秘的岛屿","color":0},{"text":"既然你说到你的家，我就想说，你是生有定处而又到过所有的地方。\n \n博尔赫斯 不，不，不是所有的地方。我希望去中国和印度。不过，我已身在那里，既然我读过吉卜林的著作和《道德经》。","chapter":"1 神秘的岛屿","color":0},{"text":"我找到了一种十分惬意的学德文的方法，我建议大家都这样做，如果你一点儿德文也不懂。就这样试试看：找一本海涅的《漫歌集》——这很容易——再找一本德英词典，然后就开始读。刚开始时你会感到为难，但两三个月后你就会发现，你在读着世界上最优秀的诗，也许你不能理解它，却能够感受它，那就更好，因为诗歌并不诉诸理性而是诉诸想象。","chapter":"1 神秘的岛屿","color":0},{"text":"我一生中读的书不很多，大部分时间都在重读。","chapter":"1 神秘的岛屿","color":0},{"text":"人群是一个幻觉。它并不存在。我是在与你们个别交谈。","chapter":"原序","color":0}],"thoughts":[{"text":"学习一个概念，最快的方法就是通过类比、隐喻，但要真正的掌握、融会贯通则要靠亲身经历与实践。","quote":"但在许多情况下，比如在心醉神迷的情况下，就只能通过隐喻来传达实在，无法直接述说。实在必须借助于隐喻。正因为如此，神秘主义者总是诉诸相同的隐喻。一个隐喻可能是概念化的，一个神秘主义者可能会借助葡萄或玫瑰或肉体之爱来说话，甚至波斯的神秘主义者苏菲派信徒们也这样做","chapter":""},{"text":"那前者得叫做「便秘」","quote":"当今作家管这叫“呕吐”。","chapter":""},{"text":"书本是作者思想与情感的物化，它不仅仅是语词的搭配组合，它天然地带有精神力量。我们心怀敬畏的并非书本自身，而是阅读后它传递出来的那股力量。","quote":"书本毕竟只有当人们阅读或想起它们来时它们才存在，书本难道不是物中之物吗？为什么我们对它们就不敢掉以轻心？为什么我们对装订成册的书本要心怀敬畏？什么原因也没有。","chapter":""},{"text":"这句话让我联想起鲁迅那句「无穷的远方，无数的人们，都和我有关」","quote":"我不是在对他们说话。我是在同你们每一个人说话。说到底，人群是一个幻觉。它并不存在。我是在与你们个别交谈。","chapter":""},{"text":"因为对死亡，所有生着的人都没有经验，所以自杀不仅仅是一种与过去糟糕一切的了断，也是迈向未知世界的开始。","quote":"我要说的是，想到自杀只是希望活下去的标志，甚至我经常想到的错误的自杀，正是一种对于更充实、更美好的生活的极度渴求。","chapter":""},{"text":"那这个你还是你吗？我们确定自己是自己的线索不就是凭着记忆吗？","quote":"你也许要变成月球人，但你不会知道这一点，因为当你变成了月球上的人，你也就有了他的过去、他的记忆、他的恐惧、他的希望，等等。","chapter":""},{"text":"但语言又是抽象与模糊的，对于即使有过相同体验的人，他们的描述就一定是相同的吗？或者反过来，就算一样的描述语言，背后就能确证有相同的体验吗？我觉得正是语言的这种模糊性，才能造就语言的魅力，它不同于精确的数学，却能创造出诗。神秘主义在很大程度上就应该依托于语言的模糊性，朦胧不清才能倍感神秘。","quote":"在我一生中，我只有过两次神秘的体验，但我讲不出来，因为这些体验无法诉诸语言，因为语言毕竟只能描述人所共有的体验。如果你不曾有过这种体验，你就不能产生共鸣——这就像你要谈咖啡的味道，而又从未喝过咖啡一样。","chapter":""},{"text":"对于我而言，这两年读过的百本书却成了我生活的引言。","quote":"我记得我的英雄之一爱默生，曾经就此警告过我们。他说：“让我们当心吧，生活本身也许会变成一段长长的引文。”","chapter":""}],"popularHighlights":[{"text":"我认为一个人总在死亡。每一次我们不能有所感受，不能有所发现，而只能机械地重复什么的时刻，就是死亡的时刻。","count":1792,"chapter":"1 神秘的岛屿"},{"text":"你在读着世界上最优秀的诗，也许你不能理解它，却能够感受它，那就更好，因为诗歌并不诉诸理性而是诉诸想象。","count":1008,"chapter":"1 神秘的岛屿"},{"text":"记住斯威登堡说过的话，上帝赋予我们大脑以便让我们具备遗忘的能力。”","count":990,"chapter":"原序"},{"text":"人群是一个幻觉。它并不存在。我是在与你们个别交谈。","count":900,"chapter":"原序"},{"text":"布拉德雷认为时间从未来流向我们。我们总是溯流而上。而未来转变或溶解为过去的时刻，就是此刻。目前只是未来变成过去的时刻。","count":738,"chapter":"1 神秘的岛屿"},{"text":"如果一本书使你厌烦，那你就丢开它。它不是为你而写的。但是如果你读得兴致勃勃，那你就读下去。强制性阅读是一种迷信行为。","count":688,"chapter":"9 我总是把乐园想象为一座图书馆"},{"text":"我多次想到过自杀，但是每一次我都把它推迟了，我告诉自己，有什么好忧虑的呢，既然我有自杀这件强大的武器，而同时我又从未使用过它，至少我觉得我从未使用过它。","count":630,"chapter":"2 当我醒来"},{"text":"博尔赫斯　我的一生是一部错误的百科全书。一座博物馆。","count":558,"chapter":"1 神秘的岛屿"},{"text":"倘若我待在家里，我就得一遍遍地重复同一天的生活；而当我旅行时，一天就与另一天不同了。每天都使我有所受益。所以我喜欢旅行之类的活动。但倘若我闭门不出，一切便颇为单调。每一天都是映照头一天的镜子。","count":522,"chapter":"9 我总是把乐园想象为一座图书馆"},{"text":"我想天底下只有一种正义，那就是个人的正义，因为说到公众的正义，我不知道它是否真的存在。","count":510,"chapter":"2 当我醒来"},{"text":"因为在你快乐时你会忘乎所以。人们只有在心绪不佳时才有所意识。","count":504,"chapter":"2 当我醒来"},{"text":"我要说是诗来找我，而且甚至小说也来找我。我的脑子大了，就得减轻它的负担，而减轻负担的唯一办法就是把东西写出来。别无他法，否则它要一直 道有一次回顾往事时把那个野蛮人的村落和自己的家乡搞混了。","count":496,"chapter":"永生"},{"text":"语句，被取代和支离破碎的语句，别人的语句，是时间和世纪留下的可怜的施舍。","count":481,"chapter":"永生"},{"text":"从达内里的诗里可以看到勤奋、忍耐和偶然性，就是看不到他自己所说的才华。","count":468,"chapter":"阿莱夫"},{"text":"死亡（或它的隐喻）使人们变得聪明而忧伤。他们为自己朝露般的状况感到震惊；他们的每一举动都可能是最后一次；每一张脸庞都会像梦中所见那样模糊消失。在凡夫俗子中间，一切都有无法挽回、覆水难收的意味。","count":432,"chapter":"永生"},{"text":"我是神，是英雄，是哲学家，是魔鬼，是世界，换一种简单明了的说法，我什么都不是。","count":420,"chapter":"永生"},{"text":"在街上，在宪法大街的梯级上，在地下铁道，我觉得每一张脸都是熟悉的。我担心没有一张脸会使我感到惊奇，担心回来的印象永远不会消退。幸运的是，经过几个不眠之夜，遗忘再一次在我身上起了作用。","count":420,"chapter":"阿莱夫"}]},"23303620":{"rating":883,"ratingCount":8870,"highlights":[{"text":"偶像是碰不得的：一碰之后，就有金粉留在手上。","chapter":"六","color":0},{"text":"老包法利饭后中风，的确在前天去世了；查理过分担心爱玛感情重，央求郝麦先生，把这可怕的消息婉转通知她。\n他说什么，他也仔细想过；他要语句工整、精致、富有节奏，成为一篇审慎、委婉、措词讲究而细腻的杰作；但是愤怒战胜了修辞学。","chapter":"二","color":0},{"text":"赖昂拔脚就跑；因为两小时以来，他觉得他的爱情，眼看在教堂就要变成石头，现在又要化成一道烟，穿过那个半截管子似的、长方鸟笼似的、有孔烟筒似的东西（居然不嫌难看，架在礼拜堂上头，倒像一个异想天开的锅匠，在做什么古怪试验）￼，不知去向。","chapter":"一","color":0},{"text":"：种种装饰，他见也没有见过，显出贞节将要失去时难以言传的魅力。","chapter":"一","color":0},{"text":"语言就是一架展延机，永远拉长感情。","chapter":"一","color":0},{"text":"原因是，你知道，我喜欢了解透彻。","chapter":"十五","color":0},{"text":"她这样做，是为了更好地欺骗他们母子？还是就要分手了，她以一种无上的坚忍精神，愿意再进一步，体会体会生活的辛酸？可是不，她没有存这种心思。她是想着她的幸福快到手了，醉醺醺的，就像预先闻到了酒味一样。","chapter":"十二","color":0},{"text":"在他看来，言词浮夸，感情贫乏，就该非议，倒像灵魂涨满，有时候就不免涌出最空洞的隐喻来。因为人对自己的需要、自己的理解、自己的痛苦，永远缺乏准确的尺寸，何况人类语言就像一只破锅，我们敲敲打打，希望音响铿锵，感动星宿，实际只有狗熊闻声起舞而已。","chapter":"十二","color":0},{"text":"这张粗纸，她捏在手心，捏了好几分钟。连篇错字，可是思想厚道，在字里行间，揪着爱玛的心，仿佛一只母鸡，躲躲闪闪，藏在荆棘篱笆里头，咯咯叫唤。墨水是炉灰吸干的，因为信上有一些灰颜色屑子，落在她的袍子上。她差不多隐约望见父亲，朝灶头弯下了腰，去拿火钳。她好久不在他跟前了！黄刺条噼里啪啦，冒出老高的火焰，她坐在壁炉角落的方凳上，拿起一根火柴，就着火烧……她想起夏季黄昏，阳光灿烂。有人走过，马驹全在嘶叫，奔驰，奔驰……她的窗户底下有一个蜂房，有时候，蜜蜂在阳光里飞来飞去，碰着玻璃窗，好像金球一样跳跃。当时多幸福！多自由！多少希望！多少绮梦！现在什么也没有！她已经把它们耗光了，耗在她灵魂的高低波澜上、环境的前后变动上、处女、婚姻和恋爱的各个阶段上；——它们就这样跟着她的生命，一路丢光，好像一位旅客，在沿途家家小店，留下一点他的财物一样。","chapter":"十","color":0},{"text":"“我想，他一定很蠢。不用说，她讨厌他。指甲长，三天不刮胡子。他在外头跑来跑去看病人，她待在家里补短袜子。她一定闷居无聊！一定愿意住到城里，每天夜晚跳波兰舞！小可怜儿！巴望爱情，活像厨房桌子上一条鲤鱼巴望水。来上三句情话，我拿稳了她会膜拜你！一定温柔！销魂！……是的，不过事后怎么甩掉？”","chapter":"七","color":0},{"text":"从这时候起，回忆赖昂成了她的愁闷的中心；回忆的火星劈啪作响，比旅客在俄罗斯大草原雪地上留下的火堆还闪烁不定。她扑过去，蹲在一旁，小心在意，拨弄这要灭的火，前后左右寻找，看有没有东西能把火弄旺；于是最远的回忆和最近的会晤、她感觉到的和她想象到的、她对欢愉的落空的期待、她的枯枝一般在风中哽咽的幸福、她的劳而无获的道德、她的幻灭的希望、家庭的牺牲，细大不捐，她全拣过来，拾起来，聚在一起，烘暖她的忧郁。","chapter":"七","color":0},{"text":"但是她内心却充满欲念、愤怒和怨恨。衣褶平平正正，里头包藏着一颗骚乱的心；嘴唇娴静，并不讲出内心的苦恼。她爱赖昂，追寻寂寞，为了能更自由自在地玩味他的形象。真人当面，反而扰乱沉思的快感。听见他的脚步，她就心跳；但是待在一起，心就沉下去了，她有的只是莫大的惊奇，临了又陷入忧郁。","chapter":"五","color":0},{"text":"星期天早晨，六点钟左右，太阳正出来，她分娩了。查理道：\n“是一个女孩子！”\n她转过头，晕过去了。","chapter":"三","color":0},{"text":"有一天，预备动身，她清理抽屉，有什么东西扎了手指。原来是一根铁丝，捆扎她的结婚的花用的。橘花已经在灰尘之中变黄了，银滚条缎带沿边也绽了线。她拿花扔进火里。它烧起来，比干草还快，随后在灰烬里，仿佛一堆小红树，慢慢销毁。她望着它燃烧。小纸果裂开，铜丝弯弯扭扭，金银花带熔化；纸花瓣烧硬了。好像一只只黑蝴蝶，沿着壁炉，飘飘荡荡，最后，飞出烟筒去了。","chapter":"九","color":0},{"text":"然而在她的灵魂深处，她一直期待意外发生。她睁大一双绝望的眼睛，观看她的生活的寂寞，好像沉了船的水手，在雾蒙蒙的天边，遥遥寻找白帆的踪影。她不知道什么地方有机会，哪一阵好风把机会吹到跟前，把她带到什么岸边，是小船还是三层甲板大船，满载忧虑还是满载幸福。但是每天早晨，她醒过来，希望当天就会实现，细听种种响声，一骨碌跳下床，纳闷怎么还不见来，于是夕阳西下，永远愁上加愁，她又把希望寄托在明天。","chapter":"九","color":0},{"text":"黑漆漆的夜晚，细雨蒙蒙。她吸着湿润的空气，风吹凉她的眼皮。跳舞的音乐还在她的耳边鸣响。她尽力挣扎不睡，延长这种豪华生活的境界，因为没有多久，她就非放弃不可。","chapter":"八","color":0},{"text":"开始走向老境的人，模样透着年轻，而年轻人的脸显着老成。情欲天天得到满足，所以他们的视线，有一种漠然和恬适的神情。他们举止虽然温文尔雅，却隐隐透出一种特殊的粗暴气息，借此控制那些易于驾驭的事物。他们玩纯种马，追逐浪荡女人，以显示力量来满足虚荣心。","chapter":"八","color":0},{"text":"她看惯了安静的风物，反过来喜好刺激。她爱海只爱海的惊涛骇浪，爱青草仅仅爱青草遍生于废墟之间。她必须从事物得到某种好处；凡不能直接有助于她的感情发泄的，她就看成无用之物，弃置不顾，——正因为天性多感，远在艺术爱好之上，她寻找的是情绪，并非风景。","chapter":"六","color":0},{"text":"接着他想起他的婚礼、他的往事、太太第一次怀孕；他从岳父家带她回去，这一天，他也很快活来的，她骑在他的背后，马踏着雪；因为当时是在圣诞节前后，田野正好白茫茫一片；她一只胳膊抱牢他，一只胳膊挎着她的篮子；帽子是科地样式，风吹动花边长帽带，有时候飘到嘴上；他一回头，就见她的小红脸蛋，贴紧他的肩膀，在她的金黄帽檐底下，静悄悄微笑。她为了取暖，不时拿手指伸进他的胸怀。这一切，都多么遥远！他们的儿子，活到如今，该三十岁了！他不由得朝后望望。路上一无所有。他觉得自己好生凄凉，活像一所空房子；热气腾腾的酒菜，早已冲昏头脑，现在横添上动情的回忆和悲伤的心情，他一时真想到教堂旁边￼转上一转。不过他怕去了愁上加愁，就一直回家去了。","chapter":"四","color":0},{"text":"查理的母亲不时来看他们；可是待不了几天，刀口对刀口，媳妇像是把她磨快了一样，于是好比两把刀，你一言，我一语，她们扎过来，刺过去，拿他出气。","chapter":"二","color":0},{"text":"她送他永远送到第一层台阶。马要是还没有牵来，她就待在这里。再会已经说过，他们也就不再言语；风兜住她，吹乱后颈新生的短发，或者吹起臀上围裙的带子，仿佛小旗，卷来卷去。有一次，时逢化冻，院里树木的皮在渗水，房顶的雪在溶化。她站在门槛，找来她的阳伞，撑开了。阳伞是缎子做的，鸽子咽喉颜色，阳光穿过，闪闪烁烁，照亮脸上的白净皮肤。天气不冷不热，她在伞底下微笑；他们听见水点，一滴又一滴，打着紧绷绷的闪缎。","chapter":"二","color":0},{"text":"他认为优秀的作家应该凭理性——而不是凭激情——来从事写作：“激情地位愈小，作品艺术性愈高”。","chapter":"前言","color":0},{"text":"和巴尔扎克不同，福楼拜主张从作品中排除自我，不流露感情，不插入议论，不让一字一句留下作者的观点或意图的痕迹。福楼拜把小说称作“生活的科学形式”￼，要求作家约束自己的感情，像自然科学家对待大自然那样，以冷静客观的态度，对事物作出完全客观的、科学的反映。","chapter":"前言","color":0},{"text":"巴尔扎克是举世公认的现实主义大师，他的艺术却保留了相当多的浪漫色彩。这位伟大的梦幻追求者，总在不懈地进行着“绝对”之探求。他试图“把握一切、认识一切、解说一切”，时刻感到自己“有某种思想要表达，有某种体系要建立，有某种学说要阐释”。所以巴尔扎克的作品中，永远看得见作者的巨大身影。他激情满怀，与他虚构的人物同呼吸共命运，时时刻刻在剖析他们的心理，评判他们的言行，甚至以作者身份在一旁击节叹息。","chapter":"前言","color":0},{"text":"他的最大建树，是从作品中删去了自我，创造了所谓客观性艺术。","chapter":"前言","color":0},{"text":"福楼拜的创作思想，在许多方面和巴尔扎克一脉相承。和巴尔扎克一样，福楼拜也将文学作品喻为“反映现实生活的一面镜子”，将真实性作为衡量艺术的主要准绳：“美就意味着真实，虽说真实的东西不一定都美，可是最美的东西永远是真实的……丧失了真实性，也就丧失了艺术性。”","chapter":"前言","color":0},{"text":"福楼拜曾说：“在我身上存在两个截然不同的人：一个酷爱大叫大嚷，酷爱激情，酷爱鹰的展翅翱翔，句子的铿锵和臻于巅峰的思想；另一个竭尽全力挖掘搜寻真实，既喜爱揭示细微的事实，也喜爱揭示重大事件……”","chapter":"前言","color":0}],"thoughts":[{"text":"看到前面爱玛不委身于公证人时，有几位读者说爱玛还残留着尊严和可贵时，我就觉得好笑。她的尊严，早在第一次见到子爵春心荡漾时已经不见，她的可贵也早在第一次不耐烦的叫白尔特走开时已经消失。","quote":"她看不出同样的事，方才她在公证人家，怒不可遏，现在她却跑着送上门去，根本没有理会这是卖淫。","chapter":""},{"text":"突然切换至第三者视角，增加了人物描写的丰富性","quote":"这类活计，以微不足道的困难娱乐心灵，完成了，人也就心满意足，不再想它了。毕耐的幸福，毫无疑问，就是这类平庸活计的产物。\n杜法赦太太道：\n“啊！那不是她！”\n但是旋床太响，她们听不见她说什么。\n最后，两位夫人仿佛听到法郎这个词，杜法赦太太耳语道：\n“她付不出捐税，求他许她缓付。”\n另一位太太道：\n“像是！”\n她们望见她走来走去，看看墙边的饭巾环、蜡烛台、栏杆柱头的圆球，同时毕耐心满意足，摩弄胡须。杜法赦太太道：","chapter":""},{"text":"理型对象只存在于她自己的心中，任何现实载体都只是对其理型对象的模本，再精确的模本也只能提供一时的惊艳，时间荡涤后，剩下的只有裂纹和细节上的误差。而这种误差便如同癌细胞般会肆意扩散，达至晚期时，任何当初的山盟海誓都已烟消云散，眼里只有这些误差，且揪着它们去攻击这个模本。人们抱着浪漫之情企图寻找自己的爱情，在一个惊艳对象上以为自己找到了，其实找到的就是这样的爱情模本。真正的爱情应当从那个人出发，归于那个人，而不要为了浪漫，为了契合，为了匹配。","quote":"她怒火冲天，方才离开。她如今恨他。在她看来，爽约是一种侮辱。她想多找一些借口，索性摆脱他：他没有英雄气概，软弱，平庸，不及女人刚强，而且吝啬，胆小如鼠。","chapter":""},{"text":"说爱玛一开始追求的是浪漫的爱情，我觉得是对爱情的侮辱，她一开始追求的只是浪漫本身，罗道尔夫也好，赖昂也好，都是满足她浪漫感觉的媒介，她从未真正爱过谁，所以也谈不上有真的爱情。爱情的目的应该是其爱的对象本身，她委身所求的，从来不是某个具体的人，她不以人为目的，而是拿人当工具。","quote":"她就这样设法得到丈夫允许，每星期进城一趟，会晤她的情人。一个月下来，居然有人以为她弹琴很有进步。","chapter":""},{"text":"各取所需","quote":"她绝口不提她对另一个男子的热情；他也瞒住不说他曾经把她忘了。","chapter":""},{"text":"查理是会用力生活的人，他要了解透彻，他有家庭，他会为妻子女儿考虑，他量入为出，他有对未来的憧憬。而反观爱玛，她要的是自我当下的感受，她要浪漫不要实际，她要爱情不要家庭。她不想要真正的生活，她只在意本该是生活点缀的浪漫，并妄想将之作为全部的生活。","quote":"原因是，你知道，我喜欢了解透彻。","chapter":""},{"text":"给无赖汉喝汤以求自己内心的救赎，殊不知她的丈夫为了这个家为了她已举债累累。她并不是按照道德律令去行事，不用期待这样的人会做出彻底的改变。","quote":"看见三个无赖汉坐在厨房喝汤。","chapter":""},{"text":"这话是侮辱妓女了，妓女至少知道自己在做什么，要什么，能得到什么，不会背地里看不起自己家人、侮辱家人，甚至很多妓女还会用自己的收入补贴家用。","quote":"她估量他要来了，两只碧琉璃大花瓶插满玫瑰花，收拾房间，打扮自己，活像一个妓女等候一位大贵人。女用人一天到晚洗呀浆的","chapter":""},{"text":"这一惊，惊的妙","quote":"这是个愉快的夜晚，他们谈天说地，闲话共同的梦想、未来的财富、家中应有的改良。他看见自己名扬四海，生活稳定，太太永远爱他；她也发觉自己心旷神怡，通过更健康、更美好的感情，取得新生，对这爱她的可怜的孩子，终于有了若干恩情。她偶尔想到罗道耳弗，并不留恋，望着查理，甚至发现他的牙齿并不难看，未免一惊。","chapter":""},{"text":"一个简简单单的只为满足肉欲，一个稀里糊涂以为自己得到爱情，简单之人只用几句俏皮话就达成所愿，糊涂之人却赌上生而为人的所有价值与这可笑的爱情一起陪葬。","quote":"他的勇敢使她吃惊，可是语气不文，用词粗野，也令她反感。\n手枪这句话，罗道耳弗寻思了许久，心想：万一她说话当真，这就非常可笑，甚至于可憎了，因为他本人毫无理由怨恨善良的查理，他不是那类忌妒成性的人；——爱玛说起他不忌妒，怕他不信，还赌了大咒，他也嫌她有伤大雅。\n而且她越来越重感情。先是一定要交换小照，剪一绺头发相送；现在她要一枚戒指、一枚真的结婚戒指，表示百年相好。她动不动同他谈起晚钟或者天籁，接着又说到自己的母亲，问起他的母亲。罗道耳弗的母亲已经死了二十年了。爱玛还要婉言安慰他，好像他是个弃儿，甚至有时候，她望着月亮对他道：\n“我拿稳了，她们在天上全都赞成我们相爱。”","chapter":""},{"text":"第一时间想到的是拿孩子作为偷情的借口，进一步说明她是多么不负责的一个母亲和多么无耻的一个妻子","quote":"是的；小孩在奶妈家，我才看她来着。","chapter":""},{"text":"这段远处的委员公开演讲与近处罗和爱玛的私下对谈交织在一起，非常有画面感。委员用这大话漂亮话描摹公众的集体生活、国家政策，而罗用尽心思将对话放诸在个人情感，以勾引爱玛出轨。查理好比委员口中的农民，用勤劳的手顾着家，但她的妻子爱玛，此刻却在被一个风月老手勾引。远近对比、国家与个人对比、农夫与蛇对比。","quote":"廖万先生方才掏出手绢擦过嘴，接下去道：\n诸位先生，农业的重要，还用得着我在这里向你们指出来吗？请问，谁供应我们的需要？谁接济我们的生活？难道不是农民？诸位先生，农民拿一双勤劳的手，把种子撒在肥沃的田地里，种子长成麦子，麦子被精巧的机器磨成细末，以面粉的名称运到城市，没有多久，就进了面包房，制成食品，不分贫富，一概供应。为了我们有衣服穿，难道不又是农民养肥牧场众多的羊群？没有农民，我们穿什么，我们吃什么？诸位先生，我们有必要到老远的地方寻找例证吗？谁不常常想到那只羞怯的动物、我们家禽群里值得骄傲的珍品？它一方面长毛给我们做绵软的枕头，一方面有丰美的肉给我们吃，一方面还下蛋。地耕好了，出产种种物品，好比慈母心疼儿女，尽量供应，我要是一一枚举的话，就要不胜其举了。","chapter":""},{"text":"爱玛爱的绝对不会是某个实在的个体，而是那些接近她幻想、理想中的形象。她所期待的是恋爱的感觉，而不是爱本身。赖昂只不过是实现她欲望的一个媒介，却不是目的。","quote":"但是她内心却充满欲念、愤怒和怨恨。衣褶平平正正，里头包藏着一颗骚乱的心；嘴唇娴静，并不讲出内心的苦恼。她爱赖昂，追寻寂寞，为了能更自由自在地玩味他的形象。真人当面，反而扰乱沉思的快感。听见他的脚步，她就心跳；但是待在一起，心就沉下去了，她有的只是莫大的惊奇，临了又陷入忧郁。","chapter":""},{"text":"这段话经由药剂师之口说出，再合适不过，十九世纪科学革命已经相当深入，物理学已相当发展，这段话表明药剂师显然是崇尚科学之人，与前文其对基督教的驳斥形成对照。","quote":"寒暑表（我观察过），冬季降到摄氏表四度，大夏天高到二十五度，顶多三十度，合成列氏表，最大限度也就是二十四度，或者华氏表（英国算法）五十四度，不会再高啦！——而且实际上，我们一方面有阿格伊森林，挡住北风，另一方面，又有圣约翰岭，挡住西风；不过河水蒸发，变成水汽，草原又有许多牲畜存在，你们知道，牲畜呼出大量阿莫尼亚，就是说，呼出氮气、氢气和氧气（不对，只有氮气和氢气），其所以热，就因为吸收了土地的腐烂植物，混合了所有这些不同种类的发散出来的东西，好比说，绑成一捆东西，遇到空气有电的时候，自动同电化合，时间久了，就像在热带一样，产生出妨害卫生的瘴气; ——这种热，我说，在来的那边，或者不如说是可能来的那边，就是说，南方，经东南风一吹，也就好受了；风过塞纳河，已经凉爽了，有时候冷不防自天而降，就像俄罗斯小风一样。”","chapter":""},{"text":"她要就是那种画面感，而非真的托物寄情。犹如现在发在朋友圈、社交媒体上那些几经修饰的照片和视频。","quote":"她不弹钢琴了。弹它做什么？有谁听啊？她没有机会穿短袖丝绒袍，到音乐会弹一架艾拉钢琴，十指灵活，打象牙键，听见众口啧啧，如同一阵微风，在身边荡来荡去。既然如此，犯不上破费精力去学。画册和刺绣，她丢在衣橱不管。有什么用？有什么用？缝纫惹她生气。","chapter":""},{"text":"少妇怀春，出轨前兆","quote":"然而在她的灵魂深处，她一直期待意外发生。她睁大一双绝望的眼睛，观看她的生活的寂寞，好像沉了船的水手，在雾蒙蒙的天边，遥遥寻找白帆的踪影。她不知道什么地方有机会，哪一阵好风把机会吹到跟前，把她带到什么岸边，是小船还是三层甲板大船，满载忧虑还是满载幸福。但是每天早晨，她醒过来，希望当天就会实现，细听种种响声，一骨碌跳下床，纳闷怎么还不见来，于是夕阳西下，永远愁上加愁，她又把希望寄托在明天。","chapter":""},{"text":"爱玛不允许查理以这种方式去模仿她的梦中生活，尽管查理并不知情，但雪茄夹在查理手中便是对这一梦想的玷污","quote":"女仆整理卧室时，他们来到厨房取暖。查理开始吸烟。他伸长嘴唇吸，不住吐痰，吐一口烟，闪开一回。她显出鄙夷的样子道：\n“你要把自己弄病了。”","chapter":""},{"text":"查理已经成为爱玛逐梦的绊脚石","quote":"查理过去吻她的肩膀。她说：\n“走开！当心弄皱我的衣裳。”","chapter":""},{"text":"一个没有定性的姑娘，寻求感官刺激，沉迷于书中的浪漫主义，分不清现实与虚幻，当看到自以为的爱情时，不自觉的用文学作品中的描述来对其美化。但无论打扮的再漂亮，这爱情在时间面前都会是虚妄。","quote":"她终于得到了那种不可思议的爱情。在这以前，爱情仿佛一只玫瑰色羽毛的巨鸟，可望而不可即，在诗的灿烂天空翱翔；——可是现在她也不能想象，这种安静生活就是她早先梦想的幸福","chapter":""},{"text":"「无论如何」，这份痛苦源于作为一个丈夫和一个被爱者的身份，而非出于一颗爱人之心。","quote":"坟地的事一了，查理回到家，没有在底下遇见一个人，走上二楼卧室，看见她的袍子还挂在床头，于是靠住书桌，一直待到天黑，沉在痛苦的梦境。无论如何，她爱他来着。","chapter":""},{"text":"猥琐还能这样用？","quote":"不过平日业务猥琐","chapter":""}],"popularHighlights":[{"text":"结婚以前，她以为自己有爱情；可是应当从这种爱情得到的幸福不见来，她想，一定是自己弄错了。欢愉、热情和迷恋这些字眼，从前在书上读到，她觉得那样美，那么在生活中，到底该怎样正确理解呢，爱玛极想知道。","count":12096,"chapter":"五"},{"text":"她不相信事物在不同地方，老是一个面目；活过的一部分既然坏，没有活过的一部分，当然会好多了。","count":11305,"chapter":"二"},{"text":"他干完一天的乏味工作，好像拉磨的马一样，两眼蒙住，兜着一个地方转，不知道磨了些什么。","count":8988,"chapter":"一"},{"text":"摧残爱情的方式很多，不过连根拔起的狂风暴雨，却是借钱。","count":6864,"chapter":"八"},{"text":"坟地的事一了，查理回到家，没有在底下遇见一个人，走上二楼卧室，看见她的袍子还挂在床头，于是靠住书桌，一直待到天黑，沉在痛苦的梦境。无论如何，她爱他来着。","count":6256,"chapter":"二"},{"text":"正相反，一个男子难道不该无所不知，无所不能，启发你领会热情的力量、生命 不会疲乏，甚至连思维也是不必的。他就像一台点唱机，有个神秘的源泉在给它供应无穷无尽的各种硬币。","count":1185,"chapter":"2"},{"text":"父亲无法相信在如此酷寒之下，这匹没有拴住的马，毫无必要地等了他一夜。","count":1173,"chapter":"1"},{"text":"还总见到发黑的、丝絮般的海草，是它从自己身底撕扯下来的，就好像这是一个自戕的季节——拔下隐藏的、私密的、不被察觉的毛发。","count":1139,"chapter":"1"},{"text":"我既觉得骄傲，又感到羞恼；既觉得年轻，又感到迟暮；既觉得自己得到了拯救，又感到无止境的迷惘。对于颤抖的双腿和流泪的双眼我无能为力，有些东西我无从说起。","count":1105,"chapter":"1"}]},"26785337":{"rating":860,"ratingCount":862,"highlights":[{"text":"这不是说韦伯否定了民主所蕴涵的价值性信念，而是他发现民主在近代社会中尚发挥一种完全不同却更具分量的功能。民主不只是人民获得权力的途径，同时也是统治者取得权位，加强己身正当性的工具。古典民主理念只知从被统治者的立场去了解民主，却忘了从统治者的立场去体会民主的妙用。","chapter":"附录三 韦伯论帝国总统","color":0},{"text":"走上政坛，就是参与以权力——影响国家亦因而影响这个团体的权力——为赌注的各种纷争。一旦走上政坛，人必须屈服于采取行动的规律，就算这些规律违反了他心底的喜恶，或违反了十诫。参政就是与地狱的力量缔结协议，迫使自己委身于单求效率的逻辑之中。","chapter":"附录二 韦伯论学者与政治家","color":0},{"text":"在韦伯眼中，行动的悲怆性在于两种伦理的对立：责任伦理及心志伦理（moralede la conviction）。我或者顺从我的信念——和平主义也好、革命主义也好，无关痛痒——而毫不顾虑我的行动后果。又或者我以为该为自己的行动负责，就算我并非蓄意这样行动。因此所有良好的动机及单纯的心意，皆不足以为行动者辩护。","chapter":"附录二 韦伯论学者与政治家","color":0},{"text":"理性地行动，就是在反省之后做出一个决定，让原定的目标有最佳的机会实现。行动的理论，亦同时是风险率（risque）的理论和因果（causalité）的理论。历史学家在探讨历史性因果时，就是把历史人物在做出决定之前考虑过的因素或该考虑过的因素，再在自己心里重演一番。","chapter":"附录二 韦伯论学者与政治家","color":0},{"text":"一个人所关心的，如果是自己灵魂的救赎、是他人灵魂的得救，不会以政治作为达到这些目标的途径。政治有其完全不同的课题，这种课题唯有用武力才能解决。","chapter":"第二章 政治作为一种志业","color":0},{"text":"情绪激攘的革命之后，随之而来的是习常守成的日常现实生活。信仰的英雄，尤其是信仰本身，都会消逝，或者沦为（这更彻底）政治上的庸俗人物和政治技术家习用咒语的一个部分。","chapter":"第二章 政治作为一种志业","color":0},{"text":"领袖事实上能达成的结果，并不由他本人来掌握。他能达成什么，是由他的跟从者的行动的动机来决定的；而从道德的观点来说，这些动机绝大部分都很庸俗。跟从者中间，至少有一部分人（在实际上这恐怕永远不会是多数人），确实对领袖本人及他的理想有真诚的信仰，领袖才能对跟从者有所控制。但首先，这种信仰（即使出于衷心），在事实上往往只是让报复、权力、利益和俸禄等欲望得到道德上“正当性”的工具：让我们在这一点上不要自欺，因为唯物的历史解释，同样不是一部随招即来的出租车；它不会因为碰到的是革命者，就不适用。","chapter":"第二章 政治作为一种志业","color":0},{"text":"人类团体所运用的手段是具有正当性的武力；这种特定的手段本身，决定了关于政治的一切伦理问题的特殊性。","chapter":"第二章 政治作为一种志业","color":0},{"text":"心志伦理和责任伦理，永远不可能并存；而即使我们开始向目的使手段圣洁化这个原则做任何让步，我们也永远没有办法从道德上判定，哪一个目的该圣洁化哪一个手段。","chapter":"第二章 政治作为一种志业","color":0},{"text":"对政治来说，决定性的手段是武力。","chapter":"第二章 政治作为一种志业","color":0},{"text":"我们必须明白，一切具有伦理意义（ethisch orientierte）的行动，都可以归属到两种准则中的某一个之下；而这两种准则，在根本上互异，同时有着不可调和的冲突。这两种为人类行动提供伦理意义的准则，分别是心志伦理（Gesinnungsethik）￼和责任伦理（Verantwortungsethik）。","chapter":"第二章 政治作为一种志业","color":0},{"text":"到了此刻，到了疲竭的时期已将过去之时，人们不寄以希望和价值的乃是和平，而不是战争：这是绝对伦理的一种结果。","chapter":"第二章 政治作为一种志业","color":0},{"text":"如果出世（akosmistische）￼的爱之伦理涵蕴的结论是“不要用武力抵抗恶行”￼，那么，对政治家来说，“你应该用武力抵抗恶行”这个相反的命题才适用——不然，对于邪恶的得势，你便要负责任。","chapter":"第二章 政治作为一种志业","color":0},{"text":"一个人一定要生活得像耶稣、使徒或者像圣方济各。唯有如此，这种伦理才具有意义，才能表现出当事人的尊严。非如此，它们不会有意义，不会有尊严可言。","chapter":"第二章 政治作为一种志业","color":0},{"text":"若我们不故意把它平俗化，它的真义是：要就全有，不然全无。","chapter":"第二章 政治作为一种志业","color":0},{"text":"战争结束后，与其像老妇人一样，汲汲于找出“祸首”（而毕竟，造成战争的，乃是社会的结构），倒不如果敢严峻地对敌人说：“我们败了，你们得到了胜利。这些都是过去的事了。现在，让我们就牵涉到的实质利害，以及（更重要的）根据对未来要负的责任（这尤其是胜利者必须关心的），来谈应该得出来的结论。”","chapter":"第二章 政治作为一种志业","color":0},{"text":"中国的官大人（Mandarin）在出身上，和我们文艺复兴时期的人文主义学者大致相似：一种以人文主义方式、用古代经典加以训练并且通过测验的文人。试读李鸿章的日记，你会发现，他最引以为傲的，就是能赋诗和善于书法。这个阶层，挟其取法中国古代而发展出来的规矩，决定了中国的整个命运。如果当年的人文主义学者，曾稍有机会取得同样的影响力，我们的命运或许也是一样。","chapter":"第二章 政治作为一种志业","color":0},{"text":"需要注意的是，“世界的除魅”是对客观事实的描述，并不带有价值判断的倾向。韦伯并没有说这一转变是值得庆幸的，也无意去赞颂除魅之后的世界。实际上，韦伯对此怀有复杂暧昧的态度。因为他知道，这个“梦醒时分”对许多人来说在精神上是格外“荒凉”的，信仰失去了以往神秘的根基，而科学又无法为生命的意义提供新的根本依据，终极价值不再具有客观性和公共性，会让人茫然若失。","chapter":"导读：祛魅时代的学术与政治","color":0},{"text":"在《学术作为志业》的演讲中，有一个被广泛引用的著名段落：“我们的时代，是一个理性化、理知化，尤其是将世界之迷魅加以袪除的时代；我们这个时代的宿命，便是一切终极而最崇高的价值，已自公共领域（Öffentlichkeit）隐没。”在这里，“世界被 除了迷魅”（disenchantment of the world），极为凝练地表达了韦伯对现代社会的根本判断，也是影响深远的一个见解。","chapter":"导读：祛魅时代的学术与政治","color":0},{"text":"我们要汲取一个教训：只凭企盼与等待，是不会有任何结果的，我们应走另一条路；我们要去做我们的工作，承担应付“眼下的要求”（Forderung des Tages）￼，不论是在人间的事务方面，抑是在成全神之召命的志业（Beruf）方面。只要每一个人都找到了那掌握了他的生命之弦的魔神，并且对他服从，这个教训，其实是平实而单纯的。","chapter":"第一章 学术作为一种志业","color":0},{"text":"我们的时代，是一个理性化、理知化，尤其是将世界之迷魅加以袪除的时代；我们这个时代的宿命，便是一切终极而最崇高的价值，已自公共领域（Öffentlichkeit）隐没，或者遁入神秘生活的一个超越世界，或者流于个人之间直接关系上的一种博爱。","chapter":"第一章 学术作为一种志业","color":0},{"text":"对生命采取的各种终极而一般性的可能立场，是不可能兼容的，因此其间的争斗，永远不可能有结论。这也就是说，在它们之间，必须要做决定。在这种情况下，学问是不是有价值成为一个人的“志业”，或者学问本身是不是具有一种在客观上有价值的“使命”，又都是价值判断的问题，在教室中我们无言以对。事实上，对这些问题做肯定答复，正是从事教学工作的预设。","chapter":"第一章 学术作为一种志业","color":0},{"text":"一件事物，非但其为不美、不神圣、不善，皆无碍于其为真，并且正是因为其为不美、不神圣、不善，所以才为真；这实在是一项日常的智能。","chapter":"第一章 学术作为一种志业","color":0},{"text":"让我们回到本题。当“通往真实存在之路”“通往真实艺术之路”“通往真实自然之路”“通往真实上帝之路”“通往真实幸福之路”种种古老幻象均被扫空之后，在〔今天〕这种种心态状况下，学术作为一种志业的意义安在？托尔斯泰曾就这个问题，提出一个最简单的答案：“学问没有意义，因为对于我们所关心的唯一重要问题：‘我们该做什么，我们该如何生活？’它没有提供答案。”","chapter":"第一章 学术作为一种志业","color":0},{"text":"与神合一的生命，有一个基本前提，就是要从学问的理性主义与理知主义解脱出来。这种盼望，或是其他意义相类的希望，已成为德国具有宗教倾向或渴望获得宗教经验的年轻一代不时可闻的主要口号之一。","chapter":"第一章 学术作为一种志业","color":0},{"text":"现在年轻人的论调刚好与此相反：我们要从学术的理知主义中解放出来，以回复人的自然本性，由此回归大自然。","chapter":"第一章 学术作为一种志业","color":0},{"text":"当时整个敬虔神学（pietistische Theologie）￼，特别是斯彭内尔（Philipp Jakob Spener），都知道不能循中世纪所走的道路去寻找神。上帝隐藏了起来，他的道路不是我们的道路，他的意念不是我们的意念。","chapter":"第一章 学术作为一种志业","color":0},{"text":"对这些踏在近代之门槛上的人，学术代表什么意义？在达·芬奇这类艺术实验者与那些音乐创新者看来，学术是通往真实艺术的道路；而对他们来说，所谓到真实艺术，意思就是到达真实的自然。艺术当被提升到学问的地位；这意思主要是说，艺术家应该跻身于大学者（Doktor）的地位","chapter":"第一章 学术作为一种志业","color":0},{"text":"反观文明人，处在一个不断通过思想、知识与问题而更形丰富的文明之中，很可能“对生命倦怠”，而非享尽了生命。他只能捕捉到精神之生命不断新推出的事物中微乎其微的一部分，而他所能掌握的，却又只属一时而非终极。在这种情况下，死亡在他眼中，乃成为一桩没有意义的事件。既然死亡没有意义，文明生命本身也就不再带有任何意义；因为死亡之所以缺乏意义，正是肇因于生命之不具意义的“进步性”。","chapter":"第一章 学术作为一种志业","color":0},{"text":"诸位在托尔斯泰（Leo Tolstoy）的作品里，可以看到这个问题以最原本的形式提了出来。他提出这个问题的方式很独特。他整个思考，环绕在“死亡是不是一件有意义的事”这个主题上逐渐发展。他的回答是：对于文明人来说，死亡没有意义。死亡对于文明人来说没有意义，因为文明人的个人生命是置放在无限的“进步”当中；依照这种生命本身的内在意义来说，这样的生命永远不会走到尽头。因为对那些身处进步过程中的人来说，前面永远有下一步待走；任何人在死亡之时，都没有抵达巅峰，因为巅峰是在无限之中。","chapter":"第一章 学术作为一种志业","color":0},{"text":"因此，理知化与合理化的增加，并不意味着人对他的生存状况有更多一般性的了解。它只表示，我们知道或者说相信，任何时候，只要我们想了解，我们就能够了解；我们知道或者说相信，在原则上，并没有任何神秘、不可测知的力量在发挥作用；我们知道或者说相信，在原则上，通过计算（Berechnen），我们可以支配（beherrschen）万物。但这一切所指唯一：世界的除魅（Entzauberung der Welt）￼。我们再也不必像相信有神灵存在的野人那样，以魔法支配神灵或向神灵祈求。取而代之的，是技术性的方法与计算。这就是理知化这回事的主要意义。","chapter":"第一章 学术作为一种志业","color":0},{"text":"学问已进入一个空前专业化的时代，并且这种情形将永远持续下去。","chapter":"第一章 学术作为一种志业","color":0}],"thoughts":[{"text":"科学不再研究意义，科学研究现象","quote":"谁还相信天文学、生物学、物理学或化学上的知识，能在世界的意义这个问题上对我们有所启发？谁还相信自然科学能够指点迷津，告诉我们要循哪一条路才能找到它的踪迹？","chapter":""}],"popularHighlights":[{"text":"这个“梦醒时分”对许多人来说在精神上是格外“荒凉”的，信仰失去了以往神秘的根基，而科学又无法为生命的意义提供新的根本依据，终极价值不再具有客观性和公共性，会让人茫然若失。","count":1122,"chapter":"导读：祛魅时代的学术与政治"},{"text":"但韦伯同时也劝导年轻人，黑夜是等不过去的，在黑夜里我们仍然应当做自己能做的事情，这是激发和鼓励一种踏实而审慎的积极态度。","count":792,"chapter":"导读：祛魅时代的学术与政治"},{"text":"人们相信，即有些事情一时还看不透，但在原则上终究是能被看透的，其中的奥秘迟早会被破解。","count":561,"chapter":"导读：祛魅时代的学术与政治"},{"text":"凡是不能让人怀着热情（Leidenschaft）去从事的事，就人作为人来说，都是不值得的事。","count":525,"chapter":"第一章 学术作为一种志业"},{"text":"我们的时代，是一个理性化、理知化，尤其是将世界之迷魅加以袪除的时代；我们这个时代的宿命，便是一切终极而最崇高的价值，已自公共领域（Öffentlichkeit）隐没。","count":408,"chapter":"导读：祛魅时代的学术与政治"},{"text":"真正的教师会注意，不要在讲台上，把某一种立场灌输给学生，无论其方式为明讲或暗示。因为以“让事实自己说话”的方式，把政治立场灌输给学生，是最欺骗性的做法。","count":385,"chapter":"第一章 学术作为一种志业"},{"text":"韦伯说：“真正能让人无限感动的，是一个成熟的人，真诚而全心地对后果感到负有责任，按照责任伦理行事，然后在某一情况来临时说：‘我再无旁顾；这就是我的立场。'”","count":364,"chapter":"导读：祛魅时代的学术与政治"},{"text":"以这个标准来看，恰恰是那些心志伦理的信徒最为失败，他们怀有崇高的意愿，但结果往往事与愿违，失败之后也常常推脱责任，怨天尤人，这就是韦伯所称的“政治婴儿”。","count":360,"chapter":"导读：祛魅时代的学术与政治"},{"text":"谁有自信，能够面对这个从本身观点来看，愚蠢、庸俗到了不值得自己献身的地步的世界，而仍屹立不溃，谁能面对这个局面而说，“即使如此，没关系”（dennoch），谁才有以政治为志业的“使命与召唤”。","count":360,"chapter":"第二章 政治作为一种志业"},{"text":"但不幸的是，这个教职他只做了一年。韦伯染上了当时肆虐欧洲的西班牙流感，引发肺炎，于1920年6月14日去世，年仅56岁。","count":352,"chapter":"导读：祛魅时代的学术与政治"},{"text":"学术工作投入很大而回报很少，作为谋生手段“性价比”很低，像是“一场疯狂的冒险”。韦伯告诫年轻人，不要对运气心存幻想，如果选择了学术这不归路，那就不要郁闷，不要怨天尤人。","count":352,"chapter":"导读：祛魅时代的学术与政治"},{"text":"真善美是人类重要的三个精神领域，这三者之间没有统一的判断标准，没有同样的理性基础，这种统一性的瓦解，被当代德国的大哲学家哈贝马斯称作“人类精神总体性的分裂”，造成现代世界最深刻的困境。","count":340,"chapter":"导读：祛魅时代的学术与政治"},{"text":"不知道有多少时间，都浪费在驯服能够思想的人，把他们变成机器，对命令的服从像机器一般精确不苟。","count":340,"chapter":"导论：韦伯的生平与思想"},{"text":"悠悠千年，我们都专一地皈依基督教伦理宏大的悲情（pathos），据说不曾有过贰心；这种专注，已经遮蔽了我们的眼睛；不过，我们文化的命运已经注定，我们将再度清楚地意识到多神才是日常生活的现实。","count":340,"chapter":"第一章 学术作为一种志业"},{"text":"学习神学知识会有益于个人选择和实践宗教信仰，理解政治学原理也必定有助于政治家的判断和决定，虽然知识终究无法代替最终的信念选择或政治决定，但抉择却因此不再是单纯的随心所欲，负责也不只是意气用事。","count":324,"chapter":"导读：祛魅时代的学术与政治"},{"text":"他信奉尼采的名言，“一个人能承受多少真相，是其精神强度的检验”。","count":299,"chapter":"导读：祛魅时代的学术与政治"},{"text":"所有价值判断最终都依赖于某种前提预设，而预设本身是科学无法证明的。","count":270,"chapter":"导读：祛魅时代的学术与政治"},{"text":"由于工作繁重，他每每挑灯至更深人静。当玛丽安娜劝他休息时，他总是大声地说：“我若不工作到凌晨一点，就不可能算是一个教授。”","count":270,"chapter":"导论：韦伯的生平与思想"},{"text":"因此，文化科学的起点，在不确定的未来里，将始终有所变化和不同，直到心灵的生命力像中国人那样僵化，让人类不再对那永无止境的人生，提出新的问题。","count":270,"chapter":"导论：韦伯的生平与思想"},{"text":"马克斯·韦伯、卡尔·马克思和爱米尔·涂尔干三人，并列为现代社会学的莫基者。","count":264,"chapter":"作者简介"}]},"27426047":{"rating":763,"ratingCount":133,"highlights":[],"thoughts":[],"popularHighlights":[{"text":"在作文中给人物起名字太有意思了，千万别放弃这个乐趣。","count":135,"chapter":"二 忘掉“小明”和“小红”吧"},{"text":"这么一来，这篇看图写话中，小雪在堆雪人，圆圆在推雪球，欢欢和闹闹在打雪仗，小亮在赏冰灯……这就是一群为《下雪啦》而生的小孩嘛！根本就不必请出小明和小红啦！","count":102,"chapter":"二 忘掉“小明”和“小红”吧"},{"text":"我从梦中醒来了，觉得这个世界美了一点。","count":90,"chapter":"一 从不会写多少字，到三个月写一本图文书"},{"text":"我一直想，现代社会，除了孩子们以外，还有多少人在手写文字呢？所以，既然要写，就要享受手写的乐趣，创造手写的美丽，同时也保留住手写的价值。","count":90,"chapter":"六 怎样避免把妈妈写成“家政人员”"},{"text":"看图，是孩子最初的审美建设。如果一定要看，千万选一些优质的图。小孩子一年，甚至一辈子也就写那么十来篇看图写话，世界上有那么多好看的图，完全能满足需求。","count":85,"chapter":"一 从不会写多少字，到三个月写一本图文书"},{"text":"对于孩子来说，成年人不要在什么都没有教会他之前，先教会他畏惧字数。一个畏惧字数的写作者，根本就没有学会畅快地表达。在他还没有学会畅快地表达之前，讲什么技巧技术都是白费口舌。","count":78,"chapter":"四 会飞的鲸鱼，会飞的作文"},{"text":"所谓好写，无非是众所周知的内容。而这些，恰好不是好作文需要的。","count":72,"chapter":"二 不了解植物，怎么写“我喜爱的植物”"},{"text":"这是谁想出来的规则啊？第一次作文，必须要看图写话？看图就看图吧，倒是找一些好看的图啊。世界上有那么多美丽的图画，咱们的出题人——也是教育工作者，是怎么找到了一批丑得不能多看的图呢？","count":64,"chapter":"一 从不会写多少字，到三个月写一本图文书"},{"text":"对生命的体验，看书、看电影是不能代替的。","count":60,"chapter":"三 不了解动物，怎么写“我喜爱的动物”"},{"text":"其实，找到“写什么”，就是最最最最重要的写作才能。","count":55,"chapter":"七 “我的爸爸”这个题目总是写不好"},{"text":"“不用，写了拼音还得擦，你就先空着。”","count":54,"chapter":"二 忘掉“小明”和“小红”吧"},{"text":"这确实是难以完成的任务。但如果完成了，便是一个跨越。从此，孩子的作文就将从粗枝大叶的素描、白描、速写、简笔……上升到会一点工笔细致描写了，作文由此可通往丰富饱满。","count":54,"chapter":"六 写好一瞬间，会写慢镜头"},{"text":"看过的广告，特别是公益广告，有的文案特别好，我积累到一张A4纸的篇幅，就打印出来发给学生。他们写作文的时候，也能画龙点睛一下。","count":52,"chapter":"五 向一棵树学习，和一棵树谈心"},{"text":"还有的图内容奇怪：小白兔没有伞，小乌龟就把自己的乌龟壳揭下来，拿树棍顶着，给小白兔当伞，题目叫作《助人为乐》……","count":51,"chapter":"一 从不会写多少字，到三个月写一本图文书"},{"text":"分段，是重要能力：能控制叙事节奏，知道在哪里应该喘息一下，告一段落；情绪有起有伏，一波一波地推进；结构上有章法，逻辑上有关联，不是一锅粥。","count":51,"chapter":"三 最见效的看图写话，是看动画"},{"text":"书中倡导的男孩冒险游戏，可用来对抗现在被电脑游戏侵蚀、被“伪娘”攻陷的男孩成长环境。如果照此书培养，定会走出一个有原始魅力的、放在深山和荒岛上也能存活的、开朗有活力的男子汉。","count":45,"chapter":"四 没有制作过什么，怎么写有关小制作的作文"},{"text":"。你没亲眼见过，和这种植物没有交集，没有故事，没有联系，你对它就谈不上有什么感情。”","count":42,"chapter":"二 不了解植物，怎么写“我喜爱的植物”"},{"text":"其实他有可写的，只是缺乏自信，希望老师做一下框定和提示。","count":42,"chapter":"六 舌尖的、体内的、情感的吃食"},{"text":"其实，过分依赖现成的词是有害的，更是一个成熟的写作者所不取的。","count":42,"chapter":"一 四季，不要在作文中轮回"},{"text":"写作文面对的依然是纸张，是一格一格的空白，需要组织语言文字来填充，需要调动自己的生活存储。有时候，还需要一点情节创造，加一点幻想，还要投入感情，表达看法。","count":40,"chapter":"五 看动画，不是抄动画"}]},"29790368":{"rating":920,"ratingCount":1088,"highlights":[{"text":"“我们不必原谅我们自己。”他说，“这是一场婚姻。它比大多数婚姻都好。”","chapter":"终章","color":0},{"text":"我对提比略除了鄙视没有别的态度。他灵魂中央有一种怨毒，无人可知其深，他的为人有一种刻骨的、没有一定目标的残忍。无论如何他不是个弱者，也不是个蠢人；而残忍在皇帝身上是比软弱或愚蠢要轻微的缺点。因此我将罗马遗留给提比略的恻隐与时间的偶然。我别无选择。","chapter":"BOOK III","color":0},{"text":"我逐渐相信，每个人一生中迟早会有个时刻令他知道——无论他还懂别的什么，无论他能否说清自己所知——那件恐怖的事实：他是孤单的、分离的，他除了是他可怜的自我，就不能是别的什么了。","chapter":"BOOK III","color":0},{"text":"不知未来的年轻人，将生活视同于史诗中的历险，一次奥德修斯之旅，穿过陌生的汪洋与无名的岛屿，其间他将会试炼并证明自己的力量，从而发现自己有不死之身。中年人活过了自己一度梦想的未来，将生活视为一场悲剧；因为他懂得了无论自己力量多大，也敌不过偶然的势力与他名之为众神的自然规律，也懂得了自己终有一死。然而晚年的人，如果恰如其分地扮演着他得到的角色，一定会将生活视为喜剧。因为他的各种胜利与失败汇合了起来，一边不比另一边更成为自豪或羞耻的理由；而他既不是战胜了势力的英雄，也不是被势力摧毁的主人公。像任何一副总在演戏的贫乏可怜的皮囊，他领会到自己演过的角色太多，以至于不再有本人可言。","chapter":"BOOK III","color":0},{"text":"少年不认识自己的无知，这是幸运的；因为如果他认识，就不会有勇气去养成隐忍的习惯。也许是血肉之躯的某种本能预防了这样的认识，才让男孩可以变成男人，用一生来看见自己生存的荒诞。","chapter":"BOOK III","color":0},{"text":"这精致的游戏，一个重要的部分在于参与者双方都要假装——假装在激情的负荷下无援无助，而每一次推进与撤退，每一次同意与拒绝，都属于游戏达到圆满相合的必由之路。但这样一场游戏之中女人总是胜利者；我也相信她一定会对她的对手感到一点轻蔑；因为他是被征服被使用的一方，却自以为是征服者和使用者。在我生命里有过一些时候，我由于腻烦而放弃游戏，直接发起了进攻，像一个入侵的士兵对待一个村民；每当此时，无论那男子是多么老于世故，多么会掩饰，他都总是非常震惊。结果是一样的，但是对我来说，那样的胜利并不完全；因为我没了瞒着他的秘密，于是就没有操纵他的权力。","chapter":"IV．尤利娅手记 潘达特里亚（公元4年）","color":0},{"text":"“我们的喜剧快要结束了，”他说，“但是一出喜剧里也可以有很多悲哀。”","chapter":"VII．书信 大马士革的尼古拉乌斯致阿马西亚的斯特拉波 （公元前7年）","color":0},{"text":"权力是虚无的，哲学家说；但他们不懂权力，就像阉者不懂女人，因此可以端详她们而无动于衷。","chapter":"XI．尤利娅手记 潘达特里亚（公元4年）","color":0},{"text":"因为没有法律足以塑造一种精神，或充实一种对德行的渴望。","chapter":"X．书信 昆图斯·贺拉斯·弗拉库斯致屋大维·恺撒 （公元前17年）","color":0},{"text":"因此，当我斗胆对您提出一个异议的时候，我完全清楚自己所面对的是何等睿智。","chapter":"X．书信 昆图斯·贺拉斯·弗拉库斯致屋大维·恺撒 （公元前17年）","color":0},{"text":"亲爱的维吉尔，我们是最幸运的人，不必以结婚来保证我们有后裔，可以让自己灵魂的孩子美丽地迈向未来，他们在那里不会改变，也不会死亡。","chapter":"III．书信 卢基乌斯·瓦里乌斯·鲁弗斯致普布利乌斯·维吉尔·马罗 发自罗马（公元前39年）","color":0},{"text":"我不憎恨屋大维·恺撒，但如果我有义务，我会迎战他；我不爱戴马克·安东尼，但如果我有义务，我会为他舍命。思量政治不是士兵的本分；憎恨或爱戴不是士兵的工作。实现誓言是士兵的义务。","chapter":"X．请愿书 百夫长昆图斯·阿庇乌斯 致大元帅马克·安东尼的亚洲军团统领穆纳提乌斯·普兰库斯 发自以弗所（公元前32年）","color":0},{"text":"然而就像你自己常说的那样，多事的人间是个极其有趣的世界；也许我们就连在年轻气盛的时候，也不该完全遁入学业，远离世界的。求知之路是一个漫长的旅程，目标在远方；如果人抵达目标的时候要认出它来，一路上应该走过许多地方。","chapter":"第六章","color":0},{"text":"我早已跟阿瑟诺多鲁斯学到了耐心。于是再次问起屋大维这个人。\n“他和别人一般无异，”他说，“他会在个性力量和命运偶然的塑造下，成为他会成为的人。”","chapter":"第四章","color":0},{"text":"我逐渐明白罗马人何以蔑视哲学了。他们的世界是个直接的世界——讲求成因与后果、流言与事实、得利与失势。就连我这个将一生奉献于追求知识和真理的人，也多少能理解造就了这种轻蔑的世情。他们将学习看成仿佛是达到某个目标的手段，将真理看成仿佛是一个可用的物件。甚至他们的众神也服务国家，国家并不服务众神。","chapter":"第四章","color":0},{"text":"缓慢而没有迟疑地，他从托加袍的褶间抽出一把匕首，用他的体力，当着卡尔福勒努斯的面，将匕首插进胸膛。卡尔福勒努斯向他跃去，但是萨尔维迭努斯举起左手挡住他。他低沉着声音，略有点气喘地说：“告诉屋大维，如果我活着不再是他的朋友，我死了会是。”\n他继续坐在桌前，直到目光暗下去，身子倒在尘土里。","chapter":"XII．书信 盖乌斯·奇尔尼乌斯·梅赛纳斯致蒂托·李维 （公元前12年）","color":0},{"text":"我听见自己在说：“是萨尔维迭努斯的笔迹。”","chapter":"XII．书信 盖乌斯·奇尔尼乌斯·梅赛纳斯致蒂托·李维 （公元前12年）","color":0},{"text":"我不是虔信者；但我有时会感到信仰的诱惑：也许众神确实会对我们言说，而我们只在没有防备的时刻才会倾听。","chapter":"XII．书信 盖乌斯·奇尔尼乌斯·梅赛纳斯致蒂托·李维 （公元前12年）","color":0},{"text":"奥古斯都月￼（虽然它当时还叫第六月，如你所知）望日后第四天，屋大维来到罗马就任执政官，主持了相应的祭仪。\n一个月后，他庆祝了二十岁生日。","chapter":"VIII．书信 盖乌斯·奇尔尼乌斯·梅赛纳斯致蒂托·李维 （公元前13年）","color":0},{"text":"在黑暗中跟怯懦的对手赛跑，或许能帮你赢得比赛，但也或许让你坠入一个你看不见的悬崖，或者将你带到一个你不愿看到的地方。","chapter":"IV．昆图斯·萨尔维迭努斯·鲁弗斯 日志草稿，记于阿波罗尼亚（公元前44年3月）","color":0},{"text":"太审慎可能会像太鲁莽一样，是确定无疑的死亡之路。”","chapter":"IV．昆图斯·萨尔维迭努斯·鲁弗斯 日志草稿，记于阿波罗尼亚（公元前44年3月）","color":0},{"text":"梅赛纳斯开了口，嗓子已变得低沉，不再有他偶尔露出的娘娘腔的尖音：“连我们都别信任，虽然我们爱你。从这一刻开始，只在你必须信任的时候信我们吧。”\n屋大维蓦然转身离开我们，背向光亮，哽咽地说：“我知道。我连这都知道。”","chapter":"IV．昆图斯·萨尔维迭努斯·鲁弗斯 日志草稿，记于阿波罗尼亚（公元前44年3月）","color":0},{"text":"但你要记得，虽然我为国家服务过，但我是个诗人，没有能力直接抵达任何东西。","chapter":"II 0,"chapter":"小饰与阳子"},{"text":"某样物体从上方噗通一声落下，阿姨惊讶地叫了出声——穿着一身脏衣服，和我一模一样的那张脸正贴在地面上。","count":4155,"chapter":"小饰与阳子"},{"text":"“我了解了。”男人和妈妈谈了一阵子，点点头说道，“也就是说，你们夫妻吵了一架，之后就当对方死了一般过日子，而你们也这么告诉孩子，让他在这种状况中生活下去，结果慢慢地他就变成这样了……”","count":3926,"chapter":"远离的夫妇"},{"text":"我摇摇头，在心里喃喃说着对不起。我会哭不是因为身体不舒服喔，是因为我终于放下心了，是因为我曾经梦寐以求唯有自己一人的世界终于来临了，我的心终于得到平静了。","count":3816,"chapter":"神的咒语"},{"text":"“我就是铃木……啊，你要找的一定是奶奶吧？奶奶她死了哦。今天早上狗一直狂叫，吵到邻居。过来一看才发现她倒在玄关已经死了，好像是因为感冒恶化啊。真是麻烦，难得的假日，竟然一大早被叫来处理这种事。”","count":3705,"chapter":"小饰与阳子"},{"text":"“你是我生的，所以要你生或要你死都是我的自由！”","count":3388,"chapter":"小饰与阳子"},{"text":"我现在终于能够去找警察了吧？我终于能坦白自己的罪行了吧？此刻唯有平静填满了我的内心。","count":3094,"chapter":"动物园"},{"text":"我们都是一边学习着爱与死亡，往来于世界的向阳处与阴暗处活下去的，不是吗？","count":3045,"chapter":"向阳之诗"},{"text":"“让我出去”沙坑里的某人在我的掌心上这么写。于是我将左臂也伸进沙坑的深处，在抓住我右腕的某人的手背上，以指尖写了字。“不行”","count":2970,"chapter":"从前，在太阳西沉的公园里"},{"text":"而且小饰常会把吃剩的饭菜留给我，所以我也很喜欢她。","count":2842,"chapter":"小饰与阳子"},{"text":"要说她唯一的缺点，就是她分不清家猫和仙人掌。因为这样，前阵子她伸出两手将我们家养的猫一把抓起来种进花盆里，盖上土还浇了水；接着将仙人掌误以为是猫，抱起来在脸上磨蹭，弄得脸颊血肉模糊。","count":2784,"chapter":"神的咒语"},{"text":"我觉得在停止运作与感觉到恐怖之间，似乎还缺了一样什么东西，或许那就是我必须学习的课题吧。","count":2601,"chapter":"向阳之诗"},{"text":"指针恰好指着傍晚六点，停止了走动。","count":2496,"chapter":"七个房间"},{"text":"“就今天一晚，我们两个交换衣服穿。我穿你的，你穿我的。直到明天早上，我的言行举止都假装是你，然后你也必须配合假扮成我，走路都要低着头哦。”","count":2397,"chapter":"小饰与阳子"}]},"31808221":{"rating":920,"ratingCount":2067,"highlights":[{"text":"生活代替了理论，一个完全不同的东西应该在意识里形成了。","chapter":"二","color":0},{"text":"我把您当作什么人呢？我认为您也是一个这样的人：哪怕挖出他的肠子，他还是站着不倒，含笑地望着刽子手——只要找到信仰或上帝。您找到，就能活下去。第一，您早该换一下空气了。嗯，受苦也是一件好事。您去受苦吧。米柯尔卡想要受苦，这也许是对的。我知道，您不信上帝——可您别卖弄聪明了；投身到生活中去吧，别考虑啦；别担心啦——会把您送到岸上，让您站稳脚跟。","chapter":"二","color":0},{"text":"病人的肌体并没有特殊的失调，发疯可以说是一种逻辑性的错误，一种判断的错误，是由于对事物的看法不正确。","chapter":"五","color":0},{"text":"难道我杀死了老太婆吗？我杀死的是我自己，不是老太婆！我就这样一下子毁了自己，永远毁了！","chapter":"四","color":0},{"text":"当时我要知道，要快些知道，我同大家一样是只虱子呢，还是一个人？我能越过，还是不能越过！我敢于俯身去拾取权力呢，还是不敢？我是只发抖的畜生呢，还是我有权利……”","chapter":"四","color":0},{"text":"现在我知道，谁聪明、强硬，谁就是他们的统治者。谁胆大妄为，谁就被认为是对的。谁对许多事情抱蔑视态度，谁就是立法者。谁比所有的人更胆大妄为，谁就比所有的人更正确！自古以来就是如此，将来也永远会如此！只有瞎子才看不清！","chapter":"四","color":0},{"text":"这个观点是：人按照天性法则，大致可以分成两类：一类是低级的人（平凡的人），也就是，可以说，他们是一种仅为繁殖同类的材料；而另一类则是这样的一种人，就是说，具有天禀和才华的人，在当时的社会里能发表新的见解。当然，这样划分是可以分得无限地细的，但是这两类人的区别是相当显著的：第一类人就是一种材料，他们大抵都是天生保守、循规蹈矩、活着必须服从而且乐意听命于人。在我看来，他们有服从的义务，因为这是他们的使命，而他们也认为，这根本不是什么有损尊严的事。第二类人呢，他们都犯法，都是破坏者，或者想要破坏，根据他们的能量来说。这些人的犯罪当然是相对的，而且有很大的差别；在各种不同的声明中，他们绝大多数都要求为着美好的未来而破坏现状。但是为着实现自己的理想，他甚至有必要踏过尸体和血泊，依我看，他也能忍心去踏过血泊——但这要看理想的性质和理想的规模，——您得注意这点。","chapter":"五","color":0},{"text":"他看得太清楚了，现在她觉得泄露自己的一切事情让人家知道，这是多么痛苦啊；他明白了，这些感情仿佛确实是她的一个真正的秘密，也许从少女时代起，还在家里，在一生贫穷潦倒的父亲和痛苦得疯疯癫癫的继母身边，在忍饥挨饿的弟妹中间，在可怕的叫喊和斥责声中生活的时候，早就蕴藏在她的心底里了。","chapter":"四","color":0},{"text":"“我这样谈到你不是因为你卑贱、有罪，而是因为你有伟大的受苦精神。你是个大罪人，这话不错，”他几乎异常兴奋地补充说，“你的最深重的罪是你白白地毁了自己，出卖了自己的灵魂。这还不可怕吗！你过着你那么痛恨的卑贱的生活，这还不可怕吗。你自己也知道（只消睁开眼来看看），你过这种生活对谁都没有帮助，也救不了谁！最后，请你告诉我，”他说，几乎愤怒若狂。“这么大的耻辱和这样的卑贱怎么能在你身上跟另一些与之对立的神圣的感情并存呢？还是投河自尽吧！这会好些，会好上一千倍，明智一千倍！”","chapter":"四","color":0},{"text":"“我不是向你膜拜，我是向人类的一切痛苦膜拜。”","chapter":"四","color":0},{"text":"“不，不！上帝会保佑她，上帝！……”她发狂地反复说。\n“也许上帝根本就不存在。”拉斯柯尔尼科夫甚至幸灾乐祸地回答道，一边望着她，笑起来了。\n索尼雅的脸色骤然变得很可怕：脸上掠过一阵痉挛。她流露出难以形容的责备的神情，瞥了他一眼，想要说什么，可是一句话也说不出来，只是忽然用手掩住脸，很伤心地哭起来了。","chapter":"四","color":0},{"text":"走廊里黑沉沉的；他们站在灯旁。他们彼此默默地对看了一会儿。拉祖米兴一辈子也忘不了这个时刻。拉斯柯尔尼科夫那炯炯发亮的呆滞的目光仿佛每时每刻都一个劲儿地想要刺入他的心灵和意识。拉祖米兴蓦地怔了一下。在他们之间仿佛掠过一个奇怪的东西……一种什么思想，像是一个暗示，一闪即逝；双方突然也理会到一种可怕的、丑恶的东西……拉祖米兴脸色白得像死人一般。","chapter":"三","color":0},{"text":"“老太婆算得了什么！”他紧张而激动地想，“老太婆，这也许是个错误，问题不在于这个老太婆！老太婆只是一种病……我想尽快地跨过……我杀死的不是一个人，而是一个原则！我破坏了一个原则，但跨没有跨过去，还是停留在这一边……我只会杀人。而且我似乎也没有能力干那种事……原则吗？那个傻瓜拉祖米兴刚才为什么骂那些社会主义者？他们也是爱劳动的人，也是买卖人；他们为‘公众谋福利’……不，我只能活一次，不能活第二次，我不愿等待‘普遍的幸福’的到来。我要自力更生，不然的话，还是不活好。那么怎么办呢？我只是不愿等待‘普遍的幸福’的到来，而坐视我的母亲挨饿。说什么‘我搬一块砖头去建立普遍的幸福[5]，因此我心安理得。’哈——哈！你们为什么让我溜走。要知道，我只能活一次，我也要……唉，从美学上看来，我不过是只虱子，”","chapter":"六","color":0},{"text":"“不，那些人不是这种材料做的：真正的统治者[2]，他才可以为所欲为，攻破土伦，在巴黎进行大屠杀，忘记在埃及的一支军队，在莫斯科远征中糟蹋了五十万条人命，却在维尔诺[3]说了一句语义双关的俏皮话，敷衍了事；他死后，人们还替他塑像——这样看来，他是可以为所欲为的。不，大概这些人的身体不是血肉之躯，而是铜铸的！”","chapter":"六","color":0},{"text":"在我看来，如果开普勒﻿[5]或牛顿的发现，由于某些错综复杂的原因，没有能够为大家所知道，除非牺牲一个，或者十个，或者百个，或者更多的妨碍者或阻挠者的生命，那么牛顿为使自己的发现能让全人类知道，就有权利，甚至有义务……消灭这十个人或者百个人。","chapter":"五","color":0},{"text":"一切问题在他们看来都是‘环境的影响’——再没有别的原因！这是他们爱说的一句话！由此得出结论：如果社会组织是正常的，那么一切犯罪行为一下子就会消灭，因为失去了抗议的对象，一切人立刻都会变为正直的。","chapter":"五","color":0},{"text":"拉斯柯尔尼科夫笑得似乎不能自持了。他哈哈大笑着走进波尔菲里·彼得罗维奇的宅子里去了。拉斯柯尔尼科夫有必要这样做：从屋子里可以听到，他们是笑着进去的，他们在前室里还在放声大笑。","chapter":"四","color":0},{"text":"“你们以为，我因为他们胡说而不满吗？废话！我喜欢人家胡说！胡说是一切动物中只有人才能享受的唯一的特权。人是从错误中得到真理的！因为我是人，所以我也胡说八道。如果你不犯十四次错误，那你就得不到一个真理，也许得犯一百十四次错误，这是好事嘛；可是我们都没有本领发表错误的意见！你对我发表错误的意见，发表你自己的不正确的意见，那我就会吻你。发表自己的不正确的意见——要比转述别人的一个真理更有意义；在第一种情况下，你才是一个人；而在第二种情况下，你不过是只鹦鹉！真理不会避开你，但生命可以被扼死；例子俯拾即是。现在我们是怎样呢？就科学、文化、思维、发明、理想、愿望、自由主义、理性、经验和一切的一切、一切的一切、一切方面来说，我们无一例外地还都是中学预科生！喜欢靠别人的智慧过日子，成为我们根深蒂固的习惯了！是不是这样？我说得对吗？”","chapter":"一","color":0},{"text":"那些房客都带着一种奇怪的内心满足，一个接一个地挤回到门口去了。有人惨遭横祸的时候，甚至在他的至亲好友中也常常可以察觉出这样的一种心理：没有一个例外，尽管他们由衷地怜悯和同情这个惨死的人。","chapter":"七","color":0},{"text":"人是卑鄙的！因此管他们叫卑鄙东西的那个人也是卑鄙的。","chapter":"六","color":0},{"text":"他们都习惯了。他们开头哭泣，后来就习惯了。人是卑鄙的东西，什么都会习惯的！","chapter":"二","color":0},{"text":"你爱人，首先只爱你自己，因为世上一切都是以个人利益为基础的。你只爱自己，那你就会把自己的事情安排好，你的长褂才能保持完整。经济学的真理补充说：社会上私人的事业办得越多，也就是所谓完整的长褂越多，那么社会的基础就越巩固，社会上的公共事业也就办得越多。所以，为我个人发财，也就是为大家发财，从而使亲友所得到的就会比一件破长褂更多的东西，﻿[1]这已经不是个人私下的馈赠，而是普遍繁荣的结果。","chapter":"五","color":0},{"text":"仿佛他心上那个足足化了一个月脓的疮忽然破裂了。自由了，自由了！他现在摆脱了这些魔力，摆脱了妖术和诱惑力，摆脱了恶魔的教唆。","chapter":"五","color":0},{"text":"卖酒的，你以为，你这半俄升酒，我喝起来是甜的吗？悲痛，我在壶底里寻找悲痛，悲痛和眼泪，我尝到了、找到了；那个怜悯一切人、了解一切人和一切事的人，会怜悯我们的；他是独一无二的，他也是法官。","chapter":"二","color":0},{"text":"小说作为一种思想现象，和其他人文学科是处在同一发展长河中的，只是文学是借助着形象来表现和认识世界，它和哲学之借助于抽象和共性、概念和逻辑来演绎世界，至少在方法上是不同的。但是人类认识的发展在不同的学科中却往往有着同步性。因为人都生活在同一个历史进程里。","chapter":"“描绘人内心的全部深度”","color":0},{"text":"小说家不是政治家或哲学家，重要的不在他能提出什么医治人生和社会的良方，因为这时他们往往是既幼稚又可笑的。文学的力量在于敏锐的发现，表现的深刻，在感性的图像里展示世界的真相和人性深处的奥秘。","chapter":"“描绘人内心的全部深度”","color":0}],"thoughts":[{"text":"似乎在福柯的《疯癫与文明》中看到类似的表述，尽管这本书我没完全看下去","quote":"发疯可以说是一种逻辑性的错误，一种判断的错误，是由于对事物的看法不正确。","chapter":""},{"text":"从很大程度上说，历史是有胜者书写的，胜者为王，败者为寇，的确不错。但是，如果你相信宗教，认为人需要救赎，或者有来世轮回，那么你在此生做的所有恶事必将一直成为你头顶悬挂的达摩克利斯之剑让你不得安宁；如果你是一个现实主义者，人终有一死，那么所有身后名又都只是虚妄。大多数人，都只是身体的奴隶，用享乐主义来说服自己的精神意志。","quote":"现在我知道，谁聪明、强硬，谁就是他们的统治者。谁胆大妄为，谁就被认为是对的。谁对许多事情抱蔑视态度，谁就是立法者。谁比所有的人更胆大妄为，谁就比所有的人更正确！自古以来就是如此，将来也永远会如此！只有瞎子才看不清！","chapter":""},{"text":"拿破仑有两种意义，一种是这个名字的内向意义，即谈到这个名字人们心中会想到的那个矮个子军事家、政治家、法兰西第一帝国的缔造者和他的成就；一种是这个名字的外向意义，即那个叫拿破仑的人，那个人类个体。拉斯科尔尼科夫的问题在于他仅仅从内向意义去理解考察拿破仑，以他自认为的超人哲学去思考那些历史名人，他一直在「设想」拿破仑会怎么做，这是没有意义的，在这点上他只能沉默而不能发言。他能做的是更多的从外向意义去理解拿破仑，即拿破仑他做过什么，他是怎么做的。","quote":"让我告诉你吧，为了这个‘问题’，很久以来，我伤透了脑筋。所以，当我终于领悟到了（不知怎的突然领悟到了），他不但不会退缩，而且想也想不到这不是伟大的……因此我感到十分惭愧……他甚至绝不会理解：为什么要退缩？只要他没有别的法子，他就会不假思索地把她掐死，不让她叫喊一声！……嗯，我也……不假思索……把她掐死了……学这个权威的榜样嘛……事情确实是如此！你觉得可笑吗？是的，索尼雅，最可笑的是，事情也许正是这样……”\n索尼雅一点儿也不觉得可笑。\n“您最好直截了当地告诉我……不要举例子。”她更胆怯地、几乎含糊地请求说。\n他向她转过身去，悲怆地望着她，抓住了她的手。\n“索尼雅，你又说得对。要知道，这些都是胡说，简直是空谈！","chapter":""},{"text":"人最大的问题就是想得太多，不知道对不可言说之事当保持沉默","quote":"由您来决定：让这个或那个活在世上，就是说，让卢仁活着作恶，还是让卡杰琳娜·伊凡诺夫娜死？那么您会怎样决定呢？我问您：应该让他们当中哪一个死？”","chapter":""},{"text":"一个人的骄傲如果来自一次受精、基因遗传的偶然事件，真的没脸见列祖列宗","quote":"卡杰琳娜·伊凡诺夫娜并不阻挠，因为这张奖状当真充分表明，她是一个获得过勋章的七等文官的女儿，因此，她实际上差不多是个上校的女儿。","chapter":""},{"text":"鄙视自己急欲卖弄的对象，可不就是鄙视自己？","quote":"总之，只来了这几个人：头一个是波兰人，接着到来的是个面貌丑陋、身体孱弱、沉默寡言的事务员，他穿了一件油迹斑斑的礼服，满脸粉刺，气味难闻；之后又来了一个耳聋眼瞎的老头，从前在邮政总局里做过事，有个人不知为什么很久以来把他供养在阿玛丽雅·伊凡诺夫娜的家里；又来了一个喝醉的退职中尉，其实他是个军需官，毫无礼貌地哈哈大笑，“你们瞧”，连背心也没穿哪！有一个客人甚至没有向卡杰琳娜·伊凡诺夫娜问好，就在桌旁坐下了。最后到来的那一个因为没有外衣，就穿了睡衣而来，这太不成体统了，阿玛丽雅·伊凡诺夫娜和波兰人费了好大的劲儿才把他推了出去。但那个波兰人带来了两个同胞，他们从来没有在阿玛丽雅·伊凡诺夫娜的房子里住过，房子里的人也从来没有见过他们。这种种使卡杰琳娜·伊凡诺夫娜异常不满。“到底是为谁办的？”","chapter":""},{"text":"开来这位侦查员不止套了主角一人的话","quote":"“你不必急于谈米杰卡的事！哎——哎呀！……”","chapter":""},{"text":"社会达尔文主义 + 宿命论","quote":"但是为着实现自己的理想，他甚至有必要踏过尸体和血泊，依我看，他也能忍心去踏过血泊——但这要看理想的性质和理想的规模，——您得注意这点。在我的文章里，我也仅仅在这个意义上来谈他们的犯罪权利的。（您要记住，我们是从法律问题上谈起的。）但不必大惊小怪：群众差不多从来不承认他们有这种权利，会处决或绞死他们（或多或少）。这样的处置是完全公正的，完成了他们那保守的使命；但是到下几代这样的群众又会把被处决的人们供奉在台座上，向他们顶礼膜拜（或多或少）。第一类人永远是现代的主人，而第二类人则永远是未来的主人。第一类人维持着这个世界，增加它的数目；而第二类人推进这个世界，引导它走向目标。这些人或那些人都有同等的生存权利。总之，我认为他们都有同等的权利，永恒的战斗万岁，自然，直到我们建立新耶路撒冷﻿[9]！”","chapter":""},{"text":"是赎罪给予他的力量","quote":"然而，究竟是什么事使他发生这样的变化呢？连他自己也不知道","chapter":""},{"text":"对生命跌宕怀有猎奇心理本无可指摘，这是人之为理性动物的本能。但若这种行为逾越过度，以致伤害生命所唤起的感性认识，那便不值得鼓励甚至应该驳斥。","quote":"那些房客都带着一种奇怪的内心满足，一个接一个地挤回到门口去了。有人惨遭横祸的时候，甚至在他的至亲好友中也常常可以察觉出这样的一种心理：没有一个例外，尽管他们由衷地怜悯和同情这个惨死的人。","chapter":""},{"text":"在《心灵猎人》和《homicide》上貌似看到过，80%（具体数字记不清）的凶案制造者都会回到第一现场来重温自己行凶的体验。","quote":"“地板刷过了；要油漆吗？”拉斯柯尔尼科夫继续往下问，“血没有了？”\n“什么血？”\n“老太婆同她的妹妹都被人杀害了。这儿有过一摊血。”\n“你是什么人？”工匠惊讶地叫道。\n“我？”\n“是啊。”\n“你要知道吗？……咱们到警察局去，我在那儿告诉你。”\n两个工匠都莫名其妙地望着他。\n“咱们该走了，已经迟了。咱们走吧，阿廖什卡。该把门锁上，”那个年纪大的工匠说。","chapter":""},{"text":"这段好比一个醉鬼教人如何喝酒不容易醉","quote":"等到我点完，就从第五千和第二千里面各抽出一张，又走到亮处去瞧瞧，我又疑心起来，‘请掉换’——搞得那个办事员晕头转向，不知道怎样打发我走！我终于点完钞票走了，打开门——不，对不起，我又折回去，询问一件什么事，要求解释——我会这样干的！”\n“嘿，您说了多么可怕的话呀！”扎苗托夫笑着说，“这不过说说罢了，实际干起来，您一定会发慌。我告诉您，我认为不但您和我，连惯于干这一行的亡命之徒也不能保证不被识破。不必找例子——有着现成的例子呢：在我们这个地区里一个老太婆被人杀害了。大概是个不怕死的人，大天白日，冒一切危险，总算侥幸地逃脱了——但他还是双手发抖；他没有能够抢走东西，他发慌了；这从案情上可以看出来……”","chapter":""},{"text":"朋友不仅鼎力相助，还会考虑他的情绪","quote":"会对我有所帮助的。第一，我不大懂正字法；第二，我的德文有时简直不行，所以与其说我在翻译，倒不如说我在写作，并且还以此自慰：这样会更好些。天晓得，说不定，这不是更好些，而是更糟些……你搞不搞呢？","chapter":""},{"text":"这不是魔鬼在帮忙，而是自我催眠，预言的自我实现","quote":"“这不是理智的行动，而是魔鬼的帮忙！”","chapter":""},{"text":"因为这里存在幸存者偏差，那些被公布出来的犯罪自然已经找到犯罪者，但还有大量的犯罪实际上并没有被绳之以法。","quote":"开头——其实是在很久以前——就有一个问题引起了他研究的兴趣：为什么几乎一切犯罪行为都这么容易被发觉和败露？","chapter":""},{"text":"骨瘦如材、体态匀称、还很美，为啥看起来是相反的三个描述，不知原文怎么写的？","quote":"这是个骨瘦如柴的女人，身材相当高，体态匀称苗条，头发深褐色的，还很美，两颊当真泛出了肺痨病的红潮。","chapter":""},{"text":"有时候责备本身就是一种救赎，因为它是对罪的发泄，对罪的驳斥，对罪的另一种合理化解释。不责备，才是最大的怪罪。","quote":"他们为人们发愁，为人们悲泣，而绝不责备，绝不责备！他们不责备，这更叫人难受，更叫人难受！","chapter":""},{"text":"看完这个序言，得缓两天再读正文，好让脑袋忘掉这个序言","quote":"对陀氏这样的作家最好还是不抱先入之见，随着作者的安排，先领略他的思想，然后再来作认真的思索。它不是消闲的读物，却能长人心智。","chapter":""},{"text":"因此有不少哲学家在说理时都会引用陀氏","quote":"小说家不是政治家或哲学家，重要的不在他能提出什么医治人生和社会的良方，因为这时他们往往是既幼稚又可笑的。文学的力量在于敏锐的发现，表现的深刻，在感性的图像里展示世界的真相和人性深处的奥秘。","chapter":""}],"popularHighlights":[{"text":"生活代替了理论，一个完全不同的东西应该在意识里形成了。","count":1458,"chapter":"二"},{"text":"我想在杯中物里寻找同情和感情……我喝酒，是为了我要使自己加倍地痛苦！","count":1428,"chapter":"二"},{"text":"可是我们现在的这部小说到此结束了。","count":1232,"chapter":"二"},{"text":"因为我尽说废话，所以我什么也不干；但是话又得说回来，或许正因为我什么也不干，所以我尽
