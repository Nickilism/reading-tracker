nt":112,"chapter":">二重生活"},{"text":"但这是不可能的——契子在新宿的旅馆里被人杀害，肯定是哪里搞错了","count":105,"chapter":">两张面孔"},{"text":"况且我还用比平时戴的颜色更深的墨镜将支仓竣最标志性的特征——如野兽般危险、又如少年般天真的灰色眼眸——隐藏了起来。","count":104,"chapter":">替身"},{"text":"刑警瞪大了眼睛，堀部点点头。 “没错，就是让她真的得上这种病。从四年前的一月起，横住他们对住院中的伊原之妻所做的并不是治疗，而是令她发病。”","count":102,"chapter":">鼠之夜"},{"text":"绑匪所谓“没错”的星期五却压根没有联络。第三次联系是一天后的星期六下午两点五十五分。","count":96,"chapter":"3"},{"text":"在我坠入黑暗之前，听到了好似鼓掌的声音。而那是对倒地的我鼓掌，还是对最终放倒我的另一个我鼓掌呢？这就不得而知了。","count":96,"chapter":"7"},{"text":"街上的霓虹灯微微闪烁，犹如五彩缤纷的蝴蝶，在冬日的夜空中舞动个不停。","count":90,"chapter":"9"},{"text":"二十余年的岁月让大博右臂上的伤疤消失了，但我的右臂上还残留着L形的刀痕。","count":90,"chapter":">鼠之夜"},{"text":"如果恭子真的背叛我到那种地步，就算被杀我也无话可说了。","count":78,"chapter":"3"},{"text":"千鹤说自己的身体就像化石，要我说，她的身体真就是我们过往的爱情和十年岁月凝成的一块化石。","count":75,"chapter":"9"},{"text":"但是，她并不是我所追求的契子。我所爱的契子，是必须被狂暴的火海所吞噬，是晦暗、神情涣散、只存在于阴影中的女人。","count":72,"chapter":"2"},{"text":"从今往后，关于那桩案子，我将永远保持缄默。","count":72,"chapter":"5"},{"text":"典子是清白的，所以我也是清白的’——就是这么回事，阿洋只是为了能在刑警面前说出这句话，就杀了一个人……”","count":72,"chapter":"6"},{"text":"土屋的兴趣不在妻子那三小时的行踪上，在意的是我剩余二十一小时的行踪。","count":70,"chapter":"7"},{"text":"我将口红抛入海中，等待着巡逻船经过。我伸出好不容易获得了自由的双手，抽了支烟。","count":70,"chapter":"4"},{"text":"契子的存在也如同那个盘子，从肖像画完成的那一刻起，就没有任何意义了。","count":68,"chapter":"2"},{"text":"是戒指。 翡翠镶嵌在十字形状的白金底座上，与深深嵌入新宿女尸手指的戒指一模一样。","count":68,"chapter":"4"}]},"33810356":{"rating":818,"ratingCount":5295,"highlights":[{"text":"辩证法是逻辑的源头，但是却来自于修辞学，而修辞学则是神话和古希腊诗学的传承。这既符合历史，也符合常识。而诗与神话则是史前人类对周遭世界的反映，而且以良质为根基。所以，归根结底，是良质而非辩证法酝酿了我们所知的这一切。","chapter":"30","color":0},{"text":"我记得柯勒律治￼曾经说过：“一个人如果不是柏拉图的信徒，就是亚里士多德的信徒。”不能忍受亚里士多德永无止境的分析，必然会喜好柏拉图天马行空的概念。不能忍受柏拉图高远的唯心主义，必然欢迎亚里士多德的实际。柏拉图实质上和佛陀一样，是对终极的追求者，每一代都不断有这样的人出现，殚精竭虑地寻找宇宙存在的源头。而亚里士多德则代表了维修摩托车的技术人员，他喜欢世间万象。","chapter":"29","color":0},{"text":"而神话先于理性的论点认为，每一个孩子出生的时候，都像穴居人一样无知。而这个世界之所以不会一代一代退化到原始形态，是因为每一代都有属于他们自己的神话。虽然神话已经被理性取代，但是理性仍然是一种神话。整个庞大的常识体系把我们的心连在一起，就像我们的身体把细胞连在一起一样。如果认为一个人和社会并不这样相连，而且可以随意接受或拒绝神话，那就不了解神话的意义了。","chapter":"28","color":0},{"text":"你做任何一件事都可以把它做得很漂亮，或是很丑陋。而你要想有高品质的表现，做得漂亮一点儿，就必须有能力知道什么是好，并且有能力理解实现目标的方法，也就是同时具有对良质的古典和浪漫的认知。","chapter":"25","color":0},{"text":"传统的理性将世界分为主观和客观，把良质摒除在外，一旦卡住了的时候，任何主客观的事物均无法像良质一样，告诉你该往哪里去。","chapter":"24","color":0},{"text":"这个时候，你面对的正是西方思想里最大的缺憾。你需要一个解决的方法，然而传统科学不曾教导你如何自己摸索着解决。它让你清楚地知道身在何处，也能够验证你拥有的知识，但是它无法告诉你该往何处去，除非你的方向只是过去方向的延续。因此创意、原创力、发明、直觉、想象——换句话说就是“不被卡住”——全在它的研究范围之外。","chapter":"24","color":0},{"text":"他判断科学家选择事实、假设和公理是基于和谐，却在这个谜题的边缘留下一块一块的空白。他在科学世界中留下了这个印象——所有科学现实的源头不过是一种主观的、反复无常的和谐","chapter":"22","color":0},{"text":"与庞加莱同时代的人拒绝接受事实是预先选择的，因为他们认为这样做会摧毁科学方法的有效性。他们假定“预先选择的事实”就是说真理是“任何你喜欢的东西”，而且称他的观念是约定主义。他们有力地忽视掉这一真相——他们自己的“客观性的原则”本身并非一个可观察的事实，因此按他们自己的准则，应该被暂时搁置。\n他们感到自己必须这样做，因为如果不这样，整个科学的哲学支柱就会崩溃。庞加莱并未提供任何对这个迷惑之境的解答。他走得不够远，还没能进入他所谈论的问题的形而上学的层面，所以未能给出解决之道。他忽略未说的是，在你“观察”它们之前，你要选择的事实是“任何你喜欢的东西”，只存在于一个二元的、主观-客观的形而上学的系统中。当良质作为第三个形而上学的实体进入这幅图像之中，事实的预先选择便不再是任意的。事实的预先选择并非基于主观的、反复无常的“任何你喜欢的东西”，而是基于良质，即现实自身。因此，困境消失了。","chapter":"22","color":0},{"text":"庞加莱清楚地说明，他不是在谈论浪漫美，那种震撼感官的外表之美。他是在谈论古典美，它从各部分的和谐秩序中所生，只有纯粹智慧才可以把握；它给浪漫美以结构，没有了它生命会变得模糊无常，和做梦一样，你甚至无法分辨它和你做的梦有何区别，因为将没有任何依据去进行分辨。正是这特别的古典美的探求，这种宇宙和谐的感觉，使我们选择了更适于贡献给这个和谐的事实。并非是这些事实，而是事物之间的关系造就了宇宙的普遍和谐，这才是唯一的客观现实。\n保证了我们生活于其中这个世界的客观性的是，它是我们以及其他会思考的生物所共有的。通过跟其他人的沟通，我们接收到现成的和谐推论。我们知道这些推论并不是我们作出的，而同时因为它们的和谐，我们在它们之中辨认出了那些像我们一样的理性生物的行为。因为这些推论似乎符合我们感知的世界，我们认为我们可以推论出，这些理性的生物和我们看见过同样的事物，于是这就让我们知道，我们不是在做梦。正是这和谐，如果你愿意的话，可以说正是这良质，是我们可知的唯一现实的唯一基础。","chapter":"22","color":0},{"text":"他说数学不只是规则应用的问题，至多是门科学。它不只根据某些固定的法则去做最多可能的组合。如此得来的组合会是过量的、无用的而且累赘的。发明者的真实工作在于选择这些组合，以便减少无用者，或者设法避免制造它们的麻烦；而指引这一选择的规则是极其精美而微妙的，几乎不可能精确地描述它们，它们必须被感觉而非被陈述。\n然后庞加莱假设这个选择是由他所谓的“潜意识自我”所作出的，一个跟斐德洛所谓的先于知识的阶段的意识刚好符合的实体。庞加莱说，“潜意识自我”注视着一个问题的一大串解决方案，但是只有有趣的可以闯进意识领域内。数学解答是由潜意识自我所选择的，是基于“数学之美”，数字与形式的和谐，以及几何学的优雅。庞加莱说：“这是一种所有数学家都知道的真实的美感，可是世俗者对此是如此无知，以至于经常想笑。”但是这和谐、这美丽，是它整个的核心。","chapter":"22","color":0},{"text":"庞加莱认为，要解决数学真理是什么的问题，我们应该先问问我们自己，几何公理的本质是什么。它们是康德所说的先验综合判断吗？也就是说，它们是否作为人意识的固定部分而存在，独立于经验而非由经验创造？庞加莱认为不是这样。如果是这样的话，它们会将自己强加于我们身上，力量大得使我们无法构想相反的命题，也无法以它为基础构建一栋理论大厦。就不会有非欧几里得几何学。\n我们应该就此下结论，说几何学公理是实验性的真理吗？庞加莱还是认为并非如此。如果它们是，那么当新的实验资料进来时，它们会倾向于持续的变化和修正。这似乎跟几何学自身的整个本质相反。\n庞加莱下结论道，几何学的公理都是人为的“约定”，我们在所有可能的约定中所作出的选择是由实验事实所指导的，但是它仍保有自由之身，仅受避免任何矛盾的必要性所限。因此，也就是说，即使实验法则只是近似的，但这些法则所选择出来的假设却可以保持严格的真实。换句话说，几何学公理不过是伪装过的定义。\n然后，既然已经明确了几何学公理的本质，他转而考虑这个问题，欧几里得几何学是真的，还是黎曼几何学是真的？\n他回答：这问题毫无意义。\n就好像我们这么问：是否英尺制是对的而常衡制是错的？是否笛卡儿坐标是对的而极坐标是错的？一个几何学不可能比另一个更正确，它只可能是更方便。几何学与对错无关，而与先进与否有关。\n然后庞加莱继续验证其他科学概念的约定本质，例如空间与时间。他告诉我们，测量这些实体时，没有任何一种方式会比其他方式更真实，通常被采纳者只是更为方便。\n我们对空间与时间的概念也只是定义，是在它们处理事实的方便性基础上所作出的选择。\n这种对最基础的科学概念的理解还不完全，但无论如何，时间和空间是什么的奥秘，可能通过这个解释变得更可理解了，可是现在，维持宇宙秩序的负担落在了“事实”身上。那么事实是什么呢？\n庞加莱继续批判性地检查这些。他问，什么事实是你将要去观察的？它们是无穷的。与一只猴子坐在打字机前乱敲乱打以产生祈祷诗篇的机会相比，未经抉择便对事实进行观察以产生科学的机会，不会更多。\n这点对于假设来说一样成立。哪些假设？庞加莱写道：“如果一个现象接受一个完全机械的解释，那么它也要接受其他无数个可以同样好地描述实验现象的解释。”这正是斐德洛在实验室里所作的陈述，正是它引发了后来迫使他退学的那个问题。\n庞加莱说，如果科学家可以随心所欲地拥有无限的时间，只需要告诉他注意观察。但既然没有时间去观察每样事物，而且与其错看不如不看，对他来说，还是必须作一个选择。\n庞加莱确定了一条规则：有一个事实的层次结构存在。\n一个事实越普遍，越是值得珍惜。那些能够多次使用的比很难再次出现的更好。比如，如果只有个体而没有种群，也没有遗传机制使孩子像他的父母，那么生物学家就没有办法建立生物科学。\n什么事实像是能够再次出现的？简单的事实。怎么认出它们？选择那些看上去简单的。要么它是真的简单，要么就是那些复杂的要素不好辨认。在第一种情况下，我们极有可能再次遇见这个简单的事实，它要么独自出现，要么作为一个复合事实的要素出现。","chapter":"22","color":0},{"text":"我不知道他得出这个结论时，思考了多少，但是最后，他认为良质不会单独与主观或客观发生关系，而是只在这两者产生关系的时候才会出现，也就是说在主观和客观交会的一刹那。\n听起来很顺耳。\n良质并不是一种物体，它是一种事件。\n更顺耳了。\n它是主观意识到客观的存在时所发生的事件。","chapter":"19","color":0},{"text":"“无”不是表示一无所有，“无”只是说没有等级，不是“一”，不是“零”，不是“是”，也不是“非”。它表示在回答一个问题的时候，超越了“是”与“非”的等级，因而它所强调的就是不去问问题。","chapter":"26","color":0},{"text":"人们对于良质有不同的看法，并不是因为良质本身有差异，而是每一个人的经验背景不同。所以他推测，如果两个人有完全相同的背景，那么他们眼中的良质也会完全相同。","chapter":"20","color":0},{"text":"为什么每一个人所看到的良质都不同？以前这样的问题他要花极大的篇幅进行回答，而现在他这样回答：“良质无形、无状，也无法形容。去看形状和形式就是知识化。而良质是独立于形状和形式之外的。我们给良质的名字、形状和形式只有部分基于良质自身，另一部分则基于我们由经验中得出的先验的印象。我们不断地在良质事件中寻找与我们过去经验相似的东西，如果找不到就无法行动。我们正是根据这些东西建立起了我们的语言。我们正是根据这些东西建立起了我们的整个文化。”\n他认为每个人看到的良质都不同的原因在于，每一个人都有不同的背景。他以语言为例，我们听印度语中da、da和dha的发音感觉都一样，是因为没有和他们相似的背景，所以无法分辨那些音节的差异。同理，大部分说印度语的人，也不能分辨英语中的da和the有何不同。他说，对印度村民来说，看见鬼魂是很正常的现象，而要他们明白万有引力定律却十分困难。","chapter":"20","color":0},{"text":"浪漫的良质总是与瞬时的印象相结合，而古典的良质总是需要一段时间的考量。浪漫的良质是指此时此地的事情，而古典的良质则超越此刻，必须考虑现在与过去和未来的关系。从浪漫的观点来看，过去和未来都包含在此刻之中，这就是活在当下的态度，那么，如果摩托车此刻仍然正常行驶，为什么要替它操心呢？如果你从古典的角度去看，现在只不过是过去与未来之间的一瞬，忽略过去和未来对现在的影响，就是坏的良质。摩托车现在可能正常行驶，但是最近什么时候检查过油表呢？从浪漫者的观点来看，这样想有些大惊小怪，但是对古典的人来说却是常识。","chapter":"20","color":0},{"text":"“过去”只存在于我们的记忆之中，“未来”则存在于我们的计划之中，而只有“现在”才是唯一的现实。你从知识角度所意识到的那棵树，由于这一小段时间的关系，便属于过去，因而对你来说并不真实。任何从知识角度所意识到的总是存在于过去，因而都不真实。所以现实总是存在于你看到的那一刹那，而且是在你形成关于它的知识之前。除此之外，没有别的现实。这种先于知识的现实，就是斐德洛所谓的良质。由于所有可从知识角度定义的事物必须来自于这一先于知识的现实，所以良质是因，是所有主体以及客体的根源。","chapter":"20","color":0},{"text":"他以万有引力法则结束，也就是在我们旅行的第一天晚上，我给约翰、思薇雅以及克里斯举的例子，���果主观被视为不重要的，那么整个科学体系也会随之瓦解。","chapter":"19","color":0},{"text":"他的答案，在哲学上可被称为实在论。他说：“要证明一个东西的存在，可以把它从环境中抽离出来，如果原先的环境无法正常运作，那么它就存在。如果我们能证明没有良质的世界运作不正常，那么我们就能证明良质是存在的。不论有没有给它定义。”接着他把良质从我们所知道的这个世界中抽离出来。","chapter":"18","color":0},{"text":"良质是一种思想和陈述的特质，我们不能经由思考的方式了解它，因为下定义是一种严格而规范的思考过程，所以良质无法被定义。”","chapter":"17","color":0},{"text":"印刷品复制了艺术，却不是艺术，","chapter":"15","color":0},{"text":"有时候你只要把新手或蹩脚的人和高手作比较，就会发现其中的差异。老手根本就不会照着指示去做，他边做边取舍，因此必须全神贯注于手上的工作，即使他没有刻意这样做，他的动作和机器之间也自然地有一种和谐感。他不需要遵照任何书面的指示，因为手中物质的本质决定了他的思路和动作，同时他的思路和动作也在不断改变他手中物质的本质。所以物质和他的思想一同不断地改变，直到他的内心与物质同时达到正常与平静。","chapter":"14","color":0},{"text":"如果你对事情有完全的信心，就不太可能产生狂热的态度。就拿太阳来说吧，没有人会为了它明天会升起而兴奋不已，因为这是必然的现象。如果有人对政治或是宗教狂热，那是因为他对这些目标或是教义没有完全的信心。","chapter":"13","color":0},{"text":"对于所有的学生来说，这一定是个奇怪的观念，我想象得到他已经期待很久了，希望将这个观念灌输给学生，或许也在期待他们提出这个问题——你认为什么才是真正的大学？\n为了回答这个问题，斐德洛所做的笔记是这样写的：真正的大学并没有特定的地点，也没有校产；既不支付薪水，也不接受物质的报酬。真正的大学是心灵的世界，是多少世纪以来流传给我们的理性思想，它不存在于任何特定的建筑物之内。这种心灵的世界，许多世纪以来都是通过一群所谓的教授所传递的，而教授这个头衔并不是真正大学的一部分，大学的本质在于流传下来的理性自身。","chapter":"13","color":0},{"text":"逻辑就是把主客观分开，所以逻辑不是最高的智慧，想要消除这种因划分主客观所产生的幻觉，最好的方法就是减少生理、精神和情感上的活动。为了达到这个目的，有许多修炼的方法，其中最重要的一种方法，就是所谓的“禅”了。","chapter":"12","color":0},{"text":"在所有东方的宗教当中，梵文教义“tat tvam asi”被推崇备至，“彼即汝”，它宣称，你认为你所是的与你认为你所感的是不可分割的。完全认识到它们是一个整体，就是开悟。","chapter":"12","color":0},{"text":"哥白尼认为地球绕着太阳公转。这种革命性的认识似乎没有改变任何自然现象，但是却改变了人类所有的观念。照康德的说法，就是客观的世界完全没有改变，但是我们主观的认知却彻底改变了。正是因为接受了“哥白尼的革命”，现代人才与中世纪的前辈有了明显的区别。","chapter":"11","color":0},{"text":"从某个角度来看，浪漫的人对于理性的诅咒，主要是因为理性以极高的效率把人类从原始的状态当中提升起来，它是这样有力地主宰了文明世界，因而排除了其他一切，完全控制了人自己，这就是抱怨的来由。","chapter":"11","color":0},{"text":"各种资料、史料、理论和假设不断地大量增加，科学把人从唯一绝对的真理，引向多元、摇摆不定、相对的世界，是造成社会混乱、思想价值混淆的主要元凶。而这一切现象原本是科学要消灭的。许多年前斐德洛在实验室中已经觉察到的结果，如今在这个科学世界中随处可见。科学反而制造出反科学的混乱。","chapter":"10","color":0},{"text":"人类用最适合自己的方式，描绘了一幅最简洁、最容易了解的世界图像。然后在一定程度上用他的世界图像替换掉经验世界，并由此掌控经验世界……他把这个宇宙模型和对这个模型的构建作为人生情感的依托，这样才能找到安宁，而这安宁是无法从个人狭窄的经验当中获得的……最崇高的工作……就是要建立那些普世的基本法则，这些法则经过演绎就能创造出整个宇宙。然而这些法则无法通过逻辑推理获得，唯有通过建立在对经验的深切理解之上的自觉，才可以达到……","chapter":"10","color":0},{"text":"因为一个实验并不会因为没有达到预期的结果就被称为失败了，只有它的结果无法检验假设的真假时才会被称为失败了。","chapter":"9","color":0},{"text":"如果只触及问题的结果，而不知道原因在何处，是不可能有任何改变的。真正的系统、现实的系统，就是我们当前的系统观，也就是理性自身。如果把整个工厂拆毁了，而架构它的理性仍然存在，那么靠着这个理性很容易就可以建造另一座工厂。如果革命能够摧毁一个政府，但是政府背后的理性仍然完整地保存着，那么很快又可以建立同样的政府。我们谈论了这么多有关系统的事，然而对系统了解得仍然不够。","chapter":"8","color":0},{"text":"而大部分的问题往往是在像以前的广播员所说的“两耳之间短路了”后所产生的。所谓两耳之间的短路也就是无法正常思考。","chapter":"8","color":0},{"text":"“我也不知道，因果似乎无法解释他的状况。因果逻辑是思想上的产物，我认为精神疾病先于人的思想。”","chapter":"5","color":0},{"text":"这个逐渐浮现出来的原因就是：我从理性、知识的角度去看这个铝片，其中牵涉到金属的所有科学上的特性。而约翰却从直觉和当下的角度去看待它。我是从内涵着手，而他却是从物的表象开始。我看到的是这个铝片的意义，而他看到的却是这个铝片的外观。所以，如果你只看到铝片的外表，当然会沮丧，谁会喜欢在一部新买的摩托车上安装废铝片呢？","chapter":"5","color":0},{"text":"通常我会选一本他不懂的书，以备对答之用，我先读一两个句子，然后等他一连串地发问，然后回答他的问题，之后再读一两个句子。用这样的方法读经典作品很有用，它们一定是用这种方式写成的。有的时候，整个晚上我们都在不断阅读、讨论，而往往只读了两三页，这是一个世纪以前的阅读方式……当时肖陶扩非常流行，除非你也这样做，否则你就不知道究竟有多么愉快。","chapter":"4","color":0},{"text":"自然的法则是人类发明的，就像鬼的存在一样。逻辑学、数学都是如此，所有值得赞美的事，都是人类的发明。如果你认为不是，你的这一思想本身仍然是人类发明的一部分。这个世界也是人类所想象出来的，整体来说也是一种鬼魂。在古代，我们所居住的这个美妙的世界就被如此认知，它由鬼魂所控制，我们之所以能看到这个世界，是因为鬼魂让我们看见，他们是摩西、耶稣基督、释迦牟尼、柏拉图、笛卡尔、卢梭、杰斐逊、林肯，等等，牛顿是非常好的一位，可算其中最好的之一。所以我们的常识就是由过去成百上千的鬼魂的声音所构成的，他们企图在活人中间找到他们的位置。","chapter":"3","color":0},{"text":"当你做某件事的时候，一旦想要求快，就表示你再也不关心它，只想去做别的事。","chapter":"2","color":0}],"thoughts":[{"text":"这话说的好像亚里士多德和柏拉图还健在似的…","quote":"而智者的尸骨早已化为尘土，他们所说的也和他们一样烟消云散。这些尘土被埋在覆灭的雅典和马其顿帝国的瓦堆之中，之后是古罗马帝国和拜占庭帝国，接着是奥斯曼帝国，接着是现代国家——被埋得这么深，而且被蒙上了一层礼法、虚伪和邪恶，以至于只有很多个世纪之后出现的这个疯子，才发现了可以将前人出土的线索，同时恐惧地看清了他们的所作所为……","chapter":""},{"text":"按维特根斯坦的说法，这就是哲学病。善和快乐的定义是什么就是一种语言游戏，只有在使用中我们才能明白，单纯的论说何为善何为快乐是没有意义的。","quote":"善究竟是什么呢？我们如何去定义呢？由于每一个人都有不同的定义，我们如何知道哪里才有善呢？有人认为善存在于快乐之中，但我们又怎么知道快乐是什么呢？而快乐又该如何定义呢？快乐和善不是客观事物。我们无法用科学的方法研究它们。","chapter":""},{"text":"就我看过的哲学入门书籍而言，都说智者是诡辩家，为了达到言说的目的并不在意何为善何为真。","quote":"柏拉图对智者的恨牵涉到当时一场思想上的争斗。代表善的智者和代表真的辩证学者为人类未来的精神走向而争斗。真这一方赢了，而善输了。这就是为什么我们今天接受真理很少有困难，而接受良质的阻力则很大，即便二者有同样自洽的理论基础。","chapter":""},{"text":"在这个问题上，良质就是用力生活，用力工作。无论是枯燥的工作还是单调的生活，用力去感受，总能找到一点乐子，即使是自我安慰，那也是在枯燥与单调之外的一种情调。","quote":"他很可能会发现，自己成了一个更有趣的人。而对他周围的人来说，他也不再是物体，因为他选择了良质。不只他自己和工作受到影响，在他周围的人也会逐渐改变，因为良质会像水波一样荡漾开来。他手中的工作具有良质，于是会让人有不同的感受。感受到的人会觉得这种感受不错，就可能会把它传播给别人，这样一来良质就会不断繁衍开来。\n我个人的感觉是，这就是世界不断改进的方法：让个人越来越珍惜良质，仅此而已。上帝啊，对于包罗万象的各种社会规划和有赖于此的那些宏伟蓝图，如果它们把个体的良质排除在外，那么我便不会对它们表现出任何热情。让我们重新考虑这些活动。它们当然很重要，只是我们必须意识到，它们要以具有良质的个人为基础。","chapter":""},{"text":"按这意思，所有方法都蕴含着良质？","quote":"所以解决的方法多得难以预估。","chapter":""},{"text":"螺丝卡住拧不下来，这是一个经验问题，经验问题最方便的解决方法就是去作者当时还无法体验的人类样本收集器——互联网上寻找答案。","quote":"如果你有经验，可能会先抹上渗透力强的油，然后再用冲击钻。但是如果你经验不够，就可能会用一把自锁的水泵钳夹紧螺丝刀，用力拧，你以前成功过，但这回你却把螺钉的螺纹拧烂了。\n本来你一直在想盖子拿下来之后该做什么，所以过了一会儿你才发现，原来以为螺钉被卡住了只不过是小事一桩，现在问题可大了。所有的事都得停下来。\n在科学界或是科技方面这种情形最常出现。就传统的维修观点来说，这是最糟糕的一刻，在你动手前最不想碰到的就是这种事。\n操作手册对你来说形同废物。科学的理性也是一样。因为你不需要做任何实验来找出问题的根源。问题很清楚，你只需要知道如何把脱扣的螺钉取下来，而科学方法在这个时候完全不管用。只有问题解决了之后，科学方法才好用。","chapter":""},{"text":"与无限只猴子打出莎士比亚的概率相比，更难的是在它们打出的文本中找到莎士比亚。","quote":"与一只猴子坐在打字机前乱敲乱打以产生祈祷诗篇的机会相比，未经抉择便对事实进行观察以产生科学的机会，不会更多。","chapter":""},{"text":"围绕欧几里得第五公设的故事还有很多有意思的地方，但咱们的教科书鲜有提及，即使作为八卦讲述，也是能带动学习积极性的呀。","quote":"所以他们就逆转了欧几里得的假设。\n罗巴切夫斯基首先假设，通过一个定点可以画出已知直线的两条平行线。他保留欧几里得的其他一切假设，从这些假设中演绎出一系列定理，而其中没能发现任何矛盾。从而他构建了一门新的几何学，它的逻辑没有任何错误，丝毫不逊于欧几里得的几何学。\n因此，由于他没能发现任何矛盾，他证明了第五公设不可能简化为更简单的公理。\n令人恐慌的并非这个证明本身，而是它带来的理性冲击。一个巨大的阴影迅速笼罩了它以及数学的整个领域。数学，这一科学确定性的基础突然不再确定了。\n现在，不可动摇的真理在我们眼中有两个互相矛盾的形象，对各种年纪的人而言，它们都是真的，不论他们喜好如何。","chapter":""},{"text":"将 Quality 翻译成良质，真不是一个好翻译，它预设了一个良，隐含了褒义的概念。非常容易引起误解和歧义。然而用质量一词却又容易混同于日常用语，如何翻译，确是难题。","quote":"道[良质]可道[定义]，非常道[绝对的良质]。","chapter":""},{"text":"这句话就导向相对主义了，我并不认同。一群外国学生无法分别出古诗文的良质区别，并不意味着不存在良质上的区别，这不是古诗文的问题，而是判断力的问题。\n两个完全相同背景的人就意味着有完全相同的良质？我也不这认为，因为不存在完全背景相同的人，完全背景相同的就是同一个人，说同一个人有相同的良质，本身是没有意义的。","quote":"人们对于良质有不同的看法，并不是因为良质本身有差异，而是每一个人的经验背景不同。所以他推测，如果两个人有完全相同的背景，那么他们眼中的良质也会完全相同。","chapter":""},{"text":"这里还有一处控制变量方法上的缺陷，如何做到一个没有良质的世界的其他要素都保持不变？当一个世界没了良质时，是否会同时多出另一要素使世界继续存在？你永远无法在一个已经有良质的世界去设想另外一个不存在良质的世界。","quote":"他的答案，在哲学上可被称为实在论。他说：“要证明一个东西的存在，可以把它从环境中抽离出来，如果原先的环境无法正常运作，那么它就存在。如果我们能证明没有良质的世界运作不正常，那么我们就能证明良质是存在的。不论有没有给它定义。”接着他把良质从我们所知道的这个世界中抽离出来。","chapter":""},{"text":"对不能言说的保持沉默，不需要去定义良质，你只需要在现实的语言游戏中去使用它","quote":"他沉默了好一阵子：“我知道有所谓的良质存在，但是一旦你想去定义它，情况就会变得很混乱，因而无法做到这一点。”","chapter":""},{"text":"虽然这个解释有点理想化，它抛开了大学的日常支出、教职工薪水、招生规模、教学经费申请…但我还是喜欢这样的解释，因为只有这种精神上的构建才能支撑的住时间的洗涤。","quote":"教授这个头衔并不是真正大学的一部分，大学的本质在于流传下来的理性自身。","chapter":""},{"text":"理性让人类之旅途再无归乡之日，让几欲依托宗教之依靠的人心复归于浮萍。","quote":"从某个角度来看，浪漫的人对于理性的诅咒，主要是因为理性以极高的效率把人类从原始的状态当中提升起来，它是这样有力地主宰了文明世界，因而排除了其他一切，完全控制了人自己，这就是抱怨的来由。","chapter":""},{"text":"这套观点倒是和马克斯韦伯的「世界的祛魅」不太一样。按韦伯的观点，科学研究现象不研究意义，高度专业化的学科，细分的领域，让人们相信通过计算可以支配万物。我们再也不必相信神灵、魔法的存在，信仰失去了坚实的根基，终极价值不再具有公共性。","quote":"各种资料、史料、理论和假设不断地大量增加，科学把人从唯一绝对的真理，引向多元、摇摆不定、相对的世界，是造成社会混乱、思想价值混淆的主要元凶。而这一切现象原本是科学要消灭的。许多年前斐德洛在实验室中已经觉察到的结果，如今在这个科学世界中随处可见。科学反而制造出反科学的混乱。","chapter":""},{"text":"现有疾病，才有对疾病的定义","quote":"“我也不知道，因果似乎无法解释他的状况。因果逻辑是思想上的产物，我认为精神疾病先于人的思想。”","chapter":""},{"text":"当我们生活工作时，会默认带上一种主视角，一种身份认知，一种生活形式。如果遭遇到意外，也就是与这种生活形式相冲突的事件，如果我们无法切换自己的身份认知，无法改变主视角，那么这个意外就是一种障碍，会成为我们恼怒的原因。一个能对各种情况得心应手之人，不被意外左右情绪的人，必定是善于切换主视角之人，他能改变自己的身份认知来处理各种意外。","quote":"因为这样很可能会威胁到他整个的生活方式。","chapter":""},{"text":"这种四处看看再回望问题的解决之道，倒不仅仅只适用于机械方面，我认为在一切的人生难题，小到考试，大到人生抉择都可以，也应该用上。","quote":"这个逐渐浮现出来的原因就是：我从理性、知识的角度去看这个铝片，其中牵涉到金属的所有科学上的特性。而约翰却从直觉和当下的角度去看待它。我是从内涵着手，而他却是从物的表象开始。我看到的是这个铝片的意义，而他看到的却是这个铝片的外观。所以，如果你只看到铝片的外表，当然会沮丧，谁会喜欢在一部新买的摩托车上安装废铝片呢？","chapter":""},{"text":"学习一下，用来教孩子","quote":"通常我会选一本他不懂的书，以备对答之用，我先读一两个句子，然后等他一连串地发问，然后回答他的问题，之后再读一两个句子。用这样的方法读经典作品很有用，它们一定是用这种方式写成的。有的时候，整个晚上我们都在不断阅读、讨论，而往往只读了两三页，这是一个世纪以前的阅读方式……当时肖陶扩非常流行，除非你也这样做，否则你就不知道究竟有多么愉快。","chapter":""},{"text":"存在即被感知？","quote":"约翰皱了皱眉头，不知道我要说什么。\n我说：“我的意思是，在有地球之前，在日月星辰形成之前，在一切之初，万有引力定律就已经存在了。”\n“当然。”\n“万有引力定律没有自己的质量，没有自己的能量，当时人尚未出现，所以也不存在于人的心灵之中。它也不在空间里，因为没有空间存在，更不存在于任何地方——这个万有引力定律仍然存在吗？”\n现在约翰可就不那么肯定了。\n我说：“如果万有引力定律存在，那么说实在的，我就不知道什么是非存在了。我认为万有引力定律已经通过所有非存在的测试，你想不出它有什么不符合非存在的属性，或是证明其存在的任何科学属性。然而一般人仍然认为它是存在的。”","chapter":""},{"text":"求快的原因在于在意的是结果，而做事只当作过程，如果能将做事作为目的，而结果作为过程那势必将会有不同。这一点，拿人生来举例尤为明显，如果将死亡当作人生的目的，那便是自杀，很快就能到终点，若将人生之过程视为人生的目的，那自然会慢慢来，慢慢品味。","quote":"当你做某件事的时候，一旦想要求快，就表示你再也不关心它，只想去做别的事。","chapter":""},{"text":"我感觉倒可能不是科技的问题，而是身份认知的问题。这对夫妻对自己的身份认知是两个不懂科技的人，不会动手操作的人，有了这样的身份认知碰到对应的问题也便束手无策疲于应付了。先要从观念上改变自己的身份认知，才有可能有动力去改变现实。","quote":"问题不在于摩托车，也不在于水龙头，问题在于他们无法应对科技的产物。这样一来，发生的各种状况便明朗起来了，我知道，就是科技的关系。思薇雅曾经很不喜欢一个朋友，因为对方认为电脑程序设计很有创意。而他们夫妻的绘画和相片里则完全没有跟科技有关的景物。这就不难理解，她为何不会对水龙头大发脾气，因为人们总是在长年累月都深深厌恶的对象面前一再压抑自己的怒气。这就不难理解，约翰为何只要一碰到维修车子的问题就会打退堂鼓，即使他已经很明显地在为此受苦。你只要稍加注意就会明白，这些都是科技惹的祸。这就是为何他们要骑着摩托车到乡野去享受阳光和新鲜空气。而我总是把他们不愿意去面对的问题搬到台面上来，因此使他们二人十分尴尬。这就是为何只要我们一谈到这方面的问题，谈话就会中断。","chapter":""}],"popularHighlights":[{"text":"当你做某件事的时候，一旦想要求快，就表示你再也不关心它，只想去做别的事。","count":13719,"chapter":"2"},{"text":"我们总是很忙，没有时间好好交谈，结果日复一日地过着无聊的生活，单调得让人几年后想起来不禁怀疑，究竟时间都去哪儿了，同时又遗憾于它的流逝。","count":11295,"chapter":"1"},{"text":"我们刻意避免按照固定的行程前进，宁可随心所欲地走走停停，因为旅行本身远比赶赴某一个目的地更加惬意。","count":10752,"chapter":"1"},{"text":"除非他真正感觉需要别人的帮助，否则别人的介入只会引起他的厌烦。","count":9390,"chapter":"1"},{"text":"她常常因城市生活的单调乏味而郁郁寡欢，也许这无尽的草原和长风能使她明白，当你接纳了单调和无聊，你就能看到背后另有深意。它就在此地，而我无以名之。","count":8624,"chapter":"2"},{"text":"这就是问题的根源，人在思考和感觉的时候往往会偏向于某一种形式，而且会误解和看轻另一种形式。然而没有人会放弃自己所看到的真理，就我所知，目前还没有人可以真正融合两者，因为这两者之间根本就找不到交会点。","count":7650,"chapter":"6"},{"text":"什么是好，斐德洛，什么又是不好——我们需要别人来告诉我们答案吗？","count":7215,"chapter":"引言"},{"text":"骑摩托车和其他的旅行方式完全不同。坐在汽车里，你总是被局限在一个小空间之内，因为已经习惯了，你意识不到从车窗向外看风景和看电视差不多。你只是个被动的观众，景物只能在一个框框里无聊地从你身边飞驰而过。","count":5936,"chapter":"1"},{"text":"佛陀或是耶稣坐在电脑和变速器的齿轮旁修行，会像坐在山顶和莲花座上一样自在。","count":5760,"chapter":"1"},{"text":"如果你不放慢脚步认真思考，往往会花费更多的时间或得到更差的结果。","count":5181,"chapter":"2"},{"text":"如果你试过修理水龙头，但是情况依旧，那就表示你命中注定有个会滴水的水龙头。","count":4829,"chapter":"1"},{"text":"对于别人所相信的鬼魂，我们很容易傲慢而自负地进行攻击，但是对于我们自己心中的鬼魂，我们却非常无知而盲目地信仰着。","count":4485,"chapter":"3"},{"text":"从这些观察当中，我们必须加以选择，而我们所选择的和所观察到的，永远不一样，因为经由选择而产生了变化。我们从所观察到的无穷景致当中选出一把沙子，然后称这把沙子为世界。","count":4424,"chapter":"7"},{"text":"有的时候，到达目的地还不如在旅途中。","count":3984,"chapter":"10"},{"text":"当然，科学定理也不占用任何空间，也没有能量，因此也只存在于人的心中，所以完全科学的态度就是既不相信鬼，也不相信科学，这样你就安全了。然而这样一来，你就没有多少可以相信的了，但是唯有这样才是科学的态度。","count":3712,"chapter":"3"},{"text":"只为了未来的某个目标而生活是肤浅的，生命萃聚在山的四面，而不是在山顶，我们脚下才是万物生长之地。","count":3186,"chapter":"17"},{"text":"他并不是固执的人，心胸也不狭窄，既不懒惰也不愚蠢，所以这件事要解释起来还挺不容易的，就当成一个“未解之谜”随它去吧，对于一个没有答案的问题，穷追不舍又有什么好处呢？","count":3043,"chapter":"1"},{"text":"如果你对事情有完全的信心，就不太可能产生狂热的态度。就拿太阳来说吧，没有人会为了它明天会升起而兴奋不已，因为这是必然的现象。如果有人对政治或是宗教狂热，那是因为他对这些目标或是教义没有完全的信心。","count":2970,"chapter":"13"},{"text":"我整天都在想着说着斐德洛，而他们则一直在想这样的天气真难过，我想这才是真正使他们疲惫不堪的原因。那些令人不快的思想。","count":2856,"chapter":"7"},{"text":"能骑摩托车故地重游的确是件乐事，虽然这里不是什么名山大川，也没有什么名胜古迹，但这正是它迷人的地方。","count":2737,"chapter":"1"}]},"35821227":{"rating":848,"ratingCount":182,"highlights":[{"text":"思想的求道者须始终培育承受不确定的勇气，一如信仰者须始终培育承受确定性的勇气。","chapter":"§9.37 穷理尽性","color":0},{"text":"萨缪尔·亚力山大说：“美的对象并不是实际上的原貌，而是心灵将其自身的解释引入这一对象，并把那些它实际上并不具有的特征归之于它。”","chapter":"§9.30 “事实判断”与“价值判断”","color":0},{"text":"为简明起见，本章结束之际，我把关于普遍性的理解分成两种。第一种，可套用一个流行的论理词称之为“本质主义”。本质主义的本质在于：本质可以脱离范例得到规定和理解，换言之，本质不依具体事例、具体观察角度和思考角度而改变，它“在一切可能世界中为真”。环境对本质不具规定作用，唯当涉及本质的应用才需要考虑环境因素。抽象普遍性是一种肤浅的本质主义，机制普遍性是较为深刻的本质主义。本质主义从根本上是物理学式的；在我看来，它在很大程度上扭曲了它所欲理解的人类活动。\n另一种则从典范来理解普遍，为了对称，可以称之为“典范主义”。优秀的品格活在具体的人身上，优越的制度内嵌在特定的历史—社会之中；具体和特定并不妨碍我们学习这种品格、这种制度，相反，唯具体和特定才使学习成为可能；只不过我们不可把“向典范学习”简单化为“普遍者的应用”。学习过程不是把这种品格从具体的人身上剥离开来，把这种制度从特定的历史—社会中剥离开来，然后应用到自己身上，这个学习过程倒是一个可以恰当地用翻译来描述的过程。我还愿顺便提到，不仅弟子不必不如师，而且，我们向一个优秀的人学习，多半并不是想要变成这个人，“君子不例而同之也，取其善焉已尔”〔何景明，《与李空同论诗书》〕。\n“向典范学习”和“普遍者的应用”这个区别，不仅是对普遍性的智性理解的区别，它更是一种态度上的区别。我们向典范学习，典范却不是为了把自己做成典范让人学习。手握唯一真理的人，难免自视为真理的传教士，要用自己的行为来为人类立法。朋友之间，没谁想把别人变得像自己一样，也没谁要把自己变得像别人一样；没谁要把自己树立为别人的典范，同时，每一个都视他人为师，敏而好学，不是要把自己变得与别人相同，是要使自己变得更优秀、更丰富。","chapter":"§8.16 典范与本质","color":0},{"text":"不得说谎这条戒律在理性存在者范围内有效，这不是因为我们对理性存在者理应提出更高的要求，而是因为只有理性存在者才会说谎，而这又是说，只有在理性存在者身上，我们才理解“说谎”是什么意思，相应地，才理解“不得说谎”这条戒律是什么意思。","chapter":"§8.12 英语没有骈文","color":0},{"text":"书面语言里称作“放之四海而皆准的真理”，平常就叫它“废话”。","chapter":"§8.6 抽象普遍性","color":0},{"text":"说理盘道，理固然不可能只是某一事之理，道必是不同之事相通之道。唯如此，上升便成了方便法门，上升为概念，上升为理性，上升为普遍真理，越上升越轻飘，越上升越空洞。亦唯如此，怎样始终把事质保持在眼界之中，始终“寓于”特殊性，避免上升到抽象普遍，才是说理盘道要修的真功夫。","chapter":"§8.6 抽象普遍性","color":0},{"text":"说理并不是演算的一种残缺样式，仿佛说理一旦完善，所有的分歧都会消失。正由于论者过于狭隘地限定说理—论证的目的，从而把科学领域中的论证设为论证的标准，他们才会无视事实，断定在审美—道德—政治领域不存在论证，或不存在“真正的论证”。","chapter":"§7.22 不愤不启","color":0},{"text":"一般说来，普通读者不会去读也读不懂概念考察方式的哲学；也最好不去读，因为他们几乎注定由于不了解概念考察的针对性而误读。概念考察是哲学的核心工作，完全是在学理意义上说的，而不是在社会意义上讲。在社会意义上说，概念考察工作永远是非常边缘的，是那种永远坐在冷板凳上的工作。社会的思想文化热点永远是观念批判，因为它和我们普通人直接相关。","chapter":"§6.12 观念批判与概念考察","color":0},{"text":"顺便说，这也是我为什么觉得哲学不适合网聊的主要原因。网络也许是好东西，但它不适合聊哲学。日常聊天的用语意思大抵清楚，论理词却总是在“某种意义上”使用的，多多少少依赖于用法背后的一套道理。形式是一抑或内容是一？","chapter":"§4.21 语词的理论负载","color":0},{"text":"说哲学也需要专门训练，那就是在论理概念的逻辑方面的训练，以及对论理词所从出的文本的熟悉。哲学不是化学或古音韵学那样的一个独立学科，但它仍显得像是件专家从事的事情，缘故大半在于哲学工作者习惯于跟论理概念打交道。普通人时不时会对论理概念做一点儿思考，但这类思考对他们来说是边缘的、时断时续的，而这却是哲学家的本职工作。","chapter":"§4.21 语词的理论负载","color":0},{"text":"这里我只想提醒，我们需要谨慎对待“在哲学的意义上”这个说法。“在哲学的意义上”这个短语难免让人比照“运动，在经典物理学意义上”、“空间，在相对论意义上”之类，经典物理学和相对论是稳定的、公认的理论，哲学中却没有这种定于一尊的理论。","chapter":"§4.20 科学术语","color":0},{"text":"这是把严格界定与结果的清楚、稳定混为一谈了。","chapter":"§4.12 论理用法更准确吗？","color":0},{"text":"一百多年来，文化人经常争论中国传统中有没有哲学，有没有科学，儒学是不是一种宗教，这些争论从来不是单纯事质方面的争论，都涉及概念考察，而一旦要澄清这些概念，就不能不注意到，哲学、科学、宗教这些词都是移植词。于是出现了这样的问题：我们所考察的概念是中国话里的概念，还是外国话里的概念？这些词似乎是无历史的，若说有历史，倒是它们所对应的那些外文词有历史。实际上对哲学、科学、宗教这些概念进行追究，多半是沿着西语向希腊追究，结果，似乎凡穷理，都与西方概念有更亲缘的关系。","chapter":"§4.7 移植词带来的困扰","color":0},{"text":"在先的是语言，它不为体现道理存在，却也并不掩盖道理，它提示道理；有人经由这些提示抓到一些短浅的道理，有人领悟到深刻的、融会贯通的道理。那些短浅的道理，深思之下不成道理，不能真正贯通我们的理解，却与深刻的道理鱼龙混杂，在这个意义上遮蔽了更深入的理解。","chapter":"§3.21 “深层语法”","color":0},{"text":"我在语言章里讨论了哲学为什么关注语言。其基本思路是：哲学旨在穷理，穷究根本的道理；根本道理与我们对道理的理解交织在一起；穷理必探入我们自己的理解方式，而我们的基本理解方式集中凝结在我们的语言之中。哲学的语言性质不在于哲学研究语言，而在于哲学在语言层面上考察世界。","chapter":"§3.18 哲学语法与普通语法（1）","color":0},{"text":"相应地，与普通语法不同，“哲学语法”关注语词的用法甚于关注语法规则，因为我们是怎样理解世界的，更多体现在语词用法中而非体现在语法规则中。","chapter":"§3.16 “用法”，棋规与棋理","color":0},{"text":"行棋是规则辖制的活动，它不是盲目地遵行规则，而是在一个自治领域中依赖理解。","chapter":"§3.16 “用法”，棋规与棋理","color":0},{"text":"就此而言，语法是自治的，语法的道理在相当程度上独立于世界的如此这般。语法，或语言如此这般构成的道理，使语言适合于描述事物是如此这般的，使语言适合于讲述事物中有如此这般的道理。","chapter":"§3.12 自然事实的不同角色","color":0},{"text":"维特根斯坦的招牌概念之一，生活形式，可以视作所有约束的总和，这个概念并非一般意谓自然事实的总和，而是从自然事实对语法的约束而言的，没有语言，就谈不上生活形式。","chapter":"§3.11 对应与“负责”","color":0},{"text":"哲学的目标不在于发现事质世界的真理，而在于揭示潜藏着的、对我们的理解有重大意义的语法规则。这些语法规则的“目的”不在于体现现实的规律，而在于构建语言的自治性。","chapter":"§3.7 形而上学与语法任意性","color":0},{"text":"我们说，懂一种语言，理解一种语言；而理解一种语言同时就是通过一种语言理解世界。语言是一种社会建制，是人类理解的产物，像其他人类理解的产物一样而与自然物不同，语言已经凝结了我们对世界的理解；而且，与人类理解的其他产物相比较，语言突出地凝结着我们的理解。研究语言已经是一种反思式的理解——我们在研究语言的时候，已经在研究我们自己的理解。","chapter":"§2.19 不是“语言学转向”","color":0},{"text":"我们平常是用概念进行思考、说理，而哲学是对概念本身进行思考。","chapter":"§2.11 概念考察","color":0},{"text":"在语言这里，道说之道与道理之道合而为一。","chapter":"§2.8 说话只是为了让人懂，行为不是这样","color":0},{"text":"语言是个纯符号系统，它除了用于理解的交流之外，别无它用。这使得语言具有格外鲜明的逻辑（或曰语法），以及表征方式的系统性，最系统地体现着我们是怎样理解世界的，换个哲学家更爱使用的说法，即最系统地体现着我们的概念方式。","chapter":"§2.7 在种种精神客体中，语言何以高标特立","color":0},{"text":"语言是各种传统中最稳定的传统，最不可能剧烈地改变。","chapter":"§2.7 在种种精神客体中，语言何以高标特立","color":0},{"text":"语言转向引导我们更明确地把哲学与物理学区分开来，然而我们又面临一个新的问题：怎么把哲学与语言学区分开来？","chapter":"§2.5 “语义学上的发现”","color":0},{"text":"事质研究和语言研究（概念研究）的区分，进一步说，是科学与哲学的区分。","chapter":"§2.3 反形而上学","color":0},{"text":"哲学不是关于世界深层结构的研究，而是关于陈述方式的研究，是语法性的考察——","chapter":"§2.3 反形而上学","color":0},{"text":"只有造成实践后果差别的概念差别才是真正的概念差别。","chapter":"第2章 哲学为什么关注语言？","color":0},{"text":"对照以西方思想，中国思想不大在意对必然真理之为必然的论证，不认真建构各存在领域的理论，没产生逻辑学。","chapter":"§1.39 中西哲学的区别","color":0},{"text":"一般说来，穷理的批判矛头所针对的是初级概念反思几乎不可避免会落入其中的那些错误，简单地说，一般被我们称作哲学的东西恰恰就是哲学所要治疗和批判的。","chapter":"§1.38 初级反思与哲学之为治疗","color":0},{"text":"穷理与通过参与公共讨论来维护公共论理平台是相互联系但各有所趋的工作。可以维特根斯坦为前一种趋向的代表，以哈贝马斯为后一趋向的代表。这两种趋向之间同样处在不间断的对话之中。","chapter":"§1.37 哲学作为对话","color":0},{"text":"哲学通过穷理达乎道","chapter":"§1.28 哲学通过穷理达乎道","color":0},{"text":"世界这个大机制的最基础的一层是量子物理学，其上是化学，其上是生物学，其上是生理学，其上是心理学。每一个层次的所以然，由下一个层次的所然来解释。粉笔为什么是白的？因为粉笔是由碳酸钙做成的，碳酸钙吸收红外波段和紫外波段的光线，不吸收可见光，所以，各种可见光都从粉笔反射回来，合在一起就是白色。为什么碳酸钙只吸收不可见光呢？因为原子和分子所吸收的光子的能量必须与它们自身能量级别之差相应。为什么原子和分子的能量级别是离散的？这要用描述原子和分子行为的波函数方程来解释。这一层一层构成了世界的整体机制，世界就是这样一个大机器，这个世界机器没有目的。","chapter":"§1.25 机制还原","color":0},{"text":"杨国荣与钱穆的着眼点不同，似乎引向了不同的结论：钱穆说道是多、理是一，杨国荣说理是分疏、道是统一。两位学者都是中国思想史的专家，都有文献根据。","chapter":"§1.21 道、理、道理","color":0},{"text":"从内容上说，道是所然，教人该怎样，理是所以然，告诉人必这样；道行之而成，可以创造，理本然存在，绝对不变。道联系于实践，偏于多，几条道可以并行不悖，理则是唯一的。理规定一切，道完成一切。大致上，道近于宗教而理近于科学。","chapter":"§1.21 道、理、道理","color":0},{"text":"理有固然，势无必至","chapter":"§1.19 “按道理说”","color":0},{"text":"罗素一方面赞扬逻辑实证主义者对数学、逻辑及传统哲学问题的语言方面的重视，一方面指出，所有这些问题“已经变得如此专业化，如此易于具有准数学的确定性，以致几乎不能把它们视作属于从前所谓的哲学”。因此，“存在着一种技术的危险：它不是有助于解决问题，而是隐匿了问题”。[9]","chapter":"§1.18 凿与虚","color":0},{"text":"上行达于道、下行落于术这个提法稍有以辞害意之嫌。","chapter":"§1.17 道的位置","color":0},{"text":"哲学本来笼统包括所有学问、知识、智慧，什么是哲学主要是在永恒知识与变易看法的对照中得到讨论的。依这种对照，哲学的任务有时可以被理解为：提供世界的整体图画或整体结构——从面上看，它是一个图画；从本质来说，它提供一个结构。","chapter":"第1章 哲学之为穷理","color":0}],"thoughts":[{"text":"我读哲学想要获知的东西，就是观念批判","quote":"一般说来，普通读者不会去读也读不懂概念考察方式的哲学；也最好不去读，因为他们几乎注定由于不了解概念考察的针对性而误读。概念考察是哲学的核心工作，完全是在学理意义上说的，而不是在社会意义上讲。在社会意义上说，概念考察工作永远是非常边缘的，是那种永远坐在冷板凳上的工作。社会的思想文化热点永远是观念批判，因为它和我们普通人直接相关。","chapter":""},{"text":"理本穷不尽，学生一句摇头晃脑的总结便把理说死了","quote":"依前所论，并没有哪个哲学体系以唯一的方式贯通天下之理，那么，哲学家（包括或主要是指每个人身上的哲学家）之间，永远处在对话关系之中，而非哪一个体系兼并另外的体系。自由主义和保守主义之间，有可通之处，可以对话，却不能像硕士生写论文，最后总结说，自由主义是一片面，保守主义是一片面，真理在于两个片面的结合或统一。","chapter":""},{"text":"“具体就因果关系来说，尽管它是‘理有固然’，是没有例外的，但是它的某一个具体实现却是‘势无必至’的，即并非在任何情形下都会得到实现，而要看其他相应条件是否具备。”\n——引自陈波：《休谟问题和金岳霖的回答》，《中国社会科学》2001年第3期。","quote":"理有固然，势无必至","chapter":""},{"text":"Metaphors we live by","quote":"上行达于道、下行落于术这个提法稍有以辞害意之嫌。","chapter":""}],"popularHighlights":[{"text":"这样从一个道理追向另一个道理，谓之穷理。所谓哲学，大致就是穷理。","count":238,"chapter":"§1.4 哲学大致就是穷理"},{"text":"那么，听道理的人呢？无论什么新鲜的道理，只当连到他已经明白的道理，归化为他的道理，对他说理才有意义。","count":132,"chapter":"§1.6 道理在言说中成形"},{"text":"上行而求其贯通为道，下行而求其落实为术；或不如说，向外延伸求其贯通为道，内敛求其落实为术。","count":108,"chapter":"§1.16 道与术"},{"text":"尽管万事万物都能体现道理，但道理只在道说中获得其纯粹的形式。","count":105,"chapter":"§1.6 道理在言说中成形"},{"text":"灯火辉煌的豪华商厦里，大老板一掷千金给小美人买了个钻石戒指，阴湿幽暗的丛林里，公蜘蛛给母蜘蛛送来一点营养品，也许这两件事情背后有同样的道理。","count":91,"chapter":"§1.15 烹小鲜与治大国"},{"text":"在我们这个平民时代，社会最看重的是掌握专门技术。求道者希。","count":91,"chapter":"§1.17 道的位置"},{"text":"老子说“道可道非常道”，既然我已经在言说，所言说的就不是常道。","count":90,"chapter":"序言"},{"text":"王弼注《易经》说，“物无妄然，必有其理”。黑格尔说，“凡是现实的，都是合理的”。","count":90,"chapter":"§1.3 行止与言说依乎道理"},{"text":"事涉实际活动，除了道，还有术；不，主要是术。","count":90,"chapter":"§1.16 道与术"},{"text":"哲学本来就是哲学——科学[1]，科学蔚为大国之后，“哲学是什么”这个问题逐渐成为一个尖锐的乃至致命的问题，成了哲学本身是否还有意义的问题。","count":85,"chapter":"第1章 哲学之为穷理"},{"text":"索求解释的人，总得有什么无须解释就能听懂的东西，同时，需要听得出他现在听懂的东西跟他刚才没听懂的东西相同或相通","count":77,"chapter":"§1.12 同一个道理的不同表述"},{"text":"只见道理所当止处，不见己身之有利害祸福也","count":77,"chapter":"§1.20 大道立身"},{"text":"禅宗的偈子、公案，多半是悟者自悟，糊涂的永远糊涂。","count":75,"chapter":"§1.10 拈花一笑"},{"text":"我们每个人，自须依自己的爱好、机遇做自己的事，而明乎道术之间的关系，则无论求道还是攻术，都有益处。","count":72,"chapter":"§1.17 道的位置"},{"text":"世上大多数事情是可理解的，且无须谁有特别强大的理解力。这是因为，前人通过语词，通过各种各样的活动定式，把他们曾经艰苦努力获得的理解一代代传给了我们。","count":72,"chapter":"§1.30 自然理解"},{"text":"独自关在屋里想得头头是道，一片得道之感，到了实际生活中，事事不得其道，学儒以为治道在胸，不知钱米，学佛超乎色相之外，遇事慌张焦虑。贯通不是顺顺溜溜发展，而是克服。","count":72,"chapter":"§1.33 贯通"},{"text":"出自虚假观念的感情、行动、生活，在物理意义上是实实在在的。但它们，即使剧烈乃至暴烈，并不表明其所从出的观念是真实的，是有血有肉的。","count":72,"chapter":"§6.9 缘虚假的观念行动"},{"text":"有时候，道理明摆着；有时候，道理深深隐藏着，需要琢磨、分析、探索。","count":68,"chapter":"§1.3 行止与言说依乎道理"},{"text":"事情中蕴含着道理，把道理加以明述，其前提是道理已经在那里。所以我们说发现道理，不说发明道理。","count":68,"chapter":"§1.6 道理在言说中成形"},{"text":"不过，钱穆说到最后，又说，道即理，理即道。〔17页〕于是乎道与理贯通融会，胜于西方人要么走向宗教的极端，要么走向科学的极端。","count":64,"chapter":"§1.21 道、理、道理"}]},"37700235":{"rating":908,"ratingCount":6909,"highlights":[{"text":"“现在我得去挣加班费了，”他赶紧说道，“挣到了就给你们带礼物回来。”\n“这个加班费你怎么挣啊？”菲利佩托问。\n“我给别人去送礼物就能挣到了。”马可瓦尔多解释道。\n“也给我们吗？”\n“不，给别人。”\n“为什么不给我们？不是一下子就能送到了吗……”\n马可瓦尔多试着解释道：“因为我又不是劳资关系部的圣诞老人，我是公共关系部的圣诞老人。你们明白没？”\n“没有。”","chapter":"冬天","color":0},{"text":"就在这样的一个晚上，马可瓦尔多带着全家去散步。因为没有钱，他们的散步也就仅限于观看别人购物；","chapter":"冬天","color":0},{"text":"尽管它饿了，还是满腹怀疑。它知道每当人类想吸引它过去的时候，总是会给它食物，然后就总会发生什么不妙和痛苦的事情：要么是在肉里给扎上一针，要么被切入手术刀，要么是被强行塞进扣上扣子的外套里，要么是被脖子上的带子拖着走……对于这些不幸的回忆，体内的疼痛，它感到的器官的缓慢变化，和对于死亡的预感合为了一体，还有饥饿。但就好像它知道，所有的这些不适，只有饥饿是可以缓解的，也就好像它承认，这些不足信的人类——除了残忍的折磨外——还可以给它一种保护，一种家庭温暖，而这，也是它所需要的，它决定让步，决定依从人类的游戏：该怎么样就怎么样吧。于是，它跟着那一条行迹，吃起了小萝卜块，它很明白，他们又会把它囚禁起来，虐待它，但还是继续品尝着也许是最后一次的世间蔬菜美味。","chapter":"秋天","color":0},{"text":"他带着饲养人爱怜的眼神望着它，这眼神能把他对动物的善意和烤兔肉的可能性包含在同一种款款深情中。","chapter":"秋天","color":0},{"text":"月亮十分沉静，虽然偶尔会被文以薄薄的残云，但却形容庄严，毫不在意，不紧不慢地放着自己的光辉；红绿灯总在那里亮了又暗，亮了又暗，急促不安，虚假而疲劳地活跃着，被奴役了一般。","chapter":"夏天","color":0},{"text":"他还能看上一分钟的星星，然后再合上眼睛，这一场睡眠会补救他在一天中所经历的所有冒犯。","chapter":"夏天","color":0}],"thoughts":[{"text":"这也是对现代性制度的一种讽刺吧？当送礼物不再成为行为的目的本身而仅仅是作为一种营销手段，那么送礼的意义便消失了。所以会催生出畸形的劳资关系部圣诞老人和公共关系部的圣诞老人，这正是奥威尔口中的 Doublespeak。","quote":"“现在我得去挣加班费了，”他赶紧说道，“挣到了就给你们带礼物回来。”\n“这个加班费你怎么挣啊？”菲利佩托问。\n“我给别人去送礼物就能挣到了。”马可瓦尔多解释道。\n“也给我们吗？”\n“不，给别人。”\n“为什么不给我们？不是一下子就能送到了吗……”\n马可瓦尔多试着解释道：“因为我又不是劳资关系部的圣诞老人，我是公共关系部的圣诞老人。你们明白没？”\n“没有。”","chapter":""},{"text":"能将20秒的霓虹灯广告牌周期闪烁的细节与一家人各自的生活结合联系在一起，真实非常厉害的想象力。结尾处还不忘来一次反转，顺带批判了一下消费主义等社会问题。","quote":"那行时而是COGAC，时而是CONAC，时而又是CONC的字迹，给其公司的债权人传播了一种混乱的感觉；后来，因为“SPAAK”公司仍付不清欠款，连广告公司也拒绝修补其余的损坏了；那行字的彻底熄灭加剧了债权人的不安心理；最后“SPAAK”公司破产了。\n在马可瓦尔多的天空里，月亮又在自己璀璨的光辉中圆了起来。\n最后一个月相中的一天，几个电工又爬上了对面的屋顶。当天晚上，比之前还要高一倍与宽一倍的火红字体，COGNAC TOMAWAK，闪亮了起来，于是就再也没了月亮，没了星空，没了天空，没了黑夜，只有每两秒钟就亮起或灭掉的COGNAC TOMAWAK，COGNAC TOMAWAK，COGNAC TOMAWAK。\n在所有人中间，最受打击的是费奥尔达里基；月光姑娘的阁楼在那巨大的、不可穿透的W字母后消失不见了。","chapter":""},{"text":"良药苦口，苦难疗法。将得病起源归结为自己犯过的错误，那么痛苦的治疗便能顺利成章的看成是一种救赎。","quote":"就在他忍受一动不动地躺在那里给沙子烧的痛苦时，他也感到了一种满足感，那是一种受罪的治疗和讨厌的药物带来的满足感，因为人们常常这样认为：你越觉得难受就说明疗效越好。","chapter":""},{"text":"按詹姆斯斯科特的话说，这叫无政府主义的操练","quote":"但他现在成了马路的主人，可以步行在马路中央，可以肆意践踏花园，可以踩在斑马线外过马路，可以走出“之”字形的路线。","chapter":""},{"text":"本书读到现在没几页，到处都是对现代文明的驳斥","quote":"但是，当它们一看到城市铁链一般的屋顶出现在面前时，就会远远地飞开。","chapter":""},{"text":"工业文明的设计总是天然的带着强烈的目的性，这种目的性本身便是对人的一种规训，归根结底也就是人在奴役人。相较而言，自然的实在则沉静而不做作，它不会喧宾夺主般的与时间叫板，它的存在本身就是时间过程的证明。","quote":"月亮十分沉静，虽然偶尔会被文以薄薄的残云，但却形容庄严，毫不在意，不紧不慢地放着自己的光辉； \n因此，宣传的目的与其说是为了说服别人，不如说是为了说服自己；我们愈有理由内疚，我们的宣传就愈狂热。","chapter":"第三章 团结催化剂","color":0},{"text":"就连宣传大师戈培尔博士（Dr. Goebbels）￼在没有心防的时刻也承认：“如果宣传想要真的奏效，那它的后面必须时时刻刻备着一把利刃。”","chapter":"第三章 团结催化剂","color":0},{"text":"“衡量一个纳粹党员价值观是不是正确、信念是不是真诚、意志是不是坚定，最好的方法乃是看看……敌人有没有恨他入骨。”","chapter":"第三章 团结催化剂","color":0},{"text":"任何崇高（sublime）的宗教必然会让信徒产生强烈的罪疚感。这是因为高不可攀的理想必然会带来实践上的落差。由此看来，一种宗教愈崇高，它孕育出的恨意就愈凶猛。","chapter":"第三章 团结催化剂","color":0},{"text":"我们爱一个对象的时候，一般不会寻找同好，甚至反而会把跟我们爱同一对象的人视为竞争者和侵犯者。但我们恨一个对象时，却总是会寻求有志一同的人。","chapter":"第三章 团结催化剂","color":0},{"text":"如果一种教义不是复杂晦涩的话，就必须是含糊不清的；而如果它既不是复杂晦涩也不是含糊不清的话，就必须是不可验证的；也就是说，要把它弄得让人必须到天堂或遥远的未来才能断定其真伪。哪怕一套教义有某个相对简单的部分，信众还是会把这个部分加以复杂化和晦涩化。","chapter":"第二章 促进自我牺牲精神的方法","color":0},{"text":"渴望而非拥有，才是人们赴汤蹈火在所不辞的动力。","chapter":"第二章 促进自我牺牲精神的方法","color":0},{"text":"所有群众运动都会贬低“现在”，把现在说成只是通向光荣未来的初阶，进入千禧年门槛的踏垫。对一个宗教运动来说，“现在”乃是一个放逐地，是通向天堂的泪谷。对一个社会革命来说，“现在”是一个到乌托邦路上的中途站。对一个民族主义运动来说，“现在”是最终胜利前可以置之不理的片段。","chapter":"第二章 促进自我牺牲精神的方法","color":0},{"text":"由此我们可以得到一个推论：碰到苦难和死亡的威胁，个人是无法依赖自己的勇气的。他仅有的力量来源不在他自身，而在于他隶属某个伟大的、光荣的、不可摧毁的集体。这种信仰主要来自认同；通过认同，个人不再是他自己，而成了某种永恒之物的一部分。不管我们是准备好为人类、后代子孙、某个宗教、国家、种族、政党或家族而死，它们都不过是我们行将被消灭的自我所依附的永恒之物的具象化罢了。","chapter":"第二章 促进自我牺牲精神的方法","color":0},{"text":"本书并不是一部权威性的教科书。它是一部思考之书，并不避讳提出一些片面的真理，因为有时片面的真理也可以开辟新的思路，帮助架构一些新的问题。","chapter":"第一章 前言","color":0},{"text":"“爱国主义是歹徒的最后归宿。”——这句挖苦话并非全无道理。狂热的爱国主义和宗教或革命的激情一样，常常可以作为罪恶感的抚慰之所。","chapter":"第八章 罪犯","color":0},{"text":"在本书第三部分我们将会说明，成员的自我牺牲精神乃是一个群众运动的向心力与活力之所系，然而，自我牺牲本身就是一种悔罪般的行为，因为要是没有深切的罪恶感，一个人根本不会有悔罪的念头。所以，群众运动的策略，是要把一种病传染给人，然后又把自己说成治病的药方。","chapter":"第八章 罪犯","color":0},{"text":"一个紧密团体的成员，其“革命燃点”要比独立自主的个人高。需要更悲惨与更屈辱的际遇，才能让他揭竿而起。","chapter":"第二章 穷人","color":0},{"text":"个人除非善于用脑子，否则自由就会成为他一种讨厌的负担。自我若是软弱无力，再多的自由又有何用？我们参加群众运动，是为了逃避个人责任或为了得到——用一个热情洋溢的年轻纳粹党员的话说——“免于自由的自由”￼。","chapter":"第二章 穷人","color":0},{"text":"凡是从早到晚都要为最起码生活操劳的人，不会有时间、心情去悲愤或造梦。中国民众不易造反的原因之一，就在于他们得花很大力气才赚得到一点点维生之资。他们为生活而激烈挣扎，而这挣扎所发挥的是“一种静态而非动态的影响力”。￼","chapter":"第二章 穷人","color":0},{"text":"每一个群众运动在某种意义上都是一场移民：追随者会觉得他们正向一片应许之地迈进。","chapter":"第三章 群众运动间的可替代性","color":0},{"text":"一个群众运动，特别是当它还处于生气勃勃的积极阶段时，吸引到的并不是那些珍爱“自我”、想要把它加强加壮的人，而是那些渴望可以摆脱他们可厌“自我”的人。一个群众运动会吸引到一群追随者，不在于它可以满足人们追求自我改善的渴望，而在于可以满足他们自我否定的热望。","chapter":"第二章 对替代品的渴望","color":0},{"text":"会不假思索就投身变革运动的，往往是那些觉得自己拥有无敌力量的人。","chapter":"第一章 对改变的渴望","color":0},{"text":"贫困者的保守性格和特权阶级的保守性格同样深厚，而前者支撑社会秩序的作用也不亚于后者。","chapter":"第一章 对改变的渴望","color":0},{"text":"不管处境有多么可怜兮兮，那些对周遭环境又敬又畏的人不会想要去改变现状。当我们的生活朝不保夕，完全无力控制我们的生存环境时，就会执著于熟悉的生活方式。我们通过把生活模式固定化去对抗深深的不安全感。借此我们给自己制造了一种幻象：不可预测性已为我们所驯服。","chapter":"第一章 对改变的渴望","color":0},{"text":"法国和俄国的革命最后都演变为民族主义运动。这个事实意味着，在现时代，民族主义乃是群众激情最丰富也最持久的源泉，而任何大变革计划想要取得成功，都必须利用民族主义的激情。","chapter":"第一章 对改变的渴望","color":0},{"text":"本书所探讨的主要是群众运动中的一个阶段——积极阶段。这个阶段的群众运动是由“忠实信徒”（true believer）所控制，而所谓的“忠实信徒”，是指具有狂热信仰、准备好随时为一件神圣伟业牺牲的人。本书会尝试追溯这类人的起源和勾勒他们的人格特质。为了帮助实现这一目的，我们会进行一些假设。基于所有群众运动的初期追随者都以失意者（the frustrated）￼居多，以及失意者一般都是自愿参加群众运动的事实，我们提出两个假定：（一）即使没有外来的煽动游说力量，失意感本身即足以产生“忠实信徒”所特有的大部分人格特征；（二）煽动游说技巧是否奏效，端视其能否诱发和强化失意者所特有的那些心理和行为倾向。","chapter":"序言 狂热分子的心灵","color":0},{"text":"你无法用理性或道德上的理由去说服一个狂热者抛弃他的大业。他害怕妥协，因此你不可能让他相信他信奉的主义并不可靠。但他却不难突然从一件神圣伟业转投另一件神圣伟业的怀抱。他无法被说服，只能被煽动。对他而言，真正重要的不是他所依附的大业的本质，而是他渴望有所依附的情感需要。","chapter":"第二章 促进自我牺牲精神的方法","color":0},{"text":"诚如法国哲学家柏格森（Henri Bergson, 1859—1941）所说：“信仰的力量不表现在能支使人移山，而在于能让人看不到有山要移。”","chapter":"码头工人哲学家——霍弗其人及其书","color":0},{"text":"人要求伟大，而又看到自己渺小；\n人要求幸福，而又看到自己可悲；\n人要求完美，而又看到自己充满缺陷；\n人要求能成为别人爱慕与尊崇的对象，\n而又看到自己的缺点只配别人的憎恶与鄙视。\n他发现自己所处的这种尴尬，\n便产生出一种想象中最不公正和最易作奸犯科的激情，\n因为他对于那谴责他和让他认识自己缺点的真理，\n心怀切齿痛恨。\n——帕斯卡尔《思想录》","chapter":"码头工人哲学家——霍弗其人及其书","color":0}],"thoughts":[{"text":"他也是让中国群众团结起来的一个因素，只不过他被认为是站在了魔鬼这一边。","quote":"这位雄心勃勃却头脑简单的将军大概是太自负了，以致未能了解，会让中国群众团结起来的因素并不是他，而是“魔鬼”日本所激起的民族激情。","chapter":""},{"text":"永远处在「初级阶段」","quote":"所有群众运动都会贬低“现在”，把现在说成只是通向光荣未来的初阶，进入千禧年门槛的踏垫。对一个宗教运动来说，“现在”乃是一个放逐地，是通向天堂的泪谷。对一个社会革命来说，“现在”是一个到乌托邦路上的中途站。对一个民族主义运动来说，“现在”是最终胜利前可以置之不理的片段。","chapter":""}],"popularHighlights":[{"text":"一个人愈是没有值得自夸之处，就愈容易夸耀自己的国家、宗教、种族或他所参与的神圣事业。","count":2412,"chapter":"第二章 对替代品的渴望"} ，他就被同伴杀掉吃了。","count":767,"chapter":"观点一 尊重法律条文"},{"text":"假如法官发现自己在惩罚一个不比自己坏的人，他应该辞职。如果惩罚被告的法官都是在惩罚不比自己坏的人，那无疑是法律的耻辱。这就是我赞成宣告被告无罪的理由所在。","count":765,"chapter":"观点十二 设身处地"},{"text":"我赞成宣告无罪。","count":765,"chapter":"观点十二 设身处地"},{"text":"人总为自己找理由、寻求解脱矛盾的心理描述，法律就是使认知失调减至最低的条件。","count":731,"chapter":"推荐 期待第十五个观点"},{"text":"因此，我的结论是无论从哪个角度来分析这个案例，被告都不能被认定为谋杀了威特莫尔，有罪判决应该被撤销。","count":720,"chapter":"观点二 探究立法精神"},{"text":"如果我们无法找到法律秩序的更高本源，又怎能期待这些行将饿死的不幸的人找到更高的本源来支持他们为自己而选择的秩序？","count":663,"chapter":"观点二 探究立法精神"},{"text":"法律在很多方面不同于理想中的正义，其中之一是，法律体现了特定时刻特定民族同意用来统治自己的理想正义，为了确保这种同意，法律必须接受每个人的个体理想所达成的诸多妥协。","count":663,"chapter":"观点六 撇开己见"}]},"3300199099":{"rating":807,"ratingCount":301,"highlights":[],"thoughts":[],"popularHighlights":[{"text":"文明不动声色地将八十年历史的黑暗尽数包覆其中，再不透露只言片语。","count":240,"chapter":"一"},{"text":"他把别的女人带回家，命鸨子来找我，把鸨子当奴婢般虐待，实际上都是因为他太爱鸨子。","count":162,"chapter":"一"},{"text":"两人之间深远而又紧密的羁绊，不是凡俗如我辈可以测度的。那毫无疑问，是一种爱的形态。","count":135,"chapter":"一"},{"text":"“母亲大人为何选中那少女……不是因为她长得像您吗……”脸藏在能面背后，贡幽幽地回道。","count":120,"chapter":"一"},{"text":"你的意思是，希望更严厉的惩罚喽？”","count":90,"chapter":"一"},{"text":"哥哥的笔迹不像他的体格，有点神经质般的纤细，看来就像被气得发抖似的。","count":90,"chapter":"野地之露（第二话·杉乃）"},{"text":"扇子在空中激烈地挥舞，有如要挥去十年的岁月，挥尽最后一滴体内流淌的深泽的血。","count":85,"chapter":"一"},{"text":"会不会，那并不是她自己的意志，而是贡巧妙地掌控了筱的心情，让她拿起了绳索？不只是那天，一直以来都是，今天也是。","count":80,"chapter":"一"},{"text":"我要让吉野成为犯罪者，再以共犯的羁绊，与我紧紧联系不分离。","count":75,"chapter":"昭和三十七年（1962）"},{"text":"筱用手指掐着牙印，故意口气随便地问道： “她当时是什么表情？” 贡垂头不语，半晌，才在筱责怪的催问下微抬起脸，做出一副皱眉喘息的表情。","count":72,"chapter":"一"},{"text":"白扇向贡劈去时，那种从指尖迸发的热血沸腾的感觉，真的只是因为憎恨吗？","count":72,"chapter":"一"},{"text":"我沾一沾你涂在我下唇上的口红，让它回到你的下唇。就这样，我们借着一抹口红交换接吻。","count":72,"chapter":"野地之露（第二话·杉乃）"},{"text":"还是说……在你计谋的背后，对我多少也有点真心？","count":72,"chapter":"野地之露（第二话·杉乃）"},{"text":"一个将全部身心奉献给一个女人的伟大人物，对我来说是比梦更遥远的存在，但若是爱上一个女人，为了爱而苦痛，为了虚荣而选择死的愚昧卑微的男人，我想我还演得来。","count":72,"chapter":"一"},{"text":"在天与地相接的广阔世界里，我被朝露濡湿的脸颊沐浴在耀眼的阳光下，不断地对着自己，还有留在东京的一名少女的面影低语：“活下去，活下去。”","count":70,"chapter":"一"},{"text":"我和晓介都被你那如蛇芯般燃烧不 的猜测是：存在着由许多神经元构成的大尺度结构，它们在一个较高的层次上处理概念。这毫无疑问是对的，但最朴素的假设——每个不同的概念对应于一个固定的神经元群——却基本上是错的。","chapter":"第十一章 大脑和思维","color":0},{"text":"食蚁兽：你会发现你无法通过触发某个新的信号来使它具有什么意义。在比它更低的层次上——如蚂蚁层次——也同样办不到。只有在符号层次上，触发模式才有意义。比方说，你想象一下在我来拜访你时，你正在观察马姨。你无论观察得多仔细都行，不过，除了蚂蚁们的集聚、解散之外，你仍然什么也看不到。","chapter":"…蚂蚁赋格","color":0},{"text":"阿基里斯：你的意思我明白了。在气体的研究里，你可以从最低的层次——分子——一下子跳到最高的层次——气体本身。不存在结构上的中间层次。那么，蚁群中是怎样产生作为中间层次的有条理活动的呢？","chapter":"…蚂蚁赋格","color":0},{"text":"阿基里斯：在正常情况下，我觉得我想些什么是受我自己控制的——可按你这种说法就整个儿颠倒了，你的意思好像是说“我”只是所有这些神经结构、自然规律控制的某种有机体的副产品，往坏里说则是由我那被歪曲了的感觉所造成的某种人为概念。换句话说，你让我觉得我并不知道我是谁——或者是什么——如果我还是个什么的话。","chapter":"…蚂蚁赋格","color":0},{"text":"阿基里斯：打住吧！我刚才的那番话难道是为了引起一通新的争论吗！好啦，我现在明白你们在争论什么了，我看我对“无”的解释一定会对你们有很大的帮助。你们知道，“无”是古代禅宗对某些问题的回答，用来废问这个问题。我们现在的问题似乎是：“世界应以整体论原理来理解还是应以简化论原理来理解？”“无”这一答案把这一问题的前提，即“二者必居其一”这一规定给否定了。通过废问这个问题，揭示出更广泛的真理：存在着某种更大的领域，使得整体论与简化论的解释都适合。","chapter":"…蚂蚁赋格","color":0},{"text":"任何可以用上述语言之一书写的程序，在原则上也能用更低层的语言来编制，但那需要人付出较大的努力，而且编出来的程序可能长得使人无法把握。每个较高的层次都没有扩展计算机的潜能，计算机的全部潜能已经存在于其机器语言指令集之中了。高层次语言中的新概念只不过是用它们的性质提示了一些方向和前景。","chapter":"第十章 描述的层次和计算机系统","color":0},{"text":"结论是这样的：在正常的对局过程中，会有某种多次再现的局面——也就是某种模式——而大师正是对这种高层次的模式十分敏感。","chapter":"第十章 描述的层次和计算机系统","color":0},{"text":"我们可以把这一看法冠以“数理逻辑的中心法则”这一名称，并用一个含两个步骤的图解来描述：TNT ⇒ N ⇒ 元TNT用话来说就是：TNT的一个串有一个N中的解释，而N中的一个陈述可以有一个第二意义，即作为关于TNT的陈述。","chapter":"第九章 无门与哥德尔","color":0},{"text":"我们这里碰到的情况就是消息与其意义几乎完全被等同，以至于我们很难接受驻存在符号中的另选意义了。就是说，我们对TNT符号的偏见如此之深，只看到TNT符号串中的数论意义（并且仅仅是数论意义），以至于很难接受某些TNT符号串是关于WJU系统的陈述。但哥德尔的同构迫使我们认识到某些TNT串中的这第二层意义。","chapter":"第九章 无门与哥德尔","color":0},{"text":"用于数字的印符规则实际上等同于用于数的算术规则。\n这一简单的结论是哥德尔方法的核心，其后果是震撼人心的。就是说，一旦对一个形式系统进行了哥德尔配数，立刻就有了一组规则，使我们得到完整的哥德尔同构。结果就是，我们可以把对任一形式系统的研究——事实上即对所有形式系统的研究——转成数论工作。","chapter":"第九章 无门与哥德尔","color":0},{"text":"禅宗采纳整体论，并且推向逻辑上的极端。如果整体论是断言事物必须作为一个整体被理解，而非其各个部分的总和，那么禅宗走得更远，认为整个世界根本就不能被划分为一个个事物。划分世界就会误入岐途，因而就不能达到顿悟了。","chapter":"第九章 无门与哥德尔","color":0},{"text":"因此，说顿悟的敌人是逻辑也许是不对的，它应该是二元化，借助词语的思维。事实上还要更基本：是知觉。一旦你感知到一个客体，你就把它与世界的其余部分划分开了；你人为地把世界分成部分，你于是就远离了“道”。","chapter":"第九章 无门与哥德尔","color":0},{"text":"直接把在N——非形式的数论——中所用的标准符号拿来的好处是明显的：容易读懂。而缺点则类似于对几何作形式处理时使用“点”和“线”这些词：除非一个人头脑非常清楚并仔细小心，否则他会很容易把词的普通意义与形式符号的严格受规则管辖的行为相混淆。","chapter":"第八章 印符数论","color":0},{"text":"如果你回想一下几何学，你会记起为什么会出这种稀奇古怪的事情。这就是因为绝对几何学的四条公设没有固定住“点”和“线”这些术语的意义，从而为这些概念具有不同外延留下了余地。欧几里德几何学的点和线提供了“点”和“线”这些概念的一种外延；非欧几里德几何学的点和线则是提供另一种。然而，两千年来，使用先入为主的词“点”和“线”则使人相信那些词必须是单值的，只能有一个意义。","chapter":"第八章 印符数论","color":0},{"text":"由于“自然数”概念是一个皮亚诺设法去定义的东西，所以我们将不使用这个充满了内涵的熟悉的术语“自然数”。","chapter":"第八章 印符数论","color":0},{"text":"形式系统是被当作这样一种东西提出来的：它明确地展示出一个证明的每一个步骤，而且这一切都在一个唯一的、严密的构架中进行，因此任何数学家都可以机械地来检验另一个人的工作。但是如果你乐意从一开始就走到那个构架之外去，那么你干脆还不如压根不创造这个构架。所以，走这样的捷径是有缺点的。","chapter":"第��章 命题演算","color":0},{"text":"区分开递归定义与循环定义的关键事实，是前者总会“终了”。定义中总是有某一部分避免了自指，因而构造一个满足该定义的对象的过程最后总会“终了”。","chapter":"第五章 递归结构和递归过程","color":0},{"text":"。最明显的例子是人类的语言，人们常常把意义归于词本身，丝毫没有意识到使词具有意义的那个非常复杂的同构。这是个很容易犯的错误：把全部意义归于对象（即词），而非对象与真实世界的联结。","chapter":"第四章 一致性、完全性与几何学","color":0},{"text":"当一个数学家发现在他所知道的两个结构之间有同构关系时，就会感到很愉快。这种关系常常“从天而降”，让人惊喜不已。认识到两个已知结构有同构关系，这是知识的一个重要发展","chapter":"第二章 数学中的意义与形式","color":0},{"text":"本书的一个主要目的就是鼓励每一个读者，直接了当地面对这个表面上看来是矛盾的东西，尝一尝它的滋味，摆弄摆弄，拆开来看看，沉浸于其中，以使读者最终得以重新认识存在于形式化的和非形式化的、有生命的和无生命的、灵活的和不灵活的事物之间的那些表面上看来不可逾越的鸿沟。","chapter":"导言 一首音乐-逻辑的奉献","color":0},{"text":"这部卡农中，巴赫给了我们有关“怪圈”这一概念的第一个例子。所谓“怪圈”现象，就是当我们向上（或向下）穿过某种层次系统中的（这里，系统是音乐的调子）一些层次时，会意外地发现我们正好回到了我们开始的地方。有时我用“缠结的层次结构”这个词来形容出现怪圈的系统。在我们后面的讨论中，怪圈这一主题将一再出现。有时候它是隐蔽的，有时候则会公开露面，有的时候它端端正正，有的时候则上下颠倒，或者前后错位。“觅之，自有所获”，这便是我给读者的建议。","chapter":"导言 一首音乐-逻辑的奉献","color":0}],"thoughts":[{"text":"收回前面的想法，看完这一小节，侯世达对非欧几何的发现描述比之卢昌海又多了一些讯息，并且更具戏剧性。一想到，这是昨晚我读书就看到的内容，而当时依然昏昏欲睡，并无甚感觉，但居然现在看却能体会到乐趣。看来在临睡前看书，的确会错过不少东西。","quote":"非欧几里德几何面面观","chapter":""},{"text":"非常凑巧的，今天看了卢昌海关于几何原本第五公设的文章，比这里写的更详实、有趣。","quote":"虽然欧几里德从未明白地说过，但他确是把这条公设看得比其它几条地位低些，因为在前二十八个命题的证明里，他想法避免了使用它。这样，前二十八个命题属于所谓“四公设的几何学”——几何学中的一部分，可基于《几何原理》的前四条公设而导出，无需第五条公设的帮助（常常也称作“绝对几何学”）。无疑，欧几里德会发现：更为可取的是证明这只丑小鸭，而不必设定它。但他没找到证明，所以采纳它了。","chapter":""},{"text":"非常顺滑的联想到隐喻那本书","quote":"当一个数学家发现在他所知道的两个结构之间有同构关系时，就会感到很愉快。这种关系常常“从天而降”，让人惊喜不已。认识到两个已知结构有同构关系，这是知识的一个重要发展","chapter":""}],"popularHighlights":[]},"CB_DQs0uc0rx6Rr6Vz6U5":{"rating":0,"ratingCount":0,"highlights":[{"text":"因此，当今对影视进行审察的要求（无论是由政府进行，还是由生产商自己进行）是对柏拉图的主张的直接继承，即艺术不应就其自身来评价，而只能根据它所唤起的至关重要的真和善来评价。","chapter":"美与真","color":0},{"text":"因此，从根本上来说，一匹漂亮的马、一尊体态健美的雕像或一阙优美的音乐都指向同一个“形式”。美也因此成为客观的，成为一个对象在客观上真实的东西。“美则真，真即美”这样的观念对于柏拉图来说是完全正确的。\n ","chapter":"美与真","color":0},{"text":"如果我们再思考一下各种各样的道德规则，例如“不可杀人”、“不可偷盗”、“不可欺骗”，我们也许会注意到这些规则中的很大一部分都是禁令，也就是禁止我们做某事的规则。为什么会这样？倘若我们改变一下提问方式，这样发问：“谁将从这些禁令中获益？”答案不是“每个人”，而是“那些不能保护自己的人”，换言之就是弱者。现在我们就理解了，为什么那么多规则都是否定性的禁令，而不是肯定性的美德（就像在亚里士多德那里一样）：这些规则通过防止社会成员中的强者施展他们的力量，从而使社会成员中的弱者得益。强者能够照顾自己，道德是对弱者的保护。","chapter":"尼采和对道德的攻击","color":0},{"text":"假如你正要做一个戒烟的决定。第二天有个朋友给你一支烟，你抽还是不抽？事情很可能是这样：鉴于你的性情、在对待习惯方面的弱点以及其他的心理因素，你必定会接受这支烟，从而违背自己的决定。对你十分了解的朋友可能事先就能知道这个结果。但你不能以这样一种决定论的方式来看待自己，因为你必须做一个决定，而不能只是“推出”自己会如何做。换句话说，无论你对你的朋友用以推测你的行为的各种原因和因素了解多少，你都不能只是预测自己的行为。如果你预测说，“无论如何我都会重新开始抽烟”，那么你实际上就不仅是在预测，而是在破坏你的决定，预测这个行为本身就意味着决定破坏它。所以当你考虑自由的行动和决定时，你必须像一个完全自由的人那样去行动。这在某种程度上否定了决定论，因为必须做出决定的人正是你，决定论在这里是不相关的。（康德说：“必须认为自己是自由的才是自由的。”）","chapter":"自由意志与决定论","color":0},{"text":"而如果我们把“自我”理解成一个社会实体，其存在完全依赖于我们和他人的关系，那么这里的自由就必然包含我们和他人的关系，在这个意义上，孤独的人就一点也不自由了；","chapter":"什么是自由？","color":0},{"text":"一个在国外的旅行者可以完全摆脱一切期望和责任，或是摆脱来自他人的干涉，但是如果他把自我等同于友谊而身边又没有朋友时，称这个人是“自由”的就没有什么意义。在这种社会性的自我概念中，自由是指参与到社会中去的自由，以及摆脱妨碍他这样做的因素的自由。我们可以把这种自由称为社会自由。\n","chapter":"什么是自由？","color":0},{"text":"另一个例子是一个人把自己等同于他的情感。当恋爱中的人受爱情支配而行动时，即使那些行为在心理分析的层面上可被称为“强迫性”的，即使那种对情感的服从在更理性的朋友看来恰恰是自由的反面，他们也认为自己是很自由的。倘若那些把情感看得如此之高的人不得不克制自己激愤的情绪，他们才会感到不自由，而如果让他们发泄出来，他们就感到自由了。对这样的人来说，情感的表达——无论是什么情感——就是自由；不能表达或被禁止表达情感，即使在“理性”的堂皇伪装之下，在他们看来也像是被剥夺自由。这就是情感自由。","chapter":"什么是自由？","color":0},{"text":"当一项行动被精心策划和彻底考虑过以后，有这样一种理性观念的人会认为该行动是很自由的；计划和思考得越少，该项行动的自由就越少，它也就越不是这个人真实自我的表达。这就是理性自由。","chapter":"什么是自由？","color":0},{"text":"这两种自由的概念，即“摆脱……的自由”和“做……的自由”（自18世纪以来）分别被称为消极自由和积极自由。它们总是同时出现：即使只说出其中一个，这一个也总是预设了另一个。","chapter":"什么是自由？","color":0},{"text":"这就意味着，我们并不能确切地知道我们自己的存在，我们知道自己的存在仅仅是因为我们的社会教会了我们认识到这一点，然而这也意味着，他人的存在是没有疑问的，这并不是一个需要用不太恰当的、成问题的类比论证加以支持的可疑信念。事实上，他人的存在和我们的存在都是我们思考的前提，而不是一个通过思考得出的可疑结论。","chapter":"心-身问题","color":0},{"text":"这个论证令人信服地阐明了这样一种思想：真理有两种（而且只有两种）类型——“事实”和“理性真理”，如来一种信念不能作为其中的任何一种而得到证明，那么它就是没有根据的。所以当休谟碰到任何信念时，他会这样发问：“这是一个能够通过经验或实验得到辩护的事实吗？抑或是一个理性真理，其真实性可以通过类似于数学或逻辑中的那种抽象演算而得到证明？”如果答案是“二者皆非”，那么休谟就说，这条陈述没有资格再被作为我们的信念，因为它缺乏合理的辩护。","chapter":"怀疑论","color":0},{"text":"康德所论证的就是，存在着一种世界必须如此的方式，但它必然基于我们心灵的本性，而不是世界本身。我们为自然立法，而不是像科学家那样只是发现它们。\n","chapter":"唯心论","color":0},{"text":"斯宾诺莎把世界看成是完全被决定好的、没有自由的；莱布尼茨认为最重要的东西——事实上规定了每一个单子——是它的自由和自发性。","chapter":"心灵与形而上学","color":0},{"text":"笛卡儿从未解决实体是如何相互作用的问题。要解决这个问题，似乎只有两种办法：或者（1）心灵与身体并非不同的实体，而是同一实体的不同部分；或者（2）它们是不同的实体，但无法相互作用。斯宾诺莎的解决办法接近于第一种，而莱布尼茨的接近于第二种（我们将会在第六章中讨论这一“心-身问题”）。","chapter":"心灵与形而上学","color":0},{"text":"我们会问像“宇宙起源于什么？”或“为什么会存在着一个宇宙？”这样的问题。回答这种问题的一种方式是采用前苏格拉底哲学家的技巧：挑出一种或几种基本元素，说明世界能够怎样用这些挑选出来的元素加以说明；另一种方式是柏拉图的办法：假想并设计出一个隐藏在这个世界“背后”的世界，用它来解释为什么各种事物会具有如此这般的样子；第三种方式是亚里士多德的办法：接受这个常识意义上的世界，但同时表明其中还有许多我们尚不能理解的东西，整个图景不能仅从生活的细节加以把握，做出哪种选择在很大程度上取决于你自己的看法。","chapter":"亚里士多德的形而上学","color":0},{"text":"的确，亚里士多德关于宇宙的图像甚至比柏拉图的还要戏剧化；他把宇宙看作一个永无止息地生长着的、追求自我知识的庞大的有机体。","chapter":"亚里士多德的形而上学","color":0},{"text":"这里，你可以看到柏拉图是怎样保留了前人的两方面哲学观点的：他有赫拉克利特的永恒的变化及其背后的逻各斯，柏拉图把它安放在了“形式”中；他有巴门尼德的惊人断言，即我们日常经验中的各种事物并不是实在的；他还有毕达哥拉斯的最真实的东西是永恒的数学原则这一论断。现在，请注意柏拉图是怎么做的：他提取了所有这些观点中他所赞成的部分，并把它们结合成为一种戏剧性的、有说服力的图景，在这幅图景中，我们可以看到这些观点是怎样搭配成一种世界观的。","chapter":"柏拉图的“形式”","color":0},{"text":"柏拉图的全部哲学都是建立在存在着两个世界这一基础之上的：一个是我们混迹于其中的这个日常的物质世界；另一个是纯粹“形式”的世界，它是永恒的、非物质的，比这个世界更为真实。前一个世界是由物质的东西组成的，它们会变化、灭亡或消失，柏拉图称之为生成的世界。它并不是不真实的，而是要比另一个世界，一个真正实在的世界更少真实，柏拉图把这后一个世界称为存在的世界。","chapter":"柏拉图的“形式”","color":0},{"text":"换言之，形而上学并非仅仅是一种关于科学的陈旧而粗糙的看法，它更是一种基本的理解世界的方式。虽然时间已经过去了2500年，但它的一些想法其实与今天并没有太大的差别。","chapter":"最初的形而上学家","color":0},{"text":"试图去现解上帝与信仰他是相互对立的，理性只能对信仰构成阻碍。","chapter":"西方关于上帝的传统观念","color":0},{"text":"上帝。上帝只是我们给这未知者起的一个名字。理性几乎想不到有必要要去论证这种未知者的存在。也就是说，假如上帝不存在，那当然就不可能去论证他；而假如他存在的话，那么去论证他的存在就是愚蠢的。","chapter":"西方关于上帝的传统观念","color":0},{"text":"我们可以在语言学中问“pepino”一词的意思是什么，但我们却不能从理智上对整个语言的意义发问，比如像“西班牙语的意义是什么？”这样的问题就没有任何意义。","chapter":"意义的意义","color":0},{"text":"简单地说，哲学就是对诸如生命、我们知道什么、我们应当怎样做或应当相信什么这样一些重大问题的探究。它是一种对事物寻根究底的过程，一种对那些在大部分时间里被我们认为是理所当然、从未有过疑问或从未明确表达出来的想法提出根本质疑的过程。","chapter":"哲学问题","color":0},{"text":"所谓“概念框架”也可以被当作一套价值和一种审视生活的方式，或者用现代的话来说，可以被当作一种生活方式。如果把侧重点放在政治与社会，那么这种东西可被称为意识形态——一套关于社会本质以及我们在其中所扮演的政治角色的观念。","chapter":"概念与概念框架","color":0},{"text":"概念罕有孤立存在的情况，它们实际上总是要组成一个概念框架。","chapter":"概念与概念框架","color":0},{"text":"形而上学：关于实在以及万物最终本性的理论。形而上学的目标是形成一种关于宇宙的全面而整体的世界现。形而上学中有一个有时被称为本体论的部分，它所研究的是“存在”，试图依次列出构成宇宙中不同种类的实体的优先性。\n伦理学：对善恶对错的研究，对“好的生活”的寻求，以及对道德原理和准则的辨护，所以它有时又被称为道德哲学，尽管这实际上只是伦理学的丰富内容的一部分。\n认识论：对知识的研究，包括诸如“我们能知道什么？”“我们是怎样知道某种事物的？”以及“什么是真理？”这样的问题。\n逻辑（或哲学逻辑）：对合理思维和好的论证的形式结构的研究。\n宗教哲学（或哲学神学）：对宗教、宗教的本质、神圣事物的本质以及相信（或不相信）上帝存在的各种理由的哲学探究。\n政治（或社会政治）哲学：对社会和国家的基础与本质的研究，试图构想出理想社会的样子，并在我们自己的社会中实践某些观念和改革以更好地达到这个目标。\n美学（或艺术哲学）：对艺术的本质以及艺术体验的研究，包括对“美”、“表现”等概念的理解。","chapter":"概念与概念框架","color":0}],"thoughts":[{"text":"概念框架在不同场景的应用可以被解释成生活方式、意识形态、舆论气候、世界观等。","quote":"所谓“概念框架”也可以被当作一套价值和一种审视生活的方式，或者用现代的话来说，可以被当作一种生活方式。如果把侧重点放在政治与社会，那么这种东西可被称为意识形态——一套关于社会本质以及我们在其中所扮演的政治角色的观念。","chapter":""}],"popularHighlights":[]},"CB_5Cr6bZ6cp4ah6WR6U5":{"rating":0,"ratingCount":0,"highlights":[{"text":"The three big ones in life are wealth, health, and happiness. We pursue them in that order, but their importance is reverse.","chapter":"Part II: Happiness","color":0},{"text":"Study logic and math, because once you’ve mastered them, you won’t fear any book.\n","chapter":"Building Judgment","color":0},{"text":"What can I do for the next sixty days to become a clearer, more independent thinker?\nRead the greats in math, science, and philosophy. Ignore your contemporaries and news. Avoid tribal identification. Put truth above social approval.","chapter":"Building Judgment","color":0},{"text":"I don’t actually read a lot of books. I pick up a lot of books and only get through a few which form the foundation of my knowledge.","chapter":"Building Judgment","color":0},{"text":"Read what you love until you love to read.","chapter":"Building Judgment","color":0},{"text":"Reading science, math, and philosophy one hour per day will likely put you at the upper echelon of human success within seven years.","chapter":"Building Judgment","color":0},{"text":"THE MOST IMPORTANT SKILL FOR GETTING RICH IS BECOMINGA PERPETUAL LEARNER. YOU HAVE TO KNOW HOW TO LEARNANYTHING YOU WANT TO LEARN. THE OLD MODEL OF MAKINGMONEY IS GOING TO SCHOOL FOR FOUR YEARS, GETTING YOURDEGREE, AND WORKING AS A PROFESSIONAL FOR THIRTY YEARS.BUT THINGS CHANGE FAST NOW. NOW, YOU HAVE TO COME UPTO SPEED ON A NEW PROFESSION WITHIN NINE MONTHS, ANDIT’S OBSOLETE FOUR YEARS LATER. BUT WITHIN THOSE THREEPRODUCTIVE YEARS, YOU CAN GET VERY WEALTHY.","chapter":"Building Wealth","color":0},{"text":"There is no skill called “business.” Avoid business magazines andbusiness classes.","chapter":"Building Wealth","color":0},{"text":"Play iterated games. All the returns in life, whether in wealth,relationships, or knowledge, come from compound interest.","chapter":"Building Wealth","color":0},{"text":"Ignore people playing status games. They gain status by attackingpeople playing wealth creation games.","chapter":"Building Wealth","color":0}],"thoughts":[],"popularHighlights":[]},"CB_Gsk5lC5kI0Vk6VM6U5":{"rating":0,"ratingCount":0,"highlights":[],"thoughts":[],"popularHighlights":[]},"CB_Cty2Na2LX1dv6ZT6YE":{"rating":0,"ratingCount":0,"highlights":[{"text":"很明显，装配流水线本身是权力高度集中的环境，决定权集中在少数工程师手中，而可替代的大量劳动力个体只能机械地接受分配给他们的工作。虽然这种管理体制在现实中经常不奏效，但是流水线的直观逻辑诚然如此。它作为一种生产流程，造成的将是负的“净民主产出”（net democratic product）。","chapter":"碎片十三 人类总产出","color":0},{"text":"我认为我们有两种途径来厘定标准：第一，衡量一项工作如何扩展了人的能力和技能；第二，立足于工作者对于自我满意程度的判断，从而确立评估标准。","chapter":"碎片十三 人类总产出","color":0},{"text":"我想，在无政府主义的视野下有一点尤其突出，皮埃尔-约瑟夫·蒲鲁东[1]首次使用“无政府主义”这一术语时就意识到了这一点，它就是互助关系（mutuality），或者说是“不经等级制度和国家制度达成的合作”。另一个凸显的观念是无政府主义对混乱、对社会性学习后产生的即兴行为的容忍，以及无政府主义对自发合作、自发互惠的信心。","chapter":"无政府主义的透镜，或曰像一个无政府主义者一样观察","color":0},{"text":"历史的凝练，人们对于清晰叙事的欲望，精英与机构展示秩序和目的性的需求——这些力量合谋起来，传递了一种历史因果律的虚假画面。我们或许因此忽略了一些现实：许多历史变革并不是刻意为之，而是临时与自发行为的结果；有组织的社会运动常常是那些无序抗议和示威的产物，而非其诱因；人类自由方面的显著进步往往不是规范的制度程序的结果，而是未经规划的、不可预测的自发行动，是自下而上打破传统社会秩序的成果。","chapter":"碎片二十九 历史误读的政治","color":0},{"text":"秩序和纪律的视觉追求是集权政治的一个重点关注对象。","chapter":"碎片二十九 历史误读的政治","color":0},{"text":"清理、简化、浓缩历史事件的习惯不只是人类的自然癖性，不只是编历史教科书时的必然要求，更是一种具有高度利害关系的政治争夺。","chapter":"碎片二十九 历史误读的政治","color":0},{"text":"如果一个重要历史事件被程式化，在传播之中成为一个精简的符号、一种虚假的逻辑和秩序（除非我们非常小心地避开），那么它在第一时间被经历的方式就会被极度歪曲。","chapter":"碎片二十八 重新引入具体性、流变和偶然","color":0},{"text":"一旦摆脱了亲历者的局限性，知道了事件的来龙去脉，就不可避免地会受事件走向影响，从而漠视事件的偶发性。","chapter":"碎片二十八 重新引入具体性、流变和偶然","color":0},{"text":"弗朗索瓦·罗沙（François Rochat）对应汉娜·阿伦特的“平庸之恶”的概念，把上述行为称为“平庸之善”。﻿","chapter":"碎片二十七 善意与同情心的传达","color":0},{"text":"他们的行动在先，然后再为行动找到一套逻辑。抽象的原则是实践的产物，而不是相反。","chapter":"碎片二十七 善意与同情心的传达","color":0},{"text":"要而言之，这些技术是掌握技术的管理精英用以说服挑剔的大众——并且把他们从决策中排除——的手段，为的是告诉大众他们没有徇私，没有暗箱操作，也没有偏见，只是在执行透明的技术计算。这些计算如今是一种新自由主义政治秩序的标志，在这种秩序中，新古典主义经济学的手段以科学计算和客观性的名义取代了其他种类的理性思考。﻿","chapter":"碎片二十六 为政治辩护","color":0},{"text":"所有这些行政管理技术的最大缺陷在于，它们以平等和民主之名，行“反政治机器”之实，将广泛存在的合理公共讨论从公共领域中清除，把管理权交到掌握技术的管理机构手中。它们压制了可能会兼容并包、卓有成效的争论，社会政策、技术智能的意义、精英的选拔、平等和多样性的价值、经济增长和发展之目的等议题原本都可以付诸这样的争论。","chapter":"碎片二十六 为政治辩护","color":0},{"text":"过度依赖才能的量化和用来评估质量的“客观”数字审计体系的真正害处，源于那些重要的问题从富有活力的民主争论会议桌上被拿走，交到看似中立的专家手中。左右千百万公民生活机会的重大决定以上述欺骗性方式完成了去政治化，把本应属于公共领域的决定权剥夺了。","chapter":"碎片二十六 为政治辩护","color":0},{"text":"贤能政治（meritocracy）的理念是民主和科学现代主义的天生伴侣。﻿","chapter":"碎片二十五 民主制、价值和政治的终点","color":0},{"text":"我认为把质量化测量的宏大诉求有两个源头：第一，提倡机会平等且反对特权、财富、头衔世袭的民主主义信仰；第二，相信价值可以被科学地测量的现代主义信念。","chapter":"碎片二十五 民主制、价值和政治的终点","color":0},{"text":"我们单就教育而论：如果说中学教育是一条狗，SAT考试是狗的尾巴，那么实际的状况并非狗摇尾巴，而是狗被尾巴给摇了。不仅如此，这尾巴还重塑了狗的品种、口味、生活环境，以及所有那些照管和喂养这条狗的人。这是“标准对行为的殖民”最令人震撼的一个例子。一套强力的量化观测创造了海森堡原理﻿[12]在社会领域的对等物，对令人满意的量化结果的争夺完全改变了被观测的领域。西奥多·波特（Theodore Porter）提醒我们：“这是量化技术的强项，即按它们自己的样子重塑那个它们本想描述的世界。”﻿[13]把这句漂亮话说得朴实一点，就是SAT考试按它自己那副单调的样子让教育变得面目全非，以至于它所观测的基本上是它自己对教育领域的改造成果。\n所以，靠标准化考试来测量智力质量的需求，以及用这些考试来给学生、教师和学校分配奖励的做法，产生了广泛的殖民效应。据称考试是无法通过策略来提高成绩的，但是填鸭式教学和提高应试技巧的培训形成了名副其实拥有数千万美元规模的产业和市场。斯坦利·凯普兰（Stanley Kaplan）的考试培训帝国提供的课程和教材建立在一个观念前提之上：人们可以通过训练来通过相应的考试，进入高等教育院校、法律学院、医学院等。如此一来，强大的测验标准倒转并且殖民了生活世界中的教育；测量数据逾越了单纯的评估者角色，取代了它评估的那种质量。由此产生了某种军备竞赛：模拟考试的出题人努力想战胜真实考试的命题人。而当一位常青藤盟校的成功申请者的“简历”流出后，“下有对策”的做法就可能升级。富有的家庭雇用教育顾问来指导他们的孩子，参考来自藤校的简历，从而确定什么课外活动是最受欢迎的，哪些志愿者工作又是最有利于申请的。用来判别质量的本意良好的举措成了家长帮孩子“摆好位置”的策略。面对这些被测量标准腐化的教育行为，我们几乎不可能评估它们的意义和真实效用。","chapter":"碎片二十四 缺乏效力，并且最终导致腐化","color":0},{"text":"爱因斯坦曾说：“不是所有算得上数的东西都能计算，也不是所有能计算的东西都算数。”","chapter":"碎片二十四 缺乏效力，并且最终导致腐化","color":0},{"text":"引文索引不仅是一种观测数据，还是一种真实存在的力量，能够反过来让人服从于它。","chapter":"碎片二十四 缺乏效力，并且最终导致腐化","color":0},{"text":"量化标准的第二个致命缺陷是，即使在刚被设计出来时它是有效的，其存在本身也会引发一系列损害其有效性的事件。我们可以称这一过程为“标准对行为的殖民”，它导致最初的有效性被消解了。","chapter":"碎片二十四 缺乏效力，并且最终导致腐化","color":0},{"text":"它们都将质的衡量转化为量的衡量，从而通过一套貌似单一、客观的尺度实现了案例之间的比较。它们在最高意义上是一种宽领域、具有欺骗性的“消除政治的机器”，用来把政治合理性方面的疑问转化为专家操作下中立、客观的管理规程。这种去政治化的把戏掩盖了一点：对政治中的互助与试错之可行性的信念在深层心理中已经缺失，而这一信念是无政府主义者和民主主义者都深深珍视的。在到达“政治”的主题之前，这种量化通约的技术还另有两个可能非常重要的反对立场。","chapter":"碎片二十三 如果……？一个假想的审计社会","color":0},{"text":"我想说的是，以才能为准绳来选拔精英并分配公共经费的民主政体，尤其是美国这样面积广阔的民主国家，在衡量质量时使用的标准常常是客观而机械的。","chapter":"碎片二十三 如果……？一个假想的审计社会","color":0},{"text":"予教育以活力的其他目标，包括合作学习、跨文化课程、多元智能开发、科学探索和问题导向的学习，都会因此丧失。","chapter":"第五章 为了政治","color":0},{"text":"不管无政府主义在人类状况上有何疏漏之处，它都从人们的小资欲望中看到了对尊严和自主的追求，着实是对这一大众想象的敏锐洞悉。小资产阶级的独立梦想在实践中愈发难以实现，但它没有随着工业革命的兴起而消亡，反而在生活中找到了新的寄托。﻿","chapter":"碎片十九 小资产者之梦：财产的诱惑","color":0},{"text":"小资产者的梦想受挫是标准的革命导火线。多数农民革命最有效的发起口号，无非用各种形式表达的“耕者有其田”。","chapter":"碎片十九 小资产者之梦：财产的诱惑","color":0},{"text":"对于托马斯·杰斐逊来说，由自立的小资产所有者组成的农业可以弘扬社会美德，这是民主的公民社会的基石：","chapter":"碎片十九 小资产者之梦：财产的诱惑","color":0},{"text":"我认为小资产阶级受到的污蔑还有一个结构性的来源，这一来源在从前的社会主义阵营和广大资本主义民主制中都存在。真相是，将近所有形式的小物业都有逃避国家控制的方法：小物业难以监控、收税、管制，其自身活动的复杂性、多样性和流动性使它难以规范、管控。","chapter":"碎片十八 蔑视从何而来","color":0},{"text":"自主性的渴望、对工作时间的控制，以及这样的控制权带来的对自由感和自尊感的渴望，是被世界上大多数人口广泛忽略的一种社会期待。","chapter":"第四章 给小资产阶级的两声喝彩","color":0},{"text":"首先最重要的原因是，我认为在如今越发由大型的政府官僚体制和商业官僚体制主宰的国家体系中，小资产者和普遍意义上的小业主代表着一个弥足珍贵的自主、自由的领域。自主、自由，再加上互助，就是无政府主义情怀的核心了。其次，我确信小资产阶级在任何类型的政治体系中都承担了重要的社会和经济功能。","chapter":"第四章 给小资产阶级的两声喝彩","color":0},{"text":"我相信，移除红绿灯可以被视为对行车责任和公共礼仪的一种温和的训练。","chapter":"碎片十六 一个试探性、反直觉的例子：移除交通灯","color":0},{"text":"人们悬置了自己的独立判断而服从于习惯，或者可能服从于身为市民对大家普遍遵守的法定交通信号秩序的敬畏；用独立判断来对抗这一秩序最终或许会造成不好的结果。","chapter":"碎片十六 一个试探性、反直觉的例子：移除交通灯","color":0},{"text":"人长期生活在服从中，这对于一个奉行民主的公民社会有着不祥的潜移默化作用。如果一个人在醒着的时间都低声下气，其生存习惯和个人形象都是在集权的环境中获得的，那么，你还有理由期待他在小镇业主会议上挺身而出，摇身一变成为勇敢正直、独立思考、不畏风险的模范公民吗？人们真的可以从工作场所的专制体制径直投入公共领域的公民民主活动吗？集权环境确实对人格塑造有深远影响。斯坦利·米尔格拉姆的著名实验﻿[7]发现，大多数受试者即使认为电击很强烈，甚至可能威胁受电击者的生命，还是会遵从穿白大褂的人的权威指令，执行电击。菲利普·津巴多在另一个心理学实验﻿[8]中发现，扮演监狱看守角色的实验参与者会很快开始滥用权力，以至于他需要终止实验，以防止受试者遭到进一步的伤害。﻿[9]","chapter":"碎片十五 机构生活的病理学","color":0},{"text":"自工业革命的发生和城市化的冒进以来，世界人口中成为无产者的比例越来越大，他们必须依靠大型的层级组织讨口饭吃。","chapter":"碎片十五 机构生活的病理学","color":0},{"text":"这种教育的产出是什么？它是一种特定形式的（狭义的）分析型智能（analytical intelligence）；按照规划，它可以通过考试来测量。众所周知，在一个成功的社会中，有价值的重要技能有很多很多，而分析型才能与成功社会几乎是风马牛不相及。这些有价值的才能包括艺术天赋、想象力智能、手工智能（也就是早期工人从田间带到福特工厂的才能）、音乐舞蹈技能、创造力智能、情感智能、社交技能和伦理智能。","chapter":"碎片十三 人类总产出","color":0},{"text":"无技能的、标准化的劳动力是流水线运转的前提，流水线上的一个“人手”可以轻易被另一个“人手”取代。换句话说，流水线的建立以劳动力的“愚蠢化”为基，此言不虚。","chapter":"碎片十三 人类总产出","color":0},{"text":"流水线的设计意图恰恰就是消解工匠-工艺知识，同时也消解这种知识赋予劳动者的权力，让它们统统去为那个逝去的手工打造四轮马车的时代殉葬。","chapter":"碎片十三 人类总产出","color":0},{"text":"任何我们能够想到的行为和制度，不论其表露的目的是什么，都在有意无意地改变着人们。","chapter":"碎片十三 人类总产出","color":0},{"text":"除了睡眠和做梦之外，游戏作为人类的第三大无目的行为，其实是人之为人的关键，对个人身心和社会来说都不可或缺。","chapter":"碎片十一 游戏与开放性","color":0},{"text":"参观者满心敬畏地伫立着，同时注视着这尊已然成为太平洋战争标志的雕像，不过他们更多是在接收纪念碑的信息，而非完成纪念碑的意义。","chapter":"碎片十一 游戏与开放性","color":0},{"text":"我认为，这座纪念碑的象征性力量在很大程度上来自它致敬逝者之方式的开放性，即允许纪念碑去承载所有访客自己的含义、自己的历史、自己的记忆。","chapter":"碎片十一 游戏与开放性","color":0},{"text":"开放性的检验，就是检验某种行为或者机构（包括它的形式、目的、规则）在多大程度上可以依照营造它的人与使用它的人的相互要求而改变。","chapter":"碎片十一 游戏与开放性","color":0},{"text":"学生宿舍常常经过了标准化的装修，室内被漆成统一的颜色，双层床和书桌都被钉死在地板或者墙上，这样的封闭结构断绝了学生想象力和设计力的表达。","chapter":"碎片十一 游戏与开放性","color":0},{"text":"几乎所有人类机构都可以按这套标准评估。它对于活动者的目的和天分有多包容？","chapter":"碎片十一 游戏与开放性","color":0},{"text":"我们或许就能轻松找到其吸引力的逻辑所在：它的开放性成就了在此玩耍的孩子的目的性、创造力和热情。","chapter":"碎片十一 游戏与开放性","color":0},{"text":"［探险游乐场］是一则关于无政府状态的寓言、一个自治社会的模型。它彰显的既有紧张关系，又有动态协同；既有多样性，又有自发性；既有合作关系的非强制性生长，又有个体特质与社群意识的觉醒。﻿","chapter":"碎片十一 游戏与开放性","color":0},{"text":"除民族国家外，当代的标准化力量还来自国际组织，如世界银行、国际货币基金组织、世界贸易组织、联合国教科文组织，甚至还有联合国儿童基金会和国际法庭。","chapter":"碎片十 民间秩序的宿敌","color":0},{"text":"民族国家制度之所以长盛不衰，是因为它已经成为将单个政治体纳入既有国际体系的通用配备。","chapter":"碎片十 民间秩序的宿敌","color":0},{"text":"这种灭绝背后的主导力量，正是无政府主义者的宿敌——国家制度，或更具体一点，是现代的民族国家。","chapter":"碎片十 民间秩序的宿敌","color":0},{"text":"一个社会或者一种经济秩序越是高度计划、调节、规范化，就越容易依赖非正式实践。","chapter":"碎片九 整洁背后的混乱","color":0},{"text":"治大国如烹小鲜。——《道德经》","chapter":"碎片九 整洁背后的混乱","color":0},{"text":"可想而知，它们之所以得到赞赏，凭借的是其作为艺术作品的视觉吸引力，但此后，这件艺术作品再也不会被除了超人外的其他人从上帝视角观赏。","chapter":"碎片八 无序城市的诱惑力","color":0},{"text":"我们在报纸图片里经常能看到，城市官员或者设计师发出万丈光芒，俯瞰着成功城市的模型，就好像他们是直升机或者上帝一般。以民间的眼光看，这十分令人诧异，因为不曾有人从那种高度或用那种视角观察城市。","chapter":"碎片八 无序城市的诱惑力","color":0},{"text":"其中最具代表性的批评者是简·雅各布斯（Jane Jacobs），她对城市的民间秩序更感兴趣，关注城市日常生活，也就是城市的实际功能，而非其表面文章。","chapter":"碎片八 无序城市的诱惑力","color":0},{"text":"后现代时代的来临时间可以准确确定为1972年3月16日下午3点，这是美国圣路易斯市的一个曾获设计奖项的高层公营住宅区普鲁伊特-伊戈公寓（Pruitt-Igoe）被爆破拆除并因此塌成一片瓦砾的时间。","chapter":"碎片八 无序城市的诱惑力","color":0},{"text":"这个时代的城市规划强调视觉秩序和功能分区。","chapter":"碎片八 无序城市的诱惑力","color":0},{"text":"以强制性协调为追求的大规模现代主义规划，是达成某些目标最为有效、合理、令人满意的办法。空间探索、大范围的交通网络规划、飞机制造和其他大规模工程十分需要由少量专业人士指挥的巨型组织。瘟疫和污染的控制少不了一个有专家任职的核心机构，以便接收、处理数百个监控单元报告的标准化信息。","chapter":"碎片七 民间的弹性","color":0},{"text":"我想我们可以毫不夸张地说，过去三个世纪的历史可被视为官方控制与占用的状态对民间秩序的胜利。","chapter":"碎片六 官方的控制术与控制状态","color":0},{"text":"命名、景观、建筑和工作流程的特定规划，显示出了秩序、理性、抽象性和系统简洁性，这使它们为等级制度中的权力所用。我把这类规划视为“控制与占用的状态”（landscapes of control and appropriation）。","chapter":"碎片六 官方的控制术与控制状态","color":0},{"text":"权力滔天的人不必学习如何与他人“合奏”。或者正如肯尼思·博尔丁（Kenneth Boulding）所说，“一个组织［或国家］越大、越集权，它的顶层决策者越可能工作在一个臆想的世界里”。﻿","chapter":"碎片四 广告：“诚征追随者，自愿服从领导”","color":0},{"text":"获得领导魅力的关键条件就是认真倾听并且回应。","chapter":"碎片四 广告：“诚征追随者，自愿服从领导”","color":0},{"text":"我用了一个十分庸常的例子来开始这一章，写的是在新勃兰登堡闯红灯的事。我并不是号召大家为违法而违法，当然也不是为了节省那短短的三分钟。此例的目的在于说明，习惯性的自觉服从可能导致某些荒唐的情形，每个人在经过理性的反思后几乎都会发现其中的荒谬性。实际上，近三个世纪以来的所有伟大的解放运动最初想要实现的，都是挑战某种法定秩序，对付守卫这些秩序的政治力量更是理所当然之事。如果没有几个勇敢的灵魂敢于突破规则与习俗（通过静坐抗议、示威，以及对既定立法的大规模违背），就没有后来的解放运动。冲击秩序的行为经过愤怒、挫败、暴力的激化后，将清楚传达出这样的信息：人们的诉求已经不能在现有的制度和法律框架内解决。所以，就他们违背法律的意愿而言，本质的一点不是种下失序的种子，而是要求设置一种更加公正的法定秩序。我们如今的法治相较从前要更加公正、更加自由，这也部分归功于那些勇于违抗不公法律的人。","chapter":"碎片三 还论不服从","color":0},{"text":"于是又出现了一个悖论：在上述节点上，组织化的改革利益团体从民众反抗中获得一定程度的政治可见度和影响力，然而，反抗既不由它们发起，也不受它们控制，尽管它们获得影响力的前提假设是它们会有足够强的约束力，来让叛乱的民众回到日常政治的轨道。而如果它们成功做到了，悖论就会更进一步，因为一旦作为影响力之源的反抗平息了，它们左右政策的能力就会减弱。","chapter":"碎片三 还论不服从","color":0},{"text":"精英的改革是在压力之下实现的。","chapter":"碎片三 还论不服从","color":0},{"text":"工会罢工和自发罢工是两回事，即便是工会会长也叫不停一场自发的罢工。一场有领导者的示威，即使是一场大规模示威，也与民众蜂拥而上的骚乱不同。后者没有统一的诉求，也没有可谈判的对象。","chapter":"碎片三 还论不服从","color":0},{"text":"我们就必须正视如下悖论：公共秩序遭受的破坏和扰乱对民主制度下的政治变革产生了积极的作用。","chapter":"碎片三 还论不服从","color":0},{"text":"很遗憾，代议制机构和选举这两者本身似乎很难引发重大的变革。因为自由主义民主政体中的财产和财富变得集中，而富有阶层在媒体、文化领域又享有特权地位并由此拥有了政治影响力，所以劳动阶层的选票不能转化为激进的政治变革。","chapter":"碎片三 还论不服从","color":0},{"text":"这里存在某种产生于观察和默会协同的传染性效应，即便没有一个“司机中央委员会”来开会商议该如何推行公民的不服从行动。","chapter":"碎片三 还论不服从","color":0},{"text":"沉默、匿名，以及常常存在的共谋关系——这些条件下的违法和不服从也许是农民和下层阶级在人类历史中偏好的政治行为方式；对他们来说，公开的反抗太危险了。","chapter":"碎片二 论不服从的重要性","color":0},{"text":"这种小的不服从永远上不了新闻头条，但是正如千万毫无头脑的珊瑚虫能够创造珊瑚礁，成千上万的不服从、开小差也能够制造经济或者政治上的巨大礁石。一种隐秘的双重共谋使得这些行为难以为人察觉。做坏事的人从不希望把注意力吸引到自己身上，他们的安全感来自他们的隐身。官方则站在自己的立场不愿意人们注意到日渐高企的不服从水平，否则就有鼓励其他人仿效的风险，并且让人们发现官方的道德支配地位的脆弱性。这就造就了一种奇异同谋关系下的沉默，使得其中的不服从行为几乎不见于历史记录。\n这些我在别处命名为“日常形式的抵抗”（everyday forms of resistance）的行为，虽然极少进入历史记载，却暗中对政权、国家和军队产生了巨大的、常常是决定性的影响。","chapter":"碎片二 论不服从的重要性","color":0},{"text":"一辆驶来的车都没有。我不假思索地走下了人行道，但我刚一迈出脚，沃特海姆（Wertheim）博士就说：“詹姆斯，你必须等灯。”我轻声抗议着，但同时还是回到了人行道上：“可是，沃特海姆博士，路上没有车呀。”“詹姆斯，”他立即反驳说，“这会教坏小孩子。”受教了，我无法反驳他的立场。","chapter":"第一章 无序和号召力的功用","color":0},{"text":"每当站在十字路口时，我如果因搞砸了最近一次德语交流而耗光了自信，就会和大部队一起等到绿灯亮起，害怕自己一闯红灯就得承受几十双眼睛的怒目而视。但要是一天下来我用德语交流得很顺利并因此自信心爆满，我就会义无反顾地闯红灯，并且在心里给自己壮胆：这是一条和理性背道而驰的小规定，遵守它的人都犯了糊涂。\n在���人反对之下闯红灯竟然需要如此厚的脸皮，这是我始料未及的。我的理性信念在众人的指责中看起来是多么的无足轻重啊！义无反顾地踏上马路也许能给人留下深刻的印象，但是此举要求的勇气是我通常够不到的。\n为了解释自己行为的正当性，我开始在脑中排练一段用完美的德语表达的演讲。“你们知道，你们自己，尤其还有你们的祖辈，可以再多一些违抗法律的精神。有一天，你们会接受正义和理性的号召，去违抗更大的法律。那一刻将决定一切。你们要有所准备。你们要如何为那事关重大的一天绸缪呢？你们得保持‘良好状态’，这样一来，当那个重要的日子到来时，你们就会做好准备了。你们需要的是‘无政府主义的操演’。每隔一段时间，去反抗一些细小的、没有道理的法律，即使只是闯次红灯。用你们自己的脑子去判断一条法律是否公正合理。如此，你们就能状态良好；当那个重要的日子到来时，你们就会有所准备。”","chapter":"第一章 无序和号召力的功用","color":0},{"text":"我认为，它们合起来大致可以表达一个无政府主义思想者关于国家、关于革命、关于平等的想法。","chapter":"一些注意事项","color":0},{"text":"具有平民主义倾向的无政府主义者相信自治、自理和合作的可能性。","chapter":"社会科学实践中的无政府主义透镜","color":0},{"text":"强力国家和自由主义经济当道的这两个世纪，可能导致我们在适应社会时基本上失去了互助的习性，进而使我们面临这样一种危险：我们恰好在变为霍布斯所构想的那种自然状态下的危险掠夺者。利维坦也许创造了其自身的合法性证明。","chapter":"组织的悖论","color":0},{"text":"大规模的扰乱与反抗在某些条件下会径直导致威权政治或法西斯主义，而非改革或革命。","chapter":"组织的悖论","color":0},{"text":"组织一般不会推动抗议运动，这和通常的认知不同。实际上，更贴近事实的说法是，抗议运动会推动组织化，而组织总会遏制抗议，使之转向制度渠道。抗议要是威胁到了制度，正式的组织就总会成为它的遏制者而非促进者。","chapter":"组织的悖论","color":0},{"text":"市场用钱来衡量影响力，而民主制从原则上讲用选票来衡量影响力。现实中，由于存在一定程度的不平等，钱的作用会污染、压倒选票。","chapter":"无政府主义的透镜，或曰像一个无政府主义者一样观察","color":0},{"text":"从现存制度内部解决问题的希望因此变得尤其渺茫。在很大程度上，民主体制中的各个机构自身已经成了商品，可以为出价最高的买主所掌控。","chapter":"无政府主义的透镜，或曰像一个无政府主义者一样观察","color":0},{"text":"这就意味着我反对在19世纪与20世纪之交盛行于无政府主义者中的那种乌托邦科学主义。在当时那种工业、化学、医药、工程和运输技术突飞猛进的环境下，不难理解为何不论左派还是右派都对现代主义抱有高度乐观的情绪，都认定稀缺性问题已经在原则上得到了解决。很多人相信，科学进步已经发现了自然的法则，与此同时也发现了解决人类生存、社会组织、制度设计方面的问题的科学途径。随着人们越来越理性、越来越有知识，科学将告诉我们应该如何生活，而政治将不再是必需品。圣西门伯爵、约翰·斯图亚特·密尔、马克思、列宁，这些人虽然差异显著，但都倾向于期待一个由开明专家治理的未来世界，治理这个世界依靠的是科学原理，“物的管理”将会取代政治。","chapter":"无政府主义的透镜，或曰像一个无政府主义者一样观察","color":0}],"thoughts":[{"text":"可以用古德哈特定律来说明：当一个衡量标准成为目标时，它就不再是一个好的衡量标准。","quote":"引文索引不仅是一种观测数据，还是一种真实存在的力量，能够反过来让人服从于它。","chapter":""},{"text":"应试教育针对特定能力的培养固然会牺牲掉其他的人类天赋，但一个可以为之辩护的点我觉得是人类科学技术的大发展已然让知识分门别类细化到一定的门槛，要进入某一细分领域必须具备相关的基础业务知识，而获取这些知识的能力便建基在这一应试教育模式之下。换句话说，如此「孤注一掷」式的应试教育它可能不是最优解，却可能是人类渴望再次进步的一个最不坏的解。当然，这种进步的视角是落在数学、科学、技术之上，而不是人文、艺术之上。","quote":"予教育以活力的其他目标，包括合作学习、跨文化课程、多元智能开发、科学探索和问题导向的学习，都会因此丧失。","chapter":""},{"text":"作者对小资产阶级的身份认定似乎已扩大到我们日常认为的无产阶级。","quote":"小资产者的梦想受挫是标准的革命导火线。多数农民革命最有效的发起口号，无非用各种形式表达的“耕者有其田”。","chapter":""},{"text":"这种躲避管控能力的习得，也是一种自主性自发性的体现，暗合了无政府主义的操演","quote":"我认为小资产阶级受到的污蔑还有一个结构性的来源，这一来源在从前的社会主义阵营和广大资本主义民主制中都存在。真相是，将近所有形式的小物业都有逃避国家控制的方法：小物业难以监控、收税、管制，其自身活动的复杂性、多样性和流动性使它难以规范、管控。","chapter":""},{"text":"马克思主义对小资产的鄙视源自于小资产贪利与脚踏两只船","quote":"小资产阶级则高不成低不就；他们贫穷，但还是贫穷的资产阶级。他们可能不时会和激进派站在一起，但他们作为盟友只能共安乐，不能共患难；他们是本质上不可靠的朋友，因为他们脚踏两个阵营，时刻不放弃成为大资产阶级的希望。","chapter":""},{"text":"小资产阶级有无政府主义的潜质同时又是政治体系中的重要角色","quote":"首先最重要的原因是，我认为在如今越发由大型的政府官僚体制和商业官僚体制主宰的国家体系中，小资产者和普遍意义上的小业主代表着一个弥足珍贵的自主、自由的领域。自主、自由，再加上互助，就是无政府主义情怀的核心了。其次，我确信小资产阶级在任何类型的政治体系中都承担了重要的社会和经济功能。","chapter":""},{"text":"提出问题固然简单，但在这种现状下，是否能设计出一套更优的教育方针，或者说当下的教育方式已经是一种最不坏的选择了？","quote":"在测量分析型智能的测试中得不到高分的那些人，可能在学校系统不看重的诸多智力形式中的至少一个方面是天赋出众的。浪费了五分之四的学生的天赋，让他们背上持久的污名，使他们在社会守门人眼中乃至在他们自己眼中成为失败者——这是怎样一种制度？这种视野狭隘的教育赋予“分析型智能精英”丰厚的特权与机遇。这么做有什么正当的好处？是否值得社会承受如此巨大的人才损失与浪费？","chapter":""},{"text":"人创造制度，用于规训人。","quote":"任何我们能够想到的行为和制度，不论其表露的目的是什么，都在有意无意地改变着人们。","chapter":""},{"text":"以时间线索排列，比起冰冷的整齐的字母排列，更容易让悼念之人找到回忆的入口","quote":"我认为，这座纪念碑的象征性力量在很大程度上来自它致敬逝者之方式的开放性，即允许纪念碑去承载所有访客自己的含义、自己的历史、自己的记忆。","chapter":""},{"text":"不仅如此，在学校和教室这一封闭区域内，教师是权力的中心，底下的学生全都被权力所注视，形成福柯所说的全景敞视场景， 为我们展示了一种微观权力技术在现代社会中强大的规训作用。","quote":"学生宿舍常常经过了标准化的装修，室内被漆成统一的颜色，双层床和书桌都被钉死在地板或者墙上，这样的封闭结构断绝了学生想象力和设计力的表达。","chapter":""},{"text":"换句话说，他们是反家长式领导的（paternalism）","quote":"几乎所有人类机构都可以按这套标准评估。它对于活动者的目的和天分有多包容？","chapter":""},{"text":"这种谦逊将游乐园的形态交由孩子自己完成，意味开放和最低程度的监管","quote":"谦逊","chapter":""},{"text":"民间秩序的消亡源于无政府主义的宿敌——民族国家的崛起。偏离常规的民间实践被国家制度处理，国家级别的同质化工程（如统一方言）也进一步促成民间实践的消失，除此之外国际组织的标准化制定也将民间智慧排除。","quote":"这种灭绝背后的主导力量，正是无政府主义者的宿敌——国家制度，或更具体一点，是现代的民族国家。","chapter":""},{"text":"作者举例了语言语法习得、巴黎交通、东德的计划经济等作为例子来论证。人们总是倾向于将外观上有序等同于实践上有序，同时将外观上的杂乱等同于无序。这也是对前述雅各布斯观点对深化，不考虑实际用途目的而只在乎视觉艺术上的几何秩序往往结果会背道而驰。","quote":"一个社会或者一种经济秩序越是高度计划、调节、规范化，就越容易依赖非正式实践。","chapter":""},{"text":"规划师们缺少的是民间体察，对生活在城市中的人民的生活的了解，而这本该是城市规划的出发点与归宿。","quote":"我们在报纸图片里经常能看到，城市官员或者设计师发出万丈光芒，俯瞰着成功城市的模型，就好像他们是直升机或者上帝一般。以民间的眼光看，这十分令人诧异，因为不曾有人从那种高度或用那种视角观察城市。","chapter":""},{"text":"雅各布斯认为现代主义的城市规划强调视觉秩序和功能分区。以效率最大化实现为实践宗旨却忽略的三件事：1.规划者的计算公式立足于指标效率而忽略了人类行为中蕴含的丰富目的性。2.人们喜欢混合型的功能多样的城区，这些城区也会因时而变。3.现代主义城市规划伤害了民间秩序，它试图将城市变成没有灵魂的艺术品，而不是「生活着的」城市。","quote":"其中最具代表性的批评者是简·雅各布斯（Jane Jacobs），她对城市的民间秩序更感兴趣，关注城市日常生活，也就是城市的实际功能，而非其表面文章。","chapter":""},{"text":"但是很多时候，这种强制性协调本身是一种折中的妥协方案，无法适应个异性场景，容易导致失败的结局，作者举了几个科学种植的林学为例子。归根结底，失败的原因在于对特定情况缺乏认知，照搬成功模式而缺少对新环境的考量，思考过于简化而导致的反科学。而民间智慧与技艺就是在此场景下不可或缺的知识，他们有当地的成功经验、灵活的应对技巧。","quote":"以强制性协调为追求的大规模现代主义规划，是达成某些目标最为有效、合理、令人满意的办法。空间探索、大范围的交通网络规划、飞机制造和其他大规模工程十分需要由少量专业人士指挥的巨型组织。瘟疫和污染的控制少不了一个有专家任职的核心机构，以便接收、处理数百个监控单元报告的标准化信息。","chapter":""},{"text":"尽管在民主国家还有工会、民间知识等的反向作用","quote":"我想我们可以毫不夸张地说，过去三个世纪的历史可被视为官方控制与占用的状态对民间秩序的胜利。","chapter":""},{"text":"流水线工厂能实现权力中心对物质和工作流的极大控制，如福特T型车工厂、麦当劳汉堡制作","quote":"命名、景观、建筑和工作流程的特定规划，显示出了秩序、理性、抽象性和系统简洁性，这使它们为等级制度中的权力所用。我把这类规划视为“控制与占用的状态”（landscapes of control and appropriation）。","chapter":""},{"text":"子随父姓是随着国家发展而普及的一种监管手段。","quote":"命名、景观、建筑和工作流程的特定规划，显示出了秩序、理性、抽象性和系统简洁性，这使它们为等级制度中的权力所用。我把这类规划视为“控制与占用的状态”（landscapes of control and appropriation）。","chapter":""},{"text":"Call and Response","quote":"获得领导魅力的关键条件就是认真倾听并且回应。","chapter":""},{"text":"charisma是一种相对的能力而不是绝对的能力","quote":"也就是说，领导魅力取决于行为接受者的反应与响应。","chapter":""},{"text":"按中国人的话说就是会哭的娃有奶吃","quote":"我用了一个十分庸常的例子来开始这一章，写的是在新勃兰登堡闯红灯的事。我并不是号召大家为违法而违法，当然也不是为了节省那短短的三分钟。此例的目的在于说明，习惯性的自觉服从可能导致某些荒唐的情形，每个人在经过理性的反思后几乎都会发现其中的荒谬性。实际上，近三个世纪以来的所有伟大的解放运动最初想要实现的，都是挑战某种法定秩序，对付守卫这些秩序的政治力量更是理所当然之事。如果没有几个勇敢的灵魂敢于突破规则与习俗（通过静坐抗议、示威，以及对既定立法的大规模违背），就没有后来的解放运动。冲击秩序的行为经过愤怒、挫败、暴力的激化后，将清楚传达出这样的信息：人们的诉求已经不能在现有的制度和法律框架内解决。所以，就他们违背法律的意愿而言，本质的一点不是种下失序的种子，而是要求设置一种更加公正的法定秩序。我们如今的法治相较从前要更加公正、更加自由，这也部分归功于那些勇于违抗不公法律的人。","chapter":""},{"text":"难道不是所有的改革都源自压力？","quote":"精英的改革是在压力之下实现的。","chapter":""},{"text":"所以代议制民主制度等构建，允许公民言论自由集会自由的目的在于能让冲突在体制内得意体现，从而让体制的手段去解决，对于一个无政府主义式的骚乱，反倒是让精英们无从下手。","quote":"工会罢工和自发罢工是两回事，即便是工会会长也叫不停一场自发的罢工。一场有领导者的示威，即使是一场大规模示威，也与民众蜂拥而上的骚乱不同。后者没有统一的诉求，也没有可谈判的对象。","chapter":""},{"text":"这个观点对我来说很新颖，很有洞见。政治特技具有榜样效应的传染性，若能形成病毒式扩散传播，那便使得前述的无政府主义操演有意义了。","quote":"这些我在别处命名为“日常形式的抵抗”（everyday forms of resistance）的行为，虽然极少进入历史记载，却暗中对政权、国家和军队产生了巨大的、常常是决定性的影响。","chapter":""},{"text":"想必这就是规训的力量。这个场景让我回想起几年前看的美剧《航空炸弹客》里的类似场景，主角在空无一人的街道上等红灯思考这么做的意义，他觉得这是现代技术与工业化对人的侵蚀。","quote":"一辆驶来的车都没有。我不假思索地走下了人行道，但我刚一迈出脚，沃特海姆（Wertheim）博士就说：“詹姆斯，你必须等灯。”我轻声抗议着，但同时还是回到了人行道上：“可是，沃特海姆博士，路上没有车呀。”“詹姆斯，”他立即反驳说，“这会教坏小孩子。”受教了，我无法反驳他的立场。","chapter":""},{"text":"有意思的小心思","quote":"每当站在十字路口时，我如果因搞砸了最近一次德语交流而耗光了自信，就会和大部队一起等到绿灯亮起，害怕自己一闯红灯就得承受几十双眼睛的怒目而视。但要是一天下来我用德语交流得很顺利并因此自信心爆满，我就会义无反顾地闯红灯，并且在心里给自己壮胆：这是一条和理性背道而驰的小规定，遵守它的人都犯了糊涂。","chapter":""},{"text":"这些都是政府主义思想家，竟然还有托尔斯泰","quote":"不会找到蒲鲁东、巴枯宁、艾力格·马拉泰斯塔（Errico Malatesta）、西斯蒙第（Sismondi）、托尔斯泰、鲁多夫·洛克尔（Rudolf Rocker）、托克维尔、古斯塔夫·兰道尔（Gustav Landauer）等人的研究分析","chapter":""},{"text":"作者认为当下的社会科学自满于精英主义者的视角，而忽视无产者、农民等的目的、价值和实践，只拿他们填充社会经济数据中的数值。","quote":"具有平民主义倾向的无政府主义者相信自治、自理和合作的可能性。","chapter":""},{"text":"国家摧毁了自愿合作所产生的自然的积极精神和责任意识。","quote":"强力国家和自由主义经济当道的这两个世纪，可能导致我们在适应社会时基本上失去了互助的习性，进而使我们面临这样一种危险：我们恰好在变为霍布斯所构想的那种自然状态下的危险掠夺者。利维坦也许创造了其自身的合法性证明。","chapter":""},{"text":"89的64可真太贴切了","quote":"大规模的扰乱与反抗在某些条件下会径直导致威权政治或法西斯主义，而非改革或革命。","chapter":""},{"text":"组织是既得利益者控制，他们手执国家权力的缰绳。","quote":"组织一般不会推动抗议运动，这和通常的认知不同。实际上，更贴近事实的说法是，抗议运动会推动组织化，而组织总会遏制抗议，使之转向制度渠道。抗议要是威胁到了制度，正式的组织就总会成为它的遏制者而非促进者。","chapter":""},{"text":"组织的存在目的是维护现状？","quote":"组织一般不会推动抗议运动，这和通常的认知不同。实际上，更贴近事实的说法是，抗议运动会推动组织化，而组织总会遏制抗议，使之转向制度渠道。抗议要是威胁到了制度，正式的组织就总会成为它的遏制者而非促进者。","chapter":""},{"text":"按照这种说话，不存在纯粹的民主制","quote":"市场用钱来衡量影响力，而民主制从原则上讲用选票来衡量影响力。现实中，由于存在一定程度的不平等，钱的作用会污染、压倒选票。","chapter":""},{"text":"作者对于先行体制的解决问题能力持悲观态度","quote":"从现存制度内部解决问题的希望因此变得尤其渺茫。在很大程度上，民主体制中的各个机构自身已经成了商品，可以为出价最高的买主所掌控。","chapter":""},{"text":"一如马科斯韦伯所说的世界的祛魅","quote":"这就意味着我反对在19世纪与20世纪之交盛行于无政府主义者中的那种乌托邦科学主义。在当时那种工业、化学、医药、工程和运输技术突飞猛进的环境下，不难理解为何不论左派还是右派都对现代主义抱有高度乐观的情绪，都认定稀缺性问题已经在原则上得到了解决。很多人相信，科学进步已经发现了自然的法则，与此同时也发现了解决人类生存、社会组织、制度设计方面的问题的科学途径。随着人们越来越理性、越来越有知识，科学将告诉我们应该如何生活，而政治将不再是必需品。圣西门伯爵、约翰·斯图亚特·密尔、马克思、列宁，这些人虽然差异显著，但都倾向于期待一个由开明专家治理的未来世界，治理这个世界依靠的是科学原理，“物的管理”将会取代政治。","chapter":""}],"popularHighlights":[]},"CB_AJZ7eP7cUGjc6Pc6Pw":{"rating":0,"ratingCount":0,"highlights":[{"text":"这些伟大制度都已经失败了，它们直接撞到绝对的邪恶。在 制度死亡前，剩下最后一口气的时候，还掀出了最不可思议的人物， 像柬埔寨的布尔布特，这些人把这种制度的逻辑推向极致。为了要创 造一种新的人类，为了要消灭过去，建立一个绝对正义的社会，第一 件事就是要毁灭所有活着的人类，因为他们多多少少被过去的社会所 腐化。这三百年来，大部分的知识分子虽然没有走向如此恐怖的极 端，但都共同接受了一个观念：要让人类变得更有道德、更正义，唯 —的方法就是创造一个更正义、更平衡、更平等的社会。\n这些乌托邦式的政治制度，在实践上是失败的。它们的失败，以 及道德扫地，就是20世纪末最主要的事件，也就是我认为西方文明在非 科学领域上的失败。社会改革的原意，是要取代道德改革，但结果却 制造出了一个灾难。我们现在发现自己完全无助，我们面对一个绝对的 真空。所以人们最近才会重新燃起对现代哲学的兴趣，因为这些哲学能 够提供一些实际的、知识性的、道德性的忠告，教导人们如何过日常生 活。这也就是为什么像佛教这类智慧教条又吸引了人们的兴趣，因为佛 教谈的正是人类的生活和慈悲，没有说要通过毁灭世界来重新建造世 界，或是通过杀戮全人类来重新建立人类。人们对这些概念的新兴趣， 就是因为我刚才形容的伟大政治制度、伟大乌托邦的伟大失败。科学不 必为这个灾难负责，这完全是科学之外的极端主义所造成的。","chapter":"九追踪暴力的根","color":0},{"text":"因为从18世纪开始，智慧问题被转移到政治的领域。 如何达成正义和快乐，转变成如何组织一个正义的社会，由这个正义的 社会，通过集体的正义，把快乐送达每一个个人的身上。换句话说，如 何达成善、正义和快乐，全部加起来就变成“革命”这个词——社会革 命、文化革命、政治革命。走到这一步，原属于哲学中伦理的一支，以 政治体系的形式重生。到了 19世纪，我们进入大乌托邦时代，大家希望 从头到尾重新建立社会。\n这些乌托邦思想中，最主要的就是社会主义，尤其是马克思主义； 直到20世纪末期，马克思主义还驾驭着政治思想领域。从这个观点而 论，哲学的伦理功能转向另外一个目标，就是从零开始重新建立一个完 全正义的社会。第一次大试验就是法国大革命，从中产生了“革命”的 现代概念。从革命家构思出他们认为完美的社会模式开始，他们就认定 自己有权力把这种模式强加在他人身上，必要的话，他们也有权力消灭 任何反抗的人。这个道理在马克思一列宁式的理论实践出来之后变得很 清楚。布尔什维克革命，以及后来毛泽东领导下的中国革命都是例子。 这些体系都有一个中心思想，就是对善的追寻，建立“新人类”。这 必须通过革命性的社会转化，通过权力的运作","chapter":"九追踪暴力的根","color":0},{"text":"某些印度教哲学曾经用你刚才提出的观点来反驳 佛教。如果一切如梦，如果你的受苦像一场梦，那从痛苦中解脱出来 有什么意义呢？干吗还要努力去达成证悟？答案是，因为众生确实经 历着痛苦的经验，所以就算是幻觉式的，要除掉这种经验也是对的。 ","chapter":"五寻找实相","color":0},{"text":"佛 法最后的立场就是“中道”：世界并不是我们心的投射，但它也不完 全独立于我们的心之外，因为要谈论一个特定的、同定的现实，独立\n于任何观念、心理过程，或者观者之外是没有意义的。这之中是一种 相互依存的关系。因为如此，佛法就免于掉入虚无主义或永恒意义。 现象通过一串相互依存的原因和状况的过程而显现，但是没有任何东 西是自己存在的。到最后，直接体验绝对真理就超越任何知识性的概 念，超越任何主客之间的二元对立。","chapter":"五寻找实相","color":0},{"text":"而“空性”事实上是“虚无”的反义词——它是一种宇宙 性的潜能，宇宙、众生、动作、意识。任何现象，如果究竟本质不是 空性的话，根本不可能显现。","chapter":"五寻找实相","color":0},{"text":"绝对真理就是空性的体 现、证悟，无二元对立，只能通过修行经验去理解，而不能通过分析 性的思考","chapter":"五寻找实相","color":0},{"text":"8世纪的佛教老师善地德瓦（Shantideva)曾说：\n世界上一切的喜悦，\n来自希望他人快乐。\n世界上一切的痛苦，\n来自希望自己享受。\n需要很繁琐的解释吗？\n幼稚的众生只管自己，\n佛则为他人福社而操劳；\n看看这两者差别有多大！","chapter":"四心的科学","color":0},{"text":"一面湖如果一直有波纹，它的水就永 远是朦胧的。但如果水波平息了，泥巴沉到底部，水的清晰度就又回 来了。同样地，当妄念平息下来，心越来越清晰，到这个时候就比较 容易发觉它真正的本性。","chapter":"四心的科学","color":0},{"text":"我认为你所叙述的事情是属于历史性的见证，而不是属于科 学证明。历史性的见证也就是“某某某说了这个或那个，我在场，我听 他这么说的。”这也是非常宝贵的证据。如果没有这样，就没有历史。 但是它永远不是最后的证明。任何一位历史学家可以否定另外一位历 史学家，说“我找到另外一些资料，可以证明这个说法是假的或是不完 整的”。于是，历史虽然算是一种科学，却并不是一门精准的科学。它 完全是根据少数个人的见证，同时所见证的经验也无法再复制。但是比 起你刚刚叙述的事情，历史还算是比较科学的，因为历史不只依靠个人 见证，同时也依赖许多不同观点的非个人文件和遗迹。一谈到超自然经 验，就只能自由心证。我不认为我们在这个主题上还能继续讲什么。我 们应该坚持的是：除非你身处某一种宗教信仰的体系中，否则要证明一 个在定义上属于形而上的观点，永远会发现少了点什么，形而上的观点 是永远无法被完整证明的。两千五百年来，我们努力建立起一套形而上 的系统，希望形上学能像数学一样严谨。但是一直没有成功，因为形上 学的本质就在逻辑推理层面之外。","chapter":"三黑盒子中的鬼魂","color":0},{"text":"这个“我”是不是在心中的某处， 在意识流之中？这个意识的河流可以被分成过去、现在和未来的念头。 因为这三者的总合无法在某一刹那中同时存在，于是“我”也不是这些 所有刹那的总和。过去的那个念头已经死了，它不存在了，“我”又如\n何存在于只是一个回忆的刹那中？未来还没有发生，“我”也不可能存 在于一个尚未存在的未来中。只剩下现在。如果它存在，被称为“我” 的这个个体必须有些确定的特质，但是它既没有颜色，也没有形体，也 没有确切的位置。你越是去找它，越是找不到。到最后你会发现“我” 似乎只是一个标签，贴在一个连贯的东西上。","chapter":"一从科学研究到心灵探索","color":0},{"text":"这些负面情绪来自对自我的概念，一种我们珍惜而愿 意不顾一切来保护的“我”。执着于自我是一个事实，可是这个我们所 执着的对象“自我”，并非真实的存在。它不存在于任何地方，也不能 以独立和永久的身份存在。它既不存在于构成个体的各种生理和心理部 位，不存在于这些之外，也不存在于以上两者的合并。也许你会抗议说 “自我”属于那些部位的交会，那也只是一种让步的说法，承认那是一 个简单的标签，是我们针对一些相互连接的元素暂时会合时所贴上的标 签。事实上，自我不存在于任何这些元素中，而当这些元素被拆开，自 我的概念也就消失。我们不揭穿自我的不存在，就是无知，暂时无法认 出事情的真实本质。其实就是这种无知才是痛苦最终究的起因。我们一 旦想办法抛弃对“自我”的错误认知，抛弃认为现象是真实而实在的错 误观念，当我们认清这个“我”并非真实存在，再也没有理由去担心欲\n望会落空，再也不会遭遇我们所不愿遭遇的。","chapter":"一从科学研究到心灵探索","color":0}],"thoughts":[],"popularHighlights":[]},"CB_25YDg0Dhp4n26aW6YE":{"rating":0,"ratingCount":0,"highlights":[{"text":"然而在诚实之后，他们没有再对真实进一步地反思，诚实就到此为止。所以对究竟什么是“真”，也就是说那些你不能直接感受但是需要去捍卫和追求的原则，什么是“实”，也就是经过认真思考检验的、讲出来自己心里有底的，搞不太清楚。就像你讲的，年轻人对前一辈的逆反、对政治正确的反感都是诚实的，但是这个诚实真的代表了我们对现在的实践的更好理解吗？表达了我们对历史的新的认识吗？不尽然。大家感觉到的民粹主义，现在真的成了一个全球现象，很大程度上就可以理解为是“诚”和“真”之间的断裂。","chapter":"温州访谈　2018.12","color":0},{"text":"“认命不认输”也是一样。我们为什么会焦虑，最直接的原因就是对今天没有清晰的认识，总觉得自己现在所处的地方不对，和自己认为的有差距。一个解决方案可能是佛学里讲的专注，对自己身边做非常细微的观察，当下的重要性也是在这里。","chapter":"温州访谈　2018.12","color":0},{"text":"我觉得差别比较大。我的理解，公共知识分子很重要的一点就是要提出一个普世性的原则，提出理论、知识、道德、行为上的典范，做一个批判者。而乡绅是很温和的，它不做这样的普世性评判或者倡导，他从小世界里看东西，没有宏大的、居高临下的说法，对体制没有道德上的优越感。","chapter":"牛津访谈　2018.8","color":0},{"text":"不是说乡绅可以取代那些社会行动者，社会行动者还是很重要，而是说乡绅没有先验的预定目标，他们不是要搞社会运动。最重要的是他代表一批人，不断把他们的情况表达出来，乡绅就是一种代表，是分析性、理解性、代表性的，是话语的提炼者、发声者，当然也是原则、规则的制定者。","chapter":"牛津访谈　2018.8","color":0},{"text":"我再重复前面说过的话：大学就是给你一个环境，让你在人生比较特殊的四五年当中去探索自己，探索这个世界，允许你犯错误，允许你做疯狂的探索，让你对事情产生理解，当然也学到了基本的知识和技术。","chapter":"牛津访谈　2018.8","color":0},{"text":"我们讲到中心和边缘，大有大的难处，而因为小，能看到的东西就多。这个话听起来很奇怪，大的东西内在不是更多吗？是，中国很复杂，但中国中心的任务往往是消解这些复杂性，把它简单化、统一化，因为它怕这个复杂。但在新加坡这样的小地方，政治上当然要统一，但文化上要生存，唯一的办法就是要强调多样性。","chapter":"牛津访谈　2018.8","color":0},{"text":"民族这条线划在哪里，是非常动态的过程，不是天然给予的范畴。现在很多民族主义的情绪是把民族这条线给绝对化了，看不到历史上民族是怎么形成的，但是又拿历史上的斗争和自己狭隘的理解套起来，所以很多年轻人也就被绕进去了。","chapter":"牛津访谈　2018.8","color":0},{"text":"首先，没有所谓真正的全人类，全人类也是某一种视角。其次，我们如果也学你看全人类，其实是对自己在世界上位置的背叛，要尊重我们被殖民、被剥削的过程，必须靠民族主义来对抗那种普适、抽象的叙述。所以我觉得民族主义在今天还是很重要，我把它看作一种斗争工具，但如果认为这是中国人对世界格局、世界关系本质化的反应，那就一点意思都没有，因为我们知道民族主义在中国是晚清才兴起的，是很多人的斗争，把它消解成那样，其实很不负责任。","chapter":"牛津访谈　2018.8","color":0},{"text":"乡绅为什么要学历史，西方的知识分子为什么要学古典学，学希腊、罗马，不是要简单地建立一个自我叙述，虽然它可以被那样利用，民族主义就是要构建出一个非常连贯的单线的历史叙述；而是可以帮助我们建立起另外一种时间感，长时间感，使你对今天的政治有一个比较好的把握，同时又有比较健康的距离感。","chapter":"牛津访谈　2018.8","color":0},{"text":"回到怎么做到“直接”的方法上来，“直接”的意思是：第一，要有内容；第二，要有碰撞，有冲击力；第三，要写得直白。首先一定要在内容上有丰富的积累，对事情有切入，不能只讲在面上的总体判断。切入是要看清楚事情是怎么由内而外地构成。我上课的时候会讲这两者的分别，explain（解释）和explain away（搪塞），explain away就是造出一个自圆其说的说法，把这个事情settled（处理掉）。","chapter":"牛津访谈　2018.8","color":0},{"text":"避开理论语言是为了更直接的表达，直接说事儿而不是通过理论来说事儿，我这么做首先是我有这种自发的对直接性的趣味，哪怕是审美上；但从另外一个角度来说，这一点都不特殊，95%的人都是希望直接的，所以问题是，为什么其他人后来变得不直接。","chapter":"牛津访谈　2018.8","color":0},{"text":"我觉得大学生在大学里的任务，不是树立norms（规范），而是树立exceptions（例外），你不是范例而是例外。我们的社会需要例外，你要代表这个社会去做例外。","chapter":"牛津访谈　2018.8","color":0},{"text":"大学就是给你这样一个安全的环境，让你怪，让你去实验。如果你是知识分子，你可以怪，也期待你怪。我不太同意知识分子要成为道德楷模、人生模范，我觉得这不是他们的任务。","chapter":"牛津访谈　2018.8","color":0},{"text":"咱们讲到北大，那么热的天，西门外面那么嘈杂，大家都要在西门外面照相。你要把动物放在北大附近，它们肯定不会去西门外面，它们会跑到未名湖边的树林里，因为那里凉快。但是人，特别是中国人，认为文明和象征联系在一起，认为那几个字很重要，一定要拍下来，要在那里站一下。这是反自然的。象征就是牢笼，奔向象征是奔向了文明，同时也奔向了牢笼。背后是一种非常野蛮的关系。你讲到领导权，包括中国在内，很多亚洲国家都有这个问题。作为召集、作为激发、作为鼓动、推着前进的领导，很快也会转化为象征，成为符号，就很容易被人所利用，符号就物化了，和金钱一样。所以一定要抵制物化，抵制符号化，要把自己的领导力作为一个过程、一种实践。","chapter":"牛津访谈　2018.8","color":0},{"text":"我们确实很多人老是在摆姿态，讲不清楚事情，就给你一个论断。","chapter":"北京访谈　2018.3","color":0},{"text":"更重要的是，你们都是普通人，跟国家权力没有什么关系，对国家政策也不熟悉，为什么要用这个角度去看世界呢？一定要有中国叙述，其实可能是对自己生活的一种不自信，需要一个很大的帽子来戴，这样才会觉得安全。","chapter":"北京访谈　2018.3","color":0},{"text":"一个印度作家写过，英国有皇族、有共和派、有种族主义，但没有民族主义，因为英国从来都是以世界看世界，当英国成为一个国家的时候，它就是一个帝国的形式。","chapter":"北京访谈　2018.3","color":0},{"text":"这个“好”是什么意思呢？根据谁的标准呢？不是东北老百姓的标准，也不是我自己作为一个温州人的标准，而是西方专业化的学术产业的标准。但那个不是我的特长，抱着那样的目的去做，就没有把自己真的引进他们的生活里，看到的东西也比较肤浅，总想得出这样那样的结论、评论，做得很规范，但没有太大意思。放弃了原来那种小乡绅的风格，想去追求认可。为什么会去追求那种认可？就是因为没有小世界。如果我有自己真实的小世界，哪怕边缘，但比较强大，可以互相讨论，不用去找这样的认可。","chapter":"北京访谈　2018.3","color":0},{"text":"我是中国人，这不是一个骄傲不骄傲的问题，我就出生在这个文化里面，就跟我是温州人一样，我出生成长在中国七八十年代一个南方中小城市，这是命，一定要百分百去拥抱它，嚼透它。在这个意义上，我的身份认同很清晰。大家现在说的身份认同有另外一层意思，好像认同了一个东西，就要捍卫一套价值，要遵循一定的行为规则，继承一定的文化气质，这个因果关系对我来说不存在。","chapter":"北京访谈　2018.3","color":0},{"text":"如果在英国讨论政治——英国也是很乱的，它跟法国不一样，它很晚才有中央集权，到现在中央集权也不是很强，到今天也没有成文的宪法，但它又曾经是一个全球性的帝国——我的观察是他们好像没有觉得必须要有一个成型的历史叙述。它没有很好的历史叙述，但这个国家在实践中积淀了很多原则，连贯性比较强。中国有一点倒过来，中国在事实上的连贯性很弱，也有很多的断裂，但每一个朝代都修前朝的历史，在历史书写上连贯性很强，所以就造成了很强的意识上的连贯性——我们是“中国人”，有“中国”这么一个单位。但在实际的生活逻辑上，其实有极大的断裂。而英国的国别认同，在精英中比较强，对中产阶级来讲则是很模糊的事，他们搞不清楚英国人是谁，也不关心这样的问题。","chapter":"北京访谈　2018.3","color":0},{"text":"真正的英雄不是改变世界，而是改变自己生活的每一天。很遗憾，在现代性之下，“边缘”和“中心”变成一组对立关系，中国人又有那么强的中心情结，觉得边缘的生活不值得过，造成极大的焦虑。权力和资源过度集中。","chapter":"北京访谈　2018.3","color":0},{"text":"我们这些年改革，在老百姓的生活里，其实是一个生命意义、生活意义转移的过程。读好书、考好学、找个好工作、家里给买房子，一直是将意义外化转移，到最后没有必要转移了，就是要回到人本身。","chapter":"北京访谈　2018.3","color":0},{"text":"这又回到原来的问题，我们读书，理解人类社会的规律，都一定要和自己这个人发生关系，否则搞艺术就是为了美，好像是一个服务工作，去取悦人。大家要倒过来看，不要想着去取悦，想着自己怎么可以fun，即使很简单的服务行业，比如在饭店，如果认真去观察，也能很fun，像个小作家一样去看各色人等，每个人经过前台时有什么不一样，怎样跟他互动……","chapter":"北京访谈　2018.3","color":0},{"text":"我的理解是这样的，费孝通提出“差序格局”其实是要回应一个当时很大的政治争论，就是政党政治对中国是否合适。费和梁漱溟一样，一直认为政党政治对中国来说不合适。他认为政党政治需要一定的文化基础，所谓的群体格局或者团体格局，就是同质性的人基于共同的政治理念走到一起，形成团体，形成意识形态，团体内部每个人的社会关系是等距的，然后通过民主选举产生政党领袖。费认为中国人不可能形成现代意义的政党，他讲“差序格局”其实是对民主体制的一种回应，如果从这个角度来看，差序格局就有很强的内在意味。这样，这个概念的实证精确性倒不太重要了。但现在大家完全不管这个，把它当成中国人社会关系的一个机械的标准来引用。","chapter":"北京访谈　2018.3","color":0},{"text":"我们传统的儒家文化所以能支持起那么大的国家体系，很重要的特色就在于它怎么处理小地方和大地方、边缘和中心的关系。它的办法是意识上的“内在化”。","chapter":"北京访谈　2018.3","color":0},{"text":"机械和精确的差别是很大的，机械就是拍照，但精确是不仅抓住现在是什么，而且抓住它将会是什么、内在的矛盾是什么。所以“图景”就有两重意思，一是现在的概括，再一个是未来可能的走向。","chapter":"北京访谈　2018.3","color":0},{"text":"“图景”这个概念很重要，“理论”在拉丁文里就是“图景”的意思，给出一个理论，就是给出一个世界的图景。我写过一篇文章叫《作为图景的理论》[6]，意思就是说理论其实不是给出判断，而是给世界一个精确的图景，同时在背后透出未来可能的图景。","chapter":"北京访谈　2018.3","color":0},{"text":"你一定要带入你个人的经验，否则其他东西都是飘着的。理解世界必须要通过自己的切身体会。","chapter":"北京访谈　2018.3","color":0},{"text":"这本书的目标之一正是把这个概念从利己主义的泥沼中解救出来，揭示出原本就附着其上的历史脉络和社会关系","chapter":"前言　自我是一种方法","color":0}],"thoughts":[{"text":"带着距离感的直接性","quote":"避开理论语言是为了更直接的表达，直接说事儿而不是通过理论来说事儿，我这么做首先是我有这种自发的对直接性的趣味，哪怕是审美上；但从另外一个角度来说，这一点都不特殊，95%的人都是希望直接的，所以问题是，为什么其他人后来变得不直接。","chapter":""},{"text":"不要将出身当成一种历史包袱","quote":"我是中国人，这不是一个骄傲不骄傲的问题，我就出生在这个文化里面，就跟我是温州人一样，我出生成长在中国七八十年代一个南方中小城市，这是命，一定要百分百去拥抱它，嚼透它。在这个意义上，我的身份认同很清晰。大家现在说的身份认同有另外一层意思，好像认同了一个东西，就要捍卫一套价值，要遵循一定的行为规则，继承一定的文化气质，这个因果关系对我来说不存在。","chapter":""},{"text":"精神上的强连贯性也与中国人的中心情结相辅相成","quote":"如果在英国讨论政治——英国也是很乱的，它跟法国不一样，它很晚才有中央集权，到现在中央集权也不是很强，到今天也没有成文的宪法，但它又曾经是一个全球性的帝国——我的观察是他们好像没有觉得必须要有一个成型的历史叙述。它没有很好的历史叙述，但这个国家在实践中积淀了很多原则，连贯性比较强。中国有一点倒过来，中国在事实上的连贯性很弱，也有很多的断裂，但每一个朝代都修前朝的历史，在历史书写上连贯性很强，所以就造成了很强的意识上的连贯性——我们是“中国人”，有“中国”这么一个单位。但在实际的生活逻辑上，其实有极大的断裂。而英国的国别认同，在精英中比较强，对中产阶级来讲则是很模糊的事，他们搞不清楚英国人是谁，也不关心这样的问题。","chapter":""},{"text":"去思考一项工作的fun其实与项飙所说的融入附近是一脉相承的。挖掘附近的fun，人才有可能投身其中。带着好奇心，少一点功利心，更多的想想来龙去脉前因后果，挖掘fun点才有可能真的融入附近，发现新的附近。","quote":"这又回到原来的问题，我们读书，理解人类社会的规律，都一定要和自己这个人发生关系，否则搞艺术就是为了美，好像是一个服务工作，去取悦人。大家要倒过来看，不要想着去取悦，想着自己怎么可以fun，即使很简单的服务行业，比如在饭店，如果认真去观察，也能很fun，像个小作家一样去看各色人等，每个人经过前台时有什么不一样，怎样跟他互动……","chapter":""}],"popularHighlights":[]},"CB_2on1gb1fJAf16b96cN":{"rating":0,"ratingCount":0,"highlights":[{"text":"一旦官府认真发起对妖术的清剿，普通人就有了很好的机会来清算宿怨或谋取私利。这是扔在大街上的上了膛的武器，每个人——无论恶棍或良善——都可以取而用之。在这个权力对普通民众来说向来稀缺的社会里，以“叫魂”罪名来恶意中伤他人成了普通人的一种突然可得的权力。对任何受到横暴的族人或贪婪的债主逼迫的人来说，这一权力为他们提供了某种解脱；对害怕受到迫害的人，它提供了一块盾牌；对想得到好处的人，它提供了奖赏；对妒嫉者，它是一种补偿；对恶棍，它是一种力量；对虐待狂，它则是一种乐趣。","chapter":"普通民众：权力的幻觉","color":0},{"text":"卡尔·曼海姆曾指出：“官僚思维的基本倾向是把所有的政治问题化约为行政问题。”￼他的意思是说，官僚没有能力超越他们“有限的社会眼界”和理性化的工作范围，去认识发生在更大的政治世界中的非理性的利益冲突。","chapter":"官僚的抵制","color":0},{"text":"在今人看来，谢恩表似乎是一种极为卑屈的文字，表达了一种极端的个人依附。应该成为士大夫性格表征的“高贵气节”在这里已是荡然无存。如果还看得到个人“才具”的话，也只是蛛丝马迹而已。这是一种体现“东方专制”的文字，是一种文字形式的叩头长跪。","chapter":"特殊的考评制度","color":0},{"text":"在一个受规则束缚的环境里，最好的官员就是最少惹事的官员——也就是那些能规避麻烦，将消极应付视为美德的人。在任何一个官僚体制中，表现卓异都是有风险的。同样，告密者和惹麻烦的人也不为人欣赏。过分热情的官员比规行矩步者更容易犯规。因此，在日常考评中，谨慎、小心和勤勉成为最突出的品德。","chapter":"君主对官僚的控制","color":0},{"text":"就其是君主制而言，它又如何才能使个人的专制权力与普遍规则的体系共存？在这里，君主和官僚都陷入了一种两难境地，并都对已经形式化的行政程序抱一种模棱两可的态度。君主不得不用成文法规来约束成千上万为他服务的官僚，以确保他们每个人都按照体现他的利益与安全的行政程序行事。与此同时，他对于如何保持自己的特殊地位、超官僚权力和自主性，也会理所当然地感到关切。结果，他不得不持续斗争挣扎，以避免自身的官僚化。清代君主的大多数日常行政事务，涉及到的是认可军机处为他所草拟的谕旨，或批准吏部所拟定的官员任命。面对他的文件起草人所提供的有限选择，繁忙的君主会发现自己的“作用”只不过是文件处理机中的一个齿轮（尽管是一个镶钻的齿轮）。","chapter":"官僚君主制中的常规权力和专制权力","color":0},{"text":"但慈相寺事件证实了他们的一种怀疑：所谓的“叫魂”妖术只是产生于无知又滋长于忌恨的一个幽灵。这不过是奸刁之徒利用民间恐惧逞其私欲的又一个例子。","chapter":"终结","color":0},{"text":"这种经由机要渠道进行的交流是一种互惠：奏告人通过向主人递进机要情报来表达其忠诚和感恩；而皇帝则应之以父执般的严厉（偶尔也有温暖）。常规奏折体现了官僚制的形式，而朱批奏折则反映了个人间的礼数。常规奏折是官与官之间的对话，而朱批奏折则是人与人之间的交流。","chapter":"弘历的行省官僚","color":0},{"text":"如果有什么人能让一个满族人感到自己像粗鲁的外乡人，那就是江南文人。","chapter":"由汉化带来的腐化","color":0},{"text":"自十三世纪以后，中国所有的王朝都是在征服的基础上建立起来的：既没有宫廷政变，也没有禁军的反戈，有的是大规模的征战。所有这些用征服方式建立起来的政权，就其本质而言，都是通过军事手段而强加到全国老百姓头上的。","chapter":"关于谋反罪的看法","color":0},{"text":"在种种为乞丐特有并通常扮演的角色中，和尚也许是最能为人所接受的一种。我们或许可以将这些角色看作是在十八世纪已经很好地建立起来的某种社会模板，每当时势变得艰难的时候，越来越多的人便能够将自己依附上去。这种模板仍然保有塑造改变人们行为的力量，这也许正反映了十八世纪状况的实质：那些被清代社会的经济压力挤压出来的人们，在社会符号的领域里，仍然能够找到可为人接受的通向生存之路。在后来的那个社会走向崩溃的时代，人们将会发现，在大众一贫如洗所产生的压力之下，这种模板也开始破裂了。","chapter":"民众意识中的盛世","color":0},{"text":"一位十八世纪的观察者指出，那些鄙视一般乞丐，连一个铜板都不会给他们的富人，却会把自己兜里的每个铜板都扔进乞僧的碗中，以便为来世积德。","chapter":"民众意识中的盛世","color":0},{"text":"弘历从来就对佛教僧人有着根深蒂固的怀疑（这同他对于佛教大事声张的赞助是很不一致的）。这并不仅仅是因为和尚及他们的行动使得当局难以对之加以管束。正如弘历本人在另一场合所表露的那样，他的这种态度还反映了儒教对于那些“甘心剃发为僧，并不顾父母妻子，则行踪可疑”的人们所持有的更一般性的鄙视。￼在这方面，僧人的情况与受人歧视的太监相似——太监为了饭碗的缘故，而摒弃了生养后代这一最重要的尽孝的义务。","chapter":"民众意识中的盛世","color":0},{"text":"经济地图上这一倾斜趋势同时而来的则是人口的持续流动：移民与过客，商人与江湖骗子，僧人与进香者，扒手与乞丐，拥塞在十八世纪的道路上。人们外出旅行，有的是为了雄心勃勃的事业，有的是基于献身精神，有的则是出于绝望与无奈。由旅行者汇集而成的人流，不能不对人们的意识发生影响。","chapter":"民众意识中的盛世","color":0},{"text":"1768 年蔓延于中国东部与中部的大恐慌是以各地有关妖术的种种信念为丰富的养料滋生而成的。从细微末节来看，地区间的情况并不相同，但各地的信念中都包含有以下一些要素：在某种条件下，人的魂能够同拥有魂的躯体相分离；一个人若掌握了另一个人的魂，便可以利用它的力量来为自己谋利；若要偷取别人的魂（亦即“叫魂”），可以通过施展妖术来实现，或者可以对着已从受害者身上分离出来的某种实物（例如男人的辫梢或女人的衣襟）念咒，或者可以把受害者的名字放在一根将要打入地下的桩子的上面或底下，并在打桩时念诵受害者的名字；通过向受害者撒出粉状的迷药，可以使他在被剪去发辫时无法抵抗；受害者极可能是男性孩童；受害者会得病或死去。","chapter":"官僚机制对妖术的处理","color":0},{"text":"我们说，我们不能预见未来。然而，构成未来的种种条件就存在于我们周围。只是它们似乎都被加上了密码，使我们在没有密码本的情况下难以解读（当这本子终于到了我们手中时，却又已经太迟了）可是，我们确实可以看到难以为我们解读的种种支离片断，并必须赋予它们某种意义。我们自己当代文化的许多方面，大概也可以被称之为预示性的惊颤，正战战兢兢地为我们所要创造的那个社会提供目前还难以解读的信息。","chapter":"第一章 中国窃贼传奇","color":0}],"thoughts":[{"text":"可不就是前文中他自己所说的治其标而未澄其源","quote":"他却完全没有提及广德经济上的问题。","chapter":""}],"popularHighlights":[]},"CB_1kz8U18TzBKP6bF6cN":{"rating":0,"ratingCount":0,"highlights":[{"text":"像初学者一样，剑道大师是无所畏惧的，但是，不像初学者，他一天比一天更远离恐惧。多年不断地静心沉思使他知道，生与死在基本上是一样的，是一体的两面。他不再畏生惧死。他在世上快乐地活著，这完全是禅的特色，但是他随时准备离开世间，丝毫不为死亡的念头所困扰。武士选择脆弱的樱花做为他们的象徵不是没有原因的。就像一片花瓣在朝阳中宁静飘落地面，那无畏者也如此超然于生命之外，寂静无声而内心不动。","chapter":"8 从箭术到剑道","color":0},{"text":"根据泽庵，要达到剑道艺术的完美境界，必须心中没有你我之分，没有对手与他的剑，也没有自己的剑与如何挥舞的念头─甚至没有想到生与死。「一切皆空无：你自己，那闪烁的剑，那挥舞的手臂。甚至连空无的念头也不复存在。」从这绝对的虚空中，泽庵说，「展现了最奇妙的作为。」","chapter":"8 从箭术到剑道","color":0},{"text":"学生必须发展出一种新的感官，或更正确地说，使他的感官产生新的警觉，这样他才能避开危险的攻击，彷佛他能感觉到它的来临。一旦他熟悉了这种闪躲的艺术，他便不需要专注于对手的动作，甚至好几个对手也无妨。他可以看到，感觉到将要发生的事，同时他已经避开了，在察觉与闪躲之间是没有「毫发之差」的。这才是重要的：不需知觉注意，迅如闪电的反应。这样一来，学生终于使自己超越一切意识性的目标。这是个伟大的收获。","chapter":"8 从箭术到剑道","color":0},{"text":"日本学生都具有三项特质：良好的教育，对所选艺术的热爱，及对老师的敬爱。自古以来，师生关系就是一种基本的生命义务，在老师身上，必须具有一种远超过职业要求的高度责任感。","chapter":"5 以心传心","color":0},{"text":"事实上它充满了心灵的觉察，所以又被称为「当下的真心」。意味著心灵与精神存在于一切，因为它不会执著于任何固定地点。它可以保持当下的存在，因为当它与不同事物有关联时，也不会依附于反映上，因而失去其原本的灵敏。像池塘里满盈的水，随时准备漫溢出来，有无穷的力量，因为它是自由的；它对一切事物都开放，因为它是空无的。这种境界是一种原始的境界，它的象徵是一个虚空的圆圈，但是对于站在里面的人而言，并不是毫无意义的。","chapter":"5 以心传心","color":0},{"text":"我们已经踏出了这条途径上的第一步。那就是身体的松弛，如果没有身体的松弛，弓弦就无法正确地拉开。如果要正确地放箭，身体的松弛必须要继续成为心理与精神上的松弛，使心灵不但敏捷，而且自由；因为自由所以才敏捷；因为原本敏捷，所以才自由；这种原本的敏捷与一般所谓的心思灵敏有根本的不同。因此，在这两种状态─身体的松弛与心灵的自由之间，有一种差别是无法单独以呼吸练习来克服的，而是必须从放弃一切执著开始，成为完全的无我；于是心灵会回返内在，进入那无名无状，无穷无尽的原本之中。","chapter":"5 以心传心","color":0},{"text":"「所以我必须刻意地，去成为不刻意的？」我听见自己这么问。\n「没有一个学生这样问过我，所以我不知道怎么回答。」","chapter":"4 不放箭的放箭","color":0},{"text":"「放开你自己，把你自己和你的一切都断然地抛弃，直到一无所有，只剩下一种不刻意的张力。」","chapter":"4 不放箭的放箭","color":0},{"text":"「真正的艺术，」师父叫道，「是无所求的，没有箭靶！你越是顽固地要学会射箭击中目标，你就越无法成功，目标也离你越来越远。阻碍了你的，是你用心太切。你认为如果你不自己去做，事情就不会发生。」","chapter":"4 不放箭的放箭","color":0},{"text":"「你做不到，」师父解释说，「是因为你的呼吸不正确。吸气之后要轻轻地把气向下压，让腹肌紧绷，忍住气一会儿，然后再尽量缓慢平均地吐气，停顿一会儿，再快吸一口气─就这样不停地吸进呼出，自然形成一种韵律。如果能正确做到，你会觉得射箭一天比一天容易。因为从这种呼吸中，你不但能发现一切精神力量的泉源，也会使这泉源更为丰盛流畅地注入你的四肢，使你更轻松。」","chapter":"3 心灵拉弓","color":0}],"thoughts":[{"text":"一日为师终身为父，这也是我们民族曾经的传统","quote":"日本学生都具有三项特质：良好的教育，对所选艺术的热爱，及对老师的敬爱。自古以来，师生关系就是一种基本的生命义务，在老师身上，必须具有一种远超过职业要求的高度责任感。","chapter":""}],"popularHighlights":[]},"CB_FYU46I44PGKg6bq6cN":{"rating":0,"ratingCount":0,"highlights":[{"text":"维特根斯坦认为，哲学恰是既没有问题，也没有解决办法。哲学有语言，同时也有着语言的混乱。哲学还总有着这样的可能性：在语言中并通过语言，以回忆的方式从语言中解放出来、恢复自由。这就是所有。","chapter":"VIII 时间 1929","color":0},{"text":"在1945年写成了他的《哲学研究》。如他自己在前言部分说到的，这是一部论述的合集，“就像是在这些漫长而错综的旅行途中所做的一系列风景速写”。旅途图像和思维图像，这些图像产生于穿过人类语言多样性的探索之路上：“同样的要点，或几乎同样的要点，”维特根斯坦就像本着本雅明闲逛的精神继续阐述道，“我当时一次次从不同的方向重新论及，画出新的图画……以使它们能够为观察者提供一幅风景画。——所以这本书其实只是本画集。”","chapter":"VIII 时间 1929","color":0},{"text":"根据上述视角，存在像真正的哲学难题那样的东西，这样的观点无非是一种混乱的结果。如维特根斯坦也会说：“通过语言来蛊惑我们的理智。”[309]因此，澄清或者治疗的哲学过程必须接受的形式是：持续耐心地整理、阐明和判断出现的混乱。这种哲学过程的主要方法在于，在回忆中唤醒自己，想想人们是在哪些上下文中真正有意义地使用了哪些语词。哲学思考是[310]在我们生活中扮演的真正角色和拥有的意义，而这种清楚的了解可以使人们获得自由。这些语词的真实含义只能被发现于或者自己显现于具体的应用中，也就是能够确保意义表达的应用中：“一个词的含义是它在语言中的用法。”","chapter":"VIII 时间 1929","color":0},{"text":"对于人类来说只存在一种真正的第一符号系统，也就是日常的自然语言。从这个认识出发，《哲学研究》的突破点在于进行澄清调查的意志：澄
