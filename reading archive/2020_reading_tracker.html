xt":"意义和本质绝非隐藏在事物背后，它们就在事物当中，在一切事物当中。","chapter":"觉醒","color":0}],"thoughts":[],"popularHighlights":[{"text":"一切都是欺骗，都散发着恶臭，谎言的恶臭。一切欲望、幸福和优美皆为虚幻。一切都在腐朽。世界是苦涩的。生活即是折磨。","count":67168,"chapter":"沙门"},{"text":"悉达多的微笑让他忆起一生中爱过的一切，忆起一生中宝贵和神圣的一切。","count":44838,"chapter":"乔文达"},{"text":"意义和本质绝非隐藏在事物背后，它们就在事物当中，在一切事物当中。","count":44184,"chapter":"觉醒"},{"text":"所有这自古有之的一切，悉达多一直熟视无睹。他从不在场。而现在，他归属其中。流光魅影在他眼中闪耀，星辰月亮在他心中运行。","count":37324,"chapter":"迦摩罗"},{"text":"如果在林中，你寻得至高无上的幸福，就回来教我修习。如果你只收获幻灭，那也回来，我们再一道祭奉诸神。","count":35046,"chapter":"婆罗门之子"},{"text":"“或许是。”悉达多疲惫地说，“我就像你。你也谁都不爱——否则你怎会将爱当作艺术经营？像你我这类人大概都不会爱。如孩童般的世人才会爱。这是他们的秘密。”","count":31892,"chapter":"尘世间"},{"text":"“佛陀劫掠了我。”悉达多想，“他劫掠了我，但他馈赠得更多。他夺走了我的朋友，那曾经信奉我，如今信奉他的朋友；那曾经是我的影子，如今是乔达摩的影子的朋友。而他所馈赠的，则是悉达多，是我的自我。”","count":30204,"chapter":"乔达摩"},{"text":"我的生活也是一条河。这条河用幻象，而非现实，隔开少年悉达多、成年悉达多和老年悉达多。悉达多的前世并非过去，死亡和重归梵天亦并非未来。没有过去，没有未来。一切都是本质和当下。”","count":30000,"chapter":"船夫"},{"text":"“你来了。”悉达多含笑道。 “我来了。”乔文达道。","count":29430,"chapter":"婆罗门之子"},{"text":"内在“我”之源泉，必须拥有自己的阿特曼！其他一切都只是寻觅、走弯路和误入歧途。","count":27330,"chapter":"婆罗门之子"},{"text":"他理解他们。理解并同情他们不是由思想和理智，而是由冲动和欲望掌管的生活。他感同身受。尽管他已近乎完人，只承受着最后的伤痛，却视世人如兄弟。他不再嘲笑他们的虚荣、欲望和荒谬，反而通晓他们，爱戴敬重他们。","count":26880,"chapter":"唵"},{"text":"当“我”被彻底征服，当“我”消亡，当渴求和欲望在心中寂灭，那最终的、最深的非“我”存在，那个大秘密，必定觉醒。","count":25488,"chapter":"沙门"},{"text":"他看见河水不懈奔流，却总在此处。永远是这条河，却时刻更新！","count":24766,"chapter":"船夫"},{"text":"大多数人，迦摩罗，仿佛一片落叶，在空中翻滚、飘摇，最后踉跄着归于尘土。有的人，极少数，如同天际之星，沿着固定的轨迹运行。没有风能动摇他，他内心自有律法和轨道。","count":23888,"chapter":"尘世间"},{"text":"一切未受尽的苦，未获得的救赎都会重来。苦难从未改变。","count":23742,"chapter":"唵"},{"text":"如果一个人扼杀了感官意义上的偶然之我，却喂养思想意义上博学多能的偶然之我，他是不会寻得自我的。","count":23464,"chapter":"迦摩罗"},{"text":"所有人都热爱悉达多。悉达多令所有人喜悦。所有人都对他兴致勃勃。 可是他，悉达多，却无法让自己喜悦，无法让自己略有兴致。","count":22605,"chapter":"婆罗门之子"},{"text":"真的反面同样真实！也就是说，只有片面的真才得以以言辞彰显。可以思想和言说的一切都是片面的，是局部，都缺乏整体、完满、统一。","count":22374,"chapter":"乔文达"},{"text":"如若人能毫无希求，质朴而天真无邪地看待世界，世界何其隽美！","count":22176,"chapter":"迦摩罗"},{"text":"我不再将这个世界与我所期待的，塑造的圆满世界比照，而是接受这个世界，爱它，属于它。","count":21456,"chapter":"乔文达"}]},"857797":{"rating":817,"ratingCount":1175,"highlights":[{"text":"我相信，一项安全可靠的实践准则，一个值得瞩望的理想，一个可以用来检验旨在克服这一困难而行的种种安排的标准，可以表述为下面两句话：在不违效率的前提下，尽最大限度地让权力分散；同时由一个集散中枢尽最大可能地让信息得到收集和传播。","chapter":"论自由原则的应用","color":0},{"text":"然而，在各种事务都要由官府包揽的地方，任何为官府所决意反对的事情都根本不可能做成。此类国家的体制，不过就是将通国的能人才士，都组织进一个纪律森严的团体，以此来统御其余人众；其组织本身愈是完善，其从社会各界吸纳和规训最优秀人才的做法愈是成功，其对包括官府成员在内的所有人众的束缚就愈是彻底。因为统治者自己也成为其自身组织和纪律的奴隶，就像被统治者是统治者的奴隶一样。","chapter":"论自由原则的应用","color":0},{"text":"此段乃西国所以持保盛强之秘，慎勿忽之。","chapter":"论自由原则的应用","color":0},{"text":"并且行政机器的构建越是科学有效，即其网罗最优秀人才来操纵这架机器的办法越是巧妙娴熟，其为患也就越大。","chapter":"论自由原则的应用","color":0},{"text":"大陆许多国家的法律规定，除非男女双方能表明他们有足够支撑家庭生计的财产，否则不准许结婚，这并没有超出国家的合法权限：这种法律无论是否便利可行（这主要取决于当地的境况和民情），都不能以它侵犯自由为理由加以反对。","chapter":"论自由原则的应用","color":0},{"text":"有关宗教、政治或其他有争议科目的考试，不可测试意见的是与非，而只可测试事实问题，如某某作家、学派或教派根据某某理由主张某某意见等等。","chapter":"论自由原则的应用","color":0},{"text":"全面的国家教育，不过就是一种为了将人们塑造得彼此一模一样而特制的模具；而且这一用以陶铸人民的模具，必是那些或君主、或教父、或贵族、或当今时代的所谓多数等政府中的当权者所喜欢的那种，随着它见诸成效以至如愿以偿，它便建立起了一种控制人心的专制，并最终顺着其自然趋势导向那种控制人身的专制。","chapter":"论自由原则的应用","color":0},{"text":"可是在子女问题上，对自由理念的误用，却实实在在成了国家履行自身义务的障碍。人们几乎普遍认为，其所生子女应被认定隶属于他自己，并且是真正而非借喻意义上的隶属，其对子女享有绝对且排他的控制权，法律对此哪怕稍有干涉，都会招致他的嫉视，甚至比他自己行动自由受到任何干涉时还要强烈：人类之重视权力，概远远过于珍爱自由！","chapter":"论自由原则的应用","color":0},{"text":"这两条准则就是：第一，只要个人行为仅关一己利害而与他人无干，个人就无需对社会负责。如果有人觉得有必要维护自身利益，不妨对其进行忠告、规诫、劝导乃至回避，社会能够正当地对其行为表达厌恶与责难的措施，仅此而已。第二，对于其任何有损他人利益的行为，个人都应对社会负责，并且如果社会觉得为了自身安全必须施予某种惩处，则行事者还应受到社会舆论或法律的惩罚。","chapter":"论自由原则的应用","color":0},{"text":"人们总是希望扩大所谓道德监督的界限，直至它侵犯到最无疑义的个人合法自由为止，乃是根源于人类一种最普遍的道德倾向。","chapter":"论社会权力之于个人的限度","color":0},{"text":"只要某人的所作所为对个人或公众造成了确定的伤害，或有伤害的确定危险，事情便超出了自由的范围，而宜为道德或法律所过问。","chapter":"论社会权力之于个人的限度","color":0},{"text":"但是谴责的理由在于结果而不在于原因","chapter":"论社会权力之于个人的限度","color":0},{"text":"我们要以中国为前车之鉴。那是一个人才兴盛并且在某些方面极富聪明智慧的民族，以其难得的幸运，这个民族在草昧时代就有了一套特别优良的风俗制度，这几乎是一项即便最文明的欧洲人在一定限制之下也必须承认的圣哲之士开创垂范的功业。同样令人称奇的是，他们运用杰出的手段，竭尽可能地将他们所拥有的聪明睿智深印在社会的每一个人心中，并且确保最富智慧的人占据尊贵显要的高位。想必能有如此成就的民族已经发现了人类进步的秘密，必能使自己的行动稳居世界先列。然而恰恰相反，他们却从此变得静止不前，而且一停就是几千年；欲使其再有更进一步的改善，必得有赖于外人。使人民彼此完全一样，用同样的训诫与规则支配全体人民的思想和行动，正是英国的仁爱之士所勤求致力于之的希望，中国人在这方面取得的成功已然超乎于此，然而他们的结果却是如此糟糕。现代公共舆论一统天下的体制，正是中国教育和政治体系的翻版，只不过在形式上后者是有组织的，而前者是无组织的；除非个性总是能够成功地挣脱束缚而伸张自己，不然欧洲虽有恢宏的祖业和基督教的信仰，终将变成另外一个中国。","chapter":"论作为幸福因素之一的个性自由","color":0},{"text":"看来，一个民族可能会在一个相当时期的进步之后，陷入停滞：然则停滞始于何时？必是在其不再拥有独立之个性的时候。","chapter":"论作为幸福因素之一的个性自由","color":0},{"text":"自严肃的事实而言，不管人们对真正的还是他们认定的智力超群者表达乃至给予了怎样的尊敬，遍及世界的普遍趋势仍然是使庸众成为人世间的支配力量。在上古、中古乃至从封建时代向目前时代其程度渐趋减弱的漫长过渡时期，个人自身都还能作为一种力量存在；如果他拥有卓越的天才或崇高的社会地位，他就会具备相当大的势力。而如今个人却消失在人群之中了。拿政治来说，毋庸赘言，世界现在是由公众舆论来统治的。唯一名副其实的力量乃是群众的力量，以及作为群众倾向和本能之代理机构的政府的力量。不独公共事务为然，即便在事关私人生活的道德和社会关系上，也莫不如此。那些其意见假公共意见以行的群众，并不总是名副其实的公众","chapter":"论作为幸福因素之一的个性自由","color":0},{"text":"天才之士乃是且恐怕永远都是很小的少数；然则为了拥有天才，就必须维护他们得以生长的土壤。天才只能在自由的空气里自在地呼吸。既云天才，顾名思义，定然会比一般人更具个性，惟其如此，也比一般人更没能力适应社会既定的有限模式而不受到禁锢的伤害，这些模式本是社会为避免其成员各自形成性格而招致麻烦才规定的。假如他们因怯懦而被迫同意将自己纳入那少数模型之一，而令自己所有还未能展开的天赋在压力下继续保持淹没不显，则对社会而言，虽有天才却实未受其益。假如他们性格刚烈，则必会挣脱枷锁，致令社会因未能成功磨掉其棱角以使之平凡而蒙羞，因此就会为其加诸“野人”、“怪物”等等带有严重警告意味的称号","chapter":"论作为幸福因素之一的个性自由","color":0},{"text":"要使每个人的天性都得到公平发展，最关键的就是要容许不同的人去过不同的生活。无论哪个时代，个性自由得以发挥的程度是否宽广，都是后世对其艳羡或鄙弃的标准。只要个性在其之下还能得以存在，即便是专制也还没有产生它最坏的恶果；而凡是摧毁人之个性的，却都可以称之为暴政，无论它以什么名目出现，也无论它宣称执行的是上帝的意志还是人民的命令。","chapter":"论作为幸福因素之一的个性自由","color":0},{"text":"在我们的时代，从社会的最高级到最低级，每个人都生活在怀有敌意的目光与令人恐惧的审查之下。不光在关涉他人之事上，而且在仅仅关涉自身之事上，个人或家庭也不敢依照自己的意见问一问什么才是我想要的？什么才适合我自身的性格和气质？什么才能让我身上最优秀与最高尚的东西得到公平发挥，使之得以茁壮成长？他们问自己的反倒是，与我的身份相符合的是什么？与我地位与财力相仿者通常都做些什么？更糟糕者，要问比我地位与财力更高者通常会做些什么？我并不是说，他们本有自己的好恶，只是在做选择时屈从于习俗。其实他们除了从俗之外，根本就谈不上有什么嗜好。于是，心灵本身也向束缚低头：乃至寻乐自娱，首先想到的也是要从俗合流；他们乐于混迹于人群之中；即便有所选择，也是在诸多众人惯行之事之间选择而已；独特的品味，反常的行为，在他们恰如犯罪一样避之唯恐不及。开始只是搁置自己的本性而不用，最终至于根本没有了可以遵循的本性，因为他们身上为人类所独具的性能已经枯萎乃至衰竭了：他们已无能力再生出强烈的愿望与固有的快乐，而且一般也丧失了根于自身或可以归之于他们自身的意见与情感。然而，这是不是人性应有的状态呢？","chapter":"论作为幸福因素之一的个性自由","color":0},{"text":"人之为恶，并非激情如火之故，而是因为良心孱弱。而且，并非只要感情强烈，良心必定孱弱；相反，缺乏血性与良心孱弱倒是一对天然的孪生子。","chapter":"论作为幸福因素之一的个性自由","color":0},{"text":"。人性并不是一部按照一种模型组建起来，并被设定去精确执行已规定好的工作的机器，人性毋宁像是一棵树，需要朝各个方面去成长与发展，并且是根据使它成为一个活体生命的内在力量的倾向去成长与发展。","chapter":"论作为幸福因素之一的个性自由","color":0},{"text":"假如人们认识到，个性的自由发展是幸福首要而必不可少的因素之一，认识到它不只是与文明、教导、教育、文化那些名词所指内容相配合的因素，而它本身就是这些事物的必要组成部分和存在条件，那就不会有低估自由的危险，在个人自由与社会控制之间作出调整，也就不会有特别的困难。","chapter":"论作为幸福因素之一的个性自由","color":0},{"text":"在并非首先关及他人的事情上，个性就应该得到伸张。如果行为法则不是出于个人的性格，而是出于他人的传统或习俗，人类幸福就缺少了其首要因素之一种，而这项因素恰恰对个人和社会的进步十分重要。 ","chapter":"论作为幸福因素之一的个性自由","color":0},{"text":"我认为，只有在特定情况下，煽动教唆这一做法可被适当地施以惩罚，即当煽动之后紧跟的是公然的行动，并且至少在行动和煽惑之间可以建立起可能的关联的情况下。尽管如此，只有受到攻击的政府自身，出于自卫，才能合法地惩罚那些直接颠覆其存在的攻击行为，而不能由外国政府代劳。","chapter":"论思想言论自由","color":0},{"text":"然而不论如何，当将其用于反对相对无力自卫的那一方意见时，它所导致的损害都是最严重的；而且无论任何意见能够从这种回护模式中收到多少有违公平之利，得利者都几乎无一例外地是公认的主流意见。","chapter":"论思想言论自由","color":0},{"text":"一、即便某一意见被压制而至于沉默，但其实我们未必真的不知道，那个意见有可能是正确的。拒绝承认此点就是认定我们自己一贯无错。 \n    二、即使被压制的意见是错误的，它也可能包含并且通常确实包含部分真理；而由于在任何主题上，普遍或通行的意见难得是或从来不曾是全部真理，只有通过与反面意见的碰撞，余下的部分真理才有机会得以补足。 \n    三、纵然公认意见不仅正确而且是全部真理，除非它允许并确实经受了极其有力而又最为认真的挑战，否则大多数接受它的人抱持的仅仅是一项成见，对其所以然的理性根据毫无理解或体认。不宁唯是，四、信条本身的意义也将变得岌岌可危，其可能由隐晦而至于消失，对人的身心言行将不复有积极影响的能力：最终，由于信仰仅仅剩下形式，非但无益于为人增福，而且还因破坏了根基，从而妨碍了任何真实而又诚挚的信念自人类理性或个人体验中生长出来。","chapter":"论思想言论自由","color":0},{"text":"在以上所列举的任何一个重大而又具有开放性的问题上，如果两种意见中有一个比另一个更具优势，那么不仅要得到容忍，还应该去鼓励和支持的，恰恰该是在特定时间和特定地点为少数人所持有的那个意见。当其时，那一意见一定代表着被忽视的利益，代表着有丧失公平对待之危险的某一方面人类福祉。","chapter":"论思想言论自由","color":0},{"text":"目前为止，我们只考虑了两种可能性：一是公认意见有可能是错误的，因而某些不同意见倒是正确的；二是即便公认意见正确，而与相反的错误意见的较量，对真理能够得到清晰理解与深刻体认也是必要的。但是还有一种比这两者都更为常见的情形：一组相互冲突的信条，并非一者全对另一者全错，而是真理共存于二者之��；公认的信条只包含真理的一部分，必须要由不合主流的意见来补充真理的剩余部分。","chapter":"论思想言论自由","color":0},{"text":"一旦信仰已变成一个仅靠传承的教条，而且并非主动而是被动领受，也就是当心灵再也不像当初那样被迫以其全部力量来应对因信仰而来的各种问题时，就会出现一种愈演愈烈的趋势，使人除形式以外忘掉所信的一切，或只给予其漫不经心的赞同，仿佛既经信任而接受了它，就无须再从意识上去领悟或通过亲身体验去检验一番；直到它变得与人类的内心生活几乎完全没有联系为止。于是，就出现了当今世界经常可以看到乃至形成多数的一种情形：信仰仿佛总是在心灵之外，结成硬壳并使心灵僵化，以抵挡一切诉诸人性中更高尚部分的其他影响；它不能容忍任何新鲜而生动的信念进入，以此来展现它的力量，但它自身除把门放哨致令心灵空虚之外，对人的意识或心灵可说是毫无用处。 ","chapter":"论思想言论自由","color":0},{"text":"自由讨论的缺失，不仅使意见的依据被人遗忘，就连意见本身的意思也常常被人抛诸脑后了。表达意见的词句，已不再能够让人想起它的意思，或者仅能提示其原本用来传达的意思的一小部分。清晰的概念和鲜活的信仰不见了，剩下的仅仅是几句死记硬背下来的陈言腐语；或者其意幸而有所保存，也仅剩皮毛而已，其精华则早已亡失尽去。","chapter":"论思想言论自由","color":0},{"text":"除非它得到说明，而我们也知道它是如何被说明的，我们才算是真正理解了自己意见的根据。","chapter":"论思想言论自由","color":0},{"text":"假设真理能常驻心中而不倒，但却是以一项成见、一项不靠论证且不准论证的信念而深踞其间的，这也不应该是具有理性的人类持守真理的方式。这算不上是懂得真理。如此被持守的真理，毋宁说只是一个迷信，只不过碰巧撞上了能宣示真理的字句而已。 ","chapter":"论思想言论自由","color":0},{"text":"无论多么正确的意见，如果不能时常经受充分且无所畏惧地讨论，它都只能作为僵死的教条而不是鲜活的真理而被持有","chapter":"论思想言论自由","color":0},{"text":"一个敢于自己思考的人，经过应有的研究和准备，虽所得的结果为错，对比那些不敢自己思考的人只知持守的正确意见，其对于增进真理的贡献还要更多些。并非仅仅为了或主要为了养成伟大的思想家，才需要思想自由。相反，为了让普通人能够获致他们所能达到的精神高度，思想自由同样甚至更为必不可少。在普遍的精神奴役氛围中，已经出现过甚或还会再出现个别伟大的思想家。但是，那种氛围从未也绝不会产生出智力活跃的民族。若某一民族一时接近此种特征，必是因对异端思想的恐惧得以暂时收束。只要哪里还存在原则问题不容争辩的默契，只要哪里事关人生最切要问题的讨论被认为已经结束，我们就肯定不能指望在那里发现普遍而高度的精神活跃，像如此令人神往的某些历史时期曾达到的那样。","chapter":"论思想言论自由","color":0},{"text":"但是，确切地说，真理总是能战胜迫害的说法，只是一种美丽的谎言，人们彼此津津乐道，直至最终成为陈腔滥调Z，但一切经验都与之恰好相反。真理被迫害扑灭的例子史不绝书。","chapter":"论思想言论自由","color":0},{"text":"从其所有的表现来看，那些人并非坏人，他们非但不比一般人更坏，毋宁说是更好；他们拥有那个时代和人民所具有的全部宗教的、道德的与爱国的情感，甚至比那还要多，他们正是这样一种人，在包括我们自己时代在内的所有时代中，都有可能无可指摘与受人钦敬地度过其一生。","chapter":"论思想言论自由","color":0},{"text":"即使能确定任何人都可被说服，某一意见不光虚假而且有害，甚至不光有害而且是不道德和不敬神的（这正是我所极力谴责的用词），就在推行这一个人判断时，阻止人们听到对那个意见的辩护，那么即便他的这一做法得到了他所在国家和所处时代的公众意见的支持，他仍然是妄自认定绝对不错。这种臆断非但不会因将被拒之意见目为悖德渎神就不值得反驳或更少危险，而恰恰是所有情形中危害最大的。正是在这些场合，一代人所犯下的那些可怕错误，让后代人深为惊惧骇怖。我们可以发现历史上有很多这类令人难忘的事情，当其时，法律的威力竟被用来铲除最贤哲的好人和最高尚的学说；但对人们来说更为可悲的是，虽然有些学说成功地幸存下来，但却（好像反讽似的）被用来为同样的行为辩护，据以铲除那些对它们或它们的公认解释持不同看法的异见者。 ","chapter":"论思想言论自由","color":0},{"text":"一个意见的正确性就是其有用性的一部分。","chapter":"论思想言论自由","color":0},{"text":"但是这些自鸣得意的人没有意识到，他们只不过是将确定无误的假定从一个点转移到了另一个点而已。一项意见的有用性本身就是一个成问题的意见：其有用性之真假、可开放讨论并需要讨论的地方，跟这一意见自身几乎同样多。除非被非难的意见已有充分的机会为自己辩护，否则确定一个意见有害，正如确定它是错误的一样，同样是对绝对无误的假定。","chapter":"论思想言论自由","color":0},{"text":"这种思维方式，将限制言论的正当理由放在了所要讨论的信条是否有用上，而它是否正确则不成其为问题了；并且因其不用再声称自己所持意见是某种确定无误的判断而窃窃私喜。","chapter":"论思想言论自由","color":0},{"text":"人们确信某一意见，与其说是根据这一意见本身的正确性，不如说是因为没有它他们就会无所适从；断言某一意见不应受到公众的攻击，不是基于其正确性，而是基于它对社会的重要性。","chapter":"论思想言论自由","color":0},{"text":"奇怪的是，人们可以承认关于言论自由论证的正确性，但却反对将其“推向极端”；他们不明白，如不能确定这一推理在极端情况下仍然有效，就不能确定它在任何情况下都为有效。他们虽愿意承认有必要在所有那些可能存在疑问的题目上开放言论自由，却认为某些特定原则或信条，因其如此确定，或更确切地说，因他们确信它如此确定，必须禁止质疑，当此之时，他们居然还在想象自己并没有妄自认定绝对不错。对于任何命题，如果禁止了本来应该允许的对其确定性的反驳，还敢称其为确定不移，那就是认定我们自己和我们的同道者可以作为确定性的裁判，并且是可以不听取另一方意见的裁判。 ","chapter":"论思想言论自由","color":0},{"text":"那是因为人类心智具有一种特质，且无论作为智识存在还是道德存在的人类，其一切值得尊敬之处都源出于此，那就是人们的错误是可以改正的。","chapter":"论思想言论自由","color":0},{"text":"但是禁止一种意见的表达，其独有的罪恶之处在于，它是对包括当代人与后代人在内的全人类的剥夺；并且这种剥夺对那些不同意这种意见的人，比对持有这种意见的人甚至更大。如果被禁止的意见是正确的，那么人们便被剥夺了以正确矫正错误的机会；如果它是错误的，那么人们便损失了几乎同样大的益处，因为经过真理与谬误的碰撞，会让人们对真理有更清晰的体会和更生动的印象。 ","chapter":"论思想言论自由","color":0},{"text":"因而，这一范围就是人类自由的适当范围。它包括如下几个方面。首先是人类内在的意识领域的自由：它要求最广义的良心自由，思想和情感自由，对举凡实践、思想、科学、道德、宗教等所有事物的意见和态度的绝对自由。发表和出版意见的自由可能看起来应归于不同的原则，因为它属于个人行为关涉他人的那一部分；但是因为发表出版与思想本身几乎同等重要，并且所依据的理由又大都相同，所以实际上是无法将它们分开的。第二，这一原则要求品味和志趣自由：自由地根据自己的特性规划生活，做自己喜欢做的事并愿意承受一切可能的后果；只要我们的行为不伤及他人就不受人们干涉，即使在他人看来我们所行是愚蠢的、乖张的或错误的。第三，由个人自由可以推出在同样限制内的个人联合的自由：人们可以在不伤害他人的任何目的下自由联合，但参加联合的人必须是成年人，并且不受强迫和欺骗。 ","chapter":"引论","color":0},{"text":"一个人因做了伤害别人的事而被要求必须负责，这是规则，而因没能防止伤害而要其负责，相对来说就是例外。","chapter":"引论","color":0},{"text":"一个人不仅可以因有所行动可能引起对他人的伤害，也会因不行动而有同样的结果，对这两种情况他都应当对他所造成的伤害负责。","chapter":"引论","color":0},{"text":"该原则就是，人们若要干涉群体中任何个体的行动自由，无论干涉出自个人还是出自集体，其唯一正当的目的乃是保障自我不受伤害。","chapter":"引论","color":0},{"text":"人们一向相当嫉视立法和行政权力对个人行为的直接干涉。这倒不是出于对个人独立的合理尊重，而是出于一直延续下来的视政府利益常与公众相反的习惯。多数人还没有学会把政府的权力视为自己的权力，把政府的意见视为自己的意见。一旦他们这样做，个人自由就将会受到政府的侵犯，就像其在公众舆论中已然的遭遇一样","chapter":"引论","color":0},{"text":"他们宁可在自己就是异见者的某一具体点上尽力去改变人们的看法，而不愿联合所有异见者同心协力来捍卫自由。","chapter":"引论","color":0},{"text":"无论哪一国家，只要存在着一个上流阶级，这个国家的道德原则大部分就会源自这一上流阶级的阶级利益和阶级优越感。","chapter":"引论","color":0},{"text":"人们关于人类行为规范的意见，实际的指导原则乃是每个人心中都有的这样一种感情，即他和他的同道者希望人们怎么做，人人就该怎么做。","chapter":"引论","color":0},{"text":"人们把从自身生活中得来的规则视为不证自明和理所当然。这种几近普遍的错觉，只是习俗神奇魔力的例证之一；习俗岂止如谚语所云是人之第二天性，简直一向就被错认为第一天性。","chapter":"引论","color":0},{"text":"但是深思之士已经察觉到，当社会本身就是暴君时，即当社会集体凌驾于组成它的各别个体之上时，暴政的实施就并不限于借助政治机构之手而行的各种措施。社会能够并且确实在执行自己的命令，而如果它执行了错误而非正确的命令，或者对它根本不应干涉的事务发号施令，那么它便是实行了一种比其他各种政治压迫更为可怕的社会暴政，它虽然不常以严厉的惩罚为支撑，但却由于更深入地渗透到了人们生活的细节之中，甚至束缚了人们的心灵本身，从而使人们更加无法逃脱。因此，仅仅防范各级官府的暴政是不够的，还需防范优势意见和大众情感的暴政，防范社会即便不用民事惩罚，也能有法将自己的观念和做法作为行为准则强加于异见者的趋势，防范社会束缚与自己不相一致的个性的发展，甚至有可能遏止其形成，从而使所有人都必须按照社会自身的模式来塑造自己的那种倾向。集体意见对于个人独立的合法干涉是有一个限度的。发现这一限度并维护其不受侵蚀，对于使人类事务进至良善之境来说，正像防范政治上的专制一样，是不可或缺的。 ","chapter":"引论","color":0},{"text":"然而，当一个幅员广阔的民主共和国最终雄踞地表，并且被视为世界民族之林最强大的成员之一时，民选的责任政府作为一个重大的既存事实，就成为观察和批评的对象。","chapter":"引论","color":0},{"text":"现在需要的则是要求统治者与人民合为一体，统治者的利益和意志就应该是国民的利益和意志。国民无需防范自身的意志，无需担心它会向自身施虐。","chapter":"引论","color":0},{"text":"爱国者的目标就是，在必须容忍统治者向群体施用权力的同时，为之设置某些限制，这些限制就是他们所谓的自由。","chapter":"引论","color":0}],"thoughts":[{"text":"这里说的优秀应该有所指才是，应为狭义的精于做好螺丝钉的优秀人才，若是广义上的优秀人才，必须具备发现制度之病并兼具冲破制度之潜力。","quote":"并且行政机器的构建越是科学有效，即其网罗最优秀人才来操纵这架机器的办法越是巧妙娴熟，其为患也就越大。","chapter":""},{"text":"因为贫穷就不能结婚？按照前文所述，作者应该是觉得无法对孩子负责便不准结婚，然而结婚和生孩子也并不必然联系吧？","quote":"大陆许多国家的法律规定，除非男女双方能表明他们有足够支撑家庭生计的财产，否则不准许结婚，这并没有超出国家的合法权限：这种法律无论是否便利可行（这主要取决于当地的境况和民情），都不能以它侵犯自由为理由加以反对。","chapter":""},{"text":"进步来自于变化，而变化起源于自由。","quote":"看来，一个民族可能会在一个相当时期的进步之后，陷入停滞：然则停滞始于何时？必是在其不再拥有独立之个性的时候。","chapter":""},{"text":"一百六十年后的今天，亦是如此，拥有群众，便拥有了一切，拥有一切之后便可改造群众，使这种拥有继续强化，无坚可摧。","quote":"自严肃的事实而言，不管人们对真正的还是他们认定的智力超群者表达乃至给予了怎样的尊敬，遍及世界的普遍趋势仍然是使庸众成为人世间的支配力量。在上古、中古乃至从封建时代向目前时代其程度渐趋减弱的漫长过渡时期，个人自身都还能作为一种力量存在；如果他拥有卓越的天才或崇高的社会地位，他就会具备相当大的势力。而如今个人却消失在人群之中了。拿政治来说，毋庸赘言，世界现在是由公众舆论来统治的。唯一名副其实的力量乃是群众的力量，以及作为群众倾向和本能之代理机构的政府的力量。不独公共事务为然，即便在事关私人生活的道德和社会关系上，也莫不如此。那些其意见假公共意见以行的群众，并不总是名副其实的公众","chapter":""},{"text":"是从俗合流还是从善如流，个人觉得并不只是因为「自由」这一单一变量在决定缘故。如媒体宣传，价值引导，这些方面可能具有更大的影响。或者说，决定一个人的选择因素是多方面的，是自由、媒体、环境、引导等共同作用的结果。如果用统计学能做一个实验，控制好这些变量相关性，兴许能得出更为准确的结论。","quote":"在我们的时代，从社会的最高级到最低级，每个人都生活在怀有敌意的目光与令人恐惧的审查之下。不光在关涉他人之事上，而且在仅仅关涉自身之事上，个人或家庭也不敢依照自己的意见问一问什么才是我想要的？什么才适合我自身的性格和气质？什么才能让我身上最优秀与最高尚的东西得到公平发挥，使之得以茁壮成长？他们问自己的反倒是，与我的身份相符合的是什么？与我地位与财力相仿者通常都做些什么？更糟糕者，要问比我地位与财力更高者通常会做些什么？我并不是说，他们本有自己的好恶，只是在做选择时屈从于习俗。其实他们除了从俗之外，根本就谈不上有什么嗜好。于是，心灵本身也向束缚低头：乃至寻乐自娱，首先想到的也是要从俗合流；他们乐于混迹于人群之中；即便有所选择，也是在诸多众人惯行之事之间选择而已；独特的品味，反常的行为，在他们恰如犯罪一样避之唯恐不及。开始只是搁置自己的本性而不用，最终至于根本没有了可以遵循的本性，因为他们身上为人类所独具的性能已经枯萎乃至衰竭了：他们已无能力再生出强烈的愿望与固有的快乐，而且一般也丧失了根于自身或可以归之于他们自身的意见与情感。然而，这是不是人性应有的状态呢？", ;“性欲随身体的接近而增加,爱则在爱人缺席时最强;爱需要分离、需要一定的距离而得以保持”。\n因此,要离开所爱的人,才可能达到伟大。","chapter":"第四章 罗素的导师","color":0},{"text":"即便在这个也许最内省的时期,罗素也认为保有灵魂依赖于一个“真心追求的大的目标”——他倾向于在自我之外寻找支撑自己的东西。维特根斯坦则(也是很典型地)坚持认为,保持不堕落的可能性完全依靠自我——依靠在内部觅得的品质。如果一个人的灵魂是纯粹的(对朋友不忠诚是一件令它不纯的事情),那么无论什么事“从外部”发生在他身上——即便是妻子跟别的男人跑了——都不能动他的自我分毫。于是最应该关心的不是外部事务,而是自我。于是,跟任何由于他人的行动落到我们头上的不幸相比,妨碍我们镇静面对世界的Sorge才更是当务之急。","chapter":"第三章 罗素的爱徒","color":0},{"text":"。他后来这样说维特根斯坦:\n \n……也许是我所知道的传统观念里的天才的最完美范例,激情、深刻、强烈和强势。","chapter":"第三章 罗素的爱徒","color":0},{"text":"他隐含的意思是,如果一个人最强烈的冲动是作曲,而且如果完全沉溺于这冲动能够写出崇高的音乐,那么他不只有权听从冲动而行动,他还背负着这么做的责任。","chapter":"第三章 罗素的爱徒","color":0},{"text":"事实上,他在这里如此固执地提出的观点,预示了《逻辑哲学论》著名的第一句话所表达的东西:“世界是事实的总和,而非物的总和。”","chapter":"第三章 罗素的爱徒","color":0},{"text":"爱和性欲不止不是一回事,它们是互相对立的。这就是为什么婚后之爱的观念是虚伪的。性的吸引随身体的接近而增加,爱则在爱人缺席时最强。真正说来,爱需要分离、需要一定的距离才得以保持:“那世上一切旅行不能到达的、时间不能成就的,可通过意外的、无心的、跟所爱对象的身体接触而达到,在这样的身体接触中,性的冲动被唤醒,足以把爱当场杀死”。","chapter":"第一章 自我毁灭的试验场","color":0},{"text":"天才的意识是最远离涵拟阶段的;“它具备最强最清澈的明确和清晰”。天才具有最发达的记忆力,具有形成明确判断的最强大能力,因此对于真假好坏的差异有着最精细的感觉。逻辑和伦理根本上是一回事:“它们无非是对自己的责任”。天才“是最高的道德,因此它是每一个人的责任”。","chapter":"第一章 自我毁灭的试验场","color":0}],"thoughts":[{"text":"挺有意思 🌝","quote":"维特根斯坦和帕蒂森的通信里几乎全都是“废话”。几乎每封信里他都要用一用英语形容词“bloody”;出于某种原因,他在这个词里看到了无穷无尽的乐趣。他的信以“亲爱的老Blood”起首,以“你bloodily的”或“你in bloodiness的”结尾。帕蒂森寄去从杂志上剪下的照片,称之为自己的“画作”;对此,维特根斯坦用夸张的严肃口吻表示欣赏:“不看签名我就能知道这是帕蒂森之作。里头有一种此前从未用画笔表达过的bloodiness。”在回信里维特根斯坦寄去“肖像”,即从报纸的自强课程广告上裁下的相貌堂堂的中年男人照片。“我最近的照片,”放进一张这种图片后他宣布,“上一张只表达出慈父的亲切感;这一张表达出了胜利感。”","chapter":""}],"popularHighlights":[{"text":"“撒谎对自己有利的时候,为什么要说实话?”","count":6034,"chapter":"第一章 自我毁灭的试验场"},{"text":"“就改善你自己好了,”后来维特根斯坦对许多朋友说,“那是你为改善世界能做的一切。”","count":1815,"chapter":"第一章 自我毁灭的试验场"},{"text":"后来,有人对他说G.E.摩尔孩子般的单纯值得赞扬时,维特根斯坦提出了异议。“我不能理解,”他说,“除非一个孩子也值得为之得到赞扬。因为你谈的单纯不是一个人为之拼争的单纯,而是出自天然的免于诱惑。”","count":1683,"chapter":"第一章 自我毁灭的试验场"},{"text":"他辩护的是一种基于忠实、基于真实面对自己及自己的冲动的道德——一种来自于自我内部的道德,而非规则、原则和责任从外部强加的道德。","count":1547,"chapter":"第三章 罗素的爱徒"},{"text":"根本上,问题不在于是否在所有情况下讲实话,而在于是否压倒一切地要求自己是真实的——是否应当不顾相反的压力坚持做自己。","count":1455,"chapter":"第一章 自我毁灭的试验场"},{"text":"在爱中,男人只爱他自己。爱的不是他的经验自我,不是软弱和粗俗,不是他外表显出的挫败和卑微;而是爱他想要成为的一切,爱他应该成为的一切,爱他的最真和最深的清晰本性——免于一切必然性的束缚和尘世的败污。","count":1260,"chapter":"第一章 自我毁灭的试验场"},{"text":"他隐含的意思是,如果一个人最强烈的冲动是作曲,而且如果完全沉溺于这冲动能够写出崇高的音乐,那么他不只有权听从冲动而行动,他还背负着这么做的责任。","count":1206,"chapter":"第三章 罗素的爱徒"},{"text":"真实于自己是不容违背的责任。","count":1071,"chapter":"第一章 自我毁灭的试验场"},{"text":"你令我想起了一幅景象:有人从关着的窗户看出去,不能解释一个过路人的奇怪运动。他不知道外面是哪种风暴在肆虐,也不知道那人只是吃力地想站稳。","count":1044,"chapter":"第八章 印不出的真理"},{"text":"危机的根源是他自己。仿佛他的一生是一场与他自己本性进行的战斗。","count":912,"chapter":"第一章 自我毁灭的试验场"},{"text":"魏宁格本人既是犹太人又是同性恋(因而有可能是心理上的女性类型);这种想法——他的自杀是某种“解决”——容易被吸收到最粗俗的反犹或反女性的态度中去。","count":900,"chapter":"第一章 自我毁灭的试验场"},{"text":"他考虑的不诚实并非琐碎的那种——比如偷了东西却否认——而是更微妙的一种,例如对人说某些话,因为那话是受期许的,而非因为那是真话。","count":870,"chapter":"第一章 自我毁灭的试验场"},{"text":"世界是事实的总和,而非物的总和。”","count":867,"chapter":"第三章 罗素的爱徒"},{"text":"“这对我无所谓,”他告诉德鲁利,“我制造自己的氧气。”","count":858,"chapter":"第一章 自我毁灭的试验场"},{"text":"事情就是这样子:只有你不去说出不可说的,才不会丧失任何东西。但不可说的东西将——不可说地——包含在所说的东西中!","count":850,"chapter":"第七章 在前线"},{"text":"但长远来看,他可能已经清楚,唯一值得过的生活是实现他负有的更大责任的生活:对自己的责任——对自己天才的责任。","count":828,"chapter":"第一章 自我毁灭的试验场"},{"text":"我亲爱的父亲昨天下午死了。他的死是我能想像的最美的;连最轻微的痛苦也没有,像一个孩子般入睡!在最后的全部时间里,我一刻也没有感到悲伤,而是感到最大的快乐,我认为这一死配得上整个一生。","count":825,"chapter":"第四章 罗素的导师"},{"text":"作曲家问该教这孩子什么,赫尔曼·维特根斯坦回答:“让他呼吸你呼吸的空气便是!”","count":819,"chapter":"第一章 自我毁灭的试验场"},{"text":"他自己在这个学期末告诉罗素,他生命里最快乐的时光是在罗素的屋子里度过的。但快乐的原因不仅仅在于他得以听从自己的冲动,还在于他确信——既然他有非同寻常的哲学天赋——自己有权这么做。","count":816,"chapter":"第三章 罗素的爱徒"},{"text":"在他的体验里,那个问题的两难是讨厌的侵扰和费解的谜,强加于他、俘虏了他,令他不能好好过日常生活,除非哪天能用一个满意的解答将其驱除。","count":756,"chapter":"第一章 自我毁灭的试验场"}]},"934374":{"rating":812,"ratingCount":6188,"highlights":[],"thoughts":[],"popularHighlights":[{"text":"他朝火焰走去。火焰没有吞噬他的皮肉，而是不烫不灼地抚慰他，淹没了他。他宽慰地、惭愧地、害怕地知道他自己也是一个幻影，另一个人梦中的幻影。","count":6944,"chapter":"环形废墟"},{"text":"那时，比奥伊·卡萨雷斯想起乌克巴尔创始人之一说过镜子和男女交媾是可憎的，因为它们使人的数目倍增。","count":5235,"chapter":"特隆、乌克巴尔、奥比斯·特蒂乌斯"},{"text":"特隆的事物不断复制；当事物的细节遭到遗忘时，很容易模糊泯灭。门槛的例子十分典型：乞丐经常去的时候，门槛一直存在，乞丐死后，门槛就不见了。有时候，几只鸟或一匹马能保全一座阶梯 地下的停尸房里度过了许多个夜晚，他剥开尸体的皮肉，暴露出底下的肌肉和神经。他开始着迷于微笑是如何形成的，还指示自己分析脸部各处所有可能的运动方式，以及确认控制脸部每块肌肉的神经元。对刻画微笑来说，追踪这些神经究竟属于颅神经还是脊神经并无必要，但是列奥纳多想知道答案。","chapter":"第三十一章 《蒙娜丽莎》","color":0},{"text":"他知道底漆能更好地反射光线，这样光线就可以穿过多层半透明薄釉，从而增强景深、光亮感和立体感。","chapter":"第三十一章 《蒙娜丽莎》","color":0},{"text":"他留下的那些未发表的专著证明了他的研究动机与众不同：他积累知识是为了获取新知和让自己快乐，而不是渴望成为著名学者或者留名史册。","chapter":"第二十七章 第二阶段的解剖学研究","color":0},{"text":"你也许会因为反胃而放弃。如果这没有阻碍你，你可能会被整晚与剥皮肢解的尸体共处吓到，不敢直视它们；如果这还没能吓住你，你也可能缺乏绘图需要的良好技巧；即使你有绘画技巧，也可能未具备透视知识；即便你有透视知识，你可能缺少几何图示和计算肌肉力量和强度的方法；又或者你也许缺乏耐心，所以无法坚持不懈","chapter":"第二十七章 第二阶段的解剖学研究","color":0},{"text":"脱离现实的幻想常被认为是列奥纳多的主要弱点之一。但是，要想成为真正有远见的人，逾越现实和接受失败皆属必需。创新需要一个现实扭曲力场。列奥纳多对未来的设想最终往往都会成为现实，即使这需要几个世纪。潜水服、飞行器和直升机现在均已存在，抽吸泵正被用来排干沼泽，列奥纳多规划的运河路线如今已成为一条主要的高速公路。有时候，幻想就是通向现实的路径。","chapter":"第二十四章 水利工程师","color":0},{"text":"从更广泛的意义上说，列奥纳多的地图代表了他未被充分认可的又一项伟大创新：设计视觉化展示信息的新方法。","chapter":"第二十三章 切萨雷·波吉亚","color":0},{"text":"大多数专家都认为这是列奥纳多的手笔，结果是拥有此画的艺术联盟在2013年以近八千万美元的价格卖给了一位瑞士艺术商，然后该艺术商又以一亿两千七百万美元将其转卖给了一位俄罗斯的化肥大亨。","chapter":"第二十二章 遗失与复得的作品","color":0},{"text":"透视法有三个分支。”列奥纳多写道，“第一个分支处理物体距离人眼越来越远时会明显变小的问题……第二个分支阐释距离变远时颜色的变化……第三个分支考虑的问题是，当画面中的物体越来越远时，细节会如何变模糊。","chapter":"第十七章 关于艺术的科学","color":0},{"text":"列奥纳多坚持认为，无论是在自然界还是在艺术作品中，所有边界都应该是模糊的，这让他成为晕涂法的开创者，这种技法描绘的轮廓如烟雾笼罩一般朦胧，《蒙娜丽莎》就是一个明显的例子。这种技法也象征了已知与未知之间的模糊边界，这是列奥纳多一生的核心主题之一。他融合了现实与幻想、体验与奥秘、物体和周遭环境之间的边界，正如他让艺术与科学不再泾渭分明一样。","chapter":"第十七章 关于艺术的科学","color":0},{"text":"这并非一个前卫的观点，但是列奥纳多更进了一步。他意识到，自然界中不存在数学概念中的精确线条或边界。“物体的表面和它周围的空气都不是由线条构成的。”他写道。他意识到点和线是数学概念，它们并非客观实在，而且可以无穷小。“线本身既不是物体，又不是物质，它可以被称为一种想象中的概念，而不是真实物体，因为性质如此，它不占任何空间。”\n这个理论融合了观察、光学和数学，是一种列奥纳多式的融会贯通，让他更确信艺术家不应该在绘画中使用线条。","chapter":"第十七章 关于艺术的科学","color":0},{"text":"在为大多数物体塑形时，列奥纳多依赖的不是轮廓线，而是阴影，这源于一个根据观察和数学知识得出的洞见：自然界中的物体没有清晰的轮廓或边界。物体边界显得模糊并不只是因为我们的观察方式所致。他认识到，自然界中本来就不存在精确的线条，这与我们眼睛的感知方式无关。\n","chapter":"第十七章 关于艺术的科学","color":0},{"text":"简而言之，列奥纳多的标志性才华就是：通过嫁接观察与想象来表现“自然万物，还有自然从未创造过的一切”。","chapter":"第十七章 关于艺术的科学","color":0},{"text":"在笔记本里，他宣布自己的目的是搞清楚他所谓的人的普遍尺寸。￼这一追求不仅定义了列奥纳多的一生，还将他的艺术创作与科学探索紧紧联系在了一起。\n","chapter":"第十四章 人的本质","color":0},{"text":"基于对机械的研究，列奥纳多比牛顿更早从机械论的视角来看待这个世界。他的结论是，宇宙中所有的运动——人类四肢、机器齿轮、血管中的血液和河流之水——都遵循同样的规律。这些规律可以相互类比，将一个领域中的运动与其他领域中的运动进行比较时，规律就会显现。","chapter":"第十二章 机械艺术","color":0},{"text":"有些问题是我们永远无法解决的，但是有必要知道为什么无法解决。","chapter":"第十二章 机械艺术","color":0},{"text":"瞬间之中没有时间，时间是瞬间的连动。","chapter":"第十章 实验科学家","color":0},{"text":"“伽利略比列奥纳多晚出生一百一十二年，但他通常被认为是严格的实验法的创立者，而且经常被称誉为现代科学之父。”历史学家弗里乔夫·卡普拉写道，“如果列奥纳多·达·芬奇生前就发表了他的科学著作，或者在他死后不久，笔记就得到了广泛研究，那么毫无疑问，这项荣誉本该授予他。”","chapter":"第十章 实验科学家","color":0},{"text":"结果，先于伽利略一个多世纪，列奥纳多就以他坚持不懈的实践成了推动实验与理论对话的西方重要思想家之一，这种对话将通向现代的科学革命。","chapter":"第十章 实验科学家","color":0},{"text":"列奥纳多打破了这一传统，他的科学主要建诸观察之上，然后识别其中的规律，之后通过更多的观察和实验进行验证。他在笔记本里写了不下几十次“这可以用实验证明”之类的话，接着就开始描述如何在现实世界检验他的想法","chapter":"第十章 实验科学家","color":0},{"text":"虽然自然以肇因为始，以经验为果，我们必须反向追究，以经验为始，探求起因。”","chapter":"第十章 实验科学家","color":0},{"text":"正是因为印刷术的普及，列奥纳多才能成为欧洲首位未经正统的拉丁文或希腊文教育而获得科学知识的重要思想家。","chapter":"第十章 实验科学家","color":0},{"text":"“可饮泉水者，不饮瓮中水。”","chapter":"第十章 实验科学家","color":0},{"text":"列奥纳多集勤奋与分心、专注与拖延于一身","chapter":"第九章 骑士纪念碑","color":0},{"text":"列奥纳多的《维特鲁威人》呈现了一个艺术与科学融合的瞬间，这种融合让凡人的心智有机会去探索那些永恒的问题：我们是谁，我们如何居于宇宙的宏大秩序之中。它同样象征一种理想的人文主义精神，颂扬个体的尊严、价值和理性思维。赤裸裸地站在地球与宇宙的交叉点上，我们不仅在方圆之中看到了列奥纳多·达·芬奇的本质，还有我们自己的本质。","chapter":"第八章 《维特鲁威人》","color":0},{"text":"在叙事性的绘画作品中，你应该让截然相反的事物紧密排列在一起，因为它们可以互相对照，特别是靠近彼此的时候。所以，要让丑的紧挨着美的，大的紧挨着小的，年老的紧挨着年轻的”。","chapter":"第七章 令人着迷的人","color":0},{"text":"现存的超过七千二百页笔记可能只是他全部笔记的四分之一，￼但是历经五百年还能有如此留存，已属不易。我和史蒂夫·乔布斯曾努力找回他在20世纪90年代的电子邮件和文档，但是最终找回的比例还不到四分之一。列奥纳多留下的那些笔记简直就是一笔意外之财，它们是对创造力实践的书面记录。","chapter":"第五章 列奥纳多·达·芬奇的笔记本","color":0},{"text":"列奥纳多这种收集各种想法的习惯在文艺复兴时期的意大利很流行，那时的人们有摘录簿或速记本。但是就内容来说，列奥纳多的笔记不仅在当时可谓前所未有，就算现在看来也可能是绝无仅有的。他的笔记本曾被恰如其分地称为“有史以来见诸纸上的、关于人类观察力和想象力最令人惊叹的证据”。","chapter":"第五章 列奥纳多·达·芬奇的笔记本","color":0},{"text":"在调查记录中，他还写到了如何为卢多维科刚娶的年轻妻子准备热水浴：“在三份热水中加入四份冷水。”","chapter":"第四章 初到米兰","color":0},{"text":"在飞奔的战车附近躺着两具尸体，他们的腿被刀割断，肢体散落在地上。在远一点儿的地方，有两名士兵正在被切成两段。这就是我们既可爱又温柔的列奥纳多，那个因爱护众生而成为素食者的列奥纳多，此时却沉湎于令人惊骇地描绘死亡。我们又一次瞥见了他内心的骚动，在他的黑暗山洞中藏着对“恶魔”的想象。","chapter":"第四章 初到米兰","color":0},{"text":"我原以为我在学习如何生活，其实我一直在学习如何死亡。","chapter":"第三章 自力更生","color":0},{"text":"当我们观察三维物体的时候，看不到锐利的边缘。“不要让轮廓和形象突兀生硬，而要画出烟雾迷蒙的效果。”他写道，“画阴影及其轮廓时，应该让它们隐约可见，不要过于锐利或清晰可辨，否则你的作品就会显得呆板。","chapter":"第二章 学徒生活","color":0},{"text":"韦罗基奥的天使看上去显得空洞乏味，他的脸平淡无奇，仅有的情绪好像就是惊讶于身边这位天使如此富有表现力。","chapter":"第二章 学徒生活","color":0},{"text":"他已经意识到艺术家的杰出在于以现实丰富创作，而不是被现实限制了创作。","chapter":"第二章 学徒生活","color":0},{"text":"“若要让想象中的动物看起来自然真实，譬如龙，你可以参照獒犬或者猎犬的头、猫的眼睛、豪猪的耳朵、灰狗的鼻子、狮子的眉毛、公鸡的太阳穴和乌龟的脖子”","chapter":"第二章 学徒生活","color":0},{"text":"他的这种笔法带来了一个额外的好处：它成了确认是否为列奥纳多画作的一个证据。\n","chapter":"第二章 学徒生活","color":0},{"text":"通过把数学应用于艺术，阿尔贝蒂不仅提升了画家的地位，还有力地支持了视觉艺术应该与其他人文学科拥有平等的地位，后来，列奥纳多在这一点上取得了胜利。￼","chapter":"第二章 学徒生活","color":0},{"text":"阿尔贝蒂是一位艺术家、建筑师、工程师和作家，他在很多方面都与列奥纳多有相似之处：他们都是成功人士的私生子，都擅长运动，相貌俊美，终身未婚，而且他们对一切都有兴趣——从数学到艺术。唯一的区别是，阿尔贝蒂的私生子���份并没有妨碍他接受传统教育。","chapter":"第二章 学徒生活","color":0},{"text":"上述这些对每一座城市都很重要：不仅要有“自由”和“清澈的河水”，还要有“衣着优雅”的人们，以及因为教授希腊语和会计学而闻名的大学。对于今天来说依然如此。","chapter":"第二章 学徒生活","color":0},{"text":"在他的笔记中，有这样一则奇特的谜语：“似人巨像，汝愈近之，其形愈小。”谜底是：“灯下之影。”","chapter":"引言 我亦擅绘","color":0},{"text":"一开始，我认为他容易耽于幻想是个缺点，说明他缺乏自律和勤奋，就像他经常放弃那些尚未完成的艺术作品和专著一样。从某种程度上说，这的确是事实。无法实现的幻想不过是空想。但是，我逐渐发现他模糊现实与幻想界限的能力，就像他在绘画中模糊轮廓的晕涂法一样，也是他创造力的关键。","chapter":"引言 我亦擅绘","color":0},{"text":"事实上，列奥纳多的才华属于人类，并经由他的意志和抱负锻造而成。","chapter":"引言 我亦擅绘","color":0},{"text":"不过，令人遗憾的并不是我们无法成为“文艺复兴人”，而是很多人已逐渐对自己专业领域之外的一切失去了好奇。","chapter":"译者序 来一场个人的文艺复兴","color":0}],"thoughts":[{"text":"所以任何试图透过屏幕、通过电子照片来感受大师作品的想法都是存在巨大缺憾的。","quote":"他知道底漆能更好地反射光线，这样光线就可以穿过多层半透明薄釉，从而增强景深、光亮感和立体感。","chapter":""},{"text":"怎么有点无厘头的感觉？","quote":"自称年过百岁，却从未生过病。几小时后，这位老人安静地离世了","chapter":""},{"text":"所谓的实证主义科学","quote":"列奥纳多打破了这一传统，他的科学主要建诸观察之上，然后识别其中的规律，之后通过更多的观察和实验进行验证。他在笔记本里写了不下几十次“这可以用实验证明”之类的话，接着就开始描述如何在现实世界检验他的想法","chapter":""},{"text":"这家伙要是能活到现在，一定会去设计手机。","quote":"列奥纳多决定在动手雕塑前，亲自解剖一匹马，即便这是他一贯的作风，我们依然应该感到惊叹。这一次，他为艺术进行解剖研究的冲动又将他引向了纯粹的科学探索。我们可以想见他研究马匹的过程：先在笔记上记录详细的测量和观察结果，然后根据这些信息绘制出各种示意图、图表、素描和那些交织了艺术与科学的优美草图。这些研究最终让他踏入了比较解剖学：在后来的一系列人体解剖绘稿中，他将人左腿的肌肉、骨骼和肌腱与剖开的马后腿并排在一起进行对比。\n\n图47_马腿\n列奥纳多醉心于这些解剖学研究，他是那么投入，以至于决定写一本关于马的解剖专著。尽管瓦萨里称这本专著确实完成了，但这似乎不是事实。与以往一样，列奥纳多很容易被相关的主题分心。他在研究马的时候，开始筹划让马厩更清洁的方法；在后来的那些年中，他为马厩设计了各种各样的系统，包括通过顶棚的管道向食槽自动填充饲料，以及利用水闸和倾斜的地面来清理粪便。","chapter":""},{"text":"实测，7倍跟接近我的比例","quote":"例如，维特鲁威认为身高是脚长的六倍，但是列奥纳多记录的比例是七倍。","chapter":""},{"text":"羡慕作者，能一览真迹","quote":"当一位策展人把它拿出来放在我面前的桌子上时，看着列奥纳多的金属笔尖留下的凹痕和他用圆规尖刺出的十二个小孔，我深受触动。我似乎看到了五百年前这位大师正在忙碌的手，一种奇异而亲切的感觉涌上心头。","chapter":""},{"text":"电子文档虽然易存储易检索，但终究缺乏实体存在感，因此，更容易被人这种视觉动物遗忘。再者，人们对一件事情印象的深刻度与其为此的付出应当呈正相关，易存储本身却在做着相反的事情，加强了遗忘本身。","quote":"现存的超过七千二百页笔记可能只是他全部笔记的四分之一，但是历经五百年还能有如此留存，已属不易。我和史蒂夫·乔布斯曾努力找回他在20世纪90年代的电子邮件和文档，但是最终找回的比例还不到四分之一。列奥纳多留下的那些笔记简直就是一笔意外之财，它们是对创造力实践的书面记录。","chapter":""},{"text":"列奥纳多如果开个博客，那关注量能上亿","quote":"列奥纳多这种收集各种想法的习惯在文艺复兴时期的意大利很流行，那时的人们有摘录簿或速记本。但是就内容来说，列奥纳多的笔记不仅在当时可谓前所未有，就算现在看来也可能是绝无仅有的。他的笔记本曾被恰如其分地称为“有史以来见诸纸上的、关于人类观察力和想象力最令人惊叹的证据”。","chapter":""},{"text":"有点乔布斯的感觉","quote":"他规定，“只把美好的部分显露在城市的上层”。这一层宽阔的街道和有拱廊的行道专供行人之用，两侧会有漂亮的房屋和花园。列奥纳多认为拥挤的米兰街道是传播疾病的温床，所以在新规划的城镇中，那些林荫大道的宽度至少和房屋的高度一样。为了保持街道的清洁，它们的表面应该向中央倾斜，这样雨水就可以从路中间的缝隙排出，汇入下一层的下水道循环系统。列奥纳多不仅提出了指导性建议，还做了非常具体的规划。“每条道路必须有二十臂长宽，而路两边要高于中央二分之一臂长，形成由两侧向中间倾斜的斜坡。”他写道，“然后在路中央，每隔一臂长就有一个开口，开口长度是一臂长、宽度是一指宽，雨水可以从这里流下去。”\n在可见层下面的那一层有运河、货运道路、仓库、马车道，还有带走垃圾和“恶臭物质”的下水道系统。住宅的大门在上面一层，而各行各业的人走下面一层的入口，可以经通风井采光，而且由“每个拱廊的螺旋楼梯”与上层相连。列奥纳多特别说明这些楼梯应该是螺旋式的，除了因为他喜欢这个形状外，还因为他是个讲究整洁的人。那时方形楼梯的拐角常沦为男人的便所。“方形楼梯的角落总是污秽难闻。”他写道，“在第一道拱门处，必须有一扇门通向公共厕所。”这一次，他又开始钻研细节了：“厕所便器的座位应该跟女修道院的十字转门一样，依靠重力平衡回到原位。天花板上应该多开小孔，这样人才能顺畅呼吸。”","chapter":""},{"text":"着实，有点搞笑……","quote":"在调查记录中，他还写到了如何为卢多维科刚娶的年轻妻子准备热水浴：“在三份热水中加入四份冷水。”","chapter":""},{"text":"这也是西方艺术有别于东方艺术之所在","quote":"通过把数学应用于艺术，阿尔贝蒂不仅提升了画家的地位，还有力地支持了视觉艺术应该与其他人文学科拥有平等的地位，后来，列奥纳多在这一点上取得了胜利。","chapter":""},{"text":"归纳与演绎","quote":"“因为我的目的是先从经验中观察，然后推理分析现象背后的机理。”","chapter":""},{"text":"除了要考虑介质的保存寿命，还要考察它的易检索性。相对而言，手稿固然意义非凡，但究其原因是因为它来自达芬奇。对于普通人而言，一笔一画写下来的东西反而不那么容易被发现。","quote":"本书的起点不是列奥纳多的艺术杰作，而是他的笔记。因为我认为七千两百多页奇迹般留存下来的笔记手稿最能充分展现他的思想。这些笔记在五百年后依然清晰可辨，这也说明纸张是一种超级的信息存储技术，而我们在社交网络上发的那些“推文”应该会短命得多。","chapter":""}],"popularHighlights":[{"text":"那就是对每天看到的世界都充满好奇心，这会让人生每个瞬间都更加丰富多彩。","count":1314,"chapter":"引言 我亦擅绘"},{"text":"生命对每个人都很公平，无论是列奥纳多还是我们，终究都会两手空空地离开，唯一的区别只是你曾否活得像个满怀好奇、满心欢喜的孩子。世界对于列奥纳多这样的人来说是一座乐园，而他们唯一的目标是尽兴而归。","count":1110,"chapter":"译者序 来一场个人的文艺复兴"},{"text":"列奥纳多的研究方法植根于实验、好奇心，还有对日常现象感到惊奇的能力，而大多数成年人对于这些现象已经习以为常，不再停下来思考。","count":952,"chapter":"第一章 童年时光"},{"text":"后来列奥纳多在方方面面都远远超过了自己的老师，其中也包括容易分心、半途而废，还有拖延交付。","count":800,"chapter":"第二章 学徒生活"},{"text":"在一个二手知识随处可及的时代，或许我们应该向列奥纳多学习如何通过自己的观察和实验获取一手经验，用你的双眼和双手去亲自发现，与拿着手机消费别人的成果不可能是同样的感受——省事从来都有代价。","count":660,"chapter":"译者序 来一场个人的文艺复兴"},{"text":"在把生活外包的同时，我们的好奇心也一并被打包带走了。","count":585,"chapter":"译者序 来一场个人的文艺复兴"},{"text":"当你独处时，你才是自己的主人。","count":494,"chapter":"第二章 学徒生活"},{"text":"列奥纳多·达·芬奇幸好是一个私生子。否则，人们会期待他子承父业，成为一位公证员——列奥纳多的家族至少在四代以前就开始了这一传统。","count":480,"chapter":"第一章 童年时光"},{"text":"无论是我们自己，还是我们的孩子，都不应止步于吸收知识，更要去质疑，要充满想象力，要敢于不同凡“想”，就像任何时代的异类天才和革新者一样。","count":462,"chapter":"引言 我亦擅绘"},{"text":"列奥纳多能最大限度地发挥创造力的原因之一就是他从来不问“这有没有用”，只是不停追问“这是什么”，“这是为什么”。","count":459,"chapter":"译者序 来一场个人的文艺复兴"},{"text":"拜互联网所赐，我们满足好奇心的方式已经从“去探索”逐渐演变为“被推送”。","count":448,"chapter":"译者序 来一场个人的文艺复兴"},{"text":"我原以为我在学习如何生活，其实我一直在学习如何死亡。","count":405,"chapter":"第三章 自力更生"},{"text":"列奥纳多是演奏及制作里拉琴的高手、优秀的即兴诗人、演出庆典设计师、画家兼工程师、解剖学研究者、武器设计师，以及遗迹化石学的先驱……","count":375,"chapter":"译者序 来一场个人的文艺复兴"},{"text":"当我们站在几个世纪之后回望时发现，列奥纳多为这些事情所花费的时间和创造力似乎是一种浪费，因为这些演出都如昙花一现。多年后，除了记录辉煌瞬间的只言片语，那些令人炫目的演出再无可示人之处。","count":352,"chapter":"第六章 宫廷艺人"},{"text":"正如列奥纳多所认识到的那样，现实的轮廓本来就模糊不清，我们应该张开怀抱接受这些不确定性。走近他人生的最佳方式正是他走近这个世界的方式：对它的无穷奇迹充满好奇和欣赏。","count":342,"chapter":"第三十二章 法国岁月"},{"text":"不过，令人遗憾的并不是我们无法成为“文艺复兴人”，而是很多人已逐渐对自己专业领域之外的一切失去了好奇。","count":336,"chapter":"译者序 来一场个人的文艺复兴"},{"text":"因为他知道自己总可以再学到一些新东西，掌握一些新技巧，或者被新的灵感击中——他是对的。","count":336,"chapter":"第三章 自力更生"},{"text":"佛罗伦萨的整个文化都在鼓励和犒赏那些能够掌握并融合不同学科的人。","count":330,"chapter":"第二章 学徒生活"},{"text":"至少对我而言，这些解读更能揭示弗洛伊德的内心世界，而非列奥纳多。","count":324,"chapter":"第一章 童年时光"},{"text":"这些笔记在五百年后依然清晰可辨，这也说明纸张是一种超级的信息存储技术，而我们在社交网络上发的那些“推文”应该会短命得多。","count":322,"chapter":"引言 我亦擅绘"}]},"22946457":{"rating":898,"ratingCount":110214,"highlights":[{"text":"柔嘉打个面积一方寸的大呵欠。像一切人，鸿渐恨旁人听自己说话的时候打呵欠，一年来在课堂上变相催眠的经验更增加了他的恨，他立刻闭嘴。","chapter":"八","color":0},{"text":"鸿渐是留学生，知道西洋流行的三P运动（Poor Pop pays）￼；做儿子的平时呐喊着“独立自主”，到花钱的时候，逼老头子掏腰包。","chapter":"八","color":0},{"text":"一个人地位高了，会变得糊涂的。”事实上，一个人的缺点正像猴子的尾巴，猴子蹲在地面的时候，尾巴是看不见的，直到他向树上爬，就把后部供大众瞻仰，可是这红臀长尾巴本来就有，并非地位爬高了的新标识","chapter":"六","color":0},{"text":"外国科学进步，中国科学家进爵。在外国，研究人情的学问始终跟研究物理的学问分歧；而在中国，只要你知道水电、土木、机械、动植物等等，你就可以行政治人——这是“自然齐一律”最大的胜利。","chapter":"六","color":0},{"text":"三闾大学校长高松年是位老科学家。这“老”字的位置非常为难，可以形容科学，也可以形容科学家。不幸的是，科学家跟科学大不相同，科学家像酒，愈老愈可贵，而科学像女人，老了便不值钱。将来国语文法发展完备，总有一天可以明白地分开“老的科学家”和“老科学的家”，或者说“科学老家”和“老科学家”。现在还早得很呢，不妨笼统称呼。","chapter":"六","color":0},{"text":"慎明道：“关于Bertie结婚离婚的事，我也和他谈过。他引一句英国古话，说结婚仿佛金漆的鸟笼，笼子外面的鸟想住进去，笼内的鸟想飞出来；所以结而离，离而结，没有了局。”\n苏小姐道：“法国也有这么一句话。不过，不说是鸟笼，说是被围困的城堡fortresse assiégée，城外的人想冲进去，城里的人想逃出来。鸿渐，是不是？”鸿渐摇头表示不知道。","chapter":"三","color":0},{"text":"周经理摇摇头，想女人家不懂世事，只知道家里大发脾气，叫丈夫在外面做人为难。自己惨淡经营了一篇谈话腹稿，本想从鸿渐的旅行费说到鸿渐的父亲，承着鸿渐的父亲，语气捷转说：“你回国以后，没有多跟你老太爷老太太亲热，现在你又要出远门了，似乎你应该回府住一两个月，伺候伺候二老。我跟我内人很喜欢你在舍间长住，效成也舍不得你去；可是我扣留住你，不让你回家做孝顺儿子，亲家、亲家母要上门来‘探亲相骂’了——”说到此地，该哈哈大笑，拍着鸿渐的手或臂或肩或背，看他身体上什么可拍的部分那时候最凑手方便——“反正你常到我家里来玩儿，可不是一样？要是你老不来，我也不答应的。”自信这一席话委婉得体，最后那一段尤其接得天衣无缝，曲尽文书科王主任所谓“顺水推舟”之妙，王主任起的信稿子怕也不过如此。只可恨这篇好谈话一讲出口全别扭了，自己先发了慌，态度局促，鸿渐那混小子一张没好气挨打嘴巴的脸，好好给他面子下台，他偏愿意抓破了面子顶撞自己，真不识抬举，莫怪太太要厌恶他。那最难措辞的一段话还闷在心里，像喉咙里咳不出来的粘痰，搅得奇痒难搔。周经理象征地咳一声无谓的嗽，清清嗓子。","chapter":"四","color":0},{"text":"她喜欢赵方二人斗法比武抢自己，但是她担心交战得太猛烈，顷刻就分胜负，二人只剩一人，自己身边就不热闹了。她更担心败走的偏是方鸿渐；她要借赵辛楣来激发方鸿渐的勇气，可是方鸿渐也许像这几天报上战事消息所说的，“保持实力，作战略上的撤退。”","chapter":"三","color":0}],"thoughts":[{"text":"这段心理描写真有意思","quote":"她喜欢赵方二人斗法比武抢自己，但是她担心交战得太猛烈，顷刻就分胜负，二人只剩一人，自己身边就不热闹了。她更担心败走的偏是方鸿渐；她要借赵辛楣来激发方鸿渐的勇气，可是方鸿渐也许像这几天报上战事消息所说的，“保持实力，作战略上的撤退。”","chapter":""}],"popularHighlights":[{"text":"忠厚老实人的恶毒，像饭里的砂砾或者出骨鱼片里未净的刺，会给人一种不期待的伤痛。","count":51799,"chapter":"一"},{"text":"事情没有做成的人老有这类根据不充分的信念；我们 创伤、采取目的论；认为人的烦恼全都是关于人际关系的烦恼；此外，不寻求认可或者课题分离也全都是反常识的理论。","chapter":"自由就是不再寻求认可？","color":0},{"text":"不去干涉别人的课题也不让别人干涉自己的课题。这就是阿德勒心理学给出的具体而且有可能彻底改变人际关系烦恼的具有划时代意义的观点。\n","chapter":"自由就是不再寻求认可？","color":0},{"text":"人在人际关系中一旦确信“我是正确的”，那就已经步入了权力之争。","chapter":"为什么讨厌自己？","color":0},{"text":"关于权力之争，还有一点需要注意。那就是无论认为自己多么正确，也不要以此为理由去责难对方。这是很多人都容易陷落进去的人际关系圈套。\n","chapter":"为什么讨厌自己？","color":0},{"text":"“无法真心祝福过得幸福的他人”，那就是因为站在竞争的角度来考虑人际关系，把他人的幸福看作“我的失败”，所以才无法给予祝福。","chapter":"为什么讨厌自己？","color":0},{"text":"一切烦恼皆源于人际关系","chapter":"译者序","color":0},{"text":"健全的自卑感不是来自与别人的比较，而是来自与“理想的自己”的比较。\n","chapter":"为什么讨厌自己？","color":0},{"text":"阿德勒甚至指出：“在我们的文化中，弱势其实非常强大而且具有特权。”\n","chapter":"为什么讨厌自己？","color":0},{"text":"阿德勒的目的论是说：“无论之前的人生发生过什么，都对今后的人生如何度过没有影响。”决定自己人生的是活在“此时此刻”的你自己。\n","chapter":"不为人知的心理学“第三巨头”","color":0},{"text":"人并不受过去的原因所左右，而是朝着自己定下的目标前进，这就是哲人的主张。哲人所倡导的“目的论”是一种彻底颠覆正统心理学中的因果论的思想","chapter":"不为人知的心理学“第三巨头”","color":0},{"text":"阿德勒在否定心理创伤学说的时候说了下面这段话：“任何经历本身并不是成功或者失败的原因。我们并非因为自身经历中的刺激——所谓的心理创伤——而痛苦，事实上我们会从经历中发现符合自己目的的因素。决定我们自身的不是过去的经历，而是我们自己赋予经历的意义。”","chapter":"不为人知的心理学“第三巨头”","color":0}],"thoughts":[{"text":"一种缺乏比较的幸福感与完满，真的能带来幸福吗？","quote":"你还有我，即使生命终结于“此时此刻”，那也并不足以称为不幸。无论是20岁终结的人生还是90岁终结的人生，全都是完结的、幸福的人生。","chapter":""},{"text":"按照康德的道德理论，要把人当作目的（ends），而不是手段（means）","quote":"那不是目的，而且也可能不会发生。总之，把改变自己当成操纵他人的手段是一种极其错误的想法。","chapter":""},{"text":"有点震聋发聩。","quote":"就像我前面反复提到的那样，阿德勒心理学认为“一切烦恼皆源于人际关系”。也就是说，我们都在追求从人际关系中解放出来的自由。但是，一个人在宇宙中生存之类的事情根本不可能。想到这里自然就能明白何谓自由了吧。\n青年：是什么？\n哲人：也就是说“自由就是被别人讨厌”。","chapter":""},{"text":"这是康德绝对律令的道德悬设","quote":"刚刚先生也提到了神的话题，如果是人人都相信神的时代，“神在看着”就有可能成为自律的规范。","chapter":""}],"popularHighlights":[{"text":"人并不是住在客观的世界，而是住在自己营造的主观世界里。你所看到的世界不同于我所看到的世界，而且恐怕是不可能与任何人共有的世界。","count":235905,"chapter":"引言"},{"text":"简单地说就是害怕向前迈进或者是不想真正地努力。不愿意为了改变自我而牺牲目前所享受的乐趣——比如玩乐或休闲时间。也就是拿不出改变生活方式的“勇气”，即使有些不满或者不自由，也还是更愿意维持现状。","count":191328,"chapter":"为什么讨厌自己？"},{"text":"为什么那么急于得到答案呢？答案不应该是从别人那里得到，而应该是自己亲自找出来。从别人那里得到的答案只不过是对症疗法而已，没有什么价值。","count":164112,"chapter":"不为人知的心理学“第三巨头”"},{"text":"任何经历本身并不是成功或者失败的原因。我们并非因为自身经历中的刺激——所谓的心理创伤——而痛苦，事实上我们会从经历中发现符合自己目的的因素。决定我们自身的不是过去的经历，而是我们自己赋予经历的意义。","count":145200,"chapter":"不为人知的心理学“第三巨头”"},{"text":"阿德勒的目的论是说：“无论之前的人生发生过什么，都对今后的人生如何度过没有影响。”决定自己人生的是活在“此时此刻”的你自己。","count":141516,"chapter":"不为人知的心理学“第三巨头”"},{"text":"健全的自卑感不是来自与别人的比较，而是来自与“理想的自己”的比较。","count":140184,"chapter":"为什么讨厌自己？"},{"text":"重要的不是被给予了什么，而是如何去利用被给予的东西。","count":131079,"chapter":"不为人知的心理学“第三巨头”"},{"text":"重要的不是过去，而是你怎么看待过去，而我们对过去的看法，是可以改变的。","count":127092,"chapter":"推荐序二 自我的枷锁和解放"},{"text":"如果一味地关注过去的原因，企图仅仅靠原因去解释事物，那就会陷入“决定论”。也就是说，最终会得出这样的结论：我们的现在甚至未来全部都由过去的事情所决定，而且根本无法改变。是这样吧？","count":117288,"chapter":"不为人知的心理学“第三巨头”"},{"text":"我们无法改变客观事实，但可以任意改变主观解释。并且，我们都活在主观世界中。","count":108624,"chapter":"为什么讨厌自己？"},{"text":"当人能够感觉到“与这个人在一起可以无拘无束”的时候，才能够体会到爱。既没有自卑感也不必炫耀优越性，能够保持一种平静而自然的状态。真正的爱应该是这样的。","count":108207,"chapter":"为什么讨厌自己？"},{"text":"不畏惧被人讨厌而是勇往直前，不随波逐流而是激流勇进，这才是对人而言的自由。","count":106760,"chapter":"自由就是不再寻求认可？"},{"text":"人并不受过去的原因所左右，而是朝着自己定下的目标前进","count":105910,"chapter":"不为人知的心理学“第三巨头”"},{"text":"你在人生的某个阶段里选择了“不幸”。这既不是因为你生在了不幸的环境中，也不是因为你陷入了不幸的境地中，而是因为你认为“不幸”对你自身而言是一种“善”。","count":105850,"chapter":"不为人知的心理学“第三巨头”"},{"text":"“无法真心祝福过得幸福的他人”，那就是因为站在竞争的角度来考虑人际关系，把他人的幸福看作“我的失败”，所以才无法给予祝福。","count":104907,"chapter":"为什么讨厌自己？"},{"text":"青年自幼就缺乏自信，他对自己的出身、学历甚至容貌都抱有强烈的自卑感。也许是因为这样，他往往过于在意他人的目光；而且，他无法衷心地去祝福别人的幸福，从而常常陷入自我嫌恶的痛苦境地。","count":103719,"chapter":"第一夜 我们的不幸是谁的错？"},{"text":"阿德勒心理学就是勇气心理学。你之所以不幸并不是因为过去或者环境，更不是因为能力不足，你只不过是缺乏“勇气”，可以说是缺乏“获得幸福的勇气”。","count":103532,"chapter":"不为人知的心理学“第三巨头”"},{"text":"之所以感觉孤独并不是因为只有你自己一个人，感觉自己被周围的他人、社会和共同体所疏远才会孤独。我们要想体会孤独也需要有他人的存在。也就是说，人只有在社会关系中才会成为“个人”。","count":91212,"chapter":"为什么讨厌自己？"},{"text":"关于权力之争，还有一点需要注意。那就是无论认为自己多么正确，也不要以此为理由去责难对方。这是很多人都容易陷落进去的人际关系圈套。","count":90240,"chapter":"为什么讨厌自己？"},{"text":"无论是你还是我，我们都不是世界的中心，必须用自己的脚主动迈出一步去面对人际关系课题；不是考虑“这个人会给我什么”，而是要必须思考一下“我能给这个人什么”。这就是对共同体的参与和融入。","count":85248,"chapter":"个体心理学和整体论"}]},"25858734":{"rating":822,"ratingCount":531,"highlights":[{"text":"在日本传统艺术教育当中，已有“模仿以求创新”这个概念的先例。在花道与武术中，学生借由模仿单一权威的“形”（Kata）来学习基本技巧。学生首先必须保护“形”，但在研习多年后，他们会脱离传统，接着分别去创造自己的“形”——这个系统称为“守破离”。","chapter":"第十章 输出美式传统风格","color":0},{"text":"日本人一般无法靠自己打定主意，必须有范例遵循才行。","chapter":"第十章 输出美式传统风格","color":0},{"text":"然而，在财源滚滚之际，这些年轻大亨也开始思考他们在本质上的二元性：高居世界巅峰的他该如何维持“地下”的特质？\n","chapter":"第八章 从原宿到世界各地","color":0},{"text":"一如社会学家难波功士所言：“涩休之所以酷，原因在于涩谷，而不是美国。涩休的所有时尚单品都属美式风格，但是‘美国’却不在它们之上。涩休是一种自己的风格。”","chapter":"第七章 新富阶级","color":0},{"text":"为了与设计师和个性品牌保持距离，东京富裕郊区的青少年在1980年代中期设计出一种新风格“アメカジ”（音译为“阿美咔叽”），意指美式休闲——来自Brook Brothers、Levi’s以及Nike等经典品牌的舒适服装。","chapter":"第七章 新富阶级","color":0},{"text":"品牌塑造大师石津谦介知道，迈向成功的关键在于不能把这产品称作运动鞋。黑须敏之表示：“我们采用比较时尚的西方名词‘sneakers’，就像他们将‘鼻纸’改称为‘卫生纸’一样。只要称为‘sneakers’，穿运动鞋在街上走突然就没关系了。”","chapter":"第三章 引介常春藤","color":0},{"text":"石津谦介希望借由这些文章传递他的信念，也就是常春藤时尚并非稍纵即逝的产业趋势，而是迈向高贵生活的途径。为了避免重蹈过去诸多潮流兴衰起落的覆辙，他说过一句名言：“我不开创潮流，我想创造新风俗。”","chapter":"第二章 常春藤狂热","color":0},{"text":"在美国，大学时尚最棒之处，就在于它无意间流露出的酷感。《Men’s Club》却往往为同样的风格增添了犹如报税作业般的无聊色彩。","chapter":"第二章 常春藤狂热","color":0},{"text":"除了推广常春藤服装的知识，这种在同质社群里高人一等的作风，让过去被贬低为“阴柔”的时尚讲究，如今更像是等同修理汽车和运动等的技术性“阳刚”嗜好。","chapter":"第二章 常春藤狂热","color":0},{"text":"1963年春天，黑须敏之在《Men’s Club》上开辟了一个“街头的常春藤联盟生”专栏，由他和摄影师在银座街头拍摄穿着近似美国东海岸大学生的年轻路人。黑须敏之挑出最好的照片，再撰写图片说明。这个简称“街头之眼”的照片专页很快就成为杂志内最受读者欢迎的单元，黑须敏之可能也因此发明了“街拍”这种风格独特的时尚纪实摄影，如今它在每一本日本时尚杂志上都能看到。","chapter":"第二章 常春藤狂热","color":0},{"text":"日本人守护了美国的服装历史，一如阿拉伯人在欧洲黑暗时期守卫了亚里士多德的物理学。日本的消费者与品牌挽救了美国时尚风格，“挽救”一词在此其实包含了两种意涵——既以权威性的知识形态保存了美式服装风格，也保护它们不至于灭绝。","chapter":"前言","color":0}],"thoughts":[{"text":"写的真妙","quote":"然而，在财源滚滚之际，这些年轻大亨也开始思考他们在本质上的二元性：高居世界巅峰的他该如何维持“地下”的特质？","chapter":""}],"popularHighlights":[{"text":"日本接纳、重新挪用，最后反向输出美式风格的故事，充分体现了文化全球化的过程。","count":216,"chapter":"前言"},{"text":"他们担心日本的男性气概岌岌可危与青少年对时尚怀有浓厚兴趣有关。刑警对于御幸族男孩“女性化”的用词相当反感。","count":209,"chapter":"前言"},{"text":"这个简称“街头之眼”的照片专页很快就成为杂志内最受读者欢迎的单元，黑须敏之可能也因此发明了“街拍”这种风格独特的时尚纪实摄影，如今它在每一本日本时尚杂志上都能看到。","count":130,"chapter":"第二章 常春藤狂热"},{"text":"高桥盾告诉《纽约客》：“日本人奉杂志为圣经，看到杂志内的图片就非拥有那些东西不可，而且不计任何代价。日本人一般无法靠自己打定主意，必须有范例遵循才行。”","count":117,"chapter":"第十章 输出美式传统风格"},{"text":"银座的社区领导已将所有可能会透露战后贫穷景象的蛛丝马迹全数抹尽，甚至还将木质垃圾桶改换成富有现代感的塑胶材质。","count":108,"chapter":"前言"},{"text":"黑须敏之与穗积和夫之所以喜欢常春藤风格，部分是因为它来自美国，一个被贫困的日本视为文明与繁荣的国家。","count":108,"chapter":"第二章 常春藤狂热"},{"text":"到了坚固耐用风格成为热潮之后，银座俨然户外搜救人员每周大集会的会场。","count":108,"chapter":"第五章 美国目录"},{"text":"就这些价格来说，一般年轻人再也无力购买没人穿过的Levi’s 501古着。不过他们已经不在乎了。在更棒的复刻品出现后，谁还需要原版呢？","count":108,"chapter":"第九章 复古与复刻"},{"text":"年轻人不再把购物当成获取新体验的途径，例如购买唱机听爵士乐唱片，穿西装令女生刮目相看，穿防风外套去徒步。年轻人将物品就当成物品来崇拜。","count":105,"chapter":"第五章 美国目录"},{"text":"他当然不是第一个以社交情境思考时尚的人，不过TPO这个简单的说法将之设定成了日本人如何采行美式风格的主原则。","count":102,"chapter":"第二章 常春藤狂热"},{"text":"社论作家也纠正不了他们，知名作家安冈章太郎在银座看见一个青少年身穿VAN生产的普林斯顿运动衫后，心情沉重，哀叹日本即使有了经济奇迹，年轻人还是穿着美国在战后慈善捐赠的旧衣。","count":102,"chapter":"第三章 引介常春藤"},{"text":"对全日本无法认同他们的成年人来说，美国时尚与道德沦丧之间的关联可以说是再明显不过。","count":96,"chapter":"第二章 常春藤狂热"},{"text":"即使口袋里连100日元都拿不出来，我却突然能进出有钱人的俱乐部和高级饭店泳池。穿上VAN之后，我俨然就是个富人模样。我想，这正是石津谦介的策略成功的原因。”","count":96,"chapter":"第三章 引介常春藤"},{"text":"每个人看起来都像是为了叛逆而叛逆。","count":96,"chapter":"第六章 不良洋基"},{"text":"在战前，西方时尚与习惯是通过男性精英阶层进入日本社会，而后慢慢向下蔓延的。但此时这一情况出现大翻转，战后日本率先穿上美式风格服装的是女性，而且是妓女。","count":91,"chapter":"第一章 时尚荒漠之国"},{"text":"JUN和其他品牌只是制造服装，如此而已。但我们试图推介的是一种全方位的生活风格。”","count":91,"chapter":"第三章 引介常春藤"},{"text":"美国人寄东西给驻扎日本的家人时，箱内常会用破损的牛仔裤作为填充材料。他们买下这些破裤，再请人缝补破洞。结果，破裤子的不同元素相互缝合，看起来就像是科学怪人的模样，但就连这样的商品也立刻销售一空。","count":91,"chapter":"第四章 牛仔裤革命"},{"text":"推动这些改变的人往往不是受过专业训练的服装设计师，而是企业家、进口商、杂志编辑、插画家、造型师以及音乐工作者。","count":85,"chapter":"前言"},{"text":"编辑们为之目眩神迷，大家注意力全集中在这种自由自在的滑雪生活，而非运动本身。","count":84,"chapter":"第五章 美国目录"},{"text":"在美军到来之前，诺贝尔文学奖得主大江健三郎甚至认为美国人会“强暴、杀害、用喷火器烧死所有人”。","count":80,"chapter":"第一章 时尚荒漠之国"}]},"26026653":{"rating":809,"ratingCount":4709,"highlights":[{"text":"佛陀把这点总结为几句箴言，成千上万人都把这作为他们生活的基础：生是苦，老是苦，病是苦，死是苦，怨憎会是苦，爱别离是苦，求不得是苦。[插图]这些都是苦，因为我们必须失去我们所拥有的以及所爱的。因为一切生起的必然灭去。使我们受苦的不在过去或未来，它就在那儿，现在，在我们的记忆里，在我们的期待里。我们渴望永恒，我们忍受着时间的流逝，我们因时间而受苦。时间即苦。","chapter":"12．玛德琳蛋糕的香味","color":0},{"text":"让世界运转的不是能源，而是低熵源。没有低熵，能量会稀释成相同的热量，世界会在热平衡态中睡去——过去与未来不再有分别，一切都不会发生。","chapter":"11．特殊之处会出现什么","color":0},{"text":"我们无法画出一幅世界上所有发生之事的完整地图或几何图，因为这些现象——包括时间的流逝——只有在与一个物理系统相互作用时才会出现。世界就像是相互关联的点的集合。谈论“从外面看到”的世界是没有意义的，因为没有什么在世界“外面”。","chapter":"8．以关联为动力","color":0},{"text":"我们无法把宇宙按照单一的时间顺序排列，但这并不意味着没有事物在变化，这表明变化并不按照单一序列次第发生：世界的时间结构比每个时刻按照简单的、单一的线性排列要复杂。但这并不意味着它不存在或只是个幻象。","chapter":"7．语法的力不从心","color":0},{"text":"现在主义并没有很好地描述我们的世界：客观且统一的当下是不存在的。我们最多也就能说：有一个相对于运动的观察者的当下。","chapter":"7．语法的力不从心","color":0},{"text":"从托勒密到伽利略，从牛顿到薛定谔，所有行之有效的物理学与天文学都在数学上精确描述了事物的变化，而非它们的形式。一切都与事件有关，而非物体。只有借助描述原子中电子运动的薛定谔方程的解，原子的形状才最终被理解。又是事件，而非物体。","chapter":"6．世界由事件而非物体构成","color":0},{"text":"托勒密到伽利略，从牛顿到薛定谔，所有行之有效的物理学与天文学都在数学上精确描述了事物的变化，而非它们的形式。一切都与事件有关，而非物体。只有借助描述原子中电子运动的薛定谔方程的解，原子的形状才最终被理解。又是事件，而非物体。","chapter":"6．世界由事件而非物体构成","color":0},{"text":"假如世界真是由物体组成的，那么这些物体又由什么构成呢？是原子吗？我们已经发现，它由更小的粒子构成。是基本粒子吗？我们发现，它们只是场的短暂振动。是量子场吗？我们发现这仅仅是谈及相互作用与事件时所用的语言代码。我们不能把物理世界看作由物体或实体组成，这行不通。","chapter":"6．世界由事件而非物体构成","color":0},{"text":"通过把世界看作事件、过程的集合，我们得以更好地理解与描述世界。这是与相对论兼容的唯一方式。世界并不是物体的集合，而是事件的集合。","chapter":"6．世界由事件而非物体构成","color":0},{"text":"我们可以把世界看作由物体、物质、实体这一类东西构成。或者我们可以把它看作由事件、发生、过程、出现组成。它不能持久，会不断转化，无法在时间中永恒。基础物理学中，时间概念的毁灭导致了以上两种观点中前者的崩塌，而非后者。这是一种领悟，认识到无常的普遍性，而不是一切在静止的时间里停滞。","chapter":"6．世界由事件而非物体构成","color":0},{"text":"让我重复一下本书第一部分中进行的漫长而深入的探讨。不存在单一的时间，每个轨迹都有自己的持续时间；根据位置与速度，时间会以不同节奏流逝；它是没有方向的：在世界的基本方程中，过去与未来的区别并不存在；方向性只在我们进行观察并忽略细节时偶然出现。在这种模糊的视角下，宇宙的过去处于一种奇特的“特定”状态。“当下”的概念不再奏效：在广袤的宇宙中，没有我们可以合理地称为“当下”的东西。决定时间长度的物理基础不是一个区别于世界其他组成部分的独立实体，而是动态场的一个方面。它会跳跃、涨落，只在相互作用时实体化，在最小尺度之下无法被发现……那么，这一切之后，时间还剩下什么呢？你扔掉手表，你尝试理解这看似能抓住的时间，只不过是指针的运动……","chapter":"5．时间量子","color":0},{"text":"分立性在自然界中无所不在：光由光的微粒也就是光子组成，原子中电子的能量只能取特定值而非其他。最纯粹的空气与最致密的物质一样，都是分立的。一旦理解了牛顿时空也是像其他物质一样的物理实体，就可以很自然地推断出它们也是分立的。理论确认了这一想法：圈量子引力预言，基本的时间跳跃虽然很小，但有限。","chapter":"5．时间量子","color":0},{"text":"量子力学导致的三个基本发现如下：分立性、不确定性、与物理量的关联性。它们进一步推翻了我们仅存的时间观念。","chapter":"5．时间量子","color":0},{"text":"别以为你的直觉与观点很“自然”，它们经常是那些在我们之前的大胆的思想家观念的产物。","chapter":"4．独立性的消失","color":0},{"text":"我们的“当下”不会延伸到整个宇宙，它就像我们周围的一个气泡。\n这个气泡可以延伸到多远呢？取决于我们限定时间的精确程度。如果用纳秒，“现在”的定义仅有几米；如果用毫秒，那就有几千公里。作为人类，我们对几十分之一秒都很难分辨出来，我们可以把整个星球都看作同一个气泡，在谈及现在时，可以认为对我们而言这是同一个瞬间。这就是我们可以做出的最大限度的近似。","chapter":"3．当下的终结","color":0},{"text":"熵仅仅是我们模糊的视野无法识别的微观状态的数量。","chapter":"2．方向的消失","color":0},{"text":"就是玻尔兹曼工作中出现的令人不安的结论：过去与未来的区别只适用于我们对世界模糊的观察。","chapter":"2．方向的消失","color":0},{"text":"如果我去观测事物的微观状态，那么过去与未来的区别就会消失。比如，未来的世界由现在的状态所决定，过去也是如此。","chapter":"2．方向的消失","color":0},{"text":"只有当我们以一种模糊与近似的方式看待宇宙的时候，“特殊性”的概念才会出现。","chapter":"2．方向的消失","color":0},{"text":"我喜欢用古代的语言来给重要的科学量命名，这样它们就不会在现在依然在使用的各种语言中发生变化。因此我建议把物质的这个量命名为“熵”，在希腊语中意为“转化”。","chapter":"2．方向的消失","color":0},{"text":"单一量“时间”消融于时间之网中。我们并不描述世界在时间中演化的方式：我们描述的是事物在当地时间（local time）中演化的方式，以及当地时间相对于彼此如何演化。","chapter":"1．统一性的消失","color":0},{"text":"物体会自然倾向于向时间流逝更慢的地方运动，","chapter":"1．统一性的消失","color":0},{"text":"时间的延缓：物体会使它周围的时间变慢。地球是个庞然大物，会使其附近的时间变慢。这种效应在平原处更明显，在山上要弱一些，因为平原更近。","chapter":"1．统一性的消失","color":0},{"text":"先于观察就理解某种事物的能力，是科学思想的核心。在古代，阿那克西曼德明白天空在我们脚下仍然延续，远早于轮船能够环游地球。现代伊始，哥白尼就明白是地球在转动，远早于宇航员从月球上看到这一事实。与之类似，在钟表的发展精确到足以测量出时间以不同速度流逝之前，爱因斯坦就意识到，时间在不同地方的流逝是不均匀的。","chapter":"1．统一性的消失","color":0}],"thoughts":[],"popularHighlights":[{"text":"时间的流逝在山上要比在海平面快。","count":3615,"chapter":"1．统一性的消失"},{"text":"在世界的基本方程中，仅仅在有热量的地方，时间之矢才会出现。因此时间与热量的联系是根本性的：每当过去与未来的差别显现，都会有热量参与其中。如果一个过程倒过来看很荒谬，那么一定有东西被加热了。","count":1968,"chapter":"2．方向的消失"},{"text":"先于观察就理解某种事物的能力，是科学思想的核心。","count":1807,"chapter":"1．统一性的消失"},{"text":"对于不停运动的人，时间流逝得更慢。","count":1770,"chapter":"3．当下的终结"},{"text":"时间的结构也并不像它看起来那样，它并不是均匀统一地流动。","count":1728,"chapter":"也许时间是最大的奥秘"},{"text":"但带来伤感的并非失去，而是情感与爱。没有情感，没有爱，失去也就不会带来痛苦。因此，即使是失去带来的痛苦，也是好事，甚至很美妙，因为它让生命充满意义。","count":1414,"chapter":"8．以关联为动力"},{"text":"认为有个定义清晰的“现在”遍存于整个宇宙的观念是个幻觉，是我们根据自身经验做出的不合理的推断。","count":1302,"chapter":"3．当下的终结"},{"text":"整个科学的发展都表明，思考世界的最佳方式应该基于变化，而非不变。不是存在，而是生成。","count":1140,"chapter":"6．世界由事件而非物体构成"},{"text":"过去与未来的区别只适用于我们对世界模糊的观察。","count":1090,"chapter":"2．方向的消失"},{"text":"让世界运转的不是能源，而是低熵源。没有低熵，能量会稀释成相同的热量，世界会在热平衡态中睡去—— 州","color":0},{"text":"我每天早上都不自觉地去清洗马桶，因为我知道，说不定午饭前我的头就可能被按在里面。","chapter":"我的双脚已离开土地","color":0},{"text":"这一刻定义了我对那一晚的记忆，以及之后长达十年之久很多类似的夜晚的记忆。在这样的记忆中，我看到的是一个坚不可摧、像石头一样难以对付的自己。起初我仅仅是让自己相信这一点，直到有一天它变成了现实。然后我才能坦诚地告诉自己，这对我没有影响，他没有影响到我，因为没有什么可以影响我。我不明白我的这种正确是多么病态，不明白自己是如何掏空了自己。尽管我一直被那晚的后果所困扰，但我误解了最重要的事实：它没有影响我，这本身就是它的影响。","chapter":"鱼眼睛","color":0},{"text":"身旁的那个人就是肖恩，我看着他，但看不透他。我不知道我看到了什么——在那极其暴力又富有同情心的行为背后，我到底召唤出了什么生物——但我想我看到了父亲，或者我所希望的父亲的样子，一位我渴望已久的守护者，一名想象出来的斗士，一个不会把我扔进暴风雪中的人，一个当我受了伤，能让我重新变得完整的人。","chapter":"羽毛盾牌","color":0},{"text":"人们共同或者独自做出的那些决定，聚合起来，制造了每一桩单独事件。沙粒不可计数，叠压成沉积物，然后成为岩石。","chapter":"阿帕奇女人","color":0},{"text":"过去总是美好的，因为一个人从来都意识不到当时的情绪；它后来扩展开来，因此我们只对过去，而非现在，拥有完整的情绪。\n——弗吉尼亚·伍尔夫","chapter":"引言","color":0}],"thoughts":[{"text":"尽管父亲偏执、无知、被阴谋论、被教条耍的团团转，但就像世间所有父亲一样，他对女儿的爱是真实的，是世界末日都阻挡不了的爱。但就算如此，这个男人的过往，这个男人的所作所为，值得被原谅吗？爱能解释一切伤害吗？爱能让两种截然不同的人与思想之间的沟壑填平吗？在这样的一种情境下，这个有爱的可憎父亲是可怜的，回敬这种可怜的最佳方式，当然不应该是爱，因为以爱之名只会令作者再度堕入她父亲的管辖权。因此，最佳的回敬方式，是用爱的对立面，当然不是恨，而是冷漠。","quote":"“如果你在美国，”他低声说，“无论你在哪个角落，我们都可以去找你。我在地下埋了一千加仑汽油。世界末日来临时我可以去接你，带你回家，让你平平安安的。但要是你去了大洋彼岸……”","chapter":""}],"popularHighlights":[{"text":"过去是一个幽灵，虚无缥缈，没什么影响力。只有未来才有分量。","count":94784,"chapter":"悲剧之后的闹剧"},{"text":"“如果你在美国，”他低声说，“无论你在哪个角落，我们都可以去找你。我在地下埋了一千加仑汽油。世界末日来临时我可以去接你，带你回家，让你平平安安的。但要是你去了大洋彼岸……”","count":85290,"chapter":"毕业"},{"text":"想起汇而构成人一生的所有决定——人们共同或者独自做出的那些决定，聚合起来，制造了每一桩单独事件。沙粒不可计数，叠压成沉积物，然后成为岩石。","count":46774,"chapter":"阿帕奇女人"},{"text":"我这一生中，这些直觉一直在教导我一个道理——只有依靠自己，胜算才更大。","count":40584,"chapter":"直觉"},{"text":"偏执狂和原教旨主义如何瓜分了我的人生，它们如何把我在乎的人从我身边带走，只留下学位和证书——一种体面的虚空。现在正在发生的以前也曾发生。母女分离再度重演。磁带在循环播放。","count":37376,"chapter":"奶油色鞋子"},{"text":"我从未允许自己拥有这样的特权：不确定，但拒绝让位于那些声称确定的人。我的一生都活在别人的讲述中。他们的声音铿锵有力，专制而绝对。之前我从未意识到，我的声音也可以与他们的一样有力。","count":36195,"chapter":"我们的低语，我们的尖叫"},{"text":"当我拿到第一份证明我是个人的法律证据时，我的感觉怪怪的，就好像权利被人剥夺了：在此之前，我从未意识到这还需要证明。","count":33984,"chapter":"助产士"},{"text":"我一瘸一拐地穿过牧场，直到爸爸消失在视野中，才在麦草上失声崩溃。我颤抖着，大口大口地喘着粗气。我不明白我为什么哭。我还活着。我会没事的。天使们已尽了他们的本分。可我为什么无法停止颤抖呢？","count":32964,"chapter":"大小盾牌"}       if (filtered.length > 0) {
        renderWall(filtered);
        renderBooklist(getSortedList(filtered));
        if (booklistOpen) {
          document.getElementById('booklist-content').classList.add('open');
          document.getElementById('booklist-toggle').classList.add('open');
        }
      } else {
        document.getElementById('cover-wall').innerHTML = '<div class="no-results">没有找到匹配的书籍</div>';
        document.getElementById('booklist-content').innerHTML = '<div class="no-results">没有找到匹配的书籍</div>';
        document.getElementById('wall-count').textContent = '0 本';
      }
    }

    // ===== 搜索框事件 =====
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');

    // 从 URL 预填
    const urlParams = new URLSearchParams(window.location.search);
    searchQuery = urlParams.get('search') || '';
    searchInput.value = searchQuery;
    if (searchQuery) searchClear.classList.add('visible');

    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        searchQuery = e.target.value.trim();
        const url = new URL(window.location);
        if (searchQuery) {
          url.searchParams.set('search', searchQuery);
        } else {
          url.searchParams.delete('search');
        }
        history.replaceState(null, '', url);
        searchClear.classList.toggle('visible', !!searchQuery);
        applySearchAndFilter();
      }, 150);
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      searchClear.classList.remove('visible');
      const url = new URL(window.location);
      url.searchParams.delete('search');
      history.replaceState(null, '', url);
      applySearchAndFilter();
      searchInput.focus();
    });

    // ===== 筛选按钮 =====
    const filtersEl = document.getElementById('filters');
    filterBtns.forEach(fb => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (fb.key === 'all' ? ' active' : '');
      btn.textContent = fb.label;
      btn.dataset.filterKey = fb.key;
      btn.dataset.baseLabel = fb.label.replace(/\s*\(\d+\)\s*$/, '');
      btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = fb.key;
        applySearchAndFilter();
      };
      filtersEl.appendChild(btn);
    });

    // ===== 渲染封面墙 =====
    function renderWall(list) {
      document.getElementById('wall-count').textContent = `${list.length} 本`;
      const wallEl = document.getElementById('cover-wall');
      wallEl.innerHTML = '';
      // 按 finish 时间升序排列
      const sorted = getSortedList(list);
      sorted.forEach(b => {
        const item = document.createElement('div');
        item.className = 'cover-item';
        item.innerHTML = `
          <div class="cover-link" onclick="openBookPanel(${allBooks.indexOf(b)})" title="${b.title}">
            <div class="cover-img-wrap">
              <img src="${b.cover}" alt="${b.title}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 150%22><rect fill=%22%23f6f5f4%22 width=%22100%22 height=%22150%22/><text x=%2250%22 y=%2280%22 text-anchor=%22middle%22 fill=%22%23a39e98%22 font-size=%2210%22>${b.title}</text></svg>'">
              <div class="cover-overlay">
                <div class="cover-title">${b.title}</div>
                <div class="cover-author">${b.author}</div>
                <div class="cover-rating">${stars(b.rating)} ${b.rating}</div>
              </div>
            </div>
          </div>`;
        wallEl.appendChild(item);
      });
    }

    // ===== 渲染书单列表 =====
    function renderBooklist(list) {
      const content = document.getElementById('booklist-content');
      content.innerHTML = list.map((b, idx) => {
        const m = monthMeta[b.month];
        let reviewSection = '';
        if (b.review) {
          const needsTruncation = b.review.length > 60;
          const truncatedText = needsTruncation ? b.review.substring(0, 60) + '...' : b.review;
          reviewSection = `
            <div class="book-review" id="review-${idx}" data-full="${encodeURIComponent(b.review)}" data-truncated="${needsTruncation}">
              ${truncatedText.replace(/\n/g, '<br>')}
            </div>
            ${needsTruncation ? `<button class="review-more-btn" onclick="toggleReview(${idx}, this)">展开</button>` : ''}
          `;
        }
        return `<div class="book-row">
          <div class="book-info">
            <div class="book-dates">${b.start}<br>${b.finish}</div>
            <div class="book-title"><a href="${b.doubanLink}" target="_blank" style="color:inherit;text-decoration:none;">${b.title}</a></div>
            <div class="book-author">${b.author}</div>
            <div class="book-meta">
              <span class="month-tag" style="background:${m.bg};color:${m.color}">${m.label}</span>
              <span class="star-rating">${stars(b.rating)}</span>
              <span class="rating-num">${b.rating}</span>
              ${b.pages ? `<span class="pages-tag">${b.pages}页</span>` : ''}
            </div>
            ${reviewSection}
          </div>
        </div>`;
      }).join('');
    }

    function toggleReview(idx, btn) {
      const review = document.getElementById(`review-${idx}`);
      const isCollapsed = btn.textContent === '展开';
      const fullText = decodeURIComponent(review.dataset.full);

      if (isCollapsed) {
        review.innerHTML = fullText.replace(/\n/g, '<br>');
        btn.textContent = '收起';
      } else {
        review.innerHTML = fullText.substring(0, 60) + '...';
        btn.textContent = '展开';
      }
    }

    // ===== 展开/收起书单 =====
    function toggleBooklist() {
      const toggle = document.getElementById('booklist-toggle');
      const content = document.getElementById('booklist-content');
      booklistOpen = !booklistOpen;
      toggle.classList.toggle('open', booklistOpen);
      content.classList.toggle('open', booklistOpen);
    }

    // ===== 排序函数 =====
    function getSortedList(list) {
      const sorted = [...list];
      const dir = currentSortDir === 'desc' ? -1 : 1;
      switch (currentSortField) {
        case 'finish': return sorted.sort((a, b) => a.finish.localeCompare(b.finish) * dir);
        case 'rating': return sorted.sort((a, b) => (a.rating - b.rating) * dir);
        case 'pages': return sorted.sort((a, b) => ((parseInt(a.pages) || 0) - (parseInt(b.pages) || 0)) * dir);
        default: return sorted;
      }
    }

    // ===== 排序按钮事件 =====
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const field = btn.dataset.sort;
        if (currentSortField === field) {
          // 同字段点击 → 切换方向
          currentSortDir = currentSortDir === 'desc' ? 'asc' : 'desc';
        } else {
          // 不同字段 → 切换到该字段，默认降序
          currentSortField = field;
          currentSortDir = 'desc';
        }
        // 更新按钮文字
        const fieldLabels = { finish: '时间', rating: '评分', pages: '页数' };
        document.querySelectorAll('.sort-btn').forEach(b => {
          const f = b.dataset.sort;
          const a = (currentSortField === f) ? currentSortDir : 'desc';
          b.textContent = fieldLabels[f] + (a === 'desc' ? ' ↓' : ' ↑');
          b.classList.toggle('active', currentSortField === f);
        });
        applySearchAndFilter();
      });
    });

    // ===== 图表 =====
    const maxMonthlyCount = Math.max(...actualMonths.map(m => monthCounts[m]));
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const chartTextColor = isDark ? '#9e9a96' : '#615d59';
    const chartGridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.05)';
    const monthChart = new Chart(document.getElementById('monthChart'), {
      type: 'bar',
      data: {
        labels: monthLabels,
        datasets: [{
          label: '本数',
          data: actualMonths.map(m => monthCounts[m]),
          backgroundColor: actualMonths.map(m => MONTH_COLORS[m - 1].bg),
          borderColor: actualMonths.map(m => MONTH_COLORS[m - 1].color),
          borderWidth: 1,
          borderRadius: 6,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
        },
        scales: {
          y: {
            beginAtZero: true,
            max: Math.max(maxMonthlyCount + 1, 4),
            ticks: { stepSize: 1, font: { family: 'Inter', size: 11 }, color: chartTextColor },
            grid: { color: chartGridColor },
            border: { display: false }
          },
          x: {
            ticks: { font: { family: 'Inter', size: 12 }, color: chartTextColor },
            grid: { display: false },
            border: { display: false }
          }
        }
      },
      plugins: [{
        id: 'monthDataLabels',
        afterDatasetsDraw(chart) {
          const { ctx, data, scales } = chart;
          ctx.save();
          ctx.font = '600 11px Inter';
          ctx.fillStyle = chartTextColor;
          ctx.textAlign = 'center';
          data.datasets[0].data.forEach((value, index) => {
            if (value > 0) {
              const x = scales.x.getPixelForValue(index);
              const y = scales.y.getPixelForValue(value) - 6;
              ctx.fillText(value, x, y);
            }
          });
          ctx.restore();
        }
      }]
    });

    // ===== Book Notes Panel =====
    const panelOverlay = document.getElementById('panelOverlay');
    const bookPanel = document.getElementById('bookPanel');
    const panelClose = document.getElementById('panelClose');
    const panelHeader = document.getElementById('panelHeader');
    const panelBody = document.getElementById('panelBody');
    const panelDragBar = document.getElementById('panelDragBar');

    function openBookPanel(bookIndex) {
      const b = allBooks[bookIndex];
      if (!b) return;
      const weread = b.wereadId ? wereadData[b.wereadId] : null;
      renderPanelContent(b, weread);
      // 补偿滚动条宽度，防止背景抖动
      const scrollbarW = window.innerWidth - document.documentElement.clientWidth;
      document.body.style.overflow = 'hidden';
      document.body.style.paddingRight = scrollbarW + 'px';
      panelOverlay.classList.add('active');
      bookPanel.classList.add('active');
    }

    function closeBookPanel() {
      panelOverlay.classList.remove('active');
      bookPanel.classList.remove('active');
      document.body.style.overflow = '';
      document.body.style.paddingRight = '';
    }

    panelOverlay.addEventListener('click', closeBookPanel);
    panelClose.addEventListener('click', closeBookPanel);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && bookPanel.classList.contains('active')) {
        closeBookPanel();
      }
    });

    // Mobile drag-to-close
    let dragStartY = 0;
    let dragging = false;
    panelDragBar.addEventListener('touchstart', (e) => {
      dragStartY = e.touches[0].clientY;
      dragging = true;
    });
    document.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      const dy = e.touches[0].clientY - dragStartY;
      if (dy > 0) {
        bookPanel.style.transform = 'translateY(' + dy + 'px)';
      }
    });
    document.addEventListener('touchend', (e) => {
      if (!dragging) return;
      dragging = false;
      const dy = e.changedTouches[0].clientY - dragStartY;
      bookPanel.style.transform = '';
      if (dy > 100) {
        closeBookPanel();
      }
    });

    function renderPanelContent(book, weread) {
      const coverHtml = book.doubanLink
        ? '<a href="' + book.doubanLink + '" target="_blank" style="display:block;flex-shrink:0;"><img class="panel-cover" src="' + book.cover + '" alt="' + book.title + '" onerror="this.style.display=\'none\'"></a>'
        : '<img class="panel-cover" src="' + book.cover + '" alt="' + book.title + '" onerror="this.style.display=\'none\'">';
      panelHeader.innerHTML =
        coverHtml +
        '<div class="panel-book-info">' +
          '<div class="panel-title">' + book.title + '</div>' +
          '<div class="panel-author">' + book.author + '</div>' +
          (weread && weread.rating
            ? '<div class="panel-rating">微信读书 <span class="panel-rating-score">' +
              (weread.rating / 10).toFixed(1) + '%</span> · ' +
              formatRatingCount(weread.ratingCount) + '人评价</div>'
            : '')
        + '</div>';

      let html = '';

      // Review section — 使用 Airtable 的 Review 字段
      if (book.review) {
        html += '<div class="panel-section">';
        html += '<div class="panel-section-title">📝 我的点评</div>';
        const needsCollapse = book.review.length > 200;
        html += '<div class="panel-review-text' + (needsCollapse ? ' collapsed' : '') + '" id="panelReviewText">' +
          book.review.replace(/\n/g, '<br>') + '</div>';
        if (needsCollapse) {
          html += '<button class="panel-review-toggle" onclick="togglePanelReview(this)">展开全文</button>';
        }
        html += '</div>';
      }

      if (!weread) {
        if (!book.review) {
          html += '<div class="panel-empty">暂无微信读书笔记</div>';
        }
        panelBody.innerHTML = html;
        return;
      }

      // Tabs
      const hlCount = weread.highlights ? weread.highlights.length : 0;
      const thCount = weread.thoughts ? weread.thoughts.length : 0;
      const popCount = weread.popularHighlights ? weread.popularHighlights.length : 0;

      html += '<div class="panel-tabs">';
      html += '<button class="panel-tab active" data-tab="highlights">划线 (' + hlCount + ')</button>';
      html += '<button class="panel-tab" data-tab="thoughts">想法 (' + thCount + ')</button>';
      html += '<button class="panel-tab" data-tab="popular">热门划线 (' + popCount + ')</button>';
      html += '</div>';

      // Highlights tab
      html += '<div class="panel-tab-content active" data-tab-content="highlights">';
      if (hlCount > 0) {
        weread.highlights.forEach(function(h) {
          html += '<div class="panel-note-item">';
          html += '<div class="panel-note-text">' + escapeHtml(h.text) + '</div>';
          if (h.chapter) html += '<div class="panel-note-chapter">「' + escapeHtml(h.chapter) + '」</div>';
          html += '</div>';
        });
      } else {
        html += '<div class="panel-empty">暂无划线</div>';
      }
      html += '</div>';

      // Thoughts tab
      html += '<div class="panel-tab-content" data-tab-content="thoughts">';
      if (thCount > 0) {
        weread.thoughts.forEach(function(t) {
          html += '<div class="panel-note-item">';
          if (t.quote) {
            html += '<div class="panel-quote">' + escapeHtml(t.quote) + '</div>';
          }
          html += '<div class="panel-thought-content">' + escapeHtml(t.text) + '</div>';
          if (t.chapter) html += '<div class="panel-note-chapter">「' + escapeHtml(t.chapter) + '」</div>';
          html += '</div>';
        });
      } else {
        html += '<div class="panel-empty">暂无想法</div>';
      }
      html += '</div>';

      // Popular highlights tab
      html += '<div class="panel-tab-content" data-tab-content="popular">';
      if (popCount > 0) {
        weread.popularHighlights.forEach(function(p) {
          html += '<div class="panel-note-item">';
          html += '<div class="panel-note-text">' + escapeHtml(p.text) + '</div>';
          html += '<div class="panel-note-count">' + p.count + '人划线</div>';
          if (p.chapter) html += '<div class="panel-note-chapter">「' + escapeHtml(p.chapter) + '」</div>';
          html += '</div>';
        });
      } else {
        html += '<div class="panel-empty">暂无热门划线</div>';
      }
      html += '</div>';

      panelBody.innerHTML = html;

      // Tab click handlers
      panelBody.querySelectorAll('.panel-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
          panelBody.querySelectorAll('.panel-tab').forEach(function(t) { t.classList.remove('active'); });
          panelBody.querySelectorAll('.panel-tab-content').forEach(function(c) { c.classList.remove('active'); });
          tab.classList.add('active');
          panelBody.querySelector('[data-tab-content="' + tab.dataset.tab + '"]').classList.add('active');
          // 切换 tab 后重置滚动位置，防止抖动
          panelBody.scrollTop = 0;
        });
      });
    }

    function togglePanelReview(btn) {
      var textEl = document.getElementById('panelReviewText');
      if (textEl.classList.contains('collapsed')) {
        textEl.classList.remove('collapsed');
        btn.textContent = '收起';
      } else {
        textEl.classList.add('collapsed');
        btn.textContent = '展开全文';
      }
    }

    function formatRatingCount(count) {
      if (count >= 10000) return (count / 10000).toFixed(1) + '万';
      if (count >= 1000) return (count / 1000).toFixed(1) + 'k';
      return String(count);
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ===== 初始渲染 =====
    applySearchAndFilter();
  </script>
</body>
</html>
